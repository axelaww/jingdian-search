: "肝中寒者,两臂不举,舌本燥"}, {"id": 553, "source": "金匮要略", "article_number": "11-10", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "肝死脏，浮之弱，按之如索不来，或曲如蛇行者，死。", "tags": "肝死脏,浮之弱,按之如索不来,或曲如蛇行者死", "formula": "", "formula_detail": "", "ni_annotation": "肝死脏浮之弱按之如索不来或曲如蛇行者死。", "contraindication": "", "keywords": "肝死脏,浮之弱"}, {"id": 554, "source": "金匮要略", "article_number": "11-11", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "心中风者，翕翕发热，不能起，心中饥，食即呕吐。", "tags": "心中风者,翕翕发热,不能起,心中饥,食即呕吐", "formula": "", "formula_detail": "", "ni_annotation": "心中风者翕翕发热不能起心中饥食即呕吐。", "contraindication": "", "keywords": "心中风者,翕翕发热"}, {"id": 555, "source": "金匮要略", "article_number": "11-12", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "心中寒者，其人苦心病，适当心痛彻背，背痛彻心，譬如蛊注。其脉浮者，自吐乃愈。", "tags": "心中寒者,其人苦心病,适当心痛彻背,背痛彻心,譬如蛊注,其脉浮者自吐乃愈", "formula": "", "formula_detail": "", "ni_annotation": "心中寒者其人苦心病适当心痛彻背背痛彻心譬如蛊注其脉浮者自吐乃愈。", "contraindication": "", "keywords": "心中寒者,心痛彻背"}, {"id": 556, "source": "金匮要略", "article_number": "11-13", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "心死脏，浮之实如丸豆，按之益躁疾者，死。", "tags": "心死脏,浮之实如丸豆,按之益躁疾者死", "formula": "", "formula_detail": "", "ni_annotation": "心死脏浮之实如丸豆按之益躁疾者死。", "contraindication": "", "keywords": "心死脏,浮之实如丸豆"}, {"id": 557, "source": "金匮要略", "article_number": "11-14", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "脾中风者，翕翕发热，形如醉人，腹中烦重，皮目瞤瞤而短气。", "tags": "脾中风者,翕翕发热,形如醉人,腹中烦重,皮目瞤瞤而短气", "formula": "", "formula_detail": "", "ni_annotation": "脾中风者翕翕发热形如醉人腹中烦重皮目瞤瞤而短气。", "contraindication": "", "keywords": "脾中风者,翕翕发热"}, {"id": 558, "source": "金匮要略", "article_number": "11-15", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "脾死脏，浮之大坚，按之如覆杯，洁洁状如摇者，死。", "tags": "脾死脏,浮之大坚,按之如覆杯,洁洁状如摇者死", "formula": "", "formula_detail": "", "ni_annotation": "脾死脏浮之大坚按之如覆杯洁洁状如摇者死。", "contraindication": "", "keywords": "脾死脏,浮之大坚"}, {"id": 559, "source": "金匮要略", "article_number": "11-16", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "肾中风者，其人但踞坐，而汗出，百节苦痛，目眶疼，怕冷，脊背难以俯仰。", "tags": "肾中风者,其人但踞坐,而汗出,百节苦痛,目眶疼,怕冷,脊背难以俯仰", "formula": "", "formula_detail": "", "ni_annotation": "肾中风者其人但踞坐而汗出百节苦痛目眶疼怕冷脊背难以俯仰。", "contraindication": "", "keywords": "肾中风者,其人但踞坐"}, {"id": 560, "source": "金匮要略", "article_number": "11-17", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "肾死脏，浮之坚，按之乱如转丸，益下入尺中者，死。", "tags": "肾死脏,浮之坚,按之乱如转丸,益下入尺中者死", "formula": "", "formula_detail": "", "ni_annotation": "肾死脏浮之坚按之乱如转丸益下入尺中者死。", "contraindication": "", "keywords": "肾死脏,浮之坚"}, {"id": 561, "source": "金匮要略", "article_number": "11-18", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "问曰：病有积、有聚、有䅽气，何谓也？师曰：积者，脏病也，终不移；聚者，腑病也，发作有时，展转痛移，为可治；䅽气者，胁下痛，按之则愈，复发为䅽气。", "tags": "病有积有聚有䅽气,积者脏病也终不移,聚者腑病也发作有时展转痛移为可治,䅽气者胁下痛按之则愈复发为䅽气", "formula": "", "formula_detail": "", "ni_annotation": "病有积有聚有䅽气何谓也师曰积者脏病也终不移聚者腑病也发作有时展转痛移为可治䅽气者胁下痛按之则愈复发为䅽气。", "contraindication": "", "keywords": "病有积有聚有䅽气,积者脏病也,聚者腑病也"}, {"id": 562, "source": "金匮要略", "article_number": "11-19", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "诸积大法：脉来细而附骨者，乃积也。寸口积在胸中；微出寸口，积在喉中；关上积在脐旁；上关上，积在心下；微下关，积在少腹；尺中，积在气冲。脉出左，积在左；脉出右，积在右；脉两出，积在中央。各以其部处之。", "tags": "诸积大法,脉来细而附骨者乃积也,寸口积在胸中,微出寸口积在喉中,关上积在脐旁,上关上积在心下,微下关积在少腹,尺中积在气冲,脉出左积在左,脉出右积在右,脉两出积在中央,各以其部处之", "formula": "", "formula_detail": "", "ni_annotation": "诸积大法脉来细而附骨者乃积也寸口积在胸中微出寸口积在喉中关上积在脐旁上关上积在心下微下关积在少腹尺中积在气冲脉出左积在左脉出右积在右脉两出积在中央各以其部处之。", "contraindication": "", "keywords": "诸积大法,脉来细而附骨者乃积也"}, {"id": 563, "source": "金匮要略", "article_number": "11-20", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "问曰：三焦气厥，何谓也？师曰：上焦受邪，心烦，胸中痞，咽中不利，舌强，口干，头昏，目疼，项强，背痛，手掌热，小便赤，大便难，此为上焦气厥也。", "tags": "三焦气厥,上焦受邪,心烦,胸中痞,咽中不利,舌强,口干,头昏,目疼,项强,背痛,手掌热,小便赤,大便难,上焦气厥", "formula": "", "formula_detail": "", "ni_annotation": "三焦气厥上焦受邪心烦胸中痞咽中不利舌强口干头昏目疼项强背痛手掌热小便赤大便难此为上焦气厥也。", "contraindication": "", "keywords": "三焦气厥,上焦受邪"}, {"id": 564, "source": "金匮要略", "article_number": "11-21", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "中焦气厥，腹胀，胁痛，口苦，小便赤，大便难，此为中焦气厥也。", "tags": "中焦气厥,腹胀,胁痛,口苦,小便赤,大便难,中焦气厥", "formula": "", "formula_detail": "", "ni_annotation": "中焦气厥腹胀胁痛口苦小便赤大便难此为中焦气厥也。", "contraindication": "", "keywords": "中焦气厥,腹胀,胁痛"}, {"id": 565, "source": "金匮要略", "article_number": "11-22", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "下焦气厥，少腹引腰痛，小便数，大便难，此为下焦气厥也。", "tags": "下焦气厥,少腹引腰痛,小便数,大便难,下焦气厥", "formula": "", "formula_detail": "", "ni_annotation": "下焦气厥少腹引腰痛小便数大便难此为下焦气厥也。", "contraindication": "", "keywords": "下焦气厥,少腹引腰痛"}, {"id": 566, "source": "金匮要略", "article_number": "12-1", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "问曰：夫饮有四，何谓也？师曰：有痰饮，有悬饮，有溢饮，有支饮。问曰：四饮何以为异？师曰：其人素盛今瘦，水走肠间，沥沥有声，谓之痰饮；饮后水流在胁下，咳唾引痛，谓之悬饮；饮水流行，归于四肢，当汗出而不汗出，身体疼重，谓之溢饮；咳逆倚息，短气不得卧，其形如肿，谓之支饮。", "tags": "['四饮分类', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "仲景将饮病分为痰饮、悬饮、溢饮、支饮四类。痰饮乃水走肠间沥沥有声，素盛今瘦；悬饮水流胁下咳唾引痛；溢饮水归四肢身体疼重；支饮咳逆倚息不得卧。四饮特征明确，辨治大法由此而立。", "contraindication": "", "keywords": "['四饮', '痰饮', '悬饮', '溢饮', '支饮']"}, {"id": 567, "source": "金匮要略", "article_number": "12-2", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "水在心，心下坚筑，短气，恶水不欲饮。水在肺，吐涎沫，欲饮水。水在脾，少气身重。水在肝，胁下支满，嚏而痛。水在肾，心下悸。", "tags": "['水饮', '五脏水']", "formula": "", "formula_detail": "", "ni_annotation": "水饮侵犯五脏各有所见。心下水则心下坚筑短气，肺则吐涎沫，脾则少气身重，肝则胁下满痛，肾则心下悸动。五脏水证各具特征。", "contraindication": "", "keywords": "['五脏水', '水气病']"}, {"id": 568, "source": "金匮要略", "article_number": "12-3", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "夫心下有留饮，其人背寒冷如掌大。留饮者，胁下痛引缺盆，咳嗽则辄已。胸中有留饮，其人短气而渴，四肢历节痛。脉沉者，有留饮。", "tags": "['留饮', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "留饮乃饮邪留而不去，心下留饮背寒冷如掌大，胁下留饮引缺盆痛，胸中留饮短气而渴。脉沉主饮邪内伏。", "contraindication": "", "keywords": "['留饮', '脉沉', '背寒冷']"}, {"id": 569, "source": "金匮要略", "article_number": "12-4", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "膈上病痰，满喘咳吐，发则寒热，背痛腰疼，目泣自出，其人振振身瞤剧，必有伏饮。", "tags": "['伏饮', '痰饮']", "formula": "", "formula_detail": "", "ni_annotation": "伏饮乃饮邪深伏，遇外邪引动而发。满喘咳吐寒热背痛，目泣自出身瞤剧，皆为饮邪被引发而上逆之候。", "contraindication": "", "keywords": "['伏饮', '外感引动']"}, {"id": 570, "source": "金匮要略", "article_number": "12-5", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "夫病人饮水多，必暴喘满。凡食少饮多，水停心下。甚者则悸，微者短气。脉双弦者寒也，皆大下后善虚。脉偏弦者饮也。", "tags": "['水停心下', '脉诊']", "formula": "", "formula_detail": "", "ni_annotation": "食少饮多则水停心下，甚则心悸微则短气。脉双弦主寒，偏弦主饮，为饮病脉诊要诀。", "contraindication": "", "keywords": "['脉偏弦', '水停心下']"}, {"id": 571, "source": "金匮要略", "article_number": "12-6", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "肺饮不弦，但苦喘短气。支饮亦喘而不能卧，加短气，其脉平也。", "tags": "['肺饮', '支饮']", "formula": "", "formula_detail": "", "ni_annotation": "肺饮与支饮皆以喘而短气为主证。肺饮脉不弦，支饮脉平，说明饮病不尽见弦脉。", "contraindication": "", "keywords": "['肺饮', '支饮']"}, {"id": 572, "source": "金匮要略", "article_number": "12-7", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "病痰饮者，当以温药和之。", "tags": "['治则', '痰饮']", "formula": "", "formula_detail": "", "ni_annotation": "八字为治痰饮总纲。饮为阴邪得阳则化，故以温药和之。温助阳化气，和则调气不伤阴，千古不易之理。", "contraindication": "", "keywords": "['温药和之', '痰饮总纲']"}, {"id": 573, "source": "金匮要略", "article_number": "12-8", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "心下有痰饮，胸胁支满，目眩，苓桂术甘汤主之。", "tags": "['痰饮', '方剂']", "formula": "苓桂术甘汤", "formula_detail": "茯苓四两 桂枝三两 白术三两 甘草二两", "ni_annotation": "心下痰饮胸胁支满目眩，脾胃阳虚饮停中焦清阳不升。苓桂术甘汤茯苓利水桂枝温阳白术健脾甘草和中，共奏温阳化饮之效，为治痰饮基础方。", "contraindication": "", "keywords": "['苓桂术甘汤', '痰饮', '目眩']"}, {"id": 574, "source": "金匮要略", "article_number": "12-9", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "夫短气有微饮，当从小便去之，苓桂术甘汤主之，肾气丸亦主之。", "tags": "['微饮', '短气']", "formula": "苓桂术甘汤/肾气丸", "formula_detail": "苓桂术甘汤或肾气丸", "ni_annotation": "短气微饮当利小便去饮。苓桂术甘汤从中焦温化宜脾阳虚，肾气丸从下焦温化宜肾阳虚，同病异治。", "contraindication": "", "keywords": "['微饮', '短气', '肾气丸']"}, {"id": 575, "source": "金匮要略", "article_number": "12-10", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "病者脉伏，其人欲自利，利反快，虽利，心下续坚满，此为留饮欲去故也，甘遂半夏汤主之。", "tags": "['留饮', '方剂']", "formula": "甘遂半夏汤", "formula_detail": "甘遂大者三枚 半夏十二枚 芍药五枚 甘草如指大一枚炙", "ni_annotation": "脉伏主饮邪内伏，自利反快为留饮有欲去之势，利后心下仍坚满说明饮邪未尽。甘遂半夏汤以甘遂峻逐水饮半夏降逆芍药敛阴甘草解毒，攻逐留饮。", "contraindication": "甘遂有毒须慎用", "keywords": "['甘遂半夏汤', '留饮', '心下坚满']"}, {"id": 576, "source": "金匮要略", "article_number": "12-11", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "脉沉而弦者，悬饮内痛。病悬饮者，十枣汤主之。", "tags": "['悬饮', '方剂']", "formula": "十枣汤", "formula_detail": "芫花熬 甘遂 大戟各等分", "ni_annotation": "脉沉而弦主饮邪内结，悬饮胁下内痛。十枣汤以芫花甘遂大戟峻逐水饮大枣护胃和中，为攻逐水饮之峻剂。", "contraindication": "十枣汤峻猛体弱者忌用", "keywords": "['十枣汤', '悬饮', '脉沉弦']"}, {"id": 577, "source": "金匮要略", "article_number": "12-12", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "病溢饮者，当发其汗，大青龙汤主之，小青龙汤亦主之。", "tags": "['溢饮', '方剂']", "formula": "大青龙汤/小青龙汤", "formula_detail": "大青龙汤：麻黄六两 桂枝二两 甘草二两 杏仁四十枚 生姜三两 大枣十枚 石膏如鸡子大；小青龙汤：麻黄三两 芍药三两 五味子半升 干姜三两 甘草三两 桂枝三两 半夏半升 细辛三两", "ni_annotation": "溢饮乃水归四肢当汗不出。大青龙汤发汗兼清郁热用于溢饮有热，小青龙汤发汗兼温化寒饮用于溢饮有寒，同病异治。", "contraindication": "", "keywords": "['溢饮', '大青龙汤', '小青龙汤']"}, {"id": 578, "source": "金匮要略", "article_number": "12-13", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "膈间支饮，其人喘满，心下痞坚，面色黧黑，其脉沉紧，得之数十日，医吐下之不愈，木防己汤主之。虚者即愈，实者三日复发，复与不愈者，宜木防己汤去石膏加茯苓芒硝汤主之。", "tags": "['支饮', '方剂']", "formula": "木防己汤", "formula_detail": "木防己三两 石膏十二枚鸡子大 桂枝二两 人参四两", "ni_annotation": "支饮在膈间喘满心下痞坚面色黧黑为饮瘀互结。木防己汤以木防己利水通痹石膏清热桂枝通阳人参益气，虚实并治。虚者饮去即愈，实者留饮当加芒硝茯苓以逐之。", "contraindication": "", "keywords": "['木防己汤', '支饮', '面色黧黑']"}, {"id": 579, "source": "金匮要略", "article_number": "12-14", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "心下有支饮，其人苦冒眩，泽泻汤主之。", "tags": "['支饮', '方剂']", "formula": "泽泻汤", "formula_detail": "泽泻五两 白术二两", "ni_annotation": "支饮在心下清阳不升浊阴上冒而眩。泽泻汤仅泽泻白术二味，泽泻利水除饮白术健脾制水，药简力专利水以治眩。", "contraindication": "", "keywords": "['泽泻汤', '支饮', '冒眩']"}, {"id": 580, "source": "金匮要略", "article_number": "12-15", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "支饮胸满者，厚朴大黄汤主之。", "tags": "['支饮', '方剂']", "formula": "厚朴大黄汤", "formula_detail": "厚朴一尺 大黄六两 枳实四枚", "ni_annotation": "支饮胸满为饮邪气滞互结于胸。厚朴大黄汤以厚朴行气大黄通腑枳实破结，三药相合行气导滞使饮邪从大便而去。", "contraindication": "", "keywords": "['厚朴大黄汤', '支饮', '胸满']"}, {"id": 581, "source": "金匮要略", "article_number": "12-16", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "支饮不得息，葶苈大枣泻肺汤主之。", "tags": "['支饮', '方剂']", "formula": "葶苈大枣泻肺汤", "formula_detail": "葶苈熬令黄色捣丸如弹子大 大枣十二枚", "ni_annotation": "支饮壅肺呼吸困难为饮邪迫肺之实证。葶苈大枣泻肺汤以葶苈子泻肺逐饮大枣和胃护正，使水饮从肺而泻肺气得宣。", "contraindication": "", "keywords": "['葶苈大枣泻肺汤', '支饮', '不得息']"}, {"id": 582, "source": "金匮要略", "article_number": "12-17", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "呕家本渴，渴者为欲解，今反不渴，心下有支饮故也，小半夏汤主之。", "tags": "['支饮', '方剂']", "formula": "小半夏汤", "formula_detail": "半夏一升 生姜半斤", "ni_annotation": "呕后当渴为饮去之兆，呕而不渴是心下仍有支饮。小半夏汤以半夏降逆化饮生姜散水止呕，为治水饮呕吐基础方。", "contraindication": "", "keywords": "['小半夏汤', '支饮', '不渴']"}, {"id": 583, "source": "金匮要略", "article_number": "12-18", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "腹满，口舌干燥，此肠间有水气，己椒苈黄丸主之。", "tags": "['痰饮', '方剂']", "formula": "己椒苈黄丸", "formula_detail": "防己 椒目 葶苈熬 大黄各一两", "ni_annotation": "肠间有水气腹满而口舌干燥为水停肠间津不上承。己椒苈黄丸以防己椒目利水葶苈子泻肺逐饮大黄通腑导下，使水饮分消津液得以上承。", "contraindication": "", "keywords": "['己椒苈黄丸', '肠间水气', '口舌干燥']"}, {"id": 584, "source": "金匮要略", "article_number": "12-19", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "卒呕吐，心下痞，膈间有水，眩悸者，小半夏加茯苓汤主之。", "tags": "['水饮', '方剂']", "formula": "小半夏加茯苓汤", "formula_detail": "半夏一升 生姜半斤 茯苓三两", "ni_annotation": "膈间有水卒然呕吐而心下痞兼眩悸。小半夏汤加茯苓于降逆止呕中增强利水之力，茯苓既可利水又可安神定悸。", "contraindication": "", "keywords": "['小半夏加茯苓汤', '眩悸']"}, {"id": 585, "source": "金匮要略", "article_number": "12-20", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "假令瘦人脐下有悸，吐涎沫而癫眩，此水也，五苓散主之。", "tags": "['水饮', '方剂']", "formula": "五苓散", "formula_detail": "泽泻一两一分 猪苓三分 茯苓三分 白术三分 桂枝二分", "ni_annotation": "脐下悸动吐涎沫而癫眩为水停下焦上扰清窍。五苓散以泽泻二苓利水白术健脾桂枝温阳化气，利水兼以温化使下焦之水从小便去。", "contraindication": "", "keywords": "['五苓散', '脐下悸', '癫眩']"}, {"id": 586, "source": "金匮要略", "article_number": "12-21", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "咳家其脉弦，为有水，十枣汤主之。", "tags": "['咳嗽', '悬饮']", "formula": "十枣汤", "formula_detail": "芫花熬 甘遂 大戟各等分", "ni_annotation": "咳而脉弦为悬饮之确据。脉弦主水饮咳嗽引痛为悬饮特征，故用十枣汤峻逐水饮。", "contraindication": "", "keywords": "['十枣汤', '咳嗽', '脉弦']"}, {"id": 587, "source": "金匮要略", "article_number": "12-22", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "夫有支饮家，咳烦胸中痛者，不卒死，至一百日或一岁，宜十枣汤。", "tags": "['支饮', '久病']", "formula": "十枣汤", "formula_detail": "芫花熬 甘遂 大戟各等分", "ni_annotation": "支饮久咳胸痛虽迁延日久仍可用十枣汤。饮邪深痼非峻剂不能攻逐，久病未必皆虚当辨证施治。", "contraindication": "", "keywords": "['支饮', '胸痛', '十枣汤']"}, {"id": 588, "source": "金匮要略", "article_number": "12-23", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "久咳数岁，其脉弱者，可治；实大数者，死。其脉虚者，必苦冒，其人本有支饮在胸中故也。治属饮家。", "tags": "['久咳', '脉诊', '预后']", "formula": "", "formula_detail": "", "ni_annotation": "久咳脉弱者正气虽虚邪气亦不盛可治，脉实大数邪盛正衰预后不良。脉虚者苦冒眩为支饮在胸中，辨治仍当从饮治。", "contraindication": "", "keywords": "['久咳', '脉弱可治']"}, {"id": 589, "source": "金匮要略", "article_number": "12-24", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "咳逆倚息不得卧，小青龙汤主之。", "tags": "['支饮', '方剂']", "formula": "小青龙汤", "formula_detail": "麻黄三两 芍药三两 五味子半升 干姜三两 甘草三两 桂枝三两 半夏半升 细辛三两", "ni_annotation": "咳逆倚息不得卧为支饮迫肺重证。小青龙汤外散风寒内化水饮，麻黄宣肺平喘干姜细辛温化寒饮五味子敛肺，表里兼治。", "contraindication": "", "keywords": "['小青龙汤', '咳逆倚息']"}, {"id": 590, "source": "金匮要略", "article_number": "12-25", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "青龙汤下已，多唾口燥，寸脉沉，尺脉微，手足厥逆，气从小腹上冲胸咽，手足痹，其面翕热如醉状，因复下流阴股，小便难，时复冒者，与茯苓桂枝五味甘草汤，治其气冲。", "tags": "['气冲', '变证', '方剂']", "formula": "桂苓五味甘草汤", "formula_detail": "茯苓四两 桂枝四两 甘草三两炙 五味子半升", "ni_annotation": "服小青龙汤后表虽解而冲气上逆气冲胸咽面热如醉手足厥逆。此虚阳上越冲气上逆，用桂苓五味甘草汤平冲降逆，桂枝平冲五味子敛气茯苓利水甘草和中。", "contraindication": "", "keywords": "['桂苓五味甘草汤', '气冲']"}, {"id": 591, "source": "金匮要略", "article_number": "12-26", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "冲气即低，而反更咳、胸满者，用桂苓五味甘草汤去桂加干姜、细辛，以治其咳满。", "tags": "['咳嗽', '胸满', '变证']", "formula": "苓甘五味姜辛汤", "formula_detail": "茯苓四两 甘草三两 干姜三两 细辛三两 五味子半升", "ni_annotation": "冲气已平咳嗽胸满突出说明饮邪仍在。去桂枝之平冲加干姜细辛温化寒饮，针对饮邪犯肺之咳嗽胸满。", "contraindication": "", "keywords": "['苓甘五味姜辛汤', '咳满']"}, {"id": 592, "source": "金匮要略", "article_number": "12-27", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "咳满即止，而更复渴、冲气复发者，以细辛、干姜为热药也。服之当遂渴，而渴反止者，为支饮也。支饮者法当冒，冒者必呕，呕者复内半夏以去其水。", "tags": "['支饮', '辨证']", "formula": "桂苓五味甘草去桂加姜辛夏汤", "formula_detail": "茯苓四两 甘草二两 细辛二两 干姜二两 五味子半升 半夏半升", "ni_annotation": "咳满止后不渴反冒眩呕吐是饮邪上犯。加半夏于前方中以增强降逆化饮之力，针对水饮犯胃之上逆。", "contraindication": "", "keywords": "['支饮', '呕冒', '加半夏']"}, {"id": 593, "source": "金匮要略", "article_number": "12-28", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "水去呕止，其人形肿者，加杏仁主之。其证应内麻黄，以其人遂痹，故不内之。若逆而内之者，必厥，所以然者，以其人血虚，麻黄发其阳故也。", "tags": "['水肿', '加减法']", "formula": "苓甘五味姜辛夏杏汤", "formula_detail": "上方加杏仁半升去皮尖", "ni_annotation": "水去呕止而形肿是肺气不宣水泛肌肤。加杏仁宣肺利气行水消肿。因有手足痹之血虚证故不用麻黄发越阳气而用较温和的杏仁代之。", "contraindication": "血虚者忌用麻黄", "keywords": "['形肿', '加杏仁', '血虚忌麻黄']"}, {"id": 594, "source": "金匮要略", "article_number": "12-29", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "若面热如醉，此为胃热上冲熏其面，加大黄以利之。", "tags": "['胃热', '加减法']", "formula": "苓甘五味姜辛夏杏大黄汤", "formula_detail": "上方再加大黄三两", "ni_annotation": "面热如醉非冲气乃胃热上熏。胃热不去饮邪难化，加大黄通腑泄热釜底抽薪使胃热从下而取面热自除。", "contraindication": "", "keywords": "['面热如醉', '胃热', '加大黄']"}, {"id": 595, "source": "金匮要略", "article_number": "12-30", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "先渴后呕，为水停心下，此属饮家，小半夏加茯苓汤主之。", "tags": "['水停心下', '方剂']", "formula": "小半夏加茯苓汤", "formula_detail": "半夏一升 生姜半斤 茯苓三两", "ni_annotation": "先渴多饮而后呕是水停心下不化。小半夏加茯苓汤降逆止呕兼以利水。", "contraindication": "", "keywords": "['小半夏加茯苓汤', '先渴后呕']"}, {"id": 596, "source": "金匮要略", "article_number": "12-31", "liujing": "痰饮咳嗽", "chapter": "痰饮咳嗽病脉证并治第十二", "original_text": "病者如热状，烦满，口干燥而渴，其脉反无热，此为阴伏，是瘀血也，当下之。", "tags": "['瘀血', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "虽烦满口燥如热证但脉反无热象此为阴伏属瘀血内停。瘀血亦可见渴但不同于热证之渴。", "contraindication": "", "keywords": "['阴伏', '瘀血']"}, {"id": 597, "source": "金匮要略", "article_number": "13-1", "liujing": "消渴小便不利淋病", "chapter": "消渴小便不利淋病脉证并治第十三", "original_text": "厥阴之为病，消渴，气上冲心，心中疼热，饥而不欲食，食即吐蛔，下之不肯止。", "tags": "['厥阴病', '消渴']", "formula": "", "formula_detail": "", "ni_annotation": "厥阴病以消渴气上冲心心中疼热为主证，寒热错杂上热下寒。消渴为热在上饥不欲食为寒在中。", "contraindication": "不可下", "keywords": "['厥阴病', '消渴']"}, {"id": 598, "source": "金匮要略", "article_number": "13-2", "liujing": "消渴小便不利淋病", "chapter": "消渴小便不利淋病脉证并治第十三", "original_text": "寸口脉浮而迟，浮即为虚，迟即为劳；虚则卫气不足，劳则荣气竭。趺阳脉浮而数，浮即为气，数即消谷而大坚；气盛则溲数，溲数即坚，坚数相搏，即为消渴。", "tags": "['消渴', '病机']", "formula": "", "formula_detail": "", "ni_annotation": "寸口脉浮迟主虚劳营卫不足，趺阳脉浮数主胃热气盛。胃热盛则消谷善饥小便频数大便坚，数者相合而为消渴。", "contraindication": "", "keywords": "['消渴', '趺阳脉', '胃热']"}, {"id": 599, "source": "金匮要略", "article_number": "13-3", "liujing": "消渴小便不利淋病", "chapter": "消渴小便不利淋病脉证并治第十三", "original_text": "男子消渴，小便反多，以饮一斗，小便一斗，肾气丸主之。", "tags": "['消渴', '方剂']", "formula": "肾气丸", "formula_detail": "干地黄八两 薯蓣四两 山茱萸四两 泽泻三两 茯苓三两 牡丹皮三两 桂枝一两 附子一两炮", "ni_annotation": "饮一斗溲一斗为下消重证属肾阳虚衰不能蒸津化气。肾气丸以六味补肾之阴少佐桂附温阳引火归元使肾阳复而气化行津液得以蒸腾上承。", "contraindication": "", "keywords": "['肾气丸', '下消', '饮一溲一']"}, {"id": 600, "source": "金匮要略", "article_number": "13-4", "liujing": "消渴小便不利淋病", "chapter": "消渴小便不利淋病脉证并治第十三", "original_text": "脉浮，小便不利，微热消渴者，宜利小便发汗，五苓散主之。", "tags": "['消渴', '方剂']", "formula": "五苓散", "formula_detail": "泽泻一两一分 猪苓三分 茯苓三分 白术三分 桂枝二分", "ni_annotation": "脉浮微热为表证小便不利为里停水消渴为水不化津。五苓散表里兼治桂枝解表泽泻二苓利水白术健脾，使水气化而津液上承。", "contraindication": "", "keywords": "['五苓散', '消渴', '小便不利']"}, {"id": 601, "source": "金匮要略", "article_number": "13-5", "liujing": "消渴小便不利淋病", "chapter": "消渴小便不利淋病脉证并治第十三", "original_text": "渴欲饮水，水入则吐者，名曰水逆，五苓散主之。", "tags": "['水逆', '方剂']", "formula": "五苓散", "formula_detail": "泽泻一两一分 猪苓三分 茯苓三分 白术三分 桂枝二分", "ni_annotation": "渴欲饮水而水入即吐为水逆证。水停中焦格拒不受故饮入即吐。五苓散化气利水水去则吐止渴除。", "contraindication": "", "keywords": "['五苓散', '水逆', '水入即吐']"}, {"id": 602, "source": "金匮要略", "article_number": "13-6", "liujing": "消渴小便不利淋病", "chapter": "消渴小便不利淋病脉证并治第十三", "original_text": "渴欲饮水不止者，文蛤散主之。", "tags": "['消渴', '方剂']", "formula": "文蛤散", "formula_detail": "文蛤五两", "ni_annotation": "渴饮不止为热伤津液，文蛤咸寒清热生津止渴。", "contraindication": "", "keywords": "['文蛤散', '渴饮不止']"}, {"id": 603, "source": "金匮要略", "article_number": "13-7", "liujing": "消渴小便不利淋病", "chapter": "消渴小便不利淋病脉证并治第十三", "original_text": "淋之为病，小便如粟状，小腹弦急，痛引脐中。", "tags": "['淋病', '病证']", "formula": "", "formula_detail": "", "ni_annotation": "淋病以小便涩痛尿中有砂石如粟小腹拘急疼痛引脐为主证，为湿热蕴结下焦煎熬尿液成砂石。", "contraindication": "", "keywords": "['淋病', '小便如粟']"}, {"id": 604, "source": "金匮要略", "article_number": "13-8", "liujing": "消渴小便不利淋病", "chapter": "消渴小便不利淋病脉证并治第十三", "original_text": "淋家不可发汗，发汗则必便血。", "tags": "['淋病', '禁忌']", "formula": "", "formula_detail": "", "ni_annotation": "淋家多阴虚内热，误汗则更伤阴动血而致尿血，此为淋家禁汗之诫。", "contraindication": "淋家不可发汗", "keywords": "['淋家', '禁汗', '便血']"}, {"id": 605, "source": "金匮要略", "article_number": "13-9", "liujing": "消渴小便不利淋病", "chapter": "消渴小便不利淋病脉证并治第十三", "original_text": "小便不利者，有水气，其人苦渴，栝蒌瞿麦丸主之。", "tags": "['小便不利', '方剂']", "formula": "栝蒌瞿麦丸", "formula_detail": "栝蒌根二两 茯苓三两 薯蓣三两 附子一枚炮 瞿麦一两", "ni_annotation": "小便不利而苦渴为下寒上燥。肾阳不足则小便不利津不上承则渴。栝蒌瞿麦丸以附子温阳栝蒌根生津瞿麦利水茯苓薯蓣健脾，寒润同施上下并治。", "contraindication": "", "keywords": "['栝蒌瞿麦丸', '下寒上燥']"}, {"id": 606, "source": "金匮要略", "article_number": "13-10", "liujing": "消渴小便不利淋病", "chapter": "消渴小便不利淋病脉证并治第十三", "original_text": "小便不利，蒲灰散主之，滑石白鱼散、茯苓戎盐汤并主之。", "tags": "['小便不利', '方剂']", "formula": "蒲灰散/滑石白鱼散/茯苓戎盐汤", "formula_detail": "蒲灰散：蒲灰七分 滑石三分；滑石白鱼散：滑石二分 乱发二分烧 白鱼二分；茯苓戎盐汤：茯苓半斤 白术二两 戎盐弹丸大一枚", "ni_annotation": "小便不利有三方：蒲灰散化瘀利窍用于瘀血夹热，滑石白鱼散消瘀利水用于血淋，茯苓戎盐汤健脾渗湿兼咸寒清热用于脾虚湿盛。", "contraindication": "", "keywords": "['蒲灰散', '滑石白鱼散', '茯苓戎盐汤']"}, {"id": 607, "source": "金匮要略", "article_number": "13-11", "liujing": "消渴小便不利淋病", "chapter": "消渴小便不利淋病脉证并治第十三", "original_text": "渴欲饮水，口干舌燥者，白虎加人参汤主之。", "tags": "['消渴', '方剂']", "formula": "白虎加人参汤", "formula_detail": "知母六两 石膏一斤碎 甘草二两 粳米六合 人参三两", "ni_annotation": "渴饮口干舌燥为肺胃热盛气津两伤。白虎汤清肺胃之热加人参益气生津，热去津生则渴止。", "contraindication": "", "keywords": "['白虎加人参汤', '消渴', '口干舌燥']"}, {"id": 608, "source": "金匮要略", "article_number": "13-12", "liujing": "消渴小便不利淋病", "chapter": "消渴小便不利淋病脉证并治第十三", "original_text": "脉浮发热，渴欲饮水，小便不利者，猪苓汤主之。", "tags": "['消渴', '方剂']", "formula": "猪苓汤", "formula_detail": "猪苓 茯苓 阿胶 滑石 泽泻各一两", "ni_annotation": "发热渴饮而小便不利为水热互结下焦伤阴。猪苓汤以二苓泽泻滑石利水清热阿胶滋阴养血，利水不伤阴滋阴不碍湿。", "contraindication": "", "keywords": "['猪苓汤', '水热互结']"}, {"id": 609, "source": "金匮要略", "article_number": "14-1", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "师曰：病有风水、有皮水、有正水、有石水、有黄汗。风水其脉自浮，外证骨节疼痛，恶风；皮水其脉亦浮，外证胕肿，按之没指，不恶风，其腹如鼓，不渴，当发其汗；正水其脉沉迟，外证自喘；石水其脉自沉，外证腹满不喘；黄汗其脉沉迟，身发热，胸满，四肢头面肿，久不愈，必致痈脓。", "tags": "['水气病', '分类']", "formula": "", "formula_detail": "", "ni_annotation": "仲景将水气病分为风水皮水正水石水黄汗五类。风水脉浮恶风骨节痛病在表；皮水肿按之没指不恶风；正水脉沉迟而喘；石水脉沉腹满不喘；黄汗身热胸满四肢肿。", "contraindication": "", "keywords": "['五水', '风水', '皮水', '正水', '石水', '黄汗']"}, {"id": 610, "source": "金匮要略", "article_number": "14-2", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "脉浮而洪，浮则为风，洪则为气，风气相搏，风强则为隐疹，身体为痒，痒为泄风，久为痂癞；气强则为水，难以俯仰。风气相击，身体洪肿，汗出乃愈。恶风则虚，此为风水；不恶风者，小便通利，上焦有寒，其口多涎，此为黄汗。", "tags": "['风水', '黄汗']", "formula": "", "formula_detail": "", "ni_annotation": "脉浮洪为风气相搏。风胜则痒为泄风气胜为水则肿。身体洪肿汗出可愈者为风水恶风属虚，不恶风小便通利口多涎者为黄汗。", "contraindication": "", "keywords": "['风水', '黄汗', '风气相搏']"}, {"id": 611, "source": "金匮要略", "article_number": "14-3", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "寸口脉沉滑者，中有水气，面目肿大，有热，名曰风水。视人之目窠上微拥，如蚕新卧起状，其颈脉动，时时咳，按其手足上，陷而不起者，风水。", "tags": "['风水', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "脉沉滑主水气面目肿大目窠微肿如蚕卧颈脉动咳喘手足按之凹陷不起皆为风水特征。", "contraindication": "", "keywords": "['风水', '目窠肿', '颈脉动']"}, {"id": 612, "source": "金匮要略", "article_number": "14-4", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "太阳病，脉浮而紧，法当骨节疼痛，反不疼，身体反重而痠，其人不渴，汗出即愈，此为风水。恶寒者，此为极虚，发汗得之。渴而不恶寒者，此为皮水。身肿而冷，状如周痹，胸中窒，不能食，反聚痛，暮躁不得眠，此为黄汗。痛在骨节，咳而喘，不渴者，此为肺胀，其状如肿，发汗即愈。然诸病此者，渴而下利，小便数者，皆不可发汗。", "tags": "['风水', '皮水', '黄汗']", "formula": "", "formula_detail": "", "ni_annotation": "分辨风水皮水黄汗肺胀要点：风水身重不渴汗出愈，皮水渴不恶寒，黄汗身冷胸窒暮躁，肺胀骨节痛咳喘。渴而下利小便数者不可发汗。", "contraindication": "渴而下利小便数者不可发汗", "keywords": "['风水', '皮水', '黄汗', '肺胀']"}, {"id": 613, "source": "金匮要略", "article_number": "14-5", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "里水者，一身面目黄肿，其脉沉，小便不利，故令病水。假如小便自利，此亡津液，故令渴也。越婢加术汤主之。", "tags": "['里水', '方剂']", "formula": "越婢加术汤", "formula_detail": "麻黄六两 石膏半斤 生姜三两 甘草二两 大枣十五枚 白术四两", "ni_annotation": "里水一身面目黄肿脉沉小便不利水无出路。越婢加术汤以越婢汤发越水气加白术健脾燥湿制水。", "contraindication": "小便自利亡津液者不宜", "keywords": "['越婢加术汤', '里水', '黄肿']"}, {"id": 614, "source": "金匮要略", "article_number": "14-6", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "趺阳脉当伏，今反紧，本自有寒，疝、瘕，腹中痛，医反下之，下之即胸满短气。趺阳脉当伏，今反数，本自有热，消谷，小便数，今反不利，此欲作水。", "tags": "['水气', '病机']", "formula": "", "formula_detail": "", "ni_annotation": "趺阳脉紧为寒误下伤阳致水饮上犯胸满短气。趺阳脉数本有热小便当数反不利是水气内停之征兆。", "contraindication": "", "keywords": "['趺阳脉', '欲作水']"}, {"id": 615, "source": "金匮要略", "article_number": "14-7", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "寸口脉浮而迟，浮脉则热，迟脉则潜，热潜相搏，名曰沉。趺阳脉浮而数，浮脉即热，数脉即止，热止相搏，名曰伏。沉伏相搏，名曰水。沉则络脉虚，伏则小便难，虚难相搏，水走皮肤，即为水矣。", "tags": "['水气', '病机']", "formula": "", "formula_detail": "", "ni_annotation": "论述水气病形成机制。沉主脉络空虚伏主小便困难，二者相合水湿不化走皮肤形成水肿。水气之根在于阳气不运。", "contraindication": "", "keywords": "['沉伏相搏', '水走皮肤']"}, {"id": 616, "source": "金匮要略", "article_number": "14-8", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "水之为病，其脉沉小，属少阴；浮者为风，无水虚胀者为气。水，发其汗即已。脉沉者宜麻黄附子汤，浮者宜杏子汤。", "tags": "['水气', '方剂']", "formula": "麻黄附子汤", "formula_detail": "麻黄三两 甘草二两 附子一枚炮", "ni_annotation": "水病脉沉小属少阴为肾阳不足水寒内盛宜麻黄附子汤温阳发汗利水。脉浮为风水在表宜杏子汤宣肺发汗。无水虚胀不可误作水治。", "contraindication": "无水虚胀不可作水治", "keywords": "['麻黄附子汤', '少阴水气']"}, {"id": 617, "source": "金匮要略", "article_number": "14-9", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "厥而皮水者，蒲灰散主之。", "tags": "['皮水', '方剂']", "formula": "蒲灰散", "formula_detail": "蒲灰七分 滑石三分", "ni_annotation": "皮水而手足厥冷为水气阻滞阳气不达四肢。蒲灰散化瘀利水通阳使水去阳通厥冷自愈。", "contraindication": "", "keywords": "['蒲灰散', '皮水', '厥冷']"}, {"id": 618, "source": "金匮要略", "article_number": "14-10", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "问曰：黄汗之为病，身体肿，发热汗出而渴，状如风水，汗沾衣，色正黄如柏汁，脉自沉，何从得之？师曰：以汗出入水中浴，水从汗孔入得之，宜芪芍桂酒汤主之。", "tags": "['黄汗', '方剂']", "formula": "黄芪芍药桂枝苦酒汤", "formula_detail": "黄芪五两 芍药三两 桂枝三两", "ni_annotation": "黄汗因汗出入水水湿从汗孔侵入营卫郁滞湿热内蒸汗出沾衣色黄如柏汁。芪芍桂酒汤以黄芪实卫固表桂枝芍药调和营卫苦酒收敛止汗，为治黄汗专方。", "contraindication": "", "keywords": "['黄芪芍药桂枝苦酒汤', '黄汗', '汗出色黄']"}, {"id": 619, "source": "金匮要略", "article_number": "14-11", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "黄汗之病，两胫自冷；假令发热，此属历节。食已汗出，又身常暮卧盗汗出者，此劳气也。若汗出已反发热者，久久其身必甲错；发热不止者，必生恶疮。若身重，汗出已辄轻者，久久必身瞤，瞤即胸中痛，又从腰以上必汗出，下无汗，腰髋弛痛，如有物在皮中状，剧者不能食，身疼重，烦躁，小便不利，此为黄汗，桂枝加黄芪汤主之。", "tags": "['黄汗', '方剂']", "formula": "桂枝加黄芪汤", "formula_detail": "桂枝三两 芍药三两 甘草二两 生姜三两 大枣十二枚 黄芪二两", "ni_annotation": "黄汗两胫自冷以别于历节发热。桂枝加黄芪汤以桂枝汤调和营卫加黄芪益气固表利水除湿，营卫通水湿去而黄汗止。", "contraindication": "", "keywords": "['桂枝加黄芪汤', '黄汗', '两胫自冷']"}, {"id": 620, "source": "金匮要略", "article_number": "14-12", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "师曰：寸口脉迟而涩，迟则为寒，涩为血不足。趺阳脉微而迟，微则为气，迟则为寒。寒气不足，则手足逆冷，手足逆冷则营卫不利，营卫不利则腹满胁鸣相逐，气转膀胱，营卫俱劳，阳气不通即身冷，阴气不通即骨疼，阳前通则恶寒，阴前通则痹不仁，阴阳相得，其气乃行，大气一转，其气乃散，实则失气，虚则遗尿，名曰气分。", "tags": "['气分', '病机']", "formula": "", "formula_detail": "", "ni_annotation": "气分乃阴阳不通营卫不调。手足逆冷腹满胁鸣身冷骨痛皆因阳气不通。阴阳相得大气一转为其治则核心。实则气滞而矢气虚则气陷而遗溺。", "contraindication": "", "keywords": "['气分', '阴阳相得', '大气一转']"}, {"id": 621, "source": "金匮要略", "article_number": "14-13", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "气分，心下坚，大如盘，边如旋杯，水饮所作，桂枝去芍药加麻辛附子汤主之。", "tags": "['气分', '方剂']", "formula": "桂枝去芍药加麻黄细辛附子汤", "formula_detail": "桂枝三两 生姜三两 甘草二两 大枣十二枚 麻黄二两 细辛二两 附子一枚炮", "ni_annotation": "心下坚如盘边如旋杯为气分水饮互结。桂枝去芍药加麻辛附子汤以桂枝汤去芍药之敛加麻黄细辛附子温阳散寒通阳化饮。", "contraindication": "", "keywords": "['桂枝去芍药加麻辛附子汤', '气分', '心下坚']"}, {"id": 622, "source": "金匮要略", "article_number": "14-14", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "心下坚，大如盘，边如旋盘，水饮所作，枳术汤主之。", "tags": "['气分', '方剂']", "formula": "枳术汤", "formula_detail": "枳实七枚 白术二两", "ni_annotation": "心下坚大如盘边如旋盘与前条边如旋杯不同此为水饮偏实。枳术汤以枳实行气消痞白术健脾制水药仅二味功专力宏。", "contraindication": "", "keywords": "['枳术汤', '心下坚', '水饮']"}, {"id": 623, "source": "金匮要略", "article_number": "14-15", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "风水，脉浮身重，汗出恶风者，防己黄芪汤主之。腹痛者加芍药。", "tags": "['风水', '方剂']", "formula": "防己黄芪汤", "formula_detail": "防己一两 甘草半两炒 白术七钱半 黄芪一两一分", "ni_annotation": "风水脉浮身重汗出恶风为表虚不固水湿内停。防己黄芪汤以防己利水黄芪益气固表白术健脾燥湿，补气与利水并行标本兼顾。", "contraindication": "", "keywords": "['防己黄芪汤', '风水', '汗出恶风']"}, {"id": 624, "source": "金匮要略", "article_number": "14-16", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "风水，恶风，一身悉肿，脉浮不渴，续自汗出，无大热者，越婢汤主之。", "tags": "['风水', '方剂']", "formula": "越婢汤", "formula_detail": "麻黄六两 石膏半斤 生姜三两 甘草二两 大枣十五枚", "ni_annotation": "风水一身悉肿脉浮自汗出无大热为水气偏盛热不重。越婢汤以麻黄宣肺发汗利水石膏清郁热姜枣草和中，发越水气从表而解。", "contraindication": "", "keywords": "['越婢汤', '风水', '一身悉肿']"}, {"id": 625, "source": "金匮要略", "article_number": "14-17", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "皮水为病，四肢肿，水气在皮肤中，四肢聂聂动者，防己茯苓汤主之。", "tags": "['皮水', '方剂']", "formula": "防己茯苓汤", "formula_detail": "防己三两 黄芪三两 桂枝三两 茯苓六两 甘草二两", "ni_annotation": "皮水四肢肿而聂聂动为水气在皮中。防己茯苓汤以防己茯苓利水黄芪益气固表桂枝通阳甘草和药，茯苓量重至六两重在渗利水湿。", "contraindication": "", "keywords": "['防己茯苓汤', '皮水', '四肢聂聂动']"}, {"id": 626, "source": "金匮要略", "article_number": "14-18", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "里水，越婢加术汤主之，甘草麻黄汤亦主之。", "tags": "['里水', '方剂']", "formula": "越婢加术汤/甘草麻黄汤", "formula_detail": "甘草麻黄汤：甘草二两 麻黄四两", "ni_annotation": "里水越婢加术汤与甘草麻黄汤同用。前者兼清热宜于有热者，后者药简力专重在发汗利水宜于无热者。", "contraindication": "", "keywords": "['里水', '甘草麻黄汤']"}, {"id": 627, "source": "金匮要略", "article_number": "14-19", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "师曰：寸口脉沉而迟，沉则为水，迟则为寒，寒水相搏。趺阳脉伏，水谷不化，脾气衰则鹜溏，胃气衰则身肿。少阳脉卑，少阴脉细，男子则小便不利，妇人则经水不通。经为血，血不利则为水，名曰血分。", "tags": "['血分', '病机']", "formula": "", "formula_detail": "", "ni_annotation": "血分证乃血行不利而化为水。经血不通则水停男子小便不利女子经水不通皆可为水肿之因。脉沉迟为寒水趺阳脉伏为脾衰。血不利则为水为著名论述。", "contraindication": "", "keywords": "['血分', '血不利则为水']"}, {"id": 628, "source": "金匮要略", "article_number": "14-20", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "问曰：病有血分水分，何也？师曰：经水前断，后病水，名曰血分，此病难治；先病水，后经水断，名曰水分，此病易治。何以故？去水，其经自下。", "tags": "['血分', '水分']", "formula": "", "formula_detail": "", "ni_annotation": "血分与水分之辨：先停经后水肿者根在血难治，先水肿后停经者根在水去水则经自通易治。", "contraindication": "", "keywords": "['血分难治', '水分易治']"}, {"id": 629, "source": "金匮要略", "article_number": "14-21", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "问曰：病者苦水，面目身体四肢皆肿，小便不利，脉之，不言水，反言胸中痛，气上冲咽，状如炙肉，当微咳喘，审如师言，其脉何类？师曰：寸口脉沉而紧，沉为水，紧为寒，沉紧相搏，结在关元，始时当微，年盛不觉，阳衰之后，营卫相干，阳损阴盛，结寒微动，肾气上冲，咽喉塞噎，胁下急痛。医以为留饮而大下之，气击不去，其病不除。复重吐之，胃家虚烦，咽燥欲饮水，小便不利，水谷不化，面目手足浮肿。又与葶苈丸下水，当时如小差，食饮过度，肿复如前，胸胁苦痛，象若奔豚，其水扬溢，则浮咳喘逆。当先攻击冲气令止，乃治咳，咳止，其喘自差。先治新病，病当在后。", "tags": "['水气', '误治']", "formula": "", "formula_detail": "", "ni_annotation": "详述水气病误治全过程。始为沉寒结于关元误下伤阳再吐伤胃又葶苈丸下水伤正使冲气上逆如奔豚。治当先平冲气次治咳喘先新病后旧疾。", "contraindication": "", "keywords": "['误治', '冲气', '奔豚']"}, {"id": 630, "source": "金匮要略", "article_number": "14-22", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "肝水者，其腹大，不能自转侧，胁下腹痛，时时津液微生，小便续通。", "tags": "['五脏水', '肝水']", "formula": "", "formula_detail": "", "ni_annotation": "肝水以腹大不能转侧胁下腹痛为主证。肝失疏泄水气内停气机阻滞。", "contraindication": "", "keywords": "['肝水', '腹大']"}, {"id": 631, "source": "金匮要略", "article_number": "14-23", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "心水者，其身重而少气，不得卧，烦而躁，其人阴肿。", "tags": "['五脏水', '心水']", "formula": "", "formula_detail": "", "ni_annotation": "心水以身重少气不得卧烦躁阴肿为主证。心阳不振身重水气凌心烦躁不得卧。", "contraindication": "", "keywords": "['心水', '不得卧']"}, {"id": 632, "source": "金匮要略", "article_number": "14-24", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "脾水者，其腹大，四肢苦重，津液不生，但苦少气，小便难。", "tags": "['五脏水', '脾水']", "formula": "", "formula_detail": "", "ni_annotation": "脾水以腹大四肢重少气小便难为主证。脾虚不运水湿内停四肢为脾所主故重。", "contraindication": "", "keywords": "['脾水', '四肢苦重']"}, {"id": 633, "source": "金匮要略", "article_number": "14-25", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "肺水者，其身肿，小便难，时时鸭溏。", "tags": "['五脏水', '肺水']", "formula": "", "formula_detail": "", "ni_annotation": "肺水以全身浮肿小便难大便鸭溏为主证。肺失宣降水道不通水溢肌肤而肿。", "contraindication": "", "keywords": "['肺水', '身肿', '鸭溏']"}, {"id": 634, "source": "金匮要略", "article_number": "14-26", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "肾水者，其腹大，脐肿腰痛，不得溺，阴下湿如牛鼻上汗，其足逆冷，面反瘦。", "tags": "['五脏水', '肾水']", "formula": "", "formula_detail": "", "ni_annotation": "肾水以腹大脐肿腰痛不得溺阴下湿足冷面瘦为主证。肾阳虚衰不能化气行水故小便不通而水肿。", "contraindication": "", "keywords": "['肾水', '脐肿', '不得溺']"}, {"id": 635, "source": "金匮要略", "article_number": "14-27", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "师曰：诸有水者，腰以下肿，当利小便；腰以上肿，当发汗乃愈。", "tags": "['水气', '治则']", "formula": "", "formula_detail": "", "ni_annotation": "治水肿大法：腰以下肿当利小便水在下焦，腰以上肿当发汗水在上焦。因势利导就近给邪以出路。", "contraindication": "", "keywords": "['利小便', '发汗', '因势利导']"}, {"id": 636, "source": "金匮要略", "article_number": "14-28", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "师曰：寸口脉沉而紧，沉为水，紧为寒，沉紧相搏，水寒相逐，即为水矣。", "tags": "['水气', '病机']", "formula": "", "formula_detail": "", "ni_annotation": "脉沉主水脉紧主寒沉紧相合为水寒相结之证。", "contraindication": "", "keywords": "['沉紧', '水寒相结']"}, {"id": 637, "source": "金匮要略", "article_number": "14-29", "liujing": "水气病", "chapter": "水气病脉证并治第十四", "original_text": "师曰：发汗后，身肿不退者，当利小便。", "tags": "['水气', '治则']", "formula": "", "formula_detail": "", "ni_annotation": "发汗后肿不退说明水不在表已入里，治当转为利小便。", "contraindication": "", "keywords": "['发汗后', '利小便']"}, {"id": 638, "source": "金匮要略", "article_number": "15-1", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "寸口脉浮而缓，浮则为风，缓则为痹。痹非中风，四肢苦烦，脾色必黄，瘀热以行。", "tags": "['黄疸', '病机']", "formula": "", "formula_detail": "", "ni_annotation": "脉浮缓非中风乃湿热痹郁于脾。脾主黄湿热内蕴瘀热熏蒸而发黄。瘀热以行为黄疸病机总纲。", "contraindication": "", "keywords": "['瘀热以行', '脾色必黄']"}, {"id": 639, "source": "金匮要略", "article_number": "15-2", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "趺阳脉紧而数，数则为热，热则消谷，紧则为寒，食即为满。尺脉浮为伤肾，趺阳脉紧为伤脾。风寒相搏，食谷即眩，谷气不消，胃中苦浊，浊气下流，小便不通，阴被其寒，热流膀胱，身体尽黄，名曰谷疸。", "tags": "['谷疸', '病机']", "formula": "", "formula_detail": "", "ni_annotation": "谷疸乃饮食不节湿热内蕴脾胃。趺阳脉紧数主脾胃寒热不调。谷气不消浊气下流膀胱受热小便不通湿热熏蒸而身黄。", "contraindication": "", "keywords": "['谷疸', '食谷即眩']"}, {"id": 640, "source": "金匮要略", "article_number": "15-3", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "额上黑，微汗出，手足中热，薄暮即发，膀胱急，小便自利，名曰女劳疸。腹如水状，不治。", "tags": "['女劳疸', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "女劳疸因房劳伤肾肾虚而额黑手足心热薄暮发作。小便自利区别于其他黄疸。腹如水状为肾败水泛预后不良。", "contraindication": "", "keywords": "['女劳疸', '额上黑']"}, {"id": 641, "source": "金匮要略", "article_number": "15-4", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "心中懊憹而热，不能食，时欲吐，名曰酒疸。", "tags": "['酒疸', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "酒疸因嗜酒伤胃湿热内蕴心中懊憹烦热不能食时欲吐。", "contraindication": "", "keywords": "['酒疸', '心中懊憹']"}, {"id": 642, "source": "金匮要略", "article_number": "15-5", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "阳明病，脉迟者，食难用饱，饱则发烦、头眩，小便必难，此欲作谷疸。虽下之，腹满如故，所以然者，脉迟故也。", "tags": "['谷疸', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "脉迟为寒脾胃虚寒不能消谷食后发烦头眩小便难为谷疸将成。寒证不可下。", "contraindication": "脉迟者不可下", "keywords": "['谷疸', '脉迟']"}, {"id": 643, "source": "金匮要略", "article_number": "15-6", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "夫病酒黄疸，必小便不利，其候心中热，足下热，是其证也。", "tags": "['酒疸', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "酒疸以小便不利心中热足下热为主证。湿热下注故足热湿热内郁故小便不利。", "contraindication": "", "keywords": "['酒黄疸', '心中热', '足下热']"}, {"id": 644, "source": "金匮要略", "article_number": "15-7", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "酒黄疸者，或无热，靖言了了，腹满欲吐，鼻燥。其脉浮者先吐之，沉弦者先下之。", "tags": "['酒疸', '治法']", "formula": "", "formula_detail": "", "ni_annotation": "酒疸脉浮者病近于上当先吐，脉沉弦者病近于下当先下。因势利导。", "contraindication": "", "keywords": "['酒疸', '脉浮先吐', '沉弦先下']"}, {"id": 645, "source": "金匮要略", "article_number": "15-8", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "酒疸，心中热欲吐者，吐之愈。", "tags": "['酒疸', '治法']", "formula": "", "formula_detail": "", "ni_annotation": "酒疸心中热而欲吐是邪有上越之势，顺应病势吐之可愈。", "contraindication": "", "keywords": "['酒疸', '吐之愈']"}, {"id": 646, "source": "金匮要略", "article_number": "15-9", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "酒疸下之，久久为黑疸，目青面黑，心中如噉蒜齑状，大便正黑，皮肤爪之不仁，其脉浮弱，虽黑微黄，故知之。", "tags": "['黑疸', '误治']", "formula": "", "formula_detail": "", "ni_annotation": "酒疸误下伤正变为黑疸。目青面黑心中灼热如食蒜大便色黑皮肤麻木为瘀热深入血分。脉浮弱为正虚邪恋。", "contraindication": "酒疸不可下", "keywords": "['黑疸', '目青面黑']"}, {"id": 647, "source": "金匮要略", "article_number": "15-10", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "师曰：病黄疸，发热烦喘，胸满口燥者，以病发时火劫其汗，两热相得。然黄家所得，从湿得之。一身尽发热而黄，肚热，热在里，当下之。", "tags": "['黄疸', '治法']", "formula": "", "formula_detail": "", "ni_annotation": "黄疸总由湿热而得。发热烦喘胸满为热盛当用下法。肚热为热在里可下。火劫发汗则两热相搏加重病情。", "contraindication": "不可火劫发汗", "keywords": "['黄疸', '从湿得之']"}, {"id": 648, "source": "金匮要略", "article_number": "15-11", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "脉沉，渴欲饮水，小便不利者，皆发黄。", "tags": "['黄疸', '病机']", "formula": "", "formula_detail": "", "ni_annotation": "脉沉主里渴饮水而小便不利湿热内蕴无出路郁蒸而发黄。", "contraindication": "", "keywords": "['脉沉', '小便不利']"}, {"id": 649, "source": "金匮要略", "article_number": "15-12", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "腹满，舌痿黄，躁不得睡，属黄家。", "tags": "['黄疸', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "舌痿而黄为黄疸特征性舌象，腹满躁不得眠属黄疸湿热内盛。", "contraindication": "", "keywords": "['舌痿黄', '属黄家']"}, {"id": 650, "source": "金匮要略", "article_number": "15-13", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "黄疸之病，当以十八日为期，治之十日以上瘥，反剧为难治。", "tags": "['黄疸', '预后']", "formula": "", "formula_detail": "", "ni_annotation": "黄疸以十八日为一病程周期。十日以上渐愈为顺反而加重为难治。", "contraindication": "", "keywords": "['十八日为期', '预后']"}, {"id": 651, "source": "金匮要略", "article_number": "15-14", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "疸而渴者，其疸难治；疸而不渴者，其疸可治。发于阴部，其人必呕；发于阳部，其人振寒而发热也。", "tags": "['黄疸', '预后']", "formula": "", "formula_detail": "", "ni_annotation": "黄疸而渴为湿热伤津正虚邪盛难治，不渴者津液未伤可治。发于阴部则呕吐发于阳部则寒热。", "contraindication": "", "keywords": "['疸而渴难治']"}, {"id": 652, "source": "金匮要略", "article_number": "15-15", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "谷疸之为病，寒热不食，食即头眩，心胸不安，久久发黄为谷疸，茵陈蒿汤主之。", "tags": "['谷疸', '方剂']", "formula": "茵陈蒿汤", "formula_detail": "茵陈蒿六两 栀子十四枚 大黄二两", "ni_annotation": "谷疸因湿热瘀结中焦食即头眩心胸不安。茵陈蒿汤以茵陈清热利湿退黄栀子清三焦之热大黄通腑泄热，使湿热从二便分消为治阳黄第一方。", "contraindication": "", "keywords": "['茵陈蒿汤', '谷疸']"}, {"id": 653, "source": "金匮要略", "article_number": "15-16", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "黄家日晡所发热，而反恶寒，此为女劳得之。膀胱急，少腹满，身尽黄，额上黑，足下热，因作黑疸。其腹胀如水状，大便必黑，时溏，此女劳之病，非水也。腹满者难治。硝石矾石散主之。", "tags": "['女劳疸', '黑疸', '方剂']", "formula": "硝石矾石散", "formula_detail": "硝石 矾石烧等分", "ni_annotation": "女劳疸日晡发热恶寒额黑足热大便黑为肾虚瘀热内结之黑疸。硝石矾石散以硝石消瘀矾石燥湿清热为治女劳疸黑疸专方。腹胀如水者难治。", "contraindication": "", "keywords": "['硝石矾石散', '女劳疸', '黑疸']"}, {"id": 654, "source": "金匮要略", "article_number": "15-17", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "酒黄疸，心中懊憹或热痛，栀子大黄汤主之。", "tags": "['酒疸', '方剂']", "formula": "栀子大黄汤", "formula_detail": "栀子十四枚 大黄一两 枳实五枚 豉一升", "ni_annotation": "酒疸心中懊憹热痛为酒毒湿热蕴结。栀子大黄汤以栀子豉汤清宣郁热加大黄枳实通腑泄热。", "contraindication": "", "keywords": "['栀子大黄汤', '酒疸']"}, {"id": 655, "source": "金匮要略", "article_number": "15-18", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "诸病黄家，但利其小便。假令脉浮，当以汗解之，宜桂枝加黄芪汤主之。", "tags": "['黄疸', '治法']", "formula": "桂枝加黄芪汤", "formula_detail": "桂枝三两 芍药三两 甘草二两 生姜三两 大枣十二枚 黄芪二两", "ni_annotation": "治黄大法以利小便为主使湿热从小便去。脉浮者为表证当汗解宜桂枝加黄芪汤调和营卫兼益气利湿退黄。", "contraindication": "", "keywords": "['利小便', '桂枝加黄芪汤']"}, {"id": 656, "source": "金匮要略", "article_number": "15-19", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "黄疸病，茵陈五苓散主之。", "tags": "['黄疸', '方剂']", "formula": "茵陈五苓散", "formula_detail": "茵陈蒿末十分 五苓散五分", "ni_annotation": "黄疸湿重于热小便不利宜茵陈五苓散。以五苓散利水渗湿茵陈蒿清利湿热退黄合用湿去黄退。", "contraindication": "", "keywords": "['茵陈五苓散', '湿重于热']"}, {"id": 657, "source": "金匮要略", "article_number": "15-20", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "黄疸腹满，小便不利而赤，自汗出，此为表和里实，当下之，宜大黄硝石汤。", "tags": "['黄疸', '方剂']", "formula": "大黄硝石汤", "formula_detail": "大黄 黄柏 硝石各四两 栀子十五枚", "ni_annotation": "黄疸腹满小便赤涩自汗出为表和里实热盛。大黄硝石汤以大黄通腑黄柏栀子清热硝石消瘀，清热通腑消瘀退黄。", "contraindication": "", "keywords": "['大黄硝石汤', '表和里实']"}, {"id": 658, "source": "金匮要略", "article_number": "15-21", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "黄疸病，小便色不变，欲自利，腹满而喘，不可除热，热除必哕。哕者，小半夏汤主之。", "tags": "['黄疸', '禁忌']", "formula": "小半夏汤", "formula_detail": "半夏一升 生姜半斤", "ni_annotation": "黄疸小便色不变欲自利为寒湿黄疸不可清热。误清热则伤胃致哕，若已致哕用小半夏汤温胃降逆止哕。", "contraindication": "小便色不变者不可除热", "keywords": "['小半夏汤', '不可除热']"}, {"id": 659, "source": "金匮要略", "article_number": "15-22", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "诸黄，腹痛而呕者，宜小柴胡汤。", "tags": "['黄疸', '方剂']", "formula": "小柴胡汤", "formula_detail": "柴胡半斤 黄芩三两 人参三两 半夏半升 甘草三两 生姜三两 大枣十二枚", "ni_annotation": "黄疸而腹痛呕吐为少阳枢机不利湿热蕴结。小柴胡汤疏利少阳和解表里。", "contraindication": "", "keywords": "['小柴胡汤', '腹痛而呕']"}, {"id": 660, "source": "金匮要略", "article_number": "15-23", "liujing": "黄疸病", "chapter": "黄疸病脉证并治第十五", "original_text": "男子黄，小便自利，当与虚劳小建中汤。", "tags": "['黄疸', '虚证']", "formula": "小建中汤", "formula_detail": "桂枝三两 甘草三两 大枣十二枚 芍药六两 生姜三两 胶饴一升", "ni_annotation": "男子黄而小便自利非湿热发黄乃脾虚血弱之虚黄。小建中汤温中补虚建中焦以资化源虚黄自退。", "contraindication": "", "keywords": "['小建中汤', '虚黄']"}, {"id": 661, "source": "金匮要略", "article_number": "16-1", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "寸口脉动而弱，动即为惊，弱则为悸。", "tags": "['惊悸', '脉诊']", "formula": "", "formula_detail": "", "ni_annotation": "脉动主惊为暴受外惊气乱动脉，脉弱主悸为心血不足神失所养。惊多因外悸多因内。", "contraindication": "", "keywords": "['动脉', '弱脉', '惊悸']"}, {"id": 662, "source": "金匮要略", "article_number": "16-2", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "师曰：尺脉浮，目睛晕黄，衄未止。晕黄去，目睛慧了，知衄今止。", "tags": "['衄血', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "尺脉浮而目睛晕黄为内热未清血热妄行故衄血未止。晕黄去目睛清亮为热退血宁知衄血将止。", "contraindication": "", "keywords": "['尺脉浮', '目睛晕黄']"}, {"id": 663, "source": "金匮要略", "article_number": "16-3", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "又曰：从春至夏衄者太阳，从秋至冬衄者阳明。", "tags": "['衄血', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "衄血按季节辨经络：春夏衄属太阳表热秋冬衄属阳明里热。", "contraindication": "", "keywords": "['太阳衄', '阳明衄']"}, {"id": 664, "source": "金匮要略", "article_number": "16-4", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "衄家不可发汗，汗出必额上陷，脉紧急，直视不能眴，不得眠。", "tags": "['衄血', '禁忌']", "formula": "", "formula_detail": "", "ni_annotation": "衄家阴血已伤误汗则更伤阴血。额上陷为精血亏竭脉紧急为阴伤阳亢直视不能转睛为肝血枯涸。", "contraindication": "衄家不可发汗", "keywords": "['衄家', '禁汗']"}, {"id": 665, "source": "金匮要略", "article_number": "16-5", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "病人面无血色，无寒热。脉沉弦者，衄；浮弱，手按之绝者，下血；烦咳者，必吐血。", "tags": "['血证', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "面无血色为失血之貌。脉沉弦者衄血在上浮弱按之绝者下血在下烦咳者为咳血。", "contraindication": "", "keywords": "['面无血色', '脉沉弦衄']"}, {"id": 666, "source": "金匮要略", "article_number": "16-6", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "夫吐血，咳逆上气，其脉数而有热，不得卧者，死。", "tags": "['吐血', '预后']", "formula": "", "formula_detail": "", "ni_annotation": "吐血而咳逆上气脉数身热不得卧为血脱气逆真阴欲竭之危候预后不良。", "contraindication": "", "keywords": "['吐血', '不得卧']"}, {"id": 667, "source": "金匮要略", "article_number": "16-7", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "夫酒客咳者，必致吐血，此因极饮过度所致也。", "tags": "['吐血', '病因']", "formula": "", "formula_detail": "", "ni_annotation": "嗜酒过度湿热内蕴伤肺肺络受损则咳嗽吐血。", "contraindication": "", "keywords": "['酒客', '吐血']"}, {"id": 668, "source": "金匮要略", "article_number": "16-8", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "寸口脉弦而大，弦则为减，大则为芤，减则为寒，芤则为虚，寒虚相击，此名曰革，妇人则半产漏下，男子则亡血失精。", "tags": "['血证', '脉诊']", "formula": "", "formula_detail": "", "ni_annotation": "脉弦大而芤为革脉主精血大亏。妇人见此脉多流产漏下男子则亡血失精。", "contraindication": "", "keywords": "['革脉', '亡血', '失精']"}, {"id": 669, "source": "金匮要略", "article_number": "16-9", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "亡血不可发其表，汗出即寒栗而振。", "tags": "['血证', '禁忌']", "formula": "", "formula_detail": "", "ni_annotation": "失血后阴血已亏再发汗则阳随汗泄导致寒栗而振之亡阳危候。", "contraindication": "亡血不可发其表", "keywords": "['亡血', '禁汗']"}, {"id": 670, "source": "金匮要略", "article_number": "16-10", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "病人胸满，唇痿舌青，口燥，但欲漱水不欲咽，无寒热，脉微大来迟，腹不满，其人言我满，为有瘀血。", "tags": "['瘀血', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "唇痿舌青口燥漱水不欲咽为瘀血内停之特征。腹虽不胀而自觉满脉微大来迟皆瘀血阻滞气机之象。", "contraindication": "", "keywords": "['瘀血', '唇痿舌青', '漱水不欲咽']"}, {"id": 671, "source": "金匮要略", "article_number": "16-11", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "病者如热状，烦满，口干燥而渴，其脉反无热，此为阴伏，是瘀血也，当下之。", "tags": "['瘀血', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "烦满口渴似热证但脉无热象此为阴伏之瘀血证。瘀血内阻气机不利治当攻下。", "contraindication": "", "keywords": "['阴伏', '瘀血']"}, {"id": 672, "source": "金匮要略", "article_number": "16-12", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "火邪者，桂枝去芍药加蜀漆牡蛎龙骨救逆汤主之。", "tags": "['惊悸', '方剂']", "formula": "桂枝去芍药加蜀漆牡蛎龙骨救逆汤", "formula_detail": "桂枝三两 甘草二两 生姜三两 大枣十二枚 牡蛎五两 龙骨四两 蜀漆三两", "ni_annotation": "火劫亡阳心神浮越而惊狂。桂枝去芍药加蜀漆牡蛎龙骨救逆汤去芍药之阴柔加龙牡镇惊安神蜀漆祛痰泄热。", "contraindication": "", "keywords": "['救逆汤', '火邪']"}, {"id": 673, "source": "金匮要略", "article_number": "16-13", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "心下悸者，半夏麻黄丸主之。", "tags": "['惊悸', '方剂']", "formula": "半夏麻黄丸", "formula_detail": "半夏 麻黄等分", "ni_annotation": "水饮内停水气凌心而心下悸动。半夏麻黄丸以半夏蠲饮降逆麻黄宣通阳气。", "contraindication": "", "keywords": "['半夏麻黄丸', '心下悸']"}, {"id": 674, "source": "金匮要略", "article_number": "16-14", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "吐血不止者，柏叶汤主之。", "tags": "['吐血', '方剂']", "formula": "柏叶汤", "formula_detail": "柏叶 干姜各三两 艾三把 马通汁一升", "ni_annotation": "吐血不止为中焦虚寒血不归经。柏叶汤以干姜艾叶温中止血柏叶清热止血马通汁降逆止血寒温并用。", "contraindication": "", "keywords": "['柏叶汤', '吐血不止']"}, {"id": 675, "source": "金匮要略", "article_number": "16-15", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "下血，先便后血，此远血也，黄土汤主之。", "tags": "['下血', '方剂']", "formula": "黄土汤", "formula_detail": "甘草 干地黄 白术 附子炮 阿胶 黄芩各三两 灶中黄土半斤", "ni_annotation": "先便后血为远血病在中焦脾胃属虚寒不摄。黄土汤以灶心黄土温中止血为君配白术附子温阳健脾阿胶地黄养血止血黄芩清热反佐。", "contraindication": "", "keywords": "['黄土汤', '远血', '先便后血']"}, {"id": 676, "source": "金匮要略", "article_number": "16-16", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "下血，先血后便，此近血也，赤小豆当归散主之。", "tags": "['下血', '方剂']", "formula": "赤小豆当归散", "formula_detail": "赤小豆三升浸令芽出曝干 当归三两", "ni_annotation": "先血后便为近血病在直肠或肛门属湿热瘀滞。赤小豆当归散以赤小豆清热利湿排脓当归活血养血。", "contraindication": "", "keywords": "['赤小豆当归散', '近血']"}, {"id": 677, "source": "金匮要略", "article_number": "16-17", "liujing": "血证", "chapter": "惊悸吐衄下血胸满瘀血病脉证并治第十六", "original_text": "心气不足，吐血、衄血，泻心汤主之。", "tags": "['吐血', '衄血', '方剂']", "formula": "泻心汤", "formula_detail": "大黄二两 黄连一两 黄芩一两", "ni_annotation": "心气不足而吐血衄血非气虚不摄乃心火亢盛迫血妄行。泻心汤以大黄黄连黄芩苦寒直折心火火降血自止。", "contraindication": "", "keywords": "['泻心汤', '吐血衄血']"}, {"id": 678, "source": "金匮要略", "article_number": "17-1", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "夫呕家有痈脓，不可治呕，脓尽自愈。", "tags": "['呕吐', '治则']", "formula": "", "formula_detail": "", "ni_annotation": "呕因痈脓而作病本在脓不可见呕止呕。脓尽则呕自止此为治病求本之法。", "contraindication": "呕家有痈脓不可治呕", "keywords": "['痈脓', '不可治呕']"}, {"id": 679, "source": "金匮要略", "article_number": "17-2", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "先呕却渴者，此为欲解。先渴却呕者，为水停心下，此属饮家。呕家本渴，今反不渴者，以心下有支饮故也，此属支饮。", "tags": "['呕吐', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "呕后渴为饮去津伤病将解，先渴后呕为水停心下不化，呕而不渴为支饮内停。以渴与不渴辨饮之有无。", "contraindication": "", "keywords": "['先呕却渴', '先渴却呕']"}, {"id": 680, "source": "金匮要略", "article_number": "17-3", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "问曰：病人脉数，数为热，当消谷引食，而反吐者，何也？师曰：以发其汗，令阳气微，膈气虚，脉乃数，数为客热，不能消谷，胃中虚冷故也。脉弦者虚也，胃气无余，朝食暮吐，变为胃反。寒在于上，医反下之，今脉反弦，故名曰虚。", "tags": "['呕吐', '胃反']", "formula": "", "formula_detail": "", "ni_annotation": "脉数本当消谷反呕吐乃误汗伤阳胃中虚冷客热上浮之假热证。朝食暮吐为胃反特征胃气虚寒不能腐熟水谷。", "contraindication": "", "keywords": "['胃反', '朝食暮吐', '胃中虚冷']"}, {"id": 681, "source": "金匮要略", "article_number": "17-4", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "寸口脉微而数，微则无气，无气则营虚，营虚则血不足，血不足则胸中冷。", "tags": "['呕吐', '病机']", "formula": "", "formula_detail": "", "ni_annotation": "脉微主气虚气虚则营血不足胸中失于温煦而冷。胸中冷则胃亦寒胃寒则呕吐。", "contraindication": "", "keywords": "['胸中冷', '营虚']"}, {"id": 682, "source": "金匮要略", "article_number": "17-5", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "趺阳脉浮而涩，浮则为虚，涩则伤脾，脾伤则不磨，朝食暮吐，暮食朝吐，宿谷不化，名曰胃反。脉紧而涩，其病难治。", "tags": "['胃反', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "趺阳脉浮涩主脾胃虚损不能腐熟水谷朝食暮吐宿谷不化。脉紧涩者为虚实夹杂难治。", "contraindication": "", "keywords": "['胃反', '趺阳脉浮涩']"}, {"id": 683, "source": "金匮要略", "article_number": "17-6", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "病人欲吐者，不可下之。", "tags": "['呕吐', '禁忌']", "formula": "", "formula_detail": "", "ni_annotation": "欲吐者病势在上有上越之机当顺势吐之。误下则逆其病势邪陷内传。", "contraindication": "欲吐者不可下", "keywords": "['欲吐', '禁下']"}, {"id": 684, "source": "金匮要略", "article_number": "17-7", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "哕而腹满，视其前后，知何部不利，利之即愈。", "tags": "['哕', '治则']", "formula": "", "formula_detail": "", "ni_annotation": "哕而腹满为实邪内阻当察其小便或大便何部不畅通利之则哕止。审证求因因势利导。", "contraindication": "", "keywords": "['哕', '视其前后']"}, {"id": 685, "source": "金匮要略", "article_number": "17-8", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "呕而胸满者，茱萸汤主之。", "tags": "['呕吐', '方剂']", "formula": "吴茱萸汤", "formula_detail": "吴茱萸一升 人参三两 生姜六两 大枣十二枚", "ni_annotation": "呕而胸满为肝胃虚寒浊阴上逆。吴茱萸汤以吴茱萸温肝暖胃降逆生姜散寒止呕人参大枣益气和中。", "contraindication": "", "keywords": "['吴茱萸汤', '呕而胸满']"}, {"id": 686, "source": "金匮要略", "article_number": "17-9", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "干呕，吐涎沫，头痛者，茱萸汤主之。", "tags": "['呕吐', '方剂']", "formula": "吴茱萸汤", "formula_detail": "吴茱萸一升 人参三两 生姜六两 大枣十二枚", "ni_annotation": "干呕吐涎沫而头痛巅顶痛为主为肝寒犯胃浊阴上逆。吴茱萸汤温肝暖胃降逆止呕为厥阴头痛要方。", "contraindication": "", "keywords": "['吴茱萸汤', '干呕', '头痛']"}, {"id": 687, "source": "金匮要略", "article_number": "17-10", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "呕而肠鸣，心下痞者，半夏泻心汤主之。", "tags": "['呕吐', '方剂']", "formula": "半夏泻心汤", "formula_detail": "半夏半升 黄芩三两 干姜三两 人参三两 黄连一两 大枣十二枚 甘草三两", "ni_annotation": "呕而肠鸣心下痞为寒热错杂中焦痞塞。半夏泻心汤半夏降逆芩连清热干姜温中参枣草益气和中辛开苦降。", "contraindication": "", "keywords": "['半夏泻心汤', '呕而肠鸣']"}, {"id": 688, "source": "金匮要略", "article_number": "17-11", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "干呕而利者，黄芩加半夏生姜汤主之。", "tags": "['呕吐', '下利', '方剂']", "formula": "黄芩加半夏生姜汤", "formula_detail": "黄芩三两 甘草二两 芍药二两 大枣十二枚 半夏半升 生姜三两", "ni_annotation": "干呕与下利并见为热邪内扰肠胃升降失调。黄芩汤清热止利加半夏生姜降逆止呕。", "contraindication": "", "keywords": "['黄芩加半夏生姜汤', '干呕而利']"}, {"id": 689, "source": "金匮要略", "article_number": "17-12", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "诸呕吐，谷不得下者，小半夏汤主之。", "tags": "['呕吐', '方剂']", "formula": "小半夏汤", "formula_detail": "半夏一升 生姜半斤", "ni_annotation": "呕吐食不得下为水饮停胃胃气上逆。小半夏汤以半夏化饮降逆生姜散水止呕为治一切水饮呕吐基础方。", "contraindication": "", "keywords": "['小半夏汤', '谷不得下']"}, {"id": 690, "source": "金匮要略", "article_number": "17-13", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "呕吐而病在膈上，后思水者，解，急与之。思水者，猪苓散主之。", "tags": "['呕吐', '方剂']", "formula": "猪苓散", "formula_detail": "猪苓 茯苓 白术各等分", "ni_annotation": "呕吐后思水为病解之兆可少少与之。若渴而饮水仍吐为水饮未去猪苓散健脾利水。", "contraindication": "", "keywords": "['猪苓散', '思水']"}, {"id": 691, "source": "金匮要略", "article_number": "17-14", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "呕而脉弱，小便复利，身有微热，见厥者，难治。四逆汤主之。", "tags": "['呕吐', '方剂']", "formula": "四逆汤", "formula_detail": "附子一枚生用 干姜一两半 甘草二两炙", "ni_annotation": "呕吐脉弱小便利身热而厥为阳气外脱阴寒内盛之危候。四逆汤以附子干姜回阳救逆甘草和中。", "contraindication": "", "keywords": "['四逆汤', '呕而脉弱']"}, {"id": 692, "source": "金匮要略", "article_number": "17-15", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "呕而发热者，小柴胡汤主之。", "tags": "['呕吐', '方剂']", "formula": "小柴胡汤", "formula_detail": "柴胡半斤 黄芩三两 人参三两 半夏半升 甘草三两 生姜三两 大枣十二枚", "ni_annotation": "呕而发热为少阳不解邪在半表半里。小柴胡汤疏解少阳为热呕要方。", "contraindication": "", "keywords": "['小柴胡汤', '呕而发热']"}, {"id": 693, "source": "金匮要略", "article_number": "17-16", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "胃反呕吐者，大半夏汤主之。", "tags": "['胃反', '方剂']", "formula": "大半夏汤", "formula_detail": "半夏二升 人参三两 白蜜一升", "ni_annotation": "胃反呕吐为脾胃虚寒不能腐熟水谷朝食暮吐。大半夏汤以半夏降逆止呕人参益气补中白蜜甘润和中补虚降逆并行。", "contraindication": "", "keywords": "['大半夏汤', '胃反']"}, {"id": 694, "source": "金匮要略", "article_number": "17-17", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "食已即吐者，大黄甘草汤主之。", "tags": "['呕吐', '方剂']", "formula": "大黄甘草汤", "formula_detail": "大黄四两 甘草一两", "ni_annotation": "食已即吐与胃反朝食暮吐不同此为胃热上冲胃气不降。大黄甘草汤以大黄通腑泄热降胃气甘草和中缓急。", "contraindication": "", "keywords": "['大黄甘草汤', '食已即吐']"}, {"id": 695, "source": "金匮要略", "article_number": "17-18", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "胃反，吐而渴欲饮水者，茯苓泽泻汤主之。", "tags": "['胃反', '方剂']", "formula": "茯苓泽泻汤", "formula_detail": "茯苓半斤 泽泻四两 甘草二两 桂枝二两 白术三两 生姜四两", "ni_annotation": "胃反吐后渴饮为饮停不化津不上承。茯苓泽泻汤以茯苓泽泻利水化饮白术健脾桂枝通阳生姜降逆。", "contraindication": "", "keywords": "['茯苓泽泻汤', '胃反']"}, {"id": 696, "source": "金匮要略", "article_number": "17-19", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "吐后，渴欲得水而贪饮者，文蛤汤主之。兼主微风，脉紧，头痛。", "tags": "['呕吐', '方剂']", "formula": "文蛤汤", "formula_detail": "文蛤五两 麻黄 甘草 生姜各三两 石膏五两 杏仁五十枚 大枣十二枚", "ni_annotation": "吐后热渴贪饮兼表证脉紧头痛为里热兼表。文蛤汤以文蛤清热止渴麻杏石甘解表清里。", "contraindication": "", "keywords": "['文蛤汤', '吐后渴']"}, {"id": 697, "source": "金匮要略", "article_number": "17-20", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "干呕，吐逆，吐涎沫，半夏干姜散主之。", "tags": "['呕吐', '方剂']", "formula": "半夏干姜散", "formula_detail": "半夏 干姜等分", "ni_annotation": "干呕吐逆吐涎沫为胃寒停饮寒气上逆。半夏干姜散以半夏降逆化饮干姜温胃散寒。", "contraindication": "", "keywords": "['半夏干姜散', '吐涎沫']"}, {"id": 698, "source": "金匮要略", "article_number": "17-21", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "病人胸中似喘不喘，似呕不呕，似哕不哕，彻心中愦愦然无奈者，生姜半夏汤主之。", "tags": "['呕吐', '方剂']", "formula": "生姜半夏汤", "formula_detail": "半夏半升 生姜汁一升", "ni_annotation": "胸中烦乱无奈似喘非喘似呕非呕为寒饮搏结胸中气机不畅。生姜半夏汤重用生姜汁散寒逐饮半夏降逆。", "contraindication": "", "keywords": "['生姜半夏汤', '无奈']"}, {"id": 699, "source": "金匮要略", "article_number": "17-22", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "干呕，哕，若手足厥者，橘皮汤主之。", "tags": "['呕吐', '哕', '方剂']", "formula": "橘皮汤", "formula_detail": "橘皮四两 生姜半斤", "ni_annotation": "干呕哕而手足厥为胃寒气逆阳气不达四末。橘皮汤以橘皮理气和胃降逆生姜散寒止呕。", "contraindication": "", "keywords": "['橘皮汤', '干呕哕']"}, {"id": 700, "source": "金匮要略", "article_number": "17-23", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "哕逆者，橘皮竹茹汤主之。", "tags": "['哕', '方剂']", "formula": "橘皮竹茹汤", "formula_detail": "橘皮二升 竹茹二升 大枣三十枚 生姜半斤 甘草五两 人参一两", "ni_annotation": "哕逆为胃虚有热气逆不降。橘皮竹茹汤以橘皮理气竹茹清热生姜降逆人参大枣甘草益气和中，补虚清热降逆并用。", "contraindication": "", "keywords": "['橘皮竹茹汤', '哕逆']"}, {"id": 701, "source": "金匮要略", "article_number": "17-24", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "夫六腑气绝于外者，手足寒，上气，脚缩；五脏气绝于内者，利不禁，下甚者，手足不仁。", "tags": "['下利', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "六腑气绝于外则手足寒脚缩，五脏气绝于内则下利不止甚则手足不仁。此为脏腑气绝之辨证要点。", "contraindication": "", "keywords": "['脏腑气绝', '下利不禁']"}, {"id": 702, "source": "金匮要略", "article_number": "17-25", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利，脉沉弦者，下重；脉大者，为未止；脉微弱数者，为欲自止，虽发热不死。", "tags": "['下利', '脉诊']", "formula": "", "formula_detail": "", "ni_annotation": "下利脉沉弦主里急后重，脉大主邪盛利不止，脉微弱数主邪衰正复利将自止虽发热不死。", "contraindication": "", "keywords": "['下利', '脉沉弦', '下重']"}, {"id": 703, "source": "金匮要略", "article_number": "17-26", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利，手足厥冷，无脉者，灸之。不温，若脉不还，反微喘者，死。少阴负趺阳者，为顺也。", "tags": "['下利', '预后']", "formula": "", "formula_detail": "", "ni_annotation": "下利手足厥冷无脉为阳气将绝急当灸之回阳。脉不还反微喘为阳气外脱死候。少阴脉弱于趺阳为胃气尚存顺证。", "contraindication": "", "keywords": "['下利', '手足厥冷', '灸之']"}, {"id": 704, "source": "金匮要略", "article_number": "17-27", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利，有微热而渴，脉弱者，今自愈。", "tags": "['下利', '预后']", "formula": "", "formula_detail": "", "ni_annotation": "下利微热口渴脉弱为阳气来复邪气衰退之象，自愈之兆。", "contraindication": "", "keywords": "['下利', '微热而渴']"}, {"id": 705, "source": "金匮要略", "article_number": "17-28", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利脉数，有微热汗出，今自愈。设脉紧，为未解。", "tags": "['下利', '预后']", "formula": "", "formula_detail": "", "ni_annotation": "下利脉数微热汗出为阳复邪退自愈。若脉紧为寒邪未去病未解。", "contraindication": "", "keywords": "['下利', '脉紧未解']"}, {"id": 706, "source": "金匮要略", "article_number": "17-29", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利，脉数而渴者，今自愈。设不差，必清脓血，以有热故也。", "tags": "['下利', '预后']", "formula": "", "formula_detail": "", "ni_annotation": "下利脉数而渴为阳复当自愈。若利不止必便脓血为热邪内郁化为脓血。", "contraindication": "", "keywords": "['下利', '清脓血']"}, {"id": 707, "source": "金匮要略", "article_number": "17-30", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利，脉反弦，发热身汗者，自愈。", "tags": "['下利', '预后']", "formula": "", "formula_detail": "", "ni_annotation": "下利脉弦发热汗出为正胜邪退表里俱和自愈之象。", "contraindication": "", "keywords": "['下利', '脉弦', '自愈']"}, {"id": 708, "source": "金匮要略", "article_number": "17-31", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利气者，当利其小便。", "tags": "['下利', '治则']", "formula": "", "formula_detail": "", "ni_annotation": "下利而矢气频作为水湿气滞当利小便以实大便湿去利止。", "contraindication": "", "keywords": "['下利气', '利小便']"}, {"id": 709, "source": "金匮要略", "article_number": "17-32", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利，寸脉反浮数，尺中自涩者，必清脓血。", "tags": "['下利', '脉诊']", "formula": "", "formula_detail": "", "ni_annotation": "寸脉浮数为热尺脉涩为血伤热迫血行故必便脓血。", "contraindication": "", "keywords": "['必清脓血', '寸浮数尺涩']"}, {"id": 710, "source": "金匮要略", "article_number": "17-33", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利清谷，不可攻其表，汗出必胀满。", "tags": "['下利', '禁忌']", "formula": "", "formula_detail": "", "ni_annotation": "下利清谷为里虚寒盛不可误汗。误汗则更伤阳气阴寒内盛而胀满。", "contraindication": "下利清谷不可发汗", "keywords": "['下利清谷', '禁汗']"}, {"id": 711, "source": "金匮要略", "article_number": "17-34", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利，脉沉而迟，其人面少赤，身有微热，下利清谷者，必郁冒汗出而解，病人必微厥。所以然者，其面戴阳，下虚故也。", "tags": "['下利', '辨证']", "formula": "", "formula_detail": "", "ni_annotation": "下利清谷脉沉迟面赤微热为戴阳证下虚上浮。郁冒汗出为阳回正胜邪退之机微厥为阳复未充。", "contraindication": "", "keywords": "['戴阳', '下利清谷']"}, {"id": 712, "source": "金匮要略", "article_number": "17-35", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利后脉绝，手足厥冷，晬时脉还，手足温者生，脉不还者死。", "tags": "['下利', '预后']", "formula": "", "formula_detail": "", "ni_annotation": "下利后脉绝肢冷为阳气衰竭。一昼夜后脉还肢温为阳回来复可生，脉不还为阳气已绝死候。", "contraindication": "", "keywords": "['晬时脉还', '脉绝']"}, {"id": 713, "source": "金匮要略", "article_number": "17-36", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利，腹胀满，身体疼痛者，先温其里，乃攻其表。温里宜四逆汤，攻表宜桂枝汤。", "tags": "['下利', '方剂']", "formula": "四逆汤/桂枝汤", "formula_detail": "四逆汤：附子一枚生用 干姜一两半 甘草二两炙；桂枝汤：桂枝三两 芍药三两 甘草二两 生姜三两 大枣十二枚", "ni_annotation": "下利腹胀满为里虚寒身疼痛为表不解。表里同病当先温里后攻表。四逆汤温里回阳桂枝汤解肌和表。", "contraindication": "", "keywords": "['四逆汤', '桂枝汤', '先温里后攻表']"}, {"id": 714, "source": "金匮要略", "article_number": "17-37", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利，三部脉皆平，按之心下坚者，急下之，宜大承气汤。", "tags": "['下利', '方剂']", "formula": "大承气汤", "formula_detail": "大黄四两酒洗 厚朴半斤 枳实五枚 芒硝三合", "ni_annotation": "下利而脉平心下坚为实热内结热结旁流。大承气汤通腑泄热攻逐实积即通因通用之法。", "contraindication": "", "keywords": "['大承气汤', '心下坚']"}, {"id": 715, "source": "金匮要略", "article_number": "17-38", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利，脉迟而滑者，实也。利未欲止，急下之，宜大承气汤。", "tags": "['下利', '方剂']", "formula": "大承气汤", "formula_detail": "大黄四两酒洗 厚朴半斤 枳实五枚 芒硝三合", "ni_annotation": "下利脉迟而滑为里有实邪阻滞虽利不止当急下之以祛实邪。此为通因通用之法。", "contraindication": "", "keywords": "['大承气汤', '脉迟而滑']"}, {"id": 716, "source": "金匮要略", "article_number": "17-39", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利，脉反滑者，当有所去，下乃愈，宜大承气汤。", "tags": "['下利', '方剂']", "formula": "大承气汤", "formula_detail": "大黄四两酒洗 厚朴半斤 枳实五枚 芒硝三合", "ni_annotation": "下利脉滑为内有实邪不去下之即愈当用大承气汤攻下。", "contraindication": "", "keywords": "['大承气汤', '脉滑']"}, {"id": 717, "source": "金匮要略", "article_number": "17-40", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利已差，至其年月日时复发者，以病不尽故也，当下之，宜大承气汤。", "tags": "['下利', '方剂']", "formula": "大承气汤", "formula_detail": "大黄四两酒洗 厚朴半斤 枳实五枚 芒硝三合", "ni_annotation": "下利已愈而定时复发为宿邪未尽当用大承气汤攻下以去病根。", "contraindication": "", "keywords": "['大承气汤', '定时复发']"}, {"id": 718, "source": "金匮要略", "article_number": "17-41", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利谵语者，有燥屎也，小承气汤主之。", "tags": "['下利', '方剂']", "formula": "小承气汤", "formula_detail": "大黄四两 厚朴二两炙 枳实大者三枚", "ni_annotation": "下利而谵语为肠中有燥屎热结旁流通因通用用小承气汤通便泄热。", "contraindication": "", "keywords": "['小承气汤', '谵语', '有燥屎']"}, {"id": 719, "source": "金匮要略", "article_number": "17-42", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利，便脓血者，桃花汤主之。", "tags": "['下利', '方剂']", "formula": "桃花汤", "formula_detail": "赤石脂一斤一半全用一半筛末 干姜一两 粳米一升", "ni_annotation": "下利便脓血为脾肾虚寒滑脱不固。桃花汤以赤石脂涩肠固脱干姜温中粳米养胃，为虚寒下利便脓血之要方。", "contraindication": "", "keywords": "['桃花汤', '便脓血']"}, {"id": 720, "source": "金匮要略", "article_number": "17-43", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "热利下重者，白头翁汤主之。", "tags": "['下利', '方剂']", "formula": "白头翁汤", "formula_detail": "白头翁二两 黄连 黄柏 秦皮各三两", "ni_annotation": "热利下重为湿热疫毒壅滞大肠。白头翁汤以白头翁清热解毒凉血为君黄连黄柏清热燥湿秦皮收涩止痢，为治热利下重要方。", "contraindication": "", "keywords": "['白头翁汤', '热利下重']"}, {"id": 721, "source": "金匮要略", "article_number": "17-44", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利后更烦，按之心下濡者，为虚烦也，栀子豉汤主之。", "tags": "['下利', '方剂']", "formula": "栀子豉汤", "formula_detail": "栀子十四枚 香豉四合绵裹", "ni_annotation": "下利后更烦而心下濡软不硬为余热扰胸非实邪内结。栀子豉汤以栀子清热除烦香豉宣透郁热二药清宣胸膈之郁热。", "contraindication": "", "keywords": "['栀子豉汤', '虚烦']"}, {"id": 722, "source": "金匮要略", "article_number": "17-45", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利清谷，里寒外热，汗出而厥者，通脉四逆汤主之。", "tags": "['下利', '方剂']", "formula": "通脉四逆汤", "formula_detail": "附子大者一枚生用 干姜三两强者可四两 甘草二两炙", "ni_annotation": "下利清谷里寒外热汗出而厥为阴盛格阳虚阳外脱之危候。通脉四逆汤重用姜附回阳救逆破阴通脉。", "contraindication": "", "keywords": "['通脉四逆汤', '里寒外热']"}, {"id": 723, "source": "金匮要略", "article_number": "17-46", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利肺痛，紫参汤主之。", "tags": "['下利', '方剂']", "formula": "紫参汤", "formula_detail": "紫参半斤 甘草三两", "ni_annotation": "下利而肺痛为热毒壅滞肺与大肠相表里同病。紫参汤以紫参清热解毒甘草和中解毒。", "contraindication": "", "keywords": "['紫参汤', '下利肺痛']"}, {"id": 724, "source": "金匮要略", "article_number": "17-47", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "气利，诃黎勒散主之。", "tags": "['下利', '方剂']", "formula": "诃黎勒散", "formula_detail": "诃黎勒十枚煨", "ni_annotation": "气利为矢气与稀便并下水气不固。诃黎勒散单味诃子涩肠止利兼以利气。", "contraindication": "", "keywords": "['诃黎勒散', '气利']"}, {"id": 725, "source": "金匮要略", "article_number": "17-48", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "下利后，身疼痛，清便自调者，急当救表，宜桂枝汤。", "tags": "['下利', '方剂']", "formula": "桂枝汤", "formula_detail": "桂枝三两 芍药三两 甘草二两 生姜三两 大枣十二枚", "ni_annotation": "下利后身疼痛而大便已调为里和表未解急当解表。桂枝汤解肌和营卫。", "contraindication": "", "keywords": "['桂枝汤', '下利后']"}, {"id": 726, "source": "金匮要略", "article_number": "17-49", "liujing": "呕吐哕下利", "chapter": "呕吐哕下利病脉证并治第十七", "original_text": "附方：《外台》黄芩汤 治干呕下利。", "tags": "['附方', '方剂']", "formula": "《外台》黄芩汤", "formula_detail": "黄芩 人参 干姜各三两 桂枝一两 大枣十二枚 半夏半升", "ni_annotation": "干呕下利为中焦虚寒兼有热。黄芩汤清上温下人参益气干姜温中半夏降逆止呕。", "contraindication": "", "keywords": "['黄芩汤', '干呕下利']"}, {"id": 727, "source": "金匮要略", "article_number": "18-1", "liujing": "疮痈肠痈浸淫", "chapter": "疮痈肠痈浸淫病脉证并治第十八", "original_text": "诸浮数脉，应当发热，而反洒淅恶寒，若有痛处，当发其痈。", "tags": "发热,恶寒,痈肿", "formula": "", "formula_detail": "", "ni_annotation": "浮数脉本应发热，反而恶寒，且有固定痛处，说明将要发痈。这是痈肿初起的脉证。一般发热伴恶寒是表证，但有固定痛处就不是单纯的表证了。", "contraindication": "", "keywords": "痈肿,初起,浮数脉,发热恶寒"}, {"id": 728, "source": "金匮要略", "article_number": "18-2", "liujing": "疮痈肠痈浸淫", "chapter": "疮痈肠痈浸淫病脉证并治第十八", "original_text": "师曰：诸痈肿，欲知有脓无脓，以手掩肿上，热者为有脓，不热者为无脓。", "tags": "痈肿,脓,辨脓法", "formula": "", "formula_detail": "", "ni_annotation": "用手指按在肿处，感觉发热的就是已经化脓了，不热的就是还没有化脓。这是辨脓的经典方法。", "contraindication": "", "keywords": "辨脓,痈肿,化脓"}, {"id": 729, "source": "金匮要略", "article_number": "18-3", "liujing": "疮痈肠痈浸淫", "chapter": "疮痈肠痈浸淫病脉证并治第十八", "original_text": "肠痈之为病，其身甲错，腹皮急，按之濡，如肿状，腹无积聚，身无热，脉数，此为肠内有痈脓，薏苡附子败酱散主之。", "tags": "肠痈,腹皮急,身甲错,腹无积聚,脉数", "formula": "薏苡附子败酱散", "formula_detail": "薏苡仁十分、附子二分、败酱五分", "ni_annotation": "慢性阑尾炎用薏苡附子败酱散。病人皮肤干燥粗糙（肌肤甲错），肚子胀急但按上去是软的，没有硬块，身体不发热但脉数，这是肠内有痈脓已成。薏苡仁排脓利湿，附子温阳散寒，败酱草清热解毒排脓。三味合用，排脓而不伤阳。", "contraindication": "", "keywords": "肠痈,阑尾炎,慢性,薏苡附子败酱散"}, {"id": 730, "source": "金匮要略", "article_number": "18-4", "liujing": "疮痈肠痈浸淫", "chapter": "疮痈肠痈浸淫病脉证并治第十八", "original_text": "肠痈者，少腹肿痞，按之即痛如淋，小便自调，时时发热，自汗出，复恶寒。其脉迟紧者，脓未成，可下之，当有血。脉洪数者，脓已成，不可下也。大黄牡丹汤主之。", "tags": "肠痈,少腹肿痞,按之痛,发热,自汗,恶寒", "formula": "大黄牡丹汤", "formula_detail": "大黄四两、牡丹一两、桃仁五十个、瓜子半升、芒硝三合", "ni_annotation": "急性阑尾炎用大黄牡丹汤。右下腹痛，按下去像淋病一样痛，但小便正常（排除了膀胱问题），时时发热自汗又怕冷。脉迟紧说明脓还没成，可以攻下，大便会带血。脉洪数说明脓已形成，就不可以攻下。大黄牡丹汤是急性阑尾炎专方，大黄泻热通便，牡丹皮凉血活血，桃仁活血化瘀，冬瓜子排脓，芒硝软坚泻下。这是急性期、脓未成时的方子。", "contraindication": "脉洪数者，脓已成，不可下也", "keywords": "急性阑尾炎,大黄牡丹汤,少腹痛,右下腹痛"}, {"id": 731, "source": "金匮要略", "article_number": "18-5", "liujing": "疮痈肠痈浸淫", "chapter": "疮痈肠痈浸淫病脉证并治第十八", "original_text": "排脓散方：枳实十六枚、芍药六分、桔梗二分。上三味，杵为散，取鸡子黄一枚，以药散与鸡子黄相等，揉和令相得，饮和服之，日一服。", "tags": "排脓,散剂", "formula": "排脓散", "formula_detail": "枳实十六枚、芍药六分、桔梗二分", "ni_annotation": "排脓散用枳实、芍药、桔梗三味药。枳实破气消积，芍药和血止痛，桔梗排脓。用等量的鸡蛋黄调和服用。鸡蛋黄能润燥养血，配合排脓药使用。", "contraindication": "", "keywords": "排脓散,疮痈,化脓"}, {"id": 732, "source": "金匮要略", "article_number": "18-6", "liujing": "疮痈肠痈浸淫", "chapter": "疮痈肠痈浸淫病脉证并治第十八", "original_text": "排脓汤方：甘草二两、桔梗三两、生姜一两、大枣十枚。上四味，以水三升，煮取一升，温服五合，日再服。", "tags": "排脓,汤剂", "formula": "排脓汤", "formula_detail": "甘草二两、桔梗三两、生姜一两、大枣十枚", "ni_annotation": "排脓汤以甘草、桔梗为主，甘草解毒，桔梗排脓，生姜大枣调和营卫。比排脓散更温和，适合体质较弱的人。", "contraindication": "", "keywords": "排脓汤,疮痈,化脓"}, {"id": 733, "source": "金匮要略", "article_number": "18-7", "liujing": "疮痈肠痈浸淫", "chapter": "疮痈肠痈浸淫病脉证并治第十八", "original_text": "病金疮，王不留行散主之。", "tags": "金疮,刀伤", "formula": "王不留行散", "formula_detail": "王不留行十分、蒴藋细叶十分、桑东南根白皮十分、甘草十八分、川椒三分(除目及闭口者去汗)、黄芩二分、干姜二分、厚朴二分、芍药二分", "ni_annotation": "金疮就是刀伤、金属器械造成的创伤。王不留行散是外伤专方。王不留行活血消肿，蒴藋细叶清热解毒，桑白皮消肿，甘草解毒，川椒止痛，黄芩清热，干姜温中，厚朴行气，芍药止痛。这是一个全面的创伤方，既活血又清热又止痛。", "contraindication": "", "keywords": "金疮,刀伤,外伤,王不留行散"}, {"id": 734, "source": "金匮要略", "article_number": "18-8", "liujing": "疮痈肠痈浸淫", "chapter": "疮痈肠痈浸淫病脉证并治第十八", "original_text": "浸淫疮，黄连粉主之。", "tags": "浸淫疮,湿疹", "formula": "黄连粉", "formula_detail": "黄连（研粉外敷）", "ni_annotation": "浸淫疮就是湿疹一类蔓延不愈的皮肤病，从一处蔓延到其他地方。黄连粉外敷，黄连清热燥湿解毒，对湿疹有特效。浸淫疮的特点是流黄水、瘙痒、蔓延。", "contraindication": "", "keywords": "浸淫疮,湿疹,黄连粉"}, {"id": 735, "source": "金匮要略", "article_number": "18-9", "liujing": "疮痈肠痈浸淫", "chapter": "疮痈肠痈浸淫病脉证并治第十八", "original_text": "问曰：寸口脉浮微而涩，然当亡血，若汗出。设不汗者，其身必疮。所以然者，寸口脉浮微而涩，浮则为虚，涩则为血伤，血伤则无血，无血则亡血，亡血则无以养其经，经虚则风邪乘虚而入，客于肌肤，变而为疮。", "tags": "疮,亡血,脉浮微涩", "formula": "", "formula_detail": "", "ni_annotation": "寸口脉浮微而涩，浮主气虚，涩主血伤。气血两虚，如果不流汗的话，身体就会长疮。因为血虚不能濡养经脉，风邪乘虚而入皮肤，就变成了疮。这说明疮痈的根源在于气血亏虚。", "contraindication": "", "keywords": "疮疡,气血虚,脉微涩"}, {"id": 736, "source": "金匮要略", "article_number": "18-10", "liujing": "疮痈肠痈浸淫", "chapter": "疮痈肠痈浸淫病脉证并治第十八", "original_text": "浸淫疮，从口流向四肢者，可治；从四肢流来入口者，不可治。", "tags": "浸淫疮,预后", "formula": "", "formula_detail": "", "ni_annotation": "浸淫疮（湿疹）如果从身体中心向四肢蔓延，说明病在外、在表，可以治好。如果从四肢向身体中心（口）蔓延，说明病邪向内发展，比较难治。这是判断疮病预后的重要原则。", "contraindication": "", "keywords": "浸淫疮,预后,湿疹蔓延"}, {"id": 737, "source": "金匮要略", "article_number": "19-1", "liujing": "趺蹶手指臂肿转筋阴狐疝蛔虫", "chapter": "趺蹶手指臂肿转筋阴狐疝蛔虫病脉证治第十九", "original_text": "师曰：病趺蹶，其人但能前，不能却，刺腨入二寸，此太阳经伤也。", "tags": "趺蹶,足背活动障碍,针刺", "formula": "", "formula_detail": "", "ni_annotation": "趺蹶就是脚背不能正常活动，只能往前走不能往后退。这是太阳经受伤造成的。治疗方法是针刺小腿肚（腨部）两寸深。这是一个针灸治疗的条文。", "contraindication": "", "keywords": "趺蹶,脚背活动障碍,针刺,太阳经"}, {"id": 738, "source": "金匮要略", "article_number": "19-2", "liujing": "趺蹶手指臂肿转筋阴狐疝蛔虫", "chapter": "趺蹶手指臂肿转筋阴狐疝蛔虫病脉证治第十九", "original_text": "病人常以手指臂肿动，此人身体瞤瞤者，藜芦甘草汤主之。", "tags": "手指臂肿,肌肉跳动", "formula": "藜芦甘草汤", "formula_detail": "藜芦、甘草", "ni_annotation": "病人的手指和手臂经常肿并且抖动，身体肌肉也阵阵跳动。这是风痰阻络的表现。藜芦吐风痰，甘草和中。藜芦和甘草本为十八反之一，合用是取其相反相激之效以催吐痰涎。", "contraindication": "体虚者慎用", "keywords": "手指臂肿,肌肉跳动,藜芦甘草汤,风痰"}, {"id": 739, "source": "金匮要略", "article_number": "19-3", "liujing": "趺蹶手指臂肿转筋阴狐疝蛔虫", "chapter": "趺蹶手指臂肿转筋阴狐疝蛔虫病脉证治第十九", "original_text": "转筋之为病，其人臂脚直，脉上下行，微弦，转筋入腹者，鸡屎白散主之。", "tags": "转筋,腓肠肌痉挛,臂脚直", "formula": "鸡屎白散", "formula_detail": "鸡屎白（研末，水服方寸匕）", "ni_annotation": "转筋就是腓肠肌痉挛，小腿抽筋。病人的手臂和脚都伸直不能弯曲，脉象微弦。如果抽筋一直延伸到腹部，用鸡屎白散治疗。鸡屎白能利水泄热、舒缓筋脉，治湿热引起的转筋。", "contraindication": "", "keywords": "转筋,抽筋,腓肠肌痉挛,鸡屎白散"}, {"id": 740, "source": "金匮要略", "article_number": "19-4", "liujing": "趺蹶手指臂肿转筋阴狐疝蛔虫", "chapter": "趺蹶手指臂肿转筋阴狐疝蛔虫病脉证治第十九", "original_text": "阴狐疝气者，偏有小大，时时上下，蜘蛛散主之。", "tags": "阴狐疝,腹股沟疝,偏有小大,时时上下", "formula": "蜘蛛散", "formula_detail": "蜘蛛十四枚(熬焦)、桂枝半两", "ni_annotation": "阴狐疝就是腹股沟疝气，阴囊偏大偏小，疝气时上时下，像狐狸出没一样时隐时现。蜘蛛散用蜘蛛破结通利，桂枝温通阳气。蜘蛛要炒焦用。", "contraindication": "", "keywords": "阴狐疝,腹股沟疝,疝气,蜘蛛散"}, {"id": 741, "source": "金匮要略", "article_number": "19-5", "liujing": "趺蹶手指臂肿转筋阴狐疝蛔虫", "chapter": "趺蹶手指臂肿转筋阴狐疝蛔虫病脉证治第十九", "original_text": "问曰：病腹痛有虫，其脉何以别之？师曰：腹中痛，其脉当沉，若弦，反洪大，故有蛔虫。", "tags": "蛔虫,腹痛,脉洪大", "formula": "", "formula_detail": "", "ni_annotation": "肚子痛如果有虫，脉象怎么辨别呢？腹痛的脉一般应该是沉脉或弦脉，如果反而出现洪大脉，说明有蛔虫。因为蛔虫扰动使得脉象洪大。这是辨蛔虫腹痛的要点。", "contraindication": "", "keywords": "蛔虫,腹痛,辨脉"}, {"id": 742, "source": "金匮要略", "article_number": "19-6", "liujing": "趺蹶手指臂肿转筋阴狐疝蛔虫", "chapter": "趺蹶手指臂肿转筋阴狐疝蛔虫病脉证治第十九", "original_text": "蛔虫之为病，令人吐涎，心痛发作有时，毒药不止，甘草粉蜜汤主之。", "tags": "蛔虫,吐涎,心痛", "formula": "甘草粉蜜汤", "formula_detail": "甘草二两、粉一两、蜜四两", "ni_annotation": "蛔虫病让人不断吐口水，心口痛一阵一阵地发作，用一般的杀虫药也止不住，用甘草粉蜜汤。甘草和中，粉（铅粉或米粉）杀虫，蜂蜜润肠安虫。这个方子是先安虫再用杀虫药的方法。", "contraindication": "", "keywords": "蛔虫,吐涎,心痛,甘草粉蜜汤"}, {"id": 743, "source": "金匮要略", "article_number": "19-7", "liujing": "趺蹶手指臂肿转筋阴狐疝蛔虫", "chapter": "趺蹶手指臂肿转筋阴狐疝蛔虫病脉证治第十九", "original_text": "蛔厥者，乌梅丸主之。", "tags": "蛔厥,蛔虫", "formula": "乌梅丸", "formula_detail": "乌梅三百枚、细辛六两、干姜十两、黄连十六两、当归四两、附子六两(炮去皮)、蜀椒四两(出汗)、桂枝六两(去皮)、人参六两、黄柏六两", "ni_annotation": "蛔厥就是蛔虫引起的厥逆证，相当于胆道蛔虫症。病人烦躁不安、呕吐蛔虫、四肢厥冷。乌梅丸是蛔虫病的专方，也是厥阴病的主方。乌梅酸能安蛔，黄连黄连苦能下蛔，细辛干姜蜀椒辛能伏蛔，这就是\"酸苦辛\"之法。另外用人参当归补气血，附子桂枝温阳。方子寒热并用、攻补兼施，是经方中非常精妙的方子。", "contraindication": "", "keywords": "蛔厥,胆道蛔虫,乌梅丸,厥阴"}, {"id": 744, "source": "金匮要略", "article_number": "19-8", "liujing": "趺蹶手指臂肿转筋阴狐疝蛔虫", "chapter": "趺蹶手指臂肿转筋阴狐疝蛔虫病脉证治第十九", "original_text": "乌梅丸方：乌梅三百枚，以水五升，煮取一升，去滓，纳大黄末三两，再煮令一升半，去滓，以苦酒五升、蜜一升，和令相得，置铜器中，微火煎令可丸，丸如梧桐子大。先食饮服十丸，日三服，稍加至二十丸。禁生冷滑臭等食。", "tags": "乌梅丸,制法,服法", "formula": "乌梅丸（制法）", "formula_detail": "乌梅三百枚、细辛六两、干姜十两、黄连十六两、当归四两、附子六两(炮去皮)、蜀椒四两(出汗)、桂枝六两(去皮)、人参六两、黄柏六两。上十味，异捣筛，合治之，以苦酒渍乌梅一宿，去核，蒸之五斗米下，饭熟捣成泥，和药令相得，内臼中，与蜜杵二千下，丸如梧桐子大。", "ni_annotation": "乌梅丸的详细制法。乌梅用醋泡一晚，去核后放在米饭上蒸，蒸好后捣成泥。其他药分别捣碎过筛，和乌梅泥、蜂蜜一起捣两千下做成丸药。空腹服用，从每次十丸开始，逐渐加到二十丸。忌生冷滑臭的食物。", "contraindication": "禁生冷滑臭等食", "keywords": "乌梅丸,制法,服法"}, {"id": 745, "source": "金匮要略", "article_number": "20-1", "liujing": "妇人妊娠", "chapter": "妇人妊娠病脉证并治第二十", "original_text": "师曰：妇人得平脉，阴脉小弱，其人渴，不能食，无寒热，名妊娠，桂枝汤主之。于法六十日当有此证，设有医治逆者，却一月加吐下者，则绝之。", "tags": "妊娠,诊断,恶阻,渴不能食", "formula": "桂枝汤", "formula_detail": "桂枝三两(去皮)、芍药三两、甘草二两(炙)、生姜三两(切)、大枣十二枚(擘)", "ni_annotation": "妇女脉象平和，但阴脉（尺脉）显得小而弱，口渴不能吃东西，不寒不热，这就是妊娠反应（恶阻）。用桂枝汤调和营卫。按规律怀孕六十天左右应该出现这个症状。如果医生错误地用了催吐或泻下的方法，那就不能再这样治了，要改用其他方法（绝之）。", "contraindication": "设有医治逆者，却一月加吐下者，则绝之", "keywords": "妊娠诊断,恶阻,桂枝汤"}, {"id": 746, "source": "金匮要略", "article_number": "20-2", "liujing": "妇人妊娠", "chapter": "妇人妊娠病脉证并治第二十", "original_text": "妇人宿有癥病，经断未及三月，而得漏下不止，胎动在脐上者，为癥痼害。妊娠六月动者，前三月经水利时，胎也。下血者，后断三月，衃也。所以血不止者，其癥不去故也。当下其癥，桂枝茯苓丸主之。", "tags": "癥病,下血,胎动,子宫肌瘤", "formula": "桂枝茯苓丸", "formula_detail": "桂枝、茯苓、牡丹(去心)、桃仁(去皮尖熬)、芍药各等分", "ni_annotation": "这是妇科最重要的条文之一。妇人本来就有癥病（子宫肌瘤），停经不到三个月就开始漏下不止，这是癥病造成的，不是正常胎动。怎么区分？如果怀孕六个月才有胎动，前面三个月月经正常，这是正常怀孕。如果三个月停经后一直出血，那是瘀血（衃）造成的。出血不止是因为癥病没去掉。用桂枝茯苓丸治疗。桂枝茯苓丸是子宫肌瘤的经典方，桂枝温通血脉，茯苓利水渗湿，丹皮桃仁活血化瘀，芍药和血。五味等分做成蜜丸，从小量开始服。这个方子既可以治子宫肌瘤，在怀孕期使用也很安全，因为它是丸剂，作用缓和。", "contraindication": "孕妇慎用，但癥病下血者可用丸剂缓图", "keywords": "子宫肌瘤,癥病,桂枝茯苓丸,妊娠下血"}, {"id": 747, "source": "金匮要略", "article_number": "20-3", "liujing": "妇人妊娠", "chapter": "妇人妊娠病脉证并治第二十", "original_text": "师曰：妇人有漏下者，有半产后因续下血都不绝者，有妊娠下血者。假令妊娠腹中痛，为胞阻，胶艾汤主之。", "tags": "漏下,下血,腹中痛,胞阻", "formula": "芎归胶艾汤", "formula_detail": "川芎二两、阿胶二两、甘草二两、艾叶三两、当归三两、芍药四两、干地黄四两", "ni_annotation": "妇人有三种下血：一是月经期漏下不止，二是小产后持续出血，三是妊娠期出血。如果是妊娠期出血并且肚子痛，这叫胞阻（冲任不固），用胶艾汤。胶艾汤也叫芎归胶艾汤，是止血安胎的名方。川芎当归芍药地黄就是四物汤的组成，养血活血；艾叶温经止血，阿胶养血止血，甘草调和诸药。这个方子是妇科止血的第一方。", "contraindication": "", "keywords": "妊娠下血,胞阻,胶艾汤,芎归胶艾汤,止血安胎"}, {"id": 748, "source": "金匮要略", "article_number": "20-4", "liujing": "妇人妊娠", "chapter": "妇人妊娠病脉证并治第二十", "original_text": "妇人怀娠六七月，脉弦发热，其胎愈胀，腹痛恶寒者，少腹如扇，所以然者，子脏开故也，当以附子汤温其脏。", "tags": "妊娠腹痛,恶寒,少腹如扇,子脏开", "formula": "附子汤", "formula_detail": "附子二枚(炮去皮破八片)、茯苓三两、人参二两、白术四两、芍药三两", "ni_annotation": "怀孕六七个月，脉弦发热，胎儿越来越大，腹痛怕冷，小腹感觉像有扇子在扇风一样冷，这是因为子宫虚寒（子脏开），用附子汤温阳。附子汤出自伤寒论，用人参附子白术茯苓芍药，温阳益气、散寒止痛。一般人都怕孕妇用附子，但这里明确说当用附子汤温其脏。关键在于辨证准确：阳虚寒盛就要用附子。", "contraindication": "阴虚火旺者禁用", "keywords": "妊娠腹痛,阳虚寒盛,附子汤,少腹冷"}, {"id": 749, "source": "金匮要略", "article_number": "20-5", "liujing": "妇人妊娠", "chapter": "妇人妊娠病脉证并治第二十", "original_text": "妊娠呕吐不止，干姜人参半夏丸主之。", "tags": "妊娠呕吐,恶阻", "formula": "干姜人参半夏丸", "formula_detail": "干姜一两、人参一两、半夏二两", "ni_annotation": "妊娠呕吐不止，用干姜人参半夏丸。干姜温中散寒，人参补气健脾，半夏降逆止呕。半夏本来是孕妇忌用的药，但这里用于妊娠呕吐不止，说明辨证论治的重要性。一般来说半夏确实有堕胎之嫌，但如果是胃寒造成的呕吐不止，不用半夏止不了呕。用丸剂可以减缓药力。", "contraindication": "一般妊娠慎用半夏，但胃寒呕吐不止者可斟酌使用", "keywords": "妊娠呕吐,恶阻,干姜人参半夏丸"}, {"id": 750, "source": "金匮要略", "article_number": "20-6", "liujing": "妇人妊娠", "chapter": "妇人妊娠病脉证并治第二十", "original_text": "妊娠小便难，饮食如故，当归贝母苦参丸主之。", "tags": "妊娠小便难,尿频,尿急", "formula": "当归贝母苦参丸", "formula_detail": "当归、贝母、苦参各四两", "ni_annotation": "怀孕期间小便困难，但饮食正常，用当归贝母苦参丸。这说明问题不在脾胃而在下焦。当归养血润燥，贝母清热散结，苦参清热利湿。三味合用，养血清热利湿，治妊娠小便不利。", "contraindication": "", "keywords": "妊娠小便难,当归贝母苦参丸"}, {"id": 751, "source": "金匮要略", "article_number": "20-7", "liujing": "妇人妊娠", "chapter": "妇人妊娠病脉证并治第二十", "original_text": "妊娠有水气，身重，小便不利，洒淅恶寒，起即头眩，葵子茯苓散主之。", "tags": "妊娠水肿,水气,小便不利,身重,头眩", "formula": "葵子茯苓散", "formula_detail": "葵子一升、茯苓三两", "ni_annotation": "妊娠水肿，身体沉重，小便不利，怕冷，一起身就头晕，用葵子茯苓散。葵子就是冬葵子，利水通淋，茯苓健脾利水。水肿的原因是水气内停。因为小便不利，水排不出去，所以全身水肿。", "contraindication": "", "keywords": "妊娠水肿,葵子茯苓散,水气"}, {"id": 752, "source": "金匮要略", "article_number": "20-8", "liujing": "妇人妊娠", "chapter": "妇人妊娠病脉证并治第二十", "original_text": "妇人妊娠，宜常服当归散主之。", "tags": "妊娠养胎,常服", "formula": "当归散", "formula_detail": "当归、黄芩、芍药、川芎各一斤、白术半斤", "ni_annotation": "当归散是养胎的方子，适合血虚有热的体质。当归川芎芍药养血活血，黄芩清热安胎，白术健脾。古人说\"黄芩白术为安胎圣药\"，就是因为这个方子。血虚有热的孕妇适合常服。", "contraindication": "", "keywords": "养胎,当归散,安胎"}, {"id": 753, "source": "金匮要略", "article_number": "20-9", "liujing": "妇人妊娠", "chapter": "妇人妊娠病脉证并治第二十", "original_text": "妊娠养胎，白术散主之。", "tags": "妊娠养胎,寒湿体质", "formula": "白术散", "formula_detail": "白术、川芎、蜀椒三分(去汗)、牡蛎", "ni_annotation": "白术散也是养胎方，但适合寒湿体质。白术健脾燥湿，川芎养血活血，蜀椒温中散寒，牡蛎收敛固涩。和当归散对比：当归散适合血虚有热的人，白术散适合寒湿偏盛的人。", "contraindication": "", "keywords": "养胎,白术散,寒湿体质"}, {"id": 754, "source": "金匮要略", "article_number": "20-10", "liujing": "妇人妊娠", "chapter": "妇人妊娠病脉证并治第二十", "original_text": "妇人伤胎，怀身腹满，不得小便，从腰以下重，如身有水气状，怀身七月，太阴当养不养，此心气实，当刺泻劳宫及关元，小便微利则愈。", "tags": "伤胎,腹满,小便不利", "formula": "", "formula_detail": "", "ni_annotation": "孕妇伤胎，腹部胀满，小便不出，腰以下沉重，像有水肿一样。怀孕七个月时本应太阴经养胎但没能养好，心气实盛，应该针刺劳宫穴和关元穴泻心气，小便稍有通利就好了。", "contraindication": "", "keywords": "伤胎,腹满,针刺,劳宫,关元"}, {"id": 755, "source": "金匮要略", "article_number": "20-11", "liujing": "妇人妊娠", "chapter": "妇人妊娠病脉证并治第二十", "original_text": "问曰：新产妇人有三病，一者病痉，二者病郁冒，三者大便难，何谓也？师曰：新产血虚，多出汗，喜中风，故令病痉；亡血复汗，寒多，故令郁冒；亡津液，胃燥，故大便难。", "tags": "产后三病,痉,郁冒,大便难", "formula": "", "formula_detail": "", "ni_annotation": "新产妇人有三种常见病：一是痉（抽搐），因为产后血虚多汗，容易受风，导致痉挛；二是郁冒（头晕目眩），因为失血又出汗，寒气多，导致头昏眼花；三是大便难，因为失血和出汗伤了津液，胃肠干燥。产后三病的根源都是血虚津亏。", "contraindication": "", "keywords": "产后三病,痉,郁冒,大便难,血虚"}, {"id": 756, "source": "金匮要略", "article_number": "21-1", "liujing": "妇人产后", "chapter": "妇人产后病脉证治第二十一", "original_text": "问曰：新产妇人有三病，一者病痉，二者病郁冒，三者大便难，何谓也？师曰：新产血虚，多出汗，喜中风，故令病痉；亡血复汗，寒多，故令郁冒；亡津液，胃燥，故大便难。", "tags": "产后三病,痉,郁冒,大便难,血虚", "formula": "", "formula_detail": "", "ni_annotation": "产后三病总论。痉是血虚受风引起的抽搐，郁冒是亡血复汗寒多引起的头昏，大便难是津液亏虚引起的便秘。三者根源都是产后血虚津亏，治疗以养血生津为主。", "contraindication": "", "keywords": "产后三病,痉,郁冒,大便难"}, {"id": 757, "source": "金匮要略", "article_number": "21-2", "liujing": "妇人产后", "chapter": "妇人产后病脉证治第二十一", "original_text": "产妇郁冒，其脉微弱，呕不能食，大便反坚，但头汗出。所以然者，血虚而厥，厥而必冒。冒家欲解，必大汗出。以血虚下厥，孤阳上出，故头汗出。所以产妇喜汗出者，亡阴血虚，阳气独盛，故当汗出，阴阳乃复。大便坚，呕不能食，小柴胡汤主之。", "tags": "产后郁冒,脉微弱,呕不能食,头汗出", "formula": "小柴胡汤", "formula_detail": "柴胡半斤、黄芩三两、人参三两、半夏半升(洗)、甘草三两(炙)、生姜三两(切)、大枣十二枚(擘)", "ni_annotation": "产后郁冒（头晕目眩），脉微弱，呕吐不能吃东西，大便反而干硬，只有头部出汗。原因是血虚导致四肢厥冷，厥冷就一定会头晕。血虚则下部厥冷，阳气上越，所以头部出汗。大便干、呕吐不能吃东西，用小柴胡汤和解少阳、调和阴阳。", "contraindication": "", "keywords": "产后郁冒,小柴胡汤,头晕"}, {"id": 758, "source": "金匮要略", "article_number": "21-3", "liujing": "妇人产后", "chapter": "妇人产后病脉证治第二十一", "original_text": "病解能食，七八日更发热者，此为胃实，大承气汤主之。", "tags": "产后发热,胃实", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗)、厚朴半斤(炙去皮)、枳实五枚(炙)、芒硝三合", "ni_annotation": "产后郁冒好了，能吃东西了，过了七八天又发热，这是胃肠有实热，用大承气汤攻下。虽然产后一般不宜攻下，但如果有阳明腑实证（胃实），该用承气汤还是要用。辨证论治最重要。", "contraindication": "", "keywords": "产后发热,胃实,大承气汤"}, {"id": 759, "source": "金匮要略", "article_number": "21-4", "liujing": "妇人产后", "chapter": "妇人产后病脉证治第二十一", "original_text": "产后腹中㽲痛，当归生姜羊肉汤主之；并治腹中寒疝，虚劳不足。", "tags": "产后腹痛,血虚寒", "formula": "当归生姜羊肉汤", "formula_detail": "当归三两、生姜五两、羊肉一斤", "ni_annotation": "产后腹部绵绵作痛，用当归生姜羊肉汤。这是血虚有寒的腹痛。当归养血活血，生姜温中散寒，羊肉温补气血。这既是药又是食，非常温和安全，是产后调养的经典方。", "contraindication": "", "keywords": "产后腹痛,当归生姜羊肉汤,血虚寒"}, {"id": 760, "source": "金匮要略", "article_number": "21-5", "liujing": "妇人产后", "chapter": "妇人产后病脉证治第二十一", "original_text": "产后腹痛，烦满不得卧，枳实芍药散主之。", "tags": "产后腹痛,烦满,不得卧", "formula": "枳实芍药散", "formula_detail": "枳实(烧令黑勿太过)、芍药等分", "ni_annotation": "产后腹痛并且烦躁胀满睡不着觉，用枳实芍药散。枳实烧黑能入血分，破气消满；芍药和血止痛。这是气滞血瘀型的产后腹痛。和当归生姜羊肉汤对比：那个是虚寒型，这个是气滞血瘀型。", "contraindication": "", "keywords": "产后腹痛,枳实芍药散,气滞血瘀"}, {"id": 761, "source": "金匮要略", "article_number": "21-6", "liujing": "妇人产后", "chapter": "妇人产后病脉证治第二十一", "original_text": "师曰：产后腹痛，法当以枳实芍药散，假令不愈者，此为腹中有干血著脐下，宜下瘀血汤主之；亦主经水不利。", "tags": "产后腹痛,干血著脐下,瘀血", "formula": "下瘀血汤", "formula_detail": "大黄三两、桃仁二十枚、䗪虫二十枚(熬去足)", "ni_annotation": "产后腹痛用枳实芍药散如果治不好，说明肚脐下面有干血（瘀血死血），用下瘀血汤。大黄泻下瘀血，桃仁活血化瘀，䗪虫（地鳖虫）破血逐瘀。三味合用，力量很强，专门攻下瘀血。这个方子也可以治疗月经不畅。", "contraindication": "气血虚弱者慎用", "keywords": "产后瘀血,下瘀血汤,干血"}, {"id": 762, "source": "金匮要略", "article_number": "21-7", "liujing": "妇人产后", "chapter": "妇人产后病脉证治第二十一", "original_text": "产后风，续之数十日不解，头微痛，恶寒，时时有热，心下闷，干呕，汗出，虽久，阳旦证续在耳，可与阳旦汤。", "tags": "产后风,头痛,恶寒,发热", "formula": "阳旦汤（桂枝汤加黄芩）", "formula_detail": "桂枝三两(去皮)、芍药三两、甘草二两(炙)、生姜三两(切)、大枣十二枚(擘)、黄芩二两", "ni_annotation": "产后受了风，几十天都不好，轻微头痛，怕冷，一阵阵发热，心下闷，干呕，出汗。虽然拖了很久，但太阳中风证（阳旦证）还在，可以给阳旦汤（桂枝汤加黄芩）。产后虽然多虚多瘀，但如果有表证还是要先解表。", "contraindication": "", "keywords": "产后感冒,阳旦汤,桂枝汤加黄芩"}, {"id": 763, "source": "金匮要略", "article_number": "21-8", "liujing": "妇人产后", "chapter": "妇人产后病脉证治第二十一", "original_text": "产后中风，发热，面正赤，喘而头痛，竹叶汤主之。", "tags": "产后中风,发热,面赤,喘,头痛", "formula": "竹叶汤", "formula_detail": "竹叶一把、葛根三两、防风一两、桔梗一两、桂枝一两、人参一两、甘草一两、附子一枚(炮)、大枣十五枚、生姜五两", "ni_annotation": "产后中风，发热面红，气喘头痛。这是产后正气大虚，外邪乘虚而入，且有虚阳上越之象。竹叶汤用竹叶石膏清热的思路，又用人参附子扶阳固脱，桂枝葛根防风解表，桔梗利气平喘。是扶正解表的方子，适合产后正气虚又有表邪的情况。", "contraindication": "", "keywords": "产后中风,竹叶汤,扶正解表"}, {"id": 764, "source": "金匮要略", "article_number": "21-9", "liujing": "妇人产后", "chapter": "妇人产后病脉证治第二十一", "original_text": "妇人乳中虚，烦乱呕逆，安中益气，竹皮大丸主之。", "tags": "产后乳中虚,烦乱,呕逆", "formula": "竹皮大丸", "formula_detail": "生竹茹二分、石膏二分、桂枝一分、甘草七分、白薇一分", "ni_annotation": "哺乳期妇女中气虚弱，心烦意乱，呕吐不止，用竹皮大丸安中益气。竹茹清热止呕，石膏清热，桂枝通阳，甘草用量最大（七分）以和中，白薇清虚热。哺乳期本来就气血不足，加上呕逆更伤中气，所以以甘草为主药安中益气。", "contraindication": "", "keywords": "哺乳期,中气虚,烦乱呕逆,竹皮大丸"}, {"id": 765, "source": "金匮要略", "article_number": "21-10", "liujing": "妇人产后", "chapter": "妇人产后病脉证治第二十一", "original_text": "产后下利虚极，白头翁加甘草阿胶汤主之。", "tags": "产后下利,虚极", "formula": "白头翁加甘草阿胶汤", "formula_detail": "白头翁二两、甘草二两、阿胶二两、秦皮三两、黄连三两、黄柏三两", "ni_annotation": "产后腹泻（下利），身体极度虚弱。白头翁汤本来是治热利（细菌性痢疾）的方子，白头翁秦皮黄连黄柏清热解毒止利。加上甘草和阿胶，是为了兼顾产后气血大虚的情况。甘草和中，阿胶养血补血。这是在清热止利的基础上照顾产后虚弱的思路。", "contraindication": "", "keywords": "产后下利,白头翁加甘草阿胶汤,热利"}, {"id": 766, "source": "金匮要略", "article_number": "22-1", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人中风，七八日续来寒热，发作有时，经水适断，此为热入血室，其血必结，故使如疟状，发作有时，小柴胡汤主之。", "tags": "热入血室,寒热往来,经水适断", "formula": "小柴胡汤", "formula_detail": "柴胡半斤、黄芩三两、人参三两、半夏半升(洗)、甘草三两(炙)、生姜三两(切)、大枣十二枚(擘)", "ni_annotation": "妇女在月经期间感染风寒，七八天后出现阵发寒热，像疟疾一样有规律地发作，正好月经也停了，这是热入血室（邪热进入了子宫和血分），瘀血和邪热纠结在一起。用小柴胡汤和解少阳、透邪外出。热入血室是妇科重要病证，常发生在经期外感。", "contraindication": "", "keywords": "热入血室,经期外感,小柴胡汤,寒热往来"}, {"id": 767, "source": "金匮要略", "article_number": "22-2", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人伤寒发热，经水适来，昼日明了，暮则谵语，如见鬼状者，此为热入血室。治之无犯胃气及上二焦，必自愈。", "tags": "热入血室,谵语,如见鬼状", "formula": "", "formula_detail": "", "ni_annotation": "妇女伤寒发热，正好来月经，白天清醒正常，一到晚上就说胡话，像见了鬼一样，这是热入血室。白天阳气盛所以清醒，晚上阴气盛，血室属阴，所以晚上发作。治疗时不要伤胃气和上中二焦，等月经干净了自然就好了。", "contraindication": "无犯胃气及上二焦", "keywords": "热入血室,谵语,夜间发
