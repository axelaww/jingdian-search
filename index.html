{"id": 336, "source": "伤寒论", "article_number": "336", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒病，厥五日，热亦五日，设六日当复厥，不厥者自愈。厥终不过五日，以热五日，故知自愈。", "tags": "厥,热,自愈", "formula": "", "formula_detail": "", "ni_annotation": "厥热日数相等，阴阳平衡，故知自愈。此以厥热日数判断预后。", "contraindication": "", "keywords": "厥热相等自愈"}, {"id": 337, "source": "伤寒论", "article_number": "337", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "凡厥者，阴阳气不相顺接，便为厥。厥者，手足逆冷者是也。", "tags": "厥,阴阳气不相顺接,手足逆冷", "formula": "", "formula_detail": "", "ni_annotation": "此为厥的定义。阴阳之气不相顺接，阳气不能达于四肢，故手足逆冷。厥有寒厥热厥之分，寒厥为阳虚不能外达，热厥为热邪内郁阳气不能外达。", "contraindication": "", "keywords": "厥的定义,阴阳气不相顺接"}, {"id": 338, "source": "伤寒论", "article_number": "338", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒脉微而厥，至七八日肤冷，其人躁无暂安时者，此为藏厥，非蛔厥也。蛔厥者，其人当吐蛔。今病者静，而复时烦者，此为藏寒。蛔上入其膈，故烦，须臾复止，得食而呕，又烦者，蛔闻食臭出，其人常自吐蛔。蛔厥者，乌梅丸主之。又主久利。", "tags": "脉微而厥,肤冷,躁无暂安,藏厥,蛔厥,吐蛔,烦躁,久利", "formula": "乌梅丸", "formula_detail": "乌梅三百枚、细辛六两、干姜十两、黄连十六两、当归四两、附子六两(炮去皮)、蜀椒四两(出汗)、桂枝六两(去皮)、人参六两、黄柏六两", "ni_annotation": "此辨藏厥与蛔厥。藏厥是阳气衰败，脉微肤冷，躁无暂安，病情危重。蛔厥是寒热错杂，蛔虫扰动，时烦时止，得食则呕。乌梅丸寒热并用、攻补兼施，为厥阴病主方。方中乌梅酸收安蛔，黄连黄连清热，附子干姜细辛蜀椒温阳散寒，当归桂枝养血通脉，人参益气。又主久利，因久利亦多寒热错杂之证。", "contraindication": "", "keywords": "乌梅丸,蛔厥,藏厥,久利"}, {"id": 339, "source": "伤寒论", "article_number": "339", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒热少微厥，指头寒，嘿嘿不欲食，烦躁，数日小便利，色白者，此热除也，欲得食，其病为愈。若厥而呕，胸胁烦满者，其后必便血。", "tags": "热少微厥,指头寒,嘿嘿不欲食,烦躁,便血", "formula": "", "formula_detail": "", "ni_annotation": "热少厥微（仅指头寒），是热厥之轻者。若数日后小便利色白、欲得食，为热除病愈。若厥而呕、胸胁烦满，是热邪深入，必致便血。", "contraindication": "", "keywords": "热少微厥,热除欲食"}, {"id": 340, "source": "伤寒论", "article_number": "340", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "病者手足厥冷，言我不结胸，小腹满，按之痛者，此冷结在膀胱关元也。", "tags": "手足厥冷,小腹满,按之痛,冷结膀胱关元", "formula": "", "formula_detail": "", "ni_annotation": "手足厥冷非阳虚，乃冷结在下焦膀胱关元处，寒凝气滞，故小腹满而按之痛。当温下散寒。", "contraindication": "", "keywords": "冷结膀胱关元,小腹满按痛"}, {"id": 341, "source": "伤寒论", "article_number": "341", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒发热四日，厥反三日，复热四日，厥少热多者，其病当愈。四日至七日，热不除者，必便脓血。", "tags": "发热,厥少热多,便脓血", "formula": "", "formula_detail": "", "ni_annotation": "厥少热多，阳气来复，其病当愈。但若热持续不除，阳复太过，热伤阴络，必便脓血。", "contraindication": "", "keywords": "厥少热多,阳复太过便脓血"}, {"id": 342, "source": "伤寒论", "article_number": "342", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒厥四日，热反三日，复厥五日，其病为进。寒多热少，阳气退，故为进也。", "tags": "厥多热少,寒多热少,病进", "formula": "", "formula_detail": "", "ni_annotation": "厥多热少，寒多热少，阳气衰退，故病进。此与上条对比，辨厥热进退判断预后。", "contraindication": "", "keywords": "厥多热少病进"}, {"id": 343, "source": "伤寒论", "article_number": "343", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒六七日，脉微，手足厥冷，烦躁，灸厥阴，厥不还者，死。", "tags": "脉微,手足厥冷,烦躁,灸厥阴,死证", "formula": "", "formula_detail": "", "ni_annotation": "脉微手足厥冷烦躁，阳虚欲脱之象。灸厥阴以回阳救逆，若灸后厥不还（手足不温），则阳气不能复，为死证。", "contraindication": "", "keywords": "灸厥阴,厥不还者死"}, {"id": 344, "source": "伤寒论", "article_number": "344", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒发热，下利厥逆，躁不得卧者，死。", "tags": "发热,下利,厥逆,躁不得卧,死证", "formula": "", "formula_detail": "", "ni_annotation": "发热而利且厥逆躁不得卧，是阴盛格阳、虚阳外越，神气将脱，故为死证。", "contraindication": "", "keywords": "躁不得卧死证"}, {"id": 345, "source": "伤寒论", "article_number": "345", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒发热，下利至甚，厥不止者，死。", "tags": "发热,下利至甚,厥不止,死证", "formula": "", "formula_detail": "", "ni_annotation": "下利至甚则阴液将绝，厥不止则阳气将脱，发热为虚阳外越，故为死证。", "contraindication": "", "keywords": "下利至甚厥不止死证"}, {"id": 346, "source": "伤寒论", "article_number": "346", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒六七日不利，便发热而利，其人汗出不止者，死，有阴无阳故也。", "tags": "发热,下利,汗出不止,死证,有阴无阳", "formula": "", "formula_detail": "", "ni_annotation": "六七日不利而突然发热下利，汗出不止，是阳气外脱，阴寒内盛，有阴无阳故死。", "contraindication": "", "keywords": "有阴无阳死证"}, {"id": 347, "source": "伤寒论", "article_number": "347", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒五六日，不结胸，腹濡，脉虚复厥者，不可下，此亡血，下之死。", "tags": "不结胸,腹濡,脉虚,厥,亡血", "formula": "", "formula_detail": "", "ni_annotation": "腹濡脉虚，非实热内结，乃血虚致厥。不可下，下之则阴血更伤，故死。", "contraindication": "禁下", "keywords": "亡血不可下"}, {"id": 348, "source": "伤寒论", "article_number": "348", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "发热而厥七日，下利者，为难治。", "tags": "发热,厥,下利,难治", "formula": "", "formula_detail": "", "ni_annotation": "发热而厥七日且下利，阳虚阴盛，正虚邪实，故为难治。", "contraindication": "", "keywords": "发热厥利难治"}, {"id": 349, "source": "伤寒论", "article_number": "349", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒脉促，手足厥逆，可灸之。", "tags": "脉促,手足厥逆,灸", "formula": "", "formula_detail": "", "ni_annotation": "脉促为阳虚，手足厥逆为阳不外达，可灸之以温通阳气。促脉在此非热，乃阳虚欲奋而力不足之象。", "contraindication": "", "keywords": "脉促厥逆可灸"}, {"id": 350, "source": "伤寒论", "article_number": "350", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒脉滑而厥者，里有热，白虎汤主之。", "tags": "脉滑而厥,里有热", "formula": "白虎汤", "formula_detail": "知母六两、石膏一斤(碎)、甘草二两(炙)、粳米六合", "ni_annotation": "此为热厥。脉滑为热盛于里，热邪内郁阳气不能外达故厥。白虎汤清里热，热清则厥回。与寒厥之脉微而厥者截然不同。", "contraindication": "", "keywords": "热厥白虎汤,脉滑而厥"}, {"id": 351, "source": "伤寒论", "article_number": "351", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "手足厥寒，脉细欲绝者，当归四逆汤主之。", "tags": "手足厥寒,脉细欲绝,血虚寒厥", "formula": "当归四逆汤", "formula_detail": "当归三两、桂枝三两(去皮)、芍药三两、细辛三两、甘草二两(炙)、通草二两、大枣二十五枚(擘)", "ni_annotation": "此为血虚寒厥。血虚则不能充盈血脉，寒客则经脉凝涩，故手足厥寒、脉细欲绝。当归四逆汤养血通脉、温经散寒。方中当归芍药养血和营，桂枝细辛温经散寒，通草通血脉，甘草大枣补中益气。倪师常用于冻疮、雷诺氏症、痛经等血虚寒凝之证。", "contraindication": "", "keywords": "当归四逆汤,血虚寒厥,冻疮,雷诺氏症"}, {"id": 352, "source": "伤寒论", "article_number": "352", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "若其人内有久寒者，宜当归四逆加吴茱萸生姜汤。", "tags": "内有久寒,手足厥寒", "formula": "当归四逆加吴茱萸生姜汤", "formula_detail": "当归三两、桂枝三两(去皮)、芍药三两、细辛三两、甘草二两(炙)、通草二两、大枣二十五枚(擘)、吴茱萸二升、生姜半斤(切)", "ni_annotation": "在当归四逆汤基础上，若患者内有久寒（陈寒痼冷），加吴茱萸生姜以温中散寒、降逆止呕。吴茱萸温肝胃之寒，生姜散寒降逆。", "contraindication": "", "keywords": "当归四逆加吴茱萸生姜,内有久寒"}, {"id": 353, "source": "伤寒论", "article_number": "353", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "大汗出，热不去，内拘急，四肢疼，又下利厥逆而恶寒者，四逆汤主之。", "tags": "大汗出,热不去,内拘急,四肢疼,下利,厥逆,恶寒", "formula": "四逆汤", "formula_detail": "附子一枚(生用去皮破八片)、干姜一两半、甘草二两(炙)", "ni_annotation": "大汗出阳气外泄，热不去为虚阳外浮，内拘急四肢疼为寒盛于里，下利厥逆恶寒为阳衰阴盛。四逆汤回阳救逆。", "contraindication": "", "keywords": "四逆汤,大汗厥逆"}, {"id": 354, "source": "伤寒论", "article_number": "354", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "大汗，若大下利而厥冷者，四逆汤主之。", "tags": "大汗,大下利,厥冷", "formula": "四逆汤", "formula_detail": "附子一枚(生用去皮破八片)、干姜一两半、甘草二两(炙)", "ni_annotation": "大汗伤阳于表，大下利伤阳于里，阳气衰败故厥冷。四逆汤回阳救逆。", "contraindication": "", "keywords": "四逆汤,汗下厥冷"}, {"id": 355, "source": "伤寒论", "article_number": "355", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "病人手足厥冷，脉乍紧者，邪结在胸中，心下满而烦，饥不能食者，病在胸中，当须吐之，宜瓜蒂散。", "tags": "手足厥冷,脉乍紧,邪结胸中,心下满,烦,饥不能食", "formula": "瓜蒂散", "formula_detail": "瓜蒂一分(熬黄)、赤小豆一分(煮)", "ni_annotation": "痰食之邪结于胸中，气机受阻，阳气不能达于四肢故手足厥冷。当用吐法，瓜蒂散涌吐胸中实邪。邪去则阳通厥回。", "contraindication": "", "keywords": "瓜蒂散,痰厥"}, {"id": 356, "source": "伤寒论", "article_number": "356", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒厥而心下悸，宜先治水，当服茯苓甘草汤，却治其厥。不尔，水渍入胃，必作利也。", "tags": "厥而心下悸,水停,先治水", "formula": "茯苓甘草汤", "formula_detail": "茯苓二两、桂枝二两(去皮)、甘草一两(炙)、生姜三两(切)", "ni_annotation": "厥而心下悸为水停心下，水饮凌心则悸，水饮阻遏阳气则厥。宜先治水，茯苓甘草汤温阳化饮。水去则阳气通而厥自愈。若不先治水，水渍入胃必作利。", "contraindication": "", "keywords": "茯苓甘草汤,厥而心下悸,先治水"}, {"id": 357, "source": "伤寒论", "article_number": "357", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒六七日，大下后，寸脉沉而迟，手足厥逆，下部脉不至，喉咽不利，吐脓血，泄利不止者，为难治，麻黄升麻汤主之。", "tags": "寸脉沉而迟,手足厥逆,下部脉不至,喉咽不利,吐脓血,泄利不止,难治", "formula": "麻黄升麻汤", "formula_detail": "麻黄二两半(去节)、升麻一两一分、当归一两一分、知母十八铢、黄芩十八铢、葳蕤十八铢、芍药六铢、天门冬六铢(去心)、桂枝六铢(去皮)、茯苓六铢、甘草六铢(炙)、石膏六铢(碎绵裹)、白术六铢、干姜六铢", "ni_annotation": "大下后邪陷阳郁，上热下寒、正虚邪实。寸脉沉迟为阳气郁于上，手足厥逆为阳不达于四肢，下部脉不至为下焦阳虚，喉咽不利吐脓血为上焦郁热伤络，泄利不止为下焦虚寒。麻黄升麻汤发越郁阳、清上温下。方中麻黄升麻发越阳气，知母黄芩石膏天门冬清上焦之热，干姜白术茯苓温中健脾，当归芍药养血和阴。", "contraindication": "", "keywords": "麻黄升麻汤,上热下寒"}, {"id": 358, "source": "伤寒论", "article_number": "358", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒四五日，腹中痛，若转气下趋少腹者，此欲自利也。", "tags": "腹中痛,转气下趋少腹,欲自利", "formula": "", "formula_detail": "", "ni_annotation": "腹中痛且转气下趋少腹，是寒邪下迫，将作下利。为下利之前兆。", "contraindication": "", "keywords": "转气下趋欲自利"}, {"id": 359, "source": "伤寒论", "article_number": "359", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒本自寒下，医复吐下之，寒格更逆吐下，若食入口即吐，干姜黄芩黄连人参汤主之。", "tags": "寒下,寒格,吐,下,食入口即吐", "formula": "干姜黄芩黄连人参汤", "formula_detail": "干姜三两、黄芩三两、黄连三两、人参三两", "ni_annotation": "本自寒下（素有寒泻），医又用吐下之法，致寒邪格拒于中，更逆吐下。食入口即吐，是胃热脾寒、寒热格拒。干姜黄芩黄连人参汤辛开苦降、寒热并用。干姜温脾寒，芩连清胃热，人参扶正。", "contraindication": "", "keywords": "干姜黄芩黄连人参汤,寒格,食入口即吐"}, {"id": 360, "source": "伤寒论", "article_number": "360", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利，有微热而渴，脉弱者，今自愈。", "tags": "下利,微热,渴,脉弱,自愈", "formula": "", "formula_detail": "", "ni_annotation": "下利而有微热渴，为阳气来复。脉弱说明热不甚，是阳气渐复而不过亢，故可自愈。", "contraindication": "", "keywords": "下利微热渴脉弱自愈"}, {"id": 361, "source": "伤寒论", "article_number": "361", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利，脉数，有微热汗出，今自愈。设复紧，为未解。", "tags": "下利,脉数,微热,汗出,自愈,脉紧", "formula": "", "formula_detail": "", "ni_annotation": "下利脉数有微热汗出，阳气来复，表里和调，故自愈。若脉复紧，是寒邪尚在，故为未解。", "contraindication": "", "keywords": "下利脉数自愈"}, {"id": 362, "source": "伤寒论", "article_number": "362", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利，手足厥冷，无脉者，灸之不温，若脉不还，反微喘者，死。少阴负趺阳者，为顺也。", "tags": "下利,手足厥冷,无脉,灸之,微喘,死证", "formula": "", "formula_detail": "", "ni_annotation": "下利厥冷无脉，阳衰至极。灸之不温、脉不还，反见微喘，是肾气绝于下、肺气脱于上，故死。少阴负趺阳（少阴脉小于趺阳脉），脾胃阳气尚存，为顺。", "contraindication": "", "keywords": "下利无脉死证,少阴负趺阳"}, {"id": 363, "source": "伤寒论", "article_number": "363", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利，寸脉反浮数，尺中自涩者，必圊脓血。", "tags": "下利,寸脉浮数,尺脉涩,圊脓血", "formula": "", "formula_detail": "", "ni_annotation": "寸脉浮数为热邪在上，尺脉涩为阴血受伤。热盛伤阴，阴络受损，故必便脓血。", "contraindication": "", "keywords": "寸浮数尺涩圊脓血"}, {"id": 364, "source": "伤寒论", "article_number": "364", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利清谷，不可攻表，汗出必胀满。", "tags": "下利清谷,不可攻表,汗出,胀满", "formula": "", "formula_detail": "", "ni_annotation": "下利清谷为脾肾阳虚，里寒已甚。不可发汗攻表，汗出则阳气更伤，阴寒凝滞必致腹胀满。当先温里。", "contraindication": "禁汗攻表", "keywords": "下利清谷不可攻表"}, {"id": 365, "source": "伤寒论", "article_number": "365", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利，脉沉弦者，下重也。脉大者，为未止。脉微弱数者，为欲自止，虽发热不死。", "tags": "下利,脉沉弦,下重,脉大,脉微弱数", "formula": "", "formula_detail": "", "ni_annotation": "脉沉弦为肝气郁滞，气机不畅故下重（里急后重）。脉大为邪气盛，利未止。脉微弱数为邪气渐衰阳气来复，故欲自止，虽发热是阳复非邪盛，故不死。", "contraindication": "", "keywords": "下利脉沉弦下重"}, {"id": 366, "source": "伤寒论", "article_number": "366", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利，脉沉而迟，其人面少赤，身有微热，下利清谷者，必郁冒汗出而解，病人必微厥，所以然者，其面戴阳，下虚故也。", "tags": "下利,脉沉迟,面少赤,身微热,下利清谷,郁冒汗出,戴阳,下虚", "formula": "", "formula_detail": "", "ni_annotation": "脉沉迟下利清谷为里寒，面少赤身微热为虚阳外浮（戴阳）。郁冒汗出而解，是阳气得伸、阴寒得散。下虚故微厥。此阴盛格阳、阳气来复之象。", "contraindication": "", "keywords": "戴阳,郁冒汗出而解"}, {"id": 367, "source": "伤寒论", "article_number": "367", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利，脉数而渴者，今自愈。设不瘥，必清脓血，以有热故也。", "tags": "下利,脉数,渴,清脓血,有热", "formula": "", "formula_detail": "", "ni_annotation": "下利脉数而渴，阳复之象，当自愈。若不愈而持续有热，阳复太过，热伤阴络，必便脓血。", "contraindication": "", "keywords": "下利脉数有热清脓血"}, {"id": 368, "source": "伤寒论", "article_number": "368", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利后脉绝，手足厥冷，晬时脉还，手足温者生，脉不还者死。", "tags": "下利后脉绝,手足厥冷,晬时脉还,死证", "formula": "", "formula_detail": "", "ni_annotation": "下利后脉绝厥冷，阳气将脱。晬时（一个时辰）后脉还手足温者，阳气已复可生。脉不还者阳气已绝，故死。", "contraindication": "", "keywords": "脉绝晬时脉还生死"}, {"id": 369, "source": "伤寒论", "article_number": "369", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒下利日十余行，脉反实者，死。", "tags": "下利日十余行,脉反实,死证", "formula": "", "formula_detail": "", "ni_annotation": "下利日十余行而脉反实（脉来坚实有力），是邪气盛而正气不衰之假象，实则胃气败绝，孤阳外浮，故为死证。", "contraindication": "", "keywords": "下利脉实死证"}, {"id": 370, "source": "伤寒论", "article_number": "370", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利清谷，里寒外热，汗出而厥者，通脉四逆汤主之。", "tags": "下利清谷,里寒外热,汗出,厥", "formula": "通脉四逆汤", "formula_detail": "附子大者一枚(生用去皮破八片)、干姜三两(强人可四两)、甘草二两(炙)", "ni_annotation": "下利清谷为里寒，汗出为虚阳外越，厥为阳不达四肢。此阴盛格阳之危证。通脉四逆汤破阴回阳、通脉救逆。比四逆汤姜附量更大以急救回阳。", "contraindication": "", "keywords": "通脉四逆汤,里寒外热"}, {"id": 371, "source": "伤寒论", "article_number": "371", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "热利下重者，白头翁汤主之。", "tags": "热利下重,里急后重", "formula": "白头翁汤", "formula_detail": "白头翁二两、黄柏三两、黄连三两、秦皮三两", "ni_annotation": "热利下重为湿热蕴结大肠，气机壅滞，故里急后重。白头翁汤清热解毒、凉血止痢。白头翁清热凉血为君，黄连黄柏清热燥湿，秦皮清热涩肠。倪师认为此方为细菌性痢疾专方。", "contraindication": "", "keywords": "白头翁汤,热利下重,痢疾"}, {"id": 372, "source": "伤寒论", "article_number": "372", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利腹胀满，身体疼痛者，先温其里，乃攻其表。温里宜四逆汤，攻表宜桂枝汤。", "tags": "下利,腹胀满,身体疼痛,先温里后攻表", "formula": "四逆汤", "formula_detail": "附子一枚(生用去皮破八片)、干姜一两半、甘草二两(炙)", "ni_annotation": "下利腹胀满为里虚寒，身体疼痛为表邪未解。里急先救里，用四逆汤温里。里温后再用桂枝汤解表。此先里后表之法。", "contraindication": "", "keywords": "先温里后攻表,四逆汤,桂枝汤"}, {"id": 373, "source": "伤寒论", "article_number": "373", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利欲饮水者，以有热故也，白头翁汤主之。", "tags": "下利,欲饮水,有热", "formula": "白头翁汤", "formula_detail": "白头翁二两、黄柏三两、黄连三两、秦皮三两", "ni_annotation": "下利而欲饮水，是热邪伤津，故知为热利。白头翁汤清热解毒止痢。", "contraindication": "", "keywords": "白头翁汤,热利渴饮"}, {"id": 374, "source": "伤寒论", "article_number": "374", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利谵语者，有燥屎也，宜小承气汤。", "tags": "下利,谵语,燥屎", "formula": "小承气汤", "formula_detail": "大黄四两(酒洗)、厚朴二两(炙去皮)、枳实三枚(炙)", "ni_annotation": "下利而谵语，非虚寒之利，乃热结旁流，肠道有燥屎内结。宜小承气汤轻下热结。", "contraindication": "", "keywords": "小承气汤,热结旁流,下利谵语"}, {"id": 375, "source": "伤寒论", "article_number": "375", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "下利后更烦，按之心下濡者，为虚烦也，宜栀子豉汤。", "tags": "下利后更烦,心下濡,虚烦", "formula": "栀子豉汤", "formula_detail": "栀子十四枚(擘)、香豉四合(绵裹)", "ni_annotation": "下利后更烦，按之心下濡软，非实热结滞，乃余热留扰胸膈之虚烦。栀子豉汤清热除烦。", "contraindication": "", "keywords": "栀子豉汤,虚烦"}, {"id": 376, "source": "伤寒论", "article_number": "376", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "呕家有痈脓者，不可治呕，脓尽自愈。", "tags": "呕,痈脓,不可治呕", "formula": "", "formula_detail": "", "ni_annotation": "呕因痈脓所致，不可止呕，当治痈脓之源，脓尽则呕自止。", "contraindication": "", "keywords": "呕家痈脓不可治呕"}, {"id": 377, "source": "伤寒论", "article_number": "377", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "呕而脉弱，小便复利，身有微热，见厥者难治，四逆汤主之。", "tags": "呕,脉弱,小便复利,微热,见厥,难治", "formula": "四逆汤", "formula_detail": "附子一枚(生用去皮破八片)、干姜一两半、甘草二两(炙)", "ni_annotation": "呕而脉弱为胃虚，小便复利为下焦阳虚不能固摄，微热而厥为虚阳外浮而里阳不足，故难治。四逆汤回阳救逆。", "contraindication": "", "keywords": "四逆汤,呕而脉弱见厥"}, {"id": 378, "source": "伤寒论", "article_number": "378", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "干呕吐涎沫，头痛者，吴茱萸汤主之。", "tags": "干呕,吐涎沫,头痛", "formula": "吴茱萸汤", "formula_detail": "吴茱萸一升(洗)、人参三两、大枣十二枚(擘)、生姜六两(切)", "ni_annotation": "干呕吐涎沫为肝寒犯胃，浊阴上逆。头痛以巅顶为甚，是厥阴经脉上达巅顶，肝寒循经上冲。吴茱萸汤温肝暖胃、降逆止呕。吴茱萸温肝散寒降逆，生姜温胃散寒止呕，人参大枣补虚。", "contraindication": "", "keywords": "吴茱萸汤,干呕吐涎沫,巅顶头痛"}, {"id": 379, "source": "伤寒论", "article_number": "379", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "呕而发热者，小柴胡汤主之。", "tags": "呕,发热", "formula": "小柴胡汤", "formula_detail": "柴胡半斤、黄芩三两、人参三两、半夏半升(洗)、甘草三两(炙)、生姜三两(切)、大枣十二枚(擘)", "ni_annotation": "呕而发热为少阳邪气犯胃，少阳属胆与三焦，胆气不舒则呕，邪正相争则发热。小柴胡汤和解少阳。", "contraindication": "", "keywords": "小柴胡汤,呕而发热"}, {"id": 380, "source": "伤寒论", "article_number": "380", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒大吐大下之，极虚，复极汗者，其人外气怫郁，复与之水，以发其汗，因得哕。所以然者，胃中寒冷故也。", "tags": "大吐大下,极虚,极汗,哕,胃中寒冷", "formula": "", "formula_detail": "", "ni_annotation": "大吐大下后极虚，又极汗出更伤阳气，胃中虚冷。复与水以发汗，寒水伤胃，胃寒气逆故哕（呃逆）。", "contraindication": "", "keywords": "胃中寒冷哕"}, {"id": 381, "source": "伤寒论", "article_number": "381", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒哕而腹满，视其前后，知何部不利，利之即愈。", "tags": "哕,腹满,视前后,利之即愈", "formula": "", "formula_detail": "", "ni_annotation": "哕而腹满为实邪阻滞。当审察大小便情况，知病在前（小便不利）或后（大便不利），通利之则气机通畅，哕满自愈。", "contraindication": "", "keywords": "哕而腹满视前后利之"}, {"id": 382, "source": "伤寒论", "article_number": "382", "liujing": "霍乱", "chapter": "辨霍乱病脉证并治", "original_text": "问曰：病有霍乱者何？答曰：呕吐而利，此名霍乱。", "tags": "呕吐,利,霍乱", "formula": "", "formula_detail": "", "ni_annotation": "霍乱的定义：上吐下泻并作，发病急骤，挥霍之间便致缭乱，故名霍乱。此为脾胃升降失常，清浊相干。", "contraindication": "", "keywords": "霍乱定义,呕吐而利"}, {"id": 383, "source": "伤寒论", "article_number": "383", "liujing": "霍乱", "chapter": "辨霍乱病脉证并治", "original_text": "问曰：病发热头痛，身疼恶寒，吐利者，此属何病？答曰：此名霍乱。霍乱自吐下，又利止，复更发热也。", "tags": "发热,头痛,身疼,恶寒,吐利,霍乱", "formula": "", "formula_detail": "", "ni_annotation": "霍乱兼有表证（发热头痛身疼恶寒），又见吐利。此为外感风寒内伤饮食，表里同病。利止后又发热，是表邪未尽。", "contraindication": "", "keywords": "霍乱表里同病"}, {"id": 384, "source": "伤寒论", "article_number": "384", "liujing": "霍乱", "chapter": "辨霍乱病脉证并治", "original_text": "伤寒，其脉微涩者，本是霍乱，今是伤寒，却四五日，至阴经上，转入阴必利，本呕下利者，不可治也。欲似大便，而反失气，仍不利者，此属阳明也，便必鞕，十三日愈，所以然者，经尽故也。下利后当便鞕，鞕则能食者愈。今反不能食，到后经中，颇能食，复过一经能食，过之一日当愈。不愈者，不属阳明也。", "tags": "脉微涩,霍乱,转入阴,利,失气,便鞕,能食,不属阳明", "formula": "", "formula_detail": "", "ni_annotation": "脉微涩为津血不足，本是霍乱吐下伤津。传入阴经则下利，若本已呕下利更不可治。若欲大便而反矢气但仍不利，转入阳明，大便必硬。能食者胃气复，十三日经尽当愈。", "contraindication": "", "keywords": "霍乱转属阳明"}, {"id": 385, "source": "伤寒论", "article_number": "385", "liujing": "霍乱", "chapter": "辨霍乱病脉证并治", "original_text": "恶寒脉微而复利，利止亡血也，四逆加人参汤主之。", "tags": "恶寒,脉微,利止,亡血", "formula": "四逆加人参汤", "formula_detail": "附子一枚(生用去皮破八片)、干姜一两半、甘草二两(炙)、人参一两", "ni_annotation": "恶寒脉微为阳虚，复利为阴寒。利止非阳气来复，乃津液耗尽无物可下，故曰亡血（津血同源）。四逆加人参汤回阳救逆、益气生津。", "contraindication": "", "keywords": "四逆加人参汤,利止亡血"}, {"id": 386, "source": "伤寒论", "article_number": "386", "liujing": "霍乱", "chapter": "辨霍乱病脉证并治", "original_text": "霍乱，头痛发热，身疼痛，热多欲饮水者，五苓散主之。寒多不用水者，理中丸主之。", "tags": "头痛,发热,身疼痛,热多欲饮水,寒多不用水", "formula": "理中丸", "formula_detail": "人参三两、干姜三两、甘草三两(炙)、白术三两", "ni_annotation": "霍乱兼表证，当辨寒热。热多欲饮水者，为偏于热，有水饮内停，五苓散温阳化饮、兼解表邪。寒多不用水者，为偏于寒，中焦虚寒，理中丸温中散寒。五苓散方：猪苓十八铢(去皮)、泽泻一两六铢、白术十八铢、茯苓十八铢、桂枝半两(去皮)。", "contraindication": "", "keywords": "理中丸,五苓散,霍乱寒热辨治"}, {"id": 387, "source": "伤寒论", "article_number": "387", "liujing": "霍乱", "chapter": "辨霍乱病脉证并治", "original_text": "吐利汗出，发热恶寒，四肢拘急，手足厥冷者，四逆汤主之。", "tags": "吐利,汗出,发热恶寒,四肢拘急,手足厥冷", "formula": "四逆汤", "formula_detail": "附子一枚(生用去皮破八片)、干姜一两半、甘草二两(炙)", "ni_annotation": "吐利汗出则津阳气大伤，发热恶寒为表邪未解，四肢拘急为阳虚不能温养筋脉，手足厥冷为阳衰不能外达。四逆汤回阳救逆。", "contraindication": "", "keywords": "四逆汤,吐利汗出厥冷"}, {"id": 388, "source": "伤寒论", "article_number": "388", "liujing": "霍乱", "chapter": "辨霍乱病脉证并治", "original_text": "既吐且利，小便复利，而大汗出，下利清谷，内寒外热，脉微欲绝者，四逆汤主之。", "tags": "吐利,小便复利,大汗出,下利清谷,内寒外热,脉微欲绝", "formula": "四逆汤", "formula_detail": "附子一枚(生用去皮破八片)、干姜一两半、甘草二两(炙)", "ni_annotation": "吐利交作，小便复利而大汗出，津液阳气外亡。下利清谷为里寒极，内寒外热为阴盛格阳，脉微欲绝为阳气将脱。四逆汤破阴回阳。", "contraindication": "", "keywords": "四逆汤,阴盛格阳"}, {"id": 389, "source": "伤寒论", "article_number": "389", "liujing": "霍乱", "chapter": "辨霍乱病脉证并治", "original_text": "吐已下断，汗出而厥，四肢拘急不解，脉微欲绝者，通脉四逆加猪胆汁汤主之。", "tags": "吐已下断,汗出而厥,四肢拘急,脉微欲绝", "formula": "通脉四逆加猪胆汁汤", "formula_detail": "附子大者一枚(生用去皮破八片)、干姜三两(强人可四两)、甘草二两(炙)、猪胆汁半合", "ni_annotation": "吐下已止（无物可吐下），但仍汗出厥逆拘急，脉微欲绝，是阳气将脱而阴液亦竭。通脉四逆加猪胆汁汤回阳救逆、益阴和阳。加猪胆汁苦寒反佐，引阳药入阴，防辛热伤阴。", "contraindication": "", "keywords": "通脉四逆加猪胆汁汤"}, {"id": 390, "source": "伤寒论", "article_number": "390", "liujing": "霍乱", "chapter": "辨霍乱病脉证并治", "original_text": "吐利发汗，脉平，小烦者，以新虚不胜谷气故也。", "tags": "吐利,发汗,脉平,小烦,新虚不胜谷气", "formula": "", "formula_detail": "", "ni_annotation": "霍乱吐利发汗后，脉已平和，病将愈。但仍有轻微心烦，是病后脾胃尚虚，不能消化谷食所致，不需用药，节食调养即可。", "contraindication": "", "keywords": "新虚不胜谷气,小烦"}, {"id": 391, "source": "伤寒论", "article_number": "391", "liujing": "霍乱", "chapter": "辨霍乱病脉证并治", "original_text": "吐利止而身痛不休者，当消息和解其外，宜桂枝汤小和之。", "tags": "吐利止,身痛不休,和解其外", "formula": "桂枝汤", "formula_detail": "桂枝三两(去皮)、芍药三两、甘草二两(炙)、生姜三两(切)、大枣十二枚(擘)", "ni_annotation": "霍乱吐利已止，里证已除，但身痛不休者，是表邪未尽。当消息（斟酌）和解其外，桂枝汤小和之，不可大汗。", "contraindication": "", "keywords": "桂枝汤,吐利止身痛"}, {"id": 392, "source": "伤寒论", "article_number": "392", "liujing": "差后劳复", "chapter": "辨阴阳易差后劳复病脉证并治", "original_text": "伤寒阴阳易之为病，其人身体重，少气，少腹里急，或引阴中拘挛，热上冲胸，头重不欲举，眼中生花，膝胫拘急者，烧裈散主之。", "tags": "身体重,少气,少腹里急,引阴中拘挛,热上冲胸,头重,眼中生花,膝胫拘急", "formula": "烧裈散", "formula_detail": "妇人中裈近隐处取烧作灰", "ni_annotation": "大病初愈而犯房事，精气内损，余邪乘虚而入，名为阴阳易。其证身体重少气为精气亏虚，少腹里急引阴中拘挛为邪伤下焦，热上冲胸头重眼中生花为虚热上冲。烧裈散取近阴处烧灰服用，取其气相感引邪外出。此为古人经验之方。", "contraindication": "", "keywords": "阴阳易,烧裈散"}, {"id": 393, "source": "伤寒论", "article_number": "393", "liujing": "差后劳复", "chapter": "辨阴阳易差后劳复病脉证并治", "original_text": "大病差后，劳复者，枳实栀子豉汤主之。", "tags": "大病差后,劳复", "formula": "枳实栀子豉汤", "formula_detail": "枳实三枚(炙)、栀子十四枚(擘)、香豉一升(绵裹)", "ni_annotation": "大病初愈因过劳而复发者，为劳复。余热未尽，因劳而发。枳实栀子豉汤清热除烦、宽中行气。栀子豉汤清热除烦，枳实行气消痞。若有宿食加大黄。", "contraindication": "", "keywords": "枳实栀子豉汤,劳复"}, {"id": 394, "source": "伤寒论", "article_number": "394", "liujing": "差后劳复", "chapter": "辨阴阳易差后劳复病脉证并治", "original_text": "伤寒差以后，更发热，小柴胡汤主之。脉浮者，以汗解之。脉沉实者，以下解之。", "tags": "伤寒差后,更发热,脉浮,脉沉实", "formula": "小柴胡汤", "formula_detail": "柴胡半斤、黄芩三两、人参三两、半夏半升(洗)、甘草三两(炙)、生姜三两(切)、大枣十二枚(擘)", "ni_annotation": "伤寒差后更发热，若为少阳不和者，小柴胡汤和解之。脉浮为表邪未解，当以汗解。脉沉实为里实，当以下解。当据脉证辨证施治。", "contraindication": "", "keywords": "差后更发热,小柴胡汤"}, {"id": 395, "source": "伤寒论", "article_number": "395", "liujing": "差后劳复", "chapter": "辨阴阳易差后劳复病脉证并治", "original_text": "大病差后，从腰以下有水气者，牡蛎泽泻散主之。", "tags": "大病差后,腰以下有水气,水肿", "formula": "牡蛎泽泻散", "formula_detail": "牡蛎(熬)、泽泻、蜀漆(暖水洗去腥)、葶苈子(熬)、商陆根(熬)、海藻(洗去咸)、栝蒌根各等分", "ni_annotation": "大病差后，脾肾虚弱，水湿泛溢于下，故腰以下有水气。牡蛎泽泻散逐水清热、软坚散结。方中泽泻葶苈子商陆根逐水消肿，牡蛎海藻软坚散结，蜀漆祛痰截水，栝蒌根生津止渴以防水伤津液。此方攻逐水饮之力较强，体虚者慎用。", "contraindication": "体虚者慎用", "keywords": "牡蛎泽泻散,腰以下水肿"}, {"id": 396, "source": "伤寒论", "article_number": "396", "liujing": "差后劳复", "chapter": "辨阴阳易差后劳复病脉证并治", "original_text": "大病差后，喜唾，久不了了，胸上有寒，当以丸药温之，宜理中丸。", "tags": "大病差后,喜唾,胸上有寒", "formula": "理中丸", "formula_detail": "人参三两、干姜三两、甘草三两(炙)、白术三两", "ni_annotation": "大病差后脾胃虚寒，脾虚不能摄津，寒饮停于胸中，故喜唾不止。理中丸温中散寒、健脾摄津。", "contraindication": "", "keywords": "理中丸,喜唾,胸上有寒"}, {"id": 397, "source": "伤寒论", "article_number": "397", "liujing": "差后劳复", "chapter": "辨阴阳易差后劳复病脉证并治", "original_text": "伤寒解后，虚羸少气，气逆欲吐，竹叶石膏汤主之。", "tags": "伤寒解后,虚羸少气,气逆欲吐", "formula": "竹叶石膏汤", "formula_detail": "竹叶二把、石膏一斤、半夏半升(洗)、麦门冬一升(去心)、人参二两、甘草二两(炙)、粳米半升", "ni_annotation": "伤寒解后，余热未清，气阴两伤。虚羸少气为气阴不足，气逆欲吐为余热犯胃。竹叶石膏汤清热生津、益气和胃。竹叶石膏清余热，麦门冬人参甘草粳米益气养阴生津，半夏降逆止呕。倪师认为此方为热病后期余热未清气阴两伤之专方。", "contraindication": "", "keywords": "竹叶石膏汤,虚羸少气,气逆欲吐"}, {"id": 398, "source": "伤寒论", "article_number": "398", "liujing": "差后劳复", "chapter": "辨阴阳易差后劳复病脉证并治", "original_text": "病人脉已解，而日暮微烦，以病新差，人强与谷，脾胃气尚弱，不能消谷，故令微烦，损谷则愈。", "tags": "脉已解,日暮微烦,病新差,脾胃气弱,不能消谷,损谷则愈", "formula": "", "formula_detail": "", "ni_annotation": "病后脉已平和，但日暮微烦，因大病初愈，脾胃尚弱，勉强进食则不能消化，谷气郁滞而生烦热。不需用药，减少饮食（损谷）即可自愈。此论病后调养之法。", "contraindication": "", "keywords": "损谷则愈,病后调养,日暮微烦"}, {"id": 399, "source": "金匮要略", "article_number": "1-1", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "问曰：上工治未病，何也？师曰：夫治未病者，见肝之病，知肝传脾，当先实脾，四季脾旺不受邪，即勿补之。中工不晓相传，见肝之病，不解实脾，惟治肝也。夫肝之病，补用酸，助用焦苦，益用甘味之药调之。酸入肝，焦苦入心，甘入脾。脾能伤肾，肾气微弱，则水不行；水不行，则心火气盛，则伤肺；肺被伤，则金气不行；金气不行，则肝气盛，则肝自愈。此治肝补脾之要妙也。肝虚则用此法，实则不在用之。经曰：虚虚实实，补不足，损有余，是其义也。余脏准此。", "tags": "治未病,肝病传脾,当先实脾,五行生克,虚虚实实", "formula": "", "formula_detail": "", "ni_annotation": "上工治未病是中医最高境界。见肝有病，要知道肝病必传脾，所以先强脾来截断传变。四季脾旺时不需补，中工不懂这个道理，只知治肝。肝虚用酸补之、焦苦助之、甘味调之，这是五行生克的妙用。虚则补之，实则泻之，此虚虚实实之要义，五脏病皆可类推。", "contraindication": "肝实者不可用此法", "keywords": "治未病,肝病传脾,实脾,五行,上工"}, {"id": 400, "source": "金匮要略", "article_number": "1-2", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "夫人禀五常，因风气而生长。风气虽能生万物，亦能害万物，如水能浮舟，亦能覆舟。若五脏元真通畅，人即安和。客气邪风，中人多死。千般疢难，不越三条：一者，经络受邪，入脏腑，为内所因也；二者，四肢九窍，血脉相传，壅塞不通，为外皮肤所中也；三者，房室、金刃、虫兽所伤。以此详之，病由都尽。若人能养慎，不令邪风干忤经络；适中经络，未流传脏腑，即医治之；四肢才觉重滞，即导引、吐纳、针灸、膏摩，勿令九窍闭塞；更能无犯王法、禽兽灾伤，房室勿令竭乏，服食节其冷热苦酸辛甘，不遗形体有衰，病则无由入其腠理。腠者，是三焦通会元真之处，为血气所注；理者，是皮肤脏腑之文理也。", "tags": "千般疢难,三条病因,元真通畅,病由都尽,养慎防病", "formula": "", "formula_detail": "", "ni_annotation": "张仲景将千般病难归纳为三条：内因是经络受邪入脏腑；外因是四肢九窍血脉壅塞；不内外因是房室金刃虫兽所伤。三个病因全涵盖。养生防病关键在养慎，不让邪风侵犯经络，稍有不适即早治，配合导引吐纳针灸膏摩。腠理是三焦元真通会之处，保持通畅则邪不可干。", "contraindication": "", "keywords": "三条病因,千般疢难,经络受邪,养慎,腠理"}, {"id": 401, "source": "金匮要略", "article_number": "1-3", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "问曰：病人有气色见于面部，愿闻其说。师曰：鼻头色青，腹中痛，苦冷者死；鼻头色微黑者，有水气；色黄者，胸上有寒；色白者，亡血也。设微赤非时者，死。其目正圆者，痉，不治。又色青为痛，色黑为劳，色赤为风，色黄者便难，色鲜明者有留饮。", "tags": "面部气色,望诊,鼻头色青,目正圆,色诊", "formula": "", "formula_detail": "", "ni_annotation": "望诊看面部气色极为重要。鼻头对应脾，色青为肝克脾，腹痛苦冷者将死；色微黑为水气；色黄为胸有寒；色白为亡血。非时微赤是虚阳外越之死证。目正圆瞪大是痉病危候。色青为痛、黑为劳、赤为风、黄为便难、鲜明为留饮。望色即知病位病性，此乃望诊精髓。", "contraindication": "", "keywords": "望诊,面部气色,鼻头,目正圆,色诊"}, {"id": 402, "source": "金匮要略", "article_number": "1-4", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "师曰：病人语声寂然喜惊呼者，骨节间病；语声喑喑然不彻者，心膈间病；语声啾啾然细而长者，头中病。", "tags": "闻诊,语声,骨节间病,心膈间病,头中病", "formula": "", "formula_detail": "", "ni_annotation": "闻诊听声辩病：突然寂静又突然惊呼是骨节间病，因动则痛剧故惊呼；声音低沉不响亮是心膈间病，胸中气机不畅；声音细小而绵长是头中病，高声则震动头部而痛。倪师说闻其声而知其病，此乃闻诊之要。", "contraindication": "", "keywords": "闻诊,语声,骨节,心膈,头中病"}, {"id": 403, "source": "金匮要略", "article_number": "1-5", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "师曰：息摇肩者，心中坚；息引胸中上气者，咳；息张口短气者，肺痿唾沫。", "tags": "望诊,呼吸,息摇肩,心中坚,肺痿", "formula": "", "formula_detail": "", "ni_annotation": "呼吸状态反映脏腑病变：呼吸时两肩耸动是心中坚满，气机壅塞；吸气引动胸中气上逆者为咳嗽；张口呼吸而短气是肺痿，津液枯竭肺叶枯萎，口中吐涎沫。倪师强调看病人呼吸即可知病在何处，此理甚简。", "contraindication": "", "keywords": "呼吸,息摇肩,肺痿,心中坚,望诊"}, {"id": 404, "source": "金匮要略", "article_number": "1-6", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "师曰：吸而微数，其病在中焦，实也，当下之即愈；虚者不治。在上焦者，其吸促；在下焦者，其吸远，此皆难治。呼吸动摇振振者，不治。", "tags": "呼吸,中焦,吸促,吸远,虚实", "formula": "", "formula_detail": "", "ni_annotation": "吸气微数是病在中焦，实则当下之，虚者难治。上焦病吸气短促，下焦病吸气深远，皆为难治。呼吸时身体动摇振振者，元气已脱，不治。此条讲呼吸与三焦部位的诊断关系，中焦实者可下，虚者及上焦下焦均难。", "contraindication": "虚者不可下", "keywords": "呼吸,中焦,吸促,吸远,下法"}, {"id": 405, "source": "金匮要略", "article_number": "1-7", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "师曰：寸口脉动者，因其旺时而动，假令肝旺色青，四时各随其色。肝色青而反色白，非其时色脉，皆当病。", "tags": "寸口脉,四时色脉,非其时色脉,肝旺色青", "formula": "", "formula_detail": "", "ni_annotation": "寸口脉随四时而动，春肝旺应色青脉弦，夏心旺应色赤脉洪，秋肺旺应色白脉浮，冬肾旺应色黑脉沉。若肝旺反见白色，色脉与时令不符，则必当病。此色脉不合四时之说，为辨证重要依据。", "contraindication": "", "keywords": "寸口脉,四时,色脉,肝旺,脉象"}, {"id": 406, "source": "金匮要略", "article_number": "1-8", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "问曰：有未至而至，有至而不至，有至而不去，有至而太过，何谓也？师曰：冬至之后，甲子夜半少阳起，少阳之时阳始生，天得温和。以未得甲子，天因温和，此为未至而至也；以得甲子而天未温和，为至而不至也；以得甲子而天大寒不解，此为至而不去也；以得甲子而天温如盛夏五六月时，此为至而太过也。", "tags": "未至而至,至而不至,至而不去,至而太过,时令异常", "formula": "", "formula_detail": "", "ni_annotation": "四时气候异常是致病外因。冬至后六十日甲子夜半阳气始生，天应温和。未到甲子天已温是未至而至，阳气生发太过；到了甲子天不温是至而不至，阳气不足；天大寒不解是至而不去，寒邪滞留；天温如盛夏是至而太过。四时失序则人必病。", "contraindication": "", "keywords": "未至而至,时令异常,冬至,甲子,少阳"}, {"id": 407, "source": "金匮要略", "article_number": "1-9", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "师曰：病人脉浮者在前，其病在表；浮者在后，其病在里。腰痛背强不能行，必短气而极也。", "tags": "脉浮,表里辨证,腰痛背强,短气", "formula": "", "formula_detail": "", "ni_annotation": "寸脉浮病在表，尺脉浮病在里。此为以脉位定病位之法。腰痛背强不能行走，必然伴呼吸短气之极，肾虚不能纳气之故。倪师说脉浮在前（寸）和在後（尺）截然不同，一表一里，切不可混淆。", "contraindication": "", "keywords": "脉浮,表里,寸口,腰痛,短气"}, {"id": 408, "source": "金匮要略", "article_number": "1-10", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "问曰：经云'厥阳独行'，何谓也？师曰：此为有阳无阴，故称厥阳。", "tags": "厥阳独行,有阳无阴,阴阳离决", "formula": "", "formula_detail": "", "ni_annotation": "厥阳独行是有阳无阴之证。阴气衰败不能制阳，孤阳上越独行，类似戴阳证。此即阴阳离决之危候，必死。倪师常说阴阳平衡是生命根本，有阳无阴即是灯尽油枯，无力回天。", "contraindication": "", "keywords": "厥阳独行,有阳无阴,阴阳离决"}, {"id": 409, "source": "金匮要略", "article_number": "1-11", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "问曰：寸脉沉大而滑，沉则为实，滑则为气，实气相搏，血气入脏即死，入腑即愈，此为卒厥。何谓也？师曰：唇口青，身冷，为入脏即死；如身和，汗自出，为入腑即愈。", "tags": "寸脉沉大而滑,卒厥,入脏即死,入腑即愈,唇口青", "formula": "", "formula_detail": "", "ni_annotation": "寸脉沉大而滑为卒厥之脉象。沉为血实，滑为气实，实气相搏。血气入脏则唇口青身冷即死，因脏藏而不泻；入腑则身和汗出即愈，因腑泻而不藏。倪师说卒厥当下之，入腑者可治，入脏者难。", "contraindication": "", "keywords": "卒厥,入脏入腑,寸脉沉大而滑,唇口青"}, {"id": 410, "source": "金匮要略", "article_number": "1-12", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "问曰：脉脱入脏即死，入腑即愈，何谓也？师曰：非为一病，百病皆然。譬如浸淫疮，从口起流向四肢者，可治；从四肢流来入口者，不可治。病在外者可治，入里者即死。", "tags": "脉脱,入脏即死,入腑即愈,浸淫疮,病向浅深", "formula": "", "formula_detail": "", "ni_annotation": "百病皆同此理：病邪由内向外走则可治，由外向内入则死。浸淫疮从口流向四肢是由里出表，可治；从四肢流向口是由表入里，不可治。此辨病势顺逆之法，推之百病皆然。倪师教人看病的走向来判断预后。", "contraindication": "", "keywords": "脉脱,浸淫疮,入脏入腑,病向浅深,预后"}, {"id": 411, "source": "金匮要略", "article_number": "1-13", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "问曰：阳病十八，何谓也？师曰：头痛、项、腰、脊、臂、脚掣痛。阴病十八，何谓也？师曰：咳、上气、喘、哕、咽、肠鸣、胀满、心痛、拘急。五脏病各有十八，合为九十病。人又有六微，微有十八病，合为一百八病。五劳、七伤、六极、妇人三十六病，不在其中。清邪居上，浊邪居下，大邪中表，小邪中里，馨饪之邪，从口入者，宿食也。五邪中人，各有法度，风中于前，寒中于暮，湿伤于下，雾伤于上，风令脉浮，寒令脉急，雾伤皮腠，湿流关节，食伤脾胃，极寒伤经，极热伤络。", "tags": "阳病十八,阴病十八,五邪中人,五劳七伤,宿食", "formula": "", "formula_detail": "", "ni_annotation": "张仲景将疾病系统分类：阳病十八在头项腰脊臂脚；阴病十八在咳喘哕咽等；五脏各十八合九十病；六微一百零八；五劳七伤六极妇人病另计。五邪中人有法度：风在前寒在暮，湿伤下雾伤上，食伤脾胃，极寒伤经极热伤络。此疾病分类学之祖。", "contraindication": "", "keywords": "阳病十八,阴病十八,五邪中人,宿食,疾病分类"}, {"id": 412, "source": "金匮要略", "article_number": "1-14", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "问曰：病有急当救里救表者，何谓也？师曰：病，医下之，续得下利清谷不止，身体疼痛者，急当救里；后身体疼痛，清便自调者，急当救表也。", "tags": "救里救表,标本缓急,下利清谷,身体疼痛", "formula": "", "formula_detail": "", "ni_annotation": "治病有先后缓急。误下后下利清谷不止兼身体疼痛，当先救里用四逆汤，因里气虚急，不救里则亡阳；待清便自调后再治表之身体疼痛。此为标本缓急之铁律：急则治其标，实则先里后表。", "contraindication": "", "keywords": "救里救表,标本缓急,四逆汤,下利清谷"}, {"id": 413, "source": "金匮要略", "article_number": "1-15", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "夫病痼疾，加以卒病，当先治其卒病，后乃治其痼疾也。", "tags": "痼疾,卒病,新旧缓急,先治新病", "formula": "", "formula_detail": "", "ni_annotation": "痼疾是旧病，卒病是新病。有新病旧病同时存在时，当先治新病后治旧病。因新病势急易治易传变，旧病势缓难愈，此为治病先后次序的铁律。倪师常说此乃临床大原则，万不可违。", "contraindication": "", "keywords": "痼疾,卒病,先后缓急,新旧病"}, {"id": 414, "source": "金匮要略", "article_number": "1-16", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "师曰：五脏病各有所得者愈，五脏病各有所恶，各随其所不喜者为病。病者素不应食，而反暴思之，必发热也。", "tags": "五脏所得,五脏所恶,暴思饮食,发热", "formula": "", "formula_detail": "", "ni_annotation": "五脏病各有其所适宜的条件则愈，各有其所厌恶的条件则加重。五脏各随其不喜而为病。病人平时不应吃的东西突然想吃，是脏气将绝之象，必发热，乃回光返照之征。倪师教人注意病人饮食喜好的突变。", "contraindication": "", "keywords": "五脏所得,五脏所恶,暴思饮食,脏气将绝"}, {"id": 415, "source": "金匮要略", "article_number": "1-17", "liujing": "脏腑经络", "chapter": "脏腑经络先后病脉证第一", "original_text": "夫诸病在脏，欲攻之，当随其所得而攻之。如渴者，与猪苓汤。余皆仿此。", "tags": "脏腑攻邪,随所得而攻,猪苓汤,渴证", "formula": "猪苓汤", "formula_detail": "猪苓、茯苓、泽泻、滑石、阿胶", "ni_annotation": "五脏有病要用攻法时，当随其所得之邪而攻之。例如渴而小便不利，是水热互结，与猪苓汤利水清热养阴。不得其邪而妄攻，反伤正气。倪师说攻邪须有针对性，见是何邪即以何药攻之，此因势利导之法。", "contraindication": "非水热互结之渴不可用猪苓汤", "keywords": "猪苓汤,随所得而攻,渴,攻邪,脏腑"}, {"id": 416, "source": "金匮要略", "article_number": "2-1", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "太阳病，发热无汗，反恶寒者，名曰刚痉。", "tags": "刚痉,太阳病,发热无汗,恶寒", "formula": "葛根汤", "formula_detail": "葛根四两、麻黄三两(去节)、桂枝二两(去皮)、芍药二两、甘草二两(炙)、生姜三两、大枣十二枚", "ni_annotation": "刚痉属太阳表实证。发热无汗反恶寒是寒邪闭表，筋脉拘急而痉。用葛根汤发汗解表、升津舒筋。葛根是治痉之要药，能升津液达项背以濡养筋脉。倪师强调刚痉无汗必用麻黄配葛根，表解则痉自止。", "contraindication": "表虚有汗者禁用", "keywords": "刚痉,葛根汤,无汗,太阳病,恶寒"}, {"id": 417, "source": "金匮要略", "article_number": "2-2", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "太阳病，发热汗出，而不恶寒，名曰柔痉。", "tags": "柔痉,太阳病,发热汗出,不恶寒", "formula": "栝蒌桂枝汤", "formula_detail": "栝蒌根二两、桂枝三两、芍药三两、甘草二两、生姜三两、大枣十二枚", "ni_annotation": "柔痉属太阳表虚证。发热汗出不恶寒是风邪伤表，筋脉失养而痉。用栝蒌桂枝汤（即桂枝汤加栝蒌根）解肌发表、生津养筋。栝蒌根（天花粉）是生津止渴圣药，配桂枝汤调和营卫、生津舒筋两擅其功。", "contraindication": "表实无汗不可用", "keywords": "柔痉,栝蒌桂枝汤,汗出,太阳病,不恶寒"}, {"id": 418, "source": "金匮要略", "article_number": "2-3", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "太阳病，发热，脉沉而细者，名曰痉，为难治。", "tags": "痉病,脉沉而细,难治,太阳病", "formula": "", "formula_detail": "", "ni_annotation": "太阳病应脉浮，现脉沉而细是气血津液大亏之象。津液亏虚不能濡养筋脉则痉，此痉属虚证，非单纯解表可治，故曰难治。倪师说此条提示痉病有虚实之分，脉沉细者津液已伤，须滋阴养血为先。", "contraindication": "不可纯用汗法", "keywords": "痉病,脉沉而细,难治,津液亏虚"}, {"id": 419, "source": "金匮要略", "article_number": "2-4", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "太阳病，发汗太多，因致痉。", "tags": "过汗致痉,太阳病,津液伤", "formula": "", "formula_detail": "", "ni_annotation": "过度发汗伤津液，筋脉失其濡养则致痉。此告诫医者汗法必须适度，过汗伤津是痉病重要病因之一。倪师常说汗为心液，过汗不但伤津且伤心阳，筋脉失养必痉。", "contraindication": "不可再汗", "keywords": "过汗致痉,太阳病,伤津液,汗法"}, {"id": 420, "source": "金匮要略", "article_number": "2-5", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "夫风病，下之则痉，复发汗，必拘急。", "tags": "误下致痉,复发汗,拘急", "formula": "", "formula_detail": "", "ni_annotation": "风病当解表，反用下法伤津液则致痉，若再发汗更是雪上加霜，必致筋脉拘急。此条讲误治可致痉——下法伤阴、汗法伤阳，反复误治则津枯液竭筋脉拘急。倪师强调辨证准确是治疗前提。", "contraindication": "不可下、不可汗", "keywords": "误下致痉,风病,拘急,误治"}, {"id": 421, "source": "金匮要略", "article_number": "2-6", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "疮家虽身疼痛，不可发汗，汗出则痉。", "tags": "疮家,身疼痛,禁汗,汗出则痉", "formula": "", "formula_detail": "", "ni_annotation": "久患疮疡之人，营血已伤，虽有身疼痛之表证，亦不可发汗。因疮家本气血两虚，再发汗亡血伤津必致痉。倪师说疮家血虚在先，汗出复伤津液，筋脉何以为养？此血虚致痉之理。", "contraindication": "疮家禁汗", "keywords": "疮家,身疼痛,禁汗,血虚致痉"}, {"id": 422, "source": "金匮要略", "article_number": "2-7", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "病者身热足寒，颈项强急，恶寒，时头热，面赤，目赤，独头动摇，卒口噤，背反张者，痉病也。若发其汗者，寒湿相得，其表益虚，即恶寒甚；发其汗已，其脉如蛇。暴腹胀大者，为欲解。脉如故，反伏弦者，痉。", "tags": "身热足寒,颈项强急,头动摇,口噤,背反张", "formula": "", "formula_detail": "", "ni_annotation": "此条详述痉病证候：身热足寒、颈项强急、头热面赤目赤是阳热上壅；独头动摇、口噤、背反张是筋脉拘急。若误汗则寒湿相搏表更虚而恶寒甚，脉变曲如蛇行。暴腹胀大为邪有出路之欲解象。脉伏弦者为痉仍在。倪师说痉病关键在津液。", "contraindication": "", "keywords": "背反张,口噤,颈项强急,头动摇,痉病"}, {"id": 423, "source": "金匮要略", "article_number": "2-8", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "夫痉脉，按之紧如弦，直上下行。", "tags": "痉脉,紧如弦,直上下行", "formula": "", "formula_detail": "", "ni_annotation": "痉病的特征脉象：按之紧如琴弦，从寸到尺直上下行。此脉象反映筋脉拘急的状态。倪师说此脉与肝脉之弦不同，痉脉是紧急而直，乃筋急之象，诊脉时指下一目了然。", "contraindication": "", "keywords": "痉脉,紧如弦,直上下行,脉象"}, {"id": 424, "source": "金匮要略", "article_number": "2-9", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "痉病有灸疮，难治。", "tags": "痉病,灸疮,难治", "formula": "", "formula_detail": "", "ni_annotation": "痉病本已津液亏虚，再加上灸疮更耗气血津液，两虚相合，故曰难治。倪师说灸法虽好但不可用于痉病，灸疮伤津血，本已缺水不可再竭之。", "contraindication": "不可灸", "keywords": "痉病,灸疮,难治,津液亏虚"}, {"id": 425, "source": "金匮要略", "article_number": "2-10", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "太阳病，其证备，身体强，几几然，脉反沉迟，此为痉，栝蒌桂枝汤主之。", "tags": "身体强,几几然,脉沉迟,柔痉", "formula": "栝蒌桂枝汤", "formula_detail": "栝蒌根二两、桂枝三两、芍药三两、甘草二两、生姜三两、大枣十二枚", "ni_annotation": "太阳病证具而身体强直几几然，脉却反沉迟而非浮，此为柔痉。风邪在表故太阳证备，津液内亏故脉沉迟身强。用桂枝汤解肌和营卫，加栝蒌根生津濡筋。倪师说几几然就是僵硬不舒的感觉，栝蒌根是治此证的神药。", "contraindication": "", "keywords": "身体强,几几然,脉沉迟,栝蒌桂枝汤"}, {"id": 426, "source": "金匮要略", "article_number": "2-11", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "太阳病，无汗而小便反少，气上冲胸，口噤不得语，欲作刚痉，葛根汤主之。", "tags": "无汗,小便少,气上冲胸,口噤,欲作刚痉", "formula": "葛根汤", "formula_detail": "葛根四两、麻黄三两(去节)、桂枝二两(去皮)、芍药二两、甘草二两(炙)、生姜三两、大枣十二枚", "ni_annotation": "太阳病无汗而小便反少是津液已亏之兆，气上冲胸口噤不语是欲作刚痉。葛根汤中葛根升津液、麻黄开表、桂枝解肌，合而发汗不伤津，升津以濡筋。倪师说此是刚痉欲作之时，抓住时机用葛根汤可截断病势。", "contraindication": "表虚有汗者禁用", "keywords": "葛根汤,口噤,气上冲胸,刚痉,无汗"}, {"id": 427, "source": "金匮要略", "article_number": "2-12", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "痉为病，胸满口噤，卧不着席，脚挛急，必齘齿，可与大承气汤。", "tags": "胸满口噤,卧不着席,脚挛急,齘齿,阳明痉", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗)、厚朴半斤(炙去皮)、枳实五枚(炙)、芒硝三合", "ni_annotation": "此阳明里实热极致痉。胸满口噤是里热内壅，卧不着席、脚挛急是筋脉拘急之极，齘齿是阳明热盛咬牙。用大承气汤急下存阴，釜底抽薪，热去津回则痉自解。倪师说这是痉病中最重的一种，必须急下存阴，迟则不可救。", "contraindication": "里实未成不可用", "keywords": "大承气汤,胸满口噤,齘齿,卧不着席,阳明痉"}, {"id": 428, "source": "金匮要略", "article_number": "2-13", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "太阳病，关节疼痛而烦，脉沉而细者，此名湿痹。湿痹之候，小便不利，大便反快，但当利其小便。", "tags": "湿痹,关节疼痛,脉沉细,小便不利,大便反快", "formula": "", "formula_detail": "", "ni_annotation": "湿痹特征：关节疼痛而烦、脉沉细。湿邪内盛则小便不利，湿渗大肠则大便反快（溏）。治法当利其小便使湿有出路。倪师说湿痹关键在利小便，小便通则湿去，湿去则关节利，此给邪以出路之法。", "contraindication": "", "keywords": "湿痹,关节疼痛,利小便,大便反快,脉沉细"}, {"id": 429, "source": "金匮要略", "article_number": "2-14", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "湿家之为病，一身尽疼，发热，身色如熏黄也。", "tags": "湿家,一身尽疼,发热,身色如熏黄", "formula": "", "formula_detail": "", "ni_annotation": "湿邪为病一身尽疼而发热，身黄如烟熏之色，此湿郁发黄，非阳黄之橘色鲜明。湿家之黄晦暗如熏，乃湿胜热郁之象。倪师说此证当利湿清热并进，茵陈五苓散之类可用。", "contraindication": "", "keywords": "湿家,一身尽疼,身色如熏黄,湿郁发黄"}, {"id": 430, "source": "金匮要略", "article_number": "2-15", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "湿家，其人但头汗出，背强，欲得被覆向火。若下之早则哕，或胸满，小便不利，舌上如胎者，以丹田有热，胸上有寒，渴欲得饮而不能饮，则口燥烦也。", "tags": "但头汗出,背强,欲得被覆向火,丹田有热,胸上有寒", "formula": "", "formula_detail": "", "ni_annotation": "湿家但头汗出而背强喜温，是寒湿在表、阳气被郁之象。误下则伤胃致哕、胸满、小便不利。舌上如苔而口渴却不能饮，是寒热错杂——丹田（下焦）有热、胸上有寒。倪师说此证寒热交织最难辨，需分清上下寒热。", "contraindication": "不可下", "keywords": "但头汗出,背强,丹田有热,胸上有寒,湿家"}, {"id": 431, "source": "金匮要略", "article_number": "2-16", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "湿家下之，额上汗出，微喘，小便利者死；若下利不止者亦死。", "tags": "误下,额上汗出,微喘,小便利,死证", "formula": "", "formula_detail": "", "ni_annotation": "湿家误下是严重误治。额上汗出微喘是阳气上脱，小便利是阴气下脱，阴阳离决故死。下利不止也是中气败绝之死证。倪师说湿家最忌下法，下之则阳随汗脱、阴随利脱，此乃不治之死证。", "contraindication": "湿家绝对禁下", "keywords": "湿家误下,额上汗出,小便利,下利不止,死证"}, {"id": 432, "source": "金匮要略", "article_number": "2-17", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "风湿相搏，一身尽疼痛，法当汗出而解。值天阴雨不止，医云此可发汗。汗之病不愈者，何也？盖发其汗，汗大出者，但风气去，湿气在，是故不愈也。若治风湿者，发其汗，但微微似欲汗出者，风湿俱去也。", "tags": "风湿相搏,一身尽疼,微汗法,风湿俱去", "formula": "", "formula_detail": "", "ni_annotation": "风湿相搏一身尽疼当用汗法，但必须是微汗而非大汗。大汗出则风去湿留，因风性轻扬易去，湿性粘滞难除。微微似汗出，缓而持久，则风湿俱去。倪师反复强调治风湿之汗法在于微汗，绝不可大汗淋漓。", "contraindication": "不可大汗", "keywords": "风湿相搏,微汗法,风去湿留,一身尽疼"}, {"id": 433, "source": "金匮要略", "article_number": "2-18", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "湿家病身疼发热，面黄而喘，头痛鼻塞而烦，其脉大，自能饮食，腹中和无病，病在头中寒湿，故鼻塞，纳药鼻中则愈。", "tags": "头痛鼻塞,面黄而喘,头中寒湿,纳药鼻中", "formula": "", "formula_detail": "瓜蒂散纳鼻", "ni_annotation": "此湿在头中而非在脏腑。身疼发热面黄而喘头痛鼻塞，脉大，饮食如常腹中和，说明病在上不在下。寒湿在头中故鼻塞，用瓜蒂散纳鼻中取出黄水则愈。倪师说这就是鼻疗法，病在上取之上，不必内服药。", "contraindication": "", "keywords": "头中寒湿,鼻塞,纳药鼻中,瓜蒂散"}, {"id": 434, "source": "金匮要略", "article_number": "2-19", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "湿家身烦疼，可与麻黄加术汤，发其汗为宜，慎不可以火攻之。", "tags": "身烦疼,寒湿在表", "formula": "麻黄加术汤", "formula_detail": "麻黄三两(去节)、桂枝二两(去皮)、甘草一两(炙)、杏仁七十个(去皮尖)、白术四两", "ni_annotation": "寒湿在表一身烦疼，用麻黄加术汤微微发汗。麻桂杏甘即麻黄汤发散表寒，加白术四两健脾燥湿，使汗出表解而湿随汗去，且白术防止过汗伤正。倪师说此方妙在麻黄汤配大量白术，发汗而不伤脾，是治表湿之经典。", "contraindication": "忌火攻", "keywords": "麻黄加术汤,身烦疼,寒湿在表,微汗"}, {"id": 435, "source": "金匮要略", "article_number": "2-20", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "病者一身尽疼，发热，日晡所剧者，名风湿。此病伤于汗出当风，或久伤取冷所致也。可与麻黄杏仁薏苡甘草汤。", "tags": "一身尽疼,日晡所剧,风湿,汗出当风", "formula": "麻杏薏甘汤", "formula_detail": "麻黄半两(去节汤泡)、甘草一两(炙)、薏苡仁半两、杏仁十个(去皮尖炒)", "ni_annotation": "风湿在表一身尽疼而日晡加重。病因是汗出当风或久处寒湿。麻杏薏甘汤中麻黄微发汗、杏仁宣肺气、薏苡仁利湿、甘草和中，药量均轻，取其轻清宣化之意。倪师说此方与麻黄加术汤的区别在于此证偏风湿，故用薏仁不用白术。", "contraindication": "", "keywords": "麻杏薏甘汤,风湿,日晡所剧,一身尽疼,汗出当风"}, {"id": 436, "source": "金匮要略", "article_number": "2-21", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "风湿，脉浮，身重，汗出恶风者，防己黄芪汤主之。", "tags": "脉浮身重,汗出恶风,风湿表虚", "formula": "防己黄芪汤", "formula_detail": "防己一两、甘草半两(炒)、白术七钱半、黄芪一两一分(去芦)", "ni_annotation": "风湿在表而表虚不固——脉浮身重、汗出恶风。防己利水祛湿，黄芪白术固表健脾，甘草和中。此方治表虚湿盛，黄芪白术固表是防止风邪复入。倪师说此证关键在汗出恶风，表虚不固，故不用麻黄改用黄芪，固表与祛湿并进。", "contraindication": "表实无汗者不宜", "keywords": "防己黄芪汤,脉浮身重,汗出恶风,风湿表虚"}, {"id": 437, "source": "金匮要略", "article_number": "2-22", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "伤寒八九日，风湿相搏，身体疼烦，不能自转侧，不呕不渴，脉浮虚而涩者，桂枝附子汤主之；若大便坚，小便自利者，去桂加白术汤主之。", "tags": "身体疼烦,不能转侧,脉浮虚而涩,风湿相搏", "formula": "桂枝附子汤", "formula_detail": "桂枝四两(去皮)、附子三枚(炮去皮破)、生姜三两、大枣十二枚、甘草二两(炙)", "ni_annotation": "伤寒日久风湿相搏，身体疼烦不能转侧是风湿在表而阳气已虚。脉浮虚而涩正是风湿与阳虚并见。用桂枝附子汤温经散寒祛风除湿。若大便坚小便自利说明湿不在里，去桂加白术汤主之。倪师说此方附子用量极大，是治阳虚风湿重症之关键。", "contraindication": "", "keywords": "桂枝附子汤,不能转侧,风湿相搏,脉浮虚涩"}, {"id": 438, "source": "金匮要略", "article_number": "2-23", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "风湿相搏，骨节疼烦，掣痛不得屈伸，近之则痛剧，汗出短气，小便不利，恶风不欲去衣，或身微肿者，甘草附子汤主之。", "tags": "骨节疼烦,掣痛不得屈伸,汗出短气,恶风,身微肿", "formula": "甘草附子汤", "formula_detail": "甘草二两(炙)、白术二两、附子二枚(炮去皮)、桂枝四两(去皮)", "ni_annotation": "风湿深重侵及关节——掣痛不得屈伸、近之痛剧。汗出短气小便不利是阳虚水停，恶风不欲去衣是表阳虚。用甘草附子汤温阳散寒祛湿止痛。四药合用，附子温经、桂枝通阳、白术燥湿、甘草缓急，是治风湿关节重症之要方。", "contraindication": "", "keywords": "甘草附子汤,掣痛,不得屈伸,骨节疼烦"}, {"id": 439, "source": "金匮要略", "article_number": "2-24", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "太阳中暍，发热恶寒，身重而疼痛，其脉弦细芤迟。小便已，洒洒然毛耸，手足逆冷，小有劳，身即热，口开，前板齿燥。若发其汗，则恶寒甚；加温针，则发热甚；数下之，则淋甚。", "tags": "太阳中暍,发热恶寒,身重疼痛,脉弦细芤迟,齿燥", "formula": "", "formula_detail": "", "ni_annotation": "太阳中暍即中暑，症状复杂：发热恶寒似表证，身重疼痛似湿证，脉弦细芤迟是气阴两伤之脉。小便后寒栗、手足冷是阳气虚，小劳即热是阴虚内热，前板齿燥是津液枯。误汗则恶寒甚，温针则发热甚，数下则淋甚。倪师强调中暍非单纯清热可治，须兼顾气阴。", "contraindication": "禁汗、禁温针、禁下", "keywords": "太阳中暍,脉弦细芤迟,齿燥,中暑,气阴两伤"}, {"id": 440, "source": "金匮要略", "article_number": "2-25", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "太阳中热者，暍是也。汗出恶寒，身热而渴，白虎加人参汤主之。", "tags": "太阳中暍,汗出恶寒,身热而渴", "formula": "白虎加人参汤", "formula_detail": "知母六两、石膏一斤(碎)、甘草二两(炙)、粳米六合、人参三两", "ni_annotation": "中暍而汗出身热口渴，是暑热伤及阳明气分而气津两伤。白虎汤清热生津，加人参益气生津。倪师说中暑身热大汗口大渴，非白虎加人参不可，石膏清热、人参生津，暑热得清、气津得复则愈。", "contraindication": "表寒未解者慎用", "keywords": "白虎加人参汤,中暍,汗出恶寒,身热而渴"}, {"id": 441, "source": "金匮要略", "article_number": "2-26", "liujing": "痉湿暍", "chapter": "痉湿暍病脉证治第二", "original_text": "太阳中暍，身热疼重，而脉微弱，此以夏月伤冷水，水行皮中所致也。一物瓜蒂汤主之。", "tags": "太阳中暍,身热疼重,脉微弱,夏月伤冷水", "formula": "一物瓜蒂汤", "formula_detail": "瓜蒂二十个", "ni_annotation": "夏月贪凉伤冷水，水湿行于皮中，导致身热疼重而脉微弱。瓜蒂一味极苦，涌吐水湿，使皮中水气从上而出。倪师说这是中暑的特殊类型——暑天因冷水所致，水湿在表不在里，故用瓜蒂涌吐水湿而不是清热。", "contraindication": "失血虚家不可用", "keywords": "一物瓜蒂汤,夏月伤冷水,水行皮中,身热疼重"}, {"id": 442, "source": "金匮要略", "article_number": "3-1", "liujing": "百合狐惑", "chapter": "百合狐惑阴阳毒病脉证治第三", "original_text": "论曰：百合病者，百脉一宗，悉致其病也。意欲食复不能食，常默默，欲卧不能卧，欲行不能行，饮食或有美时，或有不用闻食臭时，如寒无寒，如热无热，口苦，小便赤，诸药不能治，得药则剧吐利，如有神灵者，身形如和，其脉微数。每溺时头痛者，六十日乃愈；若溺时头不痛，淅然者，四十日愈；若溺快然，但头眩者，二十日愈。其证或未病而预见，或病四五日而出，或病二十日，或一月后见者，各随证治之。", "tags": "百脉一宗,默然欲卧,口苦尿赤,如有神灵,脉微数", "formula": "", "formula_detail": "", "ni_annotation": "百合病是心肺阴虚内热之证。百脉一宗悉致其病，症状多样而怪异：欲食不能食、欲卧不能卧、口苦尿赤脉微数，形如常人却如有神灵附体，诸药不治。其病演变与小便时头部感觉相关。倪师说百合病类似于现代焦虑症抑郁症，必须养阴清热。", "contraindication": "", "keywords": "百合病,百脉一宗,口苦尿赤,如有神灵,脉微数"}, {"id": 443, "source": "金匮要略", "article_number": "3-2", "liujing": "百合狐惑", "chapter": "百合狐惑阴阳毒病脉证治第三", "original_text": "百合病，发汗后者，百合知母汤主之。", "tags": "百合病,发汗后,阴虚", "formula": "百合知母汤", "formula_detail": "百合七枚(擘)、知母三两(切)。先以水洗百合，渍一宿，当白沫出，去其水，更以泉水二升，煎取一升，去滓；别以泉水二升煎知母，取一升，去滓；后合和，煎取一升五合，分温再服", "ni_annotation": "百合病误汗后，津液更伤，虚热内生。百合清心润肺安神，知母清热除烦生津，两药合用养阴清热，是百合病误汗后之专方。倪师说百合是治百合病的灵魂药，其性微寒甘润，入心肺经，养阴安神独一无二。", "contraindication": "", "keywords": "百合知母汤,百合病,发汗后,养阴清热"}, {"id": 444, "source": "金匮要略", "article_number": "3-3", "liujing": "百合狐惑", "chapter": "百合狐惑阴阳毒病脉证治第三", "original_text": "百合病，下之后者，滑石代赭汤主之。", "tags": "百合病,下之后,阴虚", "formula": "滑石代赭汤", "formula_detail": "百合七枚(擘)、滑石三两(碎绵裹)、代赭石如弹丸大一枚(碎绵裹)", "ni_annotation": "百合病误下后伤阴，下焦阴虚而小便不利。百合养心肺之阴，滑石清热利尿，代赭石重镇降逆。此方针对误下导致的下焦阴伤气逆之证。倪师说误下伤阴则虚热上扰，代赭石重镇引热下行，滑石利小便引热外出。", "contraindication": "", "keywords": "滑石代赭汤,百合病,下之后,重镇降逆"}, {"id": 445, "source": "金匮要略", "article_number": "3-4", "liujing": "百合狐惑", "chapter": "百合狐惑阴阳毒病脉证治第三", "original_text": "百合病，吐之后者，百合鸡子汤主之。", "tags": "百合病,吐之后,阴虚", "formula": "百合鸡子汤", "formula_detail": "百合七枚(擘)、鸡子黄一枚", "ni_annotation": "百合病误吐后胃阴重伤。鸡子黄滋阴润燥、养胃安神，配百合养阴清热。此方药简力专，鸡子黄是血肉有情之品，滋阴之力非草木可比。倪师说吐后胃中空虚，鸡子黄最能填补胃阴，与百合共奏养阴安神之功。", "contraindication": "", "keywords": "百合鸡子汤,百合病,吐之后,鸡子黄"}, {"id": 446, "source": "金匮要略", "article_number": "3-5", "liujing": "百合狐惑", "chapter": "百合狐惑阴阳毒病脉证治第三", "original_text": "百合病，不经吐、下、发汗，病形如初者，百合地黄汤主之。", "tags": "百合病,未经误治,病形如初", "formula": "百合地黄汤", "formula_detail": "百合七枚(擘)、生地黄汁一升。以水洗百合渍一宿，当白沫出，去其水，更以泉水二升煎取一升，去滓，内地黄汁，煎取一升五合，分温再服。中病，勿更服。大便当如漆", "ni_annotation": "百合病未经误治，当用正治法——百合地黄汤。百合养心肺之阴，生地黄汁清热凉血养阴，两药合用是百合病之主方。服后大便如漆是地黄之色素排出，非便血。倪师说生地黄汁生用不制，凉血养阴之力最强，是百合病的正治方。", "contraindication": "中病勿更服", "keywords": "百合地黄汤,百合病,未经误治,生地黄汁"}, {"id": 447, "source": "金匮要略", "article_number": "3-6", "liujing": "百合狐惑", "chapter": "百合狐惑阴阳毒病脉证治第三", "original_text": "百合病，一月不解，变成渴者，百合洗方主之。", "tags": "百合病,一月不解,变成渴", "formula": "百合洗方", "formula_detail": "百合一升，以水一斗，渍之一宿，以洗身。洗已，食煮饼，勿以盐豉也", "ni_annotation": "百合病迁延一月不解而口渴，用百合洗方外洗皮肤，百合药气从皮毛入肺而止渴，洗后食淡煮饼助胃气，忌盐豉防其伤阴。倪师说此乃内外兼治之法，外洗亦可取效，可见百合药性神奇。", "contraindication": "", "keywords": "百合洗方,百合病,变成渴,外洗"}, {"id": 448, "source": "金匮要略", "article_number": "3-7", "liujing": "百合狐惑", "chapter": "百合狐惑阴阳毒病脉证治第三", "original_text": "百合病，渴不差者，栝蒌牡蛎散主之。", "tags": "百合病,渴不差", "formula": "栝蒌牡蛎散", "formula_detail": "栝蒌根、牡蛎(熬)等分，为细末，饮服方寸匕，日三服", "ni_annotation": "百合洗方后渴仍不解，是热甚津伤较重。栝蒌根生津止渴，牡蛎咸寒潜阳引热下行，散剂取效更速。倪师说栝蒌根是生津圣药，牡蛎咸能软坚、寒能清热，合用则渴自止。", "contraindication": "", "keywords": "栝蒌牡蛎散,百合病,渴不差,生津止渴"}, {"id": 449, "source": "金匮要略", "article_number": "3-8", "liujing": "百合狐惑", "chapter": "百合狐惑阴阳毒病脉证治第三", "original_text": "百合病，变发热者，百合滑石散主之。", "tags": "百合病,变发热", "formula": "百合滑石散", "formula_detail": "百合一两(炙)、滑石三两，为散，饮服方寸匕，日三服。当微利者，止服，热则除", "ni_annotation": "百合病阴虚而变发热，用百合养阴清热配滑石清热利湿。散剂轻清散热，微利则热从下解。倪师说滑石量大意在导热从小便出，百合量小重在养阴，发热是虚热非实热，故清热不用苦寒用甘淡利湿。", "contraindication": "微利则止服", "keywords": "百合滑石散,百合病,变发热,清热利湿"}, {"id": 450, "source": "金匮要略", "article_number": "3-9", "liujing": "百合狐惑", "chapter": "百合狐惑阴阳毒病脉证治第三", "original_text": "狐惑之为病，状如伤寒，默默欲眠，目不得闭，卧起不安，蚀于喉为惑，蚀于阴为狐。不欲饮食，恶闻食臭，其面目乍赤、乍黑、乍白。蚀于上部则声喝，甘草泻心汤主之。", "tags": "狐惑病,状如伤寒,蚀于喉,蚀于阴,面目乍赤乍黑乍白", "formula": "甘草泻心汤", "formula_detail": "甘草四两、黄芩三两、人参三两、干姜三两、黄连一两、大枣十二枚、半夏半升", "ni_annotation": "狐惑病即现代白塞氏综合征。口腔咽喉溃疡为惑，前后阴溃疡为狐。默默欲眠又不能眠、卧起不安、面色变幻无常，不欲饮食。甘草泻心汤重用甘草以解毒和中，芩连清热燥湿，参姜枣补中，半夏降逆。倪师说此方治狐惑在清热解毒同时必须顾护脾胃。", "contraindication": "", "keywords": "狐惑病,甘草泻心汤,蚀于喉,蚀于阴,白塞氏病"}, {"id": 451, "source": "金匮要略", "article_number": "3-10", "liujing": "百合狐惑", "chapter": "百合狐惑阴阳毒病脉证治第三", "original_text": "蚀于下部则咽干，苦参汤洗之。", "tags": "蚀于下部,咽干,狐惑", "formula": "苦参汤", "formula_detail": "苦参一升，以水一斗，煎取七升，去滓，熏洗，日三", "ni_annotation": "狐惑蚀于下部（前后阴溃疡）兼咽干，用苦参汤外洗。苦参大苦大寒，清热燥湿杀虫，专治下焦湿热。内服甘草泻心汤，外用苦参汤，内外兼治。倪师说苦参是治湿热下注第一药，外用直达病所。", "contraindication": "脾胃虚寒者不宜内服", "keywords": "苦参汤,狐惑,蚀于下部,咽干,外洗"}, {"id": 452, "source": "金匮要略", "article_number": "3-11", "liujing": "百合狐惑", "chapter": "百合狐惑阴阳毒病脉证治第三", "original_text": "蚀于肛者，雄黄熏之。", "tags": "蚀于肛,狐惑,肛门溃疡", "formula": "雄黄熏方", "formula_detail": "雄黄一味，为末，筒瓦二枚合之，烧向肛熏之", "ni_annotation": "狐惑溃疡在肛门者，用雄黄烧烟熏之。雄黄辛温有毒，以毒攻毒，燥湿杀虫止痒，是治肛门溃疡之特效外用药。倪师说雄黄不可内服，只可外用，烧烟熏之取其药气直达患处。", "contraindication": "雄黄有毒，不可内服", "keywords": "雄黄,狐惑,蚀于肛,熏法,以毒攻毒"}, {"id": 453, "source": "金匮要略", "article_number": "3-12", "liujing": "百合狐惑", "chapter": "百合狐惑阴阳毒病脉证治第三", "original_text": "阳毒之为病，面赤斑斑如锦文，咽喉痛，唾脓血。五日可治，七日不可治，升麻鳖甲汤主之。", "tags": "阳毒,面赤斑斑如锦文,咽喉痛,唾脓血", "formula": "升麻鳖甲汤", "formula_detail": "升麻二两、当归一两、蜀椒(炒去汗)一两、甘草二两、鳖甲手指大一片(炙)、雄黄半两(研)", "ni_annotation": "阳毒是热毒深入血分，面赤如锦文是血热发斑，咽喉痛唾脓血是热毒上攻。升麻清热解毒透疹，鳖甲滋阴透邪，当归养血活血，甘草解毒和中，蜀椒雄黄以毒攻毒。倪师说阳毒须在五日内赶紧治疗，过七日邪深入则难治。", "contraindication": "", "keywords": "阳毒,升麻鳖甲汤,面赤斑斑,咽喉痛,唾脓血"}, {"id": 454, "source": "金匮要略", "article_number": "3-13", "liujing": "百合狐惑", "chapter": "百合狐惑阴阳毒病脉证治第三", "original_text": "阴毒之为病，面目青，身痛如被杖，咽喉痛。五日可治，七日不可治，升麻鳖甲汤去雄黄蜀椒主之。", "tags": "阴毒,面目青,身痛如被杖,咽喉痛", "formula": "升麻鳖甲汤去雄黄蜀椒", "formula_detail": "升麻二两、当归一两、甘草二两、鳖甲手指大一片(炙)", "ni_annotation": "阴毒面目青是血瘀寒凝，身痛如被杖是血行不畅，仍用升麻鳖甲汤但去辛温之蜀椒和雄黄，留下升麻解毒、鳖甲透邪、当归养血、甘草和中。倪师说阴阳毒同用一方而加减不同，可见仲景方之奥妙，热重用雄黄蜀椒，寒凝则去之。", "contraindication": "", "keywords": "阴毒,升麻鳖甲汤,面目青,身痛如被杖"}, {"id": 455, "source": "金匮要略", "article_number": "4-1", "liujing": "疟病", "chapter": "疟病脉证并治第四", "original_text": "师曰：疟脉自弦。弦数者多热，弦迟者多寒。弦小紧者下之差，弦迟者可温之，弦紧者可发汗针灸也，浮大者可吐之，弦数者风发也，以饮食消息止之。", "tags": "疟脉自弦,弦数多热,弦迟多寒,脉证合参", "formula": "", "formula_detail": "", "ni_annotation": "疟病的主脉是弦脉。弦而数为热多，弦而迟为寒多，弦小紧为可下之证，弦迟可温之，弦紧可汗可针灸，浮大可吐之，弦数为风邪引发。各随脉证而施治法。倪师说疟脉必弦是其根本，再根据兼脉分寒热虚实来确定治法，此为辨证精髓。", "contraindication": "", "keywords": "疟脉自弦,弦数多热,弦迟多寒,辨证"}, {"id": 456, "source": "金匮要略", "article_number": "4-2", "liujing": "疟病", "chapter": "疟病脉证并治第四", "original_text": "病疟，以月一日发，当以十五日愈，设不差，当月尽解；如其不差，当云何？师曰：此结为癥瘕，名曰疟母，急治之，宜鳖甲煎丸。", "tags": "疟母,癥瘕,脾大,疟久不愈", "formula": "鳖甲煎丸", "formula_detail": "鳖甲十二分(炙)、乌扇三分(烧)、黄芩三分、柴胡六分、鼠妇三分(熬)、干姜三分、大黄三分、芍药五分、桂枝三分、葶苈一分(熬)、石韦三分(去毛)、厚朴三分、牡丹五分(去心)、瞿麦二分、紫葳三分、半夏一分、人参一分、蜜虫五分(熬)、阿胶三分(炙)、蜂窠四分(炙)、赤硝十二分、蜣螂六分(熬)、桃仁二分", "ni_annotation": "疟病日久不愈，疟邪与气血痰瘀互结成癥瘕，位于左胁下即脾肿大，称为疟母。鳖甲煎丸用二十余味药，鳖甲软坚散结为主药，配活血化瘀、行气化痰、攻积消癥之品。倪师说此方是经方中最复杂之方，治肝脾肿大之癥瘕效果极佳。", "contraindication": "正气过虚者慎用", "keywords": "疟母,鳖甲煎丸,癥瘕,脾肿大,疟久不愈"}, {"id": 457, "source": "金匮要略", "article_number": "4-3", "liujing": "疟病", "chapter": "疟病脉证并治第四", "original_text": "阴气孤绝，阳气独发，则热而少气烦冤，手足热而欲呕，名曰瘅疟。若但热不寒者，邪气内藏于心，外舍分肉之间，令人消铄肌肉。", "tags": "瘅疟,但热不寒,少气烦冤,消铄肌肉", "formula": "", "formula_detail": "", "ni_annotation": "瘅疟是阴气孤绝、阳气独发之热疟。但热不寒，少气烦冤，手足热欲呕，消铄肌肉。此证阳气独盛，阴气消亡，邪气内藏于心而外舍于分肉。倪师说瘅疟必重用清热养阴，否则肌肉消铄迅速，预后极差。", "contraindication": "", "keywords": "瘅疟,但热不寒,少气烦冤,消铄肌肉"}, {"id": 458, "source": "金匮要略", "article_number": "4-4", "liujing": "疟病", "chapter": "疟病脉证并治第四", "original_text": "温疟者，其脉如平，身无寒但热，骨节疼烦，时呕，白虎加桂枝汤主之。", "tags": "温疟,但热不寒,骨节疼烦,时呕", "formula": "白虎加桂枝汤", "formula_detail": "知母六两、甘草二两(炙)、石膏一斤、粳米二合、桂枝三两(去皮)", "ni_annotation": "温疟身无寒但热、骨节疼烦、时呕，脉如平人。白虎汤清阳明大热，加桂枝解肌通络以治骨节疼烦。倪师说温疟热在阳明而兼表邪郁于骨节，白虎清热、桂枝通阳，寒温并用各走其道。", "contraindication": "寒疟不可用", "keywords": "温疟,白虎加桂枝汤,但热不寒,骨节疼烦"}, {"id": 459, "source": "金匮要略", "article_number": "4-5", "liujing": "疟病", "chapter": "疟病脉证并治第四", "original_text": "疟多寒者，名曰牡疟，蜀漆散主之。", "tags": "牡疟,多寒,寒疟", "formula": "蜀漆散", "formula_detail": "蜀漆(洗去腥)、云母(烧二日夜)、龙骨等分，杵为散，未发前以浆水服半钱。温疟加蜀漆半分，临发时服一钱匕", "ni_annotation": "牡疟以寒多为主，是痰饮内伏、阳气被阻。蜀漆（常山苗）涌吐痰饮截疟为君，云母龙骨安神镇惊化痰。未发前服用取截疟之机。倪师说蜀漆是治疟专药，必须在发作前服用方可截断，因势利导。", "contraindication": "虚证不宜", "keywords": "牡疟,蜀漆散,多寒,截疟,未发前服"}, {"id": 460, "source": "金匮要略", "article_number": "5-1", "liujing": "中风历节", "chapter": "中风历节病脉证并治第五", "original_text": "夫风之为病，当半身不遂，或但臂不遂者，此为痹。脉微而数，中风使然。", "tags": "半身不遂,中风,脉微而数,痹", "formula": "", "formula_detail": "", "ni_annotation": "中风病以半身不遂为特征，若仅臂不遂则为痹证非中风。脉微而数是气血虚而风邪乘虚入中之象。倪师说区分中风与痹证关键在范围——半身是中风，单臂是痹，二者病机不同治法各异。", "contraindication": "", "keywords": "半身不遂,中风,脉微而数,痹"}, {"id": 461, "source": "金匮要略", "article_number": "5-2", "liujing": "中风历节", "chapter": "中风历节病脉证并治第五", "original_text": "寸口脉浮而紧，紧则为寒，浮则为虚；寒虚相搏，邪在皮肤。浮者血虚，络脉空虚，贼邪不泻，或左或右；邪气反缓，正气即急，正气引邪，㖞僻不遂。邪在于络，肌肤不仁；邪在于经，即重不胜；邪入于腑，即不识人；邪入于脏，舌即难言，口吐涎。", "tags": "中经络,中脏腑,口眼歪斜,半身不遂,不识人", "formula": "", "formula_detail": "", "ni_annotation": "中风的病机层次：寸口脉浮紧，虚寒相搏是血虚受寒，络脉空虚而贼邪不泻。正气引邪则口眼歪斜。分四个层次：邪在络则肌肤不仁（麻），在经则重不胜（半身不遂），入腑则不识人（昏迷但能言），入脏则舌难言口吐涎（最重）。倪师说中脏腑最危，必须立刻开窍。", "contraindication": "", "keywords": "中经络,中脏腑,口眼歪斜,不识人,舌难言"}, {"id": 462, "source": "金匮要略", "article_number": "5-3", "liujing": "中风历节", "chapter": "中风历节病脉证并治第五", "original_text": "侯氏黑散：治大风，四肢烦重，心中恶寒不足者。", "tags": "大风,四肢烦重,心中恶寒", "formula": "侯氏黑散", "formula_detail": "菊花四十分、白术十分、细辛三分、茯苓三分、牡蛎三分、桔梗八分、防风十分、人参三分、矾石三分、黄芩五分、当归三分、干姜三分、川芎三分、桂枝三分", "ni_annotation": "侯氏黑散治大风虚风内动之重证。四肢烦重是风邪闭阻经脉，心中恶寒不足是阳虚。方中重用菊花四十分清头明目，配防风祛风，参术苓补脾，桂枝川芎温通血脉，牡蛎镇潜，矾石化痰。倪师说此方菊花独重，意在制头面之风。", "contraindication": "", "keywords": "侯氏黑散,大风,四肢烦重,心中恶寒"}, {"id": 463, "source": "金匮要略", "article_number": "5-4", "liujing": "中风历节", "chapter": "中风历节病脉证并治第五", "original_text": "寸口脉迟而缓，迟则为寒，缓则为虚；营缓则为亡血，卫缓则为中风。邪气中经，则身痒而瘾疹；心气不足，邪气入中，则胸满而短气。", "tags": "脉迟缓,营缓亡血,卫缓中风,瘾疹,胸满短气", "formula": "风引汤", "formula_detail": "大黄四两、干姜四两、龙骨四两、桂枝三两、甘草二两、牡蛎二两、寒水石六两、滑石六两、赤石脂六两、白石脂六两、紫石英六两、石膏六两", "ni_annotation": "脉迟而缓是寒与虚。营血缓是亡血，卫气缓是中风。邪中经则身痒瘾疹，入中则胸满短气。风引汤重用金石之品镇肝熄风清热，大黄泻热，龙牡潜降，三色石脂固涩，寒滑石膏清热。倪师说此方以金石之重镇制风之轻扬，是治热瘫痫之要方。", "contraindication": "", "keywords": "风引汤,脉迟缓,瘾疹,胸满短气,镇肝熄风"}, {"id": 464, "source": "金匮要略", "article_number": "5-5", "liujing": "中风历节", "chapter": "中风历节病脉证并治第五", "original_text": "防己地黄汤：治病如狂状，妄行，独语不休，无寒热，其脉浮。", "tags": "如狂,妄行,独语不休,中风如狂", "formula": "防己地黄汤", "formula_detail": "防己一分、桂枝三分、防风三分、甘草一分。上四味，以酒一杯，渍之一宿，绞取汁。生地黄二斤㕮咀蒸之如斗米饭久，绞汁，和上药汁，分再服", "ni_annotation": "中风后如狂妄行独语不休，是血虚生风、风火上扰心神。生地黄重用二斤凉血滋阴，防己防风祛风，桂枝通阳，酒渍助药力。倪师说此方重用生地，意在凉血养血以熄风，血行风自灭，如狂自止。", "contraindication": "", "keywords": "防己地黄汤,如狂,妄行,独语不休"}, {"id": 465, "source": "金匮要略", "article_number": "5-6", "liujing": "中风历节", "chapter": "中风历节病脉证并治第五", "original_text": "头风摩散方：大附子一枚(炮)、盐等分。上二味为散，沐了，以方寸匕，已摩疾上，令药力行。", "tags": "头风,头痛", "formula": "头风摩散", "formula_detail": "大附子一枚(炮)、盐等分，为散，沐头后以散摩患处", "ni_annotation": "头风即发作性头痛，用头风摩散外治。炮附子温经散寒止痛，盐咸寒引药入肾，洗头后以散摩头痛处。倪师说此属外治法，附子外用温通经络治头风，方便效捷，尤宜于寒性头痛。", "contraindication": "皮肤破损不可用", "keywords": "头风摩散,头风,头痛,外治法"}, {"id": 466, "source": "金匮要略", "article_number": "5-7", "liujing": "中风历节", "chapter": "中风历节病脉证并治第五", "original_text": "寸口脉沉而弱，沉即主骨，弱即主筋，沉即为肾，弱即为肝。汗出入水中，如水伤心，历节黄汗出，故曰历节。", "tags": "脉沉弱,肝肾不足,历节,黄汗出", "formula": "", "formula_detail": "", "ni_annotation": "历节病的病机：脉沉为骨病属肾，脉弱为筋病属肝，肝肾先虚是内因。汗出入水中，水湿伤心则发历节，关节疼痛出黄汗。内外因相合而发病。倪师说历节即痛风性关节炎，必须从肝肾论治，补肝肾祛风湿。", "contraindication": "", "keywords": "历节,脉沉弱,肝肾不足,黄汗出"}, {"id": 467, "source": "金匮要略", "article_number": "5-8", "liujing": "中风历节", "chapter": "中风历节病脉证并治第五", "original_text": "少阴脉浮而弱，弱则血不足，浮则为风，风血相搏，即疼痛如掣。盛人脉涩小，短气，自汗出，历节疼，不可屈伸，此皆饮酒汗出当风所致。", "tags": "历节疼,疼痛如掣,不可屈伸,饮酒汗出当风", "formula": "", "formula_detail": "", "ni_annotation": "少阴脉浮而弱，血不足而风邪乘之，风血相搏则掣痛。肥胖之人脉涩小是气虚湿盛，历节疼痛不可屈伸，病因饮酒汗出当风。倪师说此条指出饮食不节也是历节病因，喝酒多生湿热，汗出当风则风湿相合。", "contraindication": "", "keywords": "疼痛如掣,不可屈伸,饮酒汗出当风,历节疼"}, {"id": 468, "source": "金匮要略", "article_number": "5-9", "liujing": "中风历节", "chapter": "中风历节病脉证并治第五", "original_text": "诸肢节疼痛，身体魁羸，脚肿如脱，头眩短气，温温欲吐，桂枝芍药知母汤主之。", "tags": "肢节疼痛,身体魁羸,脚肿如脱,头眩短气", "formula": "桂枝芍药知母汤", "formula_detail": "桂枝四两、芍药三两、甘草二两、麻黄二两、生姜五两、白术五两、知母四两、防风四两、附子二枚(炮)", "ni_annotation": "此历节重症之主方。诸肢节疼痛、身体消瘦、脚肿如脱是风湿之极，头眩短气温温欲吐是气逆水停。桂枝芍药知母汤：麻桂防祛风散寒，术附温经除湿，知芍养阴清热，姜草和中降逆。倪师说这是痛风第一方，九味药各司其职，风湿寒热并调。", "contraindication": "", "keywords": "桂枝芍药知母汤,脚肿如脱,身体魁羸,历节重证"}, {"id": 469, "source": "金匮要略", "article_number": "5-10", "liujing": "中风历节", "chapter": "中风历节病脉证并治第五", "original_text": "味酸则伤筋，筋伤则缓，名曰泄。咸则伤骨，骨伤则痿，名曰枯。枯泄相搏，名曰断泄。营气不通，卫不独行，营卫俱微，三焦无所御，四属断绝，身体羸瘦，独足肿大，黄汗出，胫冷。假令发热，便为历节也。", "tags": "饮食伤筋伤骨,身体羸瘦,足肿大,黄汗出", "formula": "", "formula_detail": "", "ni_annotation": "饮食偏嗜也可致历节：过食酸伤筋则筋缓无力，过食咸伤骨则骨痿。筋骨俱伤则身体羸瘦独足肿大、黄汗出胫冷。若发热则为历节。倪师说饮食五味不可偏嗜，酸走筋咸走骨，偏嗜则伤，与现代代谢性关节炎理论一致。", "contraindication": "", "keywords": "伤筋伤骨,身体羸瘦,足肿大,黄汗出"}, {"id": 470, "source": "金匮要略", "article_number": "5-11", "liujing": "中风历节", "chapter": "中风历节病脉证并治第五", "original_text": "病历节不可屈伸，疼痛，乌头汤主之。", "tags": "历节,不可屈伸,寒湿历节", "formula": "乌头汤", "formula_detail": "麻黄三两、芍药三两、黄芪三两、甘草三两(炙)、川乌五枚(㕮咀以蜜二升煎取一升即出乌头)", "ni_annotation": "寒湿历节疼痛不可屈伸用乌头汤。川乌大辛大热，温经散寒止痛之力极强，以蜜煎制其毒并缓急止痛，麻黄散寒、黄芪固表益气助血行、芍药甘草缓急舒筋。倪师说乌头是治寒痹疼痛第一猛药，必须用蜜久煎去毒，药力直达关节深处。", "contraindication": "热痹及阴虚者禁用，乌头有毒必须久煎", "keywords": "乌头汤,历节,不可屈伸,寒湿痹,川乌"}, {"id": 471, "source": "金匮要略", "article_number": "6-1", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "问曰：血痹病从何得之？师曰：夫尊荣人，骨弱肌肤盛，重因疲劳汗出，卧不时动摇，加被微风，遂得之。但以脉自微涩，在寸口、关上小紧，宜针引阳气，令脉和紧去则愈。", "tags": "血痹病,尊荣人,骨弱肌肤盛,疲劳汗出,微风,脉微涩,寸口关上小紧", "formula": "", "formula_detail": "", "ni_annotation": "血痹病得之于尊荣人，骨弱肌肤盛，疲劳汗出，卧不时动摇，加被微风。脉微涩，寸口关上小紧，宜针引阳气。", "contraindication": "", "keywords": "血痹病,尊荣人,骨弱肌肤盛"}, {"id": 472, "source": "金匮要略", "article_number": "6-2", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "血痹，阴阳俱微，寸口关上微，尺中小紧，外证身体不仁，如风痹状，黄芪桂枝五物汤主之。", "tags": "血痹,阴阳俱微,寸口关上微,尺中小紧,身体不仁,如风痹状,黄芪桂枝五物汤", "formula": "黄芪桂枝五物汤", "formula_detail": "黄芪三两、芍药三两、桂枝三两、生姜六两、大枣十二枚", "ni_annotation": "血痹阴阳俱微，寸口关上微，尺中小紧，外证身体不仁如风痹状，黄芪桂枝五物汤主之。", "contraindication": "", "keywords": "血痹,身体不仁,黄芪桂枝五物汤"}, {"id": 473, "source": "金匮要略", "article_number": "6-3", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "夫男子平人，脉大为劳，极虚亦为劳。", "tags": "男子平人,脉大为劳,极虚亦为劳,虚劳病", "formula": "", "formula_detail": "", "ni_annotation": "男子平人，脉大为劳，极虚亦为劳。此为虚劳病之总纲。", "contraindication": "", "keywords": "男子平人,脉大为劳,极虚亦为劳"}, {"id": 474, "source": "金匮要略", "article_number": "6-4", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "男子面色薄者，主渴及亡血，卒喘悸，脉浮者，里虚也。", "tags": "男子面色薄,渴,亡血,卒喘悸,脉浮,里虚", "formula": "", "formula_detail": "", "ni_annotation": "男子面色薄，主渴及亡血，卒喘悸，脉浮者里虚也。", "contraindication": "", "keywords": "男子面色薄,渴,亡血"}, {"id": 475, "source": "金匮要略", "article_number": "6-5", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "男子脉虚沉弦，无寒热，短气里急，小便不利，面色白，时目瞑，兼衄，少腹满，此为劳使之然。", "tags": "男子脉虚沉弦,无寒热,短气里急,小便不利,面色白,时目瞑,衄,少腹满,劳", "formula": "", "formula_detail": "", "ni_annotation": "男子脉虚沉弦，无寒热，短气里急，小便不利，面色白，时目瞑兼衄，少腹满，此为劳使之然。", "contraindication": "", "keywords": "男子脉虚沉弦,短气里急,小便不利"}, {"id": 476, "source": "金匮要略", "article_number": "6-6", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "劳之为病，其脉浮大，手足烦，春夏剧，秋冬瘥，阴寒精自出，酸削不能行。", "tags": "劳之为病,脉浮大,手足烦,春夏剧秋冬瘥,阴寒精自出,酸削不能行", "formula": "", "formula_detail": "", "ni_annotation": "劳之为病，脉浮大，手足烦，春夏剧秋冬瘥，阴寒精自出，酸削不能行。", "contraindication": "", "keywords": "劳之为病,脉浮大,手足烦"}, {"id": 477, "source": "金匮要略", "article_number": "6-7", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "男子脉浮弱而涩，为无子，精气清冷。", "tags": "男子脉浮弱而涩,无子,精气清冷", "formula": "", "formula_detail": "", "ni_annotation": "男子脉浮弱而涩，为无子，精气清冷。", "contraindication": "", "keywords": "男子脉浮弱而涩,无子"}, {"id": 478, "source": "金匮要略", "article_number": "6-8", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "夫失精家，少腹弦急，阴头寒，目眩，发落，脉极虚芤迟，为清谷、亡血、失精。脉得诸芤动微紧，男子失精，女子梦交，桂枝加龙骨牡蛎汤主之。", "tags": "失精家,少腹弦急,阴头寒,目眩,发落,脉极虚芤迟,清谷亡血失精,芤动微紧,男子失精,女子梦交,桂枝加龙骨牡蛎汤", "formula": "桂枝加龙骨牡蛎汤", "formula_detail": "桂枝、芍药、生姜各三两、甘草二两、大枣十二枚、龙骨三两、牡蛎三两", "ni_annotation": "失精家少腹弦急，阴头寒，目眩发落，脉极虚芤迟，为清谷亡血失精。脉得诸芤动微紧，男子失精女子梦交，桂枝加龙骨牡蛎汤主之。", "contraindication": "", "keywords": "失精家,男子失精,女子梦交,桂枝加龙骨牡蛎汤"}, {"id": 479, "source": "金匮要略", "article_number": "6-9", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "天雄散方：天雄三两（炮）、白术八两、桂枝六两、龙骨三两。右四味，杵为散，酒服半钱匕，日三服，不知，稍增之。", "tags": "天雄散,天雄,白术,桂枝,龙骨,虚劳", "formula": "天雄散", "formula_detail": "天雄三两（炮）、白术八两、桂枝六两、龙骨三两", "ni_annotation": "天雄散：天雄三两炮、白术八两、桂枝六两、龙骨三两。杵为散，酒服半钱匕，日三服。", "contraindication": "", "keywords": "天雄散,天雄,白术"}, {"id": 480, "source": "金匮要略", "article_number": "6-10", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "男子平人，脉虚弱细微者，喜盗汗也。", "tags": "男子平人,脉虚弱细微,喜盗汗", "formula": "", "formula_detail": "", "ni_annotation": "男子平人，脉虚弱细微者，喜盗汗也。", "contraindication": "", "keywords": "男子平人,脉虚弱细微,盗汗"}, {"id": 481, "source": "金匮要略", "article_number": "6-11", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "人年五六十，其病脉大者，痹侠背行，若肠鸣，马刀侠瘿者，皆为劳得之。", "tags": "人年五六十,病脉大,痹侠背行,肠鸣,马刀侠瘿,劳得之", "formula": "", "formula_detail": "", "ni_annotation": "人年五六十，其病脉大者，痹侠背行，若肠鸣，马刀侠瘿者，皆为劳得之。", "contraindication": "", "keywords": "人年五六十,病脉大,痹侠背行"}, {"id": 482, "source": "金匮要略", "article_number": "6-12", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "脉沉小迟，名脱气，其人疾行则喘喝，手足逆寒，腹满，甚则溏泄，食不消化也。", "tags": "脉沉小迟,脱气,疾行则喘喝,手足逆寒,腹满,溏泄,食不消化", "formula": "", "formula_detail": "", "ni_annotation": "脉沉小迟名脱气，其人疾行则喘喝，手足逆寒腹满，甚则溏泄食不消化也。", "contraindication": "", "keywords": "脉沉小迟,脱气,疾行则喘喝"}, {"id": 483, "source": "金匮要略", "article_number": "6-13", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "脉弦而大，弦则为减，大则为芤，减则为寒，芤则为虚，虚寒相搏，此名为革。妇人则半产漏下，男子则亡血失精。", "tags": "脉弦而大,弦则为减,大则为芤,减则为寒,芤则为虚,虚寒相搏,革脉,妇人半产漏下,男子亡血失精", "formula": "", "formula_detail": "", "ni_annotation": "脉弦而大，弦则为减大则为芤，减则为寒芤则为虚，虚寒相搏此名为革。妇人则半产漏下，男子则亡血失精。", "contraindication": "", "keywords": "脉弦而大,革脉,半产漏下,亡血失精"}, {"id": 484, "source": "金匮要略", "article_number": "6-14", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "虚劳里急，悸，衄，腹中痛，梦失精，四肢酸疼，手足烦热，咽干口燥，小建中汤主之。", "tags": "虚劳里急,悸,衄,腹中痛,梦失精,四肢酸疼,手足烦热,咽干口燥,小建中汤", "formula": "小建中汤", "formula_detail": "桂枝三两、甘草三两、大枣十二枚、芍药六两、生姜三两、胶饴一升", "ni_annotation": "虚劳里急，悸衄腹中痛，梦失精四肢酸疼，手足烦热咽干口燥，小建中汤主之。", "contraindication": "", "keywords": "虚劳里急,小建中汤"}, {"id": 485, "source": "金匮要略", "article_number": "6-15", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "虚劳里急，诸不足，黄芪建中汤主之。于小建中汤内加黄芪一两半，余依上法。", "tags": "虚劳里急,诸不足,黄芪建中汤,小建中汤加黄芪", "formula": "黄芪建中汤", "formula_detail": "于小建中汤内加黄芪一两半，余依上法。小建中汤：桂枝三两、甘草三两、大枣十二枚、芍药六两、生姜三两、胶饴一升", "ni_annotation": "虚劳里急诸不足，黄芪建中汤主之。于小建中汤内加黄芪一两半，余依上法。", "contraindication": "", "keywords": "虚劳里急,诸不足,黄芪建中汤"}, {"id": 486, "source": "金匮要略", "article_number": "6-16", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "虚劳腰痛，少腹拘急，小便不利者，八味肾气丸主之。", "tags": "虚劳腰痛,少腹拘急,小便不利,八味肾气丸", "formula": "八味肾气丸", "formula_detail": "干地黄八两、山药四两、山茱萸四两、泽泻三两、茯苓三两、牡丹皮三两、桂枝一两、附子一两(炮)", "ni_annotation": "虚劳腰痛少腹拘急，小便不利者八味肾气丸主之。", "contraindication": "", "keywords": "虚劳腰痛,小便不利,八味肾气丸"}, {"id": 487, "source": "金匮要略", "article_number": "6-17", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "虚劳诸不足，风气百疾，薯蓣丸主之。", "tags": "虚劳诸不足,风气百疾,薯蓣丸", "formula": "薯蓣丸", "formula_detail": "薯蓣三十分、当归、桂枝、曲、干地黄、豆黄卷各十分、甘草二十八分、人参七分、川芎、芍药、白术、麦门冬、杏仁各六分、柴胡、桔梗、茯苓各五分、阿胶七分、干姜三分、白敛二分、防风六分、大枣百枚为膏", "ni_annotation": "虚劳诸不足风气百疾，薯蓣丸主之。", "contraindication": "", "keywords": "虚劳诸不足,风气百疾,薯蓣丸"}, {"id": 488, "source": "金匮要略", "article_number": "6-18", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "虚劳虚烦不得眠，酸枣仁汤主之。", "tags": "虚劳虚烦不得眠,酸枣仁汤", "formula": "酸枣仁汤", "formula_detail": "酸枣仁二升、甘草一两、知母二两、茯苓二两、川芎二两", "ni_annotation": "虚劳虚烦不得眠，酸枣仁汤主之。", "contraindication": "", "keywords": "虚劳虚烦不得眠,酸枣仁汤"}, {"id": 489, "source": "金匮要略", "article_number": "6-19", "liujing": "血痹虚劳", "chapter": "血痹虚劳病脉证并治第六", "original_text": "五劳虚极羸瘦，腹满不能饮食，食伤、忧伤、饮伤、房室伤、饥伤、劳伤、经络营卫气伤，内有干血，肌肤甲错，两目黯黑。缓中补虚，大黄䗪虫丸主之。", "tags": "五劳虚极羸瘦,腹满不能饮食,食伤忧伤饮伤房室伤饥伤劳伤,经络营卫气伤,内有干血,肌肤甲错,两目黯黑,缓中补虚,大黄䗪虫丸", "formula": "大黄䗪虫丸", "formula_detail": "大黄十分(蒸)、黄芩二两、甘草三两、桃仁一升、杏仁一升、芍药四两、干地黄十两、干漆一两、虻虫一升、水蛭百枚、蛴螬一升、䗪虫半升", "ni_annotation": "五劳虚极羸瘦，腹满不能饮食，食伤忧伤饮伤房室伤饥伤劳伤，经络营卫气伤，内有干血肌肤甲错两目黯黑。缓中补虚大黄䗪虫丸主之。", "contraindication": "", "keywords": "五劳虚极羸瘦,内有干血,肌肤甲错,大黄䗪虫丸"}, {"id": 490, "source": "金匮要略", "article_number": "7-1", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "问曰：热在上焦者，因咳为肺痿。肺痿之病，从何得之？师曰：或从汗出，或从呕吐，或从消渴，小便利数，或从便难，又被快药下利，重亡津液，故得之。", "tags": "热在上焦,因咳为肺痿,肺痿之病,汗出,呕吐,消渴,小便利数,便难,快药下利,重亡津液", "formula": "", "formula_detail": "", "ni_annotation": "热在上焦因咳为肺痿。肺痿之病从何得之？或从汗出或从呕吐或从消渴小便利数或从便难又被快药下利重亡津液故得之。", "contraindication": "", "keywords": "热在上焦,肺痿之病,重亡津液"}, {"id": 491, "source": "金匮要略", "article_number": "7-2", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "曰：寸口脉数，其人咳，口中反有浊唾涎沫者何？师曰：为肺痿之病。若口中辟辟燥，咳即胸中隐隐痛，脉反滑数，此为肺痈，咳唾脓血。脉数虚者为肺痿，数实者为肺痈。", "tags": "寸口脉数,咳,口中反有浊唾涎沫,肺痿之病,口中辟辟燥,咳即胸中隐隐痛,脉反滑数,肺痈,咳唾脓血,脉数虚者为肺痿,数实者为肺痈", "formula": "", "formula_detail": "", "ni_annotation": "寸口脉数其人咳口中反有浊唾涎沫者何为肺痿之病。若口中辟辟燥咳即胸中隐隐痛脉反滑数此为肺痈咳唾脓血。脉数虚者为肺痿数实者为肺痈。", "contraindication": "", "keywords": "寸口脉数,肺痿,肺痈,咳唾脓血"}, {"id": 492, "source": "金匮要略", "article_number": "7-3", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "问曰：病咳逆，脉之何以知此为肺痈？当有脓血，吐之则死，其脉何类？师曰：寸口脉微而数，微则为风，数则为热；微则汗出，数则恶寒。风中于卫，呼气不入；热过于荣，吸而不出。风伤皮毛，热伤血脉。风舍于肺，其人则咳，口干喘满，咽燥不渴，时唾浊沫，时时振寒。热之所过，血为之凝滞，蓄结痈脓，吐如米粥。始萌可救，脓成则死。", "tags": "病咳逆,肺痈,当有脓血,吐之则死,寸口脉微而数,微则为风数则为热,微则汗出数则恶寒,风中于卫呼气不入,热过于荣吸而不出,风伤皮毛热伤血脉,风舍于肺其人则咳,口干喘满咽燥不渴,时唾浊沫时时振寒,热之所过血为之凝滞,蓄结痈脓吐如米粥,始萌可救脓成则死", "formula": "", "formula_detail": "", "ni_annotation": "病咳逆脉之何以知此为肺痈当有脓血吐之则死其脉何类？寸口脉微而数微则为风数则为热微则汗出数则恶寒风中于卫呼气不入热过于荣吸而不出风伤皮毛热伤血脉风舍于肺其人则咳口干喘满咽燥不渴时唾浊沫时时振寒热之所过血为之凝滞蓄结痈脓吐如米粥始萌可救脓成则死。", "contraindication": "", "keywords": "病咳逆,肺痈,寸口脉微而数"}, {"id": 493, "source": "金匮要略", "article_number": "7-4", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "上气面浮肿，肩息，其脉浮大，不治；又加利，尤甚。", "tags": "上气面浮肿,肩息,脉浮大,不治,又加利尤甚", "formula": "", "formula_detail": "", "ni_annotation": "上气面浮肿肩息其脉浮大不治又加利尤甚。", "contraindication": "", "keywords": "上气面浮肿,肩息,脉浮大"}, {"id": 494, "source": "金匮要略", "article_number": "7-5", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "上气，喘而躁者，属肺胀，欲作风水，发汗则愈。", "tags": "上气,喘而躁者,属肺胀,欲作风水,发汗则愈", "formula": "", "formula_detail": "", "ni_annotation": "上气喘而躁者属肺胀欲作风水发汗则愈。", "contraindication": "", "keywords": "上气,喘而躁者,肺胀"}, {"id": 495, "source": "金匮要略", "article_number": "7-6", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "肺痿吐涎沫而不咳者，其人不渴，必遗尿，小便数，所以然者，以上虚不能制下故也。此为肺中冷，必眩，多涎唾，甘草干姜汤以温之。若服汤已渴者，属消渴。", "tags": "肺痿吐涎沫而不咳者,其人不渴,必遗尿小便数,以上虚不能制下故也,肺中冷,必眩多涎唾,甘草干姜汤以温之,若服汤已渴者属消渴", "formula": "甘草干姜汤", "formula_detail": "甘草四两（炙）、干姜二两（炮）", "ni_annotation": "肺痿吐涎沫而不咳者其人不渴必遗尿小便数所以然者以上虚不能制下故也此为肺中冷必眩多涎唾甘草干姜汤以温之若服汤已渴者属消渴。", "contraindication": "", "keywords": "肺痿吐涎沫而不咳者,肺中冷,甘草干姜汤"}, {"id": 496, "source": "金匮要略", "article_number": "7-7", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "咳而胸满，振寒，脉数，咽干不喝，时出浊唾腥臭，久久吐脓如米粥者，为肺痈，桔梗汤主之。", "tags": "咳而胸满,振寒,脉数,咽干不喝,时出浊唾腥臭,久久吐脓如米粥者,为肺痈,桔梗汤主之", "formula": "桔梗汤", "formula_detail": "桔梗一两、甘草二两", "ni_annotation": "咳而胸满振寒脉数咽干不喝时出浊唾腥臭久久吐脓如米粥者为肺痈桔梗汤主之。", "contraindication": "", "keywords": "咳而胸满,肺痈,桔梗汤"}, {"id": 497, "source": "金匮要略", "article_number": "7-8", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "咳逆上气，时时唾浊，但坐不得眠，皂荚丸主之。", "tags": "咳逆上气,时时唾浊,但坐不得眠,皂荚丸主之", "formula": "皂荚丸", "formula_detail": "皂荚八两（刮去皮，用酥炙）", "ni_annotation": "咳逆上气时时唾浊但坐不得眠皂荚丸主之。", "contraindication": "", "keywords": "咳逆上气,时时唾浊,皂荚丸"}, {"id": 498, "source": "金匮要略", "article_number": "7-9", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "咳而脉浮者，厚朴麻黄汤主之。", "tags": "咳而脉浮者,厚朴麻黄汤主之", "formula": "厚朴麻黄汤", "formula_detail": "厚朴五两、麻黄四两、石膏如鸡子大、杏仁半升、半夏半升、干姜二两、细辛二两、小麦一升、五味子半升", "ni_annotation": "咳而脉浮者厚朴麻黄汤主之。", "contraindication": "", "keywords": "咳而脉浮者,厚朴麻黄汤"}, {"id": 499, "source": "金匮要略", "article_number": "7-10", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "咳而脉沉者，泽漆汤主之。", "tags": "咳而脉沉者,泽漆汤主之", "formula": "泽漆汤", "formula_detail": "半夏半升、紫参五两（一作紫菀）、泽漆三斤（以东流水五斗煮取一斗五升）、生姜五两、白前五两、甘草、黄芩、人参、桂枝各三两", "ni_annotation": "咳而脉沉者泽漆汤主之。", "contraindication": "", "keywords": "咳而脉沉者,泽漆汤"}, {"id": 500, "source": "金匮要略", "article_number": "7-11", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "火逆上气，咽喉不利，止逆下气者，麦门冬汤主之。", "tags": "火逆上气,咽喉不利,止逆下气者,麦门冬汤主之", "formula": "麦门冬汤", "formula_detail": "麦门冬七升、半夏一升、人参三两、甘草二两、粳米三合、大枣十二枚", "ni_annotation": "火逆上气咽喉不利止逆下气者麦门冬汤主之。", "contraindication": "", "keywords": "火逆上气,咽喉不利,麦门冬汤"}, {"id": 501, "source": "金匮要略", "article_number": "7-12", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "肺痈，喘不得卧，葶苈大枣泻肺汤主之。", "tags": "肺痈,喘不得卧,葶苈大枣泻肺汤主之", "formula": "葶苈大枣泻肺汤", "formula_detail": "葶苈子熬令黄色捣丸如弹子大、大枣十二枚", "ni_annotation": "肺痈喘不得卧葶苈大枣泻肺汤主之。", "contraindication": "", "keywords": "肺痈,喘不得卧,葶苈大枣泻肺汤"}, {"id": 502, "source": "金匮要略", "article_number": "7-13", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "咳而上气，此为肺胀，其人喘，目如脱状，脉浮大者，越婢加半夏汤主之。", "tags": "咳而上气,此为肺胀,其人喘,目如脱状,脉浮大者,越婢加半夏汤主之", "formula": "越婢加半夏汤", "formula_detail": "麻黄六两、石膏半斤、生姜三两、大枣十五枚、甘草二两、半夏半升", "ni_annotation": "咳而上气此为肺胀其人喘目如脱状脉浮大者越婢加半夏汤主之。", "contraindication": "", "keywords": "咳而上气,肺胀,目如脱状,越婢加半夏汤"}, {"id": 503, "source": "金匮要略", "article_number": "7-14", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "肺胀，咳而上气，烦躁而喘，脉浮者，心下有水，小青龙加石膏汤主之。", "tags": "肺胀,咳而上气,烦躁而喘,脉浮者,心下有水,小青龙加石膏汤主之", "formula": "小青龙加石膏汤", "formula_detail": "麻黄三两、芍药三两、桂枝三两、细辛三两、甘草三两、干姜三两、五味子半升、半夏半升、石膏二两", "ni_annotation": "肺胀咳而上气烦躁而喘脉浮者心下有水小青龙加石膏汤主之。", "contraindication": "", "keywords": "肺胀,咳而上气,烦躁而喘,小青龙加石膏汤"}, {"id": 504, "source": "金匮要略", "article_number": "7-15", "liujing": "肺痿肺痈咳嗽上气", "chapter": "肺痿肺痈咳嗽上气病脉证治第七", "original_text": "射干麻黄汤方：射干十三枚、麻黄四两、生姜四两、细辛三两、紫菀三两、款冬花三两、五味子半升、大枣七枚、半夏八枚(洗)。右九味，以水一斗二升，先煮麻黄两沸，去上沫，内诸药，煮取三升，分温三服。", "tags": "射干麻黄汤,射干,麻黄,生姜,细辛,紫菀,款冬花,五味子,大枣,半夏", "formula": "射干麻黄汤", "formula_detail": "射干十三枚、麻黄四两、生姜四两、细辛三两、紫菀三两、款冬花三两、五味子半升、大枣七枚、半夏八枚(洗)", "ni_annotation": "射干麻黄汤方：射干十三枚麻黄四两生姜四两细辛三两紫菀三两款冬花三两五味子半升大枣七枚半夏八枚洗。右九味以水一斗二升先煮麻黄两沸去上沫内诸药煮取三升分温三服。", "contraindication": "", "keywords": "射干麻黄汤,射干,麻黄"}, {"id": 505, "source": "金匮要略", "article_number": "8-1", "liujing": "奔豚气病", "chapter": "奔豚气病脉证治第八", "original_text": "师曰：病有奔豚，有吐脓，有惊怖，有火邪，此四部病，皆从惊发得之。", "tags": "病有奔豚,有吐脓,有惊怖,有火邪,此四部病皆从惊发得之", "formula": "", "formula_detail": "", "ni_annotation": "病有奔豚有吐脓有惊怖有火邪此四部病皆从惊发得之。", "contraindication": "", "keywords": "病有奔豚,吐脓,惊怖,火邪"}, {"id": 506, "source": "金匮要略", "article_number": "8-2", "liujing": "奔豚气病", "chapter": "奔豚气病脉证治第八", "original_text": "师曰：奔豚病，从少腹起，上冲咽喉，发作欲死，复还止，皆从惊恐得之。", "tags": "奔豚病,从少腹起,上冲咽喉,发作欲死,复还止,皆从惊恐得之", "formula": "", "formula_detail": "", "ni_annotation": "奔豚病从少腹起上冲咽喉发作欲死复还止皆从惊恐得之。", "contraindication": "", "keywords": "奔豚病,从少腹起,上冲咽喉"}, {"id": 507, "source": "金匮要略", "article_number": "8-3", "liujing": "奔豚气病", "chapter": "奔豚气病脉证治第八", "original_text": "奔豚，气上冲胸，腹痛，往来寒热，奔豚汤主之。", "tags": "奔豚,气上冲胸,腹痛,往来寒热,奔豚汤主之", "formula": "奔豚汤", "formula_detail": "甘草、川芎、当归各二两、半夏四两、黄芩二两、生葛五两、芍药二两、生姜四两、甘李根白皮一升", "ni_annotation": "奔豚气上冲胸腹痛往来寒热奔豚汤主之。", "contraindication": "", "keywords": "奔豚,气上冲胸,腹痛,奔豚汤"}, {"id": 508, "source": "金匮要略", "article_number": "8-4", "liujing": "奔豚气病", "chapter": "奔豚气病脉证治第八", "original_text": "发汗后，烧针令其汗，针处被寒，核起而赤者，必发奔豚。气从少腹上至心，灸其核上各一壮，与桂枝加桂汤主之。", "tags": "发汗后,烧针令其汗,针处被寒,核起而赤者,必发奔豚,气从少腹上至心,灸其核上各一壮,与桂枝加桂汤主之", "formula": "桂枝加桂汤", "formula_detail": "桂枝五两、芍药三两、甘草二两（炙）、生姜三两、大枣十二枚", "ni_annotation": "发汗后烧针令其汗针处被寒核起而赤者必发奔豚气从少腹上至心灸其核上各一壮与桂枝加桂汤主之。", "contraindication": "", "keywords": "发汗后,烧针令其汗,针处被寒,必发奔豚,桂枝加桂汤"}, {"id": 509, "source": "金匮要略", "article_number": "8-5", "liujing": "奔豚气病", "chapter": "奔豚气病脉证治第八", "original_text": "发汗后，脐下悸者，欲作奔豚，茯苓桂枝甘草大枣汤主之。", "tags": "发汗后,脐下悸者,欲作奔豚,茯苓桂枝甘草大枣汤主之", "formula": "茯苓桂枝甘草大枣汤", "formula_detail": "茯苓半斤、桂枝四两、甘草二两（炙）、大枣十五枚", "ni_annotation": "发汗后脐下悸者欲作奔豚茯苓桂枝甘草大枣汤主之。", "contraindication": "", "keywords": "发汗后,脐下悸者,欲作奔豚,茯苓桂枝甘草大枣汤"}, {"id": 510, "source": "金匮要略", "article_number": "9-1", "liujing": "胸痹心痛短气", "chapter": "胸痹心痛短气病脉证治第九", "original_text": "师曰：夫脉当取太过不及，阳微阴弦，即胸痹而痛，所以然者，责其极虚也。今阳虚知在上焦，所以胸痹、心痛者，以其阴弦故也。", "tags": "夫脉当取太过不及,阳微阴弦,即胸痹而痛,所以然者责其极虚也,今阳虚知在上焦,所以胸痹心痛者以其阴弦故也", "formula": "", "formula_detail": "", "ni_annotation": "夫脉当取太过不及阳微阴弦即胸痹而痛所以然者责其极虚也今阳虚知在上焦所以胸痹心痛者以其阴弦故也。", "contraindication": "", "keywords": "夫脉当取太过不及,阳微阴弦,胸痹而痛"}, {"id": 511, "source": "金匮要略", "article_number": "9-2", "liujing": "胸痹心痛短气", "chapter": "胸痹心痛短气病脉证治第九", "original_text": "平人无寒热，短气不足以息者，实也。", "tags": "平人无寒热,短气不足以息者,实也", "formula": "", "formula_detail": "", "ni_annotation": "平人无寒热短气不足以息者实也。", "contraindication": "", "keywords": "平人无寒热,短气不足以息者"}, {"id": 512, "source": "金匮要略", "article_number": "9-3", "liujing": "胸痹心痛短气", "chapter": "胸痹心痛短气病脉证治第九", "original_text": "胸痹之病，喘息咳唾，胸背痛，短气，寸口脉沉而迟，关上小紧数，栝蒌薤白白酒汤主之。", "tags": "胸痹之病,喘息咳唾,胸背痛,短气,寸口脉沉而迟,关上小紧数,栝蒌薤白白酒汤主之", "formula": "栝蒌薤白白酒汤", "formula_detail": "栝蒌实一枚(捣)、薤白半升、白酒七升", "ni_annotation": "胸痹之病喘息咳唾胸背痛短气寸口脉沉而迟关上小紧数栝蒌薤白白酒汤主之。", "contraindication": "", "keywords": "胸痹之病,喘息咳唾,胸背痛,栝蒌薤白白酒汤"}, {"id": 513, "source": "金匮要略", "article_number": "9-4", "liujing": "胸痹心痛短气", "chapter": "胸痹心痛短气病脉证治第九", "original_text": "胸痹不得卧，心痛彻背者，栝蒌薤白半夏汤主之。", "tags": "胸痹不得卧,心痛彻背者,栝蒌薤白半夏汤主之", "formula": "栝蒌薤白半夏汤", "formula_detail": "栝蒌实一枚(捣)、薤白三两、半夏半升、白酒一斗", "ni_annotation": "胸痹不得卧心痛彻背者栝蒌薤白半夏汤主之。", "contraindication": "", "keywords": "胸痹不得卧,心痛彻背者,栝蒌薤白半夏汤"}, {"id": 514, "source": "金匮要略", "article_number": "9-5", "liujing": "胸痹心痛短气", "chapter": "胸痹心痛短气病脉证治第九", "original_text": "胸痹心中痞，留气结在胸，胸满，胁下逆抢心，枳实薤白桂枝汤主之；人参汤亦主之。", "tags": "胸痹心中痞,留气结在胸,胸满,胁下逆抢心,枳实薤白桂枝汤主之,人参汤亦主之", "formula": "枳实薤白桂枝汤", "formula_detail": "枳实四枚、厚朴四两、薤白半升、桂枝一两、栝蒌实一枚(捣)", "ni_annotation": "胸痹心中痞留气结在胸胸满胁下逆抢心枳实薤白桂枝汤主之人参汤亦主之。", "contraindication": "", "keywords": "胸痹心中痞,留气结在胸,胸满,枳实薤白桂枝汤"}, {"id": 515, "source": "金匮要略", "article_number": "9-6", "liujing": "胸痹心痛短气", "chapter": "胸痹心痛短气病脉证治第九", "original_text": "人参汤方：人参、甘草、干姜、白术各三两。右四味，以水八升，煮取三升，温服一升，日三服。", "tags": "人参汤,人参,甘草,干姜,白术", "formula": "人参汤", "formula_detail": "人参、甘草、干姜、白术各三两", "ni_annotation": "人参汤方：人参甘草干姜白术各三两。右四味以水八升煮取三升温服一升日三服。", "contraindication": "", "keywords": "人参汤,人参,甘草,干姜,白术"}, {"id": 516, "source": "金匮要略", "article_number": "9-7", "liujing": "胸痹心痛短气", "chapter": "胸痹心痛短气病脉证治第九", "original_text": "胸痹，胸中气塞，短气，茯苓杏仁甘草汤主之；橘枳姜汤亦主之。", "tags": "胸痹,胸中气塞,短气,茯苓杏仁甘草汤主之,橘枳姜汤亦主之", "formula": "茯苓杏仁甘草汤", "formula_detail": "茯苓三两、杏仁五十个、甘草一两", "ni_annotation": "胸痹胸中气塞短气茯苓杏仁甘草汤主之橘枳姜汤亦主之。", "contraindication": "", "keywords": "胸痹,胸中气塞,短气,茯苓杏仁甘草汤"}, {"id": 517, "source": "金匮要略", "article_number": "9-8", "liujing": "胸痹心痛短气", "chapter": "胸痹心痛短气病脉证治第九", "original_text": "橘枳姜汤方：橘皮一斤、枳实三两、生姜半斤。右三味，以水五升，煮取二升，分温再服。", "tags": "橘枳姜汤,橘皮,枳实,生姜", "formula": "橘枳姜汤", "formula_detail": "橘皮一斤、枳实三两、生姜半斤", "ni_annotation": "橘枳姜汤方：橘皮一斤枳实三两生姜半斤。右三味以水五升煮取二升分温再服。", "contraindication": "", "keywords": "橘枳姜汤,橘皮,枳实,生姜"}, {"id": 518, "source": "金匮要略", "article_number": "9-9", "liujing": "胸痹心痛短气", "chapter": "胸痹心痛短气病脉证治第九", "original_text": "胸痹缓急者，薏苡附子散主之。", "tags": "胸痹缓急者,薏苡附子散主之", "formula": "薏苡附子散", "formula_detail": "薏苡仁十五两、大附子十枚（炮）", "ni_annotation": "胸痹缓急者薏苡附子散主之。", "contraindication": "", "k ": "腹中寒气,雷鸣切痛,附子粳米汤"}, {"id": 531, "source": "金匮要略", "article_number": "10-11", "liujing": "腹满寒疝宿食", "chapter": "腹满寒疝宿食病脉证治第十", "original_text": "痛而闭者，厚朴三物汤主之。", "tags": "痛而闭者,厚朴三物汤主之", "formula": "厚朴三物汤", "formula_detail": "厚朴八两、大黄四两、枳实五枚", "ni_annotation": "痛而闭者厚朴三物汤主之。", "contraindication": "", "keywords": "痛而闭者,厚朴三物汤"}, {"id": 532, "source": "金匮要略", "article_number": "10-12", "liujing": "腹满寒疝宿食", "chapter": "腹满寒疝宿食病脉证治第十", "original_text": "按之心下满痛者，此为实也，当下之，宜大柴胡汤。", "tags": "按之心下满痛者,此为实也,当下之,宜大柴胡汤", "formula": "大柴胡汤", "formula_detail": "柴胡半斤、黄芩三两、芍药三两、半夏半升（洗）、生姜五两（切）、枳实四枚（炙）、大枣十二枚", "ni_annotation": "按之心下满痛者此为实也当下之宜大柴胡汤。", "contraindication": "", "keywords": "按之心下满痛者,大柴胡汤"}, {"id": 533, "source": "金匮要略", "article_number": "10-13", "liujing": "腹满寒疝宿食", "chapter": "腹满寒疝宿食病脉证治第十", "original_text": "腹满不减，减不足言，当须下之，宜大承气汤。", "tags": "腹满不减,减不足言,当须下之,宜大承气汤", "formula": "大承气汤", "formula_detail": "大黄四两（酒洗）、厚朴半斤（炙去皮）、枳实五枚（炙）、芒硝三合", "ni_annotation": "腹满不减减不足言当须下之宜大承气汤。", "contraindication": "", "keywords": "腹满不减,减不足言,大承气汤"}, {"id": 534, "source": "金匮要略", "article_number": "10-14", "liujing": "腹满寒疝宿食", "chapter": "腹满寒疝宿食病脉证治第十", "original_text": "心胸中大寒痛，呕不能饮食，腹中寒，上冲皮起，出见有头足，上下痛而不可触近，大建中汤主之。", "tags": "心胸中大寒痛,呕不能饮食,腹中寒,上冲皮起,出见有头足,上下痛而不可触近,大建中汤主之", "formula": "大建中汤", "formula_detail": "蜀椒二合(炒去汗)、干姜四两、人参二两、胶饴一升", "ni_annotation": "心胸中大寒痛呕不能饮食腹中寒上冲皮起出见有头足上下痛而不可触近大建中汤主之。", "contraindication": "", "keywords": "心胸中大寒痛,呕不能饮食,大建中汤"}, {"id": 535, "source": "金匮要略", "article_number": "10-15", "liujing": "腹满寒疝宿食", "chapter": "腹满寒疝宿食病脉证治第十", "original_text": "胁下偏痛，发热，其脉紧弦，此寒也，以温药下之，宜大黄附子汤。", "tags": "胁下偏痛,发热,其脉紧弦,此寒也,以温药下之,宜大黄附子汤", "formula": "大黄附子汤", "formula_detail": "大黄三两、附子三枚(炮)、细辛二两", "ni_annotation": "胁下偏痛发热其脉紧弦此寒也以温药下之宜大黄附子汤。", "contraindication": "", "keywords": "胁下偏痛,发热,脉紧弦,大黄附子汤"}, {"id": 536, "source": "金匮要略", "article_number": "10-16", "liujing": "腹满寒疝宿食", "chapter": "腹满寒疝宿食病脉证治第十", "original_text": "寒气厥逆，赤丸主之。", "tags": "寒气厥逆,赤丸主之", "formula": "赤丸", "formula_detail": "茯苓四两、乌头二两（炮）、半夏四两（洗）、细辛一两", "ni_annotation": "寒气厥逆赤丸主之。", "contraindication": "", "keywords": "寒气厥逆,赤丸"}, {"id": 537, "source": "金匮要略", "article_number": "10-17", "liujing": "腹满寒疝宿食", "chapter": "腹满寒疝宿食病脉证治第十", "original_text": "腹痛，脉弦而紧，弦则卫气不行，即恶寒，紧则不欲食，邪正相搏，即为寒疝。寒疝绕脐痛，若发则白汗出，手足厥冷，其脉沉紧者，大乌头煎主之。", "tags": "腹痛,脉弦而紧,弦则卫气不行即恶寒,紧则不欲食,邪正相搏即为寒疝,寒疝绕脐痛,若发则白汗出,手足厥冷,其脉沉紧者,大乌头煎主之", "formula": "大乌头煎", "formula_detail": "乌头大者五枚（熬去皮，不㕮咀）", "ni_annotation": "腹痛脉弦而紧弦则卫气不行即恶寒紧则不欲食邪正相搏即为寒疝寒疝绕脐痛若发则白汗出手足厥冷其脉沉紧者大乌头煎主之。", "contraindication": "", "keywords": "腹痛,脉弦而紧,寒疝绕脐痛,大乌头煎"}, {"id": 538, "source": "金匮要略", "article_number": "10-18", "liujing": "腹满寒疝宿食", "chapter": "腹满寒疝宿食病脉证治第十", "original_text": "寒疝腹中痛，及胁痛里急者，当归生姜羊肉汤主之。", "tags": "寒疝腹中痛,及胁痛里急者,当归生姜羊肉汤主之", "formula": "当归生姜羊肉汤", "formula_detail": "当归三两、生姜五两、羊肉一斤", "ni_annotation": "寒疝腹中痛及胁痛里急者当归生姜羊肉汤主之。", "contraindication": "", "keywords": "寒疝腹中痛,胁痛里急者,当归生姜羊肉汤"}, {"id": 539, "source": "金匮要略", "article_number": "10-19", "liujing": "腹满寒疝宿食", "chapter": "腹满寒疝宿食病脉证治第十", "original_text": "寒疝腹中痛，逆冷，手足不仁，若身疼痛，灸刺诸药不能治，抵当乌头桂枝汤主之。", "tags": "寒疝腹中痛,逆冷,手足不仁,若身疼痛,灸刺诸药不能治,抵当乌头桂枝汤主之", "formula": "乌头桂枝汤", "formula_detail": "乌头五枚、桂枝三两、芍药三两、甘草二两、生姜三两、大枣十二枚", "ni_annotation": "寒疝腹中痛逆冷手足不仁若身疼痛灸刺诸药不能治抵当乌头桂枝汤主之。", "contraindication": "", "keywords": "寒疝腹中痛,逆冷,手足不仁,乌头桂枝汤"}, {"id": 540, "source": "金匮要略", "article_number": "10-20", "liujing": "腹满寒疝宿食", "chapter": "腹满寒疝宿食病脉证治第十", "original_text": "问曰：人病有宿食，何以别之？师曰：寸口脉浮而大，按之反涩，尺中亦微而涩，故知有宿食，大承气汤主之。", "tags": "人病有宿食,何以别之,寸口脉浮而大,按之反涩,尺中亦微而涩,故知有宿食,大承气汤主之", "formula": "大承气汤", "formula_detail": "大黄四两（酒洗）、厚朴半斤（炙去皮）、枳实五枚（炙）、芒硝三合", "ni_annotation": "人病有宿食何以别之师曰寸口脉浮而大按之反涩尺中亦微而涩故知有宿食大承气汤主之。", "contraindication": "", "keywords": "人病有宿食,寸口脉浮而大,大承气汤"}, {"id": 541, "source": "金匮要略", "article_number": "10-21", "liujing": "腹满寒疝宿食", "chapter": "腹满寒疝宿食病脉证治第十", "original_text": "脉数而滑者，实也，此有宿食，下之愈，宜大承气汤。", "tags": "脉数而滑者,实也,此有宿食,下之愈,宜大承气汤", "formula": "大承气汤", "formula_detail": "大黄四两（酒洗）、厚朴半斤（炙去皮）、枳实五枚（炙）、芒硝三合", "ni_annotation": "脉数而滑者实也此有宿食下之愈宜大承气汤。", "contraindication": "", "keywords": "脉数而滑者,实也,此有宿食"}, {"id": 542, "source": "金匮要略", "article_number": "10-22", "liujing": "腹满寒疝宿食", "chapter": "腹满寒疝宿食病脉证治第十", "original_text": "下利不饮食者，有宿食也，当下之，宜大承气汤。", "tags": "下利不饮食者,有宿食也,当下之,宜大承气汤", "formula": "大承气汤", "formula_detail": "大黄四两（酒洗）、厚朴半斤（炙去皮）、枳实五枚（炙）、芒硝三合", "ni_annotation": "下利不饮食者有宿食也当下之宜大承气汤。", "contraindication": "", "keywords": "下利不饮食者,有宿食也"}, {"id": 543, "source": "金匮要略", "article_number": "10-23", "liujing": "腹满寒疝宿食", "chapter": "腹满寒疝宿食病脉证治第十", "original_text": "宿食在上脘，当吐之，宜瓜蒂散。", "tags": "宿食在上脘,当吐之,宜瓜蒂散", "formula": "瓜蒂散", "formula_detail": "瓜蒂一分（熬黄）、赤小豆一分", "ni_annotation": "宿食在上脘当吐之宜瓜蒂散。", "contraindication": "", "keywords": "宿食在上脘,当吐之,瓜蒂散"}, {"id": 544, "source": "金匮要略", "article_number": "11-1", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "肝着，其人常欲蹈其胸上，先未苦时，但欲饮热，旋覆花汤主之。", "tags": "肝着,其人常欲蹈其胸上,先未苦时,但欲饮热,旋覆花汤主之", "formula": "旋覆花汤", "formula_detail": "旋覆花三两、葱十四茎、新绛少许", "ni_annotation": "肝着其人常欲蹈其胸上先未苦时但欲饮热旋覆花汤主之。", "contraindication": "", "keywords": "肝着,其人常欲蹈其胸上,旋覆花汤"}, {"id": 545, "source": "金匮要略", "article_number": "11-2", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "跗阳脉浮而涩，浮则胃气强，涩则小便数，浮涩相搏，大便则坚，其脾为约，麻子仁丸主之。", "tags": "跗阳脉浮而涩,浮则胃气强,涩则小便数,浮涩相搏,大便则坚,其脾为约,麻子仁丸主之", "formula": "麻子仁丸", "formula_detail": "麻子仁二升、芍药半斤、枳实一斤、大黄一斤、厚朴一尺、杏仁一升", "ni_annotation": "跗阳脉浮而涩浮则胃气强涩则小便数浮涩相搏大便则坚其脾为约麻子仁丸主之。", "contraindication": "", "keywords": "跗阳脉浮而涩,浮则胃气强,脾为约,麻子仁丸"}, {"id": 546, "source": "金匮要略", "article_number": "11-3", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "肾着之病，其人身体重，腰中冷，如坐水中，形如水状，反不渴，小便自利，饮食如故，病属下焦，身劳汗出，衣里冷湿，久久得之，腰以下冷痛，腹重如带五千钱，甘姜苓术汤主之。", "tags": "肾着之病,其人身体重,腰中冷,如坐水中,形如水状,反不渴,小便自利,饮食如故,病属下焦,身劳汗出,衣里冷湿,久久得之,腰以下冷痛,腹重如带五千钱,甘姜苓术汤主之", "formula": "甘姜苓术汤", "formula_detail": "甘草二两、白术二两、干姜四两、茯苓四两", "ni_annotation": "肾着之病人其身体重腰中冷如坐水中形如水状反不渴小便自利饮食如故病属下焦身劳汗出衣里冷湿久久得之腰以下冷痛腹重如带五千钱甘姜苓术汤主之。", "contraindication": "", "keywords": "肾着之病,身体重,腰中冷,甘姜苓术汤"}, {"id": 547, "source": "金匮要略", "article_number": "11-4", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "问曰：热在上焦者，因咳为肺痿，眇论如前。中焦热，则为坚，下焦热，则为溺血。", "tags": "热在上焦者,因咳为肺痿,中焦热则为坚,下焦热则为溺血", "formula": "", "formula_detail": "", "ni_annotation": "热在上焦者因咳为肺痿眇论如前。中焦热则为坚下焦热则为溺血。", "contraindication": "", "keywords": "热在上焦者,中焦热,下焦热"}, {"id": 548, "source": "金匮要略", "article_number": "11-5", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "师曰：热在上焦，因咳为肺痿；热在中焦，则为坚；热在下焦，则尿血，亦令淋秘不通。大肠有寒者，多鹜溏；有热者，便肠垢。小肠有寒者，其人下重便血；有热者，必痔。", "tags": "热在上焦因咳为肺痿,热在中焦则为坚,热在下焦则尿血亦令淋秘不通,大肠有寒者多鹜溏,有热者便肠垢,小肠有寒者其人下重便血,有热者必痔", "formula": "", "formula_detail": "", "ni_annotation": "热在上焦因咳为肺痿热在中焦则为坚热在下焦则尿血亦令淋秘不通大肠有寒者多鹜溏有热者便肠垢小肠有寒者其人下重便血有热者必痔。", "contraindication": "", "keywords": "热在上焦,热在中焦,热在下焦"}, {"id": 549, "source": "金匮要略", "article_number": "11-6", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "肺中风者，口燥而喘，身运而重，冒而肿胀。", "tags": "肺中风者,口燥而喘,身运而重,冒而肿胀", "formula": "", "formula_detail": "", "ni_annotation": "肺中风者口燥而喘身运而重冒而肿胀。", "contraindication": "", "keywords": "肺中风者,口燥而喘"}, {"id": 550, "source": "金匮要略", "article_number": "11-7", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "肺中寒，吐浊涕。", "tags": "肺中寒,吐浊涕", "formula": "", "formula_detail": "", "ni_annotation": "肺中寒吐浊涕。", "contraindication": "", "keywords": "肺中寒,吐浊涕"}, {"id": 551, "source": "金匮要略", "article_number": "11-8", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "肝中风者，头目瞤，两胁痛，行常伛，令人嗜甘。", "tags": "肝中风者,头目瞤,两胁痛,行常伛,令人嗜甘", "formula": "", "formula_detail": "", "ni_annotation": "肝中风者头目瞤两胁痛行常伛令人嗜甘。", "contraindication": "", "keywords": "肝中风者,头目瞤,两胁痛"}, {"id": 552, "source": "金匮要略", "article_number": "11-9", "liujing": "五脏风寒积聚", "chapter": "五脏风寒积聚病脉证并治第十一", "original_text": "肝中寒者，两臂不举，舌本燥，喜太息，胸中痛，不得转侧，食则吐而汗出也。", "tags": "肝中寒者,两臂不举,舌本燥,喜太息,胸中痛,不得转侧,食则吐而汗出也", "formula": "", "formula_detail": "", "ni_annotation": "肝中寒者两臂不举舌本燥喜太息胸中痛不得转侧食则吐而汗出也。", "contraindication": "", "keywords"
