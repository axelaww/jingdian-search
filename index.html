敛，酸收敛疮，温通散结。利关节是酸入肝，肝主筋，故能舒筋利关节。阴蚀不瘳即下阴疮疡久不收口，营实内服外洗皆效。倪师说：营实外用治疮甚佳，配伍黄柏、苦参清热燥湿效果更著。", "contraindication": "疮疡初起未溃者慎用", "keywords": "敛疮,生肌,利关节,解毒,外用"}, {"id": 1247, "source": "神农本草经", "article_number": "52", "liujing": "", "chapter": "上品", "original_text": "天名精，味甘寒，主瘀血，血瘕欲死，下血止血，利小便。久服轻身耐老。", "tags": "瘀血,出血,血淋,疟疾,疮疡", "formula": "天名精", "formula_detail": "天名精（鹤虱为子），味甘寒，入肝、脾经。常用量三钱至五钱。", "ni_annotation": "倪海厦讲天名精：天名精甘寒清热凉血化瘀。血瘕是瘀血内结之癥瘕，天名精化瘀消瘕而止血，能化瘀不伤正。下血是瘀血腹痛下血块，利小便是血淋涩痛。又杀虫，配槟榔、使君子驱蛔。倪师说：天名精全草清热解毒，子名鹤虱专于杀虫，一药两用各有专攻。", "contraindication": "孕妇忌用，脾胃虚寒者不宜", "keywords": "活血,化瘀,止血,杀虫,清热"}, {"id": 1248, "source": "神农本草经", "article_number": "53", "liujing": "", "chapter": "上品", "original_text": "决明子，味咸平，主青盲，目淫肤赤白膜，眼赤痛泪出。久服益精光，轻身。", "tags": "目赤,目暗,头痛,便秘,高血压", "formula": "决明子", "formula_detail": "决明子，味甘苦咸微寒，入肝、大肠经。常用量三钱至五钱。", "ni_annotation": "倪海厦讲决明子：决明子是眼科要药，清肝明目之力最专。肝火上炎目赤肿痛、羞明流泪，决明子配菊花、夏枯草清肝明目。肝肾阴虚目暗昏花，配枸杞子、女贞子养肝明目。其质润能润肠通便，肝热便秘者最宜。倪师说：决明子炒香泡茶饮，降压明目通便，是简便效佳之品。", "contraindication": "脾胃虚寒、便溏者不宜", "keywords": "清肝,明目,通便,降压,眼科要药"}, {"id": 1249, "source": "神农本草经", "article_number": "54", "liujing": "", "chapter": "上品", "original_text": "丹参，味苦微寒，主心腹邪气，肠鸣幽幽如走水，寒热积聚，破癥除瘕，止烦满，益气。", "tags": "心痛,月经不调,癥瘕,失眠,疮疡", "formula": "丹参", "formula_detail": "丹参，味苦微寒，入心、肝经。常用量三钱至五钱。", "ni_annotation": "倪海厦讲丹参：丹参一味功同四物，活血化瘀兼能养血。心腹邪气是心脉瘀阻胸痹心痛，丹参饮丹参配檀香、砂仁行气活血止痛。丹参入心经能清心除烦，治心烦失眠，配酸枣仁、柏子仁养心安神。寒热积聚、破癥除瘕是活血消癥之功。倪师强调：丹参活血不破血，化瘀不伤正，是平和之活血药。", "contraindication": "孕妇及无瘀血者慎用", "keywords": "活血,祛瘀,调经,清心,养心安神"}, {"id": 1250, "source": "神农本草经", "article_number": "55", "liujing": "", "chapter": "上品", "original_text": "茜根，味苦寒，主寒湿风痹，黄疸，补中。", "tags": "出血,瘀血,痹痛,黄疸,经闭", "formula": "茜根", "formula_detail": "茜根（茜草），味苦寒，入肝经。常用量三钱至五钱。", "ni_annotation": "倪海厦讲茜草：茜草是妇科活血止血要药。瘀血不去新血不生，血瘀经闭痛经，茜草配当归、川芎活血调经。崩漏下血，茜草炒炭配乌贼骨固涩止血。又能凉血，血热妄行各种出血均可用。黄疸是湿热入血，茜草凉血退黄。倪师说：茜草活血兼止血，双向作用，是血分要药。", "contraindication": "脾胃虚寒、无瘀滞者慎用", "keywords": "凉血,止血,活血,调经,退黄"}, {"id": 1251, "source": "神农本草经", "article_number": "56", "liujing": "", "chapter": "上品", "original_text": "飞廉，味苦平，主骨节热，胫重酸痛。久服令人身轻，益气，明目。", "tags": "关节痛,痹证,目暗,虚劳,水肿", "formula": "飞廉", "formula_detail": "飞廉，味苦平，入肝、肾经。常用量三钱至五钱。", "ni_annotation": "倪海厦讲飞廉：飞廉苦平清热祛风除湿。骨节热、胫重酸痛是湿热下注关节所致，飞廉配黄柏、苍术清热燥湿通痹。又能明目，是肝经有热上熏于目，清肝热而明目。益气轻身是通过祛邪而正安。倪师说：此药今已经少用，但其清热燥湿通痹之功可参考黄柏、防己用法。", "contraindication": "脾胃虚寒者不宜", "keywords": "清热,祛风,除湿,通痹,明目"}, {"id": 1252, "source": "神农本草经", "article_number": "57", "liujing": "", "chapter": "上品", "original_text": "五味子，味酸温，主益气，咳逆上气，劳伤羸瘦，补不足，强阴，益男子精。", "tags": "咳喘,遗精,盗汗,失眠,消渴", "formula": "五味子", "formula_detail": "五味子，味酸甘温，入肺、肾、心经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲五味子：五味子皮肉酸甘，核辛苦，五味俱全。酸能收敛，入肺敛肺气止咳喘，入肾涩精止遗。小青龙汤五味子配干姜细辛，干姜温肺，细辛散寒，五味子敛肺，一散一收一敛。生脉散五味子配人参、麦冬，益气生津敛汗。倪师说：五味子补肾涩精最强，男子梦遗滑精、女子带下皆效。", "contraindication": "表邪未解、内有实热者忌用", "keywords": "敛肺,涩精,生津,安神,倪师常用药"}, {"id": 1253, "source": "神农本草经", "article_number": "58", "liujing": "", "chapter": "上品", "original_text": "旋华，味甘温，主益气，去面皯黑色，媚好。其根，味辛，主腹中寒热邪气，利小便。久服不饥轻身。", "tags": "气虚,面斑,水肿,腹胀,小便不利", "formula": "旋华", "formula_detail": "旋华（旋花），味甘温，入脾、肾经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲旋华：旋华甘温补气，气虚则面生黑斑，补气则气血上荣，面斑自去、好颜色。其根辛能散能行，治腹中寒热邪气胀满，利小便而消水肿。倪师说：此药花补气而美容，根行气而利水，一物两用。今少用，但补气利水兼顾的思路值得注意。", "contraindication": "无特殊禁忌", "keywords": "益气,美容,利水,行气,花根异用"}, {"id": 1254, "source": "神农本草经", "article_number": "59", "liujing": "", "chapter": "上品", "original_text": "兰草，味辛平，主利水道，杀蛊毒，辟不祥。久服益气轻身不老，通神明。", "tags": "水肿,淋证,虫毒,口臭,秽浊", "formula": "兰草", "formula_detail": "兰草（佩兰），味辛平，入脾、胃经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲兰草（佩兰）：佩兰芳香化湿醒脾。脾恶湿，湿阻中焦则不运，脘痞腹胀、口甘苔腻。佩兰配藿香、苍术芳香化湿醒脾开胃。利水道是化湿之功，湿去则水道通利。杀蛊毒辟不祥，香气能辟秽浊、杀虫毒。倪师说：佩兰藿香是化湿对药，湿温初起必用。", "contraindication": "阴虚血燥、气虚者慎用", "keywords": "化湿,醒脾,辟秽,利水,芳香"}, {"id": 1255, "source": "神农本草经", "article_number": "60", "liujing": "", "chapter": "上品", "original_text": "蛇床子，味苦平，主妇人阴中肿痛，男子阴痿湿痒，除痹气，利关节，癫痫，恶疮。久服轻身。", "tags": "阴痒,阳痿,带下,湿疹,痹证", "formula": "蛇床子", "formula_detail": "蛇床子，味辛苦温，入肾经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲蛇床子：蛇床子温肾壮阳、燥湿杀虫。男子阴痿是肾阳虚，女子阴痒带下是湿热虫蚀，蛇床子温肾阳而燥湿杀虫，一味药解决两端的病机。外洗治湿疹阴痒，内服壮阳，与菟丝子、巴戟天配补肾壮阳。倪师强调：蛇床子外用杀虫止痒为优，内服壮阳需配补益药。", "contraindication": "阴虚火旺、精关不固者忌用", "keywords": "壮阳,杀虫,燥湿,止痒,外用"}, {"id": 1256, "source": "神农本草经", "article_number": "61", "liujing": "", "chapter": "上品", "original_text": "青芝，味酸，平。主明目，补肝气，安精魂，仁恕。久食轻身，不老，延年，神仙。一名龙芝。", "tags": "明目,补肝,安神,轻身", "formula": "青芝", "formula_detail": "味酸气平，入肝经。常用量3至9克。", "ni_annotation": "青芝味酸入肝，肝开窍于目，所以青芝明目补肝。肝主藏魂，酸能收敛，所以能安精魂。临床上肝病眼睛干涩、视物模糊，可以配合菊花、枸杞使用。久服轻身不老，是上品药养生的特点。", "contraindication": "无明显禁忌", "keywords": "青芝,龙芝,明目,补肝"}, {"id": 1257, "source": "神农本草经", "article_number": "62", "liujing": "", "chapter": "上品", "original_text": "赤芝，味苦，平。主胸中结，益心气，补中，增慧智，不忘。久食轻身，不老，延年，神仙。一名丹芝。", "tags": "益心气,补中,益智,安神", "formula": "赤芝", "formula_detail": "味苦气平，入心经。常用量3至9克。", "ni_annotation": "赤芝味苦入心，胸中结是痰湿瘀堵在胸中，赤芝能开胸散结。苦能泻心火也能补心气，补而不燥。心藏神，所以能增慧智不忘。临床上冠心病心胸闷痛，配合瓜蒌薤白同用效果很好。", "contraindication": "无明显禁忌", "keywords": "赤芝,丹芝,益心气,胸中结"}, {"id": 1258, "source": "神农本草经", "article_number": "63", "liujing": "", "chapter": "上品", "original_text": "黄芝，味甘，平。主心腹五邪，益脾气，安神，忠信和乐。久食轻身，不老，延年，神仙。一名金芝。", "tags": "益脾气,安神,和中", "formula": "黄芝", "formula_detail": "味甘气平，入脾经。常用量3至9克。", "ni_annotation": "黄芝味甘入脾，脾主中焦，心腹五邪是指中焦各种邪气，甘能缓中补脾，所以主心腹五邪。脾主思，脾虚则思虑不安，补脾则能安神。临床上脾胃虚弱食欲不振之人，黄芝是很好的补脾之药。", "contraindication": "湿盛中满者慎用", "keywords": "黄芝,金芝,益脾气,安神"}, {"id": 1259, "source": "神农本草经", "article_number": "64", "liujing": "", "chapter": "上品", "original_text": "白芝，味辛，平。主咳逆上气，益肺气，通利口鼻，强志意，勇悍，安魄。久食轻身，不老，延年，神仙。一名玉芝。", "tags": "止咳,益肺气,安魄", "formula": "白芝", "formula_detail": "味辛气平，入肺经。常用量3至9克。", "ni_annotation": "白芝味辛入肺，辛能散能润，所以能治咳逆上气。肺主魄，辛能通利，所以能安魄强志。临床上久咳肺虚气短之人，白芝配合百合、麦冬同用，补肺而不留邪。白芝色白入肺，是五芝中专门补益肺脏之药，肺虚者可以长期服用。", "contraindication": "阴虚燥咳者慎用", "keywords": "白芝,玉芝,益肺气,止咳"}, {"id": 1260, "source": "神农本草经", "article_number": "65", "liujing": "", "chapter": "上品", "original_text": "黑芝，味咸，平。主癃，利水道，益肾气，通九窍，聪察。久食轻身，不老，延年，神仙。一名玄芝。", "tags": "利水,益肾气,通九窍", "formula": "黑芝", "formula_detail": "味咸气平，入肾经。常用量3至9克。", "ni_annotation": "黑芝味咸入肾，肾主水，咸能软坚润下，所以能利水道通九窍。癃是小便不利，肾气不足则膀胱气化不利。临床上肾炎水肿小便不利，黑芝配合茯苓、泽泻使用效果佳。黑芝色黑入肾，是五芝中专门补益肾脏之药，肾虚水泛者可以配合使用。", "contraindication": "肾虚有热者慎用", "keywords": "黑芝,玄芝,益肾气,利水"}, {"id": 1261, "source": "神农本草经", "article_number": "66", "liujing": "", "chapter": "上品", "original_text": "紫芝，味甘，温。主耳聋，利关节，保神，益精气，坚筋骨，好颜色。久服轻身，不老，延年。一名木芝。", "tags": "安神,益精气,坚筋骨,好颜色", "formula": "紫芝", "formula_detail": "味甘气温，入肝肾经。常用量6至12克。", "ni_annotation": "紫芝味甘性温，甘温能补益精气。肾开窍于耳，精气充足则耳聪。肝主筋，肾主骨，所以能坚筋骨。精血充足则面色红润。临床上体虚早衰、耳聋腰酸之人，紫芝是很好的补益药，可以长期服用。", "contraindication": "阴虚火旺者慎用", "keywords": "紫芝,木芝,益精气,坚筋骨"}, {"id": 1262, "source": "神农本草经", "article_number": "67", "liujing": "", "chapter": "上品", "original_text": "卷柏，味辛，温。主五脏邪气，女子阴中寒热痛，症瘕血闭绝子。久服轻身，和颜色。一名万岁。", "tags": "活血,通经,散症瘕", "formula": "卷柏", "formula_detail": "味辛气温，入肝经。常用量6至12克。", "ni_annotation": "卷柏生在石头上，干旱时卷缩，遇水即舒展，这种特性说明它能活血通经。味辛能散，入肝经，肝藏血，所以主症瘕血闭。女子寒热疼痛、经闭不孕，卷柏配合当归、川芎同用，活血调经效果很好。", "contraindication": "孕妇禁用", "keywords": "卷柏,万岁,活血,通经"}, {"id": 1263, "source": "神农本草经", "article_number": "68", "liujing": "", "chapter": "上品", "original_text": "蓝实，味苦，寒。主解毒蛊，杀蛊魅，注鬼，疰邪。一名蓝，可以染青。", "tags": "解毒,杀蛊,清热", "formula": "蓝实", "formula_detail": "味苦气寒，入心肝经。常用量3至9克。", "ni_annotation": "蓝实就是大青子的种子，味苦寒，苦能泻火，寒能清热解毒。蛊毒鬼疰是古人描述的某些急性传染性疾病，蓝实能清热解毒。后来临床上发展出板蓝根、大青叶，都是从蓝实这个药来的。", "contraindication": "脾胃虚寒者慎用", "keywords": "蓝实,解毒,清热,杀蛊"}, {"id": 1264, "source": "神农本草经", "article_number": "69", "liujing": "", "chapter": "上品", "original_text": "川芎，味辛，温。主中风入脑头痛，寒痹筋挛缓急，金疮，妇人血闭无子。久服轻身，耐老。一名山鞠穷。", "tags": "头痛,活血,行气,止痛", "formula": "川芎", "formula_detail": "味辛气温，入肝胆经。常用量3至9克。", "ni_annotation": "川芎是血中气药，味辛性温，能上行头目，下调经水。中风入脑头痛是风寒直中脑部，川芎辛散温通，能祛风活血止痛，是治头痛的要药。妇人血闭不孕，配当归组成佛手散，妇科名方。凡是头痛不离川芎，但阴虚火旺者不宜。", "contraindication": "阴虚火旺头痛者慎用", "keywords": "川芎,山鞠穷,头痛,活血"}, {"id": 1265, "source": "神农本草经", "article_number": "70", "liujing": "", "chapter": "上品", "original_text": "蘼芜，味辛，温。主咳逆，定惊气，辟邪恶，除蛊毒鬼注，去三虫。久服轻身。一名薇芜。", "tags": "止咳,定惊,辟邪", "formula": "蘼芜", "formula_detail": "味辛气温，入肺肝经。常用量3至9克。", "ni_annotation": "蘼芜就是川芎的苗叶，和川芎性味相似但偏上行。辛温能散风寒止咳逆，入肝能定惊气。古人认为它能辟邪去蛊毒，说明有很好的抗邪能力。现在临床上多用川芎，蘼芜较少使用。但两者功效相近，在川芎缺货时可用蘼芜替代，效果类似。", "contraindication": "阴虚火旺者慎用", "keywords": "蘼芜,薇芜,止咳,定惊"}, {"id": 1266, "source": "神农本草经", "article_number": "71", "liujing": "", "chapter": "上品", "original_text": "黄连，味苦，寒。主热气目痛，眦伤泣出，明目，肠澼腹痛下利，妇人阴中肿痛。久服令人不忘。一名王连。", "tags": "清热燥湿,泻火解毒,止痢", "formula": "黄连", "formula_detail": "味苦气寒，入心肝胃大肠经。常用量2至9克。", "ni_annotation": "黄连是清热燥湿第一要药，味极苦性极寒。苦入心，寒胜热，所以心火旺心烦失眠用黄连，配阿胶就是黄连阿胶汤。黄连治湿热痢疾效果最好，配木香就是香连丸。肝火上炎眼睛红肿，黄连配菊花清肝明目。但黄连大苦大寒，中焦虚寒者绝对不可用，用之伤脾败胃，后患无穷。", "contraindication": "脾胃虚寒者禁用", "keywords": "黄连,王连,清热燥湿,泻火,止痢"}, {"id": 1267, "source": "神农本草经", "article_number": "72", "liujing": "", "chapter": "上品", "original_text": "络石，味苦，温。主风热死肌痈伤，口干舌焦，痈肿不消，喉舌肿，水浆不下。久服轻身，耐老。一名石鲮。", "tags": "祛风通络,消肿,利咽", "formula": "络石", "formula_detail": "味苦气温，入肝肾经。常用量6至15克。", "ni_annotation": "络石藤附生在石头上，能络石攀援生长，说明它的药性是通络的。味苦能清热，性温能通络，所以治风热死肌痈伤。喉舌肿痛水浆不下，是热毒壅滞，络石能清热消肿通络。临床上关节痛、筋脉拘挛，络石配合威灵仙使用。", "contraindication": "阳虚畏寒者慎用", "keywords": "络石,石鲮,祛风通络,消肿"}, {"id": 1268, "source": "神农本草经", "article_number": "73", "liujing": "", "chapter": "上品", "original_text": "蒺藜子，味苦，温。主恶血，破症结积聚，喉痹，乳难。久服长肌肉，明目，轻身。一名旁通，一名屈人，一名止行，一名豺羽，一名升推。", "tags": "活血,破症,明目", "formula": "蒺藜子", "formula_detail": "味苦气温，入肝肾经。常用量6至12克。", "ni_annotation": "蒺藜子就是白蒺藜，有刺，刺能散能破。苦温能行血破瘀，所以主恶血症瘕积聚。肝开窍于目，肝血瘀滞则目不明，破血明目。临床上肝郁气滞乳房胀痛，白蒺藜配合柴胡、郁金疏肝散结。刺蒺藜还有平肝的作用。", "contraindication": "孕妇慎用，血虚者禁用", "keywords": "蒺藜子,白蒺藜,破血,明目"}, {"id": 1269, "source": "神农本草经", "article_number": "74", "liujing": "", "chapter": "上品", "original_text": "黄芪，味甘，微温。主痈疽久败疮，排脓止痛，大风癞疾，五痔鼠瘘，补虚，小儿百病。一名戴糁。", "tags": "补气,托疮,固表,利水", "formula": "黄芪", "formula_detail": "味甘微温，入脾肺经。常用量9至30克。", "ni_annotation": "黄芪是补气第一药，味甘性微温，入脾肺两经。脾为后天之本，肺主一身之气，黄芪补脾肺之气最为全面。痈疽久不收口是气虚不能托毒外出，黄芪能补气托疮排脓。黄芪固表止汗，治自汗容易感冒。利水消肿治气虚水肿。但黄芪性升，高血压、肝阳上亢者慎用，用之恐助火上冲。", "contraindication": "阴虚阳亢、表实邪盛者慎用", "keywords": "黄芪,戴糁,补气,托疮,固表"}, {"id": 1270, "source": "神农本草经", "article_number": "75", "liujing": "", "chapter": "上品", "original_text": "肉苁蓉，味甘，微温。主五劳七伤，补中，除茎中寒热痛，养五脏，强阴，益精气，多子，妇人症瘕。久服轻身。一名肉松蓉。", "tags": "补肾阳,益精血,润肠", "formula": "肉苁蓉", "formula_detail": "味甘微温，入肾大肠经。常用量10至20克。", "ni_annotation": "肉苁蓉生长在沙漠，被称为沙漠人参。味甘能补，微温助阳，入肾经补肾阳益精血。补肾而不燥烈，是最温和的补肾阳药。肾虚阳痿、腰膝酸软、不孕不育，苁蓉配合枸杞、菟丝子。还能润肠通便，老人肾虚便秘用肉苁蓉效果很好。", "contraindication": "阴虚火旺、大便溏泄者慎用", "keywords": "肉苁蓉,补肾阳,益精血,润肠"}, {"id": 1271, "source": "神农本草经", "article_number": "76", "liujing": "", "chapter": "上品", "original_text": "防风，味甘，温。主大风头眩痛，恶风，风邪目盲无所见，风行周身，骨节疼痛，烦满。久服轻身。一名铜芸。", "tags": "祛风,解表,止痛,止痉", "formula": "防风", "formula_detail": "味甘气温，入膀胱肝脾经。常用量3至10克。", "ni_annotation": "防风是治风第一药，风药之润剂。味甘性温不燥，能祛风而不伤阴。风寒感冒用防风配荆芥。风邪头痛眩晕，防风配川芎、白芷。风行周身骨节疼痛是风寒湿痹，防风能祛风散寒止痛。防风还能治脾虚泄泻，配白术、陈皮就是痛泻要方。防风还是风药中的和事佬，能辅佐各种风药。", "contraindication": "阴虚血亏者慎用", "keywords": "防风,铜芸,祛风,解表,止痛"}, {"id": 1272, "source": "神农本草经", "article_number": "77", "liujing": "", "chapter": "上品", "original_text": "蒲黄，味甘，平。主心腹膀胱寒热，五淋，小便不利，止血，消瘀血。久服轻身，益气力。一名蒲厘草。", "tags": "止血,化瘀,利尿", "formula": "蒲黄", "formula_detail": "味甘气平，入肝心包经。常用量3至9克。", "ni_annotation": "蒲黄是香蒲的花粉，味甘性平。生用活血化瘀，炒用止血。主五淋小便不利，是湿热下注膀胱，蒲黄能活血利水通淋。吐血衄血、女性月经不调，蒲黄既能止血又能化瘀，止血而不留瘀，这是蒲黄最大的特点。", "contraindication": "孕妇慎用", "keywords": "蒲黄,止血,化瘀,利尿"}, {"id": 1273, "source": "神农本草经", "article_number": "78", "liujing": "", "chapter": "上品", "original_text": "续断，味苦，微温。主伤寒，补不足，金创痈伤，折跌，续筋骨，妇人乳难。久服益气力。一名龙豆，一名属折。", "tags": "续筋接骨,补肝肾,安胎", "formula": "续断", "formula_detail": "味苦微温，入肝肾经。常用量9至15克。", "ni_annotation": "续断顾名思义就是接续断骨的意思，跌打损伤骨折是它的拿手好戏。味苦微温，入肝肾，肝主筋肾主骨，所以能续筋骨。还能补肝肾，治腰膝酸痛。妇人乳难是产后缺乳，配伍王不留行通乳。孕妇腰痛胎动不安，续断配合桑寄生、菟丝子安胎。", "contraindication": "阴虚火旺者慎用", "keywords": "续断,龙豆,接骨,补肝肾,安胎"}, {"id": 1274, "source": "神农本草经", "article_number": "79", "liujing": "", "chapter": "上品", "original_text": "漏芦，味苦，寒。主皮肤热毒，恶疮疽痔，湿痹，下乳汁。久服轻身益气，耳目聪明，不老延年。一名野兰。", "tags": "清热解毒,消肿,下乳", "formula": "漏芦", "formula_detail": "味苦气寒，入胃经。常用量3至9克。", "ni_annotation": "漏芦味苦寒，苦能泻火，寒能清热解毒。皮肤热毒恶疮疽痔，是热毒蕴结在肌肉，漏芦能清热消肿排脓。下乳汁是通乳要药，产后乳房胀痛乳汁不下，配王不留行、通草效果很好。但漏芦性寒，脾胃虚寒者慎用。", "contraindication": "脾胃虚寒者慎用，孕妇禁用", "keywords": "漏芦,野兰,清热解毒,下乳"}, {"id": 1275, "source": "神农本草经", "article_number": "80", "liujing": "", "chapter": "上品", "original_text": "天名精，味甘，寒。主瘀血血瘕欲死，下血，止血，利小便，除小虫，去痹，除胸中结热，止烦渴。久服轻身耐老。一名麦句姜，一名蟾蜍兰。", "tags": "止血,活血,清热,利小便", "formula": "天名精", "formula_detail": "味甘气寒，入肝肾经。常用量9至15克。", "ni_annotation": "天名精味甘寒，甘能和中，寒能清热。主瘀血血瘕是活血化瘀之力。止血是治各种出血。利小便除小虫，说明能利湿热杀虫。临床上吐血衄血、小便不利，天名精可以配合使用。天名精还有清热解毒的作用，咽喉肿痛时可以外用内服同施。", "contraindication": "脾胃虚寒者慎用", "keywords": "天名精,止血,活血,清热"}, {"id": 1276, "source": "神农本草经", "article_number": "81", "liujing": "", "chapter": "上品", "original_text": "决明子，味咸，平。主青盲目淫，肤赤白膜，眼赤痛泪出。久服益精光，轻身。一名草决明，一名羊明。", "tags": "清肝明目,润肠通便", "formula": "决明子", "formula_detail": "味甘苦咸微寒，入肝肾大肠经。常用量9至15克。", "ni_annotation": "决明子是清肝明目的要药，肝开窍于目，肝热则目赤肿痛，决明子能清肝明目退翳。青盲是视力逐渐减退，也是肝血不足肝热上扰，决明子清肝养目。还能润肠通便，老年人便秘伴有高血压的，决明子既能降压又能通便，一举两得。", "contraindication": "脾胃虚寒便溏者慎用", "keywords": "决明子,草决明,清肝明目,通便"}, {"id": 1277, "source": "神农本草经", "article_number": "82", "liujing": "", "chapter": "上品", "original_text": "丹参，味苦，微寒。主心腹邪气，肠鸣幽幽如走水，寒热积聚，破症除瘕，止烦满，益气。一名郗蝉草。", "tags": "活血祛瘀,清心除烦,通经", "formula": "丹参", "formula_detail": "味苦微寒，入心肝经。常用量9至15克。", "ni_annotation": "丹参一味功同四物，就是说一味丹参能顶当归川芎白芍地黄四味药。味苦微寒，活血化瘀而不伤正，是妇科要药。心腹邪气寒热积聚，是气滞血瘀在胸腹，丹参能活血行气。肠鸣幽幽如走水是肠中有瘀，丹参能化瘀通络。临床上冠心病、月经不调、肝硬化，丹参都是核心用药。", "contraindication": "孕妇慎用，无瘀血者不宜", "keywords": "丹参,活血祛瘀,清心除烦,通经"}, {"id": 1278, "source": "神农本草经", "article_number": "83", "liujing": "", "chapter": "上品", "original_text": "茜草根，味苦，寒。主寒湿风痹，黄疸，补中。一名地血，一名茹芦，一名牛蔓。", "tags": "凉血止血,活血通经", "formula": "茜草根", "formula_detail": "味苦寒，入肝经。常用量6至12克。", "ni_annotation": "茜草根味苦性寒，入肝经。肝藏血，茜草根既能凉血止血，又能活血通经。血热妄行的各种出血，茜草根能凉血止血。女子瘀血经闭，茜草根能活血通经。临床上治血证，茜草是常用之药。炒炭止血力强，生用活血力强。", "contraindication": "脾胃虚寒者慎用", "keywords": "茜草根,地血,凉血止血,活血"}, {"id": 1279, "source": "神农本草经", "article_number": "84", "liujing": "", "chapter": "上品", "original_text": "飞廉，味苦，平。主骨节热，胫重酸痛。久服令人身轻。一名飞轻，一名飞雉。", "tags": "清热,祛风湿,强筋骨", "formula": "飞廉", "formula_detail": "味苦气平，入肝肾经。常用量6至12克。", "ni_annotation": "飞廉味苦性平，主骨节热是风湿热痹，膝关节酸痛沉重。飞廉能清热祛风湿，通利关节。久服轻身是上品药的特点。现在临床上飞廉用得较少，多被其他祛风除湿药替代。但在古方中飞廉用于治疗风湿热痹，有一定的参考价值。", "contraindication": "气虚者慎用", "keywords": "飞廉,骨节热,祛风湿"}, {"id": 1280, "source": "神农本草经", "article_number": "85", "liujing": "", "chapter": "上品", "original_text": "五味子，味酸，温。主益气，咳逆上气，劳伤羸瘦，补不足，强阴，益男子精。一名会及。", "tags": "收敛固涩,益气生津,补肾宁心", "formula": "五味子", "formula_detail": "味酸温，入肺肾心经。常用量2至6克。", "ni_annotation": "五味子五味俱全酸咸辛苦甘，但以酸为主，酸收能敛肺止咳、涩精止泻、敛汗固脱。肺虚久咳是五味子最常用的适应症，配细辛干姜就是苓甘五味姜辛汤的变方。肾虚遗精滑泄，五味子补肾涩精。自汗盗汗，五味子敛汗。心虚失眠心悸，五味子宁心安神。但外邪未解者不可用，用之关门留寇。", "contraindication": "外有表邪、内有实热者禁用", "keywords": "五味子,会及,敛肺止咳,涩精,敛汗"}, {"id": 1281, "source": "神农本草经", "article_number": "86", "liujing": "", "chapter": "上品", "original_text": "旋花，味甘，温。主益气去面皯黑色，媚好。一名筋根花，一名金沸。", "tags": "益气,美容", "formula": "旋花", "formula_detail": "味甘气温，入肺经。常用量3至9克。", "ni_annotation": "旋花味甘性温，甘能补益，温能行气。去面皯黑色是说能治疗面部色素沉着，使面色红润。媚好是形容服用后面色美好。古人对美容很重视，很多上品药都有美容功效。现在临床上旋花较少单独使用。", "contraindication": "阴虚火旺者慎用", "keywords": "旋花,金沸,益气,美容"}, {"id": 1282, "source": "神农本草经", "article_number": "87", "liujing": "", "chapter": "上品", "original_text": "兰草，味辛，平。主利水道，杀蛊毒，辟不祥。久服益气，轻身，不老，通神明。一名水香。", "tags": "化湿,利水,辟秽", "formula": "兰草", "formula_detail": "味辛气平，入脾胃经。常用量6至12克。", "ni_annotation": "兰草就是佩兰，味辛芳香能化湿醒脾。脾主运化水湿，脾为湿困则水道不利，兰草芳香化湿则水道通利。治湿浊中阻恶心呕吐口中甜腻，是化湿醒脾的要药。夏天暑湿感冒，佩兰配合藿香效果很好。", "contraindication": "阴虚血燥者慎用", "keywords": "兰草,水香,化湿,利水"}, {"id": 1283, "source": "神农本草经", "article_number": "88", "liujing": "", "chapter": "上品", "original_text": "蛇床子，味苦，平。主妇人阴中肿痛，男子阴痿湿痒，除痹气，利关节，癫痫，恶疮。久服轻身。一名蛇粟，一名蛇米。", "tags": "燥湿杀虫,温肾壮阳", "formula": "蛇床子", "formula_detail": "味辛苦温，入肾经。常用量3至10克。", "ni_annotation": "蛇床子味辛苦性温，入肾经，温肾壮阳，燥湿杀虫。男子阳痿是肾阳不足，蛇床子温肾壮阳。妇人阴肿湿痒是下焦湿热，蛇床子燥湿杀虫。临床上湿疹瘙痒，蛇床子外洗效果很好。内服温肾壮阳，外用燥湿止痒。", "contraindication": "阴虚火旺者禁用", "keywords": "蛇床子,蛇粟,燥湿杀虫,壮阳"}, {"id": 1284, "source": "神农本草经", "article_number": "89", "liujing": "", "chapter": "上品", "original_text": "地肤子，味苦，寒。主膀胱热，利小便，补中益精气。久服耳目聪明，轻身耐老。一名地葵。", "tags": "清热利湿,利尿", "formula": "地肤子", "formula_detail": "味苦寒，入膀胱经。常用量9至15克。", "ni_annotation": "地肤子味苦性寒，入膀胱经。膀胱湿热则小便不利，地肤子能清热利湿通淋。皮肤湿疹瘙痒，是湿热在表，地肤子能清利湿热，配合白鲜皮外洗内服皆可。临床上小便赤涩热痛、皮肤湿疹，地肤子都是常用之药。", "contraindication": "脾胃虚寒者慎用", "keywords": "地肤子,地葵,清热利湿,利尿"}, {"id": 1285, "source": "神农本草经", "article_number": "90", "liujing": "", "chapter": "上品", "original_text": "景天，味苦，平。主大热，火疮，身热烦，邪恶气。一名戒火，一名火母。", "tags": "清热解毒,凉血", "formula": "景天", "formula_detail": "味苦气平，入心肺经。常用量6至12克。", "ni_annotation": "景天又名戒火，说明它能治疗火热之证。味苦能清热泻火，治大热火疮身热烦躁。火热之邪灼伤肌肤发为火疮，景天能清热解毒。现在临床上景天多用其美容功效，如红景天抗疲劳高原反应。", "contraindication": "脾胃虚寒者慎用", "keywords": "景天,戒火,清热解毒"}, {"id": 1286, "source": "神农本草经", "article_number": "91", "liujing": "", "chapter": "上品", "original_text": "茵陈蒿，味苦，平。主风湿寒热邪气，热结黄疸。久服轻身益气耐老。一面白，茵陈蒿。", "tags": "清利湿热,退黄疸", "formula": "茵陈蒿", "formula_detail": "味苦辛微寒，入脾胃肝胆经。常用量9至30克。", "ni_annotation": "茵陈蒿是治黄疸第一要药。黄疸有阳黄阴黄之分，阳黄黄色鲜明如橘子色，是湿热蕴结，茵陈配栀子大黄就是茵陈蒿汤。阴黄黄色晦暗，是寒湿困脾，茵陈配附子干姜就是茵陈四逆汤。茵陈善清利肝胆湿热，无论虚实寒热辨证加减都能用。三月茵陈四月蒿说明采药时节很重要。", "contraindication": "蓄血发黄者及血虚萎黄者慎用", "keywords": "茵陈蒿,黄疸,清利湿热"}, {"id": 1287, "source": "神农本草经", "article_number": "92", "liujing": "", "chapter": "上品", "original_text": "杜若，味辛，微温。主胸胁下逆气，温中，风入脑户，头肿痛，多涕泪出。久服益精明目，轻身。一名杜蘅。", "tags": "散寒,止痛,温中", "formula": "杜若", "formula_detail": "味辛微温，入肺肝经。常用量3至6克。", "ni_annotation": "杜若味辛微温，辛能散能行，微温能散寒。胸胁下逆气是寒气客于肝经，辛散温通能降逆气。风入脑户头肿痛是多涕泪出，是风寒上攻头目，杜若能祛风散寒止痛。临床上风寒头痛鼻塞流涕，可以配伍使用。", "contraindication": "阴虚火旺者慎用", "keywords": "杜若,杜蘅,散寒,止痛"}, {"id": 1288, "source": "神农本草经", "article_number": "93", "liujing": "", "chapter": "上品", "original_text": "沙参，味苦，微寒。主血积惊气，除寒热，补中益肺气。久服利人。一名知母。", "tags": "养阴清肺,益胃生津", "formula": "沙参", "formula_detail": "味甘微苦微寒，入肺胃经。常用量9至15克。", "ni_annotation": "沙参味甘微寒，入肺胃两经，养阴清肺润燥。肺燥干咳少痰，沙参配麦冬就是沙参麦冬汤。胃阴虚口干舌燥，沙参配石斛、麦冬养胃生津。沙参分为南沙参和北沙参，北沙参养阴力强。外感风寒咳嗽者不可用。", "contraindication": "风寒咳嗽、虚寒证者禁用", "keywords": "沙参,养阴清肺,益胃生津"}, {"id": 1289, "source": "神农本草经", "article_number": "94", "liujing": "", "chapter": "上品", "original_text": "徐长卿，味辛，温。主鬼物百精，蛊毒疫疾，邪恶气，温疟。久服强悍轻身。一名鬼督邮。", "tags": "祛风止痛,止痒", "formula": "徐长卿", "formula_detail": "味辛气温，入肝胃经。常用量3至10克。", "ni_annotation": "徐长卿又叫鬼督邮，说明古人认为它能辟邪。辛温能祛风散寒止痛。各种疼痛如胃痛腹痛腰痛关节痛，徐长卿都有很好的止痛效果，是镇痛要药。还能祛风止痒，治湿疹荨麻疹皮肤瘙痒。临床上带状疱疹后遗神经痛，徐长卿效果显著。", "contraindication": "阴虚火旺者慎用", "keywords": "徐长卿,鬼督邮,止痛,祛风"}, {"id": 1290, "source": "神农本草经", "article_number": "95", "liujing": "", "chapter": "上品", "original_text": "石龙刍，味苦，微寒。主心腹邪气，小便不利，淋闭，风湿，鬼疰。久服补虚羸，轻身。一名龙须，一名草续断。", "tags": "清热利湿,通淋", "formula": "石龙刍", "formula_detail": "味苦微寒，入心膀胱经。常用量3至9克。", "ni_annotation": "石龙刍味苦微寒，苦能清热，寒能泻火。主小便不利淋闭，是湿热蕴结膀胱，石龙刍能清热利湿通淋。心腹邪气是热邪结聚，石龙刍能清热散结。现在临床上较少使用此药，但古方中有记载用于湿热淋证。", "contraindication": "脾胃虚寒者慎用", "keywords": "石龙刍,龙须,清热利湿,通淋"}, {"id": 1291, "source": "神农本草经", "article_number": "96", "liujing": "", "chapter": "上品", "original_text": "云实，味辛，温。主泄利肠澼，杀虫蛊毒，去邪恶结气，止痛，除寒热。一名天豆。", "tags": "止痢,杀虫,解毒", "formula": "云实", "formula_detail": "味辛气温，入大肠经。常用量3至9克。", "ni_annotation": "云实味辛性温，辛能散能行，温能散寒。泄利肠澼是痢疾泄泻，云实能止痢。杀虫蛊毒是有驱虫杀虫之效。去邪恶结气止痛，是行气散结之力。临床上痢疾腹痛，可以配伍使用。云实还能治风寒湿痹关节疼痛。", "contraindication": "阴虚火旺者慎用", "keywords": "云实,天豆,止痢,杀虫"}, {"id": 1292, "source": "神农本草经", "article_number": "97", "liujing": "", "chapter": "上品", "original_text": "王不留行，味苦，平。主金创止血逐痛，出刺，除风痹内寒。久服轻身耐老。一名王不流行。", "tags": "活血通经,下乳,消肿", "formula": "王不留行", "formula_detail": "味苦性平，入肝胃经。常用量6至10克。", "ni_annotation": "王不留行性走而不守，王命也不能留其行，说明它通利之性极强。味苦能泄能通，活血通经，治经闭痛经。下乳是它的特长，产后乳汁不下配穿山甲就是涌泉散，但现在穿山甲禁用，可配路路通代替。还能利尿通淋，治小便不利。孕妇绝对禁用。", "contraindication": "孕妇禁用", "keywords": "王不留行,活血通经,下乳"}, {"id": 1293, "source": "神农本草经", "article_number": "98", "liujing": "", "chapter": "上品", "original_text": "升麻，味甘，辛。主解百毒，杀百精老物殃鬼，辟瘟疫瘴气邪气，蛊毒入口皆吐出。久服不夭，轻身长年。一名周麻。", "tags": "升阳举陷,清热解毒,透疹", "formula": "升麻", "formula_detail": "味甘辛微寒，入肺脾胃大肠经。常用量3至9克。", "ni_annotation": "升麻是升提药的代表，味甘辛能升散，升提中气治气虚下陷。配黄芪人参就是补中益气汤，治胃下垂子宫脱垂脱肛。升麻还能清热解毒，治咽喉肿痛口舌生疮。透疹治麻疹不透。但升麻升散之力强，阴虚阳浮、喘满气逆者不宜使用。", "contraindication": "阴虚阳浮、上盛下虚者禁用", "keywords": "升麻,周麻,升阳举陷,解毒,透疹"}, {"id": 1294, "source": "神农本草经", "article_number": "99", "liujing": "", "chapter": "上品", "original_text": "牡桂，味辛，温。主上气咳逆，结气，喉痹吐吸，利关节，补中益气。久服轻身不老。一名肉桂。", "tags": "散寒,温通经脉,补火助阳", "formula": "牡桂", "formula_detail": "味辛甘大热，入肾脾心肝经。常用量2至5克。", "ni_annotation": "牡桂就是现在的肉桂，味辛甘大热，入肾经补火助阳，入脾经温中散寒。肾阳不足畏寒肢冷腰膝酸软，肉桂能补命门之火。心腹冷痛是寒凝气滞，肉桂温通散寒止痛。上气咳逆是寒饮伏肺，肉桂配附子温阳化饮。但肉桂大热，阴虚火旺者绝对禁用。", "contraindication": "阴虚火旺、里有实热、血热妄行者禁用", "keywords": "牡桂,肉桂,补火助阳,温中散寒"}, {"id": 1295, "source": "神农本草经", "article_number": "100", "liujing": "", "chapter": "上品", "original_text": "菌桂，味辛，温。主百病，养精神，和颜色，利关节，补中益气。为诸药先聘通使。一名筒桂。", "tags": "温中补阳,通经", "formula": "菌桂", "formula_detail": "味辛温，入心肺膀胱经。常用量2至5克。", "ni_annotation": "菌桂就是桂皮，味辛性温，温中散寒。和牡桂不同，菌桂偏于温通，牡桂偏于补火。菌桂为诸药先聘通使，是说在方剂中它能引导药力通达全身。利关节通经脉，是温通之力。养精神和颜色，是温补之效。", "contraindication": "阴虚火旺者禁用", "keywords": "菌桂,筒桂,温中,通经"}, {"id": 1296, "source": "神农本草经", "article_number": "101", "liujing": "", "chapter": "上品", "original_text": "松脂，味苦，温。主痈疽恶疮，头疡白秃，疥瘙风气，安五脏，除热。久服轻身不老延年。一名松膏，一名松肪。", "tags": "拔毒生肌,祛风燥湿", "formula": "松脂", "formula_detail": "味苦甘温，入肝脾经。常用量3至9克。", "ni_annotation": "松脂是松树的树脂，味苦温，苦能燥湿，温能散寒。主痈疽恶疮头疮疥癣，松脂能拔毒排脓生肌敛疮，多外用。安五脏除热，内服能祛风除湿。临床上多外用于皮肤疮疡湿疹，内服可配伍祛风除湿药使用。", "contraindication": "内服不宜过量", "keywords": "松脂,松膏,拔毒生肌,祛风"}, {"id": 1297, "source": "神农本草经", "article_number": "102", "liujing": "", "chapter": "上品", "original_text": "枸杞，味苦，寒。主五内邪气，热中消渴，周痹风湿。久服坚筋骨，轻身耐老。一名杞根，一名地骨皮，一名枸忌，一名地辅。", "tags": "滋补肝肾,益精明目", "formula": "枸杞", "formula_detail": "味甘平，入肝肾经。常用量6至12克。", "ni_annotation": "枸杞味甘性平，入肝肾两经，滋补肝肾益精明目。肝血不足目暗不明，枸杞配菊花就是杞菊地黄丸的核心。肾虚精亏腰膝酸软，枸杞配合菟丝子、覆盆子。热中消渴是阴虚内热口渴，枸杞滋阴生津。枸杞药性平和，是日常保健最常用的补益药。外邪实热者不宜。", "contraindication": "外邪实热、脾虚泄泻者慎用", "keywords": "枸杞,滋补肝肾,益精明目,地骨皮"}, {"id": 1298, "source": "神农本草经", "article_number": "103", "liujing": "", "chapter": "上品", "original_text": "柏子仁，味甘，平。主惊悸，安五脏，益气，除风湿痹。久服令人润泽美色，耳目聪明，不饥不老，轻身延年。一名柏实。", "tags": "养心安神,润肠通便", "formula": "柏子仁", "formula_detail": "味甘平，入心肾大肠经。常用量6至12克。", "ni_annotation": "柏子仁味甘性平，入心经养心安神。心血不足心悸失眠，柏子仁配酸枣仁就是养心安神的经典组合。柏子仁质润多油，还能润肠通便，老人阴虚肠燥便秘很适用。除风湿痹是柏子仁能滋养阴血，血行则风自灭。", "contraindication": "痰多、便溏者慎用", "keywords": "柏子仁,柏实,养心安神,润肠"}, {"id": 1299, "source": "神农本草经", "article_number": "104", "liujing": "", "chapter": "上品", "original_text": "茯苓，味甘，平。主胸胁逆气，忧恚惊邪恐悸，心下结痛，寒热烦满，咳逆，口焦舌干，利小便。久服安魂养神，不饥延年。一名伏菟。", "tags": "利水渗湿,健脾,安神", "formula": "茯苓", "formula_detail": "味甘淡平，入心脾肾经。常用量9至15克。", "ni_annotation": "茯苓是四君子汤之一，味甘淡性平，药性平和。利水渗湿不伤正气，治水肿小便不利。健脾渗湿治脾虚泄泻食少。宁心安神治心悸失眠。茯苓药性平和，寒热虚实都能配伍使用，是临床使用频率最高的中药之一。脾虚湿盛用白茯苓，利水渗湿用赤茯苓，安神用茯神。各有所专。", "contraindication": "阴虚津伤者慎用", "keywords": "茯苓,伏菟,利水渗湿,健脾,安神"}, {"id": 1300, "source": "神农本草经", "article_number": "105", "liujing": "", "chapter": "上品", "original_text": "琥珀，味甘，平。主安五脏，定魂魄，杀精魅邪恶鬼。久服轻身不老，通神明。一名虎魄。", "tags": "安神镇惊,活血散瘀,利尿", "formula": "琥珀", "formula_detail": "味甘平，入心肝膀胱经。常用量1.5至3克。", "ni_annotation": "琥珀是远古松树脂化石，味甘性平，质重能镇惊安神。心悸失眠惊痫，琥珀能镇心安神定魂魄。活血散瘀治血淋尿道涩痛，是它独特之处，既能安神又能活血利尿。多研末冲服不入煎剂。临床上小儿惊风癫痫、失眠心悸、血淋尿血都能使用。", "contraindication": "阴虚内热者慎用", "keywords": "琥珀,虎魄,安神镇惊,活血利尿"}, {"id": 1301, "source": "神农本草经", "article_number": "106", "liujing": "", "chapter": "上品", "original_text": "酸枣仁，味酸，平。主心下寒热，邪结气聚，四肢酸疼，湿痹。久服安五脏，轻身延年。一名酸枣。", "tags": "养心益肝,安神,敛汗", "formula": "酸枣仁", "formula_detail": "味甘酸平，入心肝胆经。常用量9至15克。", "ni_annotation": "酸枣仁是养心安神第一药。味酸能收敛入肝经，肝藏血心主血，酸枣仁养肝血安心神。虚烦不得眠是心血不足心神失养，酸枣仁配知母川芎甘草就是酸枣仁汤，经方中治失眠的名方。还能敛汗，治自汗盗汗。生用醒神，炒用安神。", "contraindication": "实邪郁火者慎用", "keywords": "酸枣仁,养心安神,敛汗,失眠"}, {"id": 1302, "source": "神农本草经", "article_number": "107", "liujing": "", "chapter": "上品", "original_text": "杜仲，味辛，平。主腰膝痛，补中益精气，坚筋骨，强志，除阴下痒湿，小便余沥。久服轻身耐老。一名思仙。", "tags": "补肝肾,强筋骨,安胎", "formula": "杜仲", "formula_detail": "味甘温，入肝肾经。常用量6至10克。", "ni_annotation": "杜仲折断后有银白色的丝相连，这种筋连的特性说明它能强筋骨。入肝肾经，肝主筋肾主骨，所以杜仲是补肝肾强筋骨的要药。腰为肾之府，肾虚则腰膝酸痛，杜仲专治腰痛。还能安胎，孕妇腰痛胎动不安配续断桑寄生同用。炒用效佳。", "contraindication": "阴虚火旺者慎用", "keywords": "杜仲,思仙,补肝肾,强筋骨,安胎"}, {"id": 1303, "source": "神农本草经", "article_number": "108", "liujing": "", "chapter": "上品", "original_text": "女贞实，味苦，平。主补中，安五脏，养精神，除百疾。久服肥健，轻身不老。一名冬青子。", "tags": "滋补肝肾,乌须明目", "formula": "女贞实", "formula_detail": "味甘苦凉，入肝肾经。常用量6至12克。", "ni_annotation": "女贞实就是女贞子，冬天成熟不落，经冬不凋，说明它有很强的生命力，能补肝肾。肝肾阴虚须发早白，女贞子配合墨旱莲就是二至丸，滋养肝肾之阴。安五脏养精神，是滋补力平和。临床上肝肾阴虚眩晕耳鸣腰膝酸软，女贞子是常用之药。", "contraindication": "脾胃虚寒泄泻者慎用", "keywords": "女贞实,女贞子,冬青子,滋补肝肾"}, {"id": 1304, "source": "神农本草经", "article_number": "109", "liujing": "", "chapter": "上品", "original_text": "桑上寄生，味苦，平。主腰痛，小儿背强，痈肿，安胎，充肌肤，坚发齿，长须眉。一名寄屑。", "tags": "补肝肾,强筋骨,安胎,祛风湿", "formula": "桑上寄生", "formula_detail": "味苦甘平，入肝肾经。常用量9至15克。", "ni_annotation": "桑上寄生寄生在桑树上，吸收桑树的精气，同时又不影响桑树生长，这种特性说明它补而不燥。入肝肾经，补肝肾强筋骨，治腰膝酸痛。安胎治胎动不安，配杜仲续断。还能祛风湿，对风湿痹痛兼有肝肾不足者最适宜。", "contraindication": "无明显禁忌", "keywords": "桑上寄生,桑寄生,补肝肾,安胎,祛风湿"}, {"id": 1305, "source": "神农本草经", "article_number": "110", "liujing": "", "chapter": "上品", "original_text": "龙骨，味甘，平。主心腹鬼疰，精物老魅，咳逆，泄利脓血，女子漏下，症瘕坚结，小儿热气惊痫。一名龙骨。齿，主小儿大人惊痫癫疾狂走，心下结气，不能喘息，诸痉。久服轻身通神明。", "tags": "镇惊安神,平肝潜阳,收敛固涩", "formula": "龙骨", "formula_detail": "味甘涩平，入心肝肾经。常用量15至30克。", "ni_annotation": "龙骨是古代哺乳动物的化石，质重能镇惊安神，涩能收敛固涩。心悸失眠惊痫，龙骨配牡蛎镇惊安神。肝阳上亢头晕目眩，龙骨配牡蛎代赭石平肝潜阳。遗精滑泄自汗盗汗，龙骨收敛固涩。泄利脓血女子漏下，龙骨能固涩止血。龙骨和牡蛎常一起使用，二者相须为用。", "contraindication": "湿热实邪者不宜", "keywords": "龙骨,镇惊安神,平肝潜阳,收敛固涩"}, {"id": 1306, "source": "神农本草经", "article_number": "111", "liujing": "", "chapter": "上品", "original_text": "麝香，味辛，温。主辟恶气，杀鬼精物，温疟，蛊毒痫痓，去三虫。久服除邪，不梦寤魇寐。一名遗香，一名脐香，一名心结香，一名当门子。", "tags": "开窍醒神,活血通经,止痛", "formula": "麝香", "formula_detail": "味辛温，入心脾经。常用量0.03至0.1克。", "ni_annotation": "麝香是开窍醒神第一药，辛香走窜之力极强。中风突然昏倒不省人事，麝香配冰片就是至宝丹的核心。活血通经治经闭癥瘕，麝香能走窜通达。还能止痛，治心腹暴痛跌打损伤。但麝香走窜力太强，孕妇绝对禁用，用之会导致流产。", "contraindication": "孕妇禁用", "keywords": "麝香,开窍醒神,活血通经,当门子"}, {"id": 1307, "source": "神农本草经", "article_number": "112", "liujing": "", "chapter": "上品", "original_text": "牛黄，味苦，平。主惊痫，寒热，热盛狂痓，除邪逐鬼。久服轻身增年。一名犀黄。", "tags": "清心豁痰,开窍凉肝,息风解毒", "formula": "牛黄", "formula_detail": "味甘凉，入心肝经。常用量0.15至0.35克。", "ni_annotation": "牛黄是牛胆囊中的结石，来之不易，所以珍贵。牛黄清心豁痰开窍，治高热神昏惊厥。配麝香就是安宫牛黄丸的核心，是温病三宝之一。还能清热解毒，治咽喉肿痛口舌生疮。小儿高热惊风，牛黄配朱砂就是牛黄散。用量宜小，过用伤正气。", "contraindication": "脾虚便溏者慎用，孕妇禁用", "keywords": "牛黄,犀黄,清心豁痰,开窍,息风"}, {"id": 1308, "source": "神农本草经", "article_number": "113", "liujing": "", "chapter": "上品", "original_text": "白胶，味甘，平。主伤中劳绝，腰痛羸瘦，补中益气，妇人血闭无子，止痛，安胎。久服轻身延年。一名鹿角胶。", "tags": "补血,益精,止血,安胎", "formula": "白胶", "formula_detail": "味甘温，入肝肾经。常用量3至9克。", "ni_annotation": "白胶就是鹿角胶，由鹿角熬制而成。味甘性温，入肝肾经，温补肾阳益精养血。肾阳虚畏寒肢冷腰痛，鹿角胶能温补肾阳。精血不足面色萎黄，鹿角胶能补血益精。还能止血安胎，治虚寒性崩漏。比鹿茸温和，适合长期服用。", "contraindication": "阴虚火旺者禁用", "keywords": "白胶,鹿角胶,补肾阳,益精血"}, {"id": 1309, "source": "神农本草经", "article_number": "114", "liujing": "", "chapter": "上品", "original_text": "阿胶，味甘，平。主心腹内崩，劳极洒洒如疟状，腰腹痛，四肢酸疼，女子下血，安胎。久服轻身益气。一名傅致胶。", "tags": "补血,滋阴,润燥,止血", "formula": "阿胶", "formula_detail": "味甘平，入肺肝肾经。常用量3至9克。", "ni_annotation": "阿胶是补血第一药，用黑驴皮加阿井水熬制而成。味甘性平，补血滋阴润燥止血。心血不足心悸失眠，配黄连就是黄连阿胶汤。肺阴虚燥咳，配马兜铃就是补肺阿胶汤。女子崩漏下血，阿胶止血效果最好，炒珠止血力更强。但阿胶滋腻，脾胃虚弱消化不良者要配陈皮同用。", "contraindication": "脾胃虚弱者慎用", "keywords": "阿胶,傅致胶,补血,止血,滋阴"}, {"id": 1310, "source": "神农本草经", "article_number": "115", "liujing": "", "chapter": "上品", "original_text": "丹砂，味甘，微寒。主身体五脏百病，养精神，安魂魄，益气，明目，杀精魅邪恶鬼。久服通神明不老。一名朱砂。", "tags": "镇心安神,清热解毒", "formula": "丹砂", "formula_detail": "味甘微寒有毒，入心经。常用量0.1至0.5克。", "ni_annotation": "丹砂就是朱砂，色赤入心，能镇心安神。心火亢盛心烦失眠惊悸，朱砂配黄连就是朱砂安神丸。还能清热解毒，治咽喉肿痛口舌生疮。但朱砂含汞有毒，只能入丸散剂少量使用，不可入煎剂，不可久服过量。现代临床要严格掌握剂量。", "contraindication": "有毒不宜久服，肝肾功能不全者禁用", "keywords": "丹砂,朱砂,镇心安神,清热解毒"}, {"id": 1311, "source": "神农本草经", "article_number": "116", "liujing": "", "chapter": "上品", "original_text": "云母，味甘，平。主身皮死肌，中风寒热，如在车船上。除邪气，安五脏，益子精，明目。久服轻身延年。一名云珠。", "tags": "安神,下气,止惊", "formula": "云母", "formula_detail": "味甘平，入肺脾经。常用量9至15克。", "ni_annotation": "云母是天然矿物，味甘性平。主身皮死肌是肌肤麻木不仁，中风寒热如在车船上是眩晕感。云母能安五脏止惊悸。古人认为云母是仙药，久服轻身延年。现在临床上云母已很少使用。", "contraindication": "阴虚火旺者慎用", "keywords": "云母,云珠,安神,止惊"}, {"id": 1312, "source": "神农本草经", "article_number": "117", "liujing": "", "chapter": "上品", "original_text": "玉泉，味甘，平。主五脏百病，柔筋强骨，安魂魄，长肌肉，益气。久服耐寒暑，不饥渴，不老神仙。一名玉札。", "tags": "润肺,养阴,安神", "formula": "玉泉", "formula_detail": "味甘平，入肺胃经。常用量研末0.5至1克。", "ni_annotation": "玉泉就是玉石的泉水或玉屑。古人认为玉能养人，味甘性平，能柔筋强骨安魂魄。润肺养阴治燥咳，益气养胃治消渴。但玉泉现在临床上基本不用，被其他养阴药替代。此条保留了古人对玉石类药物的认识。", "contraindication": "现代少用，安全性不确定", "keywords": "玉泉,玉札,养阴,润肺"}, {"id": 1313, "source": "神农本草经", "article_number": "118", "liujing": "", "chapter": "上品", "original_text": "石钟乳，味甘，温。主咳逆上气，明目益精，安五脏，通百节，利九窍，下乳汁。一名公乳。", "tags": "温肺助阳,下乳,通窍", "formula": "石钟乳", "formula_detail": "味甘温，入肺肾胃经。常用量3至9克。", "ni_annotation": "石钟乳就是钟乳石，味甘性温，入肺经温肺化痰平喘咳。入肾经温肾助阳益精。还能通利九窍下乳汁。但钟乳石含碳酸钙，现代临床已很少内服。古人列为上品久服轻身，实际长期服用可能有害。", "contraindication": "阴虚火旺者禁用，现代少内服", "keywords": "石钟乳,公乳,温肺,助阳,下乳"}, {"id": 1314, "source": "神农本草经", "article_number": "119", "liujing": "", "chapter": "上品", "original_text": "滑石，味甘，寒。主身热泄澼，女子乳难，癃闭，利小便，荡胃中积聚寒热，益精气。久服轻身耐饥长年。一名液石，一名共石。", "tags": "利尿通淋,清热解暑", "formula": "滑石", "formula_detail": "味甘淡寒，入膀胱肺胃经。常用量10至15克。", "ni_annotation": "滑石味甘性寒，甘淡渗利寒能清热。利小便通淋，治小便赤涩热痛，配木通甘草就是六一散。清热解暑治夏日暑热烦渴，是暑天常用之药。还能清利湿热，治湿温初起身热不扬。但滑石性寒滑利，脾胃虚寒者及孕妇慎用。", "contraindication": "脾胃虚寒者、孕妇慎用", "keywords": "滑石,液石,利尿通淋,清热解暑"}, {"id": 1315, "source": "神农本草经", "article_number": "120", "liujing": "", "chapter": "上品", "original_text": "紫石英，味甘，温。主心腹咳逆邪气，补不足，女子风寒在子宫，绝孕十年无子。久服温中，轻身延年。一名青石。", "tags": "温肺暖宫,镇心安神", "formula": "紫石英", "formula_detail": "味甘温，入心肺经。常用量9至15克。", "ni_annotation": "紫石英色紫入心，味甘性温能温阳暖宫。女子宫寒不孕是下焦阳虚寒凝，紫石英能温宫散寒助孕。心腹咳逆是寒饮伏肺，紫石英能温肺化痰镇咳逆。还能镇心安神治心悸失眠。临床上宫寒不孕，紫石英是常用的暖宫药。", "contraindication": "阴虚火旺者禁用", "keywords": "紫石英,温宫助孕,镇心安神"}];</script>

function applyVernacular(originalQuery) {
    var mapped = originalQuery;
    var keys = Object.keys(vernacularMap).sort(function(a, b) { return b.length - a.length; });
    for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        var re = new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), "g");
        mapped = mapped.replace(re, vernacularMap[k]);
    }
    return mapped;
}

// 病名展开
// ============================================================
function applyDiseaseMap(originalQuery) {
    var expanded = originalQuery;
    var matchedDiseases = [];
    var diseaseKeys = Object.keys(diseaseMap).sort(function(a, b) { return b.length - a.length; });
    for (var i = 0; i < diseaseKeys.length; i++) {
        var disease = diseaseKeys[i];
        var re = new RegExp(disease.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
        if (re.test(expanded)) {
            matchedDiseases.push(disease);
            var symptoms = diseaseMap[disease];
            expanded = expanded.replace(re, symptoms);
        }
    }
    return { expandedQuery: expanded, matchedDiseases: matchedDiseases };
}

function tokenize(query) {
    var result = applyDiseaseMap(query);
    var mapped = applyVernacular(result.expandedQuery);
    var words = mapped.match(/[^\s，,、]+/g) || [];
    return words.filter(function(w) { return w; });
}

// 搜索
// ============================================================
function doSearch() {
    try {
        if (!_dataReady && allArticles.length === 0) {
            document.getElementById("results").innerHTML =
                '<div class="empty-state"><div class="icon">⏳</div><h3>数据尚未加载完成</h3><p>请稍等片刻再试，或刷新页面</p></div>';
            return;
        }
        var query = document.getElementById("searchInput").value.trim();

        if (!query) {
            document.getElementById("results").innerHTML =
                '<div class="empty-state">' +
                '<div class="icon">🔍</div>' +
                '<h3>以症状，索条文</h3>' +
                '<p>输入大白话症状词即可，如"头痛 发烧 怕冷"<br>也可输入现代病名，如"痛风""糖尿病"<br>点击左侧常见症状或上方的病名/症状快速检索</p>' +
                '</div>';
            document.getElementById("diseaseExpand").classList.remove("show");
            return;
        }

        // 检测病名
        var diseaseResult = applyDiseaseMap(query);
        var matchedDiseases = diseaseResult.matchedDiseases;
        var diseaseDiv = document.getElementById("diseaseExpand");
        if (matchedDiseases.length > 0) {
            var diseaseParts = [];
            for (var di = 0; di < matchedDiseases.length; di++) {
                var d = matchedDiseases[di];
                diseaseParts.push("<strong>" + escHtml(d) + "</strong> → " + diseaseMap[d]);
            }
            diseaseDiv.innerHTML = "🔍 识别病名：" + diseaseParts.join("；");
            diseaseDiv.classList.add("show");
        } else {
            diseaseDiv.classList.remove("show");
        }

        var tokens = tokenize(query);
        if (tokens.length === 0) {
            document.getElementById("results").innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>无法解析检索词</h3></div>';
            return;
        }
        var pool = getActiveArticles();

        if (currentLiujing) {
            var filtered = [];
            for (var fi = 0; fi < pool.length; fi++) {
                if ((pool[fi].liujing || "其他") === currentLiujing) {
                    filtered.push(pool[fi]);
                }
            }
            pool = filtered;
        }

        // 篇章加权：病名匹配时，检查文章的篇章是否直接相关
        var chapterBoostKeywords = [];
        if (matchedDiseases.length > 0) {
            for (var dbi = 0; dbi < matchedDiseases.length; dbi++) {
                var dd = matchedDiseases[dbi];
                if (diseaseChapterBoost[dd]) {
                    var kws = diseaseChapterBoost[dd];
                    for (var j = 0; j < kws.length; j++) {
                        chapterBoostKeywords.push(kws[j]);
                    }
                }
            }
        }

        var scored = pool.map(function(a) {
            var score = 0;
            // 篇章直接相关加权 +20
            if (chapterBoostKeywords.length > 0) {
                var ch = (a.chapter || "") + (a.liujing || "");
                for (var j = 0; j < chapterBoostKeywords.length; j++) {
                    if (ch.indexOf(chapterBoostKeywords[j]) !== -1) {
                        score += 20;
                        break;
                    }
                }
            }
            // 搜索范围：tags + keywords + original_text + ni_annotation
            var searchText = [
                a.tags || "",
                a.keywords || "",
                a.original_text || "",
                a.ni_annotation || "",
            ].join(" ");
            for (var k = 0; k < tokens.length; k++) {
                var t = tokens[k];
                var escaped = t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                var re = new RegExp(escaped, "g");
                var m = searchText.match(re);
                if (m) {
                    score += m.length;
                }
            }
            return { article: a, score: score };
        });

        var matched = [];
        for (var si = 0; si < scored.length; si++) {
            if (scored[si].score > 0) {
                matched.push(scored[si]);
            }
        }
        matched.sort(function(a, b) { return b.score - a.score; });

        var stats = {};
        matched.forEach(function(s) {
            var lj = s.article.liujing || "其他";
            stats[lj] = (stats[lj] || 0) + 1;
        });

        renderResults(query, matched, stats);
    } catch(e) {
        document.getElementById("results").innerHTML =
            '<div class="empty-state"><div class="icon">💥</div><h3>搜索出错</h3><p style="color:#e74c3c;font-family:monospace;text-align:left">' +
            escHtml(e.message) + '<br><br>' + escHtml(e.stack || '') + '</p></div>';
        document.getElementById("diseaseExpand").classList.remove("show");
    }
}

function quickSearch(text) {
    document.getElementById("searchInput").value = text;
    doSearch();
}

// ============================================================
function highlightText(text, tokens) {
    if (!tokens.length) return escHtml(text);
    var result = escHtml(text);
    for (var hi = 0; hi < tokens.length; hi++) {
        var t = tokens[hi];
        var escaped = t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        var re = new RegExp("(" + escaped + ")", "g");
        result = result.replace(re, '<span class="highlight">$1</span>');
    }
    return result;
}

function renderResults(query, matched, stats) {

    var matchedDiseases = diseaseResult.matchedDiseases;

            tip = '虽然识别到病名，但当前筛选条件下暂无匹配条文。<br>请尝试切换"全部经典"或调整检索词。';
        }
        resultsDiv.innerHTML =
            '<div class="empty-state">' +
            '<div class="icon">📭</div>' +
            '<h3>未找到匹配条文</h3>' +
            '<p>' + tip + '</p>' +
            '</div>';
        return;
    }

    var statsHtml = "";
    if (stats && Object.keys(stats).length > 0) {
        statsHtml = '<div class="result-stats">';
        var statKeys = Object.keys(stats);
        for (var sk = 0; sk < statKeys.length; sk++) {
            var key = statKeys[sk];
            var cnt = stats[key];
            statsHtml += '<span class="stat-chip">' + escHtml(key) + '：' + cnt + '条</span>';
        }
        statsHtml += '</div>';
    }

    var html = '<div class="result-header">' +
        '<div class="result-count">' +
        '搜索 "<strong>' + escHtml(query) + '</strong>"，找到 <strong>' + matched.length + '</strong> 条匹配条文' +
        '</div>' +
        statsHtml +
        '</div>';

    var srcMap = { "伤寒论": "sh", "金匮要略": "jk", "温病条辨": "wb", "黄帝内经": "hd", "神农本草经": "sn" };
    var cardIdx = 0;
    for (var mi = 0; mi < matched.length; mi++) {
        var item = matched[mi].article;
        var sourceClass = srcMap[item.source] || "other";
        var sourceLabel = item.source || "伤寒论";

        var tags = [];
        if (item.tags) {
            try { tags = JSON.parse(item.tags); }
            catch (e) {
                var parts = item.tags.split(",");
                for (var ti = 0; ti < parts.length; ti++) {
                    tags.push(parts[ti].trim());
                }
            }
        }

        var cleanLj = item.liujing || "";
        var cleanChapter = item.chapter || "";
        var highlightedText = highlightText(item.original_text, tokens);

        html += '<div class="article-card">' +
            '<div class="card-header">' +
            '<span class="source-badge ' + sourceClass + '">' + sourceLabel + '</span>' +
            '<span class="article-number">第 ' + item.article_number + ' 条</span>' +
            (cleanChapter ? '<span class="chapter-tag" title="' + escHtml(cleanChapter) + '">' + escHtml(cleanChapter) + '</span>' : '') +
            '<span class="liujing-tag">' + escHtml(cleanLj) + '</span>' +
            (item.formula ? '<span class="formula-tag">' + escHtml(item.formula) + '</span>' : '') +
            '</div>' +
            '<div class="original-text">' + highlightedText + '</div>';

        if (item.ni_annotation) {
            html += '<div class="section-title">倪师注解</div>' +
                '<div class="ni-annotation foldable" id="ann-' + cardIdx + '">' + escHtml(item.ni_annotation) + '</div>' +
                '<span class="annotation-toggle" data-target="ann-' + cardIdx + '" onclick="toggleAnnotation(this)">展开全文 ▾</span>';
        }

        if (item.formula_detail) {
            html += '<div class="section-title">方剂组成</div>' +
                '<div class="formula-detail">' + escHtml(item.formula_detail) + '</div>';
        }

        if (item.contraindication) {
            html += '<div class="section-title">注意事项</div>' +
                '<div class="contraindication">' + escHtml(item.contraindication) + '</div>';
        }

        if (tags.length > 0) {
            html += '<div class="tags-row">';
            for (var tgi = 0; tgi < tags.length; tgi++) {
                var t = tags[tgi];
                html += '<span class="tag" onclick="document.getElementById(\'searchInput\').value=this.textContent;doSearch()">' + escHtml(t) + '</span>';
            }
            html += '</div>';
        }
        html += '</div>';
        cardIdx++;
    }

    resultsDiv.innerHTML = html;

    // 标注需要折叠的注解
    var foldables = resultsDiv.querySelectorAll(".ni-annotation.foldable");
    for (var ffi = 0; ffi < foldables.length; ffi++) {
        var el = foldables[ffi];
        if (el.scrollHeight <= 160) {
            el.classList.remove("foldable");
            var sibling = el.nextSibling;
            while (sibling) {
                if (sibling.nodeType === 1 && sibling.classList && sibling.classList.contains("annotation-toggle")) {
                    sibling.style.display = "none";
                    break;
                }
                sibling = sibling.nextSibling;
            }
        }
    }
}

function toggleAnnotation(el) {
    var target = document.getElementById(el.getAttribute("data-target"));
    if (!target) return;
    target.classList.toggle("expanded");
    var expanded = target.classList.contains("expanded");
    el.textContent = expanded ? "收起 ▴" : "展开全文 ▾";
}

function escHtml(text) {
    if (!text) return "";
    var div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

// ============================================================
// 构建常见症状速查
// ============================================================
function buildSymptomQuick() {
    var container = document.getElementById("symptomQuick");
    var html = "";
    for (var gi = 0; gi < symptomGroups.length; gi++) {
        var g = symptomGroups[gi];
        html += '<div class="symptom-group"><div class="symptom-group-title">' + escHtml(g.title) + '</div><div class="symptom-tags">';
        for (var ii = 0; ii < g.items.length; ii++) {
            var item = g.items[ii];
            html += '<span class="symptom-tag" data-q="' + escHtml(item.q) + '">' + escHtml(item.label) + '</span>';
        }
        html += '</div></div>';
    }
    container.innerHTML = html;

    var tags = container.querySelectorAll(".symptom-tag");
    for (var ti = 0; ti < tags.length; ti++) {
        (function(tag) {
            tag.addEventListener("click", function() {
                document.getElementById("searchInput").value = tag.getAttribute("data-q");
                doSearch();
            });
        })(tags[ti]);
    }
}

// ============================================================
// 六经导航
// ============================================================
function getActiveArticles() {
    if (currentSource) {
        var result = [];
        for (var i = 0; i < allArticles.length; i++) {
            var a = allArticles[i];
            if (a.source === currentSource) {
                result.push(a);
            }
        }
        return result;
    }
    return allArticles;
}

function buildLiujingNav() {
    var set = {};
    var setList = [];
    for (var ai = 0; ai < allArticles.length; ai++) {
        var a = allArticles[ai];
        var lj = a.liujing || "其他";
        if (!set[lj]) {
            set[lj] = true;
            setList.push(lj);
        }
    }
    liujingList = setList.sort();

    var nav = document.getElementById("liujingNav");
    nav.innerHTML = '<span class="chapter-tag-h active" data-liujing="">全部 <span class="ch-badge">--</span></span>';
    for (var li = 0; li < liujingList.length; li++) {
        var lj = liujingList[li];
        var cleanLj = lj.length > 12 ? lj.slice(0, 12) + ".." : lj;
        nav.innerHTML += '<span class="chapter-tag-h" data-liujing="' + escHtml(lj) + '">' + escHtml(cleanLj) + ' <span class="ch-badge">--</span></span>';
    }

    var items = nav.querySelectorAll(".chapter-tag-h");
    for (var ii = 0; ii < items.length; ii++) {
        (function(item) {
            item.addEventListener("click", function() {
                var allItems = nav.querySelectorAll(".chapter-tag-h");
                for (var j = 0; j < allItems.length; j++) {
                    allItems[j].classList.remove("active");
                }
                item.classList.add("active");
                currentLiujing = item.getAttribute("data-liujing");
                doSearch();
            });
        })(items[ii]);
    }
}

function updateLiujingNav() {
    var activeArticles = getActiveArticles();
    var counts = {};
    for (var ai = 0; ai < activeArticles.length; ai++) {
        var a = activeArticles[ai];
        var lj = a.liujing || "其他";
        counts[lj] = (counts[lj] || 0) + 1;
    }

    var totalCount = activeArticles.length;
    var firstBadge = document.querySelector("[data-liujing=''] .ch-badge");
    if (firstBadge) firstBadge.textContent = totalCount + "条";
    for (var li = 0; li < liujingList.length; li++) {
        var lj = liujingList[li];
        var el = document.querySelector('[data-liujing="' + lj.replace(/"/g, '\\"') + '"] .ch-badge');
        if (el) el.textContent = (counts[lj] || 0) + "条";
    }

    document.getElementById("sidebarTitle").textContent = currentSource
        ? (currentSource + " · 篇章")
        : "篇章导航（全）";

    var chapterSection = document.getElementById("chapterNavSection");
    if (chapterSection) {
        chapterSection.style.display = totalCount > 0 ? "" : "none";
    }
}

// ============================================================
// 初始化
// ============================================================
function init() {
    try {
        if (allArticles.length === 0) {
            document.getElementById("results").innerHTML =
                '<div class="empty-state"><div class="icon">❌</div><h3>数据加载失败</h3><p>请刷新页面重试</p></div>';
            return;
        }
        _dataReady = true;
        buildLiujingNav();
        updateLiujingNav();
        buildSymptomQuick();
    } catch (e) {
        document.getElementById("results").innerHTML =
            '<div class="empty-state"><div class="icon">💥</div><h3>初始化出错</h3><p style="color:#e74c3c">' + escHtml(e.message) + '</p></div>';
    }
}

// ============================================================
// 事件绑定 - 直接执行（不使用DOMContentLoaded，因为脚本在body底部）
// ============================================================
init();
document.getElementById("searchBtn").addEventListener("click", doSearch);
document.getElementById("searchInput").addEventListener("keydown", function(e) {
    var key = e.key || e.keyCode;
    if (key === "Enter" || key === 13) doSearch();
});

// 经典选择按钮
var sourceBtns = document.querySelectorAll(".sidebar-source-btn");
for (var si = 0; si < sourceBtns.length; si++) {
    (function(btn) {
        btn.addEventListener("click", function() {
            var allBtns = document.querySelectorAll(".sidebar-source-btn");
            for (var j = 0; j < allBtns.length; j++) {
                allBtns[j].classList.remove("active");
            }
            btn.classList.add("active");
            currentSource = btn.getAttribute("data-source");
            currentLiujing = "";
            var liujingItems = document.querySelectorAll("#liujingNav .sidebar-item");
            for (var k = 0; k < liujingItems.length; k++) {
                liujingItems[k].classList.remove("active");
            }
            var allBtn = document.querySelector("#liujingNav [data-liujing='']");
            if (allBtn) allBtn.classList.add("active");
            updateLiujingNav();
            doSearch();
        });
    })(sourceBtns[si]);
}
</script>
