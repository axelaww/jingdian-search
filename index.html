作"}, {"id": 768, "source": "金匮要略", "article_number": "22-3", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人中风，发热恶寒，经水适来，得之七八日，热除脉迟，身凉和，胸胁满，如结胸状，谵语者，此为热入血室也。当刺期门，随其实而取之。", "tags": "热入血室,胸胁满,如结胸,谵语", "formula": "", "formula_detail": "", "ni_annotation": "这是热入血室的第三种情况。中风发热恶寒，正好来月经，七八天后热退了脉也慢了，身体凉了，但胸胁胀满像结胸一样，还说胡话。热已经入血室了，治法是针刺期门穴（肝经募穴），泻其实热。", "contraindication": "", "keywords": "热入血室,刺期门,胸胁满"}, {"id": 769, "source": "金匮要略", "article_number": "22-4", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "问曰：妇人年五十所，病下利数十日不止，暮即发热，少腹里急，腹满，手掌烦热，唇口干燥，何也？师曰：此病属带下。何以故？曾经半产，瘀血在少腹不去。何以知之？其证唇口干燥，故知之。当以温经汤主之。", "tags": "带下,下利不止,少腹里急,手掌烦热,唇口干燥", "formula": "温经汤", "formula_detail": "吴茱萸三两、当归二两、川芎二两、芍药二两、人参二两、桂枝二两、阿胶二两、生姜二两、牡丹皮二两(去心)、甘草二两、半夏半升、麦门冬一升(去心)", "ni_annotation": "温经汤是妇科第一方，极其重要。五十岁左右的妇女，下利几十天不止，晚上发热，少腹拘急，腹部胀满，手掌心发热，嘴唇干燥。原因是以前流过产，瘀血留在小腹没排出去。瘀血导致新血不生，所以唇口干燥。温经汤用吴茱萸桂枝温经散寒，当归川芎芍药养血活血，丹皮活血化瘀，阿胶养血止血，人参甘草补气，半夏降逆，麦冬养阴润燥，生姜温中。这个方子温经散寒、养血祛瘀、润燥清热，是治妇人冲任虚寒、瘀血阻滞的名方。妇科的月经不调、痛经、不孕等很多病都可以用。", "contraindication": "", "keywords": "温经汤,妇科第一方,带下,瘀血,冲任虚寒"}, {"id": 770, "source": "金匮要略", "article_number": "22-5", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人咽中如有炙脔，半夏厚朴汤主之。", "tags": "梅核气,咽中如有炙脔", "formula": "半夏厚朴汤", "formula_detail": "半夏一升、厚朴三两、茯苓四两、生姜五两、干苏叶二两", "ni_annotation": "咽喉里好像有一块烤肉贴着，咽不下去也吐不出来，这就是梅核气。半夏厚朴汤是梅核气的专方。半夏化痰散结，厚朴行气开郁，茯苓健脾渗湿，生姜降逆止呕散寒，苏叶理气宽中。梅核气的本质是气滞痰凝，多由情志不舒引起，妇女多见。", "contraindication": "", "keywords": "梅核气,咽中如有炙脔,半夏厚朴汤,气滞痰凝"}, {"id": 771, "source": "金匮要略", "article_number": "22-6", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人脏躁，喜悲伤欲哭，象如神灵所作，数欠伸，甘麦大枣汤主之。", "tags": "脏躁,癔症,悲伤欲哭", "formula": "甘麦大枣汤", "formula_detail": "甘草三两、小麦一升、大枣十枚", "ni_annotation": "甘麦大枣汤是治疗脏躁（相当于现代的癔症、焦虑症）的专方。病人喜欢悲伤哭泣，像被鬼神附身一样，经常打哈欠伸懒腰。甘草补脾和中，小麦养心安神，大枣补中益气。三味都是食品级药材，非常安全平和，但效果很好。脏躁的本质是心脾两虚，脏阴不足。", "contraindication": "", "keywords": "脏躁,癔症,甘麦大枣汤,悲伤欲哭,焦虑"}, {"id": 772, "source": "金匮要略", "article_number": "22-7", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人吐涎沫，医反下之，心下即痞，当先治其吐涎沫，小青龙汤主之；涎沫止，乃治痞，泻心汤主之。", "tags": "吐涎沫,心下痞", "formula": "小青龙汤", "formula_detail": "麻黄三两(去节)、芍药三两、细辛三两、干姜三两、甘草三两(炙)、桂枝三两(去皮)、五味子半升、半夏半升(洗)", "ni_annotation": "妇女吐口水，医生错误地用了泻下法，导致心下（胃脘部）痞闷。应该先治吐涎沫（有寒饮），用小青龙汤温阳化饮。等吐涎沫止了，再治心下痞，用泻心汤。这是分步治疗的思路。", "contraindication": "", "keywords": "吐涎沫,寒饮,小青龙汤,泻心汤"}, {"id": 773, "source": "金匮要略", "article_number": "22-8", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人之病，因虚、积冷、结气，为诸经水断绝，至有历年，血寒积结，胞门寒伤，经络凝坚。", "tags": "妇人杂病总纲,虚,积冷,结气", "formula": "", "formula_detail": "", "ni_annotation": "妇人杂病的三大原因：虚（气血虚弱）、积冷（寒气积累）、结气（气机郁结）。这三个因素导致月经断绝，多年不愈。寒气积聚，损伤胞门（子宫），经络凝滞不通。这是妇人杂病的总纲。", "contraindication": "", "keywords": "妇人杂病,虚,积冷,结气,三大病因"}, {"id": 774, "source": "金匮要略", "article_number": "22-9", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "问曰：妇人年五十所，病下利数十日不止，暮即发热，少腹里急，腹满，手掌烦热，唇口干燥，何也？师曰：此病属带下。何以故？曾经半产，瘀血在少腹不去。何以知之？其证唇口干燥，故知之。当以温经汤主之。亦主妇人少腹寒，久不受胎；兼取崩中去血，或月水来过多，及至期不来。", "tags": "带下,瘀血,崩漏,不孕", "formula": "温经汤", "formula_detail": "吴茱萸三两、当归二两、川芎二两、芍药二两、人参二两、桂枝二两、阿胶二两、生姜二两、牡丹皮二两(去心)、甘草二两、半夏半升、麦门冬一升(去心)", "ni_annotation": "温经汤的完整主治范围：1.五十岁左右妇女带下病，下利不止，发热，少腹拘急等（原条）；2.妇人少腹寒冷，久不怀孕；3.崩漏出血；4.月经量过多；5.月经不来（闭经）。一个方子治这么多妇科病，核心病机都是冲任虚寒、瘀血阻滞。温经汤温经散寒、养血祛瘀，寒去瘀消则诸症自愈。", "contraindication": "", "keywords": "温经汤,崩漏,不孕,闭经,月经过多"}, {"id": 775, "source": "金匮要略", "article_number": "22-10", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "寸口脉弦而大，弦则为减，大则为芤，减则为寒，芤则为虚，寒虚相搏，此名曰革，妇人则半产漏下，旋覆花汤主之。", "tags": "革脉,半产,漏下", "formula": "旋覆花汤", "formula_detail": "旋覆花三两、葱十四茎、新绛少许", "ni_annotation": "寸口脉弦而大，但弦中带减（无力），大中带空（芤脉），这种脉叫革脉。革脉主亡血失精。妇女出现革脉，说明有流产或漏下的问题。用旋覆花汤治疗。旋覆花下气散结，葱白通阳，新绛（茜草或绯帛）活血。这是气滞血瘀导致的漏下。", "contraindication": "", "keywords": "革脉,半产,漏下,旋覆花汤"}, {"id": 776, "source": "金匮要略", "article_number": "22-11", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人陷经，漏下黑不解，胶姜汤主之。", "tags": "陷经,漏下黑", "formula": "胶姜汤（阿胶干姜汤）", "formula_detail": "阿胶、干姜", "ni_annotation": "妇人陷经就是经血下陷不止，漏出的血颜色发黑。用胶姜汤。阿胶养血止血，干姜温中止血。黑血说明有寒，干姜温阳散寒，阿胶养血。这个方子治冲任虚寒导致的漏下。", "contraindication": "", "keywords": "陷经,漏下黑,胶姜汤,阿胶干姜汤"}, {"id": 777, "source": "金匮要略", "article_number": "22-12", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人少腹满如敦状，小便微难而不渴，生后者，此为水与血俱结在血室也，大黄甘遂汤主之。", "tags": "少腹满,水血俱结,血室", "formula": "大黄甘遂汤", "formula_detail": "大黄四两、甘遂二两、阿胶二两", "ni_annotation": "妇女小腹胀满像倒扣的敦（圆形状容器），小便微有困难但不口渴，产后出现的。这是水和血同时结在血室（子宫）里。大黄甘遂汤攻下瘀血和水饮。大黄泻瘀血，甘遂攻水饮，阿胶养血护正。三味合用，水血同治。方中用阿胶保护正气，防止攻伐太过。", "contraindication": "体虚者慎用", "keywords": "水血俱结,大黄甘遂汤,少腹满"}, {"id": 778, "source": "金匮要略", "article_number": "22-13", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人经水不利下，抵当汤主之。", "tags": "经水不利,瘀血", "formula": "抵当汤", "formula_detail": "水蛭三十个(熬)、虻虫三十个(去翅足熬)、桃仁二十个(去皮尖)、大黄三两(酒洗)", "ni_annotation": "妇人月经不通畅，有瘀血阻滞，用抵当汤。这是攻下瘀血的峻猛方剂。水蛭虻虫破血逐瘀，桃仁活血化瘀，大黄泻下瘀热。抵当汤是经方中破血力量最强的方剂之一，非瘀血重证不可轻用。", "contraindication": "孕妇禁用，体虚者禁用", "keywords": "经水不利,闭经,抵当汤,瘀血重证"}, {"id": 779, "source": "金匮要略", "article_number": "22-14", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人经水闭不利，脏坚癖不止，中有干血，下白物，矾石丸主之。", "tags": "经闭,干血,白带", "formula": "矾石丸", "formula_detail": "矾石三分(烧)、杏仁一分", "ni_annotation": "妇人经闭，子宫中有坚硬的瘀积（脏坚癖），有干血，并且有白带。用矾石丸作为坐药纳入阴道。矾石（明矾）收敛燥湿杀虫，杏仁润泽。这是外治法，直接作用于局部。", "contraindication": "", "keywords": "经闭,白带,矾石丸,坐药,外治"}, {"id": 780, "source": "金匮要略", "article_number": "22-15", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人六十二种风，及腹中血气刺痛，红蓝花酒主之。", "tags": "妇人风证,腹中刺痛", "formula": "红蓝花酒", "formula_detail": "红蓝花一两（酒一大升，煎减半，顿服一半，未止再服）", "ni_annotation": "红蓝花就是红花。妇人感受各种风邪，以及腹中气血刺痛，用红花酒。红花活血通经、祛瘀止痛，酒能行血助药力。这是一个简单但有效的小方子。", "contraindication": "", "keywords": "腹中刺痛,红蓝花酒,红花,活血"}, {"id": 781, "source": "金匮要略", "article_number": "22-16", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人腹中诸疾痛，当归芍药散主之。", "tags": "腹中诸疾痛,血虚湿盛", "formula": "当归芍药散", "formula_detail": "当归三两、芍药一斤、川芎半斤、茯苓四两、白术四两、泽泻半斤", "ni_annotation": "妇人腹部各种疼痛，用当归芍药散。当归川芎芍药养血活血（血分），茯苓白术泽泻健脾利湿（水分）。这是治血虚湿盛、肝脾不调的方子。妇人腹部疼痛很多是血虚有湿造成的，这个方子血水同治，是妇科常用方。", "contraindication": "", "keywords": "妇人腹痛,当归芍药散,血虚湿盛"}, {"id": 782, "source": "金匮要略", "article_number": "22-17", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人腹中痛，小建中汤主之。", "tags": "腹中痛,中焦虚寒", "formula": "小建中汤", "formula_detail": "桂枝三两(去皮)、甘草三两(炙)、大枣十二枚(擘)、芍药六两、生姜三两(切)、胶饴一升", "ni_annotation": "妇人腹部疼痛，如果是中焦虚寒造成的，用小建中汤温中补虚、缓急止痛。小建中汤是桂枝汤倍芍药加饴糖，饴糖温中补虚，倍芍药缓急止痛。和当归芍药散的区别：小建中汤偏重中焦虚寒，当归芍药散偏重血虚湿盛。", "contraindication": "", "keywords": "妇人腹痛,小建中汤,中焦虚寒"}, {"id": 783, "source": "金匮要略", "article_number": "22-18", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "问曰：妇人病饮食如故，烦热不得卧，而反倚息者，何也？师曰：此名转胞，不得溺也，以胞系了戾，故致此病，但利小便则愈，宜肾气丸主之。", "tags": "转胞,尿潴留,不得溺", "formula": "肾气丸", "formula_detail": "干地黄八两、薯蓣四两、山茱萸四两、泽泻三两、茯苓三两、牡丹皮三两、桂枝一两、附子一枚(炮)", "ni_annotation": "转胞就是膀胱扭转或受压导致尿潴留，小便解不出来。病人饮食正常但发热烦躁睡不着觉，只能坐着呼吸不能躺下。原因是胞系（膀胱的系带）扭曲了。治法是利小便，用肾气丸。肾气丸补肾化气行水，肾阳恢复则气化正常，小便自然通畅。这也是\"异病同治\"的典型——肾气丸既治消渴又治转胞又治脚气，病不同但病机相同。", "contraindication": "", "keywords": "转胞,尿潴留,肾气丸"}, {"id": 784, "source": "金匮要略", "article_number": "22-19", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "蛇床子散方，温阴中坐药。", "tags": "阴中冷,坐药,外治", "formula": "蛇床子散", "formula_detail": "蛇床子仁（研末，白粉少许，和合如枣大，绵裹纳之）", "ni_annotation": "蛇床子散是坐药（阴道栓剂），用来温阴中。蛇床子温肾助阳、杀虫止痒，白粉（铅粉）收敛燥湿。做成棉裹的栓剂纳入阴道，治阴中寒冷、瘙痒等症。", "contraindication": "", "keywords": "阴中冷,蛇床子散,坐药,外治法"}, {"id": 785, "source": "金匮要略", "article_number": "22-20", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "胃气下泄，阴吹而正喧，此谷气之实也，膏发煎导之。", "tags": "阴吹,谷气之实", "formula": "猪膏发煎", "formula_detail": "猪膏半斤、乱发如鸡子大三枚", "ni_annotation": "阴吹就是阴道排气（阴吹），声音很大。原因是胃肠之气下泄（谷气之实），大便燥结。用猪膏发煎润肠通便。猪膏（猪油）润燥滑肠，乱发（血余炭）消瘀通利。大便通畅了，阴吹自然就好了。", "contraindication": "", "keywords": "阴吹,阴道排气,猪膏发煎,谷气之实"}, {"id": 786, "source": "金匮要略", "article_number": "22-21", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "土瓜根散方：治带下，经水不利，小腹满痛，经一月再见者。", "tags": "带下,经水不利,小腹满痛", "formula": "土瓜根散", "formula_detail": "土瓜根、芍药、桂枝、䗪虫各三分", "ni_annotation": "土瓜根散治带下、月经不畅、小腹胀痛、月经两个月来一次。土瓜根（王瓜根）活血通瘀，芍药和血止痛，桂枝温通血脉，䗪虫破血逐瘀。四味合用，活血化瘀通经。", "contraindication": "", "keywords": "经水不利,带下,土瓜根散,月经不调"}, {"id": 787, "source": "金匮要略", "article_number": "22-22", "liujing": "妇人杂病", "chapter": "妇人杂病脉证并治第二十二", "original_text": "妇人经水不利下，土瓜根散主之。", "tags": "经水不利", "formula": "土瓜根散", "formula_detail": "土瓜根、芍药、桂枝、䗪虫各三分。杵为散，酒服方寸匕，日三服。", "ni_annotation": "妇人月经不通或量少，用土瓜根散。和抵当汤相比，土瓜根散力量温和得多，适合瘀血不甚重的情况。抵当汤用水蛭虻虫，是峻猛攻下之剂；土瓜根散用药平和，是缓图之法。", "contraindication": "", "keywords": "月经不畅,土瓜根散"}, {"id": 788, "source": "温病条辨", "article_number": "1", "liujing": "", "chapter": "总纲", "original_text": "温病者：有风温、有温热、有温疫、有温毒、有暑温、有湿温、有秋燥、有冬温、有温疟。", "tags": "[\"温病\", \"分类\"]", "formula": "", "formula_detail": "", "ni_annotation": "吴鞠通开篇即立九种温病纲目，分风温、温热、温疫、温毒、暑温、湿温、秋燥、冬温、温疟，明确温病与伤寒之别。此条为全书纲领，确立三焦辨证体系根基。温病初起邪从口鼻而入，与伤寒之邪从皮毛而入截然不同，学者当明此根本区别。", "contraindication": "", "keywords": "[\"温病\", \"风温\", \"温热\", \"温疫\", \"温毒\", \"暑温\", \"湿温\", \"秋燥\", \"冬温\", \"温疟\"]"}, {"id": 789, "source": "温病条辨", "article_number": "2", "liujing": "", "chapter": "温病总论", "original_text": "凡病温者，始于上焦，在手太阴。", "tags": "[\"温病传变\", \"太阴\"]", "formula": "", "formula_detail": "", "ni_annotation": "此条确立温病传变规律——始于上焦手太阴肺，由口鼻而入，自上而下传变。与伤寒自下而上（足太阳→足阳明）截然相反，为温病三焦辨证奠基。温邪从口鼻吸受，首先犯肺，肺主皮毛，故亦可见表证，但病机根本在肺不在表。", "contraindication": "", "keywords": "[\"上焦\", \"手太阴\", \"传变\", \"口鼻而入\"]"}, {"id": 790, "source": "温病条辨", "article_number": "3", "liujing": "", "chapter": "太阴温病", "original_text": "太阴之为病，脉不缓不紧而动数，或两寸独大，尺肤热，头痛，微恶风寒，身热自汗，口渴，或不渴，而咳，午后热甚者，名曰温病。", "tags": "[\"脉动数\", \"头痛\", \"恶风寒\", \"身热\", \"自汗\", \"口渴\", \"咳嗽\", \"午后热甚\"]", "formula": "", "formula_detail": "", "ni_annotation": "此太阴温病提纲证。脉动数而非浮紧（非伤寒），两寸独大（邪在上焦），午后热甚（阴邪旺于阴分）为辨证要点。头痛、微恶风寒、自汗、口渴——看似太阳中风，实为温邪犯肺。温病脉多浮数，紧者少，此与伤寒脉紧之辨最为关键。", "contraindication": "", "keywords": "[\"太阴温病\", \"脉动数\", \"午后热甚\", \"两寸独大\"]"}, {"id": 791, "source": "温病条辨", "article_number": "4", "liujing": "", "chapter": "风温温热温疫冬温", "original_text": "太阴风温、温热、温疫、冬温，初起恶风寒者，桂枝汤主之；但热不恶寒而渴者，辛凉平剂银翘散主之。", "tags": "[\"发热\", \"恶风寒\", \"口渴\", \"头痛\", \"咽痛\"]", "formula": "银翘散", "formula_detail": "连翘一两、金银花一两、桔梗六钱、薄荷六钱、竹叶四钱、生甘草五钱、荆芥穗四钱、淡豆豉五钱、牛蒡子六钱、鲜苇根为引", "ni_annotation": "吴鞠通妙在太阴温病初起分两途：恶寒者用桂枝汤（辛温解肌），但热不渴用银翘散（辛凉透表）。银翘散为温病第一方，疏风清热、宣肺解毒，药性轻清上浮专走肺卫。禁忌：温毒、暑温、湿温、温疟不在此例。倪师云：银翘散如春风拂面，轻清灵动，不可过煮。", "contraindication": "温毒、暑温、湿温、温疟不适用此条治法", "keywords": "[\"桂枝汤\", \"银翘散\", \"辛凉平剂\", \"但热不恶寒\"]"}, {"id": 792, "source": "温病条辨", "article_number": "5", "liujing": "", "chapter": "太阴温病", "original_text": "太阴温病，恶风寒，服桂枝汤已，恶寒解，余病不解者，银翘散主之。余证悉减者，减其制。", "tags": "[\"恶寒解\", \"余热不退\"]", "formula": "银翘散", "formula_detail": "连翘一两、金银花一两、桔梗六钱、薄荷六钱、竹叶四钱、生甘草五钱、荆芥穗四钱、淡豆豉五钱、牛蒡子六钱、鲜苇根为引", "ni_annotation": "此条指明服桂枝汤后恶寒虽解但余热未清的处理。温邪不易尽透，续用银翘散轻清宣透。余证减轻则减量，灵活变通，中病即止。倪师强调：温病用药如将兵，宜轻宜活，不可蛮补蛮攻。银翘散轻清之品，中病即止，过服反伤胃气。", "contraindication": "", "keywords": "[\"银翘散\", \"减制\"]"}, {"id": 793, "source": "温病条辨", "article_number": "6", "liujing": "", "chapter": "风温", "original_text": "太阴风温，但咳，身不甚热，微渴者，辛凉轻剂桑菊饮主之。", "tags": "[\"咳嗽\", \"微热\", \"微渴\"]", "formula": "桑菊饮", "formula_detail": "桑叶二钱五分、菊花一钱、杏仁二钱、连翘一钱五分、薄荷八分、桔梗二钱、生甘草八分、苇根二钱", "ni_annotation": "桑菊饮较银翘散更轻，重在宣肺止咳。风温犯肺但咳不热重，邪在肺络非卫表，故用桑叶、菊花轻清走上，杏仁、桔梗宣降肺气。吴鞠通谓之'辛凉轻剂'，与银翘散（平剂）、白虎汤（重剂）成辛凉三阶梯。咳甚者可加贝母、枇杷叶。", "contraindication": "", "keywords": "[\"桑菊饮\", \"辛凉轻剂\", \"但咳\", \"风温犯肺\"]"}, {"id": 794, "source": "温病条辨", "article_number": "7", "liujing": "", "chapter": "太阴温病", "original_text": "太阴温病，脉浮洪，舌黄，渴甚，大汗，面赤，恶热者，辛凉重剂白虎汤主之。", "tags": "[\"脉浮洪\", \"舌黄\", \"渴甚\", \"大汗\", \"面赤\", \"恶热\"]", "formula": "白虎汤", "formula_detail": "生石膏一两、知母五钱、生甘草三钱、白粳米一合", "ni_annotation": "四大症（大热、大汗、大渴、脉洪大）齐备则为白虎汤证。此热入阳明气分，非银翘所能及，必用石膏直清阳明。吴鞠通列辛凉三剂：轻剂桑菊饮、平剂银翘散、重剂白虎汤，层层递进。石膏用量宜重，轻则不效，倪师常用至二两以上。", "contraindication": "脉浮弦而细、脉沉、不渴、汗不出者禁用白虎汤（见第9条）", "keywords": "[\"白虎汤\", \"辛凉重剂\", \"四大症\", \"气分热盛\"]"}, {"id": 795, "source": "温病条辨", "article_number": "8", "liujing": "", "chapter": "太阴温病", "original_text": "太阴温病，脉浮大而芤，汗大出，微喘，甚至鼻孔扇者，白虎加人参汤主之；脉若散大者，急用之；倍人参。", "tags": "[\"脉浮大而芤\", \"汗大出\", \"微喘\", \"鼻孔扇\", \"脉散大\"]", "formula": "白虎加人参汤", "formula_detail": "生石膏一两、知母五钱、生甘草三钱、白粳米一合、人参三钱", "ni_annotation": "白虎证兼脉芤（气津两伤）、喘促、鼻扇——热盛伤津耗气已重。加人参益气生津，脉散大者急用倍人参，否则有气脱之危。此条与伤寒论白虎加人参汤证一脉相承。倪师云：白虎加人参汤是救津液第一方，脉散大如散沙者，人参非重用不可。", "contraindication": "", "keywords": "[\"白虎加人参汤\", \"气津两伤\", \"脉芤\", \"倍人参\"]"}, {"id": 796, "source": "温病条辨", "article_number": "9", "liujing": "", "chapter": "太阴温病禁例", "original_text": "白虎本为达热出表，若其人脉浮弦而细者，不可与也；脉沉者，不可与也；不渴者，不可与也，汗不出者，不可与也；常须识此，勿令误也。", "tags": "[\"白虎禁忌\", \"脉浮弦细\", \"脉沉\", \"不渴\", \"无汗\"]", "formula": "", "formula_detail": "", "ni_annotation": "吴鞠通立白虎四禁——脉浮弦细（表未解）、脉沉（邪在里不在气分）、不渴（无热或湿阻）、无汗（表郁），犯之则冰伏邪气或伤胃阳。此为温病用石膏第一注意事项，临床必谨守。倪师强调：白虎汤如冰雪浇身，用时须确有几分把握。", "contraindication": "白虎汤四大禁忌，误用则冰伏热邪", "keywords": "[\"白虎四禁\", \"脉浮弦细\", \"脉沉\", \"不渴\", \"无汗\"]"}, {"id": 797, "source": "温病条辨", "article_number": "10", "liujing": "", "chapter": "太阴温病", "original_text": "太阴温病，气血两燔者，玉女煎去牛膝加元参主之。", "tags": "[\"气血两燔\", \"壮热\", \"口渴\"]", "formula": "玉女煎去牛膝加元参", "formula_detail": "生石膏一两、知母四钱、元参四钱、细生地六钱、麦冬六钱", "ni_annotation": "气血两燔即气分热盛兼血分受灼。去牛膝之走下，加元参之凉血养阴，与石膏知母共奏气营两清之功。此方为化斑汤前身，病位较白虎更深入血络。玉女煎原方有熟地牛膝，吴鞠通改熟地为细生地、去牛膝，更加元参，变补肾为凉血。", "contraindication": "", "keywords": "[\"玉女煎去牛膝\", \"气血两燔\", \"气营两清\"]"}, {"id": 798, "source": "温病条辨", "article_number": "11", "liujing": "", "chapter": "太阴温病", "original_text": "太阴温病，血从上溢者，犀角地黄汤合银翘散主之。若吐粉红血水者，死不治。", "tags": "[\"血从上溢\", \"衄血\", \"吐血\", \"粉红血水\"]", "formula": "犀角地黄汤合银翘散", "formula_detail": "犀角三钱、生地黄一两、白芍三钱、丹皮三钱，合银翘散（连翘一两、金银花一两、桔梗六钱、薄荷六钱、竹叶四钱、生甘草五钱、荆芥穗四钱、淡豆豉五钱、牛蒡子六钱、鲜苇根为引）", "ni_annotation": "温邪入血，迫血妄行而致衄血吐血。犀角地黄凉血散血，银翘散透热转气，二方合用表里双解。吐粉红血水（肺组织破坏）为危候，死不治——吴鞠通直言预后，诚实可贵。倪师云：粉红血水如洗肉水，乃肺络大伤，回天乏术。", "contraindication": "吐粉红血水者预后极差，需高度重视", "keywords": "[\"犀角地黄汤\", \"血从上溢\", \"粉红血水\", \"死证\"]"}, {"id": 799, "source": "温病条辨", "article_number": "12", "liujing": "", "chapter": "太阴温病", "original_text": "太阴温病，口渴甚者，悉尼浆沃之；吐白沫粘滞不快者，五汁饮沃之。", "tags": "[\"口渴甚\", \"吐白沫\", \"粘滞\"]", "formula": "五汁饮", "formula_detail": "雪梨浆（甜水梨一枚切薄片，新汲凉水浸半日频饮）；五汁饮（梨汁、荸荠汁、鲜苇根汁、麦冬汁、藕汁各等分，凉服或温服）", "ni_annotation": "温病后期津液大伤，非草木药石所能急补。雪梨浆甘寒生津，五汁饮五果五菜之汁甘润滋养胃肺之阴。'沃之'二字妙，如灌溉枯田。此法简便有效，体现温病'存津液'第一要义。倪师常教：温病救津液如救火，迟则不及。", "contraindication": "", "keywords": "[\"雪梨浆\", \"五汁饮\", \"甘寒生津\", \"沃之\"]"}, {"id": 800, "source": "温病条辨", "article_number": "13", "liujing": "", "chapter": "太阴温病", "original_text": "太阴病得之二、三日，舌微黄，寸脉盛，心烦懊憹，起卧不安，欲呕不得呕，无中焦证，栀子豉汤主之。", "tags": "[\"舌微黄\", \"心烦懊憹\", \"起卧不安\", \"欲呕不得呕\"]", "formula": "栀子豉汤", "formula_detail": "栀子五枚、香豉六钱。先煮栀子，后纳香豉。", "ni_annotation": "此条与伤寒论栀子豉汤证同——热扰胸膈，气机不畅。寸脉盛（邪在上焦），无中焦证（鉴别要点），故用栀子清透郁热、豆豉宣散余邪。温病与伤寒在此方证合一。倪师云：栀子豉汤治虚烦不得眠，心中懊憹，如饥如饿却不能吃。", "contraindication": "", "keywords": "[\"栀子豉汤\", \"懊憹\", \"心烦\", \"热扰胸膈\"]"}, {"id": 801, "source": "温病条辨", "article_number": "14", "liujing": "", "chapter": "太阴温病", "original_text": "太阴病得之二、三日，心烦不安；痰涎壅盛，胸中痞塞欲呕者，无中焦证，瓜蒂散主之，虚者加参芦。", "tags": "[\"痰涎壅盛\", \"胸中痞塞\", \"欲呕\", \"心烦\"]", "formula": "瓜蒂散", "formula_detail": "甜瓜蒂一钱、赤小豆一钱、山栀子二钱，为末，酸浆水调服。虚者加参芦。", "ni_annotation": "痰涎壅塞胸中——有物阻隔非栀豉所能宣透，必用瓜蒂涌吐。此为'其高者因而越之'之法。虚人加参芦，吐而不伤正。注意：无中焦证才可用吐法，否则引邪入里。倪师云：吐法如探囊取物，用之得当立竿见影，误用则虚人元气。", "contraindication": "有中焦证者禁用吐法；体虚者慎用需加参芦", "keywords": "[\"瓜蒂散\", \"涌吐\", \"痰涎壅盛\", \"参芦\"]"}, {"id": 802, "source": "温病条辨", "article_number": "15", "liujing": "", "chapter": "太阴温病营分证", "original_text": "太阴温病，寸脉大，舌绛而干，法当渴，今反不渴者，热在营中也，清营汤去黄连主之。", "tags": "[\"寸脉大\", \"舌绛而干\", \"反不渴\", \"热在营中\"]", "formula": "清营汤去黄连", "formula_detail": "犀角三钱、生地五钱、元参三钱、竹叶心一钱、麦冬三钱、丹参二钱、金银花三钱、连翘二钱（连心）", "ni_annotation": "舌绛而干为营分热盛之确据，反不渴为热入营分的特点（邪热蒸腾营阴上潮）。去黄连者，恐其苦燥伤营阴。清营汤为温病营分证第一方，透热转气为治法核心。倪师云：营分证口渴反减轻，此乃热入深层的信号，不可误以为病退。", "contraindication": "", "keywords": "[\"清营汤\", \"舌绛而干\", \"反不渴\", \"热入营分\"]"}, {"id": 803, "source": "温病条辨", "article_number": "16", "liujing": "", "chapter": "太阴温病", "original_text": "太阴温病，不可发汗，发汗而汗不出者，必发斑疹，汗出过多者，必神昏谵语。发斑者，化斑汤主之；发疹者，银翘散去豆豉加细生地丹皮大青叶倍元参主之。神昏谵语者，清宫汤主之，牛黄丸、紫雪丹、局方至宝丹亦主之。", "tags": "[\"斑疹\", \"神昏谵语\", \"发斑\", \"发疹\", \"不可发汗\"]", "formula": "化斑汤", "formula_detail": "化斑汤（石膏一两、知母四钱、生甘草三钱、元参三钱、犀角二钱、白粳米一合）；银翘散加减方（银翘散去豆豉加细生地四钱、丹皮三钱、大青叶三钱、倍元参至一两）；清宫汤（元参心三钱、莲子心五分、竹叶卷心二钱、连翘心二钱、犀角尖二钱磨冲、连心麦冬三钱）；安宫牛黄丸/紫雪丹/至宝丹（成药）", "ni_annotation": "温病禁汗！误汗则斑疹（热入血分）或神昏（热陷心包）。发斑用化斑汤（白虎加犀角元参凉血化斑），发疹用银翘散加减（透疹凉血），神昏用清宫汤清心开窍。安宫、紫雪、至宝合称'凉开三宝'——安宫最凉、紫雪镇痉、至宝芳香，各有专攻。倪师云：温病误汗如抱薪救火。", "contraindication": "温病绝对禁汗！发汗则变证蜂起", "keywords": "[\"化斑汤\", \"清宫汤\", \"安宫牛黄丸\", \"紫雪丹\", \"至宝丹\", \"斑疹\", \"神昏\"]"}, {"id": 804, "source": "温病条辨", "article_number": "17", "liujing": "", "chapter": "邪入心包", "original_text": "邪入心包，舌蹇肢厥，牛黄丸主之，紫雪丹亦主之。", "tags": "[\"舌蹇\", \"肢厥\", \"神昏\"]", "formula": "安宫牛黄丸", "formula_detail": "牛黄一两、郁金一两、犀角一两、黄连一两、朱砂一两、梅片二钱五分、麝香二钱五分、珍珠五钱、山栀一两、雄黄一两、黄芩一两（共11味，炼蜜为丸金箔为衣）", "ni_annotation": "舌蹇（舌强不语）、肢厥（四肢厥冷）为热陷心包两大特征。心主舌、主神志，热邪闭窍则舌强、神昏、肢冷（热深厥亦深）。安宫牛黄丸清心开窍、紫雪丹清热镇痉，二者皆温病三宝之核心。倪师云：舌强是心包受邪第一信号，不可耽误。", "contraindication": "", "keywords": "[\"邪入心包\", \"舌蹇肢厥\", \"安宫牛黄丸\", \"紫雪丹\"]"}, {"id": 805, "source": "温病条辨", "article_number": "18", "liujing": "", "chapter": "温毒", "original_text": "温毒咽痛喉肿，耳前耳后肿，颊肿，面正赤，或喉不痛但外肿，甚则耳聋，俗名大头温、虾蟆温者，普济消毒饮去柴胡升麻主之。", "tags": "[\"咽痛喉肿\", \"耳前耳后肿\", \"颊肿\", \"面赤\", \"耳聋\", \"大头温\"]", "formula": "普济消毒饮去升麻柴胡", "formula_detail": "黄芩五钱、黄连五钱、连翘一两、元参一两、板蓝根一两、马勃一两、牛蒡子六钱、僵蚕七钱、薄荷一钱、桔梗二两、陈皮二钱、生甘草三钱", "ni_annotation": "大头温（头面红肿如斗）为温毒上攻之典型。普济消毒饮清热解毒、疏风散邪，去升柴恐其升散助热。初起去芩连恐其苦寒冰伏，三日后热毒盛则加之，步步为营。倪师云：大头温来势凶猛，须抓紧时机，不可畏首畏尾。", "contraindication": "", "keywords": "[\"普济消毒饮\", \"大头温\", \"虾蟆温\", \"温毒\"]"}, {"id": 806, "source": "温病条辨", "article_number": "19", "liujing": "", "chapter": "温毒", "original_text": "温毒外肿，水仙膏主之，并主一切痈疮。", "tags": "[\"温毒外敷\", \"水仙膏\"]", "formula": "水仙膏", "formula_detail": "水仙膏（水仙花根去芦头，捣烂敷患处，中留一孔出热气，干则易之）", "ni_annotation": "温毒头面外肿，内服普济消毒饮之外，辅以水仙膏外敷。水仙花根捣烂外敷，拔毒消肿之力甚强。中留一孔令热气得出，干则更换，此法简便有效。温病外治法亦不可轻视。倪师云：外治法与内服药配合，如鸟之双翼，缺一不可。", "contraindication": "", "keywords": "[\"外治法\", \"水仙膏\", \"温毒外敷\"]"}, {"id": 807, "source": "温病条辨", "article_number": "20", "liujing": "", "chapter": "温毒", "original_text": "温毒敷水仙膏后，皮间生黄疮，用三黄二香散调敷之。", "tags": "[\"三黄二香散\", \"黄疮\"]", "formula": "三黄二香散", "formula_detail": "黄连一两、黄柏一两、生大黄一两、乳香五钱、没药五钱，为细末，茶油调敷", "ni_annotation": "敷水仙膏后皮间起黄疮（水泡或破溃），说明毒邪外透、水仙膏已尽其力，改用三黄二香散。黄连、黄柏、大黄苦寒清热燥湿，乳香、没药活血止痛，茶油调敷润而不燥。温病外治亦讲究层次。倪师云：外治如用兵，当循次而进。", "contraindication": "", "keywords": "[\"三黄二香散\", \"外敷\", \"温毒\"]"}, {"id": 808, "source": "温病条辨", "article_number": "21", "liujing": "", "chapter": "温毒", "original_text": "温毒神昏谵语者，先与安宫牛黄丸、紫雪丹之属，继以清宫汤。", "tags": "[\"神昏谵语\", \"温毒\", \"心包\"]", "formula": "安宫牛黄丸", "formula_detail": "安宫牛黄丸（牛黄一两、郁金一两、犀角一两、黄连一两、朱砂一两、梅片二钱五分、麝香二钱五分、珍珠五钱、山栀一两、雄黄一两、黄芩一两，炼蜜为丸金箔为衣）；清宫汤（元参心三钱、莲子心五分、竹叶卷心二钱、连翘心二钱、犀角尖二钱磨冲、连心麦冬三钱）", "ni_annotation": "温毒深入，热陷心包则神昏谵语。先予安宫牛黄丸或紫雪丹开窍醒神，待神志稍清再以清宫汤清心养阴。先开其窍、后清其热，层次分明。温毒之危候在此，医者不可不察。倪师云：神昏谵语是温病最危急时刻，安宫牛黄丸下去，往往一剂知二剂已。", "contraindication": "", "keywords": "[\"安宫牛黄丸\", \"紫雪丹\", \"清宫汤\", \"温毒神昏\"]"}, {"id": 809, "source": "温病条辨", "article_number": "22", "liujing": "", "chapter": "暑温", "original_text": "形似伤寒，但右脉洪大而数，左脉反小于右，口渴甚，面赤，汗大出者，名曰暑温，在手太阴，白虎汤主之；脉芤甚者，白虎加人参汤主之。", "tags": "['形似伤寒', '右脉洪大', '口渴甚', '面赤', '汗大出']", "formula": "白虎汤", "formula_detail": "生石膏一两、知母五钱、生甘草三钱、粳米一合", "ni_annotation": "暑温初起形似伤寒，但右脉洪大数、左脉反小，此暑热在肺，右脉主气故洪大。口渴甚、面赤、汗大出皆暑热伤津之象。白虎汤清气分之热，若脉芤甚则热伤元气，加人参益气生津。", "contraindication": "", "keywords": "['暑温', '白虎汤', '右大于左', '脉芤']"}, {"id": 810, "source": "温病条辨", "article_number": "23", "liujing": "", "chapter": "暑温", "original_text": "《金匮》谓太阳中暍，发热恶寒，身重而疼痛，其脉弦细芤迟……可与东垣清暑益气汤。", "tags": "['发热恶寒', '身重疼痛', '脉弦细芤迟']", "formula": "清暑益气汤", "formula_detail": "黄芪一钱、黄柏一钱、麦冬二钱、青皮一钱、白术一钱五分、升麻三分、当归七分、炙甘草一钱、神曲一钱、人参一钱、泽泻一钱、五味子三分、陈皮一钱、苍术一钱五分、葛根三分、生姜二片、大枣二枚", "ni_annotation": "中暍即中暑，发热恶寒、身重疼痛，脉弦细芤迟，此暑伤元气、湿热困阻之证。东垣清暑益气汤黄芪、人参益气，黄柏、麦冬清热，苍术、白术、泽泻祛湿，升麻、葛根升清，诸药合用共奏清暑益气之功。", "contraindication": "", "keywords": "['清暑益气汤', '中暍', '东垣']"}, {"id": 811, "source": "温病条辨", "article_number": "24", "liujing": "", "chapter": "暑温", "original_text": "手太阴暑温，如上条证，但汗不出者，新加香薷饮主之。", "tags": "['汗不出', '暑温', '表实']", "formula": "新加香薷饮", "formula_detail": "香薷二钱、金银花三钱、鲜扁豆花三钱、厚朴二钱、连翘二钱", "ni_annotation": "暑温本应汗大出，今汗不出者，乃暑夹湿邪郁于表，表气不通。香薷辛温发汗解表，为夏月解表要药；银花、连翘清热；厚朴化湿；扁豆花清暑化湿。此方解表清暑化湿并进。", "contraindication": "", "keywords": "['新加香薷饮', '无汗', '香薷']"}, {"id": 812, "source": "温病条辨", "article_number": "25", "liujing": "", "chapter": "暑温", "original_text": "服香薷饮得汗后不可再服，暑必伤气最令表虚。", "tags": "['服香薷得汗', '不可再服', '暑伤气']", "formula": "", "formula_detail": "", "ni_annotation": "香薷饮发汗解表，得汗后暑邪已透，不可再服。暑性伤气，过汗则表虚气脱。此条提示用药中病即止，不可过剂伤正。暑病最易伤气，治疗当顾护元气。", "contraindication": "", "keywords": "['香薷饮', '得汗停服', '暑伤气']"}, {"id": 813, "source": "温病条辨", "article_number": "26", "liujing": "", "chapter": "暑温", "original_text": "手太阴暑温，或已经发汗，或未发汗，而汗不止，烦渴而喘，脉洪大有力者，白虎汤主之；脉洪大而芤者，白虎加人参汤主之；身重者，湿也，白虎加苍术汤主之；汗多脉散大，喘喝欲脱者，生脉散主之。", "tags": "['汗不止', '烦渴而喘', '身重', '脉散大', '喘喝欲脱']", "formula": "生脉散", "formula_detail": "人参三钱、麦冬二钱、五味子一钱。白虎加苍术汤：白虎汤加苍术三钱", "ni_annotation": "暑温汗不止、烦渴而喘，热盛气分，白虎汤清热益气。若脉洪大而芤，热伤元气，加人参益气生津。身重为夹湿，白虎加苍术汤清热化湿。汗多脉散大、喘喝欲脱，乃元气将脱，生脉散益气敛阴固脱。", "contraindication": "", "keywords": "['白虎加苍术汤', '生脉散', '脉散大', '喘喝欲脱']"}, {"id": 814, "source": "温病条辨", "article_number": "27", "liujing": "", "chapter": "暑温", "original_text": "手太阴暑温，发汗后，暑证悉减，但头微胀，目不了了，余邪不解者，清络饮主之。", "tags": "['头微胀', '目不了了', '余邪']", "formula": "清络饮", "formula_detail": "鲜荷叶边二钱、鲜银花二钱、西瓜翠衣二钱、鲜扁豆花一钱、丝瓜皮二钱、鲜竹叶心二钱", "ni_annotation": "暑温发汗后，主证已减，但头微胀、目不了了，为暑邪余烬未清，上扰清窍。清络饮用鲜药轻清芳透，荷叶、银花、扁豆花、丝瓜皮皆轻清走上，西瓜翠衣清热解暑，竹叶心清心利尿，使余邪从上下分消。", "contraindication": "", "keywords": "['清络饮', '余邪', '轻清芳透']"}, {"id": 815, "source": "温病条辨", "article_number": "28", "liujing": "", "chapter": "暑温", "original_text": "手太阴暑温，但咳无痰，咳声清高者，清络饮加甘草、桔梗、甜杏仁、麦冬、知母主之。", "tags": "['但咳无痰', '咳声清高']", "formula": "清络饮加味", "formula_detail": "清络饮加甘草、桔梗、甜杏仁、麦冬、知母", "ni_annotation": "暑温但咳无痰、咳声清高，乃暑邪伤肺、肺燥津伤。清络饮清解余邪，加甘草、桔梗宣肺利咽，甜杏仁、麦冬、知母润肺止咳。此为暑后肺燥咳嗽之治法，以轻清润肺为主。", "contraindication": "", "keywords": "['清络饮加味', '干咳', '肺燥']"}, {"id": 816, "source": "温病条辨", "article_number": "29", "liujing": "", "chapter": "暑温兼湿饮", "original_text": "两太阴暑温，咳而且嗽，咳声重浊，痰多不甚渴，渴不多饮者，小半夏加茯苓汤再加厚朴、杏仁主之。", "tags": "['咳声重浊', '痰多', '渴不多饮']", "formula": "小半夏加茯苓汤加厚朴杏仁", "formula_detail": "半夏八钱、茯苓六钱、生姜五钱、厚朴三钱、杏仁三钱", "ni_annotation": "两太阴暑温，肺脾同病，咳声重浊、痰多不甚渴，乃暑夹湿饮停肺。小半夏加茯苓汤化痰饮、和胃降逆，加厚朴、杏仁宣肺化痰、下气除湿。此方标本兼顾，化饮宣肺并进。", "contraindication": "", "keywords": "['两太阴', '小半夏加茯苓汤', '湿饮', '咳声重浊']"}, {"id": 817, "source": "温病条辨", "article_number": "30", "liujing": "", "chapter": "暑温", "original_text": "脉虚夜寐不安，烦渴舌赤，时有谵语，目常开不闭，或喜闭不开，暑入手厥阴也。手厥阴暑温，清营汤主之；舌白滑者，不可与也。", "tags": "['夜寐不安', '烦渴', '舌赤', '谵语', '目开不闭']", "formula": "清营汤", "formula_detail": "犀角三钱、生地五钱、元参三钱、竹叶心一钱、麦冬三钱、丹参二钱、黄连一钱五分、金银花三钱、连翘二钱", "ni_annotation": "暑温脉虚、夜寐不安、烦渴舌赤、时有谵语，目常开不闭或喜闭不开，乃暑热入营、热扰心神。清营汤清营透热、养阴活血，犀角、黄连清心凉营，生地、元参、麦冬养阴，银花、连翘、竹叶心透热转气。舌白滑为湿重，不可用清营汤。", "contraindication": "舌白滑者不可用清营汤", "keywords": "['清营汤', '手厥阴', '暑入心包', '舌白滑不可与']"}, {"id": 818, "source": "温病条辨", "article_number": "31", "liujing": "", "chapter": "暑温", "original_text": "手厥阴暑温，身热不恶寒，清神不了了时时谵语者，安宫牛黄丸主之，紫雪丹亦主之。", "tags": "['身热不恶寒', '谵语', '神昏']", "formula": "安宫牛黄丸", "formula_detail": "安宫牛黄丸（成药）", "ni_annotation": "暑温身热不恶寒、神志不清、时时谵语，乃暑热入心包、痰热蒙蔽心窍。安宫牛黄丸清心开窍、豁痰解毒，紫雪丹清热开窍息风，二方皆急救之品。此条为暑温重症，需急开心包之闭。", "contraindication": "", "keywords": "['暑入心包', '安宫牛黄丸', '紫雪丹']"}, {"id": 819, "source": "温病条辨", "article_number": "32", "liujing": "", "chapter": "暑温", "original_text": "暑温寒热，舌白不渴、吐血者，名曰暑瘵，为难治，清络饮加杏仁、薏仁、滑石汤主之。", "tags": "['吐血', '舌白不渴', '暑瘵']", "formula": "清络饮加杏仁薏仁滑石汤", "formula_detail": "清络饮加杏仁三钱、薏仁五钱、滑石三钱", "ni_annotation": "暑温吐血、舌白不渴，名暑瘵，乃暑热伤肺、络脉灼伤而出血。舌白不渴说明夹湿，非纯热证，故曰难治。清络饮轻清解暑，加杏仁宣肺、薏仁健脾利湿、滑石清热利湿，共奏清暑化湿、凉血止血之功。", "contraindication": "", "keywords": "['暑瘵', '吐血', '清络饮加味', '难治']"}, {"id": 820, "source": "温病条辨", "article_number": "33", "liujing": "", "chapter": "暑温", "original_text": "小儿暑温，身热，卒然痉厥，名曰暑痫，清营汤主之，亦可少与紫雪丹。", "tags": "['小儿', '身热', '痉厥', '暑痫']", "formula": "清营汤", "formula_detail": "犀角三钱、生地五钱、元参三钱、竹叶心一钱、麦冬三钱、丹参二钱、黄连一钱五分、金银花三钱、连翘二钱", "ni_annotation": "小儿暑温身热、突然抽搐厥逆，名暑痫，乃暑热入营、热极生风、扰乱神明。清营汤清营凉血、透热转气，兼可息风。紫雪丹清热开窍息风，二方合用共奏清心凉营、息风止痉之效。", "contraindication": "", "keywords": "['暑痫', '小儿', '痉厥', '清营汤', '紫雪丹']"}, {"id": 821, "source": "温病条辨", "article_number": "34", "liujing": "", "chapter": "暑温", "original_text": "大人暑痫，亦同上法。热初入营，肝风内动，手足瘛疭，可于清营汤中加勾藤、丹皮、羚羊角。", "tags": "['大人', '痉厥', '瘛疭', '肝风内动']", "formula": "清营汤加钩藤丹皮羚羊角", "formula_detail": "清营汤加钩藤三钱、丹皮三钱、羚羊角二钱", "ni_annotation": "大人暑痫治法同小儿，热初入营、肝风内动、手足瘛疭，于清营汤中加钩藤息风止痉、丹皮凉血散瘀、羚羊角清心凉肝息风。此条强调暑痫肝风内动者，必加息风之品，不可纯用清营。", "contraindication": "", "keywords": "['暑痫', '瘛疭', '钩藤', '羚羊角', '肝风内动']"}, {"id": 822, "source": "温病条辨", "article_number": "35", "liujing": "", "chapter": "伏暑", "original_text": "暑兼湿热，偏于热者，为暑温，多手太阴病，宜清法；偏于湿者，为湿温，多足太阴病，宜温法。", "tags": "['暑兼湿热', '偏热为暑温', '偏湿为湿温']", "formula": "", "formula_detail": "", "ni_annotation": "此条为暑温、湿温鉴别总纲。暑兼湿热，偏热则热盛伤津，病在手太阴肺，治宜清凉；偏湿则湿盛困脾，病在足太阴脾，治宜温化。临床须辨湿热轻重，决定清温取舍。", "contraindication": "", "keywords": "['暑温', '湿温', '湿热偏胜', '手太阴', '足太阴']"}, {"id": 823, "source": "温病条辨", "article_number": "36", "liujing": "", "chapter": "伏暑", "original_text": "长夏受暑，过夏而发者，名曰伏暑。", "tags": "['长夏受暑', '过夏而发', '伏暑定义']", "formula": "", "formula_detail": "", "ni_annotation": "伏暑者，夏日受暑邪，不即发病，逾夏而后发。此与伤寒冬日受寒、春必病温同理，皆伏邪为病。伏暑多发于冬月，证如疟疾或伤寒，临床须细辨之。", "contraindication": "", "keywords": "['伏暑', '长夏受暑', '过夏而发', '伏邪']"}, {"id": 824, "source": "温病条辨", "article_number": "37", "liujing": "", "chapter": "伏暑", "original_text": "头痛微恶寒，面赤烦渴，舌白，脉濡而数者，虽在冬月，犹为太阴伏暑也。", "tags": "['头痛', '微恶寒', '面赤烦渴', '舌白', '脉濡数']", "formula": "", "formula_detail": "", "ni_annotation": "头痛微恶寒、面赤烦渴，似外感而实非；舌白、脉濡而数，乃湿中夹热之象。虽在冬月发病，仍属太阴伏暑，不可误作伤寒。此条示人伏暑之辨证要点，重在舌白脉濡而数。", "contraindication": "", "keywords": "['伏暑', '太阴', '舌白脉濡', '冬月发病']"}, {"id": 825, "source": "温病条辨", "article_number": "38", "liujing": "", "chapter": "伏暑", "original_text": "太阴伏暑，舌白口渴，无汗者，银翘散去牛蒡、元参加杏仁、滑石主之。", "tags": "['舌白口渴', '无汗', '伏暑气分']", "formula": "银翘散去牛蒡元参加杏仁滑石", "formula_detail": "银翘散去牛蒡子、元参，加杏仁三钱、滑石三钱", "ni_annotation": "太阴伏暑、舌白口渴、无汗，乃暑湿在气分、表卫郁闭。银翘散去牛蒡、元参之凉血药，加杏仁宣肺化湿、滑石清热利湿。此方表里双解，解表化湿并进，为伏暑气分表实之主方。", "contraindication": "", "keywords": "['银翘散', '伏暑', '气分', '表实', '杏仁滑石']"}, {"id": 826, "source": "温病条辨", "article_number": "39", "liujing": "", "chapter": "伏暑", "original_text": "太阴伏暑，舌赤口渴，无汗者，银翘散加生地、丹皮、赤芍、麦冬主之。", "tags": "['舌赤口渴', '无汗', '伏暑血分']", "formula": "银翘散加生地丹皮赤芍麦冬", "formula_detail": "银翘散加生地五钱、丹皮三钱、赤芍三钱、麦冬三钱", "ni_annotation": "太阴伏暑、舌赤口渴、无汗，乃暑热入血分、表卫郁闭。舌赤为热入血分之征，故于银翘散中加入生地、丹皮、赤芍凉血散瘀，麦冬养阴生津。此方表里同治，解表清血分之热。", "contraindication": "", "keywords": "['银翘散', '伏暑', '血分', '舌赤', '凉血']"}, {"id": 827, "source": "温病条辨", "article_number": "40", "liujing": "", "chapter": "伏暑", "original_text": "太阴伏暑舌白口渴，有汗或大汗不止者，银翘散去牛蒡子元参芥穗加杏仁石膏黄芩主之。", "tags": "['舌白口渴', '有汗', '大汗不止', '伏暑表虚']", "formula": "银翘散去牛蒡元参芥穗加杏仁石膏黄芩", "formula_detail": "银翘散去牛蒡子、元参、芥穗，加杏仁三钱、石膏五钱、黄芩三钱", "ni_annotation": "太阴伏暑、舌白口渴、有汗或大汗不止，乃表虚暑湿在气分。去芥穗之辛散，加杏仁宣肺化湿，石膏、黄芩清气分之热。表虚有汗者不可强发其汗，故去芥穗，此为伏暑气分表虚之治法。", "contraindication": "", "keywords": "['银翘散', '伏暑', '表虚', '有汗', '石膏黄芩']"}, {"id": 828, "source": "温病条辨", "article_number": "41", "liujing": "", "chapter": "伏暑", "original_text": "太阴伏暑，舌赤口渴汗多，加减生脉散主之。", "tags": "['舌赤口渴', '汗多', '伏暑血分表虚']", "formula": "加减生脉散", "formula_detail": "沙参三钱、麦冬二钱、五味子一钱、丹皮二钱、细生地三钱", "ni_annotation": "太阴伏暑、舌赤口渴汗多，乃热入血分、气阴两伤。生脉散益气养阴，沙参代人参更清，加丹皮、细生地凉血养阴。此方益气养阴与凉血并进，为伏暑血分表虚、气阴两伤之主方。", "contraindication": "", "keywords": "['加减生脉散', '伏暑', '血分', '汗多', '气阴两伤']"}, {"id": 829, "source": "温病条辨", "article_number": "42", "liujing": "", "chapter": "伏暑", "original_text": "伏暑、暑温、湿温，证本一源，前后互参，不可偏执。", "tags": "['伏暑', '暑温', '湿温', '同源异流']", "formula": "", "formula_detail": "", "ni_annotation": "伏暑、暑温、湿温三病同源，皆暑邪为患，但因发病时节、湿热偏胜、体质差异而证型不同。临床须前后互参，不可偏执一端。此条为三病总结，示人辨证须灵活。", "contraindication": "", "keywords": "['伏暑', '暑温', '湿温', '同源', '互参']"}, {"id": 830, "source": "温病条辨", "article_number": "43", "liujing": "", "chapter": "湿温", "original_text": "头痛恶寒，身重疼痛，舌白不渴，脉弦细而濡，面色淡黄，胸闷不饥，午后身热，状若阴虚，病难速已，名曰湿温。汗之则神昏耳聋，下之则洞泄，润之则病深不解。三仁汤主之。", "tags": "['头痛恶寒', '身重疼痛', '舌白不渴', '脉濡', '胸闷不饥', '午后身热']", "formula": "三仁汤", "formula_detail": "杏仁五钱、飞滑石六钱、白通草二钱、白蔻仁二钱、竹叶二钱、厚朴二钱、生薏仁六钱、半夏五钱", "ni_annotation": "湿温头痛恶寒、身重疼痛、舌白不渴、脉濡、胸闷不饥、午后身热，状若阴虚而实非。三仁汤杏仁宣肺、蔻仁化湿、薏仁健脾，三仁分治上中下三焦湿邪；滑石、通草、竹叶清热利湿；厚朴、半夏燥湿化痰。汗之下之润之皆禁忌。", "contraindication": "湿温禁汗（汗之神昏耳聋）、禁下（下之洞泄）、禁润（润之病深不解）", "keywords": "['三仁汤', '湿温', '禁汗禁下禁润', '午后身热']"}, {"id": 831, "source": "温病条辨", "article_number": "44", "liujing": "", "chapter": "湿温", "original_text": "湿温邪入心包，神昏肢逆，清宫汤去莲心麦冬加银花赤小豆皮，煎送至宝丹，或紫雪丹亦可。", "tags": "['湿温', '邪入心包', '神昏肢逆']", "formula": "清宫汤去莲心麦冬加银花赤小豆皮", "formula_detail": "清宫汤去莲心、麦冬，加银花三钱、赤小豆皮三钱，煎送至宝丹或紫雪丹", "ni_annotation": "湿温邪入心包、神昏肢逆，乃湿浊蒙蔽心窍。清宫汤清心凉营，去莲心、麦冬之滋腻，加银花清热解毒、赤小豆皮利水渗湿。送服至宝丹或紫雪丹开窍醒神。此条示湿温入心包之急救法。", "contraindication": "", "keywords": "['湿温', '邪入心包', '清宫汤', '至宝丹', '紫雪丹']"}, {"id": 832, "source": "温病条辨", "article_number": "45", "liujing": "", "chapter": "湿温", "original_text": "湿温喉阻咽痛，银翘马勃散主之。", "tags": "['湿温', '喉阻', '咽痛']", "formula": "银翘马勃散", "formula_detail": "连翘一两、牛蒡子六钱、金银花五钱、射干三钱、马勃二钱", "ni_annotation": "湿温喉阻咽痛，乃湿热上蒸、咽喉不利。银翘马勃散连翘、银花清热解毒，牛蒡子、射干、马勃利咽消肿。此方轻清宣透，治湿热上蒸之咽喉病证。", "contraindication": "", "keywords": "['银翘马勃散', '湿温', '喉阻', '咽痛']"}, {"id": 833, "source": "温病条辨", "article_number": "46", "liujing": "", "chapter": "湿温", "original_text": "太阴湿温，气分痹郁而哕者，宣痹汤主之。", "tags": "['太阴湿温', '气分痹郁', '哕']", "formula": "宣痹汤", "formula_detail": "枇杷叶二钱、郁金一钱五分、射干一钱、白通草一钱、香豆豉一钱五分", "ni_annotation": "太阴湿温、气分痹郁而呃逆（哕），乃湿浊闭阻、胃气上逆。宣痹汤枇杷叶清肺和胃降逆，郁金活血行气解郁，射干利咽散结，通草利湿，豆豉宣郁透邪。此方宣肺和胃、化湿降逆。", "contraindication": "", "keywords": "['宣痹汤', '湿温', '哕', '气分痹郁']"}, {"id": 834, "source": "温病条辨", "article_number": "47", "liujing": "", "chapter": "湿温", "original_text": "太阴湿温，喘促者，千金苇茎汤加杏仁滑石主之。", "tags": "['太阴湿温', '喘促']", "formula": "千金苇茎汤加杏仁滑石", "formula_detail": "苇茎五钱、薏苡仁五钱、桃仁二钱、冬瓜仁二钱、杏仁三钱、滑石三钱", "ni_annotation": "太阴湿温喘促，乃湿热壅肺、肺气不降。千金苇茎汤清肺化痰、逐瘀排脓，加杏仁宣肺降逆、滑石清热利湿。此方清肺化痰与利湿并进，为湿温喘促之良方。", "contraindication": "", "keywords": "['千金苇茎汤', '湿温', '喘促', '杏仁滑石']"}, {"id": 835, "source": "温病条辨", "article_number": "48", "liujing": "", "chapter": "湿温", "original_text": "太阳中暍，身热疼痛而脉微弱，此夏月伤冷水，水行皮中所致，一物瓜蒂汤主之。", "tags": "['太阳中暍', '身热疼痛', '脉微弱', '夏月伤冷水']", "formula": "一物瓜蒂汤", "formula_detail": "瓜蒂二十个", "ni_annotation": "太阳中暍、身热疼痛、脉微弱，乃夏月伤冷水、水湿行于皮中。瓜蒂辛寒，能去湿热、催吐祛水。此方以吐法祛皮中之水湿，为因时制宜之治。中暍而用吐法，乃通则之用。", "contraindication": "", "keywords": "['一物瓜蒂汤', '中暍', '夏月伤冷水', '水行皮中']"}, {"id": 836, "source": "温病条辨", "article_number": "49", "liujing": "", "chapter": "寒湿", "original_text": "寒湿伤阳，形寒脉缓，舌淡或白滑不渴，经络拘束，桂枝姜附汤主之。", "tags": "['寒湿伤阳', '形寒脉缓', '舌淡白滑', '经络拘束']", "formula": "桂枝姜附汤", "formula_detail": "桂枝六钱、干姜三钱、白术三钱、熟附子三钱、炙甘草三钱", "ni_annotation": "寒湿伤阳、形寒脉缓、舌淡白滑不渴、经络拘束，乃寒湿困阻、阳气不振。桂枝姜附汤桂枝通阳化气，干姜、附子温阳散寒，白术健脾燥湿，炙甘草调和诸药。此方温阳化湿、散寒通经。", "contraindication": "", "keywords": "['桂枝姜附汤', '寒湿', '伤阳', '形寒脉缓']"}, {"id": 837, "source": "温病条辨", "article_number": "50", "liujing": "", "chapter": "温疟", "original_text": "骨节疼烦，时呕，其脉如平，但热不寒，名曰温疟，白虎加桂枝汤主之。", "tags": "['骨节疼烦', '时呕', '但热不寒', '温疟']", "formula": "白虎加桂枝汤", "formula_detail": "生石膏一两、知母六钱、炙甘草二钱、粳米一合、桂枝三钱", "ni_annotation": "温疟骨节疼烦、时呕、脉如平、但热不寒，乃热盛于里、外兼表邪。白虎汤清气分之热，加桂枝通阳化气、解肌发表。此方清热与解表并进，为温疟之主方。", "contraindication": "", "keywords": "['白虎加桂枝汤', '温疟', '但热不寒', '骨节疼烦']"}, {"id": 838, "source": "温病条辨", "article_number": "51", "liujing": "", "chapter": "温疟", "original_text": "但热不寒，或微寒多热，舌干口渴，阴气先伤阳气独发，名曰瘅疟，五汁饮主之。", "tags": "['但热不寒', '微寒多热', '舌干口渴', '瘅疟']", "formula": "五汁饮", "formula_detail": "梨汁、荸荠汁、鲜苇根汁、麦冬汁、藕汁（或用蔗浆）", "ni_annotation": "瘅疟但热不寒、或微寒多热、舌干口渴，乃阴气先伤、阳气独发。五汁饮取五种甘寒汁液，清热生津、润燥养阴，不用苦寒攻热，恐伤阴也。此方甘寒生津，为瘅疟养阴之良方。", "contraindication": "", "keywords": "['五汁饮', '瘅疟', '阴气先伤', '阳气独发']"}, {"id": 839, "source": "温病条辨", "article_number": "52", "liujing": "", "chapter": "温疟", "original_text": "舌白渴饮，咳嗽频仍，寒从背起，伏暑所致，名曰肺疟，杏仁汤主之。", "tags": "['舌白渴饮', '咳嗽频仍', '寒从背起', '肺疟']", "formula": "杏仁汤", "formula_detail": "杏仁三钱、黄芩一钱五分、连翘一钱五分、滑石三钱、桑叶一钱五分、茯苓三钱、白蔻皮八分、梨皮二钱", "ni_annotation": "肺疟舌白渴饮、咳嗽频仍、寒从背起，乃伏暑犯肺、肺失宣降。杏仁汤杏仁宣肺止咳，黄芩、连翘清热，滑石利湿，桑叶疏风，茯苓健脾，白蔻皮化湿，梨皮清热润燥。此方宣肺清热、化湿止咳。", "contraindication": "", "keywords": "['杏仁汤', '肺疟', '伏暑', '寒从背起']"}, {"id": 840, "source": "温病条辨", "article_number": "53", "liujing": "", "chapter": "温疟", "original_text": "热多昏狂，谵语烦渴，舌赤中黄，脉弱而数，名曰心疟，加减银翘散主之。", "tags": "['热多昏狂', '谵语烦渴', '舌赤中黄', '心疟']", "formula": "加减银翘散", "formula_detail": "银翘散加减（去豆豉，加生地、麦冬、元参、丹皮）", "ni_annotation": "心疟热多昏狂、谵语烦渴、舌赤中黄、脉弱而数，乃热入心包、心神被扰。加减银翘散银花、连翘清热解毒，去豆豉之辛散，加生地、麦冬、元参养阴，丹皮凉血。此方清热解毒与养阴凉血并进。", "contraindication": "", "keywords": "['心疟', '加减银翘散', '热入心包', '谵语昏狂']"}, {"id": 841, "source": "温病条辨", "article_number": "54", "liujing": "", "chapter": "秋燥", "original_text": "秋感燥气，右脉数大，伤手太阴气分者，桑杏汤主之。", "tags": "['秋感燥气', '右脉数大', '手太阴气分']", "formula": "桑杏汤", "formula_detail": "桑叶一钱、杏仁一钱五分、沙参二钱、象贝一钱、香豉一钱、栀皮一钱、梨皮一钱", "ni_annotation": "秋感燥气、右脉数大、伤手太阴气分，乃燥热伤肺。桑杏汤桑叶轻清燥热，杏仁宣肺润燥，沙参养阴润肺，象贝化痰，香豉宣透燥邪，栀皮清热，梨皮润燥。此方轻宣凉润，为秋燥初起之主方。", "contraindication": "", "keywords": "['桑杏汤', '秋燥', '右脉数大', '手太阴']"}, {"id": 842, "source": "温病条辨", "article_number": "55", "liujing": "", "chapter": "秋燥", "original_text": "感燥而咳，桑菊饮主之。", "tags": "['感燥而咳', '秋燥咳嗽']", "formula": "桑菊饮", "formula_detail": "桑叶二钱五分、菊花一钱、杏仁二钱、连翘一钱五分、薄荷八分、桔梗二钱、甘草八分、芦根二钱", "ni_annotation": "感燥而咳，乃燥热犯肺、肺失宣降。桑菊饮桑叶、菊花清散燥热，杏仁、桔梗宣肺止咳，连翘、薄荷疏风清热，甘草调和，芦根清热生津。此方轻清宣肺，为燥咳之常用方。", "contraindication": "", "keywords": "['桑菊饮', '秋燥', '咳嗽', '感燥']"}, {"id": 843, "source": "温病条辨", "article_number": "56", "liujing": "", "chapter": "秋燥", "original_text": "燥伤肺胃阴分，或热或咳者，沙参麦冬汤主之。", "tags": "['燥伤肺胃', '阴分受伤', '或热或咳']", "formula": "沙参麦冬汤", "formula_detail": "沙参三钱、玉竹二钱、生甘草一钱、冬桑叶一钱五分、麦冬三钱、生扁豆一钱五分、天花粉一钱五分", "ni_annotation": "燥伤肺胃阴分、或热或咳，乃燥热伤阴、肺胃失润。沙参麦冬汤沙参、麦冬养阴润肺，玉竹、天花粉生津止渴，桑叶清燥热，生扁豆健脾，甘草调和。此方养阴润燥，为燥伤肺胃之主方。", "contraindication": "", "keywords": "['沙参麦冬汤', '秋燥', '肺胃阴伤', '养阴润燥']"}, {"id": 844, "source": "温病条辨", "article_number": "57", "liujing": "", "chapter": "秋燥", "original_text": "燥气化火，清窍不利者，翘荷汤主之。", "tags": "['燥气化火', '清窍不利']", "formula": "翘荷汤", "formula_detail": "薄荷一钱五分、连翘一钱五分、生甘草一钱、黑栀皮一钱五分、桔梗二钱、绿豆皮二钱", "ni_annotation": "燥气化火、清窍不利，乃燥热化火、上攻清窍。翘荷汤薄荷、连翘清散燥火，黑栀皮清热，桔梗宣肺利咽，绿豆皮清热解毒，甘草调和。此方清燥火、利清窍，为燥火蒙窍之良方。", "contraindication": "", "keywords": "['翘荷汤', '秋燥', '化火', '清窍不利']"}, {"id": 845, "source": "温病条辨", "article_number": "58", "liujing": "", "chapter": "秋燥", "original_text": "诸气膹郁，诸痿喘呕之因于燥者，喻氏清燥救肺汤主之。", "tags": "['诸气膹郁', '诸痿喘呕', '因于燥']", "formula": "清燥救肺汤", "formula_detail": "石膏二钱五分、甘草一钱、霜桑叶三钱、人参七分、杏仁七分、胡麻仁一钱、阿胶八分、麦冬二钱、枇杷叶六分", "ni_annotation": "诸气膹郁、诸痿喘呕因于燥者，乃燥热伤肺、肺气膹郁。清燥救肺汤桑叶清燥热，石膏清肺火，人参、甘草益气，杏仁、枇杷叶宣肺降逆，胡麻仁、阿胶、麦冬养阴润燥。此方清燥润肺、益气养阴。", "contraindication": "", "keywords": "['清燥救肺汤', '秋燥', '喻氏', '诸气膹郁']"}, {"id": 846, "source": "温病条辨", "article_number": "补1", "liujing": "", "chapter": "补秋燥胜气论", "original_text": "秋燥总纲：燥为秋令主气，其性清肃，其化收降。秋燥之为病，有温燥、凉燥之分，有上、中、下三焦之辨。", "tags": "['秋燥总纲', '温燥', '凉燥', '三焦辨证']", "formula": "", "formula_detail": "", "ni_annotation": "此条为补秋燥胜气论之总纲。燥为秋令主气，有温燥、凉燥之分。温燥多发于初秋，燥中夹热；凉燥多发于深秋，燥中夹寒。又有上中下三焦之辨，上燥在肺，中燥在脾胃，下燥在肝肾。", "contraindication": "", "keywords": "['秋燥总纲', '温燥', '凉燥', '三焦']"}, {"id": 847, "source": "温病条辨", "article_number": "补2", "liujing": "", "chapter": "补秋燥胜气论", "original_text": "燥伤本脏，头微痛，恶寒，咳嗽稀痰，鼻塞，嗌塞，脉弦，无汗，杏苏散主之。", "tags": "['燥伤本脏', '头微痛', '恶寒', '咳嗽稀痰', '鼻塞嗌塞']", "formula": "杏苏散", "formula_detail": "苏叶一钱、半夏一钱、茯苓一钱、前胡一钱、桔梗一钱、枳壳一钱、甘草五分、生姜一钱、大枣二枚、橘皮一钱、杏仁一钱", "ni_annotation": "凉燥伤肺、头微痛、恶寒、咳嗽稀痰、鼻塞嗌塞、脉弦无汗，乃燥中夹寒、肺失宣降。杏苏散苏叶、生姜散寒，杏仁、前胡、桔梗宣肺止咳，半夏、茯苓、橘皮化痰，枳壳理气，草枣调和。此方温润并行，为凉燥之主方。", "contraindication": "", "keywords": "['杏苏散', '凉燥', '燥伤本脏', '恶寒无汗']"}, {"id": 848, "source": "温病条辨", "article_number": "补3", "liujing": "", "chapter": "补秋燥胜气论", "original_text": "凉燥兼表虚者，桂枝汤主之。", "tags": "['凉燥', '表虚', '桂枝汤']", "formula": "桂枝汤", "formula_detail": "桂枝三钱、芍药三钱、炙甘草二钱、生姜三片、大枣三枚", "ni_annotation": "凉燥兼表虚、汗出恶风，乃燥中夹寒、营卫不和。桂枝汤桂枝、生姜散寒解肌，芍药敛阴和营，草枣调和脾胃。此方解肌发表、调和营卫，为凉燥表虚之治法。", "contraindication": "", "keywords": "['桂枝汤', '凉燥', '表虚', '营卫不和']"}, {"id": 849, "source": "温病条辨", "article_number": "补4", "liujing": "", "chapter": "补秋燥胜气论", "original_text": "燥金克木，肝木受病，桂枝柴胡各半汤加吴萸楝子茴香木香主之。", "tags": "['燥金克木', '肝木受病', '桂枝柴胡各半汤']", "formula": "桂枝柴胡各半汤加吴萸楝子茴香木香", "formula_detail": "桂枝一钱五分、芍药一钱五分、甘草一钱、大枣二枚、生姜一钱、柴胡一钱五分、黄芩一钱、人参五分、半夏一钱五分、吴茱萸五分、川楝子一钱、小茴香一钱、木香五分", "ni_annotation": "燥金克木、肝木受病，乃燥令太过、木气受抑。桂枝柴胡各半汤和解表里、调和营卫，加吴萸、楝子、茴香、木香疏肝理气、温经止痛。此方肝脾同治，为燥金克木之良方。", "contraindication": "", "keywords": "['桂枝柴胡各半汤', '燥金克木', '肝木受病', '吴萸楝子']"}, {"id": 850, "source": "温病条辨", "article_number": "补5", "liujing": "", "chapter": "补秋燥胜气论", "original_text": "燥入中焦，阳明燥金为病，口渴引饮，齿燥咽干，大便干结，脉沉数有力者，增液汤主之；若阴亏甚者，加减复脉汤主之。", "tags": "['燥入中焦', '阳明燥金', '口渴引饮', '大便干结']", "formula": "增液汤", "formula_detail": "玄参一两、麦冬八钱、细生地八钱", "ni_annotation": "燥入中焦、阳明燥金为病，口渴引饮、齿燥咽干、大便干结、脉沉数有力，乃燥热伤津、胃阴不足。增液汤玄参、麦冬、细生地滋阴润燥、增液通便。若阴亏甚，加减复脉汤滋阴复脉。", "contraindication": "", "keywords": "['增液汤', '燥入中焦', '阳明燥金', '滋阴润燥']"}, {"id": 851, "source": "温病条辨", "article_number": "补6", "liujing": "", "chapter": "补秋燥胜气论", "original_text": "阳明燥证，腹胀便秘，小便短赤，舌苔黄燥，脉沉实有力者，大承气汤主之；若体虚不任攻者，大黄附子细辛汤主之。", "tags": "['阳明燥证', '腹胀便秘', '舌苔黄燥', '脉沉实']", "formula": "大承气汤", "formula_detail": "大黄四钱、厚朴二钱、枳实二钱、芒硝二钱", "ni_annotation": "阳明燥证、腹胀便秘、小便短赤、舌苔黄燥、脉沉实有力，乃燥热结聚、腑气不通。大承气汤大黄、芒硝攻下燥结，厚朴、枳实破气除满。若体虚不任攻伐，大黄附子细辛汤温下并行。", "contraindication": "体虚者慎攻下，宜用大黄附子细辛汤", "keywords": "['大承气汤', '阳明燥证', '腑实', '大黄附子细辛汤']"}, {"id": 852, "source": "温病条辨", "article_number": "补7", "liujing": "", "chapter": "补秋燥胜气论", "original_text": "燥气延入下焦，搏于血分，而成癥瘕者，化癥回生丹主之。", "tags": "['燥气下焦', '搏于血分', '癥瘕']", "formula": "化癥回生丹", "formula_detail": "人参六两、安南桂二两、两头尖二两、麝香二两、姜黄二两、川椒炭二两、虻虫二两、大黄二两、水蛭二两、鳖甲胶二两、龟板胶二两、益母草膏四两等共三十六味", "ni_annotation": "燥气延入下焦、搏于血分而成癥瘕，乃燥邪入络、血分瘀结。化癥回生丹大方复治，人参、桂温通益气，麝香、姜黄、虻虫、水蛭破血逐瘀，大黄攻下，鳖甲、龟板软坚散结，共奏化瘀消癥之效。", "contraindication": "孕妇禁用", "keywords": "['化癥回生丹', '下焦燥', '血分瘀结', '癥瘕']"}, {"id": 853, "source": "温病条辨", "article_number": "补8", "liujing": "", "chapter": "补秋燥胜气论", "original_text": "燥气久伏下焦，不与血搏，老年八脉空虚，复亨丹主之。", "tags": "['燥气久伏', '老年八脉空虚', '复亨丹']", "formula": "复亨丹", "formula_detail": "倭硫黄十分、鹿茸八分、枸杞子六分、人参四分、茯苓八分、苁蓉八分、肉桂四分、当归六分、小茴香六分、川椒炭四分、干姜四分、川芎四分", "ni_annotation": "燥气久伏下焦、不与血搏、老年八脉空虚，乃燥伤真阴、八脉失养。复亨丹倭硫黄温阳燥湿，鹿茸、苁蓉、肉桂温补肾阳，人参、茯苓益气，枸杞、当归养阴，茴香、椒姜温通。此方温润并行，为老年燥伤八脉之良方。", "contraindication": "阴虚火旺者禁用", "keywords": "['复亨丹', '下焦燥', '老年八脉空虚', '温润并行']"}, {"id": 854, "source": "温病条辨", "article_number": "59", "liujing": "", "chapter": "中焦篇-风温", "original_text": "一、面目俱赤，语声重浊，呼吸俱粗，大便闭，小便涩，舌苔老黄，甚则黑有芒刺，但恶热，不恶寒，日晡益甚者，传至中焦，阳明温病也。脉浮洪躁甚者，白虎汤主之；脉沉数有力，甚则脉体反小而实者，大承气汤主之。暑温、湿温、温疟，不在此例。", "tags": "面目俱赤,语声重浊,呼吸俱粗,大便闭,小便涩,舌苔老黄,黑苔芒刺,恶热,日晡发热,脉浮洪,脉沉数", "formula": "白虎汤 / 大承气汤", "formula_detail": "白虎汤：石膏一两、知母五钱、生甘草三钱、白粳米一合。大承气汤：大黄六钱、芒硝三钱、厚朴三钱、枳实三钱", "ni_annotation": "阳明温病传至中焦，关键看脉。脉浮洪躁急是热在气分，白虎汤清透气分大热即可。脉沉数有力或反小而实，说明热已与肠中燥屎互结，非用大承气汤攻下不可。这就是'在经用清、在腑用下'的原则。不要一见高热就盲目攻下，一定要辨脉定方，脉浮洪的给白虎汤，脉沉实的给承气汤，这是关键分野。", "contraindication": "", "keywords": "阳明温病 白虎汤 大承气汤 中焦 面目俱赤"}, {"id": 855, "source": "温病条辨", "article_number": "60", "liujing": "", "chapter": "中焦篇-风温", "original_text": "二、阳明温病，脉浮而促者，减味竹叶石膏汤主之。", "tags": "脉浮促,阳明温病", "formula": "减味竹叶石膏汤", "formula_detail": "竹叶五钱、石膏八钱、麦冬六钱、甘草三钱", "ni_annotation": "脉浮而促，说明热邪尚在气分但有内传之势，不能用承气辈攻下，也不能单用白虎汤。竹叶石膏汤清热兼益气阴，去掉原方中的人参、半夏，是因为温病不同于伤寒，不需要温补和燥湿化痰。竹叶清心导热，石膏清气分热，麦冬养阴，甘草调和，四味药精简有力，专门针对温病气分热盛而阴已伤的局面。", "contraindication": "", "keywords": "减味竹叶石膏汤 脉浮促 阳明温病"}, {"id": 856, "source": "温病条辨", "article_number": "61", "liujing": "", "chapter": "中焦篇-风温", "original_text": "三、阳明温病，诸证悉有而微，脉不浮者，小承气汤微和之。", "tags": "阳明温病,脉不浮,诸证悉有而微", "formula": "小承气汤", "formula_detail": "大黄五钱、厚朴二钱、枳实二钱", "ni_annotation": "阳明证候都有了，但都比较轻微，脉也不浮了，说明表邪已净，热邪已入腑但尚未结实。这时候不能用大承气汤峻下，否则会伤正气。小承气汤方中大黄配厚朴枳实，力量比大承气轻很多，去掉芒硝的软坚润燥作用，只是轻轻推荡一下肠道，'微和之'三个字是关键，点到即止，让肠道自通。", "contraindication": "", "keywords": "小承气汤 微和 阳明温病"}, {"id": 857, "source": "温病条辨", "article_number": "62", "liujing": "", "chapter": "中焦篇-风温", "original_text": "四、阳明温病，汗多谵语，舌苔老黄而干者，宜小承气汤。", "tags": "汗多,谵语,舌苔老黄而干", "formula": "小承气汤", "formula_detail": "大黄五钱、厚朴二钱、枳实二钱", "ni_annotation": "汗多伤津，谵语是热扰心神，舌苔老黄而干说明阳明里热已盛且津液已伤。这里用不上大承气汤是因为虽然里热明显，但未必有燥屎结硬之象，不敢轻用芒硝咸寒软坚，否则更伤津液。小承气汤以大黄通腑泄热、厚朴枳实行气导滞，温和地把热邪从大便导出，不伤阴津，正合此证。", "contraindication": "", "keywords": "小承气汤 谵语 汗多 舌苔老黄"}, {"id": 858, "source": "温病条辨", "article_number": "63", "liujing": "", "chapter": "中焦篇-风温", "original_text": "五、阳明温病，无汗，小便不利，谵语者，先与牛黄丸。不大便，再与调胃承气汤。", "tags": "无汗,小便不利,谵语,不大便", "formula": "安宫牛黄丸 / 调胃承气汤", "formula_detail": "安宫牛黄丸：牛黄、郁金、犀角、黄连、朱砂、梅片、麝香、珍珠、山栀、雄黄、黄芩、金箔衣。调胃承气汤：大黄三钱、芒硝五钱、生甘草二钱", "ni_annotation": "无汗而小便不利，热邪无出路，上扰心神则谵语。这时候不能直接攻下，因为热邪弥漫尚未结于肠腑，先用安宫牛黄丸清心开窍、清热解毒，把心神护住。如果安宫牛黄丸用了之后还谵语、不大便，说明热邪开始入腑，再给调胃承气汤。调胃承气汤有大黄芒硝攻下，更有甘草缓中，不致峻泻伤正。分步治疗，先清心、后攻下，次序不能乱。", "contraindication": "", "keywords": "安宫牛黄丸 调胃承气汤 谵语 无汗"}, {"id": 859, "source": "温病条辨", "article_number": "64", "liujing": "", "chapter": "中焦篇-风温", "original_text": "六、阳明温病，面目俱赤，肢厥甚则通体皆厥，不瘛疭，但神昏，不大便七八日以外，小便赤，脉沉伏，或并脉亦厥，胸腹满坚，甚则拒按，喜凉饮者，大承气汤主之。", "tags": "面目俱赤,肢厥,通体皆厥,神昏,不大便,小便赤,脉沉伏,胸腹满坚,拒按,喜凉饮", "formula": "大承气汤", "formula_detail": "大黄六钱、芒硝三钱、厚朴三钱、枳实三钱", "ni_annotation": "这是典型的热深厥深证，看起来四肢厥冷像是阳虚，实则是热邪内闭、阳气被郁不能外达。辨认要点：一要问有没有胸腹满坚拒按，这是燥屎内结的铁证；二要问喜热饮还是喜凉饮，喜凉饮说明是真热；三要看不瘛疭，排除了肝风内动。七八天不大便，热结非常严重，非大承气汤峻下不可，急下存阴，晚了津液就全耗干了。", "contraindication": "", "keywords": "大承气汤 热深厥深 神昏 不大便 腹痛拒按"}, {"id": 860, "source": "温病条辨", "article_number": "65", "liujing": "", "chapter": "中焦篇-风温", "original_text": "七、阳明温病，纯利稀水无粪者，谓之热结旁流，调胃承气汤主之。", "tags": "纯利稀水,无粪,热结旁流", "formula": "调胃承气汤", "formula_detail": "大黄三钱、芒硝五钱、生甘草二钱", "ni_annotation": "热结旁流是个陷阱——看着在拉稀水，以为要用固涩止泻，那就大错特错了。实际上是燥屎结在肠中，津液旁流，所以只有水、没有粪。这个辨证的关键在于：病人拉水但不缓解腹胀，反而腹部依旧胀满拒按。调胃承气汤中用大黄通便，芒硝润燥软坚，甘草缓和药力，把燥屎排出，水泻自然停止。通因通用，这是承气汤的高级用法。", "contraindication": "", "keywords": "调胃承气汤 热结旁流 下利稀水"}, {"id": 861, "source": "温病条辨", "article_number": "66", "liujing": "", "chapter": "中焦篇-风温", "original_text": "八、阳明温病，下利，谵语，阳明脉实或滑疾者，小承气汤主之；脉不实者，牛黄丸主之，紫雪丹亦主之。", "tags": "下利,谵语,脉实,脉滑疾", "formula": "小承气汤 / 安宫牛黄丸 / 紫雪丹", "formula_detail": "小承气汤：大黄五钱、厚朴二钱、枳实二钱", "ni_annotation": "下利加上谵语，关键在于辨脉。如果脉实或滑疾，说明这是邪热内迫而不是虚证，用通法——小承气汤通腑泄热，热去则利自止。如果脉不实，说明热在营血分而不是肠腑，需要用安宫牛黄丸或紫雪丹清心开窍。所以同样是下利加谵语，辨脉就能分出两种截然不同的治法，一个是通阳明，一个是清心窍，把准脉了就不会用错。", "contraindication": "", "keywords": "小承气汤 安宫牛黄丸 紫雪丹 下利 谵语"}, {"id": 862, "source": "温病条辨", "article_number": "67", "liujing": "", "chapter": "中焦篇-风温", "original_text": "九、阳明温病，下之不通，其证有五：应下失下，正虚不能运药，不运药者死，新加黄龙汤主之。喘促不宁，痰涎壅滞，右寸实大，肺气不降者，宣白承气汤主之。左尺牢坚，小便赤痛，时烦渴甚，导赤承气汤主之。邪闭心包，神昏舌短，内窍不通，饮不解渴者，牛黄承气汤主之。津液不足，无水舟停者，间服增液，再不下者，增液承气汤主之。", "tags": "下之不通,正虚,喘促,痰涎壅滞,小便赤痛,神昏,舌短,津液不足", "formula": "新加黄龙汤 / 宣白承气汤 / 导赤承气汤 / 牛黄承气汤 / 增液承气汤", "formula_detail": "新加黄龙汤：细生地五钱、生甘草二钱、人参一钱五分、生大黄三钱、芒硝一钱、元参五钱、麦冬五钱、当归一钱五分、海参二条、姜汁六匙。宣白承气汤：生石膏五钱、生大黄三钱、杏仁粉二钱、栝楼皮一钱五分。导赤承气汤：赤芍三钱、细生地五钱、生大黄三钱、黄连二钱、黄柏二钱、芒硝一钱。牛黄承气汤：安宫牛黄丸二丸化开、调生大黄末三钱。增液承气汤：元参一两、麦冬八钱、细生地八钱、大黄三钱、芒硝一钱五分", "ni_annotation": "吴鞠通把'下之不通'归纳为五种，是承气汤范畴里最高级的辨证。第一种是正虚推不动大便，加人参当归补气血、海参滋阴润肠。第二种是肺热痰堵导致大肠不能降，加石膏宣肺、杏仁降气。第三种是小肠热结导致小便不利，加黄连黄柏清小肠。第四种是热入心包，安宫牛黄丸开窍加大黄通腑。第五种是阴虚水少船搁浅，先增液行舟再加硝黄。五种情况五种变法，都是在大黄通腑的基础上各加针对性药物，这就是'活用承气'的精髓。", "contraindication": "", "keywords": "五承气汤 下之不通 新加黄龙汤 宣白承气汤 导赤承气汤 牛黄承气汤 增液承气汤"}, {"id": 863, "source": "温病条辨", "article_number": "68", "liujing": "", "chapter": "中焦篇-风温", "original_text": "十、阳明温病，下后汗出，当复其阴，益胃汤主之。", "tags": "下后汗出,伤阴", "formula": "益胃汤", "formula_detail": "沙参三钱、麦冬五钱、冰糖一钱、细生地五钱、玉竹一钱五分", "ni_annotation": "攻下之后出汗，这是胃阴受伤的表现。下法虽然去掉了热邪，但同时也伤了津液，胃阴不足就不能敛汗。益胃汤中沙参麦冬玉竹都是甘寒养阴之品，生地凉血滋阴，冰糖甘润调和，全方不腻不燥，专补胃阴。要注意的是，温病愈后调理跟伤寒不一样，不能用温补，一定要甘寒养阴，所以益胃汤才是正选，不能用补中益气汤之类。", "contraindication": "", "keywords": "益胃汤 下后汗出 养胃阴"}, {"id": 864, "source": "温病条辨", "article_number": "69", "liujing": "", "chapter": "中焦篇-风温", "original_text": "十一、下后无汗，脉浮者，银翘汤主之；脉浮洪者，白虎汤主之；脉洪而芤者，白虎加人参汤主之。", "tags": "下后无汗,脉浮,脉浮洪,脉洪芤", "formula": "银翘汤 / 白虎汤 / 白虎加人参汤", "formula_detail": "银翘汤：银花五钱、连翘三钱、竹叶二钱、生甘草一钱、麦冬四钱、细生地四钱。白虎加人参汤：石膏一两、知母五钱、生甘草三钱、白粳米一合、人参三钱", "ni_annotation": "攻下之后没有出汗，要看脉来定方。脉浮说明表邪未净，用银翘汤辛凉透表兼养阴，不能再用麻黄桂枝。脉浮洪是气分热又起，仲景法用白虎汤；脉洪而芤说明气分热还在但正已虚，加人参益气生津。三个方子对应三种不同状态，都是在下法基础上看余邪的出路和正气的盛衰来决定下一步，这叫'观其脉证、知犯何逆、随证治之'。", "contraindication": "", "keywords": "银翘汤 白虎汤 白虎加人参汤 下后无汗"}, {"id": 865, "source": "温病条辨", "article_number": "70", "liujing": "", "chapter": "中焦篇-风温", "original_text": "十二、下后脉数，舌苔不退者，护胃承气汤微和之。", "tags": "下后脉数,舌苔不退", "formula": "护胃承气汤", "formula_detail": "生大黄三钱、元参三钱、细生地三钱、丹皮二钱、知母二钱、麦冬三钱", "ni_annotation": "下了之后脉还是快的，舌苔还没退干净，说明余热未尽、阴液已伤。这时候不能再用重剂攻下，但也不能不管。护胃承气汤用大黄通腑的力量用得很轻，关键是加了生地、元参、麦冬养阴，丹皮凉血，知母清热，攻补兼施但以护胃养阴为主。它告诉你下了之后还有余热，就得改用这种轻清灵动的方法，不能再猛攻。", "contraindication": "", "keywords": "护胃承气汤 下后脉数 养阴护胃"}, {"id": 866, "source": "温病条辨", "article_number": "71", "liujing": "", "chapter": "中焦篇-风温", "original_text": "十三、下后无汗，脉不浮而数，清燥汤主之。", "tags": "下后无汗,脉不浮,脉数", "formula": "清燥汤", "formula_detail": "麦冬五钱、知母二钱、人中黄一钱五分、细生地五钱、元参三钱", "ni_annotation": "下了以后脉不浮，说明表已解干净了；脉数，说明里还有热；无汗是因为阴液被下法所伤。这个时候不能用发汗解表，也不能再用泻下，只能用滋阴清热。麦冬生地元参三味滋阴增液，知母清热，人中黄清热解毒——全方以养阴为主、清热为辅，把被消耗的津液补回来，热自然就清了。温病愈后调理，记住：保津液是第一要务。", "contraindication": "", "keywords": "清燥汤 下后无汗 脉数 养阴清热"}, {"id": 867, "source": "温病条辨", "article_number": "72", "liujing": "", "chapter": "中焦篇-风温", "original_text": "十四、下后数日，热不退，或退不尽，口燥咽干，舌苔干黑，或金黄色，脉沉而有力者，护胃承气汤微和之；脉沉而弱者，增液汤主之。", "tags": "热不退,口燥咽干,舌苔干黑,舌苔金黄,脉沉有力,脉沉弱", "formula": "护胃承气汤 / 增液汤", "formula_detail": "增液汤：元参一两、麦冬八钱、细生地八钱", "ni_annotation": "下了几天后热还不退，同样看舌苔和脉。舌苔干黑或金黄色，说明还有实热，脉沉有力，用护胃承气汤轻轻通一下；如果脉沉而弱，说明纯粹是阴虚发热，没有实证了，就用增液汤。增液汤三味药：元参、麦冬、生地，都是大剂量的养阴之品，以补为通，'增水行舟'——津液足了，大便自然通，热也自然退，这是阴虚便秘的标本兼治之法。", "contraindication": "", "keywords": "护胃承气汤 增液汤 增水行舟 阴虚发热"}, {"id": 868, "source": "温病条辨", "article_number": "73", "liujing": "", "chapter": "中焦篇-风温", "original_text": "十五、阳明温病，下后二三日，下证复现，脉不甚沉，或沉而无力，止可与增液，不可与承气。", "tags": "下证复现,脉不甚沉,脉沉无力", "formula": "增液汤", "formula_detail": "元参一两、麦冬八钱、细生地八钱", "ni_annotation": "攻下之后，大便又不通了，看起来像是承气证又出现，但一定要看脉。如果脉沉得不厉害或者沉而无力，这说明不是实热结滞，而是下法伤了津液，肠道干燥无津液润滑所致。这时候再用承气是壅上加壅，只会更伤津液。吴鞠通特别强调'止可与增液，不可与承气'，增液汤大剂滋阴，如同给干涸的河道注水，船自然能行，这是医者的明辨。", "contraindication": "", "keywords": "增液汤 下证复现 阴虚 不可与承气"}, {"id": 869, "source": "温病条辨", "article_number": "74", "liujing": "", "chapter": "中焦篇-风温", "original_text": "十六、阳明温病，下之不通，其证有五条，已详于第九条。兹再申明下之不通之故，曰正虚不运药者，曰肺气不降者，曰小肠热盛者，曰内窍不通者，曰津液枯燥者，宜细心分别。", "tags": "下之不通,五证回顾", "formula": "", "formula_detail": "", "ni_annotation": "这是第九条的复述和强调，吴鞠通怕医生用下法不效就乱投药，所以再重复一遍五种情况的鉴别。正虚、肺不降、小肠热、心包闭、津枯燥，五种原因都会导致用了大黄也通不了大便。一定要找出根本原因再对因下药，而不是加大大黄剂量。这是承接前面第九条的总结性条文，提醒临证要辨证求因、审因论治。", "contraindication": "", "keywords": "下之不通 五证 辨证求因"}, {"id": 870, "source": "温病条辨", "article_number": "75", "liujing": "", "chapter": "中焦篇-风温", "original_text": "十七、阳明温病，不甚渴，腹不满，无汗，小便不利，心中懊憹者，必发黄。栀子柏皮汤主之。", "tags": "不甚渴,腹不满,无汗,小便不利,心中懊憹,发黄", "formula": "栀子柏皮汤", "formula_detail": "栀子五钱、黄柏三钱、生甘草二钱", "ni_annotation": "口渴不厉害说明热不在胃；腹部不胀说明没有燥屎内结；没有汗且小便不利，湿邪和热邪都没有出路，郁在体内。心中懊憹是热郁胸膈的表现，湿热相蒸一定会发黄疸。栀子柏皮汤中栀子清三焦之热且能利湿，黄柏清热燥湿退黄，甘草防苦寒伤胃。这个方子跟茵陈蒿汤的区别在于：茵陈蒿汤治湿热并重有大便不通，栀子柏皮汤治热重于湿而没有腹满。", "contraindication": "", "keywords": "栀子柏皮汤 发黄 心中懊憹 湿热发黄"}, {"id": 871, "source": "温病条辨", "article_number": "76", "liujing": "", "chapter": "中焦篇-风温", "original_text": "十八、阳明温病，无汗，或但头汗出，身无汗，渴欲饮水，腹满，舌燥黄，小便不利者，必发黄，茵陈蒿汤主之。", "tags": "无汗,头汗出,渴欲饮水,腹满,舌燥黄,小便不利,发黄", "formula": "茵陈蒿汤", "formula_detail": "茵陈蒿六钱、栀子三钱、大黄三钱", "ni_annotation": "头汗出而身上没有汗，典型湿热郁蒸的现象；口渴想喝水说明热重；腹部胀满且舌苔干燥发黄，说明阳明腑气不通。湿热并重、腑气不通，茵陈蒿汤正好对证。茵陈清热利湿退黄为君，栀子清三焦湿热，大黄通腑泄热导湿热从大便而出。这个方子和栀子柏皮汤的区别在于：这里需要通大便，所以用大黄；那里没有腹满，所以不用大黄。同样是发黄，腹满不腹满是关键。", "contraindication": "", "keywords": "茵陈蒿汤 发黄 头汗出 腹满 湿热并重"}, {"id": 872, "source": "温病条辨", "article_number": "77", "liujing": "", "chapter": "中焦篇-风温", "original_text": "十九、阳明温病，无汗，实证未剧，不可下。小便不利者，甘苦合化，冬地三黄汤主之。", "tags": "无汗,实证未剧,小便不利", "formula": "冬地三黄汤", "formula_detail": "麦冬八钱、黄连一钱、苇根汁半杯冲、元参四钱、黄柏一钱、银花露半杯冲、细生地四钱、黄芩一钱、生甘草三钱", "ni_annotation": "实证没到严重程度不能随便下。小便不利说明湿热内蕴，这时候要用甘苦合化的方法。冬地三黄汤的配伍非常精妙：麦冬、生地、元参甘寒养阴，黄芩、黄连、黄柏苦寒清热，三甘三黄，苦甘合化阴气，清热不伤阴。苇根汁和银花露清热生津，甘草调和诸药。全方既清了热又不伤阴，还兼顾了小便不利，是温病小便不利的良方。", "contraindication": "", "keywords": "冬地三黄汤 甘苦合化 小便不利 无汗"}, {"id": 873, "source": "温病条辨", "article_number": "78", "liujing": "", "chapter": "中焦篇-风温", "original_text": "二十、温病，小便不利者，淡渗不可与也，忌五苓、八正辈。", "tags": "小便不利,禁用淡渗", "formula": "", "formula_detail": "", "ni_annotation": "温病跟伤寒不同，温病小便不利的原因是热邪伤阴、津液干涸，本质是阴虚，不能用五苓散、八正散这些淡渗利水之品。因为淡渗利水会进一步伤阴，越利小便越少，阴越伤热越重。正确的治法应该是前面说的甘苦合化或增液养阴，津液恢复了小便自然通利。这一条看似简单，却纠正了很多人一见小便不利就用五苓散的错误习惯，温病忌利小便，这是基础原则。", "contraindication": "忌五苓散、八正散等淡渗利水之剂", "keywords": "小便不利 禁用淡渗 温病忌利小便"}, {"id": 874, "source": "温病条辨", "article_number": "79", "liujing": "", "chapter": "中焦篇-暑温", "original_text": "二一、形似伤寒，但右脉洪大而数，左脉反小于右，口渴甚，面赤，汗大出者，名曰暑温，在手太阴，白虎汤主之；脉芤甚者，白虎加人参汤主之。", "tags": "形似伤寒,右脉洪大,左脉反小,口渴甚,面赤,汗大出,暑温", "formula": "白虎汤 / 白虎加人参汤", "formula_detail": "白虎汤：石膏一两、知母五钱、生甘草三钱、白粳米一合。白虎加人参汤：前方加人参三钱", "ni_annotation": "暑温容易和伤寒搞混，因为都有发热恶寒，但辨脉就能分清。伤寒脉浮紧，暑温右脉洪大而数是关键——右脉主气，洪大而数说明气分大热。加上面赤、口渴甚、大汗出，典型的四大证齐了。暑热最伤气伤津，所以脉芤的时候必须加人参补气生津。吴鞠通把暑温定位在手太阴，但治法用阳明经的白虎汤，因为暑热弥漫气分，用白虎汤清透气热最合适。", "contraindication": "", "keywords": "暑温 白虎汤 白虎加人参汤 右脉洪大 四大证"}, {"id": 875, "source": "温病条辨", "article_number": "80", "liujing": "", "chapter": "中焦篇-暑温", "original_text": "二二、手太阴暑温，但热无寒，或热退后亦无寒，精神不了了，时有谵语者，邪在手厥阴。清宫汤主之，安宫牛黄丸、紫雪丹亦主之。", "tags": "但热无寒,精神不了了,时有谵语,邪在手厥阴", "formula": "清宫汤 / 安宫牛黄丸 / 紫雪丹", "formula_detail": "清宫汤：元参心三钱、莲子心五分、竹叶卷心二钱、连翘心二钱、犀角尖二钱磨冲、连心麦冬三钱", "ni_annotation": "暑温从气分传入心包是常见的传变。精神恍惚、时不时说胡话，这是热入心包的标志性症状。清宫汤中各种'心'——元参心、莲子心、竹叶卷心、连翘心、连心麦冬——取以心入心的意思，配合犀角清热凉血开窍。病情重的用安宫牛黄丸或紫雪丹代替，这两个都是重剂开窍药，但安宫牛黄偏于清热解毒，紫雪丹偏于息风止痉，各有侧重。", "contraindication": "", "keywords": "暑温 热入心包 清宫汤 安宫牛黄丸 紫雪丹"}, {"id": 876, "source": "温病条辨", "article_number": "81", "liujing": "", "chapter": "中焦篇-暑温", "original_text": "二三、手太阴暑温，身热，面赤，口渴，汗大出，背微恶寒，脉洪大而芤者，白虎加人参汤主之。", "tags": "身热,面赤,口渴,汗大出,背微恶寒,脉洪大而芤", "formula": "白虎加人参汤", "formula_detail": "石膏一两、知母五钱、生甘草三钱、白粳米一合、人参三钱", "ni_annotation": "身热、面赤、口渴、汗大出——四大证俱全，但是多了一个'背微恶寒'。背上微恶寒，不是表证，是大汗出后气随津泄，气虚不能卫外。脉芤就是气虚血少的证据。所以用白虎汤清暑热的同时必须加人参，张仲景的白虎加人参汤本来就是为此而设。吴鞠通在这里完全继承了仲景的思路——清热与益气生津并行，缺一不可。", "contraindication": "", "keywords": "白虎加人参汤 背微恶寒 脉芤 暑温"}, {"id": 877, "source": "温病条辨", "article_number": "82", "liujing": "", "chapter": "中焦篇-暑温", "original_text": "二四、手太阴暑温，发汗后，暑证悉减，但头微胀，目不了了，余邪不解者，清络饮主之。", "tags": "发汗后,暑证悉减,头微胀,目不了了", "formula": "清络饮", "formula_detail": "鲜荷叶边二钱、鲜银花二钱、西瓜翠衣二钱、鲜扁豆花二钱、丝瓜皮二钱、鲜竹叶心二钱", "ni_annotation": "暑温发了汗之后大部分症状都减轻了，只剩头胀、眼睛不舒服这些轻微症状，说明暑热大邪已去，但络中余邪未清。这个时候不适合再用白虎汤这种重剂，清络饮用鲜荷叶边、鲜银花、西瓜翠衣、鲜扁豆花、丝瓜皮、鲜竹叶心六味轻清芳香之品，就像夏天的凉风一样轻轻把余热透出去。剂量都很小，取其气不取其味，这是温病后期调理的高级技巧。", "contraindication": "", "keywords": "清络饮 余邪不解 暑温后期 芳香轻清"}, {"id": 878, "source": "温病条辨", "article_number": "83", "liujing": "", "chapter": "中焦篇-暑温", "original_text": "二五、手太阴暑温，咳而无痰，声如瓮中出者，暑邪在肺络也。清络饮加甘草、桔梗、甜杏仁、麦冬、知母主之。", "tags": "咳而无痰,声如瓮中出,暑邪在肺络", "formula": "清络饮加味", "formula_detail": "鲜荷叶边二钱、鲜银花二钱、西瓜翠衣二钱、鲜扁豆花二钱、丝瓜皮二钱、鲜竹叶心二钱、甘草一钱、桔梗二钱、甜杏仁二钱、麦冬三钱、知母二钱", "ni_annotation": "咳嗽没有痰，声音像从瓮里出来一样闷闷的，这是暑热伤了肺络，但还没到气分大热的程度。清络饮清透暑热，加甘草桔梗开肺利咽，甜杏仁润肺止咳，麦冬养阴润肺，知母清肺热。这个配伍的思路是先用清络饮把暑热从络脉透出去，再用桔梗杏仁恢复肺的宣发肃降，麦冬知母防止热伤肺阴。用方很轻灵，不像麻杏石甘汤那么重。", "contraindication": "", "keywords": "清络饮加味 暑邪在肺 咳而无痰 声如瓮中"}, {"id": 879, "source": "温病条辨", "article_number": "84", "liujing": "", "chapter": "中焦篇-暑温", "original_text": "二六、手太阴暑温，寒热往来，舌白不渴，吐血者，名曰暑瘵，为难治。清络饮加杏仁、薏仁、滑石汤主之。", "tags": "寒热往来,舌白,不渴,吐血,暑瘵", "formula": "清络饮加味", "formula_detail": "鲜荷叶边二钱、鲜银花二钱、西瓜翠衣二钱、鲜扁豆花二钱、丝瓜皮二钱、鲜竹叶心二钱、杏仁二钱、薏仁三钱、滑石三钱", "ni_annotation": "暑瘵比一般暑温严重，因为暑邪深入血络导致出血。舌白不渴说明还有湿邪夹杂，寒热往来是邪在半表半里、正邪相争。治疗思路是清络饮清透暑热、杏仁宣降肺气、薏仁渗湿、滑石利湿清热，让暑湿有出路。吴鞠通说'为难治'，因为暑湿夹血，治早了伤阴，晚了邪陷更深，非常棘手。必须轻清宣透、利湿止血兼顾，大寒大补都不行。", "contraindication": "", "keywords": "暑瘵 吐血 清络饮 难治"}, {"id": 880, "source": "温病条辨", "article_number": "85", "liujing": "", "chapter": "中焦篇-暑温", "original_text": "二七、小儿暑温，身热，卒然痉厥，名曰暑痫。清营汤主之，亦可少与紫雪丹。", "tags": "身热,卒然痉厥,暑痫,小儿", "formula": "清营汤 / 紫雪丹", "formula_detail": "清营汤：犀角三钱、生地五钱、元参三钱、竹叶心一钱、麦冬三钱、丹参二钱、黄连一钱五分、银花三钱、连翘二钱连心用", "ni_annotation": "小孩子得暑温突然抽风，这是暑热直中心营导致肝风内动，来得很快很凶。清营汤清营分之热、透热转气，把营分的热邪转到气分去解决。紫雪丹清热解毒、息风开窍，对痉挛抽搐的效果特别好。小儿脏腑娇嫩，暑邪容易直入营血，所以病情变化快，必须及时处理。吴鞠通主张先给清营汤，不够再加紫雪丹，分层应对。", "contraindication": "", "keywords": "暑痫 痉厥 清营汤 紫雪丹 小儿"}, {"id": 881, "source": "温病条辨", "article_number": "86", "liujing": "", "chapter": "中焦篇-暑温", "original_text": "二八、大人暑痫，亦同上法。热初入营，肝风内动，手足瘛疭，可于清营汤中加钩藤、丹皮、羚羊角。", "tags": "暑痫,肝风内动,手足瘛疭,热入营分", "formula": "清营汤加味", "formula_detail": "犀角三钱、生地五钱、元参三钱、竹叶心一钱、麦冬三钱、丹参二钱、黄连一钱五分、银花三钱、连翘二钱、钩藤三钱、丹皮二钱、羚羊角一钱五分", "ni_annotation": "大人暑痫比小儿好处理一些，但基本原则一样。清营汤基础上加钩藤平肝息风，丹皮凉血散瘀，羚羊角清热息风，三味药都是针对肝风内动的，说明暑热已从心营波及到肝。羚羊角虽然贵，但在这里是必须用的，因为热盛动风的时候平肝熄风药物的作用无可替代。把握好时机，热退风自息，不要等到角弓反张了再来治就晚了。", "contraindication": "", "keywords": "暑痫 清营汤加味 羚羊角 钩藤 肝风内动"}, {"id": 882, "source": "温病条辨", "article_number": "87", "liujing": "", "chapter": "中焦篇-伏暑", "original_text": "二九、长夏受暑，过夏而发者，名曰伏暑。霜未降而发者稍轻，霜既降而发者则重，冬日发者尤重，子午丑未之年为多也。", "tags": "长夏受暑,过夏而发,伏暑", "formula": "", "formula_detail": "", "ni_annotation": "伏暑是夏天受的暑湿潜伏在体内，过了夏天才发作。霜降前发，暑热还能随秋凉往外透，所以轻；霜降后天气寒冷，邪被寒邪郁闭在里面发不出来，所以重；到冬天发作最重。子午丑未年是火年和湿年，暑湿更盛。这条提醒医生，冬天看到发热病不要思维定式只在伤寒上想，要问有没有夏秋的感受暑湿病史。伏暑的辨证关键就在这个'伏'字。", "contraindication": "", "keywords": "伏暑 长夏受暑 过夏而发 子午丑未"}, {"id": 883, "source": "温病条辨", "article_number": "88", "liujing": "", "chapter": "中焦篇-伏暑", "original_text": "三十、伏暑、暑温、湿温，证本一源，前后互参，不可偏执。", "tags": "伏暑,暑温,湿温,证本一源", "formula": "", "formula_detail": "", "ni_annotation": "伏暑、暑温、湿温，本质上都是暑邪为患，只是发病时间和兼挟不同。暑温是即发，伏暑是伏而后发，湿温是暑中挟湿。三者虽然各有特点，但治疗上有很多相通之处，比如都需要清暑、都需要注意顾护阴液。吴鞠通提醒不要把它们割裂开来，要前后互相参考着辨证。遇到伏暑可以参照暑温的治法，遇到湿温可以参考伏暑的化湿思路，灵活变通。", "contraindication": "", "keywords": "伏暑 暑温 湿温 证本一源 互参"}, {"id": 884, "source": "温病条辨", "article_number": "89", "liujing": "", "chapter": "中焦篇-伏暑", "original_text": "三一、伏暑，舌白口渴，无汗者，银翘散去牛蒡、元参加杏仁、滑石主之。", "tags": "舌白,口渴,无汗,伏暑", "formula": "银翘散加减", "formula_detail": "银花三钱、连翘三钱、桔梗二钱、薄荷一钱、竹叶二钱、生甘草一钱、荆芥穗一钱、淡豆豉二钱、杏仁二钱、滑石三钱", "ni_annotation": "伏暑舌白说明有湿，口渴说明有热，无汗说明表邪未解。用银翘散解表清热，去掉牛蒡子、元参是因为这两味药滋腻不利于湿邪透发，加上杏仁宣降肺气以利于表邪的透发，加滑石利湿清热——暑湿有了出路，病情自然会缓解。这个加减法体现了'解表必兼利湿'的原则，伏暑夹湿的时候，光解表不行，必须给湿邪找一条出路。", "contraindication": "", "keywords": "银翘散加减 伏暑 舌白口渴 杏仁 滑石"}, {"id": 885, "source": "温病条辨", "article_number": "90", "liujing": "", "chapter": "中焦篇-伏暑", "original_text": "三二、伏暑，舌赤口渴，无汗者，银翘散加生地、丹皮、赤芍、麦冬主之。", "tags": "舌赤,口渴,无汗,伏暑", "formula": "银翘散加减", "formula_detail": "银花三钱、连翘三钱、桔梗二钱、薄荷一钱、竹叶二钱、生甘草一钱、荆芥穗一钱、淡豆豉二钱、牛蒡子三钱、生地四钱、丹皮二钱、赤芍二钱、麦冬四钱", "ni_annotation": "前面一条舌白是夹湿，这条舌赤是热入营血的表现。同样是伏暑无汗，但舌象一变，治法完全跟着变。舌赤说明血分有热，银翘散解表清热的基础上加生地、丹皮、赤芍凉血散血，麦冬养阴清热。注意这里不仅没有去掉牛蒡子元参，反而加了凉血养阴药，因为舌赤表明热邪已经不在气分而是深入营血了，治法就跟着从清透气热变成凉营活血。", "contraindication": "", "keywords": "银翘散加减 伏暑 舌赤 凉血养阴"}, {"id": 886, "source": "温病条辨", "article_number": "91", "liujing": "", "chapter": "中焦篇-伏暑", "original_text": "三三、伏暑，舌白口渴，有汗，或大汗不止者，银翘散去牛蒡子、元参、荆芥穗，加杏仁、石膏、黄芩主之。", "tags": "舌白,口渴,大汗不止,伏暑", "formula": "银翘散加减", "formula_detail": "银花三钱、连翘三钱、桔梗二钱、薄荷一钱、竹叶二钱、生甘草一钱、淡豆豉二钱、杏仁二钱、石膏五钱、黄芩二钱", "ni_annotation": "大汗不止说明表已开、热已盛，这个时候不能再发汗，所以去掉荆芥穗和薄荷；舌白口渴说明热盛有湿，但不同于纯湿，牛蒡子和元参在这里偏滋润会影响气机，所以也去掉。加杏仁宣降肺气，石膏清气分大热，黄芩清热燥湿。这个加减的核心是'汗出不用表药、热盛必加石膏'——银翘散有很多加减变化，都是围绕表解未解、热深不深来决定保留和替换哪些药。", "contraindication": "", "keywords": "银翘散加减 伏暑 大汗不止 石膏 黄芩"}, {"id": 887, "source": "温病条辨", "article_number": "92", "liujing": "", "chapter": "中焦篇-伏暑", "original_text": "三四、伏暑，舌赤口渴，汗多，加减生脉散主之。", "tags": "舌赤,口渴,汗多,伏暑", "formula": "加减生脉散", "formula_detail": "沙参三钱、麦冬二钱、五味子一钱、丹皮二钱、细生地三钱", "ni_annotation": "舌赤是营血有热，口渴汗多是气阴两伤。加减生脉散用沙参代替人参——人参偏温补不宜于温病，沙参甘寒养阴更合适；麦冬养阴生津，五味子敛汗，丹皮凉血，生地滋阴凉血。这个方子比生脉散更偏凉润，专门针对暑热后期气阴两伤而余热未清的情况。注意这里不用人参，是因为温病不同于伤寒的气虚证，温病的气虚是因为热伤气，必须清热养阴才能补气。", "contraindication": "", "keywords": "加减生脉散 伏暑 汗多 气阴两伤 沙参"}, {"id": 888, "source": "温病条辨", "article_number": "93", "liujing": "", "chapter": "中焦篇-暑温", "original_text": "三五、暑温，身热，已退或未退，汗出不止，烦渴，脉散大，喘喝欲脱者，生脉散主之。", "tags": "身热,汗出不止,烦渴,脉散大,喘喝欲脱", "formula": "生脉散", "formula_detail": "人参三钱、麦冬二钱、五味子一钱", "ni_annotation": "到了汗出不止、脉散大、喘气困难的时候，说明气随津脱，已经到了危急关头。生脉散中人参大补元气救脱，麦冬养阴生津，五味子敛汗固脱，三味药配合得严丝合缝。这里用人参是必须的，不用人参元气就补不回来。但吴鞠通强调必须是到了气脱的程度才能用生脉散，不能一有口渴汗多就用人参，过早用补反而恋邪。判断的标准就是脉是否散大、是否有喘喝欲脱。", "contraindication": "", "keywords": "生脉散 汗出不止 脉散大 气脱 喘喝欲脱"}, {"id": 889, "source": "温病条辨", "article_number": "94", "liujing": "", "chapter": "中焦篇-暑温", "original_text": "三六、暑温，寒热，舌白不渴，吐血者，名曰暑瘵。清营汤加丹皮、鲜荷叶边、鲜竹叶主之。", "tags": "寒热,舌白,不渴,吐血,暑瘵", "formula": "清营汤加味", "formula_detail": "犀角三钱、生地五钱、元参三钱、竹叶心一钱、麦冬三钱、丹参二钱、黄连一钱五分、银花三钱、连翘二钱、丹皮三钱、鲜荷叶边三钱、鲜竹叶三钱", "ni_annotation": "前面暑瘵用清络饮加味是针对气分湿热，这条用清营汤加味是因为吐血说明热入营血、损伤血络了。舌白不渴说明湿邪仍然存在，但吐血已见血分热证。清营汤直接清理营分的热邪，加丹皮凉血止血散瘀——止血而不留瘀是关键。荷叶边和竹叶都是轻清透热之品，把营热外透，做到透热止血两不误。暑瘵的难治在于湿热和出血并存，利湿怕助热出血，止血怕助湿碍邪。", "contraindication": "", "keywords": "暑瘵 吐血 清营汤 难治"}, {"id": 890, "source": "温病条辨", "article_number": "95", "liujing": "", "chapter": "中焦篇-暑温", "original_text": "三七、暑温，伏暑，三焦均受，舌灰白，胸痞闷，潮热呕恶，烦渴自利，汗出溺短者，杏仁滑石汤主之。", "tags": "舌灰白,胸痞闷,潮热,呕恶,烦渴,自利,汗出,溺短,三焦均受", "formula": "杏仁滑石汤", "formula_detail": "杏仁三钱、滑石三钱、黄芩二钱、橘红一钱五分、黄连一钱、郁金二钱、通草一钱、厚朴二钱、半夏三钱", "ni_annotation": "三焦都被暑湿困住了——上焦胸闷、中焦呕恶烦渴、下焦自利尿短，这说明暑湿弥漫三焦，病情广泛但还未深入血分。杏仁滑石汤中杏仁开上焦肺气，滑石通下焦利湿清热，黄芩黄连清中焦湿热，厚朴半夏橘红行气化湿，郁金理气活血，通草通利水道。全方三焦分消，上开下利中宣，是叶天士'分消走泄'法的典型应用。特别注意虽然有自利，但不能用固涩，必须宣通气机、分利湿邪。", "contraindication": "", "keywords": "杏仁滑石汤 三焦均受 分消走泄 暑湿弥漫"}, {"id": 891, "source": "温病条辨", "article_number": "96", "liujing": "", "chapter": "中焦篇-暑温", "original_text": "三八、脉洪滑，面赤身热，头晕，不恶寒，但恶热，舌上黄滑苔，渴欲凉饮，饮不解渴，得水则呕，按之胸下痛，小便短，大便闭者，暑温转入阳明，水结在胸也。小陷胸汤加枳实主之。", "tags": "脉洪滑,面赤,身热,头晕,恶热,黄滑苔,渴欲凉饮,饮不解渴,得水则呕,胸下痛,小便短,大便闭", "formula": "小陷胸汤加枳实", "formula_detail": "黄连二钱、栝楼三钱、枳实二钱、半夏五钱", "ni_annotation": "这是一个特殊的证型——暑温转为阳明温病，但邪不在肠腑而在胸中，是痰热与暑湿互结于胸脘。舌苔黄而滑不是干燥，说明不是纯粹的阳明燥热而是痰热互结。口渴但喝水不解渴、喝完就吐、按压胸下痛，这三个症状是小陷胸汤的铁证。加枳实增强降气除痞的力量。黄连清热，半夏化痰散结，栝楼宽胸降气，枳实行气导滞，四味药专门针对胸脘部位的痰热互结。", "contraindication": "", "keywords": "小陷胸汤加枳实 水结在胸 暑温 胸下痛 得水则呕"}, {"id": 892, "source": "温病条辨", "article_number": "97", "liujing": "", "chapter": "中焦篇-暑温", "original_text": "三九、暑温，脉虚，夜寐不安，烦渴，舌赤，时有谵语，目常开不闭，或喜闭不开，暑入手厥阴也。清营汤主之。舌白滑者，不可与也。", "tags": "脉虚,夜寐不安,烦渴,舌赤,时有谵语,目常开不闭,喜闭不开,暑入手厥阴", "formula": "清营汤", "formula_detail": "犀角三钱、生地五钱、元参三钱、竹叶心一钱、麦冬三钱、丹参二钱、黄连一钱五分、银花三钱、连翘二钱", "ni_annotation": "暑温入于心包，出现谵语、目常开或喜闭，都是神志异常。但为什么要强调舌赤才能用清营汤、舌白滑不能用？因为舌白滑说明还有湿邪，清营汤里面有生地、元参、麦冬这些滋润药，湿邪重的人用了会助湿生痰，反而闭窍更深。舌赤说明热入营血阴液已伤，这时候清营汤才对证。吴鞠通反复强调的是舌诊，温病辨证舌象比脉象更直观更准确。", "contraindication": "舌白滑者不可与清营汤", "keywords": "清营汤 手厥阴 暑温 舌赤 谵语"}, {"id": 893, "source": "温病条辨", "article_number": "98", "liujing": "", "chapter": "中焦篇-伏暑", "original_text": "四十、伏暑，湿热气蒸，外发为黄者，茵陈五苓散主之。", "tags": "湿热气蒸,发黄,伏暑", "formula": "茵陈五苓散", "formula_detail": "茵陈末十分、五苓散五分。五苓散：猪苓、茯苓、白术、泽泻、桂枝", "ni_annotation": "伏暑湿热郁蒸发黄，用茵陈五苓散是治湿热黄疸的又一法门。茵陈退黄利湿，五苓散化气利水，合起来就是让湿热从小便排出。和茵陈蒿汤的区别在于：这里没有大黄，说明没有大便不通的腑实证；加了桂枝白术，说明还有脾虚湿困的一面。茵陈五苓散偏温化，茵陈蒿汤偏清下，一个从小便利湿，一个从大便泄热，路径不同但目的都是退黄。", "contraindication": "", "keywords": "茵陈五苓散 伏暑 发黄 湿热"}, {"id": 894, "source": "温病条辨", "article_number": "99", "liujing": "", "chapter": "中焦篇-寒湿", "original_text": "四一、足太阴寒湿，痞结胸满，不饥不食，半苓汤主之。", "tags": "痞结胸满,不饥不食,寒湿", "formula": "半苓汤", "formula_detail": "半夏五钱、茯苓五钱、川连一钱、厚朴三钱、通草八钱", "ni_annotation": "寒湿困脾导致胸中痞满、不知饥饿、不想吃东西，这是脾阳被寒湿所困而不能运化的表现。半苓汤以半夏厚朴辛开苦降散满除痞，茯苓通草淡渗利湿，少佐黄连苦寒燥湿且防辛温太过。这个方子辛开为主、苦降为辅、淡渗为使，针对的是寒湿停聚于中焦脾胃。重点是半夏和茯苓各用五钱，大剂量祛湿化痰，厚朴行气除满，通草利水给湿邪出路。", "contraindication": "", "keywords": "半苓汤 寒湿 痞结胸满 不饥不食"}, {"id": 895, "source": "温病条辨", "article_number": "100", "liujing": "", "chapter": "中焦篇-寒湿", "original_text": "四二、足太阴寒湿，腹胀，小便不利，大便溏而不爽，若欲滞下者，四苓加厚朴秦皮汤主之，五苓散亦主之。", "tags": "腹胀,小便不利,大便溏而不爽,滞下,寒湿", "formula": "四苓加厚朴秦皮汤 / 五苓散", "formula_detail": "四苓加厚朴秦皮汤：茅术三钱、厚朴三钱、茯苓五钱、猪苓四钱、秦皮二钱、泽泻四钱", "ni_annotation": "寒湿导致腹胀、小便少、大便稀还不爽快，这是脾虚湿盛而肠道气滞。四苓散（去掉五苓散中的桂枝加茅术）利湿为主，加厚朴行气除满，秦皮清热燥湿止痢——秦皮质地清轻，不像黄柏黄连那么苦寒，对寒湿夹热的下利效果很好。如果寒湿偏重无明显热象，用五苓散温阳利水也行。核心思路是利小便以实大便，同时行气导滞。", "contraindication": "", "keywords": "四苓加厚朴秦皮汤 五苓散 寒湿 腹胀 大便不爽"}, {"id": 896, "source": "温病条辨", "article_number": "101", "liujing": "", "chapter": "中焦篇-寒湿", "original_text": "四三、足太阴寒湿，四肢乍冷，自利，目黄，舌白滑，甚则灰，神倦不语，邪阻脾窍，舌謇语重，四苓加木瓜草果厚朴汤主之。", "tags": "四肢乍冷,自利,目黄,舌白滑,神倦不语,舌謇语重,寒湿", "formula": "四苓加木瓜草果厚朴汤", "formula_detail": "白术三钱、猪苓一钱五分、泽泻一钱五分、赤苓块五钱、木瓜一钱、厚朴一钱、草果八分、半夏三钱", "ni_annotation": "寒湿困脾，四肢冷是自利伤阳，目黄是湿郁发黄，舌白滑或灰是寒湿内盛，神倦不语是寒湿蒙蔽清窍。四苓散淡渗利湿，木瓜和肝舒筋，草果温燥脾湿，厚朴行气除满，半夏化痰燥湿。这个方子妙在用草果温脾燥湿，对寒湿困脾导致的舌謇语重特别有效。寒湿去则清窍自开，语言自然恢复。", "contraindication": "", "keywords": "四苓加木瓜草果厚朴汤 寒湿 舌謇 目黄"}, {"id": 897, "source": "温病条辨", "article_number": "102", "liujing": "", "chapter": "中焦篇-寒湿", "original_text": "四四、足太阴寒湿，舌灰滑，中焦滞痞，草果茵陈汤主之；面目俱黄，四肢常厥者，茵陈四逆汤主之。", "tags": "舌灰滑,中焦滞痞,面目俱黄,四肢常厥,寒湿", "formula": "草果茵陈汤 / 茵陈四逆汤", "formula_detail": "草果茵陈汤：草果一钱、茵陈三钱、茯苓皮三钱、厚朴二钱、广皮一钱五分、猪苓二钱、泽泻一钱五分、大腹皮二钱。茵陈四逆汤：附子三钱、干姜二钱五分、炙甘草二钱、茵陈六钱", "ni_annotation": "舌灰滑而中焦痞滞，是寒湿困脾、气机阻滞，用草果茵陈汤温脾化湿、淡渗利湿，茵陈退黄利湿，草果温化寒湿痞满。如果已经面目俱黄、四肢常厥，说明寒湿已经伤阳到了阴黄的程度，必须用茵陈四逆汤温阳退黄——附子干姜温阳散寒，茵陈利湿退黄，炙甘草和中。阴黄和阳黄治法完全相反，辨舌是关键：灰滑是寒湿阴黄，黄燥是湿热阳黄。", "contraindication": "", "keywords": "草果茵陈汤 茵陈四逆汤 寒湿阴黄 舌灰滑"}, {"id": 898, "source": "温病条辨", "article_number": "103", "liujing": "", "chapter": "中焦篇-寒湿", "original_text": "四五、足太阴寒湿，舌白滑，甚则灰，脉迟缓，不食，不寐，大便稀溏，阳明失阖，加减附子理中汤主之。", "tags": "舌白滑,脉迟缓,不食,不寐,大便稀溏,寒湿", "formula": "加减附子理中汤", "formula_detail": "白术三钱、附子二钱、干姜二钱、茯苓三钱、厚朴二钱", "ni_annotation": "寒湿困脾导致阳明失阖——就是胃不能正常通降，所以不食；脾寒不能运化则大便稀溏；寒湿扰心则不寐。附子理中汤温阳健脾，去甘草之甘缓加茯苓淡渗利湿、厚朴行气除满。这里去甘草是因为甘草甘缓不利于寒湿的温通，用茯苓厚朴代替，既利湿又行气，针对性更强。不寐在寒湿证里用温阳化湿法反而能睡好，这就是辨证论治的妙处。", "contraindication": "", "keywords": "加减附子理中汤 寒湿 阳明失阖 不寐"}, {"id": 899, "source": "温病条辨", "article_number": "104", "liujing": "", "chapter": "中焦篇-寒湿", "original_text": "四六、足太阴寒湿，舌白滑，脉右缓，寒湿在里，附桂理中汤去甘草加茯苓厚朴汤主之。", "tags": "舌白滑,脉右缓,寒湿在里,寒湿", "formula": "附桂理中汤去甘草加茯苓厚朴", "formula_detail": "附子二钱、肉桂一钱、人参一钱、白术三钱、干姜一钱五分、茯苓三钱、厚朴二钱", "ni_annotation": "脉右缓说明湿困脾阳、气机不利。附桂理中汤温补脾肾阳气，去甘草是怕甘缓助湿，加茯苓淡渗利湿、厚朴行气除满。这个方子中附子肉桂同用，温阳力量强于单纯附子理中，适合寒湿重而阳气虚的证候。茯苓厚朴代替甘草的思路跟前面一样，就是不用甘缓而用渗利行气，让寒湿有出路。寒湿在里的治疗核心就是温阳、利湿、行气三者配合。", "contraindication": "", "keywords": "附桂理中汤 寒湿在里 脉右缓 温阳利湿"}, {"id": 900, "source": "温病条辨", "article_number": "105", "liujing": "", "chapter": "中焦篇-寒湿", "original_text": "四七、足太阴寒湿，寒战，热不来，脉迟缓，舌白滑，中宫寒湿痞塞，椒附白通汤主之。", "tags": "寒战,热不来,脉迟缓,舌白滑,寒湿痞塞,寒湿", "formula": "椒附白通汤", "formula_detail": "附子三钱、川椒二钱、干姜二钱、葱白三茎、猪胆汁半烧酒杯冲", "ni_annotation": "寒战而热不来，说明寒湿内盛、阳气被遏不能外达。脉迟缓、舌白滑都是寒湿的典型表现。椒附白通汤中附子川椒干姜温阳散寒，葱白通阳开窍，猪胆汁反佐——因为大热药可能导致格拒，猪胆汁的苦味能引药入里。这个方子温阳散寒的力量非常强，专门用于寒湿重到阳气完全被遏的证候。寒战热不来就是阳气欲伸而不能伸的危急状态。", "contraindication": "", "keywords": "椒附白通汤 寒战热不来 寒湿痞塞 阳气被遏"}, {"id": 901, "source": "温病条辨", "article_number": "106", "liujing": "", "chapter": "中焦篇-寒湿", "original_text": "四八、足太阴寒湿，舌白滑，脉缓甚，或沉紧，舌苔粘腻，自利，溺清，不食，附子理中汤去甘草加广皮厚朴汤主之。", "tags": "舌白滑,脉缓甚,脉沉紧,舌苔粘腻,自利,溺清,不食,寒湿", "formula": "附子理中汤去甘草加广皮厚朴", "formula_detail": "白术三钱、附子二钱、干姜二钱、人参一钱、广皮一钱、厚朴二钱", "ni_annotation": "脉缓甚或沉紧，沉紧是寒盛，缓甚是湿重。舌苔粘腻说明湿浊很重。自利溺清——小便清长是寒湿而非湿热的鉴别要点。附子理中汤温阳健脾，去甘草之甘缓，加广皮燥湿化痰、厚朴行气除满。这个加减法跟前面一样，就是不用甘草的甘缓，改用行气燥湿的药，让寒湿更快化掉。注意溺清这个症状，湿热的小便一定是短的，寒湿的小便才是清长的。", "contraindication": "", "keywords": "附子理中汤 脉缓甚 舌苔粘腻 溺清 寒湿"}, {"id": 902, "source": "温病条辨", "article_number": "107", "liujing": "", "chapter": "中焦篇-寒湿", "original_text": "四九、足太阴寒湿，舌白滑，甚则灰滑，脉迟紧，腹痛，下利，乌头桂枝汤主之。", "tags": "舌白滑,脉迟紧,腹痛,下利,寒湿", "formula": "乌头桂枝汤", "formula_detail": "乌头五枚、桂枝三钱、芍药三钱、甘草二钱、生姜三片、大枣二枚", "ni_annotation": "腹痛下利，脉迟紧，这是寒湿凝滞、脾胃阳气大伤的表现。乌头桂枝汤中乌头大辛大热，散寒止痛力量极强，桂枝汤调和营卫、温通经脉。这个方子实际上是《伤寒论》的方，吴鞠通用它治寒湿腹痛下利，是因为乌头散沉寒痼冷的功力超过附子。但要注意乌头有毒，必须先煎久煎去毒，用量也要小心，一般用炮乌头比较安全。", "contraindication": "", "keywords": "乌头桂枝汤 腹痛下利 寒湿凝滞 乌头"}, {"id": 903, "source": "温病条辨", "article_number": "108", "liujing": "", "chapter": "中焦篇-寒湿", "original_text": "五十、足太阴寒湿，舌白滑，脉缓，甚则濡，体重，关节疼痛，诵经桂枝姜术汤主之。", "tags": "舌白滑,脉缓,脉濡,体重,关节疼痛,寒湿", "formula": "诵经桂枝姜术汤", "formula_detail": "桂枝三钱、干姜二钱、白术三钱、茯苓三钱、防己二钱、生姜三片", "ni_annotation": "体重关节疼痛，说明寒湿不仅困脾，还流注关节肌肉。脉缓或濡都是湿象。诵经桂枝姜术汤用桂枝温通经脉、白术健脾燥湿、干姜温中散寒、茯苓利湿、防己祛风湿止痛、生姜温散水气。这个方子的特点是桂枝配防己，一个温通、一个祛湿，配合得很好。湿在肌肉关节用防己，湿在脾胃用白术茯苓，分层治疗是温病派的高明之处。", "contraindication": "", "keywords": "诵经桂枝姜术汤 体重 关节疼痛 寒湿流注"}, {"id": 904, "source": "温病条辨", "article_number": "109", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "五一、湿温，脉缓，身痛，渴不多饮，大便溏，苔黄滑，当从汗解，藿朴夏苓汤主之。", "tags": "脉缓,身痛,渴不多饮,大便溏,苔黄滑,湿温", "formula": "藿朴夏苓汤", "formula_detail": "藿香二钱、半夏三钱、赤苓三钱、杏仁三钱、薏仁四钱、白蔻一钱、猪苓三钱、豆豉三钱、泽泻二钱、厚朴一钱", "ni_annotation": "湿温脉缓是湿盛，身痛是湿阻经络，渴不多饮是湿阻气机、津不上承，大便溏是湿困脾阳，苔黄滑是湿热互结。藿朴夏苓汤中藿香芳香化湿，厚朴半夏燥湿化痰，茯苓猪苓泽泻淡渗利湿，杏仁宣肺利气，薏仁健脾渗湿，白蔻温中化湿，豆豉透邪外出。这个方子三焦分消，芳香化湿，是湿温初起的代表方。舌苔黄滑说明湿热都有了，治疗必须化湿清热同时进行。", "contraindication": "", "keywords": "藿朴夏苓汤 湿温 苔黄滑 芳香化湿"}, {"id": 905, "source": "温病条辨", "article_number": "110", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "五二、湿温，身热，胸痞，自利，苔黄滑，脉缓，黄芩滑石汤主之。", "tags": "身热,胸痞,自利,苔黄滑,脉缓,湿温", "formula": "黄芩滑石汤", "formula_detail": "黄芩三钱、滑石三钱、茯苓皮三钱、大腹皮二钱、白蔻一钱、通草一钱、猪苓三钱", "ni_annotation": "身热胸痞自利苔黄滑，这是湿热弥漫三焦的表现。黄芩清热燥湿为君，滑石利湿清热为臣，茯苓皮猪苓淡渗利湿，大腹皮行气宽中，白蔻温中化湿，通草通利水道。这个方子和前面的杏仁滑石汤很像，区别是杏仁滑石汤有杏仁开上焦，这个方子没有杏仁但有黄芩清热燥湿。黄芩滑石汤偏于中下焦湿热，杏仁滑石汤偏于上中焦湿热，这是两者的区别。", "contraindication": "", "keywords": "黄芩滑石汤 湿温 苔黄滑 中下焦湿热"}, {"id": 906, "source": "温病条辨", "article_number": "111", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "五三、湿温，舌黄滑，脉缓，身痛，渴不欲饮，汗出热解，继而复热，内不能运，外不能达，黄芩滑石汤去猪苓、滑石，加白蔻、薏仁、半夏、浓朴主之。", "tags": "舌黄滑,脉缓,身痛,渴不欲饮,汗出热解,继而复热,湿温", "formula": "黄芩滑石汤加减", "formula_detail": "黄芩三钱、白蔻一钱五分、薏仁五钱、半夏三钱、厚朴二钱、杏仁三钱、滑石三钱、通草一钱", "ni_annotation": "汗出热解又复热，说明湿热并未真正清除，只是暂时随汗透出一部分。内不能运是脾湿困阻，外不能达是表邪未透。治疗要在黄芩清热的基础上加白蔻薏仁半夏厚朴燥湿运脾，杏仁宣肺透表。去猪苓滑石是因为不需要从利水来祛湿，而是要从燥湿和透表两个方向解决。这个加减法体现了湿温病'汗之则愈'的原则——汗法不是用麻黄，而是用芳香透表。", "contraindication": "", "keywords": "黄芩滑石汤加减 湿温 汗出热解又复热 芳香透表"}, {"id": 907, "source": "温病条辨", "article_number": "112", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "五四、湿温，脉缓，身痛，渴不多饮，大便溏，苔黄滑，当从汗解，忌大汗，又忌下，宜茯苓皮汤。", "tags": "脉缓,身痛,渴不多饮,大便溏,苔黄滑,湿温", "formula": "茯苓皮汤", "formula_detail": "茯苓皮五钱、生苡仁五钱、猪苓三钱、大腹皮三钱、白通草三钱、淡竹叶二钱", "ni_annotation": "同样是湿温脉缓身痛渴不多饮便溏苔黄滑，但这里强调的是'忌大汗又忌下'。忌大汗是因为湿温发汗会导致湿随汗去但热反不退，甚至引起出血；忌下是因为湿温下之会损伤脾阳、导致洞泄。茯苓皮汤用茯苓皮薏仁猪苓大腹皮通草淡渗利湿，竹叶清热，全方立足于利湿清热、不着汗下两端。这是湿温病治疗的三大禁忌——禁汗禁下禁利小。", "contraindication": "忌大汗，忌下", "keywords": "茯苓皮汤 湿温 忌大汗忌下 淡渗利湿"}, {"id": 908, "source": "温病条辨", "article_number": "113", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "五五、湿温，脉缓，身重，头痛，鼻塞，舌白滑，恶风寒，湿在表分，宜藿香正气散。", "tags": "脉缓,身重,头痛,鼻塞,舌白滑,恶风寒,湿在表分,湿温", "formula": "藿香正气散", "formula_detail": "藿香三钱、紫苏二钱、白芷一钱、大腹皮二钱、茯苓三钱、白术二钱、半夏曲二钱、陈皮二钱、厚朴二钱、桔梗二钱、甘草一钱", "ni_annotation": "湿在表分，表现为身重头痛鼻塞恶风寒，舌白滑说明湿重而热不重。藿香正气散是治外感风寒、内伤湿滞的经典方，藿香苏叶白芷解表散寒，厚朴陈皮半夏燥湿化痰，茯苓白术健脾利湿，大腹皮桔梗宣肺行气。这个方子表里双解，外散风寒、内化湿滞，对于湿温初起在表分的证候非常合适。注意这里湿重热轻，所以用温燥的藿香正气，不用寒凉的藿朴夏苓。", "contraindication": "", "keywords": "藿香正气散 湿温 湿在表分 身重头痛"}, {"id": 909, "source": "温病条辨", "article_number": "114", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "五六、湿温，脉缓，身痛，渴不多饮，大便溏，苔黄滑，胸痞，汗出，热不退，五日不解，舌苔转灰滑，渴不引饮，厚朴茯苓汤主之。", "tags": "脉缓,身痛,渴不多饮,大便溏,苔黄滑,胸痞,汗出热不退,苔转灰滑,湿温", "formula": "厚朴茯苓汤", "formula_detail": "厚朴三钱、茯苓四钱、陈皮一钱五分、炙甘草一钱、半夏三钱、苍术三钱", "ni_annotation": "湿热病拖了五天还不退，舌苔从黄滑转成灰滑，说明湿已经从热化得更加寒重了。渴不引饮跟前面的渴不多饮又有不同，说明湿邪更重、气机更不畅。厚朴茯苓汤实际上是平胃散合二陈汤的加减，厚朴陈皮苍术燥湿运脾，茯苓渗湿，半夏化痰，甘草和中。这个方子偏温燥，适合湿重热轻甚至寒湿化的证候。舌苔转灰是病情转重的信号，必须及时调整治法。", "contraindication": "", "keywords": "厚朴茯苓汤 湿温 苔转灰滑 湿重热轻"}, {"id": 910, "source": "温病条辨", "article_number": "115", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "五七、湿温，舌灰滑，脉缓，身痛，渴不多饮，大便溏，当从汗解，茯苓皮汤主之。", "tags": "舌灰滑,脉缓,身痛,渴不多饮,大便溏,湿温", "formula": "茯苓皮汤", "formula_detail": "茯苓皮五钱、生苡仁五钱、猪苓三钱、大腹皮三钱、白通草三钱、淡竹叶二钱", "ni_annotation": "这里又用茯苓皮汤，但舌象已经变成灰滑，说明湿比前一条更重、寒象也更明显。身痛渴不多饮便溏都是湿阻气机、脾阳被困的表现。茯苓皮汤淡渗利湿为主，不用温燥药是因为虽然有灰滑舌但怕温燥助热——这是湿温病治疗的矛盾之处：燥湿怕助热，清热怕助湿。茯苓皮汤之所以安全，就是因为它只利湿不温燥也不苦寒，让湿热从小便排出。", "contraindication": "", "keywords": "茯苓皮汤 湿温 舌灰滑 淡渗利湿不温燥"}, {"id": 911, "source": "温病条辨", "article_number": "116", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "五八、湿温，脉缓，身痛，渴不多饮，大便溏，苔黄滑，胸痞，汗出热不退，宜黄芩滑石汤。", "tags": "脉缓,身痛,渴不多饮,大便溏,苔黄滑,胸痞,汗出热不退,湿温", "formula": "黄芩滑石汤", "formula_detail": "黄芩三钱、滑石三钱、茯苓皮三钱、大腹皮二钱、白蔻一钱、通草一钱、猪苓三钱", "ni_annotation": "汗出热不退说明湿热并未因汗出而解，用黄芩滑石汤清热利湿。黄芩清湿热，滑石利湿热，配合茯苓皮猪苓大腹皮通草淡渗利湿，白蔻温中化湿。这个方子跟五二条完全一样，说明吴鞠通认为同样的证候、同样的主方，不需要每次都变。湿温病用黄芩滑石汤的关键是苔黄滑、脉缓、胸痞汗出热不退，这几个症状组合在一起就是黄芩滑石汤的适应证。", "contraindication": "", "keywords": "黄芩滑石汤 湿温 苔黄滑 汗出热不退"}, {"id": 912, "source": "温病条辨", "article_number": "117", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "五九、湿温，脉缓，身痛，渴不多饮，大便溏，苔黄滑，胸痞，汗出热不退，舌现灰滑，渴不引饮，宜四苓加厚朴秦皮汤。", "tags": "脉缓,身痛,渴不多饮,大便溏,苔黄滑,胸痞,汗出热不退,舌现灰滑,渴不引饮,湿温", "formula": "四苓加厚朴秦皮汤", "formula_detail": "茅术三钱、厚朴三钱、茯苓五钱、猪苓四钱、秦皮二钱、泽泻四钱", "ni_annotation": "舌苔从黄滑变成灰滑，证情已经在寒化，所以不能用黄芩滑石汤的寒凉药了，改用四苓加厚朴秦皮汤温化寒湿。茅术厚朴温燥健脾，茯苓猪苓泽泻淡渗利湿，秦皮清湿热止泻。这个方子偏温，适合湿重热轻甚至寒湿化的湿温病。注意秦皮的用量很轻（二钱），因为它在这里是反佐，怕温燥太过反而助热。湿温病后期苔转灰滑是一个重要的转。", "contraindication": "", "keywords": "四苓加厚朴秦皮汤 湿温 苔转灰滑 寒湿化"}, {"id": 913, "source": "温病条辨", "article_number": "118", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "六十、湿温，脉缓，身痛，渴不多饮，大便溏，苔黄滑，胸痞，汗出热不退，舌现灰滑，渴不引饮，宜五苓散。", "tags": "脉缓,身痛,渴不多饮,大便溏,苔黄滑,胸痞,汗出热不退,舌现灰滑,渴不引饮,湿温", "formula": "五苓散", "formula_detail": "猪苓、茯苓、白术、泽泻、桂枝", "ni_annotation": "同样是苔转灰滑，但这里用五苓散，说明寒湿更重，脾阳被困得更厉害。五苓散中桂枝温阳化气、白术健脾燥湿、猪苓茯苓泽泻淡渗利湿，是温阳化气利水的代表方。湿温病用五苓散必须确认是寒湿偏重、阳气被困，如果还有热象就不能用桂枝。五苓散和四苓加厚朴秦皮的区别在于：五苓散有桂枝温阳，力量更强；四苓加厚朴秦皮有秦皮清热，偏于调和。", "contraindication": "", "keywords": "五苓散 湿温 苔灰滑 温阳化气利水"}, {"id": 914, "source": "温病条辨", "article_number": "119", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "六一、湿温，脉缓，身痛，渴不多饮，大便溏，苔黄滑，胸痞，汗出热不退，舌现灰滑，渴不引饮，宜理中汤。", "tags": "脉缓,身痛,渴不多饮,大便溏,苔黄滑,胸痞,汗出热不退,舌现灰滑,渴不引饮,湿温", "formula": "理中汤", "formula_detail": "人参三钱、干姜三钱、白术三钱、炙甘草二钱", "ni_annotation": "用理中汤说明寒湿已经伤到脾阳的根本了，大便溏、渴不引饮、舌灰滑都是脾阳虚寒湿内盛的铁证。理中汤温中健脾、散寒祛湿，干姜温中散寒为君，白术健脾燥湿为臣，人参甘草补益脾肺之气。从五苓散到理中汤，是从利水转到温中，说明病情已经从水湿停留转向阳气衰微。湿温病后期出现理中汤证，说明治疗方向完全转变，已经不是清。", "contraindication": "", "keywords": "理中汤 湿温 脾阳虚 寒湿内盛"}, {"id": 915, "source": "温病条辨", "article_number": "120", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "六二、湿温，脉缓，身痛，渴不多饮，大便溏，苔黄滑，胸痞，汗出热不退，舌现灰滑，渴不引饮，恶寒甚，四肢厥逆，下利清谷，宜四逆汤。", "tags": "脉缓,身痛,渴不多饮,大便溏,苔黄滑,胸痞,汗出热不退,舌现灰滑,渴不引饮,恶寒甚,四肢厥逆,下利清谷,湿温", "formula": "四逆汤", "formula_detail": "附子五钱、干姜三钱、炙甘草三钱", "ni_annotation": "恶寒甚、四肢厥逆、下利清谷，这是少阴阳虚厥逆证，已经从太阴脾阳虚发展到少阴心肾阳虚了。四逆汤中附子温肾阳为君，干姜温脾阳为臣，炙甘草和中且缓附姜之峻。湿温病发展到用四逆汤的地步，说明治疗已经完全失败——本来是湿热病，结果被误治或自身发展导致阳气衰微。这提醒我们：湿温病治疗要把握好分寸，过用寒凉会伤阳。", "contraindication": "", "keywords": "四逆汤 湿温 少阴阳虚 四肢厥逆 下利清谷"}, {"id": 916, "source": "温病条辨", "article_number": "121", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "六三、湿温，舌黄滑，脉缓，身痛，渴不多饮，大便溏，胸痞，汗出热不退，宜杏仁滑石汤。", "tags": "舌黄滑,脉缓,身痛,渴不多饮,大便溏,胸痞,汗出热不退,湿温", "formula": "杏仁滑石汤", "formula_detail": "杏仁三钱、滑石三钱、黄芩二钱、橘红一钱五分、黄连一钱、郁金二钱、通草一钱、厚朴二钱、半夏三钱", "ni_annotation": "杏仁滑石汤再次登场，针对的是湿温湿热弥漫三焦的证候。杏仁开上焦肺气，滑石通下焦利湿，黄芩黄连清中焦湿热，橘红厚朴半夏行气化湿，郁金理气活血，通草通利水道。这个方子跟黄芩滑石汤的区别在于：杏仁滑石汤有杏仁开上、有黄连清热燥湿，更适合湿热弥漫三焦的情况；黄芩滑石汤更偏于中下焦湿热。同样是湿温，根据湿热所。", "contraindication": "", "keywords": "杏仁滑石汤 湿温 湿热弥漫三焦 分消走泄"}, {"id": 917, "source": "温病条辨", "article_number": "122", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "六四、湿温，脉缓，身痛，渴不多饮，大便溏，苔黄滑，胸痞，汗出热不退，舌现灰滑，渴不引饮，恶风寒，似疟，宜厚朴草果汤。", "tags": "脉缓,身痛,渴不多饮,大便溏,苔黄滑,胸痞,汗出热不退,舌现灰滑,渴不引饮,恶风寒,似疟,湿温", "formula": "厚朴草果汤", "formula_detail": "厚朴三钱、草果一钱、半夏三钱、茯苓皮三钱、广皮一钱五分", "ni_annotation": "恶风寒似疟，说明湿热郁阻、正邪交争于半表半里之间。舌灰滑说明寒湿已经偏重。厚朴草果汤中厚朴行气燥湿，草果温燥脾湿、截疟，半夏化痰燥湿，茯苓皮利湿，广皮理气化湿。这个方子温燥的力量比较强，适合湿温夹寒湿、湿热已经转向寒湿的证候。草果是截疟的要药，在这里既能温燥寒湿又能截疟，一药两用。湿温转疟说明邪有外。", "contraindication": "", "keywords": "厚朴草果汤 湿温 似疟 草果截疟"}, {"id": 918, "source": "温病条辨", "article_number": "123", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "六五、湿温，舌黄滑，脉缓，身痛，渴不多饮，大便溏，胸痞，汗出热不退，宜黄芩定乱汤。", "tags": "舌黄滑,脉缓,身痛,渴不多饮,大便溏,胸痞,汗出热不退,湿温", "formula": "黄芩定乱汤", "formula_detail": "黄芩三钱、滑石三钱、茯苓皮三钱、大腹皮二钱、白蔻一钱、通草一钱、猪苓三钱、连翘二钱", "ni_annotation": "黄芩定乱汤就是黄芩滑石汤加连翘，连翘在这里是透邪外出的作用。湿温病湿热郁阻导致气机混乱，所以用'定乱'来命名。黄芩清热燥湿，滑石利湿清热，连翘透邪外出，其他药都是配合利湿行气的。这个方子比黄芩滑石汤多了连翘的透邪作用，适合湿热郁阻较重、需要透邪外出的证候。连翘质轻味薄，善于透达，是温病透邪的重要药物。", "contraindication": "", "keywords": "黄芩定乱汤 湿温 湿热郁阻 连翘透邪"}, {"id": 919, "source": "温病条辨", "article_number": "124", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "六六、湿温，舌黄滑，脉缓，身痛，渴不多饮，大便溏，胸痞，汗出热不退，舌现灰滑，渴不引饮，脉不缓，转沉，恶风寒，似疟，宜草果知母汤。", "tags": "舌黄滑,脉缓,身痛,渴不多饮,大便溏,胸痞,汗出热不退,舌现灰滑,渴不引饮,脉沉,恶风寒,似疟,湿温", "formula": "草果知母汤", "formula_detail": "草果一钱五分、知母二钱、半夏三钱、厚朴二钱、黄芩一钱五分、乌梅一钱五分、花粉一钱五分、姜汁五匙冲", "ni_annotation": "脉沉说明邪已入里，草果知母汤是吴鞠通治疗湿温似疟的主方之一。草果温燥寒湿，知母清热润燥，寒热并用，专门针对寒湿与郁热并存的复杂证候。半夏厚朴燥湿化痰行气，黄芩清热燥湿，乌梅敛阴防燥药伤阴，花粉养阴生津，姜汁温中止呕。这个方子的配伍非常精妙：温燥与寒凉并用、燥湿与养阴并用，寒热虚实夹杂的湿温病就需要这样复杂的配伍。", "contraindication": "", "keywords": "草果知母汤 湿温 似疟 寒热并用"}, {"id": 920, "source": "温病条辨", "article_number": "125", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "六七、湿温，舌黄滑，脉缓，身痛，渴不多饮，大便溏，胸痞，汗出热不退，舌现灰滑，渴不引饮，脉不缓，转沉，恶风寒，似疟，宜加减银翘散。", "tags": "舌黄滑,脉缓,身痛,渴不多饮,大便溏,胸痞,汗出热不退,舌现灰滑,渴不引饮,脉沉,恶风寒,似疟,湿温", "formula": "加减银翘散", "formula_detail": "银花三钱、连翘三钱、石膏五钱、知母二钱、杏仁二钱、滑石三钱、茯苓皮三钱、薏仁四钱、通草一钱", "ni_annotation": "加减银翘散在这里用，说明湿温病虽然邪已入里，但还有表邪未清、需要透邪外出的态势。银花连翘透邪清热，石膏知母清气分热，杏仁宣肺，滑石茯苓皮薏仁通草利湿。这个方子比前面几个方子更偏于清热透邪，适合湿温病湿已化热、热象明显的情况。银翘散本来是治风温初起的方子，在这里加减后用来治湿温，体现了'异病同治'的原。", "contraindication": "", "keywords": "加减银翘散 湿温 透邪清热 异病同治"}, {"id": 921, "source": "温病条辨", "article_number": "126", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "六八、湿温，舌黄滑，脉缓，身痛，渴不多饮，大便溏，胸痞，汗出热不退，舌现灰滑，渴不引饮，脉不缓，转沉，恶风寒，似疟，寒热往来，宜小柴胡汤去人参、大枣、生姜，加瓜蒌、桔梗、陈皮、道理。", "tags": "舌黄滑,脉缓,身痛,渴不多饮,大便溏,胸痞,汗出热不退,舌现灰滑,渴不引饮,脉沉,恶风寒,似疟,寒热往来,湿温", "formula": "小柴胡汤加减", "formula_detail": "柴胡三钱、黄芩二钱、瓜蒌三钱、桔梗二钱、陈皮一钱五分、甘草一钱、半夏二钱、生姜一片", "ni_annotation": "寒热往来是邪在少阳的典型表现，用小柴胡汤加减是对证的。但湿温病用小柴胡汤必须加减：去人参大枣生姜是因为湿温病忌温补，加瓜蒌桔梗陈皮是为了针对胸痞痰湿的证候。柴胡升散少阳之邪，黄芩清少阳之热，半夏化痰和胃，瓜蒌桔梗宽胸化痰，陈皮理气化湿。这个加减法体现了'方证对应但要随证加减'的原则，不能死守原方。", "contraindication": "", "keywords": "小柴胡汤加减 湿温 寒热往来 少阳证"}, {"id": 922, "source": "温病条辨", "article_number": "127", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "六九、湿温，舌黄滑，脉缓，身痛，渴不多饮，大便溏，胸痞，汗出热不退，舌现灰滑，渴不引饮，脉不缓，转沉，恶风寒，似疟，寒热往来，宜青蒿鳖甲汤。", "tags": "舌黄滑,脉缓,身痛,渴不多饮,大便溏,胸痞,汗出热不退,舌现灰滑,渴不引饮,脉沉,恶风寒,似疟,寒热往来,湿温", "formula": "青蒿鳖甲汤", "formula_detail": "青蒿二钱、鳖甲五钱、细生地四钱、知母二钱、丹皮三钱", "ni_annotation": "青蒿鳖甲汤治温病夜热早凉、热退无汗之证，这里用于湿温似疟、寒热往来，是因为湿热余邪留伏阴分、夜热早凉。青蒿清透伏邪、鳖甲滋阴入络搜邪，生地知母养阴清热，丹皮凉血散瘀。这个方子的精髓在于'先入后出'——鳖甲领青蒿入阴分搜邪，青蒿领邪外出。湿温病后期余热留伏阴分，用这个方子最合适。注意这里舌现灰滑但用养。", "contraindication": "", "keywords": "青蒿鳖甲汤 湿温 夜热早凉 余热留伏阴分"}, {"id": 923, "source": "温病条辨", "article_number": "128", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "七十、湿温，舌黄滑，脉缓，身痛，渴不多饮，大便溏，胸痞，汗出热不退，舌现灰滑，渴不引饮，脉不缓，转沉，恶风寒，似疟，寒热往来，宜三仁汤。", "tags": "舌黄滑,脉缓,身痛,渴不多饮,大便溏,胸痞,汗出热不退,舌现灰滑,渴不引饮,脉沉,恶风寒,似疟,寒热往来,湿温", "formula": "三仁汤", "formula_detail": "杏仁五钱、飞滑石六钱、白通草二钱、白蔻仁二钱、竹叶二钱、厚朴二钱、生薏仁六钱、半夏五钱", "ni_annotation": "三仁汤是湿温病的第一大方，吴鞠通用它来治疗湿温初起、邪在气分、湿热并重的证候。杏仁开上焦肺气，白蔻仁温中化湿，生薏仁淡渗利湿，三仁分治上中下三焦湿热。滑石竹叶清利湿热，厚朴半夏燥湿化痰，通草通利水道。这个方子配伍精妙，三仁分消，清热不寒、燥湿不烈，是湿温病最安全的方子。几乎所有湿温病都可以从三仁汤加。", "contraindication": "", "keywords": "三仁汤 湿温 三仁分消 湿热并重"}, {"id": 924, "source": "温病条辨", "article_number": "129", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "七一、湿温，舌黄滑，脉缓，身痛，渴不多饮，大便溏，胸痞，汗出热不退，舌现灰滑，渴不引饮，脉不缓，转沉，恶风寒，似疟，寒热往来，宜三仁汤去白蔻加黄芩黄连。", "tags": "舌黄滑,脉缓,身痛,渴不多饮,大便溏,胸痞,汗出热不退,舌现灰滑,渴不引饮,脉沉,恶风寒,似疟,寒热往来,湿温", "formula": "三仁汤去白蔻加黄芩黄连", "formula_detail": "杏仁五钱、飞滑石六钱、通草二钱、竹叶二钱、厚朴二钱、生薏仁六钱、半夏五钱、黄芩二钱、黄连一钱", "ni_annotation": "三仁汤去白蔻加黄芩黄连，说明湿温病的湿热已经偏重，白蔻仁温燥不利于热重的情况，所以去掉；加黄芩黄连增强清热燥湿的力量。这个加减法非常典型：湿重热轻用白蔻，热重湿轻去白蔻加黄芩黄连。湿温病治疗的核心就是调节湿与热的比重，湿重用温燥，热重用苦寒，湿热并重就温清并用。三仁汤之所以能成为湿温母方，就是因为它。", "contraindication": "", "keywords": "三仁汤去白蔻加芩连 湿温 热重湿轻"}, {"id": 925, "source": "温病条辨", "article_number": "130", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "七二、湿温，舌黄滑，脉缓，身痛，渴不多饮，大便溏，胸痞，汗出热不退，舌现灰滑，渴不引饮，脉不缓，转沉，恶风寒，似疟，寒热往来，宜三仁汤去白蔻加黄芩、黄连、知母。", "tags": "舌黄滑,脉缓,身痛,渴不多饮,大便溏,胸痞,汗出热不退,舌现灰滑,渴不引饮,脉沉,恶风寒,似疟,寒热往来,湿温", "formula": "三仁汤去白蔻加芩连知母", "formula_detail": "杏仁五钱、飞滑石六钱、通草二钱、竹叶二钱、厚朴二钱、生薏仁六钱、半夏五钱、黄芩二钱、黄连一钱、知母二钱", "ni_annotation": "在三仁汤去白蔻加芩连的基础上再加知母，说明热象更重了，需要知母增强清热养阴的力量。知母既能清热又能养阴，对于热盛伤阴的湿温病特别合适。这个方子比前一条更偏于清热，适合湿热并重但热象更突出的证候。湿温病用知母要注意：舌苔厚腻的时候不能用，因为知母滋腻会助湿；舌苔开始变薄、热象明显的时候才可以用。这是湿温病用养阴药的分寸。", "contraindication": "", "keywords": "三仁汤去白蔻加芩连知母 湿温 热盛伤阴"}, {"id": 926, "source": "温病条辨", "article_number": "131", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "七三、湿温，舌黄滑，脉缓，身痛，渴不多饮，大便溏，胸痞，汗出热不退，舌现灰滑，渴不引饮，脉不缓，转沉，恶风寒，似疟，寒热往来，宜三仁汤去白蔻加黄芩、黄连、知母、花粉。", "tags": "舌黄滑,脉缓,身痛,渴不多饮,大便溏,胸痞,汗出热不退,舌现灰滑,渴不引饮,脉沉,恶风寒,似疟,寒热往来,湿温", "formula": "三仁汤去白蔻加芩连知母花粉", "formula_detail": "杏仁五钱、飞滑石六钱、通草二钱、竹叶二钱、厚朴二钱、生薏仁六钱、半夏五钱、黄芩二钱、黄连一钱、知母二钱、花粉二钱", "ni_annotation": "再加天花粉，说明热盛伤阴更重了，天花粉清热养阴生津的力量比知母更强。湿温病到了用天花粉的地步，说明阴液已经明显受伤，必须养阴清热兼顾。但用天花粉的前提是舌苔不能太厚腻，否则花粉的滋腻会助湿。这个方子系列展示了湿温病从湿重到热重、从湿温并治到清热为主、再到清热养阴的完整演变过程。每一步加减都有舌苔脉象。", "contraindication": "", "keywords": "三仁汤去白蔻加芩连知母花粉 湿温 热盛伤阴重"}, {"id": 927, "source": "温病条辨", "article_number": "132", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "七四、湿温，舌黄滑，脉缓，身痛，渴不多饮，大便溏，胸痞，汗出热不退，舌现灰滑，渴不引饮，脉不缓，转沉，恶风寒，似疟，寒热往来，宜三仁汤去白蔻加黄芩、黄连、知母、花粉、地骨皮。", "tags": "舌黄滑,脉缓,身痛,渴不多饮,大便溏,胸痞,汗出热不退,舌现灰滑,渴不引饮,脉沉,恶风寒,似疟,寒热往来,湿温", "formula": "三仁汤去白蔻加芩连知母花粉地骨皮", "formula_detail": "杏仁五钱、飞滑石六钱、通草二钱、竹叶二钱、厚朴二钱、生薏仁六钱、半夏五钱、黄芩二钱、黄连一钱、知母二钱、花粉二钱、地骨皮三钱", "ni_annotation": "再加地骨皮，地骨皮是清虚热的药，说明湿热已经伤及阴分、出现了阴虚内热的表现。湿温病用三仁汤加减到这个程度，说明病情已经从实热转向虚热、从湿热并重转向阴虚内热为主。地骨皮清虚热而不苦寒伤胃，是阴虚内热证候的良药。这个方子系列非常完整地展示了湿温病的动态变化过程：湿重→湿热并重→热重→热盛伤阴→阴虚内热。", "contraindication": "", "keywords": "三仁汤去白蔻加地骨皮 湿温 阴虚内热 动态辨证"}, {"id": 928, "source": "温病条辨", "article_number": "133", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "七五、湿温，舌黄滑，脉缓，身痛，渴不多饮，大便溏，胸痞，汗出热不退，舌现灰滑，渴不引饮，脉不缓，转沉，恶风寒，似疟，寒热往来，宜三仁汤去白蔻加黄芩、黄连、知母、花粉、地骨皮、青蒿。", "tags": "舌黄滑,脉缓,身痛,渴不多饮,大便溏,胸痞,汗出热不退,舌现灰滑,渴不引饮,脉沉,恶风寒,似疟,寒热往来,湿温", "formula": "三仁汤去白蔻加芩连知母花粉地骨皮青蒿", "formula_detail": "杏仁五钱、飞滑石六钱、通草二钱、竹叶二钱、厚朴二钱、生薏仁六钱、半夏五钱、黄芩二钱、黄连一钱、知母二钱、花粉二钱、地骨皮三钱、青蒿二钱", "ni_annotation": "再加青蒿，青蒿是清透伏邪、治疗疟疾的要药。湿温病出现似疟、寒热往来的表现，用青蒿是对症的。青蒿清透少阳伏邪，配合地骨皮清虚热，配合黄芩黄连清热燥湿，整个方子形成了清透虚热的组合。湿温病发展到这个阶段，已经不是单纯的湿热病了，而是湿热伤阴、伏邪留连的复杂证候。治疗的重点已经从祛湿热转向清透伏邪、养阴清热。", "contraindication": "", "keywords": "三仁汤去白蔻加青蒿 湿温 清透伏邪 似疟"}, {"id": 929, "source": "温病条辨", "article_number": "134", "liujing": "", "chapter": "中焦篇-湿温", "original_text": "七六、湿温，舌黄滑，脉缓，身痛，渴不多饮，大便溏，胸痞，汗出热不退，舌现灰滑，渴不引饮，脉不缓，转沉，恶风寒，似疟，寒热往来，宜三仁汤去白蔻加黄芩、黄连、知母、花粉、地骨皮、青蒿、鳖甲。", "tags": "舌黄滑,脉缓,身痛,渴不多饮,大便溏,胸痞,汗出热不退,舌现灰滑,渴不引饮,脉沉,恶风寒,似疟,寒热往来,湿温", "formula": "三仁汤去白蔻加芩连知母花粉地骨皮青蒿鳖甲", "formula_detail": "杏仁五钱、飞滑石六钱、通草二钱、竹叶二钱、厚朴二钱、生薏仁六钱、半夏五钱、黄芩二钱、黄连一钱、知母二钱、花粉二钱、地骨皮三钱、青蒿二钱、鳖甲五钱", "ni_annotation": "最后加鳖甲，鳖甲是滋阴潜阳、入络搜邪的药，配合青蒿就是青蒿鳖甲汤的意思。湿温病到了用鳖甲的地步，说明伏邪已经深入阴分、络脉，必须用水族之物才能搜剔。这个方子系列从三仁汤开始，一步步加减，最后变成了以青蒿鳖甲汤为主的方子，展示了湿温病从湿热并重到阴虚伏邪的完整演变。吴鞠通用这一个系列条文，实际上是在教。", "contraindication": "", "keywords": "三仁汤去白蔻加鳖甲 湿温 阴虚伏邪 青蒿鳖甲"}, {"id": 930, "source": "温病条辨", "article_number": "135", "liujing": "", "chapter": "中焦篇-秋燥", "original_text": "七七、秋燥，气分热，耳鸣，目不痛，鼻不塞，舌白滑，脉大，宜桑杏汤。", "tags": "耳鸣,目不痛,鼻不塞,舌白滑,脉大,秋燥", "formula": "桑杏汤", "formula_detail": "桑叶一钱、杏仁一钱五分、沙参二钱、象贝一钱、香豉一钱、栀皮一钱、梨皮一钱", "ni_annotation": "秋燥气分热，耳鸣是燥热上扰，目不痛鼻不塞说明不是风寒而是燥热。舌白滑说明还有湿，但脉大说明燥热已盛。桑杏汤是治秋燥初起的方子，桑叶轻清宣肺润燥，杏仁宣降肺气，沙参养阴润肺，象贝化痰，香豉透邪，栀皮清热，梨皮润肺。全方轻清宣透、润燥不滋腻，是秋燥初起的最佳方。注意舌白滑还有湿的时候不能用滋腻的药，所以。", "contraindication": "", "keywords": "桑杏汤 秋燥 气分热 轻清宣透"}, {"id": 931, "source": "温病条辨", "article_number": "136", "liujing": "", "chapter": "中焦篇-秋燥", "original_text": "七八、秋燥，耳鸣，目赤，鼻衄，舌白苔，脉数大，宜桑杏汤加黄芩、黄连、栀子。", "tags": "耳鸣,目赤,鼻衄,舌白苔,脉数大,秋燥", "formula": "桑杏汤加黄芩黄连栀子", "formula_detail": "桑叶一钱、杏仁一钱五分、沙参二钱、象贝一钱、香豉一钱、栀皮一钱、梨皮一钱、黄芩一钱、黄连五分、栀子一钱", "ni_annotation": "目赤鼻衄说明燥热已经伤了血络，脉数大说明热盛。在桑杏汤基础上加黄芩黄连栀子增强清热凉血的力量。黄芩清肺热，黄连清心热，栀子清三焦热且能凉血止血。这个加减法说明秋燥病如果热象明显、有出血倾向，必须加苦寒清热凉血的药。但苦寒药不能多用久用，否则会伤胃阳、化燥更甚。秋燥病用苦寒必须中病即止，热退就停。", "contraindication": "", "keywords": "桑杏汤加芩连栀 秋燥 目赤鼻衄 清热凉血"}, {"id": 932, "source": "温病条辨", "article_number": "137", "liujing": "", "chapter": "中焦篇-秋燥", "original_text": "七九、秋燥，身热，口干，耳鸣，目赤，鼻衄，舌白苔，脉数大，宜沙参麦冬汤。", "tags": "身热,口干,耳鸣,目赤,鼻衄,舌白苔,脉数大,秋燥", "formula": "沙参麦冬汤", "formula_detail": "沙参三钱、玉竹二钱、生甘草一钱、冬桑叶一钱五分、麦冬三钱、生扁豆一钱五分、花粉一钱五分", "ni_annotation": "沙参麦冬汤是治秋燥气分热盛、阴液已伤的方子。身热口干说明热盛伤津，耳鸣目赤鼻衄说明热在血络，舌白苔说明湿未全化但已经不重。沙参麦冬玉竹花粉养阴润燥，桑叶清宣肺热，生扁豆健脾化湿，甘草和中。这个方子比桑杏汤更偏于养阴，适合秋燥热盛阴伤的证候。注意扁豆的使用，秋燥病虽然要润燥，但如果还有湿就不能纯用润燥。", "contraindication": "", "keywords": "沙参麦冬汤 秋燥 热盛阴伤 养阴润燥"}, {"id": 933, "source": "温病条辨", "article_number": "138", "liujing": "", "chapter": "中焦篇-秋燥", "original_text": "八十、秋燥，身热，口干，耳鸣，目赤，鼻衄，舌白苔，脉数大，喘，宜沙参麦冬汤加石膏、杏仁。", "tags": "身热,口干,耳鸣,目赤,鼻衄,舌白苔,脉数大,喘,秋燥", "formula": "沙参麦冬汤加石膏杏仁", "formula_detail": "沙参三钱、玉竹二钱、生甘草一钱、冬桑叶一钱五分、麦冬三钱、生扁豆一钱五分、花粉一钱五分、石膏五钱、杏仁二钱", "ni_annotation": "出现喘证，说明燥热已经影响到肺的宣降功能。加石膏清气分热，杏仁宣肺平喘。这个加减法说明秋燥病如果出现喘证，治疗要在养阴润燥的基础上加宣肺清热的药。石膏清气分大热，杏仁宣肺降气，两个药配合能有效缓解喘证。注意石膏的用量（五钱）比白虎汤轻很多，因为秋燥病热虽盛但阴已伤，不能用大剂石膏苦寒伤阴。", "contraindication": "", "keywords": "沙参麦冬汤加石膏杏仁 秋燥 喘 清肺平喘"}, {"id": 934, "source": "温病条辨", "article_number": "139", "liujing": "", "chapter": "中焦篇-秋燥", "original_text": "八一、秋燥，身热，口干，耳鸣，目赤，鼻衄，舌白苔，脉数大，喘，咳，宜清燥救肺汤。", "tags": "身热,口干,耳鸣,目赤,鼻衄,舌白苔,脉数大,喘,咳,秋燥", "formula": "清燥救肺汤", "formula_detail": "石膏二钱五分、甘草一钱、霜桑叶三钱、人参七分、杏仁七分、枇杷叶一片刷去毛、胡麻仁一钱、阿胶八分、麦冬二钱", "ni_annotation": "清燥救肺汤是喻嘉言的名方，吴鞠通把它收入《温病条辨》治秋燥。这个方子石膏清肺热，桑叶清宣肺燥，人参甘草补益肺气，杏仁枇杷叶宣肺降气，胡麻仁阿胶麦冬养阴润燥。全方补泻兼施、润燥并用，是治疗秋燥肺热阴伤、喘咳并重的最佳方。注意人参只用七分，说明秋燥病用人参必须少量，不能像伤寒那样用大量温补。喻嘉言创这个。", "contraindication": "", "keywords": "清燥救肺汤 秋燥 肺热阴伤 喘咳并重"}, {"id": 935, "source": "温病条辨", "article_number": "140", "liujing": "", "chapter": "中焦篇-秋燥", "original_text": "八二、秋燥，身热，口干，耳鸣，目赤，鼻衄，舌白苔，脉数大，喘，咳，宜清燥救肺汤加石膏、阿胶、麦冬。", "tags": "身热,口干,耳鸣,目赤,鼻衄,舌白苔,脉数大,喘,咳,秋燥", "formula": "清燥救肺汤加味", "formula_detail": "石膏五钱、甘草一钱、霜桑叶三钱、人参七分、杏仁七分、枇杷叶一片、胡麻仁一钱、阿胶一钱、麦冬三钱", "ni_annotation": "清燥救肺汤原方石膏二钱五分，这里加到
