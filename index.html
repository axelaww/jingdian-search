五钱，说明热更重了。阿胶麦冬也加量，说明阴伤也更重了。这个加减法是根据病情轻重调整药量，不是改变方药结构。秋燥病用清燥救肺汤，热重就加重石膏，阴伤重就加重阿胶麦冬，灵活调整。喻嘉言原方石膏用量不大，吴鞠通在这里加量，说明他认为秋燥病热重的场合石膏可以加量，但不能太。", "contraindication": "", "keywords": "清燥救肺汤加重石膏 秋燥 热重阴伤重"}, {"id": 936, "source": "温病条辨", "article_number": "141", "liujing": "", "chapter": "中焦篇-秋燥", "original_text": "八三、秋燥，身热，口干，耳鸣，目赤，鼻衄，舌白苔，脉数大，喘，咳，痰多，宜清燥救肺汤加贝母、瓜蒌。", "tags": "身热,口干,耳鸣,目赤,鼻衄,舌白苔,脉数大,喘,咳,痰多,秋燥", "formula": "清燥救肺汤加贝母瓜蒌", "formula_detail": "石膏二钱五分、甘草一钱、霜桑叶三钱、人参七分、杏仁七分、枇杷叶一片、胡麻仁一钱、阿胶八分、麦冬二钱、贝母二钱、瓜蒌三钱", "ni_annotation": "痰多说明肺中燥热炼液为痰，加贝母瓜蒌化痰润肺。贝母清热化痰润肺，瓜蒌宽胸化痰润燥。这个加减法针对的是秋燥病痰多的证候。清燥救肺汤原方没有化痰药，因为喻嘉言创方时主要针对的是燥热伤肺、喘咳无痰的证候。如果痰多就要加化痰药，但选药要注意不能太温燥，贝母瓜蒌都是凉润的化痰药，适合秋燥病的痰证。", "contraindication": "", "keywords": "清燥救肺汤加贝母瓜蒌 秋燥 痰多 凉润化痰"}, {"id": 937, "source": "温病条辨", "article_number": "142", "liujing": "", "chapter": "中焦篇-秋燥", "original_text": "八四、秋燥，身热，口干，耳鸣，目赤，鼻衄，舌白苔，脉数大，喘，咳，痰多，胸痛，宜清燥救肺汤加贝母、瓜蒌、郁金、桃仁。", "tags": "身热,口干,耳鸣,目赤,鼻衄,舌白苔,脉数大,喘,咳,痰多,胸痛,秋燥", "formula": "清燥救肺汤加贝母瓜蒌郁金桃仁", "formula_detail": "石膏二钱五分、甘草一钱、霜桑叶三钱、人参七分、杏仁七分、枇杷叶一片、胡麻仁一钱、阿胶八分、麦冬二钱、贝母二钱、瓜蒌三钱、郁金二钱、桃仁二钱", "ni_annotation": "胸痛说明燥热已经伤及肺络、气血瘀滞，加郁金桃仁活血通络止痛。郁金行气活血解郁，桃仁活血祛瘀。这个加减法说明秋燥病如果出现胸痛，要考虑肺络瘀阻，治疗要在润燥清热的基础上加活血通络的药。桃仁质地油润，既能活血又不干燥，特别适合秋燥病有瘀血的证候。注意桃仁的用量不能太大，二钱足够，因为秋燥病阴液已伤，太温燥活血会伤阴。", "contraindication": "", "keywords": "清燥救肺汤加郁金桃仁 秋燥 胸痛 肺络瘀阻"}, {"id": 938, "source": "温病条辨", "article_number": "143", "liujing": "", "chapter": "中焦篇-秋燥", "original_text": "八五、秋燥，身热，口干，耳鸣，目赤，鼻衄，舌白苔，脉数大，喘，咳，痰多，胸痛，宜清燥救肺汤加贝母、瓜蒌、郁金、桃仁、葶苈子。", "tags": "身热,口干,耳鸣,目赤,鼻衄,舌白苔,脉数大,喘,咳,痰多,胸痛,秋燥", "formula": "清燥救肺汤加贝母瓜蒌郁金桃仁葶苈", "formula_detail": "石膏二钱五分、甘草一钱、霜桑叶三钱、人参七分、杏仁七分、枇杷叶一片、胡麻仁一钱、阿胶八分、麦冬二钱、贝母二钱、瓜蒌三钱、郁金二钱、桃仁二钱、葶苈子二钱", "ni_annotation": "葶苈子泻肺平喘、利水消肿，说明喘证已经很重、肺气壅塞。清燥救肺汤加葶苈子，是在润燥清热的基础上加强泻肺平喘的力量。但葶苈子苦寒泻肺，用量不能太大（二钱），而且中病即止，否则会伤肺气。秋燥病用葶苈子是权宜之计，只有在喘证严重、肺气壅塞的时候才用，平时还是要立足于润燥清热。这个方子系列展示了秋燥病从轻到。", "contraindication": "", "keywords": "清燥救肺汤加葶苈子 秋燥 喘重 泻肺平喘"}, {"id": 939, "source": "温病条辨", "article_number": "144", "liujing": "", "chapter": "中焦篇-疟", "original_text": "八六、疟，寒多热少，或但寒不热，舌白滑，脉弦迟，宜柴胡桂枝干姜汤。", "tags": "寒多热少,但寒不热,舌白滑,脉弦迟,疟", "formula": "柴胡桂枝干姜汤", "formula_detail": "柴胡一两、桂枝三两、干姜二两、栝楼根四两、黄芩三两、牡蛎二两熬、甘草二两炙", "ni_annotation": "疟病寒多热少或但寒不热，说明寒邪偏重、阳气被遏。舌白滑脉弦迟都是寒湿内盛的表现。柴胡桂枝干姜汤是张仲景治疟的方子，柴胡枢转少阳，桂枝干姜温阳散寒，栝楼根生津止渴，黄芩清少阳余热，牡蛎软坚散结，甘草和中。这个方子寒温并用，适合疟病寒热错杂、寒湿偏重的证候。吴鞠通用仲景方来治疗温病范围内的疟病，说明他并。", "contraindication": "", "keywords": "柴胡桂枝干姜汤 疟 寒多热少 寒湿偏重"}, {"id": 940, "source": "温病条辨", "article_number": "145", "liujing": "", "chapter": "中焦篇-疟", "original_text": "八七、疟，热多寒少，或但热不寒，舌黄滑，脉洪大，宜白虎加桂枝汤。", "tags": "热多寒少,但热不寒,舌黄滑,脉洪大,疟", "formula": "白虎加桂枝汤", "formula_detail": "知母六两、甘草二两炙、石膏一斤、粳米二合、桂枝三两", "ni_annotation": "疟病热多寒少或但热不寒，说明热邪偏重。舌黄滑脉洪大都是热盛的表现。白虎加桂枝汤是《金匮要略》治温疟的方子，白虎汤清气分大热，桂枝调和营卫、通阳达邪。这个方子治疗温疟——就是热多寒少的疟疾。白虎汤清透气分大热，桂枝引邪外出，两者配合，清热而不冰伏、透邪而不助热。注意桂枝的用量（三两）比白虎汤中任何一味。", "contraindication": "", "keywords": "白虎加桂枝汤 疟 热多寒少 温疟"}, {"id": 941, "source": "温病条辨", "article_number": "146", "liujing": "", "chapter": "中焦篇-疟", "original_text": "八八、疟，寒热往来，舌黄滑，脉弦数，宜小柴胡汤。", "tags": "寒热往来,舌黄滑,脉弦数,疟", "formula": "小柴胡汤", "formula_detail": "柴胡半斤、黄芩三两、人参三两、半夏半升洗、甘草三两炙、生姜三两切、大枣十二枚擘", "ni_annotation": "寒热往来是疟病最典型的症状，也是少阳病的典型表现。舌黄滑脉弦数说明湿热郁于少阳。小柴胡汤枢转少阳、和解表里，是治疗疟病的主方。柴胡升散少阳之邪，黄芩清少阳之热，半夏和胃化痰，人参甘草生姜大枣益气和中。吴鞠通在这里完全继承了张仲景用小柴胡汤治疟的经验，但温病学派用这个方子时要根据湿热的情况适当加减，比。", "contraindication": "", "keywords": "小柴胡汤 疟 寒热往来 少阳证"}, {"id": 942, "source": "温病条辨", "article_number": "147", "liujing": "", "chapter": "中焦篇-疟", "original_text": "八九、疟，寒热往来，舌黄滑，脉弦数，胸胁满闷，宜小柴胡汤去人参加苍术、厚朴。", "tags": "寒热往来,舌黄滑,脉弦数,胸胁满闷,疟", "formula": "小柴胡汤去人参加苍术厚朴", "formula_detail": "柴胡半斤、黄芩三两、半夏半升、甘草三两炙、生姜三两、大枣十二枚、苍术三两、厚朴三两", "ni_annotation": "胸胁满闷说明湿阻气机，去人参是因为湿温疟病忌温补，加苍术厚朴燥湿行气。苍术燥湿健脾，厚朴行气除满，两个药配合能有效缓解胸胁满闷的症状。这个加减法体现了温病学派对小柴胡汤的改良——去掉温补的人参，加上燥湿行气的苍术厚朴，使方子更适合湿温疟病的病机。张仲景的原方是治伤寒少阳证的，吴鞠通把它改造后用来治温。", "contraindication": "", "keywords": "小柴胡汤去人参加苍术厚朴 疟 湿阻气机 燥湿行气"}, {"id": 943, "source": "温病条辨", "article_number": "148", "liujing": "", "chapter": "中焦篇-疟", "original_text": "九十、疟，寒热往来，舌黄滑，脉弦数，胸胁满闷，口渴，宜小柴胡汤去人参加石膏、知母。", "tags": "寒热往来,舌黄滑,脉弦数,胸胁满闷,口渴,疟", "formula": "小柴胡汤去人参加石膏知母", "formula_detail": "柴胡半斤、黄芩三两、半夏半升、甘草三两炙、生姜三两、大枣十二枚、石膏八两、知母三两", "ni_annotation": "口渴说明热盛伤津，去人参加石膏知母增强清热生津的力量。石膏清气分大热，知母清热养阴生津，两个药配合就是白虎汤的意思。这个加减法说明疟病如果出现热盛伤津的证候，治疗要在枢转少阳的基础上加清热生津的药。小柴胡汤加石膏知母，实际上是柴胡白虎合方，治疗少阳阳明同病的疟病。这种合方思路在温病治疗中很常见，不拘泥于一方一法。", "contraindication": "", "keywords": "小柴胡汤去人参加石膏知母 疟 热盛伤津 柴胡白虎合方"}, {"id": 944, "source": "温病条辨", "article_number": "149", "liujing": "", "chapter": "中焦篇-疟", "original_text": "九一、疟，寒热往来，舌黄滑，脉弦数，胸胁满闷，口渴，心烦，宜小柴胡汤去人参加石膏、知母、栀子。", "tags": "寒热往来,舌黄滑,脉弦数,胸胁满闷,口渴,心烦,疟", "formula": "小柴胡汤去人参加石膏知母栀子", "formula_detail": "柴胡半斤、黄芩三两、半夏半升、甘草三两炙、生姜三两、大枣十二枚、石膏八两、知母三两、栀子三两", "ni_annotation": "心烦说明热扰心神，加栀子清心除烦。栀子清三焦热且能凉血，对于热扰心神导致的心烦特别有效。这个加减法说明疟病如果出现心烦的症状，要考虑热扰心神，治疗要在清热生津的基础上加清心除烦的药。栀子配合石膏知母，形成清气分热、清心除烦的组合。小柴胡汤系列加减展示了疟病从湿重到热重、从气滞到热扰心神的完整演变过程。", "contraindication": "", "keywords": "小柴胡汤去人参加栀子 疟 心烦 热扰心神"}, {"id": 945, "source": "温病条辨", "article_number": "150", "liujing": "", "chapter": "中焦篇-疟", "original_text": "九二、疟，寒热往来，舌黄滑，脉弦数，胸胁满闷，口渴，心烦，夜不安卧，宜小柴胡汤去人参加石膏、知母、栀子、茯神。", "tags": "寒热往来,舌黄滑,脉弦数,胸胁满闷,口渴,心烦,夜不安卧,疟", "formula": "小柴胡汤去人参加石膏知母栀子茯神", "formula_detail": "柴胡半斤、黄芩三两、半夏半升、甘草三两炙、生姜三两、大枣十二枚、石膏八两、知母三两、栀子三两、茯神三两", "ni_annotation": "夜不安卧说明热扰心神更重了，影响到睡眠。加茯神宁心安神。茯神是茯苓抱松根而生的部分，宁心安神的作用比茯苓强。这个加减法说明疟病如果出现失眠的症状，治疗要在清心除烦的基础上加安神药。但温病病中的安神药要选择清灵的，不能用重镇安神的石英磁石之类，因为温病神昏多是热扰而非阳亢。茯神既能安神又不重镇，是温病失眠的良药。", "contraindication": "", "keywords": "小柴胡汤去人参加茯神 疟 夜不安卧 宁心安神"}, {"id": 946, "source": "温病条辨", "article_number": "151", "liujing": "", "chapter": "中焦篇-疟", "original_text": "九三、疟，寒热往来，舌黄滑，脉弦数，胸胁满闷，口渴，心烦，夜不安卧，谵语，宜小柴胡汤去人参加石膏、知母、栀子、茯神、黄连。", "tags": "寒热往来,舌黄滑,脉弦数,胸胁满闷,口渴,心烦,夜不安卧,谵语,疟", "formula": "小柴胡汤去人参加石膏知母栀子茯神黄连", "formula_detail": "柴胡半斤、黄芩三两、半夏半升、甘草三两炙、生姜三两、大枣十二枚、石膏八两、知母三两、栀子三两、茯神三两、黄连二两", "ni_annotation": "谵语说明热邪已经深入心营，加黄连清心解毒。黄连清心火、解毒热，是热入心包、谵语神昏的要药。这个加减法说明疟病如果出现谵语，说明病情已经很重，热邪已经影响到心神，治疗要在清热安神的基础上加清心解毒的药。但黄连苦寒，用量不能太大（二两），而且要中病即止，否则会伤胃阳。疟病出现谵语是病情加重的信号，需要高度重视。", "contraindication": "", "keywords": "小柴胡汤去人参加黄连 疟 谵语 热入心包"}, {"id": 947, "source": "温病条辨", "article_number": "152", "liujing": "", "chapter": "中焦篇-疟", "original_text": "九四、疟，寒热往来，舌黄滑，脉弦数，胸胁满闷，口渴，心烦，夜不安卧，谵语，舌赤，宜清营汤。", "tags": "寒热往来,舌黄滑,脉弦数,胸胁满闷,口渴,心烦,夜不安卧,谵语,舌赤,疟", "formula": "清营汤", "formula_detail": "犀角三钱、生地五钱、元参三钱、竹叶心一钱、麦冬三钱、丹参二钱、黄连一钱五分、银花三钱、连翘二钱", "ni_annotation": "舌赤说明热已经入营分，不能再用小柴胡汤加减了，必须改用清营汤清营透热。清营汤中犀角清营凉血，生地元参麦冬养阴凉血，竹叶心轻清透热，丹参活血防瘀，黄连清心，银花连翘透邪外出。这个方子是治疗热入营分的主方。疟病发展到舌赤谵语的地步，说明已经从气分传到营分，治疗方向必须改变，从枢转少阳变成清营透热。这是疟病危重阶段的治法。", "contraindication": "", "keywords": "清营汤 疟 热入营分 舌赤谵语"}, {"id": 948, "source": "温病条辨", "article_number": "153", "liujing": "", "chapter": "中焦篇-疟", "original_text": "九五、疟，寒热往来，舌黄滑，脉弦数，胸胁满闷，口渴，心烦，夜不安卧，谵语，舌赤，痉厥，宜安宫牛黄丸。", "tags": "寒热往来,舌黄滑,脉弦数,胸胁满闷,口渴,心烦,夜不安卧,谵语,舌赤,痉厥,疟", "formula": "安宫牛黄丸", "formula_detail": "牛黄、郁金、犀角、黄连、朱砂、梅片、麝香、珍珠、山栀、雄黄、黄芩、金箔衣", "ni_annotation": "痉厥说明热邪已经深入厥阴、肝风内动，用安宫牛黄丸清心开窍、息风止痉。安宫牛黄丸是温病三宝之一，清热解毒、开窍安神的力量最强，对于热入心包、高热神昏、痉厥抽搐的证候效果最好。疟病发展到痉厥的地步，已经是极危重的状态，必须急用安宫牛黄丸开闭固脱。但安宫牛黄丸药性寒凉，中病即止，不能久服，否则会伤阳气。疟。", "contraindication": "中病即止，不可久服", "keywords": "安宫牛黄丸 疟 痉厥 热入心包 危重"}, {"id": 949, "source": "温病条辨", "article_number": "154", "liujing": "", "chapter": "中焦篇-痢", "original_text": "九六、痢，初起发热，腹痛，里急后重，舌黄滑，脉数，宜芍药汤。", "tags": "初起发热,腹痛,里急后重,舌黄滑,脉数,痢", "formula": "芍药汤", "formula_detail": "芍药一两、当归五钱、黄连五钱、槟榔二钱、木香二钱、甘草二钱、大黄三钱、黄芩五钱、官桂一钱五分", "ni_annotation": "痢疾初起发热腹痛里急后重，是湿热蕴结大肠、气血瘀滞的表现。芍药汤是治痢疾初起湿热蕴结的代表方，芍药和营止痛，当归活血和血，黄连黄芩清热燥湿，槟榔木香行气导滞，大黄通腑泄热，官桂温通防苦寒太过，甘草和中。这个方子气血兼顾、寒热并用，是治疗湿热痢疾的经典方。吴鞠通用芍药汤治痢疾初起，说明他并不排斥使用伤寒派的方子。", "contraindication": "", "keywords": "芍药汤 痢 初起 湿热蕴结 里急后重"}, {"id": 950, "source": "温病条辨", "article_number": "155", "liujing": "", "chapter": "中焦篇-痢", "original_text": "九七、痢，发热，腹痛，里急后重，舌黄滑，脉数，便脓血，宜芍药汤加大黄。", "tags": "发热,腹痛,里急后重,舌黄滑,脉数,便脓血,痢", "formula": "芍药汤加大黄", "formula_detail": "芍药一两、当归五钱、黄连五钱、槟榔二钱、木香二钱、甘草二钱、大黄五钱、黄芩五钱、官桂一钱五分", "ni_annotation": "便脓血说明湿热已经损伤肠络、热盛肉腐，加大黄增强通腑泄热、凉血解毒的力量。大黄不仅能通腑泄热，还能凉血祛瘀、推陈致新，对于痢疾便脓血的证候特别有效。这个加减法说明痢疾如果出现便脓血，治疗要加大通腑泄热的力度，让热毒从大便排出。但大黄的用量要适中（五钱），不能太大，否则会损伤肠络、加重便血。痢疾用大黄。", "contraindication": "", "keywords": "芍药汤加大黄 痢 便脓血 通因通用"}, {"id": 951, "source": "温病条辨", "article_number": "156", "liujing": "", "chapter": "中焦篇-痢", "original_text": "九八、痢，发热，腹痛，里急后重，舌黄滑，脉数，便脓血，舌黄燥，宜白头翁汤。", "tags": "发热,腹痛,里急后重,舌黄滑,脉数,便脓血,舌黄燥,痢", "formula": "白头翁汤", "formula_detail": "白头翁二两、黄柏三两、黄连三两、秦皮三两", "ni_annotation": "舌黄燥说明湿热已经化燥化火、热盛伤津，不能再用地芍药的温通行气法，必须改用白头翁汤清热凉血解毒。白头翁清热解毒、凉血止痢为君，黄柏黄连清热燥湿解毒，秦皮清热燥湿、收涩止痢。这个方子四味药都是苦寒药，专清肠道湿热毒邪，是治疗热毒痢疾的代表方。吴鞠通在这里展示了痢疾从湿热并重到热毒偏重的治法转换，芍药汤。", "contraindication": "", "keywords": "白头翁汤 痢 热毒偏重 舌黄燥 便脓血"}, {"id": 952, "source": "温病条辨", "article_number": "157", "liujing": "", "chapter": "中焦篇-痢", "original_text": "九九、痢，发热，腹痛，里急后重，舌黄滑，脉数，便脓血，舌黄燥，口渴，宜白头翁汤加甘草、阿胶。", "tags": "发热,腹痛,里急后重,舌黄滑,脉数,便脓血,舌黄燥,口渴,痢", "formula": "白头翁汤加甘草阿胶", "formula_detail": "白头翁二两、黄柏三两、黄连三两、秦皮三两、甘草二两、阿胶二两", "ni_annotation": "口渴说明热盛伤津，加甘草阿胶养阴生津、和中缓急。甘草调和诸药且能缓急止痛，阿胶养阴补血、润燥止血。白头翁汤加甘草阿胶，实际上是在清热凉血解毒的基础上加了养阴和中的药物，适合热毒痢疾伤阴的证候。这个加减法体现了'热毒伤阴则养阴'的原则。但阿胶滋腻，痢疾初起湿热重的阶段不能用，必须等到热毒偏重、阴液已伤的时候才可以用。", "contraindication": "", "keywords": "白头翁汤加甘草阿胶 痢 热毒伤阴 养阴和中"}, {"id": 953, "source": "温病条辨", "article_number": "158", "liujing": "", "chapter": "中焦篇-痢", "original_text": "一百、痢，发热，腹痛，里急后重，舌黄滑，脉数，便脓血，舌黄燥，口渴，下重，宜白头翁汤加甘草、阿胶、黄芩。", "tags": "发热,腹痛,里急后重,舌黄滑,脉数,便脓血,舌黄燥,口渴,下重,痢", "formula": "白头翁汤加甘草阿胶黄芩", "formula_detail": "白头翁二两、黄柏三两、黄连三两、秦皮三两、甘草二两、阿胶二两、黄芩三两", "ni_annotation": "下重说明湿热气滞仍然明显，加黄芩增强清热燥湿的力量。黄芩清肺热且能燥湿，对于湿热下痢特别有效。这个加减法说明热毒痢疾如果还有明显的湿热气滞表现（下重），治疗要在清热凉血解毒养阴的基础上加清热燥湿行气的药。黄芩配合黄连黄柏，形成三黄清热燥湿的组合，对于热毒湿热并重的痢疾效果很好。但要注意黄芩苦寒，阴虚明显的场合要慎用。", "contraindication": "", "keywords": "白头翁汤加黄芩 痢 热毒湿热并重 三黄清热"}, {"id": 954, "source": "温病条辨", "article_number": "159", "liujing": "", "chapter": "中焦篇-疸痹", "original_text": "一零一、疸，湿热发黄，身黄如橘子色，小便不利，腹微满，宜茵陈五苓散。", "tags": "身黄如橘子色,小便不利,腹微满,疸,湿热发黄", "formula": "茵陈五苓散", "formula_detail": "茵陈蒿末十分、五苓散五分。五苓散：猪苓、茯苓、白术、泽泻、桂枝", "ni_annotation": "身黄如橘子色是阳黄的典型表现，说明湿热发黄、热重于湿。小便不利说明湿热无出路，腹微满说明湿热阻滞气机。茵陈五苓散中茵陈清热利湿退黄，五苓散化气利水，合起来让湿热从小便排出。这个方子和茵陈蒿汤的区别在于：茵陈蒿汤有大黄通腑泄热、适合腹满便秘的阳黄；茵陈五苓散有利水药、适合小便不利但大便不秘的阳黄。同样。", "contraindication": "", "keywords": "茵陈五苓散 疸 阳黄 小便不利 湿热发黄"}, {"id": 955, "source": "温病条辨", "article_number": "160", "liujing": "", "chapter": "中焦篇-疸痹", "original_text": "一零二、痹，湿聚热蒸，蕴于经络，寒战热炽，骨骱烦疼，舌色灰滞，面目痿黄，宜宣痹汤。", "tags": "寒战热炽,骨骱烦疼,舌色灰滞,面目痿黄,痹,湿聚热蒸", "formula": "宣痹汤", "formula_detail": "防己五钱、杏仁五钱、滑石五钱、连翘三钱、山栀三钱、薏苡五钱、半夏三钱醋炒、晚蚕沙三钱、赤小豆皮三钱", "ni_annotation": "湿聚热蒸、蕴于经络是湿热痹证的病机。寒战热炽是湿热郁阻、正邪交争的表现，骨骱烦疼是湿热阻滞关节经络，舌色灰滞是湿重热伏，面目痿黄是湿热郁蒸发黄。宣痹汤中防己祛风湿止痛，杏仁宣肺利气，滑石利湿清热，连翘栀子清热透邪，薏仁健脾渗湿，半夏化痰燥湿，蚕沙祛风除湿，赤小豆皮利水消肿。全方清热利湿、宣通经络，是。", "contraindication": "", "keywords": "宣痹汤 痹 湿热痹 湿聚热蒸 骨骱烦疼"}, {"id": 956, "source": "温病条辨", "article_number": "161", "liujing": "", "chapter": "下焦篇-风温", "original_text": "一、风温、温热、温疫、温毒、冬温，邪在阳明久羁，或已下，或未下，身热面赤，口干舌燥，甚则齿黑唇裂，脉沉实者，仍可下之；脉虚大，手足心热甚于手足背者，加减复脉汤主之。", "tags": "身热,面赤,口干,舌燥,齿黑,唇裂,手足心热", "formula": "加减复脉汤", "formula_detail": "炙甘草六钱，干地黄六钱，生白芍六钱，麦冬五钱（不去心），阿胶三钱，麻仁三钱", "ni_annotation": "此为温邪深入下焦，真阴被灼之候。手足心热甚于手足背，乃阴虚内热的确证，与阳明实热不同。加减复脉汤以大队甘润存阴为主，炙甘草合地黄、麦冬、阿胶，养阴而不腻，麻仁润肠兼能泄热。倪师谓此方乃温病存阴第一方，凡脉虚大而非沉实者，必用此不可再下。", "contraindication": "", "keywords": "加减复脉汤,手足心热,真阴被灼"}, {"id": 957, "source": "温病条辨", "article_number": "162", "liujing": "", "chapter": "下焦篇-风温", "original_text": "二、温病误表，津液被劫，心中震震，舌强神昏，宜复脉法复其津液，舌上津回则生；汗自出，中无所主者，救逆汤主之。", "tags": "心中震震,舌强,神昏,汗出", "formula": "救逆汤", "formula_detail": "即于加减复脉汤内去麻仁，加生龙骨四钱，生牡蛎八钱。脉虚大欲散者，加人参二钱。", "ni_annotation": "温病最忌发汗，误汗则津液外泄，心阴受损，故心中震震如悬。舌强者，心开窍于舌，阴伤则舌失所养。救逆汤即复脉去麻仁之滑利，加龙牡以镇摄浮越之心阳。此即固脱之法，与伤寒之四逆汤证不同，一为阳脱一为阴脱，临证须辨。", "contraindication": "", "keywords": "救逆汤,误表伤津,心中震震"}, {"id": 958, "source": "温病条辨", "article_number": "163", "liujing": "", "chapter": "下焦篇-风温", "original_text": "三、温病耳聋，病系少阴，与柴胡汤者必死，六、七日以后，宜复脉辈复其精。", "tags": "耳聋", "formula": "加减复脉汤", "formula_detail": "炙甘草六钱，干地黄六钱，生白芍六钱，麦冬五钱（不去心），阿胶三钱，麻仁三钱", "ni_annotation": "温病后期耳聋，与伤寒少阳证之耳聋截然不同。此为少阴肾精亏耗，不能上荣于耳所致，属虚证。若误用柴胡剂升散，则更损其阴精，故云必死。治当以复脉辈纯甘存阴，填补下焦真精，精复则耳自聪。倪师强调：温病后期诸证，但当甘润存津，勿用刚燥。", "contraindication": "", "keywords": "耳聋,少阴,复脉辈"}, {"id": 959, "source": "温病条辨", "article_number": "164", "liujing": "", "chapter": "下焦篇-风温", "original_text": "四、劳倦内伤，复感温病，六、七日以外不解者，宜复脉法。", "tags": "劳倦,内伤", "formula": "加减复脉汤", "formula_detail": "炙甘草六钱，干地黄六钱，生白芍六钱，麦冬五钱（不去心），阿胶三钱，麻仁三钱", "ni_annotation": "劳倦内伤之人，本已阴血亏虚，再感温邪，更易伤阴。六、七日外不解，是邪已入里而正虚不能达邪之象。此时不可再行攻伐，当以复脉法甘润存阴，以复正气。阴复则正气自能抗邪。倪师言此即'留人治病'之法——正气存内，邪不可干，阴液一复，邪自退舍。", "contraindication": "", "keywords": "劳倦内伤,复脉法,甘润存阴"}, {"id": 960, "source": "温病条辨", "article_number": "165", "liujing": "", "chapter": "下焦篇-风温", "original_text": "五、温病已汗而不得汗，已下而热不退，六、七日以外，脉尚躁盛者，重与复脉汤。", "tags": "发热不退,脉躁盛", "formula": "加减复脉汤", "formula_detail": "炙甘草六钱，干地黄六钱，生白芍六钱，麦冬五钱（不去心），阿胶三钱，麻仁三钱", "ni_annotation": "已汗已下而热不退，是津液已伤而邪气仍在。此时脉躁盛而非沉实，说明非阳明腑实，乃阴虚阳亢所致。治当重与复脉汤甘润存阴，阴复则阳自不亢、热自退矣。若误再汗再下，则阴竭而死。倪师谓脉躁盛而虚者最为危险，当速救阴液，不可迟疑。", "contraindication": "", "keywords": "发热不退,脉躁盛,重与复脉"}, {"id": 961, "source": "温病条辨", "article_number": "166", "liujing": "", "chapter": "下焦篇-风温", "original_text": "六、温病误用升散，脉结代，甚则脉两至者，重与复脉，虽有他证，后治之。", "tags": "脉结代,脉迟", "formula": "加减复脉汤", "formula_detail": "炙甘草六钱，干地黄六钱，生白芍六钱，麦冬五钱（不去心），阿胶三钱，麻仁三钱", "ni_annotation": "误用升散之药，如柴胡、升麻、葛根之类，拔其阴气，故脉见结代，甚至仅两至。此与伤寒炙甘草汤证机理相近，均为阴血亏耗、心脉失养。然温病之脉结代，重在阴虚而非气虚，故不用参、桂、姜，而纯用甘润存阴之复脉汤。倪师云：脉结代而致两至者危，急当救阴。", "contraindication": "", "keywords": "脉结代,误用升散,重与复脉"}, {"id": 962, "source": "温病条辨", "article_number": "167", "liujing": "", "chapter": "下焦篇-风温", "original_text": "七、汗下后，口燥咽干，神倦欲眠，舌赤苔老，与复脉汤。", "tags": "口燥,咽干,神倦,舌赤", "formula": "加减复脉汤", "formula_detail": "炙甘草六钱，干地黄六钱，生白芍六钱，麦冬五钱（不去心），阿胶三钱，麻仁三钱", "ni_annotation": "汗下之后，津液大伤，故口燥咽干。神倦欲眠，是少阴肾精亏耗、神失所养之象，非阳明热盛之神昏。舌赤苔老，乃真阴欲竭之征，舌虽赤而干老无津，与热盛之舌红而润有别。此证纯属阴虚，与复脉汤甘润存阴，阴复则诸证自愈。", "contraindication": "", "keywords": "口燥咽干,神倦,舌赤苔老"}, {"id": 963, "source": "温病条辨", "article_number": "168", "liujing": "", "chapter": "下焦篇-风温", "original_text": "八、热邪深入，或在少阴，或在厥阴，均宜复脉。", "tags": "热入少阴,热入厥阴", "formula": "加减复脉汤", "formula_detail": "炙甘草六钱，干地黄六钱，生白芍六钱，麦冬五钱（不去心），阿胶三钱，麻仁三钱", "ni_annotation": "热邪深入下焦，无论入肾（少阴）或入肝（厥阴），总由阴液先亏，邪乃内陷。复脉汤纯甘存阴，不犯二经，故通治少阴、厥阴之阴虚证。少阴主精，厥阴主血，精血同源，皆赖阴液滋养。倪师谓此乃温病后期'异病同治'之典范——病位虽异，阴虚则一，故一法可统之。", "contraindication": "", "keywords": "热入少阴,热入厥阴,复脉"}, {"id": 964, "source": "温病条辨", "article_number": "169", "liujing": "", "chapter": "下焦篇-风温", "original_text": "九、下后大便溏甚，周十二时三、四行，脉仍数者，未可与复脉汤，一甲煎主之。服一、二日，大便不溏者，可与一甲复脉汤。", "tags": "下后便溏,脉数", "formula": "一甲煎", "formula_detail": "生牡蛎二两（研细），水八杯，煮取三杯，分温三服。", "ni_annotation": "下后大便溏泄而脉数，是阴液已伤，而肠中仍有未尽之邪。此时若径投复脉之甘润（方中有麻仁滑肠），恐助其溏泄。故先用一甲煎，独取牡蛎一味，咸寒存阴，又能涩大便而清余热。待便实之后，再与一甲复脉汤（即复脉汤去麻仁加牡蛎）。倪师谓此即'先固其脱，后复其阴'之治法。", "contraindication": "", "keywords": "一甲煎,下后便溏,先固后补"}, {"id": 965, "source": "温病条辨", "article_number": "170", "liujing": "", "chapter": "下焦篇-风温", "original_text": "十、下后数日，热不退，或退不尽，口燥咽干，舌苔干黑或金黄色，脉沉而有力者，护胃承气汤微和之；脉沉而弱者，增液汤主之。", "tags": "发热不退,口燥,咽干,舌苔干黑", "formula": "护胃承气汤", "formula_detail": "生大黄三钱，玄参三钱，细生地三钱，丹皮二钱，知母二钱，麦冬三钱（连心）", "ni_annotation": "下后热仍不退，若脉沉有力、舌苔干黑金黄，乃下之未尽，犹有余邪结于肠腑。此时不可复下伤正，当用护胃承气汤，即于增液药中加小量大黄，微和胃气，养阴与通下并行，寓攻于补。若脉沉无力，纯属阴虚，则用增液汤纯补其阴。倪师谓此条示人下后审脉之关键，有力无力决治法。", "contraindication": "", "keywords": "护胃承气汤,舌苔干黑,脉沉有力"}, {"id": 966, "source": "温病条辨", "article_number": "171", "liujing": "", "chapter": "下焦篇-风温", "original_text": "十一、下后数日，热不退，或退不尽，口燥咽干，舌苔干黑或金黄色，脉沉而弱者，增液汤主之。", "tags": "发热不退,口燥,咽干,脉沉弱", "formula": "增液汤", "formula_detail": "玄参一两，麦冬八钱（连心），细生地八钱", "ni_annotation": "此承上条而言。同一舌苔干黑，同一热不退，而脉沉弱与脉沉有力判若霄壤。脉沉而弱为纯虚无邪之象，当用增液汤纯甘咸寒以增水行舟，玄参、麦冬、生地三味相须为用，滋阴润燥而不伤正。倪师谓增液汤乃温病'以补药之体作泻药之用'之典范，阴液一增，热自退、便自通。", "contraindication": "", "keywords": "增液汤,脉沉弱,增水行舟"}, {"id": 967, "source": "温病条辨", "article_number": "172", "liujing": "", "chapter": "下焦篇-风温", "original_text": "十二、下后大便溏泄，舌绛而干，脉虚数者，宜用加减复脉汤，仍用参。", "tags": "便溏,舌绛而干,脉虚数", "formula": "加减复脉汤加人参", "formula_detail": "炙甘草六钱，干地黄六钱，生白芍六钱，麦冬五钱（不去心），阿胶三钱，麻仁三钱，加人参二钱", "ni_annotation": "下后便溏，舌绛而干，脉虚数，是阴伤而气亦随之而虚。下焦温病后期，不独阴虚，气亦难免受损。单纯补阴而不益气，则阴无气化亦难恢复。故于复脉汤中加人参，气阴双补。倪师谓参之用否，全在脉证——脉但虚而不弱，可用纯阴；脉虚而弱者，必加参以益气生津。", "contraindication": "", "keywords": "加减复脉汤加参,气阴双补,便溏"}, {"id": 968, "source": "温病条辨", "article_number": "173", "liujing": "", "chapter": "下焦篇-风温", "original_text": "十三、下焦温病，但大便溏者，即与一甲复脉汤。", "tags": "便溏", "formula": "一甲复脉汤", "formula_detail": "即于加减复脉汤内，去麻仁，加生牡蛎一两。", "ni_annotation": "下焦温病大便溏者，不宜用麻仁之滑利，故去之。加生牡蛎，一则涩大便以固下焦，二则咸寒存阴以潜浮阳，三则软坚散结以防阴伤生瘀。一甲复脉汤即复脉汤加减法中最为常用之变方，适用于阴虚兼便溏之证。倪师谓牡蛎一味三用：涩精、潜阳、软坚，真阴亏虚而大便溏者最宜。", "contraindication": "", "keywords": "一甲复脉汤,去麻仁加牡蛎,便溏"}, {"id": 969, "source": "温病条辨", "article_number": "174", "liujing": "", "chapter": "下焦篇-风温", "original_text": "十四、少阴温病，真阴欲竭，壮火复炽，心中烦，不得卧者，黄连阿胶汤主之。", "tags": "心中烦,不得卧", "formula": "黄连阿胶汤", "formula_detail": "黄连四钱，黄芩一钱，阿胶三钱，白芍一钱，鸡子黄二枚。水八杯，先煮芩连芍三物，取三杯，去滓，纳胶烊尽，再纳鸡子黄搅令相得，分三次服。", "ni_annotation": "此即伤寒论少阴病黄连阿胶汤证，然病机不尽相同。温病之心中烦不得卧，乃真阴欲竭于下，壮火复炽于上，属阴虚火旺、心肾不交。芩连苦寒泻心火，阿胶鸡子黄白芍甘酸咸以滋肾阴。鸡子黄尤妙，乃血肉有情之品，直入下焦填补真阴。倪师谓此证舌必绛而干，脉必细数，若舌淡脉微则不可用。", "contraindication": "", "keywords": "黄连阿胶汤,心中烦,不得卧,心肾不交"}, {"id": 970, "source": "温病条辨", "article_number": "175", "liujing": "", "chapter": "下焦篇-风温", "original_text": "十五、夜热早凉，热退无汗，热自阴来者，青蒿鳖甲汤主之。", "tags": "夜热,早凉,热退无汗", "formula": "青蒿鳖甲汤", "formula_detail": "青蒿二钱，鳖甲五钱，细生地四钱，知母二钱，丹皮三钱", "ni_annotation": "夜热早凉，热退无汗，是温病后期邪伏阴分之典型表现。阴分有余邪留伏，故夜间发热；至晨阳气来复，邪不能敌，暂时退舍，故早凉。但邪仍在阴分，非从表解，故热退无汗。青蒿芳香透邪由阴出阳，鳖甲入阴搜邪，二药相伍为透热转气之要药。倪师谓此方妙在'先入后出'——鳖甲领青蒿直入阴分，青蒿携鳖甲透邪外出。", "contraindication": "", "keywords": "青蒿鳖甲汤,夜热早凉,热自阴来"}, {"id": 971, "source": "温病条辨", "article_number": "176", "liujing": "", "chapter": "下焦篇-风温", "original_text": "十六、热邪久羁，吸烁真阴，或因误表，或因妄攻，神倦瘛疭，脉气虚弱，舌绛苔少，时时欲脱者，大定风珠主之。", "tags": "神倦,瘛疭,脉虚弱,舌绛苔少,时时欲脱", "formula": "大定风珠", "formula_detail": "生白芍六钱，阿胶三钱，生龟板四钱，干地黄六钱，麻仁二钱，五味子二钱，生牡蛎四钱，麦冬六钱（连心），炙甘草四钱，鸡子黄二枚，鳖甲四钱（生）。水八杯，煮取三杯，去滓，再入鸡子黄搅令相得，分三次服。", "ni_annotation": "大定风珠是温病后期救阴固脱之重剂。热邪久羁、真阴大亏，筋脉失养故瘛疭抽搐，阴不敛阳故神倦欲脱。方中以鸡子黄、阿胶血肉有情之品填补真阴为君，三甲（龟板、鳖甲、牡蛎）潜阳息风为臣，辅以大队甘润之药。倪师谓此方乃温病'存阴救逆'之最后防线，阴竭欲脱之际，非此不能挽回。", "contraindication": "", "keywords": "大定风珠,神倦瘛疭,时时欲脱"}, {"id": 972, "source": "温病条辨", "article_number": "177", "liujing": "", "chapter": "下焦篇-风温", "original_text": "十七、壮火尚盛者，不得用定风珠、复脉。邪少虚多者，不得用黄连阿胶汤。阴虚欲痉者，不得用青蒿鳖甲汤。", "tags": "辨证禁忌", "formula": "", "formula_detail": "", "ni_annotation": "此条示下焦温病三方之禁忌。大定风珠与复脉汤纯补无攻，若壮火尚盛而误用，则闭门留寇。黄连阿胶汤苦寒泻火，若邪少虚多而误用，则更损正气。青蒿鳖甲汤透邪为主，若纯阴虚欲痉而无留邪者用之，反拔阴气。倪师谓此三条禁忌乃温病下焦治法之精髓，三者之用各有界限，临证不可不察。", "contraindication": "", "keywords": "辨证禁忌,定风珠,黄连阿胶汤,青蒿鳖甲汤"}, {"id": 973, "source": "温病条辨", "article_number": "178", "liujing": "", "chapter": "下焦篇-风温", "original_text": "十八、痉厥神昏，舌短烦躁，手少阴证未罢者，先与牛黄、紫雪辈，开窍搜邪；再与复脉汤存阴，三甲潜阳，临证细参，勿致倒乱。", "tags": "痉厥,神昏,舌短,烦躁", "formula": "安宫牛黄丸", "formula_detail": "先与安宫牛黄丸或紫雪丹开窍搜邪，再与复脉汤存阴，配合三甲潜阳。", "ni_annotation": "此条示温病痉厥神昏之救急治法。上焦邪热入心包与下焦阴虚风动同时并见，属两焦同病。治当分清主次先后：痉厥神昏为主者，先以牛黄丸、紫雪丹开窍醒神；待神识稍清，再投复脉存阴、三甲潜阳。倪师谓此即'急则治标，缓则治本'在温病中的具体运用——开窍是救急，存阴是治本。", "contraindication": "", "keywords": "痉厥神昏,牛黄紫雪,复脉三甲"}, {"id": 974, "source": "温病条辨", "article_number": "179", "liujing": "", "chapter": "下焦篇-风温", "original_text": "十九、邪气久羁，肌肤甲错，或因下后里通而邪欲溃，或因服存阴药而液增欲汗，或因正胜邪却而欲汗解，脉象虚者，可令邪与汗并，热达腠开。", "tags": "肌肤甲错,欲汗解", "formula": "加减复脉汤", "formula_detail": "炙甘草六钱，干地黄六钱，生白芍六钱，麦冬五钱（不去心），阿胶三钱，麻仁三钱", "ni_annotation": "温病后期见肌肤甲错而欲汗解者，乃阴液回复、正胜邪却之佳兆。肌肤甲错本为内有干血之征，今见之则为邪久伤阴、肌肤失养。服药后液回而欲汗，是正气来复、驱邪外出之象。倪师谓此时当因势利导，助其汗解，但汗出不可过多，以微汗为度，否则重伤其阴。此即'正胜邪却'之理。", "contraindication": "", "keywords": "肌肤甲错,欲汗解,正胜邪却"}, {"id": 975, "source": "温病条辨", "article_number": "180", "liujing": "", "chapter": "下焦篇-风温", "original_text": "二十、时欲漱口不欲咽，大便黑而易者，有瘀血也，犀角地黄汤主之。", "tags": "欲漱不咽,便黑易", "formula": "犀角地黄汤", "formula_detail": "干地黄一两，生白芍三钱，丹皮三钱，犀角三钱（水牛角代）", "ni_annotation": "欲漱口不欲咽，是邪热入血、瘀血内结之特征——热在血分，蒸灼津液上潮故欲漱，瘀阻心下故不欲咽。便黑易者，瘀血溢于肠道所致。此与伤寒之蓄血证相近，然温病之瘀血乃热入血分煎熬血液所致，非寒凝也。倪师谓犀角地黄汤乃凉血散瘀第一方，温病血分证之要药，犀角（今用水牛角代）清热凉血止血，生地凉血滋阴，丹皮芍药活血散瘀。", "contraindication": "", "keywords": "犀角地黄汤,欲漱不咽,瘀血,便黑"}, {"id": 976, "source": "温病条辨", "article_number": "181", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "二一、暑邪深入少阴，火极似水，消渴麻痹烦躁，连梅汤主之。", "tags": "消渴,麻痹,烦躁", "formula": "连梅汤", "formula_detail": "黄连二钱，乌梅三钱（去核），麦冬三钱（连心），生地三钱，阿胶二钱。水五杯，煮取二杯，分二次服。", "ni_annotation": "暑为火邪，深入少阴，火极反似水——消渴者火烁津液也，麻痹者火炽筋脉也，烦躁者火扰心神也。连梅汤以黄连苦寒直折心火，乌梅酸以生津敛阴，合生地、麦冬、阿胶甘润养阴。此即《伤寒论》乌梅丸法之变通。倪师谓暑入少阴最易劫阴动风，连梅汤酸苦甘合用，乃酸苦泄热、酸甘化阴之妙法。", "contraindication": "", "keywords": "连梅汤,暑入少阴,消渴麻痹"}, {"id": 977, "source": "温病条辨", "article_number": "182", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "二二、暑邪入厥阴，舌灰，消渴，心下板实，呕恶吐蛔，寒热，下利血水，甚至声音不出，上下格拒者，椒梅汤主之。", "tags": "舌灰,消渴,心下板实,呕恶,吐蛔,寒热,下利血水,音不出", "formula": "椒梅汤", "formula_detail": "黄连二钱，黄芩二钱，干姜二钱，白芍三钱（生），川椒三钱（炒黑），乌梅三钱（去核），人参二钱，枳实一钱半，半夏二钱。水八杯，煮取三杯，分三次服。", "ni_annotation": "暑邪深入厥阴，寒热错杂，上热下寒，甚至上下格拒。舌灰者热极也，吐蛔者寒热相激也。椒梅汤即乌梅丸变方，辛开苦降，寒热并用。川椒、干姜、半夏辛以开降，黄连、黄芩苦以降逆，乌梅、白芍酸以敛肝，人参益气固脱。倪师谓此证最为危急，暑入厥阴而成格拒，非辛开苦降不能通上下、调寒热。", "contraindication": "", "keywords": "椒梅汤,暑入厥阴,上下格拒"}, {"id": 978, "source": "温病条辨", "article_number": "183", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "二三、暑邪深入厥阴，身热烦躁，消渴，麻痹，舌绛苔少者，连梅汤加人参主之。", "tags": "身热,烦躁,消渴,麻痹,舌绛苔少", "formula": "连梅汤加人参", "formula_detail": "黄连二钱，乌梅三钱（去核），麦冬三钱（连心），生地三钱，阿胶二钱，加人参二钱", "ni_annotation": "此条与第一条连梅汤证相比，身热更甚，且有消渴麻痹，且舌绛苔少，是阴伤更重。故于连梅汤中加人参，益气生津以救阴。暑邪深入厥阴，不独伤阴，气亦随之而耗。倪师谓此处用参乃'气能生津'之理——气化则津回，气足则阴复。但壮火尚盛不可用参，须热减舌绛苔少时方可用。", "contraindication": "", "keywords": "连梅汤加参,暑入厥阴,舌绛苔少"}, {"id": 979, "source": "温病条辨", "article_number": "184", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "二四、暑邪久热，寝不安，食不甘，神识不清，阴液元气两伤者，三才汤主之。", "tags": "寝不安,食不甘,神识不清", "formula": "三才汤", "formula_detail": "人参三钱，天冬二钱，干地黄五钱", "ni_annotation": "暑邪久羁，热虽不甚而气阴两伤。神识不清非热闭心包，乃元气大虚、神失所养。三才汤取天地人三才之意：天冬补肺以生水（天），熟地补肾以滋水（地），人参补脾以益气（人）。三焦同补，以复气阴。倪师谓此方虽仅三味，却照顾周全，乃温病后期气阴双补之轻剂，适用于邪少虚多之证。", "contraindication": "", "keywords": "三才汤,气阴两伤,神识不清"}, {"id": 980, "source": "温病条辨", "article_number": "185", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "二五、暑温后期，心中烦热，口干，溺赤者，导赤清心汤主之。", "tags": "心中烦热,口干,溺赤", "formula": "导赤清心汤", "formula_detail": "鲜生地六钱，麦冬三钱（朱砂染），玄参三钱，沙参三钱，鲜石斛三钱，竹叶一钱半，丹皮二钱，益元散三钱（包煎），通草一钱", "ni_annotation": "暑温后期邪热留恋，移热于小肠，故心中烦热而溺赤。此时邪热不重而津液已亏，不可苦寒直折，当甘寒清补兼导热下行。导赤清心汤以鲜地、麦冬、沙参、石斛大队甘寒养阴，竹叶、通草淡渗导热从小便出，益元散清暑利湿，丹皮凉血。倪师谓此方甘而不腻、清而不寒，乃暑温后期调理善后之良方。", "contraindication": "", "keywords": "导赤清心汤,心中烦热,溺赤"}, {"id": 981, "source": "温病条辨", "article_number": "186", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "二六、暑温伏暑，舌白，脘闷，口渴，小便不利者，桂苓甘露饮主之。", "tags": "舌白,脘闷,口渴,小便不利", "formula": "桂苓甘露饮", "formula_detail": "茯苓五钱，猪苓三钱，泽泻三钱，白术三钱，桂枝二钱，石膏五钱，寒水石三钱，滑石三钱，甘草一钱", "ni_annotation": "暑温夹湿，湿重热轻之证。舌白非热盛，乃湿浊上泛；脘闷乃湿阻中焦；口渴而非大渴引饮，是湿阻气化津不上承。桂苓甘露饮即五苓散合三石，外解太阳之湿，内清阳明之热。桂枝少量通阳化气，三石清暑利湿。倪师谓此方寒温并用、清利兼施，专治暑湿同病之证，湿去则热孤，气化则渴止。", "contraindication": "", "keywords": "桂苓甘露饮,暑湿,舌白脘闷"}, {"id": 982, "source": "温病条辨", "article_number": "187", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "二七、伏暑湿温，胁痛，或咳或不咳，无寒但潮热，或竟寒热如疟状，香附旋覆花汤主之。", "tags": "胁痛,潮热,寒热如疟", "formula": "香附旋覆花汤", "formula_detail": "生香附三钱，旋覆花三钱（绢包），苏子霜三钱，茯苓三钱，广皮二钱，半夏三钱，薏仁五钱", "ni_annotation": "伏暑湿温，邪留肝络，故胁痛；邪正交争故潮热或寒热如疟。香附旋覆花汤乃通络逐饮之剂，香附理肝气，旋覆花降肺气，苏子降气化痰，合二陈汤化湿和中，薏仁淡渗利湿。倪师谓此方妙在以气分药治血络病——气行则血行，气化则湿化，乃'治气即是治络'之法。胁痛而无瘀血征者，此方最宜。", "contraindication": "", "keywords": "香附旋覆花汤,胁痛,寒热如疟"}, {"id": 983, "source": "温病条辨", "article_number": "188", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "二八、暑温后期，身热不扬，脘痞，苔白腻，脉濡缓者，三仁汤主之。", "tags": "身热不扬,脘痞,苔白腻,脉濡缓", "formula": "三仁汤", "formula_detail": "杏仁五钱，飞滑石六钱，白通草二钱，白蔻仁二钱，竹叶二钱，厚朴二钱，生薏仁六钱，半夏五钱", "ni_annotation": "暑温后期，热势已减而湿浊未化。身热不扬者，热为湿遏，不得透发也；苔白腻脉濡缓皆湿盛之象。三仁汤以杏仁宣上焦肺气，蔻仁畅中焦脾气，薏仁渗下焦湿气，三仁分消三焦之湿。倪师谓此方宜轻不宜重，取其轻清宣化之功，若过用苦寒则湿遏更甚，过用温燥则助热伤阴。", "contraindication": "", "keywords": "三仁汤,身热不扬,苔白腻"}, {"id": 984, "source": "温病条辨", "article_number": "189", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "二九、暑温后期，低热不退，口渴，舌红少苔，脉虚数者，竹叶石膏汤主之。", "tags": "低热不退,口渴,舌红少苔,脉虚数", "formula": "竹叶石膏汤", "formula_detail": "竹叶二钱，石膏八钱，麦冬六钱（去心），半夏三钱，人参二钱，甘草二钱，粳米一撮", "ni_annotation": "暑温后期，余热未清而气阴已伤。低热而非高热，是余邪已微；口渴舌红少苔脉虚数，是气阴两伤。竹叶石膏汤即白虎加人参汤之变法，以大寒之石膏易为竹叶石膏，加麦冬半夏，清热而不伤正，益气而不留邪。倪师谓此方乃温病后期善后第一方，凡热病后期气阴两虚而余热未尽者，皆可化裁用之。", "contraindication": "", "keywords": "竹叶石膏汤,低热,气阴两虚"}, {"id": 985, "source": "温病条辨", "article_number": "190", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "三十、暑温后期，神识不清，舌謇，肢厥，脉细数者，加减复脉汤加菖蒲、郁金主之。", "tags": "神识不清,舌謇,肢厥,脉细数", "formula": "加减复脉汤加菖蒲郁金", "formula_detail": "炙甘草六钱，干地黄六钱，生白芍六钱，麦冬五钱（不去心），阿胶三钱，麻仁三钱，加石菖蒲一钱半，郁金二钱", "ni_annotation": "暑温后期神识不清而舌謇肢厥，非热入心包之实证，乃真阴亏耗、痰浊蒙窍之虚中夹实证。脉细数而非洪大滑数，可以明辨。复脉汤补真阴以治本，加菖蒲、郁金芳香开窍以治标，补中有开，标本兼顾。倪师谓温病后期神昏有虚实之辨：实证用安宫牛黄丸，虚证用复脉加菖蒲郁金，不可混淆。", "contraindication": "", "keywords": "神识不清,舌謇,复脉加菖蒲郁金"}, {"id": 986, "source": "温病条辨", "article_number": "191", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "三一、伏暑内发，新凉外加，头痛，恶寒，身热，胸闷，心烦，口渴，舌苔薄白而腻，脉弦数者，黄连香薷饮主之。", "tags": "头痛,恶寒,身热,胸闷,心烦,口渴", "formula": "黄连香薷饮", "formula_detail": "黄连二钱，香薷三钱，厚朴二钱，扁豆三钱，甘草一钱", "ni_annotation": "伏暑内发而复感新凉，属外寒内热之证。表有新凉故头痛恶寒，里有伏暑故心烦口渴。黄连香薷饮以香薷辛温解表散寒，厚朴苦温化湿理气，黄连苦寒清里热，扁豆甘草和中。倪师谓此方即夏日之'麻黄汤'加清里药，治暑月外感寒凉、内蕴暑湿之证，香薷为夏月解表之要药，功同麻黄而性和平。", "contraindication": "", "keywords": "黄连香薷饮,伏暑,外寒内热"}, {"id": 987, "source": "温病条辨", "article_number": "192", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "三二、暑温，脉洪大而芤者，白虎加人参汤主之；若脉散大，喘鸣欲脱者，生脉散主之。", "tags": "脉洪大而芤,脉散大,喘鸣欲脱", "formula": "生脉散", "formula_detail": "人参三钱，麦冬二钱（不去心），五味子一钱", "ni_annotation": "暑热伤气，脉洪大而芤乃热盛气伤之象，以白虎加人参汤清暑热而补元气。若脉散大无根、喘鸣欲脱，是气津两脱之危候，当急用生脉散敛气生津以固脱。生脉散三味：人参补气，麦冬生津，五味子酸收敛阴。倪师谓暑证最忌汗多亡阳脱阴，生脉散乃暑月固脱救逆第一方，脉散大喘鸣者可急救。", "contraindication": "", "keywords": "生脉散,脉散大,喘鸣欲脱"}, {"id": 988, "source": "温病条辨", "article_number": "193", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "三三、暑温后期，发热，口渴，自汗，面垢，背微恶寒，脉虚者，东垣清暑益气汤主之。", "tags": "发热,口渴,自汗,面垢,背微恶寒,脉虚", "formula": "清暑益气汤", "formula_detail": "黄芪一钱（汗少减五分），苍术一钱（泔浸去皮），升麻一钱，人参五分，白术五分，橘皮五分，神曲五分，泽泻五分，甘草二分，黄柏二分（酒洗），当归二分，麦冬三分，青皮二分半，葛根二分，五味子九枚", "ni_annotation": "暑温后期元气大虚，卫外不固故自汗背恶寒，气虚不运故发热面垢口渴。东垣清暑益气汤以黄芪、参术补中益气，二术燥湿，升麻葛根升清，黄柏泽泻降浊，当归麦冬五味养血生津，曲陈消导和中。药味虽多，而法度井然。倪师谓暑伤元气者，非补不可，但须补而不腻，清暑益气汤药力平和，宜于暑病善后。", "contraindication": "", "keywords": "清暑益气汤,脉虚,自汗"}, {"id": 989, "source": "温病条辨", "article_number": "194", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "三四、暑温十余日，或一月余，不解，但热不寒，汗多，烦渴，脉芤者，玉女煎去牛膝加玄参主之。", "tags": "但热不寒,汗多,烦渴,脉芤", "formula": "玉女煎去牛膝加玄参", "formula_detail": "生石膏一两，知母四钱，玄参四钱，细生地六钱，麦冬六钱", "ni_annotation": "暑温日久不解，但热不寒，汗多烦渴，是阳明气分热盛而阴液已伤。脉芤为气阴两伤之确证。玉女煎本为少阴不足、阳明有余之方，去牛膝以下行之力，加玄参以增滋阴之功。石膏知母清气分大热，生地麦冬玄参甘寒养阴。倪师谓此方即白虎法合增液法，清补兼施，治温病后期气阴两伤而壮火未熄者最为合拍。", "contraindication": "", "keywords": "玉女煎,但热不寒,脉芤"}, {"id": 990, "source": "温病条辨", "article_number": "195", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "三五、暑邪入于手太阴，气分不解，入于血分，舌绛而干，烦躁，不寐，神昏谵语，清营汤主之。若斑疹隐隐，加丹皮、赤芍。", "tags": "舌绛而干,烦躁,不寐,神昏谵语", "formula": "清营汤", "formula_detail": "犀角三钱（水牛角代），生地五钱，玄参三钱，竹叶心一钱，麦冬三钱，丹参二钱，黄连一钱五分，银花三钱，连翘二钱（连心）", "ni_annotation": "暑邪由气入血，舌绛而干乃热入营血之特征。烦躁不寐神昏谵语，是营热扰心。清营汤以犀角（水牛角代）咸寒清营透热，合银翘竹叶之轻清透邪由营转气，生地玄参麦冬甘寒养阴，黄连丹参清心安神。倪师谓此方妙在'透热转气'四字——虽邪已入营，仍用银翘竹叶力求透邪外出，不使深陷。斑疹隐隐加丹皮赤芍凉血散瘀。", "contraindication": "", "keywords": "清营汤,舌绛而干,透热转气"}, {"id": 991, "source": "温病条辨", "article_number": "196", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "三六、暑温，热久不退，深入厥阴，手指蠕动，舌干绛而萎，脉沉数者，二甲复脉汤主之。", "tags": "手指蠕动,舌干绛而萎,脉沉数", "formula": "二甲复脉汤", "formula_detail": "即于加减复脉汤内，加生牡蛎五钱，生鳖甲八钱。", "ni_annotation": "暑温热久不退、阴液大伤，筋脉失养故手指蠕动。舌干绛而萎者，真阴将竭之象，较之于舌绛苔少更进一步。二甲复脉汤即在复脉汤中加牡蛎、鳖甲二味介类有情之品，以潜阳入阴、息风止痉。倪师谓手指蠕动是厥阴风动之先兆，此时若不急填真阴、潜阳息风，必成痉厥。二甲复脉是定风珠之前一步，守之可截断传变。", "contraindication": "", "keywords": "二甲复脉汤,手指蠕动,舌干绛而萎"}, {"id": 992, "source": "温病条辨", "article_number": "197", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "三七、暑温，热深厥深，手指蠕动，心中憺憺大动，甚则心中痛，脉细促者，三甲复脉汤主之。", "tags": "热深厥深,手指蠕动,心中憺憺大动,心中痛,脉细促", "formula": "三甲复脉汤", "formula_detail": "即于二甲复脉汤内，加生龟板一两。", "ni_annotation": "此为二甲复脉汤证之进一步发展。热深厥深者，邪热愈深，手足厥冷愈甚，此即真热假寒。心中憺憺大动乃至心痛，是真阴大亏、心失所养，虚风将起之象。三甲复脉汤加龟板以增强滋阴潜阳之力。倪师谓此证阴虚至极，心肾俱损，三甲合用取介类潜阳之意，非此不能镇摄浮越之阳、静息欲动之风。", "contraindication": "", "keywords": "三甲复脉汤,热深厥深,心中憺憺大动"}, {"id": 993, "source": "温病条辨", "article_number": "198", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "三八、暑温，神倦瘛疭，脉气虚弱，舌绛苔少，时时欲脱者，小定风珠主之。", "tags": "神倦,瘛疭,脉虚弱,舌绛苔少,时时欲脱", "formula": "小定风珠", "formula_detail": "鸡子黄一枚（生用），真阿胶二钱，生龟板六钱，童便一杯，淡莱三钱。水五杯，先煮龟板、淡莱得二杯，去滓，入阿胶烊化，纳鸡子黄搅令相得，再冲童便，顿服之。", "ni_annotation": "小定风珠较大定风珠药力较轻，适用于阴虚风动之较轻者。方中以鸡子黄、阿胶填补真阴，龟板潜阳，童便咸寒降火引药下行，淡莱甘咸滋阴潜阳。倪师谓童便一味，人多厌而不用，实乃引火下行之妙品，治阴虚阳亢最宜，取其同气相求之意。小定风珠证虽见瘛疭神倦，但尚未至大定风珠之欲脱程度，可用此方截断。", "contraindication": "", "keywords": "小定风珠,神倦瘛疭,舌绛苔少"}, {"id": 994, "source": "温病条辨", "article_number": "199", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "三九、暑温后期，久热伤阴，形体消瘦，口干咽燥，手足心热，舌红少苔，脉虚数者，加减复脉汤加鳖甲、龟板主之。", "tags": "形体消瘦,口干咽燥,手足心热,舌红少苔,脉虚数", "formula": "加减复脉汤加鳖甲龟板", "formula_detail": "加减复脉汤加生鳖甲六钱，生龟板四钱", "ni_annotation": "暑温后期久热伤阴，肝肾精血俱亏。形体消瘦者精血亏耗、肌肉失养也；手足心热者阴虚内热也。在复脉汤补阴的基础上，加鳖甲入肝、龟板入肾，二味皆血肉有情之品，直入下焦填补真阴，又能潜阳退热。倪师谓温病后期形体消瘦而手足心热者，非短期可愈，当守方久服，徐徐图之，切不可急于求成。", "contraindication": "", "keywords": "复脉加龟鳖,久热伤阴,形体消瘦"}, {"id": 995, "source": "温病条辨", "article_number": "200", "liujing": "", "chapter": "下焦篇-暑温", "original_text": "四十、暑温，热退后，咳吐涎沫，口燥，脉虚者，麦门冬汤主之。", "tags": "咳吐涎沫,口燥,脉虚", "formula": "麦门冬汤", "formula_detail": "麦冬七钱（不去心），半夏三钱，人参二钱，甘草二钱，粳米一撮，大枣三枚", "ni_annotation": "暑温热退之后，肺胃阴伤，虚火上炎，故咳吐涎沫、口燥。麦门冬汤以大量麦冬润肺养胃，少佐半夏以降逆化痰，参草枣粳补中益气。此即《金匮要略》'大逆上气，咽喉不利，止逆下气，麦门冬汤主之'之法。倪师谓此方关键在麦冬与半夏之比，七比一乃不易之定法，麦冬七倍于半夏，润中兼降，养阴而不滞气。", "contraindication": "", "keywords": "麦门冬汤,咳吐涎沫,肺胃阴伤"}, {"id": 996, "source": "温病条辨", "article_number": "201", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "四一、湿温久羁，弥漫三焦，神昏窍阻，少腹硬满，大便不下，宣清导浊汤主之。", "tags": "神昏,窍阻,少腹硬满,大便不下", "formula": "宣清导浊汤", "formula_detail": "猪苓五钱，茯苓五钱，寒水石六钱，晚蚕沙四钱，皂荚子三钱（去皮）", "ni_annotation": "湿温日久，湿浊弥漫三焦，上蒙清窍则神昏，下阻肠腑则少腹硬满、大便不下。此非燥屎内结，乃湿浊阻闭气机。宣清导浊汤以二苓渗湿，寒水石清利湿热，蚕沙化浊，皂荚子辛通走窜、宣通关窍。倪师谓皂荚子一味乃本方之眼，辛温走窜能通上下关窍，与蚕沙相伍化湿浊之力倍增，不可畏其性猛而弃之不用。", "contraindication": "", "keywords": "宣清导浊汤,湿浊弥漫,少腹硬满"}, {"id": 997, "source": "温病条辨", "article_number": "202", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "四二、湿温，下焦弥漫，神昏，呕恶，舌白，渴不多饮者，半苓汤主之。", "tags": "神昏,呕恶,舌白,渴不多饮", "formula": "半苓汤", "formula_detail": "半夏五钱，茯苓块五钱，川连一钱，厚朴三钱，通草八钱（煎汤代水煮药）", "ni_annotation": "湿温弥漫下焦，湿重于热。神昏乃湿浊蒙蔽清阳，非热闭心包；舌白渴不多饮皆为湿盛之象。半苓汤以半夏、厚朴苦温燥湿，茯苓、通草甘淡渗湿，少佐黄连苦寒燥湿清热。倪师谓湿温之证，湿重于热者不可过用寒凉，否则湿遏热伏，变证蜂起。治湿当如抽丝剥茧，徐徐而化，急则无功。", "contraindication": "", "keywords": "半苓汤,湿重于热,舌白"}, {"id": 998, "source": "温病条辨", "article_number": "203", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "四三、湿温，脘闷，便溏，身痛，舌白，脉象模糊者，加减正气散主之。", "tags": "脘闷,便溏,身痛,舌白,脉模糊", "formula": "加减正气散", "formula_detail": "藿香梗二钱，厚朴二钱，杏仁二钱，茯苓皮二钱，广皮一钱，神曲一钱半，麦芽一钱半，绵茵陈二钱，大腹皮一钱", "ni_annotation": "湿温困阻中下二焦，气机不畅则脘闷，湿胜则便溏，湿阻经络则身痛。脉象模糊者，湿邪弥漫脉道之象，非虚脉。加减正气散以藿香、厚朴、陈皮芳香化湿理气，杏仁宣肺以开上源，苓皮腹皮渗湿利水，茵陈清利湿热，神曲麦芽消导和中。倪师谓此方乃藿香正气散之化裁，专为湿温而设，去紫苏、白芷等辛温解表之品，代以清利渗湿之药。", "contraindication": "", "keywords": "加减正气散,便溏,脉模糊"}, {"id": 999, "source": "温病条辨", "article_number": "204", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "四四、湿温，舌白，渴不多饮，小便不利，但头汗出者，茵陈五苓散主之。", "tags": "舌白,渴不多饮,小便不利,头汗出", "formula": "茵陈五苓散", "formula_detail": "茵陈末十分，五苓散五分，和匀，先食饮方寸匕，日三服。五苓散：猪苓、茯苓、白术各十八铢，泽泻一两六铢，桂枝半两。", "ni_annotation": "湿温郁蒸发黄之前驱证。舌白渴不多饮小便不利，皆湿阻气化之象；但头汗出者，湿热郁蒸、上蒸于头，而周身无汗也。茵陈五苓散以五苓散通阳化气利水，茵陈清热利湿退黄。倪师谓此方乃治湿温发黄之先着——所谓'见肝之病，知肝传脾，当先实脾'，见湿郁之象而早有预防，湿去则黄不生矣。", "contraindication": "", "keywords": "茵陈五苓散,舌白,但头汗出"}, {"id": 1000, "source": "温病条辨", "article_number": "205", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "四五、湿温，身痛，渴不多饮，或不渴，舌苔灰白，脉濡者，术附汤主之。", "tags": "身痛,渴不多饮,舌苔灰白,脉濡", "formula": "术附汤", "formula_detail": "生茅术五钱，人参二钱，厚朴三钱，生附子三钱，炮姜三钱，广皮三钱", "ni_annotation": "湿温而见身痛渴不多饮、舌苔灰白脉濡，是湿胜阳微，已向寒湿转化。术附汤以苍术燥湿运脾，附子、炮姜温阳祛寒，人参益气，厚朴广皮理气化湿。倪师谓湿温之证，本有热象，然中阳素虚之人，湿胜则阳微，热去而寒生，此时不可执'温病'二字而忌用温药，当随证施治——湿从寒化者即当温之。", "contraindication": "", "keywords": "术附汤,湿胜阳微,舌苔灰白"}, {"id": 1001, "source": "温病条辨", "article_number": "206", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "四六、湿温，腹胀，二便不通，舌苔白腻，脉濡者，半硫丸合导浊汤主之。", "tags": "腹胀,二便不通,舌苔白腻,脉濡", "formula": "半硫丸合导浊汤", "formula_detail": "半夏三钱，硫黄一钱（制），合宣清导浊汤（猪苓五钱，茯苓五钱，寒水石六钱，晚蚕沙四钱，皂荚子三钱）", "ni_annotation": "湿温腹胀、二便不通，乃湿浊凝聚、阳气不通所致。此非阳明腑实，故腹胀而无燥屎硬痛之征，舌苔白腻脉濡皆为湿象。半硫丸以半夏、硫黄温通阳气，合导浊汤宣通气机、化湿逐浊。硫黄虽属温热，然能通阳逐寒，寒湿凝聚非此不通。倪师谓硫黄通阳之力甚强，寒湿凝结者以此开通，效如桴鼓。", "contraindication": "", "keywords": "半硫丸,二便不通,湿浊凝聚"}, {"id": 1002, "source": "温病条辨", "article_number": "207", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "四七、湿温，渴不欲饮，舌苔黄腻，脉濡数者，杏仁滑石汤主之。", "tags": "渴不欲饮,舌苔黄腻,脉濡数", "formula": "杏仁滑石汤", "formula_detail": "杏仁三钱，滑石三钱，黄芩二钱，橘红一钱半，黄连一钱，郁金二钱，通草一钱，厚朴二钱，半夏三钱", "ni_annotation": "湿热并重之证。渴不欲饮者，热欲饮水而湿阻不行也；舌苔黄腻脉濡数皆湿热内蕴之象。杏仁滑石汤以杏朴夏橘宣通中上气机，滑石通草渗湿于下，芩连清热燥湿，郁金理气开郁。倪师谓湿热证治当分轻重：热重于湿者以清热为主，湿重于热者以化湿为要，湿热并重者如本条，则清热与化湿齐头并进，不可偏废。", "contraindication": "", "keywords": "杏仁滑石汤,湿热并重,苔黄腻"}, {"id": 1003, "source": "温病条辨", "article_number": "208", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "四八、湿温，舌白，不渴，脉沉细者，术附姜苓汤主之。", "tags": "舌白,不渴,脉沉细", "formula": "术附姜苓汤", "formula_detail": "生白术五钱，附子三钱，干姜三钱，茯苓五钱", "ni_annotation": "湿温从寒化，阳气衰微之证。舌白不渴脉沉细，一派虚寒之象。术附姜苓汤乃四逆汤之变方，以白术易甘草，加强运脾化湿之力。倪师谓温病后期变化多端，体质决定转化——素体阳虚者从寒化，素体阴虚者从热化。临证不可拘泥'温病'二字，当'观其脉证，知犯何逆，随证治之'，此仲景心法也。", "contraindication": "", "keywords": "术附姜苓汤,湿从寒化,舌白不渴"}, {"id": 1004, "source": "温病条辨", "article_number": "209", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "四九、湿温，热蒸头胀，身痛，呕逆，小便不利，舌苔白腻，脉濡者，茯苓皮汤主之。", "tags": "头胀,身痛,呕逆,小便不利,苔白腻,脉濡", "formula": "茯苓皮汤", "formula_detail": "茯苓皮五钱，生薏仁五钱，猪苓三钱，大腹皮三钱，白通草二钱，淡竹叶二钱", "ni_annotation": "湿热郁蒸、湿重于热。热为湿遏故头胀，湿阻经络故身痛，湿阻中焦故呕逆，湿阻下焦故小便不利。茯苓皮汤纯用淡渗之品，以皮治皮，以渗治湿，不杂一味清热药，全从利湿入手。倪师谓湿温之治，不在清热而在化湿——湿去则热孤，犹釜底抽薪，不治热而热自退。此方开'利小便以实大便，利小便以退身热'之法门。", "contraindication": "", "keywords": "茯苓皮汤,湿重于热,小便不利"}, {"id": 1005, "source": "温病条辨", "article_number": "210", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "五十、湿温，舌白，身痛，足跗浮肿，脉濡而小者，鹿附汤主之。", "tags": "舌白,身痛,足跗浮肿,脉濡而小", "formula": "鹿附汤", "formula_detail": "鹿茸五钱，附子三钱，草果一钱，菟丝子三钱，茯苓五钱", "ni_annotation": "湿温从寒化，深入下焦，损及肾阳。舌白身痛为寒湿在表，足跗浮肿乃肾阳虚不能化气行水，脉濡而小是阳气不足。鹿附汤以鹿茸补肾阳、益精血，附子温壮元阳，菟丝子补肾固精，草果温中燥湿，茯苓淡渗利水。倪师谓鹿茸乃血肉有情之品，入下焦补督脉肾阳之力最强，寒湿久羁伤及肾阳者，非此不能起沉疴。", "contraindication": "", "keywords": "鹿附汤,寒湿伤阳,足跗浮肿"}, {"id": 1006, "source": "温病条辨", "article_number": "211", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "五一、湿温，身痛甚，舌苔白滑，脉沉细而迟者，椒附白通汤主之。", "tags": "身痛甚,舌苔白滑,脉沉细而迟", "formula": "椒附白通汤", "formula_detail": "生附子三钱（炒黑），川椒二钱（炒黑），淡干姜二钱，葱白三茎，猪胆汁半酒杯（去渣后调入）", "ni_annotation": "寒湿深入下焦，阳气衰微，阴寒内盛。身痛甚者寒湿痹阻经络，舌苔白滑者寒湿内盛，脉沉细而迟者阳虚至极。椒附白通汤即白通汤加川椒，以附子、干姜、葱白破阴回阳、宣通上下，川椒温中散寒、杀虫止痛，人尿猪胆汁咸寒反佐，引阳药入阴。倪师谓此方乃急救回阳之剂，寒湿极盛、阳气欲绝者用之如旭日东升。", "contraindication": "", "keywords": "椒附白通汤,寒湿极盛,脉沉细而迟"}, {"id": 1007, "source": "温病条辨", "article_number": "212", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "五二、湿温，下利稀水，肛门热痛，舌苔黄腻，脉沉数者，滑石藿香汤主之。", "tags": "下利稀水,肛门热痛,舌苔黄腻,脉沉数", "formula": "滑石藿香汤", "formula_detail": "飞滑石三钱，白通草一钱，猪苓二钱，茯苓皮三钱，藿香梗二钱，厚朴二钱，白蔻仁一钱，广皮一钱", "ni_annotation": "湿热下注大肠，下利稀水而肛门热痛者，热重于湿也。滑石藿香汤以滑石为君，甘寒利窍、清利湿热；藿香、厚朴、蔻仁芳香化湿理气；二苓、通草淡渗利湿。此方以清利为主，芳化为辅。倪师谓湿热下利与伤寒下利治法截然不同：伤寒下利多从温中固涩入手，湿温下利则当分利湿热，通因通用，湿去热清则利自止。", "contraindication": "", "keywords": "滑石藿香汤,下利稀水,肛门热痛"}, {"id": 1008, "source": "温病条辨", "article_number": "213", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "五三、湿温，脘闷，大便不爽，舌苔黄滑，脉濡数者，黄芩滑石汤主之。", "tags": "脘闷,大便不爽,舌苔黄滑,脉濡数", "formula": "黄芩滑石汤", "formula_detail": "黄芩三钱，滑石三钱，茯苓皮三钱，大腹皮二钱，白蔻仁一钱，通草一钱，猪苓三钱", "ni_annotation": "湿热中阻、气机不畅。脘闷者湿阻中焦也，大便不爽者湿热阻滞大肠也，舌苔黄滑脉濡数皆湿热内蕴之象。黄芩滑石汤以黄芩苦寒清热燥湿，滑石、二苓、通草淡渗利湿，腹皮理气行滞，蔻仁芳香化湿醒脾。倪师谓大便不爽非燥屎，治当宣通气机、分利湿热，不可误用攻下，否则伤脾助湿，变生他证。", "contraindication": "", "keywords": "黄芩滑石汤,大便不爽,苔黄滑"}, {"id": 1009, "source": "温病条辨", "article_number": "214", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "五四、湿温，久羁不解，胸闷，不饥，大便溏，舌苔白滑，脉濡缓者，四苓加厚朴秦皮汤主之。", "tags": "胸闷,不饥,大便溏,苔白滑,脉濡缓", "formula": "四苓加厚朴秦皮汤", "formula_detail": "猪苓三钱，茯苓五钱，泽泻三钱，白术三钱，厚朴三钱，秦皮三钱", "ni_annotation": "湿温日久不解，湿困脾胃、气机不运。胸闷不饥者湿阻中焦也，大便溏者脾虚湿胜也。四苓即五苓散去桂枝，纯以渗利为主，加厚朴苦温理气化湿，秦皮苦寒清热燥湿。倪师谓湿温后期湿胜阳微者，去桂枝之辛温通阳，恐其助热；加秦皮之清热燥湿，兼顾余热。方中厚朴一味，苦温开泄，为湿困脾阳之要药。", "contraindication": "", "keywords": "四苓加厚朴秦皮汤,胸闷不饥,大便溏"}, {"id": 1010, "source": "温病条辨", "article_number": "215", "liujing": "", "chapter": "下焦篇-湿温", "original_text": "五五、湿温，发热，身痛，汗出热解，继而复热，舌苔黄滑，脉缓者，薏苡竹叶散主之。", "tags": "发热,身痛,汗出热解复热,苔黄滑,脉缓", "formula": "薏苡竹叶散", "formula_detail": "薏苡仁五钱，竹叶三钱，飞滑石五钱，白蔻仁一钱半，连翘三钱，茯苓块五钱，白通草一钱半", "ni_annotation": "湿热郁蒸、湿重热轻。汗出热解继而复热者，湿性粘滞，汗出但解表热，内湿未去故复热也。薏苡竹叶散以薏仁、茯苓、滑石、通草淡渗利湿，竹叶、连翘轻清透热，蔻仁芳香化湿。此方取法叶天士'渗湿于热下'之意，使湿不与热相搏，则热孤而易解。倪师谓湿热病汗出不解乃其特征，此时当利湿非发汗。", "contraindication": "", "keywords": "薏苡竹叶散,汗出热解复热,苔黄滑"}, {"id": 1011, "source": "温病条辨", "article_number": "216", "liujing": "", "chapter": "下焦篇-寒湿", "original_text": "五六、寒湿伤阳，形寒，脉缓，舌淡或白滑，不渴，经络拘束，桂枝姜附汤主之。", "tags": "形寒,脉缓,舌淡,不渴,经络拘束", "formula": "桂枝姜附汤", "formula_detail": "桂枝六钱，干姜三钱，白术三钱（生），熟附子三钱", "ni_annotation": "寒湿二字并列而论，寒为阴邪，湿亦为阴邪，二邪相合，最伤阳气。形寒者阳不外达也，舌淡不渴者里无热也，经络拘束者寒主收引。桂枝姜附汤以桂附温阳散寒，干姜温中化湿，白术健脾燥湿。倪师谓寒湿之证与伤寒太阴病相近，皆以温阳化湿为治，然寒湿伤及经络则须兼通络，桂枝在此既通阳又通络，一药二用。", "contraindication": "", "keywords": "桂枝姜附汤,寒湿伤阳,经络拘束"}, {"id": 1012, "source": "温病条辨", "article_number": "217", "liujing": "", "chapter": "下焦篇-寒湿", "original_text": "五七、寒湿，舌白滑，小便不利，大便反快者，五苓散主之。", "tags": "舌白滑,小便不利,大便反快", "formula": "五苓散", "formula_detail": "猪苓十八铢，泽泻一两六铢，白术十八铢，茯苓十八铢，桂枝半两（去皮）。上五味，捣为散，以白饮和服方寸匕，日三服。", "ni_annotation": "寒湿为病，膀胱气化不利。小便不利者水不下行也，水走大肠故大便反快（溏泄）。舌白滑乃寒湿内盛之确证。五苓散以桂枝通阳化气，二苓泽泻利水渗湿，白术健脾制水。倪师谓五苓散非纯利水之剂，妙在桂枝一味通阳化气，气化则水行。用之不当则利水伤阴，用之得当则水去阳通，此方之关键全在桂枝。", "contraindication": "", "keywords": "五苓散,寒湿,小便不利"}, {"id": 1013, "source": "温病条辨", "article_number": "218", "liujing": "", "chapter": "下焦篇-寒湿", "original_text": "五八、寒湿，四肢逆冷，自利，腹痛，舌淡，脉沉细者，四逆汤主之。", "tags": "四肢逆冷,自利,腹痛,舌淡,脉沉细", "formula": "四逆汤", "formula_detail": "甘草二两（炙），干姜一两半，附子一枚（生用，去皮，破八片）。水三升，煮取一升二合，去滓，分温再服。", "ni_annotation": "寒湿深入下焦，损及脾肾阳气，已至少阴危候。四肢逆冷者阳不外达也，自利者阳不摄阴也，腹痛者寒凝气滞也。四逆汤以生附子大辛大热回阳救逆，干姜温中散寒，炙甘草和中缓急。倪师谓此条虽在温病篇中，却用纯阳峻剂，说明温病并不排斥温药——寒湿为患，非温不化，非热不退。辨证施治，寒者热之，万古不易。", "contraindication": "", "keywords": "四逆汤,寒湿,四肢逆冷"}, {"id": 1014, "source": "温病条辨", "article_number": "219", "liujing": "", "chapter": "下焦篇-寒湿", "original_text": "五九、寒湿，腰痛如折，背恶寒，膝胫逆冷，脉沉细者，术附五苓散主之。", "tags": "腰痛如折,背恶寒,膝胫逆冷,脉沉细", "formula": "术附五苓散", "formula_detail": "生茅术三钱，附子三钱，桂枝三钱，茯苓五钱，猪苓三钱，泽泻三钱", "ni_annotation": "寒湿深入肾与膀胱之经。腰为肾之府，寒湿伤肾故腰痛如折；背为阳，寒湿伤阳故背恶寒；膝胫逆冷者阳气不能下煦。术附五苓散以术附温阳散寒燥湿，五苓通阳化气利水，使寒湿之邪从膀胱而去。倪师谓腰痛有虚实之辨：肾虚腰痛绵绵而酸软，湿痛则如坐水中、沉重如折，此条即寒湿腰痛之典型，温散兼利是其正治。", "contraindication": "", "keywords": "术附五苓散,腰痛如折,寒湿"}, {"id": 1015, "source": "温病条辨", "article_number": "220", "liujing": "", "chapter": "下焦篇-寒湿", "original_text": "六十、寒湿久留，阳气衰微，周身浮肿，小便不利，舌淡胖，脉沉微者，真武汤主之。", "tags": "周身浮肿,小便不利,舌淡胖,脉沉微", "formula": "真武汤", "formula_detail": "茯苓三两，芍药三两，白术二两，生姜三两（切），附子一枚（炮，去皮，破八片）。水八升，煮取三升，去滓，温服七合，日三服。", "ni_annotation": "寒湿久留，损及肾阳，水气泛滥。周身浮肿是肾阳虚不能化气行水之象，舌淡胖脉沉微皆为阳虚水泛之特征。真武汤以附子温肾阳以化水气，白术茯苓健脾利水，生姜温散水气，芍药之酸收以制姜附之辛散。倪师谓真武乃治阳虚水泛之祖方，温阳利水并行，一动一静，标本兼顾。寒湿久病见此证者，非真武不能起此沉疴。", "contraindication": "", "keywords": "真武汤,周身浮肿,阳虚水泛"}, {"id": 1016, "source": "温病条辨", "article_number": "221", "liujing": "", "chapter": "下焦篇-秋燥", "original_text": "六一、秋燥内结，胸腹胀满，大便燥结，口干，舌燥，脉沉实者，五仁丸主之。", "tags": "胸腹胀满,大便燥结,口干,舌燥,脉沉实", "formula": "五仁丸", "formula_detail": "桃仁五钱，杏仁五钱，柏子仁三钱，松子仁三钱，郁李仁三钱。上为末，炼蜜为丸，如梧桐子大，每服三十丸，空心米饮下。", "ni_annotation": "秋燥者，秋令燥邪为病。燥伤津液，肠失濡润，故大便燥结而胸腹胀满。此非阳明腑实之燥屎，乃津枯肠燥所致，不可峻下。五仁丸纯用果仁类药物，富含油脂，润而不泻，润燥滑肠。倪师谓五仁丸即'增水行舟'之法——仁类含油质，入肠后滑润肠道，使燥粪自下，较之攻下之法更为安全，尤宜于年老体弱、产后阴亏之便秘。", "contraindication": "", "keywords": "五仁丸,秋燥,大便燥结"}, {"id": 1017, "source": "温病条辨", "article_number": "222", "liujing": "", "chapter": "下焦篇-秋燥", "original_text": "六二、秋燥，口干，舌燥，干咳无痰，或痰少而黏，脉弦数者，清燥救肺汤主之。", "tags": "口干,舌燥,干咳无痰,痰少而黏,脉弦数", "formula": "清燥救肺汤", "formula_detail": "桑叶三钱（经霜者），石膏二钱五分（煅），甘草一钱，人参七分，胡麻仁一钱（炒研），真阿胶八分，麦冬一钱二分（去心），杏仁七分（去皮尖炒），枇杷叶一片（刷去毛、蜜涂炙黄）。水一碗，煎六分，频频二、三次滚热服。", "ni_annotation": "秋燥犯肺，肺津受伤。干咳无痰或痰少而黏，是肺燥津伤之特征，与风寒咳嗽之痰多清稀截然不同。清燥救肺汤以桑叶轻清宣肺为君，石膏清肺中燥热，参草益气保肺，阿胶麦冬胡麻润肺养阴，杏仁杷叶降气止咳。倪师谓治燥不同于治火——治火可用苦寒直折，治燥则当甘寒滋润，以柔克刚。燥去肺润则咳自止。", "contraindication": "", "keywords": "清燥救肺汤,干咳无痰,秋燥"}, {"id": 1018, "source": "温病条辨", "article_number": "223", "liujing": "", "chapter": "下焦篇-秋燥", "original_text": "六三、秋燥，胃阴受伤，口干舌燥，纳呆，泛恶，大便干燥，舌红少津，脉细数者，益胃汤主之。", "tags": "口干舌燥,纳呆,泛恶,大便干燥,舌红少津,脉细数", "formula": "益胃汤", "formula_detail": "沙参三钱，麦冬五钱，冰糖一钱，细生地五钱，玉竹一钱五分（炒香）", "ni_annotation": "秋燥伤及胃阴。胃为阳土，喜润恶燥，燥伤胃阴则纳呆泛恶，胃失濡润则大便干燥。舌红少津脉细数，皆胃阴不足之象。益胃汤纯用甘凉濡润之品，沙参、麦冬、生地、玉竹皆为养阴之良药，少加冰糖取其甘润。倪师谓此方即麦门冬汤之变方，去半夏之辛燥，纯用甘润，专为燥伤胃阴而设，药简而力专。", "contraindication": "", "keywords": "益胃汤,胃阴受伤,纳呆泛恶"}, {"id": 1019, "source": "温病条辨", "article_number": "224", "liujing": "", "chapter": "下焦篇-秋燥", "original_text": "六四、秋燥，肝肾阴伤，低热不退，手足心热，口干，舌绛而干，脉虚数者，六味地黄汤加知母、黄柏主之。", "tags": "低热不退,手足心热,口干,舌绛而干,脉虚数", "formula": "六味地黄汤加知母黄柏", "formula_detail": "熟地八钱，山萸肉四钱，山药四钱，丹皮三钱，茯苓三钱，泽泻三钱，加知母三钱，黄柏二钱", "ni_annotation": "秋燥深入下焦，损及肝肾真阴。低热不退者阴虚内热也，手足心热者虚热发于阴分也，舌绛而干者真阴欲竭也。六味地黄汤乃补肾阴之祖方，三补三泻，补中有泻。加知母、黄柏清下焦虚火，此即知柏地黄汤。倪师谓燥邪伤阴，肺胃之阴易复，肝肾之阴难填。治下焦阴虚须守方久服，非一朝一夕之功。", "contraindication": "", "keywords": "知柏地黄汤,肝肾阴伤,低热不退"}, {"id": 1020, "source": "温病条辨", "article_number": "225", "liujing": "", "chapter": "下焦篇-秋燥", "original_text": "六五、秋燥，咳嗽痰中带血，咽干口燥，声音嘶哑，舌红少苔，脉弦细数者，百合固金汤主之。", "tags": "咳嗽,痰中带血,咽干口燥,声音嘶哑,舌红少苔,脉弦细数", "formula": "百合固金汤", "formula_detail": "百合一钱半，熟地三钱，生地三钱，当归身三钱，白芍一钱，甘草一钱，桔梗八分，玄参八分，贝母一钱半，麦冬一钱半", "ni_annotation": "秋燥伤肺，肺阴大亏，虚火上炎，灼伤肺络故咳嗽痰中带血。咽干口燥声音嘶哑，皆肺津亏损之证。百合固金汤以百合为君润肺止咳，二地、玄参滋阴降火，归芍养血和阴，贝母、桔梗化痰利咽，甘草调和诸药。倪师谓燥伤肺络之出血与肝火犯肺不同——燥伤者干咳血少色鲜，当甘润滋阴；肝火者咳逆血多色暗，当清肝降火。", "contraindication": "", "keywords": "百合固金汤,痰中带血,秋燥伤肺"}, {"id": 1021, "source": "温病条辨", "article_number": "226", "liujing": "", "chapter": "下焦篇-疟", "original_text": "六六、疟邪久羁，深入厥阴，寒热，胁下痞块，舌灰，脉弦数者，鳖甲煎丸主之。", "tags": "寒热,胁下痞块,舌灰,脉弦数", "formula": "鳖甲煎丸", "formula_detail": "鳖甲十二分（炙），乌扇三分（烧），黄芩三分，柴胡六分，鼠妇三分（熬），干姜三分，大黄三分，芍药五分，桂枝三分，葶苈一分（熬），石韦三分（去毛），厚朴三分，牡丹五分（去心），瞿麦二分，紫葳三分，半夏一分，人参一分，蟅虫五分（熬），阿胶三分（炙），蜂窠四分（炙），赤消十二分，蜣螂六分（熬），桃仁二分。", "ni_annotation": "疟邪久羁，入络结为疟母（胁下痞块），即今之脾肿大。寒热往来乃疟邪与正气相争，舌灰为邪入阴分之征。鳖甲煎丸集攻补于一炉，以鳖甲软坚散结为君，配合大队活血化瘀、软坚散结之品，兼以参、胶、姜、桂调补气血。倪师谓此方乃仲景治疟母第一方，法度森严，寒热并用，攻补兼施，非寻常方剂可比。", "contraindication": "", "keywords": "鳖甲煎丸,疟母,胁下痞块"}, {"id": 1022, "source": "温病条辨", "article_number": "227", "liujing": "", "chapter": "下焦篇-疟", "original_text": "六七、疟久不解，但热不寒，骨节烦疼，时时呕恶，舌干，脉虚数者，竹叶石膏汤加青蒿、鳖甲主之。", "tags": "但热不寒,骨节烦疼,时时呕恶,舌干,脉虚数", "formula": "竹叶石膏汤加青蒿鳖甲", "formula_detail": "竹叶二钱，石膏八钱，麦冬六钱（去心），半夏三钱，人参二钱，甘草二钱，粳米一撮，加青蒿二钱，鳖甲五钱", "ni_annotation": "疟久不解，邪留阴分而气阴大伤。但热不寒者，邪已入阴而不复出表；骨节烦疼者，阴伤筋脉失养；呕恶者胃气不和。竹叶石膏汤清余热而益气阴，加青蒿透邪出阴，鳖甲滋阴搜邪。倪师谓疟病后期当辨虚实：实者邪在少阳，仍可用柴胡剂；虚者邪入阴分，当育阴透邪，不可再行升散。加青蒿鳖甲即仿青蒿鳖甲汤法。", "contraindication": "", "keywords": "疟久不解,青蒿鳖甲,竹叶石膏汤"}, {"id": 1023, "source": "温病条辨", "article_number": "228", "liujing": "", "chapter": "下焦篇-疟", "original_text": "六八、疟痢交作，寒热，下利脓血，里急后重，舌苔黄腻，脉弦滑者，加减芩芍汤主之。", "tags": "寒热,下利脓血,里急后重,苔黄腻,脉弦滑", "formula": "加减芩芍汤", "formula_detail": "黄芩三钱，白芍三钱，黄连一钱半，木香一钱（煨），厚朴二钱，广皮一钱半，槟榔一钱半，当归二钱", "ni_annotation": "疟与痢并发，属湿热蕴结、表里同病。寒热者疟邪在表，下利脓血里急后重者湿热痢疾在里。加减芩芍汤以芩连清热燥湿止痢，归芍和血调血，木香槟榔厚朴广皮行气导滞。倪师谓疟痢交作治当兼顾：疟宜和解，痢宜导滞，但湿阻气滞时不可过用补涩，当以'通因通用'之法使湿热从大便而解。", "contraindication": "", "keywords": "加减芩芍汤,疟痢交作,下利脓血"}, {"id": 1024, "source": "温病条辨", "article_number": "229", "liujing": "", "chapter": "下焦篇-疟", "original_text": "六九、疟邪久羁，阴伤液耗，身热不退，骨蒸盗汗，舌绛而干，脉细数者，青蒿鳖甲汤合秦艽鳖甲散主之。", "tags": "身热不退,骨蒸,盗汗,舌绛而干,脉细数", "formula": "青蒿鳖甲汤合秦艽鳖甲散", "formula_detail": "青蒿二钱，鳖甲五钱，细生地四钱，知母二钱，丹皮三钱，加秦艽三钱，柴胡一钱半，地骨皮三钱，当归二钱，乌梅二钱", "ni_annotation": "疟久不解，深入阴分，阴液大伤。骨蒸盗汗者，阴虚内热、热自骨髓而出也；舌绛而干脉细数，真阴亏损之明证。青蒿鳖甲汤透邪外出，秦艽鳖甲散滋阴退蒸。二方合用，育阴与透邪并举。倪师谓骨蒸盗汗乃阴分之热最难清退者，须青蒿之芳香透邪与鳖甲之直入阴分相伍，一透一搜，方能使伏邪无所遁形。", "contraindication": "", "keywords": "疟久阴伤,骨蒸盗汗,青蒿鳖甲"}, {"id": 1025, "source": "温病条辨", "article_number": "230", "liujing": "", "chapter": "下焦篇-疟", "original_text": "七十、温疟，先热后寒，口渴，骨节烦疼，舌红，脉弦数者，白虎加桂枝汤主之。", "tags": "先热后寒,口渴,骨节烦疼,舌红,脉弦数", "formula": "白虎加桂枝汤", "formula_detail": "知母六两，石膏一斤（碎），甘草二两（炙），粳米六合，桂枝三两（去皮）。剉，每五钱，水一盏半，煎至八分，去滓，温服，汗出愈。", "ni_annotation": "温疟者，内有伏热而复感外寒。先热后寒，热多寒少，是内热重于外寒之象。口渴骨节烦疼舌红脉弦数，皆阳明热盛之证。白虎汤清阳明之壮热，少加桂枝通阳解肌、调和营卫。倪师谓白虎治内热，桂枝通外寒，寒温并用，内外兼治。桂枝在此量不宜大，取其通阳而非发汗，若过用则助热伤津。", "contraindication": "", "keywords": "白虎加桂枝汤,温疟,先热后寒"}, {"id": 1026, "source": "温病条辨", "article_number": "231", "liujing": "", "chapter": "下焦篇-痢", "original_text": "七一、下痢无度，脉微细，肢冷，舌淡，口不渴者，桃花汤主之。", "tags": "下痢无度,脉微细,肢冷,舌淡,口不渴", "formula": "桃花汤", "formula_detail": "赤石脂一斤（一半全用，一半筛末），干姜一两，粳米一升。上三味，以水七升，煮米令熟，去滓，温服七合，内赤石脂末方寸匕，日三服。若一服愈，余勿服。", "ni_annotation": "下痢日久，脾肾阳虚，滑脱不禁。脉微细肢冷舌淡口不渴，皆虚寒至甚之象。此与湿热痢之里急后重、肛门灼热截然不同。桃花汤以赤石脂涩肠固脱为君，干姜温中散寒，粳米养胃和中。倪师谓痢证有寒热虚实四端：初痢多实多热，久痢多虚多寒。此条纯虚纯寒之痢，非温涩不可，寒凉误投则杀人。", "contraindication": "", "keywords": "桃花汤,下痢无度,滑脱不禁"}, {"id": 1027, "source": "温病条辨", "article_number": "232", "liujing": "", "chapter": "下焦篇-痢", "original_text": "七二、久痢，便下脓血，滑脱不禁，腹痛喜温喜按，脉迟细者，真人养脏汤主之。", "tags": "便下脓血,滑脱不禁,腹痛喜温喜按,脉迟细", "formula": "真人养脏汤", "formula_detail": "人参，当归，白术各六钱，肉豆蔻半两（面裹煨），肉桂八钱，甘草八钱（炙），白芍一两六钱，木香一两四钱（不见火），诃子一两二钱（去核），罂粟壳三两六钱（去蒂萼蜜炙）。上为末，每服二大钱，水一盏半，煎至八分，去滓，食前温服。", "ni_annotation": "久痢伤及脾肾，中气下陷，固摄无权。腹痛喜温喜按者虚寒也，与实痛拒按正相反。真人养脏汤以参术草补中益气，肉桂肉蔻温中暖肾，归芍养血和血，诃子罂粟壳涩肠固脱，木香理气。倪师谓此方专为久痢虚寒而设，补涩并进，罂粟壳固涩之力甚强，但初痢不可用，用之则闭门留寇。凡痢必审新久虚实，不可孟浪。", "contraindication": "", "keywords": "真人养脏汤,久痢,腹痛喜温喜按"}, {"id": 1028, "source": "温病条辨", "article_number": "233", "liujing": "", "chapter": "下焦篇-痢", "original_text": "七三、久痢伤阴，下痢赤白，口干，虚坐努责，舌红少苔，脉细数者，驻车丸主之。", "tags": "下痢赤白,口干,虚坐努责,舌红少苔,脉细数", "formula": "驻车丸", "formula_detail": "黄连六钱，干姜二钱，当归三钱，阿胶三钱（蛤粉炒成珠）。上为末，醋煮阿胶为丸，如梧桐子大，每服三十丸，米饮下，日三服。", "ni_annotation": "久痢伤阴，阴虚则虚热内生。下痢赤白而不甚臭秽，口干虚坐努责（欲便而无便），皆不同于湿热痢之里急后重。驻车丸以黄连清热燥湿，干姜温中反佐，归胶养血滋阴。寒热并用，补泻兼施。倪师谓久痢伤阴与久痢伤阳须分明辨：伤阳者当温补固涩，伤阴者当养阴清润。驻车丸即治阴伤之久痢，黄连与姜并用，寒而不凝。", "contraindication": "", "keywords": "驻车丸,久痢伤阴,虚坐努责"}, {"id": 1029, "source": "温病条辨", "article_number": "234", "liujing": "", "chapter": "下焦篇-痢", "original_text": "七四、痢疾，下利，发热，口干，里急后重，肛门灼热，小便短赤，舌苔黄腻，脉滑数者，芍药汤主之。", "tags": "下利,发热,口干,里急后重,肛门灼热,小便短赤,苔黄腻,脉滑数", "formula": "芍药汤", "formula_detail": "芍药一两，当归半两，黄连半两，槟榔二钱，木香二钱，甘草二钱（炒），大黄三钱，黄芩半两，官桂二钱半。上为末，每服半两，水二盏，煎至一盏，食后温服。", "ni_annotation": "湿热痢之典型证。里急后重者湿热壅滞大肠也，肛门灼热小便短赤者湿热下迫也，苔黄腻脉滑数皆湿热之象。芍药汤以芩连清热燥湿，大黄通因通用、荡涤肠中积滞，归芍调血和血，木香槟榔行气导滞，少佐官桂反佐以防苦寒太过。倪师谓'行血则便脓自愈，调气则后重自除'乃治痢不二法门。", "contraindication": "", "keywords": "芍药汤,湿热痢,里急后重"}, {"id": 1030, "source": "温病条辨", "article_number": "235", "liujing": "", "chapter": "下焦篇-痢", "original_text": "七五、噤口痢，下利，呕不能食，舌干，脉细数者，开噤散主之。", "tags": "下利,呕不能食,舌干,脉细数", "formula": "开噤散", "formula_detail": "人参二钱，黄连一钱（姜水炒），石菖蒲一钱，丹参二钱，石莲子三钱（去壳），茯苓三钱，陈皮一钱，陈仓米一撮，荷叶蒂二个，冬瓜仁三钱", "ni_annotation": "噤口痢者，痢而呕不能食，胃气大伤。治当开噤为先，令能进食方能受药。开噤散以人参益气养胃，黄连清热燥湿开胃，菖蒲化浊开窍，石莲子、荷叶蒂升清降浊，丹参活血，冬瓜仁排脓，陈仓米养胃。倪师谓噤口痢为痢中危证，胃气将绝之象，当急开其胃。人参一味不可缺，非此不能复胃气、救生机。", "contraindication": "", "keywords": "开噤散,噤口痢,呕不能食"}, {"id": 1031, "source": "温病条辨", "article_number": "236", "liujing": "", "chapter": "下焦篇-疸", "original_text": "七六、湿热发黄，身目俱黄，小便不利，苔黄腻，脉沉数者，茵陈蒿汤主之。", "tags": "身目俱黄,小便不利,苔黄腻,脉沉数", "formula": "茵陈蒿汤", "formula_detail": "茵陈蒿六两，栀子十四枚（擘），大黄二两（去皮）。上三味，以水一斗二升，先煮茵陈减六升，内二味，煮取三升，去滓，分三服。", "ni_annotation": "湿热郁蒸肝胆，胆汁外溢发为黄疸。身目俱黄而不晦暗，属阳黄；小便不利者湿热无出路也。茵陈蒿汤以茵陈为君，清热利湿退黄；栀子清三焦之热，导湿热从小便出；大黄通腑泄热，使湿热从大便解。前后分消，湿热双解。倪师谓茵陈蒿汤妙在二便分消——大黄走大便，栀子走小便，茵陈双解表里之湿，三焦并治。", "contraindication": "", "keywords": "茵陈蒿汤,湿热发黄,身目俱黄"}, {"id": 1032, "source": "温病条辨", "article_number": "237", "liujing": "", "chapter": "下焦篇-疸", "original_text": "七七、黄疸，色如烟熏，身冷，脉沉细者，茵陈四逆汤主之。", "tags": "黄疸色如烟熏,身冷,脉沉细", "formula": "茵陈四逆汤", "formula_detail": "茵陈六钱，附子三钱，干姜二钱，甘草二钱（炙）", "ni_annotation": "黄疸而色如烟熏、晦暗无泽，非湿热之明亮鲜黄，乃寒湿发黄，属阴黄。身冷脉沉细皆阳虚之象，与阳黄之身热脉数相反。茵陈四逆汤以四逆汤温阳散寒，加茵陈利湿退黄。倪师谓黄疸之辨，阴阳为首——阳黄如橘色鲜明，当用茵陈蒿汤之寒下；阴黄如烟熏晦暗，当用茵陈四逆汤之温化。若阴黄误用寒凉，则阳气愈伤、黄疸愈深。", "contraindication": "", "keywords": "茵陈四逆汤,阴黄,色如烟熏"}, {"id": 1033, "source": "温病条辨", "article_number": "238", "liujing": "", "chapter": "下焦篇-痹", "original_text": "七八、湿痹，关节肿痛，沉重，屈伸不利，舌苔白腻，脉濡缓者，薏苡附子散主之。", "tags": "关节肿痛,沉重,屈伸不利,舌苔白腻,脉濡缓", "formula": "薏苡附子散", "formula_detail": "薏苡仁十五两，大附子十枚（炮）。上二味，杵为散，服方寸匕，日三服。", "ni_annotation": "湿痹者，湿胜则肿，寒胜则痛。关节肿痛沉重屈伸不利，皆寒湿痹阻经络之征。舌苔白腻脉濡缓，寒湿无疑。薏苡附子散以薏苡仁祛湿舒筋为君，附子温阳散寒为臣，二味合用，寒湿并治。倪师谓此方妙在薏苡之甘淡渗湿兼能舒筋，附子之大辛大热专能散寒止痛，二药相伍，寒湿痹痛无不治矣。现代风湿性关节炎属寒湿者，此方加味甚效。", "contraindication": "", "keywords": "薏苡附子散,湿痹,关节肿痛"}, {"id": 1034, "source": "黄帝内经", "article_number": "1", "liujing": "", "chapter": "素问·上古天真论", "original_text": "上古之人，其知道者，法于阴阳，和于术数，食饮有节，起居有常，不妄作劳，故能形与神俱，而尽终其天年，度百岁乃去。", "tags": "养生,阴阳,天真,肾气", "formula": "", "formula_detail": "", "ni_annotation": "这是《内经》养生的总纲。上古之人懂得效法天地阴阳规律。'法于阴阳'是核心——白天动、晚上静。'食饮有节'是定时定量不暴饮暴食，'起居有常'是作息规律。现代人熬夜过劳饮食无度，消耗先天真气，怎能不早衰？形与神俱才能尽终天年。", "contraindication": "", "keywords": "养生,阴阳,天真,肾气"}, {"id": 1035, "source": "黄帝内经", "article_number": "2", "liujing": "", "chapter": "素问·四气调神大论", "original_text": "夫四时阴阳者，万物之根本也。所以圣人春夏养阳，秋冬养阴，以从其根，故与万物沉浮于生长之门。逆其根，则伐其本，坏其真矣。", "tags": "四时阴阳,养阳养阴,养生根本", "formula": "", "formula_detail": "", "ni_annotation": "四时阴阳是万物的总根源。春夏要养阳——春天助阳气生发，夏天助阳气外散；秋冬要养阴——秋天收敛，冬天封藏。'从其根'就是顺着天地规律。现代人反着来：夏天猛吹空调喝冰水压阳气，冬天熬夜透支精气。逆天而行，怎能不病？这是四季养生的大原则。", "contraindication": "", "keywords": "四时阴阳,养阳养阴,养生"}, {"id": 1036, "source": "黄帝内经", "article_number": "3", "liujing": "", "chapter": "素问·生气通天论", "original_text": "阳气者，若天与日，失其所，则折寿而不彰。故天运当以日光明，是故阳因而上，卫外者也。", "tags": "阳气,卫外,寿夭", "formula": "", "formula_detail": "", "ni_annotation": "《内经》对阳气最精辟的论述。阳气就像天上太阳，无阳光则万物不长，无阳气则人不能活。'失其所则折寿而不彰'——阳气失去应有位置（该升不升、该藏不藏），寿命就缩短。阳气特性是'因上卫外'——向上向外捍卫体表御外邪。临床见阳虚怕冷易感冒者，必当温阳扶正。", "contraindication": "", "keywords": "阳气,卫外,寿夭"}, {"id": 1037, "source": "黄帝内经", "article_number": "4", "liujing": "", "chapter": "素问·金匮真言论", "original_text": "东方青色，入通于肝，开窍于目，藏精于肝，其病发惊骇，其味酸，其类草木，其畜鸡，其谷麦，其应四时，上为岁星，是以春气在头也。", "tags": "五脏四时,东方肝木,五色五味", "formula": "", "formula_detail": "", "ni_annotation": "此篇讲五脏与四方四时的对应关系。东方属青色通于肝，肝开窍于目，病发惊骇。味酸、类草木、畜鸡、谷麦——这些都是东方木的对应物。'春气在头'说明春天多头痛，因肝胆之气上冲头部。《内经》用这套系统把人体和自然界完全对应起来，诊断时要考虑季节因素，肝病在春天容易加重或发作。", "contraindication": "", "keywords": "五脏四时,东方肝木,五色五味"}, {"id": 1038, "source": "黄帝内经", "article_number": "5", "liujing": "", "chapter": "素问·阴阳应象大论", "original_text": "阴阳者，天地之道也，万物之纲纪，变化之父母，生杀之本始，神明之府也。治病必求于本。", "tags": "阴阳,天地之道,治病求本", "formula": "", "formula_detail": "", "ni_annotation": "这是《内经》阴阳学说的总纲领。阴阳是天地的根本法则，是一切变化的源头。'治病必求于本'——这个本就是阴阳。无论什么病，归根结底都是阴阳失衡：要么阴盛阳衰，要么阳亢阴虚。所以中医治病不是盯着症状，而是调整阴阳。懂了这一句，就懂了中医的核心思维。", "contraindication": "", "keywords": "阴阳,天地之道,治病求本"}, {"id": 1039, "source": "黄帝内经", "article_number": "6", "liujing": "", "chapter": "素问·阴阳离合论", "original_text": "圣人南面而立，前曰广明，后曰太冲。太冲之地，名曰少阴。少阴之上，名曰太阳。太阳根起于至阴，结于命门，名曰阴中之阳。", "tags": "三阴三阳,阴阳离合,太阳少阴", "formula": "", "formula_detail": "", "ni_annotation": "本篇论述三阴三阳的离合关系。'阴阳离合'是说阴阳既分又合，像太极图一样可分可合。太阳起于足小趾至阴穴，结于命门，叫'阴中之阳'——因为太阳虽然属阳，却根植于少阴之中。这告诉我们阴阳不是截然分开的，阳中含阴，阴中含阳，临床辨证要看到这种相互依存的关系。", "contraindication": "", "keywords": "三阴三阳,阴阳离合,太阳"}, {"id": 1040, "source": "黄帝内经", "article_number": "7", "liujing": "", "chapter": "素问·阴阳别论", "original_text": "脉有阴阳，知阳者知阴，知阴者知阳。所谓阳者，胃脘之阳也。别于阳者，知病处也；别于阴者，知死生之期。", "tags": "脉诊,阴阳脉,胃脘之阳", "formula": "", "formula_detail": "", "ni_annotation": "此篇专论脉诊中的阴阳分辨。'知阳者知阴，知阴者知阳'——阴阳脉互为表里，懂得阳脉就能推知阴脉。特别指出'阳者胃脘之阳'——胃气是脉的根本，有胃气的脉才叫平脉。'别于阳者知病处，别于阴者知死生之期'——辨阳脉可知病变部位，辨阴脉可判断预后生死。脉诊的关键就在这里。", "contraindication": "", "keywords": "脉诊,阴阳脉,胃气"}, {"id": 1041, "source": "黄帝内经", "article_number": "8", "liujing": "", "chapter": "素问·灵兰秘典论", "original_text": "心者，君主之官也，神明出焉。肺者，相傅之官，治节出焉。肝者，将军之官，谋虑出焉。胆者，中正之官，决断出焉。膻中者，臣使之官，喜乐出焉。", "tags": "十二脏腑,君主之官,脏腑功能", "formula": "", "formula_detail": "", "ni_annotation": "这是《内经》最经典的脏腑功能论述。心为君主之官统摄全身，肺为相傅辅助心主一身之气，肝为将军主谋略决断，胆为中正主决断，膻中(心包)为臣使主情志喜乐。把十二脏腑比作一个国家的政府机构，各司其职又相互配合。心是核心——'主明则下安'，心脏功能正常全身脏腑才能协调运作。", "contraindication": "", "keywords": "十二脏腑,君主之官,心君"}, {"id": 1042, "source": "黄帝内经", "article_number": "9", "liujing": "", "chapter": "素问·六节藏象论", "original_text": "帝曰：藏象何如？岐伯曰：心者，生之本，神之变也；其华在面，其充在血脉，为阳中之太阳，通于夏气。肺者，气之本，魄之处也；其华在毛，其充在皮，为阳中之太阴，通于秋气。", "tags": "藏象,脏腑本质,五时相通", "formula": "", "formula_detail": "", "ni_annotation": "'藏象'二字是中医核心概念——'藏'指内在脏腑，'象'指外在表现。心为生之本、神之所变，华在面、充在血脉，对应夏天太阳；肺为气之本、魄之居所，华在毛、充在皮，对应秋天太阴。通过外在的'象'（面色、毛发、皮肤）可以推断内在'藏'的状态，这就是中医望诊的理论基础。", "contraindication": "", "keywords": "藏象,脏腑,望诊"}, {"id": 1043, "source": "黄帝内经", "article_number": "10", "liujing": "", "chapter": "素问·五脏生成", "original_text": "心之合脉也，其荣色也，其主肾也。肺之合皮也，其荣毛也，其主心也。肝之合筋也，其荣爪也，其主肺也。脾之合肉也，其荣唇也，其主肝也。肾之合骨也，其荣发也，其主脾也。", "tags": "五脏五体,相生相克,荣华外现", "formula": "", "formula_detail": "", "ni_annotation": "此篇讲五脏与五体的配合及五行相克关系。心合脉荣色但受肾制约(水克火)，肺合皮荣毛但受心制约(火克金)……注意'其主'是指克制它的脏。这种相克关系维持平衡：肾水不过亢则心火不妄动，心火不过旺则肺金不被灼。五脏之间的制衡是健康的基础，一旦某脏太过或不及，平衡就被打破而发病。", "contraindication": "", "keywords": "五脏五体,相生相克,制衡"}, {"id": 1044, "source": "黄帝内经", "article_number": "11", "liujing": "", "chapter": "素问·五脏别论", "original_text": "脑、髓、骨、脉、胆、女子胞，此六者地气之所生也，皆藏于阴而象于地，故藏而不泻，名曰奇恒之腑。胃、大肠、小肠、三焦、膀胱，此五者，天气之所生也，其气象天，故泻而不藏。", "tags": "奇恒之腑,传化之腑,藏泻有别", "formula": "", "formula_detail": "", "ni_annotation": "本篇提出'奇恒之腑'的重要概念。奇恒之腑(脑髓骨脉胆女子胞)'藏而不泻'——像大地一样收藏精气；而传化之腑(胃肠膀胱三焦等)'泻而不藏'——像天空一样传导运化。胆比较特殊，既属奇恒之腑又是六腑之一，因为它既藏精汁(清净之液)又参与传导。这个分类对理解某些疑难杂症的病机很有帮助。", "contraindication": "", "keywords": "奇恒之腑,脑髓,女子胞"}, {"id": 1045, "source": "黄帝内经", "article_number": "12", "liujing": "", "chapter": "素问·异法方宜论", "original_text": "故东方之域，天地之所始生也，鱼盐之地，海滨傍水，其民食鱼而嗜咸，皆安其处，美其食。鱼者使人热中，盐者胜血，故其民皆黑色疏理，其病皆为痈疡，其治宜砭石。", "tags": "五方地域,因地制宜,砭石", "formula": "", "formula_detail": "", "ni_annotation": "此篇论述不同地域的人因环境气候饮食不同而产生不同疾病，需用不同治疗方法。东方海滨之人多吃鱼嗜咸，鱼使体内积热，盐伤血脉，故肤色黑腠理疏，多发痈疡，宜用砭石刺治。这就是'因地制宜'的治疗原则。同样的病在不同地方的人身上，病因可能完全不同，治疗方法也要相应变化。", "contraindication": "", "keywords": "五方地域,因地制宜,异法"}, {"id": 1046, "source": "黄帝内经", "article_number": "13", "liujing": "", "chapter": "素问·移精变气论", "original_text": "古之治病，惟其移精变气，可祝由而已。今世治病，毒药治其内，针石治其外，或愈或不愈。", "tags": "祝由,移精变气,古法治病", "formula": "", "formula_detail": "", "ni_annotation": "'祝由'是古代的一种精神疗法，通过咒语、仪式来转移病人的精神注意力，改变其气血运行状态。古人认为很多病是'神'的问题——情志失调导致的疾病可以通过调节精神来治疗。现代心理学中的暗示疗法、催眠疗法与祝由有相似之处。《内经》承认这种方法的有效性，但也指出后世病情复杂需要药物针灸配合。", "contraindication": "", "keywords": "祝由,移精变气,心理疗法"}, {"id": 1047, "source": "黄帝内经", "article_number": "14", "liujing": "", "chapter": "素问·汤液醪醴论", "original_text": "平治于权衡，去宛陈莝，微动四极，温衣，缪刺其处，以复其形。开鬼门，洁净府，精以时服，五阳已布，疏涤五脏。", "tags": "水肿治疗,开鬼门,洁净府", "formula": "", "formula_detail": "", "ni_annotation": "此篇论述水肿病的治疗原则。'平治于权衡'是用脉法判断阴阳偏胜偏衰；'去宛陈莝'是祛除瘀积的水湿废物；'开鬼门'即发汗(鬼门指毛孔)，'洁净府'即利小便。这两条是治疗水肿的基本法则——让水邪从汗、尿两条通路排出。同时配合'温衣'(保暖)、'缪刺'(放血)等方法。至今仍是治疗水肿的指导原则。", "contraindication": "", "keywords": "水肿,开鬼门,洁净府,发汗利尿"}, {"id": 1048, "source": "黄帝内经", "article_number": "15", "liujing": "", "chapter": "素问·玉版论要", "original_text": "诊要上下左右，各在要推。色脉形肉不得相失也。故色以应日，脉以应月，色之与脉，当参相应。", "tags": "色脉诊,色脉相应,诊法要领", "formula": "", "formula_detail": "", "ni_annotation": "此篇强调色诊和脉诊必须相互参照。'诊要上下左右'——望诊要注意面部的上下左右各个区域；'色脉形肉不得相失'——面色、脉象、形体、肌肉的变化应该一致，如果不一致就说明病情复杂。'色以应日，脉以应月'——面色像日光一样显而易见，脉象像月相一样隐晦难察。两者对照参考，才能准确判断病情。", "contraindication": "", "keywords": "色诊,脉诊,色脉相应"}, {"id": 1049, "source": "黄帝内经", "article_number": "16", "liujing": "", "chapter": "素问·诊要经终论", "original_text": "诊病之始，五决为定。欲知其始，先建其量。是以春夏归阳为生，归阴为死；秋冬归阴为生，归阳为死。", "tags": "诊法,五决,四时生死", "formula": "", "formula_detail": "", "ni_annotation": "本篇讲诊断的总纲领。'五决为定'——根据五行生克来判断疾病的转归。关键是'春夏归阳为生，归阴为死；秋冬归阴为生，归阳为死'——春夏季节如果脉证表现为阳的特征是正常的(顺应天时)，表现为阴则是逆反(死)；秋冬反之。这说明诊断必须结合时令，同一脉象在不同季节的意义完全不同。", "contraindication": "", "keywords": "诊法,四时,顺逆生死"}, {"id": 1050, "source": "黄帝内经", "article_number": "17", "liujing": "", "chapter": "素问·脉要精微论", "original_text": "诊法常以平旦，阴气未动，阳气未散，饮食未进，经脉未盛，络脉调匀，气血未乱，故乃可诊有过之脉。", "tags": "脉诊时间,平旦诊脉,最佳时机", "formula": "", "formula_detail": "", "ni_annotation": "此篇给出诊脉的最佳时间——清晨(平旦)。为什么？因为此时人刚醒，阴气安静、阳气未散，没进食没活动，经脉气血最平和稳定，此时诊得的脉最能反映身体真实状态。白天诊脉会受饮食、活动、情绪等因素干扰。当然现代人不可能都清晨就诊，但要尽量在安静状态下诊脉，减少干扰因素。", "contraindication": "", "keywords": "脉诊,平旦,最佳时机"}, {"id": 1051, "source": "黄帝内经", "article_number": "18", "liujing": "", "chapter": "素问·平人气象论", "original_text": "人一呼脉再动，一吸脉亦再动，呼吸定息脉五动，闰以太息，命曰平人。平人者不病也。常以不病调病人，医不病，故为病人平息以调之为法。", "tags": "平脉,常脉,呼吸定息", "formula": "", "formula_detail": "", "ni_annotation": "本篇定义什么是'平人'(健康人)的脉象。正常人一呼一吸之间脉搏跳动约4-5次(一呼两动一吸两动加闰息一动共五次)，这就是平脉。'常以不病调病人'——医生要先了解正常人的脉象，才能对比发现病人的异常。初学脉诊最重要的是先摸正常人的脉，建立标准，然后才能识别病脉。没有'平'的标准，就无法辨别'病'。", "contraindication": "", "keywords": "平脉,常脉,一息四五至"}, {"id": 1052, "source": "黄帝内经", "article_number": "19", "liujing": "", "chapter": "素问·玉机真脏论", "original_text": "真肝脉至，中外急，如循刀刃责责然，如按琴瑟弦，曰肝死。真心脉至，坚而搏，如循薏苡子累累然，曰心死。真肺脉至，大而虚，如以毛羽中人肤，曰肺死。", "tags": "真脏脉,死脉,五脏死脉", "formula": "", "formula_detail": "", "ni_annotation": "'真脏脉'是真脏之气外露的死脉。正常脉有胃气(柔和之感)，真脏脉毫无胃气，只见本脏的极端特征：肝的真脏脉如刀刃般锐利(肝气暴发无制)，心的如薏苡子累累坚实(心火极盛)，肺的如羽毛轻拂皮肤(肺气将绝)。出现真脏脉说明胃气已绝，预后极差。临床见此类脉象要高度警惕，积极救治。", "contraindication": "", "keywords": "真脏脉,死脉,胃气"}, {"id": 1053, "source": "黄帝内经", "article_number": "20", "liujing": "", "chapter": "素问·三部九候论", "original_text": "人有三部，部有三候，以决死生，以处百病，以调虚实，而除邪疾。上部天，两额之动脉；上部地，两颊之动脉；上部人，耳前之动脉。", "tags": "三部九候,遍诊法,切脉部位", "formula": "", "formula_detail": "", "ni_annotation": "这是古代的遍诊法——在全身多个部位切脉来判断病情。分上中下三部：上部取头面部(额、颊、耳前动脉)，中部取手部(手太阴、手少阴、手阳明)，下部取足部(足厥阴、足少阴、足太阴)，每部三天地人三候共九候。后世简化为寸口脉法，但三部九候的精神仍在：从多处信息综合判断，比单一指标更可靠。", "contraindication": "", "keywords": "三部九候,遍诊法,综合诊断"}, {"id": 1054, "source": "黄帝内经", "article_number": "21", "liujing": "", "chapter": "素问·经脉别论", "original_text": "饮入于胃，游溢精气，上输于脾，脾气散精，上归于肺，通调水道，下输膀胱。水精四布，五经并行，合于四时五脏阴阳，揆度以为常也。", "tags": "水谷代谢,脾胃肺,水道通调", "formula": "", "formula_detail": "", "ni_annotation": "这段话完美描述了人体水液代谢的全过程。饮食物入胃后，精气上输给脾，脾再将精气散布上归于肺，肺通调水道，浊水下输膀胱排出。'水精四布，五经并行'——津液通过五脏经络输布全身。这个过程中任何一环出问题都会导致水代谢紊乱：脾虚则运化失职生湿，肺失宣降则水停，膀胱不利则尿潴留。", "contraindication": "", "keywords": "水谷代谢,脾胃肺,水液代谢"}, {"id": 1055, "source": "黄帝内经", "article_number": "22", "liujing": "", "chapter": "素问·脏气法时论", "original_text": "肝主春，足厥阴少阳主治，其日甲乙，肝苦急，急食甘以缓之。心主夏，手少阴太阳主治，其日丙丁，心苦缓，急食酸以收之。脾主季夏，足太阴阳明主治，其日戊己，脾苦湿，急食苦以燥之。", "tags": "五脏主时,苦欲补泻,药食疗法", "formula": "", "formula_detail": "", "ni_annotation": "此篇讲五脏与时令的对应及药食调养原则。每个脏有其主管季节、主治经脉、对应天干、所苦所宜：肝主春，肝气急(肝主筋主风性急迫)宜甘味缓之；心主夏，心气缓(心火散漫)宜酸味收敛；脾主长夏，脾恶湿宜苦味燥湿。这就是'脏气法时'——五脏之气效法四时规律，用药也要配合时令，同一种病在不同季节用药要有侧重。", "contraindication": "", "keywords": "五脏主时,苦欲补泻,五味"}, {"id": 1056, "source": "黄帝内经", "article_number": "23", "liujing": "", "chapter": "素问·宣明五气", "original_text": "五气所病：心为噫，肺为咳，肝为语，脾为吞，肾为欠、为嚏。五气所并：并于气则喘，并于血则血，并于寒则热，并于热则狂。", "tags": "五脏病变,五气所病,脏腑症状", "formula": "", "formula_detail": "", "ni_annotation": "此篇简明扼要地列出五脏各自的典型病症。心病变多嗳气(噫)，肺病变多咳嗽，肝病变多多语(肝主语)，脾病变多吞酸(吞)，肾病变多哈欠喷嚏。这些看似简单的对应关系临床非常有用——见到顽固性咳嗽首先考虑肺，但也可能是其他脏腑影响肺。'五气所并'说明病邪合并到哪一经就会出现相应的典型症状。", "contraindication": "", "keywords": "五脏病变,咳嚏噫,症状归类"}, {"id": 1057, "source": "黄帝内经", "article_number": "24", "liujing": "", "chapter": "素问·血气形志", "original_text": "夫人之常数，太阳常多血少气，少阳常少血多气，阳明常多气多血，少阴常少血多气，厥阴常多血少气，太阴常多气少血，此天之常数。", "tags": "六经气血,气血多少,针刺原则", "formula": "", "formula_detail": "", "ni_annotation": "此篇记载六经气血分布的常數，对针刺治疗极为重要。太阳经多血少气——刺太阳经可以出血不宜多耗气；阳明经多气多血——刺阳明最为适宜；少阳经少血多气——刺少阳宜浅刺少出血。掌握了各经气血多少，针刺时就知道该出血还是出气、该深刺还是浅刺。这也是为什么足三里(阳明经)是最常用的强壮穴——气血俱丰。", "contraindication": "", "keywords": "六经气血,针刺,出血补泻"}, {"id": 1058, "source": "黄帝内经", "article_number": "25", "liujing": "", "chapter": "素问·宝命全形论", "original_text": "天覆地载，万物悉备，莫贵于人。人以天地之气生，四时之法成。君王众庶，尽欲全形。", "tags": "天覆地载,贵人之身,宝命全形", "formula": "", "formula_detail": "", "ni_annotation": "'天覆地载，万物悉备，莫贵于人'——《内经》高度重视人的生命价值。人禀承天地之气而生，遵循四时规律而成形。'宝命全形'就是要珍惜生命、保全形体。作为医生，首要的是保护患者的生命和形体完整，不能轻易损伤。针刺用药都要慎重，'如临深渊，手如握虎'——医生的态度要敬畏生命，不可鲁莽。", "contraindication": "", "keywords": "宝命全形,生命宝贵,医德"}, {"id": 1059, "source": "黄帝内经", "article_number": "26", "liujing": "", "chapter": "素问·八正神明论", "original_text": "凡刺之法，必候日月星辰四时八正之气，气定乃刺之。是故天温日明，则人血淖液而卫气浮，故血易泻，气易行；天寒日阴，则人血凝泣而卫气沉。", "tags": "针刺时机,八正之气,天时影响", "formula": "", "formula_detail": "", "ni_annotation": "针刺必须考虑天文气象因素。'八正'指二分(春分秋分)、二至(夏至冬至)、四立(立春立夏立秋立冬)八个节气。天气温暖明亮时人体血液流动顺畅、卫气浮于表，此时针刺易于得气和排邪；天气寒冷阴暗时血液凝滞、卫气沉于里，针刺效果较差。这就是为什么古人讲究择日针刺——不是迷信而是基于对人体气血随天时变化的深刻认识。", "contraindication": "", "keywords": "针刺时机,八正,四时"}, {"id": 1060, "source": "黄帝内经", "article_number": "27", "liujing": "", "chapter": "素问·离合真邪论", "original_text": "夫邪之新客来也，未有定处，推之则前，引之则止，逢而写之，其病先已。故善用针者，邪气方来，必须按而止之。", "tags": "真邪离合,早期治疗,针刺时机", "formula": "", "formula_detail": "", "ni_annotation": "此篇论述如何辨别真气(正气)和邪气的离合状态以及何时针刺最佳。邪气刚入侵时还没有固定位置，这时'推之前引之止'很容易驱除——就像敌人刚登陆还没站稳，一击即溃。'善用针者邪气方来必须按而止之'——高明的医生在邪气初起时就截住它。这体现了中医'治未病'的思想：越早干预效果越好，不要等到邪气深入了再去处理。", "contraindication": "", "keywords": "真邪离合,早期干预,治未病"}, {"id": 1061, "source": "黄帝内经", "article_number": "28", "liujing": "", "chapter": "素问·通评虚实论", "original_text": "邪气盛则实，精气夺则虚。", "tags": "虚实纲领,邪气盛,精气夺", "formula": "", "formula_detail": "", "ni_annotation": "这是中医辨别虚实最简洁有力的定义！只有十四个字却道出了虚实辨证的本质。'邪气盛则实'——实证是因为邪气(致病因素)亢盛，表现为亢奋有余的症状(高热、疼痛拒按、脉实有力)；'精气夺则虚'——虚证是因为正气(人体抗病能力)被耗夺，表现为衰退不足的症状(畏寒、乏力、脉虚无力)。治疗原则：实则泻其邪，虚则补其正。", "contraindication": "", "keywords": "虚实,邪气盛,精气夺,辨证纲领"}, {"id": 1062, "source": "黄帝内经", "article_number": "29", "liujing": "", "chapter": "素问·太阴阳明论", "original_text": "太阴阳明为表里，脾胃脉也。生病而异者何也？岐伯曰：阴阳异位，更虚更实，更逆更从，或从内，或从外，所从不同，故病异名也。", "tags": "太阴阳明,脾胃表里,生病各异", "formula": "", "formula_detail": "", "ni_annotation": "脾(太阴)和胃(阳明)互为表里，同属消化系统，但二者生病表现差异很大。原因在于'阴阳异位'——脾属阴主升主燥，胃属阳主降主润；'更虚更实'——脾多虚证(不运化)，胃多实证(积滞)；'更逆更从'——脾气宜升反逆则下利，胃气宜降反逆则呕吐。脾胃虽一体两面，但生理特性和病理倾向完全不同，临床上要区分清楚才能正确施治。", "contraindication": "", "keywords": "太阴阳明,脾胃,升降"}, {"id": 1063, "source": "黄帝内经", "article_number": "30", "liujing": "", "chapter": "素问·阳明脉解", "original_text": "阳明主肉，其脉血气盛，邪客之则热，热甚则恶火。阳明厥则喘而惋，惋则恶人。阴阳争于内外，阳盛则外热，阴盛则内寒。", "tags": "阳明经病,发热恶热,阳明热盛", "formula": "", "formula_detail": "", "ni_annotation": "本篇专门解释阳明经脉病变的各种表现。阳明经多气多血，邪侵阳明则高热，热极则恶火(怕热喜冷)。'阳明厥则喘而惋'——阳明气逆会出现喘息懊憹不安，甚至厌烦见人。阳明病最大的特点是'热'——无论是白虎汤证的四大症(大热大渴大汗脉洪大)还是承气汤证的痞满燥实，核心都是阳明热盛。治疗阳明病关键在于清泄阳明之热。", "contraindication": "", "keywords": "阳明病,热盛,清下"}, {"id": 1064, "source": "黄帝内经", "article_number": "31", "liujing": "", "chapter": "素问·热论", "original_text": "今夫热病者，皆伤寒之类也。人之伤于寒也，则为病热，热虽甚不死。其两感于寒而病者，必不免于死。伤寒一日，巨阳受之，故头项痛腰脊强。", "tags": "热病,伤寒,六经传变,两感", "formula": "", "formula_detail": "", "ni_annotation": "此篇是《伤寒论》的理论源头！明确提出'热病皆伤寒之类'——外感热病的根源是感受寒邪。建立了六经传变的框架：一日太阳(头项痛腰脊强)、二日阳明(身热目疼鼻干)、三日少阳(胸胁痛耳聋)……如果'两感'(表里两经同时感邪)则预后不良。张仲景的《伤寒论》正是继承和发展了这个理论体系，创立了六经辨证的完整方法论。", "contraindication": "", "keywords": "热病,伤寒,六经传变,伤寒论源流"}, {"id": 1065, "source": "黄帝内经", "article_number": "32", "liujing": "", "chapter": "素问·刺热", "original_text": "肝热病者，小便先黄，腹痛，身热，热争则狂言及惊，胁满痛，手足躁，不得安卧。心热病者，先不乐，数日乃热，热争则卒心痛，烦闷善呕，头痛面赤无汗。", "tags": "五脏热病,热病先兆,刺热疗法", "formula": "", "formula_detail": "", "ni_annotation": "此篇详细描述五脏热病的先兆症状和典型表现。肝热病先见小便发黄、腹痛，然后发热，热盛时烦躁狂言胁痛——因为肝经绕阴器主疏泄，肝热下注则尿黄。心热病先是情绪不愉快(心主神明)，数日后发热，热盛时猝然心痛烦躁——心主血脉，热扰心神。掌握五脏热病的先驱症状可以早期发现、早期治疗，不必等到热势鸱张才处理。", "contraindication": "", "keywords": "五脏热病,先兆症状,早期诊断"}, {"id": 1066, "source": "黄帝内经", "article_number": "33", "liujing": "", "chapter": "素问·评热病论", "original_text": "有病温者，汗出辄复热，而脉躁疾不为汗衰，狂言不能食，病名为何？岐伯曰：病名阴阳交，交者死也。", "tags": "阴阳交,热病死证,汗出复热", "formula": "", "formula_detail": "", "ni_annotation": "'阴阳交'是一种危重热病的表现：出汗后热度不退反而更高，脉象躁急不因出汗而减缓，伴有胡言乱语不能进食。为什么叫'阴阳交'？因为阴精(正气)和阳邪(邪热)交结在一起无法分离——阴不能制阳，阳热独盛而阴精耗竭。这种情况预后极差，说明正气已经无法抗衡邪热。临床见此类患者需全力救治，用大剂清热救阴之法。", "contraindication": "", "keywords": "阴阳交,危重症,阴竭阳脱"}, {"id": 1067, "source": "黄帝内经", "article_number": "34", "liujing": "", "chapter": "素问·逆调论", "original_text": "人身非常热也，非常寒也，非常骨痛也非常肉烁也，此何以释？岐伯曰：阴气少而阳气胜，故热而烦满也；阳气少而阴气胜，故寒而栗也。", "tags": "寒热逆调,阴阳偏胜,身寒身热", "formula": "", "formula_detail": "", "ni_annotation": "'逆调'是指人体阴阳气血的调节功能失常导致异常的寒热反应。有些人明明没有外感却自觉身体极热(阴少阳胜——阴虚阳亢)，有人无缘无故极度怕冷(阳少阴胜——阳虚阴盛)。还有'骨痛'是肾虚骨痿，'肉烁'是热邪消灼肌肉。这些都不是普通的寒热感冒，而是体内阴阳严重失衡造成的病理性寒热，治疗要从调理阴阳入手而非单纯解表。", "contraindication": "", "keywords": "逆调,阴阳偏胜,病理性寒热"}, {"id": 1068, "source": "黄帝内经", "article_number": "35", "liujing": "", "chapter": "素问·疟论", "original_text": "疟之始发也，先起于毫毛，伸欠乃作，寒栗鼓颔，腰脊俱痛，寒去则内外皆热，头痛如破，渴欲冷饮。", "tags": "疟疾,寒热往来,疟病机制", "formula": "", "formula_detail": "", "ni_annotation": "本篇详细论述疟疾的发病机理和临床表现。疟疾的经典发作过程：先感觉毫毛竖立(卫阳被遏)、打哈欠伸懒腰(阳气欲伸不能)，然后剧烈寒战(阳为阴遏)，继而寒去高热(阳郁而发)伴头痛如裂口渴欲饮。这种周期性的寒热往来是由于疟邪与卫气'相争'——邪伏半表半里，出入之间与正气交争所致。小柴胡汤和解少阳之法与此机理密切相关。", "contraindication": "", "keywords": "疟疾,寒热往来,少阳病"}, {"id": 1069, "source": "黄帝内经", "article_number": "36", "liujing": "", "chapter": "素问·刺疟", "original_text": "足太阳之疟，令人腰痛头重，寒从背起，先寒后热，熇熇暍暍然，热止汗出，难已。取郄中出血。足少阳之疟，令人身体解㑊，寒不甚，热不甚，恶见人，见人心惕惕然。", "tags": "疟疾分经,刺疟取穴,六经疟", "formula": "", "formula_detail": "", "ni_annotation": "此篇按六经分类论述各类疟疾的症状特点和针刺方法。太阳疟特点：腰痛头重、寒从背起、热势猛烈、取委中出血；少阳疟特点：身体困倦乏力、寒热都不剧烈、但情绪紧张恐惧见人。不同经的疟疾症状不同是因为邪气所在经脉不同，治疗也要取相应的穴位。这种按经脉分类的方法体现了中医辨证论治的精髓——同是疟疾，治法因经而异。", "contraindication": "", "keywords": "刺疟,六经疟疾,辨证取穴"}, {"id": 1070, "source": "黄帝内经", "article_number": "37", "liujing": "", "chapter": "素问·气厥论", "original_text": "肾移寒于脾，痈肿少气。脾移寒于肝，痈肿筋挛。肝移寒于心，狂，隔中。心移寒于肺，为肺消，肺消者饮一溲二，死不治。", "tags": "脏腑寒移,五脏相传,寒厥", "formula": "", "formula_detail": "", "ni_annotation": "'气厥'是脏腑间的气机逆乱导致寒热互相转移。肾移寒于脾→脾阳受损→痈肿少气；脾移寒于肝→肝寒凝滞→筋挛；肝移寒于心→心神被寒凝→发狂；心移寒于肺→肺气虚寒→'肺消'(消渴重症)饮水多但尿更多，死证。这说明寒邪可以从一脏转移到另一脏，形成连锁反应。临床见疑难杂症要考虑是否是脏腑间寒热的转移传变，不能只看表面症状。", "contraindication": "", "keywords": "气厥,脏腑寒移,传变"}, {"id": 1071, "source": "黄帝内经", "article_number": "38", "liujing": "", "chapter": "素问·咳论", "original_text": "五脏六腑皆令人咳，非独肺也。皮毛者，肺之合也，皮毛先受邪气，邪气以从其合也。其寒饮食入胃，从肺脉上至于肺，则肺寒，肺寒则内外合邪，因而客之，则为肺咳。", "tags": "咳嗽,五脏六腑皆咳,肺咳机理", "formula": "", "formula_detail": "", "ni_annotation": "这是关于咳嗽最重要的理论！'五脏六腑皆令人咳，非独肺也'——咳嗽虽然表现在肺，但根源可能在任何脏腑。肺咳的直接原因是：外邪从皮毛侵入(肺合皮毛)，加上寒凉饮食从胃沿肺脉上至于肺，内外合邪导致肺寒而咳。其他脏影响肺也会咳嗽：心咳(心痛喉痹)、肝咳(胁痛)、脾咳(右胁痛)、肾咳(腰背引痛)。所以治咳嗽不能只治肺，要找到真正的原因在哪一脏。", "contraindication": "", "keywords": "咳嗽,五脏六腑咳,辨证求因"}, {"id": 1072, "source": "黄帝内经", "article_number": "39", "liujing": "", "chapter": "素问·举痛论", "original_text": "寒气客于脉外则脉寒，脉寒则缩蜷，缩蜷则绌急，绌急则外引小络，故猝然而痛。得炅则痛立止，因重中于寒则痛久矣。", "tags": "疼痛机理,寒凝脉络,猝然疼痛", "formula": "", "formula_detail": "", "ni_annotation": "此篇系统论述疼痛的发生机理。最主要的原因是'寒'——寒气侵袭脉外使血管收缩痉挛(缩蜷绌急)，牵拉细小脉络引起突然剧痛。'得炅则痛立止'——得到热量疼痛立刻停止，这就是为什么热敷能止痛。反复受寒则疼痛变成慢性。临床见各种疼痛首先要考虑是否有寒凝血瘀的因素，温经散寒是止痛的重要方法。'不通则痛'、'不荣则痛'两种机理在此篇都有阐述。", "contraindication": "", "keywords": "疼痛,寒凝,不通则痛,温经止痛"}, {"id": 1073, "source": "黄帝内经", "article_number": "40", "liujing": "", "chapter": "素问·腹中论", "original_text": "有病心腹满，旦食不能暮食，名为鼓胀，治之以鸡矢醴，一剂知，二剂已。有病胸胁支满者，妨于食，病至则先闻腥臊臭，出清液，先唾血，四肢清，目眩。", "tags": "鼓胀,鸡矢醴,腹满血枯", "formula": "", "formula_detail": "", "ni_annotation": "'鼓胀'是腹部胀大如鼓的病证，特点是早上能吃晚上不能吃(早晨阳气升尚可运化，暮则阳衰不能运化)。治疗用'鸡矢醴'(鸡屎发酵的酒剂)——听起来恶心但在古籍中确有记载，取其利水消胀之功。另一种病是'血枯'——胸胁胀满妨碍进食，口中腥臭吐清水唾血四肢冰冷目眩，这是血虚血瘀的危重证。两病一实(鼓胀)一虚(血枯)，治疗方向完全相反。", "contraindication": "", "keywords": "鼓胀,腹水,血枯"}, {"id": 1074, "source": "黄帝内经", "article_number": "41", "liujing": "", "chapter": "素问·刺腰痛", "original_text": "足太阳脉令人腰痛，引项脊尻背如重状，刺其郄中太阳正经出血。少阳令人腰痛，如以针刺其皮中，循循然不可以俯仰，不可以顾。", "tags": "腰痛,六经腰痛,针刺治疗", "formula": "", "formula_detail": "", "ni_annotation": "腰痛按六经分类辨证施治是《内经》的一大特色。太阳经腰痛的特点：痛连后项脊背尾骶，感觉沉重如负物——因为太阳经循行经过背部，取委中出血。少阳经腰痛：如针刺皮肤般锐痛，难以低头仰头和转头——少阳经行身侧，痛在腰侧。不同经脉的腰痛部位性质不同，治疗取穴也不同。临床腰痛患者要仔细询问疼痛部位和性质以确定病经。", "contraindication": "", "keywords": "腰痛,六经辨证,针刺"}, {"id": 1075, "source": "黄帝内经", "article_number": "42", "liujing": "", "chapter": "素问·风论", "original_text": "风者百病之长也，至其变化乃为他病也，无常方，然致有风气也。风中五脏六腑之俞，亦为脏腑之风，各入其门户，所中则为偏风。风气循风府而上，则为脑风。风入系头，则为目风眼寒。", "tags": "风邪,百病之长,风为百病先导", "formula": "", "formula_detail": "", "ni_annotation": "'风者百病之长'——风邪是所有致病因子的首领，它常带头侵犯人体然后变化出各种病。风的特性是'善行而数变'——到处游走不定、变化迅速。风中不同的部位产生不同的'风'病：风中脏腑腧穴→脏腑风，风中一侧→偏风(偏瘫)，风上头脑→脑风，风入目系→目风。风邪还常与其他邪气结合：风寒、风湿、风热等。治疗风证要疏散风邪为主，兼治所夹之邪。", "contraindication": "", "keywords": "风邪,百病之长,善行数变"}, {"id": 1076, "source": "黄帝内经", "article_number": "43", "liujing": "", "chapter": "素问·痹论", "original_text": "风寒湿三气杂至，合而为痹也。其风气胜者为行痹，寒气胜者为痛痹，湿气胜者为著痹。以冬遇此者为骨痹，以春遇此者为筋痹，以夏遇此者为脉痹。", "tags": "痹证,风寒湿,行痹痛痹著痹", "formula": "", "formula_detail": "", "ni_annotation": "痹证的定义和分类！'风寒湿三气杂至合而为痹'——三种邪气混合侵袭人体，闭阻经络气血而成痹。风气重的'行痹'——疼痛游走不定(风性善行)；寒气重的'痛痹'——疼痛剧烈且固定(寒性收引凝滞)；湿气重的'著痹'——重着麻木固定不移(湿性黏腻重浊)。还可按季节分为骨痹(冬)、筋痹(春)、脉痹(夏)、肌痹(长夏)、皮痹(秋)。治疗痹证的原则是祛风散寒除湿，根据偏重有所侧重。", "contraindication": "", "keywords": "痹证,风寒湿,行痹痛痹著痹"}, {"id": 1077, "source": "黄帝内经", "article_number": "44", "liujing": "", "chapter": "素问·痿论", "original_text": "肺主身之皮毛，心主身之脉，肝主身之筋，脾主身之肉，肾主身之骨髓。故肺热叶焦，则皮毛虚弱急薄，著则生痿躄也。心气热，则下脉厥而上，上则下虚，虚则生脉痿。", "tags": "痿证,五脏因热致痿,痿躄", "formula": "", "formula_detail": "", "ni_annotation": "痿证是肢体软弱无力甚至萎缩不用的一类疾病，与痹证(主要表现为疼痛)相对。本篇提出'五脏因热致痿'的理论：肺热叶焦→皮毛枯萎→痿躄(下肢萎废)；心气热→血脉空虚→脉痿(肢体关节如解脱)；肝气热→筋膜干枯→筋痿(拘挛)；脾气热→肌肉不仁→肉痿(麻木不知)；肾气热→骨髓减少→骨痿(腰脊不举)。痿证的核心病机是'热'，治疗总则是'独取阳明'——补益后天脾胃之源。", "contraindication": "", "keywords": "痿证,肺热叶痿,独取阳明"}, {"id": 1078, "source": "黄帝内经", "article_number": "45", "liujing": "", "chapter": "素问·厥论", "original_text": "阳气衰于下，则为寒厥；阴气衰于下，则为热厥。厥或令人腹满，或令人暴不知人，或至半日远至一日乃知人者。", "tags": "厥证,寒厥热厥,阴阳衰竭", "formula": "", "formula_detail": "", "ni_annotation": "厥证是气血逆乱引起的突然昏倒、不省人事的一类急症。分寒厥和热厥两类：寒厥是阳气衰竭于下(尤其是肾阳不足)→阴寒内盛→手足寒冷；热厥是阴气衰竭于下(肾阴亏虚)→阳气独盛于上→手足发热。两者都可以出现突然昏迷(暴不知人)。鉴别要点：寒厥手足冷、热厥手足热。治疗：寒厥回阳救逆(四逆汤类)，热厥清热滋阴(羚角钩藤汤类)。", "contraindication": "", "keywords": "厥证,寒厥,热厥,昏厥"}, {"id": 1079, "source": "黄帝内经", "article_number": "46", "liujing": "", "chapter": "素问·病能论", "original_text": "有病怒狂者，此病生于阳也。阳气者，因暴折而难决，故善怒也，病名曰阳厥。有病颈痈者，或石治之，或针灸治之，皆已。", "tags": "怒狂阳厥,颈痈,病能辨识", "formula": "", "formula_detail": "", "ni_annotation": "'病能'指疾病的表现形式和诊治能力。篇中讨论多种疾病的诊断和治疗：'怒狂'是因阳气暴折(突然受挫)不能发泄而郁怒成狂，叫'阳厥'——治疗需要疏泄阳气；'颈痈'(颈部脓肿)可以用砭石刺破或针灸治疗。本篇体现了一病一议的临床讨论方式，针对具体病证分析病因病机并提出治疗方案，是《内经》临床思维的典范。", "contraindication": "", "keywords": "病能,阳厥,颈痈,临床诊疗"}, {"id": 1080, "source": "黄帝内经", "article_number": "47", "liujing": "", "chapter": "素问·奇病论", "original_text": "有病口甘者，此五气之溢也，名曰脾瘅。夫五味入口，藏于胃，脾为之行其精气，津液在脾，故令人口甘也。此肥美之所发也，此人必数食甘美而多肥也。", "tags": "奇病,脾瘅,口甜,肥甘致病", "formula": "", "formula_detail": "", "ni_annotation": "'奇病'是指少见或特殊的病证。'脾瘅'就是其中之一——病人觉得嘴里发甜，原因是过食肥甘厚味导致脾脏运化失常、精气泛溢于口(脾开窍于口)。这种人必定经常吃甜美油腻的食物而且体型肥胖——与现代糖尿病前期/代谢综合征高度吻合！《内经》两千多年前就认识到肥胖和过度摄入糖分与口甜的关系，实在了不起。治疗需要控制饮食、健脾化湿、清除陈积。", "contraindication": "", "keywords": "奇病,脾瘅,口甜,糖尿病"}, {"id": 1081, "source": "黄帝内经", "article_number": "48", "liujing": "", "chapter": "素问·大奇论", "original_text": "脉至而搏，血衄身热者死。脉来悬钩浮为常脉。脉至如喘，曰暴厥。脉至如数，使人暴惊，三四日已。脉至浮而合，如数，身热死。", "tags": "奇脉,暴厥,脉象死生", "formula": "", "formula_detail": "", "ni_annotation": "'大奇论'讨论特殊脉象的临床意义和预后判断。'脉至而搏'(脉来急促有力)兼见出血和高热是死脉——正气将脱邪气猖獗。'脉至如喘'(脉来急促如喘息)提示暴厥——突然昏厥。'脉至如数'(脉快)但人受惊吓则可能自愈——因惊恐导致的心悸脉数并非真热。浮而合的脉象(浮取似有似无)兼身热也是死证。这些特殊脉象的判断对急诊预后的评估非常重要。", "contraindication": "", "keywords": "奇脉,死脉,预后判断"}, {"id": 1082, "source": "黄帝内经", "article_number": "49", "liujing": "", "chapter": "素问·脉解", "original_text": "太阳所谓肿腰脽痛者，正月太阳寅，寅太阳也，正月阳气出在上，而阴气盛，阳未得自次也，故肿腰脬痛也。少阳所谓心胁痛者，言少阳盛也，盛者心之所表也。", "tags": "脉解,经脉病候,时令解释", "formula": "", "formula_detail": "", "ni_annotation": "此篇用十二月消息卦(时令阴阳消长)来解释各经脉病变发生的原理。例如太阳经腰痛发生在正月(寅月)：正月阳气初生欲上行但阴气仍盛，阳气不能顺利升发而郁于腰部所以肿痛。少阳经心胁痛是因为少阳经气偏盛而心(火)在其表。这种用天人相应的理论解释疾病的方法体现了《内经'的整体观——人体的每一变化都与天地时令相对应。", "contraindication": "", "keywords": "脉解,时令,天人相应"}, {"id": 1083, "source": "黄帝内经", "article_number": "50", "liujing": "", "chapter": "素问·刺要", "original_text": "病有浮沉，刺有深浅，各至其理，无过其道。过之则内伤，不及则生外壅，壖则邪从之。浅深不得，反为大贼，内动五脏，后生大病。", "tags": "刺法深浅,针刺深度,过犹不及", "formula": "", "formula_detail": "", "ni_annotation": "", "contraindication": "", "keywords": "刺法,深浅适度,医疗安全"}, {"id": 1084, "source": "黄帝内经", "article_number": "51", "liujing": "", "chapter": "素问·刺齐", "original_text": "故刺骨者无伤筋，刺筋者无伤肉，刺肉者无伤脉，刺脉者无伤皮，刺皮者无伤肉，刺肉者无伤筋，刺筋者无伤骨。", "tags": "刺齐,层次分明,针刺禁忌", "formula": "", "formula_detail": "", "ni_annotation": "'刺齐'讲针刺时各层组织的边界和注意事项。核心思想：精确打击目标组织而不伤及周边。刺骨病时不要伤到筋(深层的病用深刺但不能超过病灶伤及更深的好组织)，刺筋病时不伤肌肉……反之亦然——刺皮病(浅层)时也不要误伤深层组织。这种精准治疗的观念在现代医学同样适用：手术要精确切除病灶而尽可能保留正常组织。《内经》在几千年前就已确立了微创理念。", "contraindication": "", "keywords": "刺齐,精准治疗,层次分明"}, {"id": 1085, "source": "黄帝内经", "article_number": "52", "liujing": "", "chapter": "素问·刺禁", "original_text": "脏有要害，不可不察。肝生于左，肺藏于右，心部于表，肾治于里，脾为之使，胃为之市。膈肓之上，中有父母，七节之傍，中有小心。", "tags": "刺禁,脏器要害,针刺禁区", "formula": "", "formula_detail": "", "ni_annotation": "'刺禁'列出了针刺绝对不能犯的错误和禁刺部位。'脏有要害'——内脏有关键部位绝对不能刺伤。'七节之傍中有小心'——第七椎旁是膈关穴附近，靠近心脏(小心即心包/心)，此处深刺可能伤及心脏致命。'膈肓之上中有父母'——膈膜和膏肓之间是膻中(心包)，为'父母'之位(心为君主至关重要)。这些禁忌在今天仍有现实意义：针刺胸部背部时要格外谨慎，避免气胸或刺伤重要脏器。", "contraindication": "", "keywords": "刺禁,安全规范,危险穴位"}, {"id": 1086, "source": "黄帝内经", "article_number": "53", "liujing": "", "chapter": "素问·刺志", "original_text": "气实形实，气虚形虚，此其常也，反此者病。谷盛气盛，谷虚气虚，此其常也，反此者病。脉实血实，脉虚血虚，此其常也，反此者病。", "tags": "刺志,虚实常态,形气脉一致性", "formula": "", "formula_detail": "", "ni_annotation": "'刺志'讨论人体各要素之间的正常对应关系及其反向异常。正常情况下：气盛形体也充实，气虚形体也虚弱——'形气相符'是健康的表现。饮食好则气盛，饮食差则气虚——'谷气相符'。脉有力则血充实，脉无力则血不足——'脉血相符'。如果这些对应关系反过来(形盛气虚、脉大血少等)就是不正常的，说明存在虚假的表象，临床要警惕这类'假实真虚'或'假虚真实'的情况。", "contraindication": "", "keywords": "形气相应,真假虚实,诊断要点"}, {"id": 1087, "source": "黄帝内经", "article_number": "54", "liujing": "", "chapter": "素问·针解", "original_text": "夫泻者迎之，补者随之，知迎知随，气可令和。和气之方，必通阴阳。五脏为阴，六腑为阳。春夏秋冬，各以时为经。", "tags": "补泻手法,迎随补泻,调和阴阳", "formula": "", "formula_detail": "", "ni_annotation": "'针解'解释针刺补泻的基本原理。'泻者迎之，补者随后'——迎着经脉走向刺为泻(逆经气)，顺着经脉走向刺为补(顺经气)。这就是最基本的'迎随补泻'法。'和气之方必通阴阳'——调和气血的根本在于通达阴阳。五脏属阴六腑属阳，春夏秋冬各有对应的治则。针刺不只是机械刺激穴位，更要懂得补泻方向、把握阴阳时令，才能真正调动人体自身的调节能力。", "contraindication": "", "keywords": "针刺补泻,迎随,调和阴阳"}, {"id": 1088, "source": "黄帝内经", "article_number": "55", "liujing": "", "chapter": "素问·长刺节", "original_text": "病初起，刺之而已。其病深者，名曰阴痹。阴痹者，按之乃得之。病在肌肤，肌肤尽痛，名曰肌痹，伤于寒湿，刺大分小分。", "tags": "长刺节,渐进深刺,痹证刺法", "formula": "", "formula_detail": "", "ni_annotation": "'长刺节'论述根据病程深浅采用不同的针刺策略。'病初起刺之而已'——病在浅表初期只需浅刺即可治愈。病深入成为'阴痹'(深层的痹证)则需要按压才能摸到痛点，说明邪气已经深入。'肌痹'是寒湿伤于肌肉导致全部肌肉都痛，要刺肌肉的分肉之间(大分小分即肌肉间隙)。这种根据病位深浅决定针刺深度的方法非常科学，体现了循序渐进的治疗策略。", "contraindication": "", "keywords": "刺法,病位深浅,循序渐进"}, {"id": 1089, "source": "黄帝内经", "article_number": "56", "liujing": "", "chapter": "素问·皮部论", "original_text": "欲知皮部分，以经脉为纪。诸经皆然。阳明之阳，名曰害蜚，上下同法，视其部中有浮络者，皆阳明之络也。", "tags": "皮部,十二皮部,浮络望诊", "formula": "", "formula_detail": "", "ni_annotation": "'皮部'是体表按经脉划分的区域，是经络系统在皮肤的投影。十二经脉各有自己的皮部区域，如阳明经的皮部叫'害蜚'(意为像飞虫侵害一样)。'视其部中有浮络者'——观察皮部区域内浮现的络脉(静脉)可以诊断该经的病变：颜色鲜红为热、暗红为瘀、苍白为寒、青紫为痛。皮部理论是中医皮肤望诊的基础，也为刮痧、皮肤针等外治法提供了理论依据。", "contraindication": "", "keywords": "皮部,皮肤分区,络脉望诊"}, {"id": 1090, "source": "黄帝内经", "article_number": "57", "liujing": "", "chapter": "素问·经络论", "original_text": "经脉为里，支而横者为络，络之别者为孙。盛而血者疾诛之，盛而泻之，虚而饮药以补之。", "tags": "经络,经脉络脉孙络,经络层次", "formula": "", "formula_detail": "", "ni_annotation": "此篇明确经络系统的层次结构：'经脉为里'——经脉在深层是主干；'支而横者为络'——从经脉横向分出的分支是络脉；'络之别者为孙'——络脉再细分的最小微支叫孙络。三者构成从主干到末梢的完整网络。'盛而血者疾诛之'——络脉充血淤血的要用刺络放血法快速去除；'虚而饮药以补之'——虚证则要服药补益。这个层次划分对选择治疗方法很重要：病在经脉用针，病在络脉可放血。", "contraindication": "", "keywords": "经络,经脉络脉,刺络补虚"}, {"id": 1091, "source": "黄帝内经", "article_number": "58", "liujing": "", "chapter": "素问·气穴论", "original_text": "脏俞五十穴，腑俞七十二穴，热俞五十九穴，水俞五十七穴，头上五行行五，五五二十五穴。凡三百六十五穴，针之所由行也。", "tags": "气穴,腧穴总数,穴分类", "formula": "", "formula_detail": "", "ni_annotation": "'气穴论'统计和分类全身腧穴。五脏各有背俞穴共50个(每脏10个？)，六腑背俞72个，治疗热病的特定穴59个(著名的'热病五十九刺')，治疗水肿的穴57个，头部五行每行5穴共25个。总共365穴对应一年365天。虽然实际常用穴位远不到365个，但这种'天人合一'的分类思路体现了古人对腧穴系统的整体认识。热俞和水俞两组穴位在临床治疗发热和水肿时非常有用。", "contraindication": "", "keywords": "腧穴,热俞,水俞,穴位分类"}, {"id": 1092, "source": "黄帝内经", "article_number": "59", "liujing": "", "chapter": "素问·气府论", "original_text": "足太阳脉气所发者，七十八穴。足少阳脉气所发者，六十二穴。足阳明脉气所发者，六十八穴。手太阳脉气所发者，三十六穴。", "tags": "气府,各经穴数,经脉穴位", "formula": "", "formula_detail": "", "ni_annotation": "'气府'指经脉之气汇聚流通的处所即腧穴。本篇按经脉逐一列举各经的穴位数目：太阳经78穴(穴位最多，因其循行长覆盖广)、少阳62穴、阳明68穴、手太阳36穴……这种按经统计的方式帮助学者系统记忆穴位归属。每一条经脉上的穴位都是该经气血输注的特殊部位，刺激这些穴位可以调节整条经脉的功能。学习针灸必须先掌握各经有哪些穴位分布在哪些位置。", "contraindication": "", "keywords": "气府,经穴数目,穴位归属"}, {"id": 1093, "source": "黄帝内经", "article_number": "60", "liujing": "", "chapter": "素问·骨空论", "original_text": "风者，百病之始也。风从外入，令人振寒汗出头痛，身重恶寒，治在风府，调其阴阳，不足则补，有余则泻。", "tags": "骨空,风府穴,风寒治疗", "formula": "", "formula_detail": "", "ni_annotation": "'骨空'指骨骼间孔隙(多为穴位所在)。本篇重点介绍几个关键穴位及其主治。再次强调'风者百病之始'——风邪是一切疾病的开端。风邪外入的症状：寒战出汗头痛身重怕冷。治疗取'风府穴'(督脉穴在后发际上一寸)，方法是'调其阴阳'——虚补实泻。风府穴是祛风要穴，凡是风邪为患的疾病(感冒、头痛、中风、癫痫等)都可以配用风府。掌握关键要穴的主治可以事半功倍。", "contraindication": "", "keywords": "骨空,风府穴,祛风要穴"}, {"id": 1094, "source": "黄帝内经", "article_number": "61", "liujing": "", "chapter": "素问·水热穴论", "original_text": "肾者，胃之关也，关门不利，故聚水而从其类也。上下溢于皮肤，故为胕肿。胕肿者，聚水而生病者也。帝曰：水俞五十七处者，是何主也？", "tags": "水热穴,肾为胃关,水肿取穴", "formula": "", "formula_detail": "", "ni_annotation": "'肾者胃之关也'——肾脏是胃(水谷之海)的关口，控制着水液的出入。如果肾的'关门'功能障碍(肾阳虚不能气化水液)，水就会聚集形成水肿。'水俞五十七处'专门列出治疗水肿的57个穴位，主要分布在腰背部和下肢——因为这些区域与肾和膀胱经关系密切，刺激这些穴位可以促进水液排泄。治疗水肿的根本在温肾化气，针刺只是辅助手段，关键还要恢复肾的气化功能。", "contraindication": "", "keywords": "肾为胃关,水肿,水俞五十七穴"}, {"id": 1095, "source": "黄帝内经", "article_number": "62", "liujing": "", "chapter": "素问·调经论", "original_text": "人之所有者，血与气耳。帝曰：神有余有不足，气有余有不足，血有余有不足，形有余有不足，志有余有不足，凡十有余，五不足。", "tags": "调经,气血神形态,虚实补泻", "formula": "", "formula_detail": "", "ni_annotation": "'调经论'是论述如何通过针刺调节经脉气血的经典篇章。'人之所有者血与气耳'——人体最基本的物质就是气和血，一切生理活动都依赖气血的正常运行。气血之外还有神、形、志五个方面，每个都有有余(实证)和不足(虚证)两种情况共十种。治疗原则：有余者泻之(祛除多余)，不足者补之(填补亏损)。'调经'就是通过各种方法使气血恢复协调平衡，这是中医治病的终极目标。", "contraindication": "", "keywords": "调经,气血平衡,补虚泻实"}, {"id": 1096, "source": "黄帝内经", "article_number": "63", "liujing": "", "chapter": "素问·缪刺论", "original_text": "邪客于皮毛，入舍于孙络，留而不去，闭塞不通，不得入于经，流溢于大络，而生奇病。夫邪客大络者，左注右，右注左，上下左右，与经相干，而布于四末。", "tags": "缪刺,左病右取,络脉病变", "formula": "", "formula_detail": "", "ni_annotation": "'缪刺'是一种特殊的针刺方法——左病刺右侧穴位、右病刺左侧穴位('缪'通'谬'意为交错)。适用于邪气不在经脉而在大络(较大的络脉)，且病邪左右流注的情况。原理是：邪气在大络中可以左右交叉流注，所以在病位的对侧针刺可以截断邪气的传变路径。缪刺法对于面瘫、扭伤、各种疼痛(尤其左右交替出现者)常有奇效。这是《内经》' cross-body treatment '思想的典型代表。", "contraindication": "", "keywords": "缪刺,左病右取,交叉取穴"}, {"id": 1097, "source": "黄帝内经", "article_number": "64", "liujing": "", "chapter": "素问·四时刺逆从论", "original_text": "春气在经脉，夏气在孙络，长夏气在肌肉，秋气在皮肤，冬气在骨髓。春刺经脉，血气外溢，令人少气。春刺孙络，血气不出，令人少气。春刺肌肉，血气环逆，令人呕血。", "tags": "四时针刺,逆从顺忌,时令刺法", "formula": "", "formula_detail": "", "ni_annotation": "此篇论述不同季节针刺不同部位的顺逆后果。春气主经脉(春天阳气升发在经脉中运行)，夏气主孙络(夏天阳气外达最细微的络脉)，长夏主肌肉，秋主皮肤，冬主骨髓。如果春天不刺经脉而去刺孙络(违背时令)，就会'血气不出令人少气'；刺肌肉则'血气环逆令人呕血'。这就是'逆从'——顺应时令的刺法效果好，违反时令的刺法会产生不良反应。针刺必须结合四时阴阳的变化规律。", "contraindication": "", "keywords": "四时刺法,顺时避忌,天人合一"}, {"id": 1098, "source": "黄帝内经", "article_number": "65", "liujing": "", "chapter": "素问·标本病传论", "original_text": "病反其本，得标之病；治反其本，得标之方。知标本者，万举万当；不知标本，是谓妄行。夫病传者，心病先心痛。", "tags": "标本,病传规律,治病求本", "formula": "", "formula_detail": "", "ni_annotation": "'标本'是中医极其重要的辩证思维方法。'本'是根本、源头，'标'是表象、枝节。'知标本者万举万当'——掌握了标本关系，处理任何问题都能恰当到位。'病传'指疾病在脏腑间的传变规律：心病最先表现为心痛→一天后传到肺→三天后传到肝脏……这种传变规律可以帮助预测病情发展趋势，提前采取措施阻断传变路径。标本理论和病传规律结合使用是高明医生的标志。", "contraindication": "", "keywords": "标本,病传,治病求本,预防传变"}, {"id": 1099, "source": "黄帝内经", "article_number": "66", "liujing": "", "chapter": "素问·天元纪大论", "original_text": "五运阴阳者，天地之道也，万物之纲纪，变化之父母，生杀之本始，神明之府也，可通乎神明矣。夫五运阴阳者，天地之道也。", "tags": "五运六气,天元纪,运气总纲", "formula": "", "formula_detail": "", "ni_annotation": "天元纪大论是五运六气理论的入门总纲。'五运'指木火土金水五行的运行流转(以十天干推算)，'六气'指风热火湿燥寒六种气候的变化(以十二地支推算)。五运阴阳是天地的根本法则，主宰万物的生长收藏。五运六气学说认为自然界的周期性气候变化直接影响人体健康，同一年出生的人体质倾向不同(先天运气不同)，每年的流行病也与当年运气密切相关。这是中医最高层次的预防医学理论。", "contraindication": "", "keywords": "五运六气,天元纪,运气学说,周期变化"}, {"id": 1100, "source": "黄帝内经", "article_number": "67", "liujing": "", "chapter": "素问·五运行大论", "original_text": "丹天之气，经于牛女戊分；黅天之气，经于心尾己分；苍天之气，经于危室柳鬼；素天之气，经于亢氐昂毕；玄天之气，经于张翼娄胃。所谓戊己分者，奎壁角轸，则天地之门户也。", "tags": "五运,天干五色,天地门户", "formula": "", "formula_detail": "", "ni_annotation": "'五运行大论'详细解释五运在天体星象上的分布。五种颜色的'气'(丹=红/火、黅=黄/土、苍=青/木、素=白/金、玄=黑/水)分别经过特定的星空区域(二十八宿)，并与天干方位对应。'奎壁角轸为天地门户'——春分(奎壁)和秋分(角轸)是阴阳交接的关键点。虽然涉及较多天文知识，但其核心思想是：五行之气的运行与天文周期同步，人体五脏与之共振。这是五运六气学说的天文基础。", "contraindication": "", "keywords": "五运行,五星,二十八宿,天文对应"}, {"id": 1101, "source": "黄帝内经", "article_number": "68", "liujing": "", "chapter": "素问·六微旨大论", "original_text": "六气应五行之变也，失常则灾害至矣。故曰：天之在我者德也，地之在我者气也，德流气薄而生者也。上下相遘，寒暑相推。", "tags": "六微旨,六气变化,气交升降", "formula": "", "formula_detail": "", "ni_annotation": "'六微旨大论'揭示六气变化的微妙规律。六气(风君火相火湿热燥寒)与五行对应，正常情况下有序循环，'失常则灾害至矣'——气候异常会导致疾病流行。'德流气薄而生'——天的德(阳光温暖)和地的气(水土养分)交流融合产生了生命。'上下相遘'——天地之气相交(气交)是生命存在的条件。六气每步各主六十天又八十七刻半，一步接一步周而复始。理解六气的正常运行和异常变化是预测疾病的关键。", "contraindication": "", "keywords": "六气,气交,升降出入,气候周期"}, {"id": 1102, "source": "黄帝内经", "article_number": "69", "liujing": "", "chapter": "素问·气交变大论", "original_text": "岁木太过，风气流行，脾土受邪。民病飧泄食减，体重烦冤，肠鸣腹支满，上应岁星。甚则忽忽善怒，眩冒巅疾。", "tags": "气交变大,岁运太过不及,运气致病", "formula": "", "formula_detail": "", "ni_annotation": "'气交变大论'讨论当岁运出现'太过'(亢盛)或'不及'(衰减)时会出现的异常气候和疾病模式。以'岁木太过'为例：木运太过年份风气盛行→木克土→脾脏受邪→出现腹泻食欲下降体重增加腹胀肠鸣等症状(全是脾虚湿盛的表现)；严重时肝火上炎→易怒眩晕头顶痛。每种岁运的太过不及都有对应的病症谱，医生可以根据当年的运气特点预判可能流行的疾病类型并提前防治。", "contraindication": "", "keywords": "岁运太过,木运太过,脾土受邪,运气发病"}, {"id": 1103, "source": "黄帝内经", "article_number": "70", "liujing": "", "chapter": "素问·五常政大论", "original_text": "敷和之纪(木委和):其化生荣，其气达，其政发散，其令宣发，其变动摧拉，其病怒，其味酸，其象春，其经足厥阴少阳。升明之纪(火)……", "tags": "五常政,五运平气,敷和升明", "formula": "", "formula_detail": "", "ni_annotation": "'五常政大论'描述五运处于'平气'(正常)状态时的各种特征。木运正常年份叫'敷和之纪'：气候温和万物繁荣，对应春季酸味足厥阴少阳经，异常时易怒(肝志为怒)，变动时树木被摧折(风灾)。火运正常叫'升明之纪'，土运正常叫'备化之纪'，金运正常叫'审平之纪'，水运正常叫'静顺之纪'。每种平气状态都有完整的属性描述(气候物候病变气味经络等)，构成了一个庞大的宇宙-人体对应系统。", "contraindication": "", "keywords": "五常政,敷和,平气,五运正常态"}, {"id": 1104, "source": "黄帝内经", "article_number": "71", "liujing": "", "chapter": "素问·六元正纪大论", "original_text": "辰戌之岁，初之气，地气迁，气乃大温，草乃早荣，民乃厉，温病乃作。二之气，大凉反至，草木乃寒，民病气郁中满。", "tags": "六元正纪,逐年气运,六步气候", "formula": "", "formula_detail": "", "ni_annotation": "'六元正纪大论'是五运六气中最详细的逐年气候预测手册。以辰戌年为例：初之气(大寒到春分)气候异常温暖→植物早发芽→容易出现疫疠和温病；二之气(春分到小满)突然大凉反常→植物遇寒→人们出现气滞胸闷腹胀。每年分六步(六个时间段)每步约六十天，详细描述各步的气候特点和易发疾病。虽然不完全精确对应每年的实际情况，但它提供了一个分析气候与健康关系的系统性框架。", "contraindication": "", "keywords": "六元正纪,逐年气候预测,六步主气"}, {"id": 1105, "source":
