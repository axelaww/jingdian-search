 "tags": "小结胸,心下,按之痛,脉浮滑", "formula": "小陷胸汤", "formula_detail": "黄连一两、半夏半升(洗)、栝蒌实大者一枚", "ni_annotation": "小结胸与大结胸不同：大结胸从心下至少腹硬满、按之石硬不按亦痛；小结胸正在心下、按之才痛、不按不痛。脉浮滑，浮为热浅、滑为痰盛。病位浅、范围小、程度轻。小陷胸汤黄连清热、半夏化痰、栝蒌宽胸散结，药力远逊大陷胸汤。临床治胃炎、食管炎见此证者甚效。", "contraindication": "", "keywords": "小陷胸汤,小结胸,按之痛,脉浮滑,心下"}, {"id": 139, "source": "伤寒论", "article_number": "139", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "太阳病，二三日，不能卧，但欲起者，心下必结，脉微弱者，此本有寒分也。反下之，若利止，必作结胸；未止者，四日复下之，此作协热利也。", "tags": "不能卧,心下结,脉微弱,寒分,协热利", "formula": "", "formula_detail": "", "ni_annotation": "不能卧但欲起，是心下有结压迫所致。脉微弱说明本有寒饮（寒分）。此时若误下，邪热内陷与寒饮互结，利止则成结胸。若利不止，又反复下之，则成协热利。此条告诫：素有寒饮者，虽有心下结，不可妄下。", "contraindication": "素有寒饮者禁下", "keywords": "心下结,寒分,协热利,禁下"}, {"id": 140, "source": "伤寒论", "article_number": "140", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "太阳病，下之，其脉促，不结胸者，此为欲解也。脉浮者，必结胸；脉紧者，必咽痛；脉弦者，必两胁拘急；脉细数者，头痛未止；脉沉紧者，必欲呕；脉沉滑者，协热利；脉浮滑者，必下血。", "tags": "误下后变证,脉促,结胸,咽痛,两胁拘急,头痛,欲呕,协热利,下血", "formula": "", "formula_detail": "", "ni_annotation": "太阳病误下后，凭脉辨证。脉促不结胸者，正气尚能抗邪外出，故为欲解。以下各种脉象推测变证：浮为邪结于上则结胸；紧为寒束则咽痛；弦为少阳则两胁拘急；细数为热上攻则头痛；沉紧为邪在里则欲呕；沉滑为热迫下则协热利；浮滑为热伤血络则下血。此以脉测证之法。", "contraindication": "", "keywords": "误下变证,以脉测证,脉促欲解"}, {"id": 141, "source": "伤寒论", "article_number": "141", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "太阳病，二三日，不能卧，但欲起，心下结，脉微弱者，此有寒分也。反下之，若利止，必作结胸。未止者，四日复下之，此作协热利也。病在阳，应以汗解之，反以冷水潠之，若灌之，其热被劫不得去，弥更益烦，肉上粟起，意欲饮水，反不渴者，服文蛤散。若不瘥者，与五苓散。寒实结胸，无热证者，与三物小陷胸汤，白散亦可服。", "tags": "寒实结胸,文蛤散,五苓散,白散,冷水潠,肉上粟起", "formula": "文蛤散", "formula_detail": "", "ni_annotation": "此条辨水寒之证。以冷水潠灌，热被水阻不得外泄，更增烦热，肉上粟起即鸡皮疙瘩。意欲饮水反不渴，是热虽在表而津未大伤，文蛤散清热利湿。不瘥则水饮较甚，用五苓散化气行水。寒实结胸无热证，当温寒逐水，三物白散（桔梗、贝母、巴豆）攻寒实之结。", "contraindication": "", "keywords": "文蛤散,寒实结胸,白散,五苓散"}, {"id": 142, "source": "伤寒论", "article_number": "142", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "太阳与少阳并病，头项强痛，或眩冒，时如结胸，心下痞硬者，当刺大椎第一间、肺俞、肝俞，慎不可发汗，发汗则谵语，脉弦，五六日谵语不止，当刺期门。", "tags": "太阳少阳并病,头项强痛,眩冒,结胸,心下痞硬,刺大椎,谵语", "formula": "", "formula_detail": "", "ni_annotation": "太阳少阳并病，既有太阳头项强痛，又有少阳眩冒。时如结胸、心下痞硬，是少阳枢机不利。此证不可发汗，汗之则津伤热盛而谵语。刺大椎、肺俞解太阳，刺肝俞解少阳。若谵语不止，刺期门泻肝热。针刺与汤药并用，是仲景治法之一。", "contraindication": "禁发汗", "keywords": "太阳少阳并病,针刺,大椎,肺俞,肝俞,期门"}, {"id": 143, "source": "伤寒论", "article_number": "143", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "妇人中风，发热恶寒，经水适来，得之七八日，热除而脉迟身凉，胸胁下满，如结胸状，谵语者，此为热入血室也，当刺期门，随其实而取之。", "tags": "热入血室,妇人中风,经水适来,胸胁满,谵语,刺期门", "formula": "", "formula_detail": "", "ni_annotation": "妇人中风恰逢月经来潮，邪热乘虚入于血室。热除脉迟身凉，非病解，而是邪陷于里。胸胁下满如结胸状，是肝经瘀热；谵语是血热扰心。刺期门泻肝经实热，此为热入血室第一证。临床上经期外感发热要注意此证。", "contraindication": "", "keywords": "热入血室,经期外感,刺期门,谵语"}, {"id": 144, "source": "伤寒论", "article_number": "144", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "妇人中风，七八日续得寒热，发作有时，经水适断者，此为热入血室，其血必结，故使如疟状，发作有时，小柴胡汤主之。", "tags": "热入血室,经水适断,寒热如疟,小柴胡汤", "formula": "小柴胡汤", "formula_detail": "", "ni_annotation": "此热入血室第二证。中风七八日，月经中断，邪热入血室与血相结，正邪交争如疟状寒热发作有时。小柴胡汤和解少阳，使枢机运转，邪热得解。此证较143条为轻，尚未谵语，只是寒热如疟。", "contraindication": "", "keywords": "热入血室,小柴胡汤,经水适断,寒热如疟"}, {"id": 145, "source": "伤寒论", "article_number": "145", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "妇人伤寒，发热，经水适来，昼日明了，暮则谵语，如见鬼状者，此为热入血室。无犯胃气及上二焦，必自愈。", "tags": "热入血室,经水适来,昼日明了,暮则谵语,如见鬼状", "formula": "", "formula_detail": "", "ni_annotation": "热入血室第三证。昼日明了、暮则谵语，因白昼阳气行于表，夜则阴气用事，血室之热随阴分而发，故暮则谵语如见鬼状。无犯胃气及上二焦，即不可用吐下犯中焦胃气，不可发汗犯上焦，不可用凉药犯上二焦。待经行尽，热随血去则自愈。", "contraindication": "禁吐下、禁发汗", "keywords": "热入血室,暮则谵语,自愈"}, {"id": 146, "source": "伤寒论", "article_number": "146", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒六七日，发热微恶寒，支节烦疼，微呕，心下支结，外证未去者，柴胡桂枝汤主之。", "tags": "发热微恶寒,支节烦疼,微呕,心下支结,太阳少阳并病", "formula": "柴胡桂枝汤", "formula_detail": "", "ni_annotation": "此太阳少阳并病之轻证。发热微恶寒、支节烦疼是太阳表证未解；微呕、心下支结是少阳枢机不利。发热微、恶寒微、微呕，都是'微'字，说明邪不重。柴胡桂枝汤即小柴胡汤合桂枝汤，双解太阳少阳。临床常用此方治外感后期迁延不愈、低热不退者。", "contraindication": "", "keywords": "柴胡桂枝汤,太阳少阳并病,微恶寒,微呕,心下支结"}, {"id": 147, "source": "伤寒论", "article_number": "147", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒五六日，已发汗而复下之，胸胁满微结，小便不利，渴而不呕，但头汗出，往来寒热，心烦者，此为未解也，柴胡桂枝干姜汤主之。", "tags": "胸胁满微结,小便不利,渴而不呕,头汗出,往来寒热,心烦", "formula": "柴胡桂枝干姜汤", "formula_detail": "", "ni_annotation": "汗下之后，邪陷少阳，枢机不利。胸胁满微结是少阳邪结；往来寒热、心烦是少阳主证；小便不利、渴是津伤水停；但头汗出是阳热上蒸；不呕说明胃气未逆。柴胡桂枝干姜汤：柴胡、黄芩和解少阳，桂枝、干姜温阳化饮，栝蒌根生津止渴，牡蛎软坚散结。此方治少阳兼水饮内停之证。", "contraindication": "", "keywords": "柴胡桂枝干姜汤,胸胁满微结,往来寒热,小便不利,渴"}, {"id": 148, "source": "伤寒论", "article_number": "148", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒五六日，头汗出，微恶寒，手足冷，心下满，口不欲食，大便硬，脉细者，此为阳微结，必有表复有里也。脉沉亦在里也。汗出为阳微。假令纯阴结，不得复有外证，悉入在里，此为半在里半在外也。脉虽沉紧，不得为少阴病，所以然者，阴不得有汗，今头汗出，故知非少阴也，可与小柴胡汤。设不了了者，得屎而解。", "tags": "阳微结,头汗出,微恶寒,手足冷,心下满,大便硬,半在里半在外", "formula": "小柴胡汤", "formula_detail": "", "ni_annotation": "此条辨阳微结与阴结。头汗出是阳邪上蒸，微恶寒是表邪未解，手足冷是阳郁不伸。心下满、口不欲食、大便硬是里结。此为半在里半在外，即少阳证。纯阴结则无外证、无头汗。阴不得有汗，今有头汗故非少阴。与小柴胡汤和解少阳。设不了了者是里未尽通，得屎则解。", "contraindication": "", "keywords": "阳微结,半在里半在外,小柴胡汤,阴结鉴别"}, {"id": 149, "source": "伤寒论", "article_number": "149", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒五六日，呕而发热者，柴胡汤证具，而以他药下之，柴胡证仍在者，复与柴胡汤。此虽已下之，不为逆，必蒸蒸而振，却发热汗出而解。若心下满而硬痛者，此为结胸也，大陷胸汤主之。但满而不痛者，此为痞，柴胡不中与之，宜半夏泻心汤。", "tags": "柴胡证,呕而发热,结胸,痞,半夏泻心汤,蒸蒸而振", "formula": "半夏泻心汤", "formula_detail": "半夏半升(洗)、黄芩、干姜、人参、甘草(炙)各三两、黄连一两、大枣十二枚(擘)", "ni_annotation": "此条为柴胡证误下后的三种转归：一、柴胡证仍在，复与柴胡汤，正气奋起抗邪，蒸蒸而振后汗出解；二、邪热内陷成结胸，心下满而硬痛，大陷胸汤主之；三、邪陷成痞，但满而不痛，半夏泻心汤主之。半夏泻心汤为寒热并用、辛开苦降、补泻兼施之代表方，治中焦寒热错杂之痞。", "contraindication": "", "keywords": "半夏泻心汤,痞,结胸,柴胡证误下,寒热错杂"}, {"id": 150, "source": "伤寒论", "article_number": "150", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "太阳少阳并病，而反下之，成结胸，心下硬，下利不止，水浆不下，其人心烦。", "tags": "太阳少阳并病,误下,结胸,心下硬,下利不止,心烦", "formula": "", "formula_detail": "", "ni_annotation": "太阳少阳并病当和解，反下之则邪陷成结胸。心下硬是结胸，下利不止是中气大伤，水浆不入是胃气将败，心烦是邪热扰心。此为误下后的坏证，邪实正虚，攻之则正脱，补之则助邪，治疗甚难。", "contraindication": "", "keywords": "太阳少阳并病,误下坏证,结胸,下利不止"}, {"id": 151, "source": "伤寒论", "article_number": "151", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "脉浮而紧，而复下之，紧反入里，则作痞，按之濡，其脉关上浮者，大黄黄连泻心汤主之。", "tags": "痞,脉浮紧,误下,紧反入里,按之濡,关上浮", "formula": "大黄黄连泻心汤", "formula_detail": "大黄二两、黄连一两", "ni_annotation": "脉浮紧为太阳伤寒，误下则邪陷成痞。痞者按之濡（软），与结胸按之硬痛不同。关上浮是中焦有热。大黄黄连泻心汤仅二味药，以麻沸汤渍之取其气薄，不取其味厚，泻心下无形之热。此治热痞之正方。", "contraindication": "", "keywords": "大黄黄连泻心汤,热痞,按之濡,关上浮"}, {"id": 152, "source": "伤寒论", "article_number": "152", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "太阳中风，下利呕逆，表解者，乃可攻之。其人漐漐汗出，发作有时，头痛，心下痞硬满，引胁下痛，干呕短气，汗出不恶寒者，此表解里未和也，十枣汤主之。", "tags": "悬饮,下利呕逆,漐漐汗出,心下痞硬满,引胁下痛,干呕短气", "formula": "十枣汤", "formula_detail": "芫花(熬)、甘遂、大戟各等分", "ni_annotation": "此条论悬饮证。太阳中风兼下利呕逆，当先解表，表解后方可攻里。汗出不恶寒是表已解。心下痞硬满引胁下痛，是水饮停聚于胁下（悬饮）；干呕是水饮上逆；短气是水饮迫肺。十枣汤芫花、甘遂、大戟三味均为峻逐水饮之药，以大枣十枚煎汤送服，顾护胃气。此方攻逐之力甚猛，用时须慎。", "contraindication": "表未解者禁用；体虚者慎用", "keywords": "十枣汤,悬饮,引胁下痛,攻逐水饮"}, {"id": 153, "source": "伤寒论", "article_number": "153", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "太阳病，医发汗，遂发热恶寒，因复下之，心下痞，表里俱虚，阴阳气并竭，无阳则阴独，复加烧针，因胸烦，面色青黄，肤瞤者，难治；今色微黄，手足温者，易愈。", "tags": "误汗误下,心下痞,表里俱虚,烧针,胸烦,面色青黄,肤瞤", "formula": "", "formula_detail": "", "ni_annotation": "汗下之后表里俱虚，又加烧针，一误再误。无阳则阴独，阳气大伤则阴寒独盛。面色青黄是气血衰败、寒凝气滞之象；肤瞤是筋脉失养、虚风内动，故难治。若面色微黄、手足温，说明胃气尚存、阳气未绝，故易愈。此条告诫不可一误再误。", "contraindication": "", "keywords": "表里俱虚,烧针误治,面色青黄,难治"}, {"id": 154, "source": "伤寒论", "article_number": "154", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "心下痞，按之濡，其脉关上浮者，大黄黄连泻心汤主之。", "tags": "心下痞,按之濡,关上浮,热痞", "formula": "大黄黄连泻心汤", "formula_detail": "大黄二两、黄连一两", "ni_annotation": "此条重申热痞的辨证与治疗。心下痞即胃脘部痞塞不适，按之软（濡），说明无实邪结聚，只是无形之热所致。关脉候中焦，关上浮是中焦有热。大黄黄连泻心汤以麻沸汤浸渍，取其轻清之气以泻心下无形之热，不取其苦寒攻下之力。", "contraindication": "", "keywords": "大黄黄连泻心汤,热痞,按之濡,关上浮"}, {"id": 155, "source": "伤寒论", "article_number": "155", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "心下痞，而复恶寒汗出者，附子泻心汤主之。", "tags": "心下痞,恶寒汗出,寒热错杂,阳虚", "formula": "附子泻心汤", "formula_detail": "大黄二两、黄连一两、黄芩一两、附子一枚(炮去皮破别煮取汁)", "ni_annotation": "心下痞是中焦有热，恶寒汗出是表阳不足。既有热痞又兼阳虚，寒热并见。附子泻心汤中三黄清热消痞，附子温阳固表。尤妙在附子别煮取汁，三黄以麻沸汤渍之，寒热异其气，生熟异其性，并行不悖。此方寒热并用之妙，开后世先河。", "contraindication": "", "keywords": "附子泻心汤,热痞兼阳虚,恶寒汗出,寒热并用"}, {"id": 156, "source": "伤寒论", "article_number": "156", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "本以下之，故心下痞，与泻心汤，痞不解，其人渴而口燥烦，小便不利者，五苓散主之。", "tags": "心下痞,渴,口燥烦,小便不利,水痞", "formula": "五苓散", "formula_detail": "", "ni_annotation": "心下痞与泻心汤不解，当求其因。渴而口燥烦、小便不利，是膀胱气化不利、水饮内停。水饮上逆于心下亦可致痞，此为水痞，非热痞。五苓散化气行水，水去则痞解。此示人见痞不可概用泻心汤，当辨其因。", "contraindication": "", "keywords": "五苓散,水痞,小便不利,渴"}, {"id": 157, "source": "伤寒论", "article_number": "157", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒汗出解之后，胃中不和，心下痞硬，干噫食臭，胁下有水气，腹中雷鸣，下利者，生姜泻心汤主之。", "tags": "心下痞硬,干噫食臭,胁下有水气,腹中雷鸣,下利,水饮食滞", "formula": "生姜泻心汤", "formula_detail": "生姜四两(切)、甘草三两(炙)、人参三两、干姜一两、黄芩三两、半夏半升(洗)、黄连一两、大枣十二枚(擘)", "ni_annotation": "此条论水饮食滞致痞。汗解后胃气不和，心下痞硬。干噫食臭是宿食停滞、胃气上逆；胁下有水气、腹中雷鸣是水饮内停；下利是水趋大肠。生姜泻心汤即半夏泻心汤减干姜加生姜，生姜散水气、降胃逆，干姜仅一两温中阳，全方散水消痞、调和肠胃。", "contraindication": "", "keywords": "生姜泻心汤,干噫食臭,腹中雷鸣,水饮食滞"}, {"id": 158, "source": "伤寒论", "article_number": "158", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒中风，医反下之，其人下利日数十行，谷不化，腹中雷鸣，心下痞硬而满，干呕心烦不得安。医见心下痞，谓病不尽，复下之，其痞益甚，此非结热，但以胃中虚，客气上逆，故使硬也，甘草泻心汤主之。", "tags": "下利日数十行,谷不化,腹中雷鸣,心下痞硬满,干呕心烦,胃中虚,客气上逆", "formula": "甘草泻心汤", "formula_detail": "甘草四两(炙)、黄芩三两、干姜三两、半夏半升(洗)、大枣十二枚(擘)、黄连一两", "ni_annotation": "此条论胃虚致痞之重证。误下后下利日数十行、谷不化，是脾胃大虚。腹中雷鸣是水饮走窜。心下痞硬而满、干呕心烦不得安，是客气上逆。医不知胃虚，又复下之，痞更甚。此非结热，而是胃虚客气上逆。甘草泻心汤即半夏泻心汤加重甘草，取甘草补中缓急，治虚痞之重证。", "contraindication": "禁再下", "keywords": "甘草泻心汤,胃虚致痞,下利谷不化,客气上逆"}, {"id": 159, "source": "伤寒论", "article_number": "159", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒，服汤药，下利不止，心下痞硬。服泻心汤已，复以他药下之，利不止，医以理中与之，利益甚。理中者，理中焦，此利在下焦，赤石脂禹余粮汤主之。复不止者，当利其小便。", "tags": "下利不止,心下痞硬,利在下焦,理中无效", "formula": "赤石脂禹余粮汤", "formula_detail": "", "ni_annotation": "此条论下利部位不同治法不同。服泻心汤痞解而利不止，又误下之。利不止用理中汤反甚，因为此利不在中焦而在下焦，是下焦不固、滑脱不禁。赤石脂禹余粮汤固涩下焦、收敛止利。若复不止，是水饮偏渗大肠，当利小便以实大便。此示人治利当辨病位。", "contraindication": "", "keywords": "赤石脂禹余粮汤,下焦滑脱,下利不止,利小便"}, {"id": 160, "source": "伤寒论", "article_number": "160", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒吐下后，发汗，虚烦，脉甚微，八九日心下痞硬，胁下痛，气上冲咽喉，眩冒，经脉动惕者，久而成痿。", "tags": "虚烦,脉甚微,心下痞硬,胁下痛,气上冲咽喉,眩冒,经脉动惕,痿", "formula": "", "formula_detail": "", "ni_annotation": "吐下后又发汗，阳气阴液俱伤。虚烦脉甚微是正虚之象。心下痞硬、胁下痛是中焦枢机不利。气上冲咽喉是虚阳上越。眩冒是清阳不升。经脉动惕是筋脉失养。日久气血不能营养筋骨，则成痿证。此条论述误治后正虚致痿的病机。", "contraindication": "", "keywords": "虚烦,经脉动惕,痿证,误治"}, {"id": 161, "source": "伤寒论", "article_number": "161", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒发汗，若吐若下，解后，心下痞硬，噫气不除者，旋覆代赭汤主之。", "tags": "心下痞硬,噫气不除,胃虚痰阻", "formula": "旋覆代赭汤", "formula_detail": "旋覆花三两、人参二两、生姜五两、代赭一两、甘草三两(炙)、半夏半升(洗)、大枣十二枚(擘)", "ni_annotation": "汗吐下后，胃气受伤，痰浊内阻。心下痞硬是痰气交阻中焦，噫气不除是胃虚气逆。旋覆花下气消痰，代赭石重镇降逆，人参、甘草、大枣补中，半夏、生姜化痰降逆。此方治胃虚痰阻之噫气，临床治呃逆、神经性嗳气甚效。代赭用量仅一两，取其重镇而不伤胃。", "contraindication": "", "keywords": "旋覆代赭汤,噫气不除,心下痞硬,胃虚痰阻"}, {"id": 162, "source": "伤寒论", "article_number": "162", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "下后，不可更行桂枝汤。若汗出而喘，无大热者，可与麻黄杏子甘草石膏汤。", "tags": "下后,汗出而喘,无大热,麻杏石甘汤", "formula": "麻黄杏子甘草石膏汤", "formula_detail": "", "ni_annotation": "下后表邪入里化热，热壅于肺。汗出而喘，是里热迫肺；无大热，是表无大热而里有热。麻杏石甘汤清热宣肺平喘。此条下后不可再用桂枝汤，当辨变证而治。此与63条相同，但此系下后所致，汗后、下后皆可致此证。", "contraindication": "下后禁桂枝汤", "keywords": "麻杏石甘汤,汗出而喘,无大热,热壅于肺"}, {"id": 163, "source": "伤寒论", "article_number": "163", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "太阳病，外证未除而数下之，遂协热而利，利下不止，心下痞硬，表里不解者，桂枝人参汤主之。", "tags": "协热利,利下不止,心下痞硬,表里不解,外证未除", "formula": "桂枝人参汤", "formula_detail": "桂枝四两(别切)、甘草四两(炙)、白术三两、人参三两、干姜三两", "ni_annotation": "太阳病外证未除而数下之，中阳大伤，遂成协热利——表热未解而里寒下利。利下不止、心下痞硬是中焦虚寒、寒湿下注。桂枝人参汤即理中汤加桂枝，理中汤温中散寒、健脾止利，桂枝解外。此方表里同治，温中为主、解表为辅。", "contraindication": "", "keywords": "桂枝人参汤,协热利,表里不解,理中加桂枝"}, {"id": 164, "source": "伤寒论", "article_number": "164", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒，大下后，复发汗，心下痞，恶寒者，表未解也，不可攻痞，当先解表，表解乃可攻痞。解表宜桂枝汤，攻痞宜大黄黄连泻心汤。", "tags": "心下痞,恶寒,表未解,先表后里", "formula": "", "formula_detail": "", "ni_annotation": "此条论表里同病先表后里的治疗原则。大下后复发汗，心下痞是里证，恶寒是表未解。此时不可先攻痞，当先解表，表解后再攻痞。解表用桂枝汤，攻痞用大黄黄连泻心汤。此即'表解乃可攻里'的具体应用。先表后里是仲景重要治则。", "contraindication": "表未解禁攻痞", "keywords": "先表后里,表未解,桂枝汤,大黄黄连泻心汤"}, {"id": 165, "source": "伤寒论", "article_number": "165", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒发热，汗出不解，心中痞硬，呕吐而下利者，大柴胡汤主之。", "tags": "发热,汗出不解,心中痞硬,呕吐,下利,少阳阳明合病", "formula": "大柴胡汤", "formula_detail": "", "ni_annotation": "伤寒发热汗出不解，邪不在表。心中痞硬、呕吐是少阳枢机不利，下利是阳明里实逼迫。此为少阳未解、阳明里实，大柴胡汤和解少阳、通下里实。心中痞硬非虚痞，而是实邪壅滞，故用大柴胡而非泻心汤。", "contraindication": "", "keywords": "大柴胡汤,心中痞硬,呕吐下利,少阳阳明"}, {"id": 166, "source": "伤寒论", "article_number": "166", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "病如桂枝证，头不痛，项不强，寸脉微浮，胸中痞硬，气上冲咽喉，不得息者，此为胸有寒也，当吐之，宜瓜蒂散。", "tags": "胸有寒,寸脉微浮,胸中痞硬,气上冲咽喉,不得息,瓜蒂散", "formula": "瓜蒂散", "formula_detail": "瓜蒂一分(熬黄)、赤小豆一分", "ni_annotation": "病如桂枝证但头不痛项不强，说明非太阳病。寸脉微浮是邪在上焦。胸中痞硬、气上冲咽喉不得息，是痰食壅塞胸膈，气机不得上下。'胸有寒'之寒指痰饮实邪。当因势利导，用瓜蒂散涌吐之，邪在上者因而越之。瓜蒂极苦性升催吐，赤小豆酸苦泄湿，二者合用酸苦涌泄。", "contraindication": "体虚、失血者禁用", "keywords": "瓜蒂散,涌吐,胸中痞硬,气上冲,胸有寒"}, {"id": 167, "source": "伤寒论", "article_number": "167", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "病胁下素有痞，连在脐旁，痛引少腹，入阴筋者，此名藏结，死。", "tags": "藏结,胁下痞,连脐旁,痛引少腹,入阴筋,死证", "formula": "", "formula_detail": "", "ni_annotation": "素胁下有痞块，连及脐旁，痛引少腹入阴筋，这是脏结的死证。邪结深重，累及肝经下焦，阴寒凝结不通，阳气将绝。脏结本已难治，此则邪结更深、范围更广，故为死证。", "contraindication": "", "keywords": "藏结,死证,痛引少腹,入阴筋"}, {"id": 168, "source": "伤寒论", "article_number": "168", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒若吐若下后，七八日不解，热结在里，表里俱热，时时恶风，大渴，舌上干燥而烦，欲饮水数升者，白虎加人参汤主之。", "tags": "热结在里,表里俱热,时时恶风,大渴,舌上干燥而烦,欲饮水数升", "formula": "白虎加人参汤", "formula_detail": "", "ni_annotation": "吐下后邪热入里，表里俱热。大渴、舌上干燥而烦、欲饮水数升，是热盛伤津之重证。时时恶风非表未解，而是热盛汗出肌疏所致。白虎汤清阳明大热，加人参益气生津。此条大渴为辨证关键，凡白虎汤证见大渴者，皆当加人参。", "contraindication": "", "keywords": "白虎加人参汤,大渴,舌上干燥,表里俱热"}, {"id": 169, "source": "伤寒论", "article_number": "169", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒无大热，口燥渴，心烦，背微恶寒者，白虎加人参汤主之。", "tags": "无大热,口燥渴,心烦,背微恶寒", "formula": "白虎加人参汤", "formula_detail": "", "ni_annotation": "无大热是表无大热，但里有热。口燥渴、心烦是里热伤津。背微恶寒非表寒，而是热盛汗出、背部肌疏之故。背为阳之位，汗出则阳气外泄而微恶寒。此三条（168-170）皆论白虎加人参汤证，辨证要点是大渴引饮、口燥舌干。", "contraindication": "", "keywords": "白虎加人参汤,口燥渴,心烦,背微恶寒"}, {"id": 170, "source": "伤寒论", "article_number": "170", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒脉浮，发热无汗，其表不解者，不可与白虎汤。渴欲饮水，无表证者，白虎加人参汤主之。", "tags": "脉浮,发热无汗,表不解,禁白虎汤,渴欲饮水", "formula": "白虎加人参汤", "formula_detail": "", "ni_annotation": "此条是白虎汤的禁忌。脉浮发热无汗，表证未解，不可与白虎汤。白虎汤清里热，若表未解而用之，则冰伏邪气，表邪内陷。必待表解、渴欲饮水、无表证时，方可用白虎加人参汤。此条极重要，白虎汤必须里热盛而表已解者方可用之。", "contraindication": "表未解者禁用白虎汤", "keywords": "白虎汤禁忌,表不解禁用,渴欲饮水"}, {"id": 171, "source": "伤寒论", "article_number": "171", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "太阳少阳并病，心下硬，颈项强而眩者，当刺大椎、肺俞、肝俞，慎勿下之。", "tags": "太阳少阳并病,心下硬,颈项强而眩,刺大椎,慎勿下", "formula": "", "formula_detail": "", "ni_annotation": "此条与142条相似，太阳少阳并病。心下硬是少阳邪结，颈项强是太阳邪束，眩是少阳风火上扰。当刺大椎、肺俞解太阳，刺肝俞解少阳。慎勿下之，因少阳不可下，下之则变证丛生。", "contraindication": "禁下", "keywords": "太阳少阳并病,针刺,禁下"}, {"id": 172, "source": "伤寒论", "article_number": "172", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "太阳与少阳合病，自下利者，与黄芩汤；若呕者，黄芩加半夏生姜汤主之。", "tags": "太阳少阳合病,自下利,呕,黄芩汤,黄芩加半夏生姜汤", "formula": "黄芩汤", "formula_detail": "黄芩三两、芍药二两、甘草二两(炙)、大枣十二枚(擘)", "ni_annotation": "太阳少阳合病，邪热内迫大肠则自下利，黄芩汤清热止利。黄芩清少阳之热，芍药敛阴和营止痛，甘草、大枣和中。此方为治热利之祖方，后世治痢方多由此化裁。若呕者是胃气上逆，加半夏、生姜降逆止呕。", "contraindication": "", "keywords": "黄芩汤,太阳少阳合病,自下利,黄芩加半夏生姜汤"}, {"id": 173, "source": "伤寒论", "article_number": "173", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒胸中有热，胃中有邪气，腹中痛，欲呕吐者，黄连汤主之。", "tags": "胸中有热,胃中有邪气,腹中痛,欲呕吐,上热下寒", "formula": "黄连汤", "formula_detail": "黄连三两、甘草三两(炙)、干姜三两、桂枝三两(去皮)、人参二两、半夏半升(洗)、大枣十二枚(擘)", "ni_annotation": "胸中有热故欲呕吐，胃中有邪气（寒邪）故腹中痛，此上热下寒之证。黄连清上热，干姜温下寒，桂枝通阳散寒，半夏降逆止呕，人参、甘草、大枣补中。黄连汤即半夏泻心汤去黄芩加桂枝，去黄芩因胸中热不重，加桂枝以通阳散寒。此方治上热下寒之腹痛呕吐甚效。", "contraindication": "", "keywords": "黄连汤,上热下寒,腹中痛,欲呕吐"}, {"id": 174, "source": "伤寒论", "article_number": "174", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒八九日，风湿相搏，身体疼烦，不能自转侧，不呕不渴，脉浮虚而涩者，桂枝附子汤主之。若其人大便硬，小便自利者，去桂加白术汤主之。", "tags": "风湿相搏,身体疼烦,不能自转侧,不呕不渴,脉浮虚涩,大便硬,小便自利", "formula": "桂枝附子汤", "formula_detail": "", "ni_annotation": "伤寒八九日风湿相搏，身体疼烦不能转侧，是风湿留着肌肉经脉。不呕不渴说明无少阳、阳明证。脉浮虚而涩，浮为在表、虚为阳气不足、涩为湿滞。桂枝附子汤温经散寒除湿。若大便硬小便自利，是湿不在表而在里，脾气不能散精，去桂枝之走表，加白术之健脾燥湿。", "contraindication": "", "keywords": "桂枝附子汤,去桂加白术汤,风湿相搏,身体疼烦"}, {"id": 175, "source": "伤寒论", "article_number": "175", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "风湿相搏，骨节疼烦，掣痛不得屈伸，近之则痛剧，汗出短气，小便不利，恶风不欲去衣，或身微肿者，甘草附子汤主之。", "tags": "风湿相搏,骨节疼烦,掣痛不得屈伸,汗出短气,小便不利,恶风,身微肿", "formula": "甘草附子汤", "formula_detail": "", "ni_annotation": "此条风湿更深，已入骨节。骨节疼烦掣痛不得屈伸，近之痛剧，是风湿深着关节。汗出短气是表阳虚，小便不利是湿阻膀胱，恶风不欲去衣是阳虚畏寒，身微肿是湿溢肌肤。甘草附子汤温阳散寒除湿，甘草缓急止痛。此方治风湿性关节炎之属寒湿者甚效。", "contraindication": "", "keywords": "甘草附子汤,骨节疼烦,风湿相搏,掣痛不得屈伸"}, {"id": 176, "source": "伤寒论", "article_number": "176", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒脉浮滑，此以表有热，里有寒，白虎汤主之。", "tags": "脉浮滑,表有热,里有寒,白虎汤", "formula": "白虎汤", "formula_detail": "", "ni_annotation": "此条'里有寒'历代有争议。多数注家认为'寒'字当为'热'字之误，应为'表有热、里有热'，即表里俱热。脉浮滑，浮为热在表，滑为热在里。白虎汤清阳明大热，无渴甚则不加人参。此条论白虎汤证之脉象。", "contraindication": "", "keywords": "白虎汤,脉浮滑,表里俱热"}, {"id": 177, "source": "伤寒论", "article_number": "177", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "伤寒脉结代，心动悸，炙甘草汤主之。", "tags": "脉结代,心动悸,气阴两虚", "formula": "炙甘草汤", "formula_detail": "甘草四两(炙)、生姜三两(切)、人参二两、生地黄一斤、桂枝三两(去皮)、阿胶二两、麦门冬半升(去心)、麻仁半升、大枣三十枚(擘)", "ni_annotation": "脉结代是气血亏虚、脉道不充、心阳不振。结脉是迟中一止，代脉是止有定数，皆属阴血不足、阳气虚弱之象。心动悸是气血不足以养心。炙甘草汤益气养血、温阳复脉。重用炙甘草补中益气，生地黄一斤滋阴养血，桂枝、生姜通阳，人参、大枣补气，阿胶、麦冬、麻仁滋阴润燥。此方又名复脉汤，为治心律失常之名方。", "contraindication": "", "keywords": "炙甘草汤,脉结代,心动悸,复脉汤"}, {"id": 178, "source": "伤寒论", "article_number": "178", "liujing": "太阳", "chapter": "辨太阳病脉证并治下", "original_text": "脉按之来缓，时一止复来者，名曰结。又脉来动而中止，更来小数，中有还者反动，名曰结，阴也。脉来动而中止，不能自还，因而复动者，名曰代，阴也。得此脉者必难治。", "tags": "结脉,代脉,脉来缓时一止,动而中止,不能自还,难治", "formula": "", "formula_detail": "", "ni_annotation": "此条详解结脉与代脉的脉象特征。结脉有两种：一来缓时一止复来；二来动而中止，更来小数，中有还者反动。总的是迟中一止、止无定数。代脉是动而中止、不能自还、止有定数。结脉尚可自还，代脉不能自还，故代脉更重。二者皆属阴脉，得此脉者气血亏虚甚重，故难治。此条为177条之补充说明。", "contraindication": "", "keywords": "结脉,代脉,脉学,难治"}, {"id": 179, "source": "伤寒论", "article_number": "179", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "问曰：病有太阳阳明，有正阳阳明，有少阳阳明，何谓也？答曰：太阳阳明者，脾约是也；正阳阳明者，胃家实是也；少阳阳明者，发汗利小便已，胃中燥烦实，大便难是也。", "tags": "太阳阳明,正阳阳明,少阳阳明,脾约,胃家实,大便难", "formula": "", "formula_detail": "", "ni_annotation": "阳明病有三种来路：太阳阳明是太阳病发汗后津液外泄，脾为胃行其津液的功能受限（脾约），大便干燥；正阳阳明是邪气直犯阳明，肠胃燥热成实（胃家实）；少阳阳明是少阳病误汗误利小便后，津伤化燥，胃中燥烦实而大便难。三者皆以津伤化燥、肠胃成实为共性。", "contraindication": "", "keywords": "阳明病分类,脾约,胃家实,大便难"}, {"id": 180, "source": "伤寒论", "article_number": "180", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明之为病，胃家实是也。", "tags": "阳明病提纲,胃家实", "formula": "", "formula_detail": "", "ni_annotation": "此为阳明病提纲。胃家实是阳明病的本质——肠胃燥热成实。胃家包括胃与肠，实则包括热实（白虎汤证）与燥实（承气汤证）。此一条概括阳明病全部，无论经证腑证，皆属胃家实。此为阳明病之纲，以下各条皆围绕此展开。", "contraindication": "", "keywords": "阳明病提纲,胃家实"}, {"id": 181, "source": "伤寒论", "article_number": "181", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "问曰：何缘得阳明病？答曰：太阳病，若发汗，若下，若利小便，此亡津液，胃中干燥，因转属阳明。不更衣，内实，大便难者，此名阳明也。", "tags": "太阳转阳明,亡津液,胃中干燥,不更衣,内实,大便难", "formula": "", "formula_detail": "", "ni_annotation": "太阳病因汗、下、利小便太过，津液亡失，胃中干燥而转属阳明。不更衣即不大便，内实即肠胃燥实，大便难即排便困难。此三者皆是胃家实的表现，故名曰阳明。此条说明阳明病可由太阳病误治而来。", "contraindication": "", "keywords": "太阳转阳明,亡津液,不更衣"}, {"id": 182, "source": "伤寒论", "article_number": "182", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "问曰：阳明病外证云何？答曰：身热，汗自出，不恶寒，反恶热也。", "tags": "阳明外证,身热,汗自出,不恶寒,反恶热", "formula": "", "formula_detail": "", "ni_annotation": "阳明病的外在表现：身热是里热外蒸，汗自出是热迫津泄，不恶寒是无表寒，反恶热是里热盛而恶热。此四者为阳明经证的外在表现，与太阳病的发热恶寒形成对比。临证见身热汗出不恶寒反恶热，即是阳明外证，当清之。", "contraindication": "", "keywords": "阳明外证,身热汗出,不恶寒反恶热"}, {"id": 183, "source": "伤寒论", "article_number": "183", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "问曰：病有得之一日，不发热而恶寒者，何也？答曰：虽得之一日，恶寒将自罢，即汗出而恶热也。", "tags": "阳明初起,恶寒,汗出恶热", "formula": "", "formula_detail": "", "ni_annotation": "阳明病初起可有一短暂恶寒，但很快即自罢，转为汗出恶热。这是因为阳明初起，表阳乍郁，故暂恶寒；但阳明本热，旋即热盛，故恶寒自罢而汗出恶热。此条说明阳明病虽以热证为主，初起可有轻微恶寒，但为时极短，与太阳恶寒不同。", "contraindication": "", "keywords": "阳明初起恶寒,恶寒将自罢,汗出恶热"}, {"id": 184, "source": "伤寒论", "article_number": "184", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "问曰：恶寒何故自罢？答曰：阳明居中，主土也，万物所归，无所复传，始虽恶寒，二日自止，此为阳明病也。", "tags": "阳明居中主土,万物所归,无所复传,恶寒自罢", "formula": "", "formula_detail": "", "ni_annotation": "阳明居中属土，万物归土，邪至阳明则化热成实，不再传变。故始虽恶寒，二日即止。此以五行学说解释阳明病特点：邪至阳明，或从燥化，或从热化，不再如太阳之传少阳、少阳之传太阴。阳明为病之终站，故曰无所复传。", "contraindication": "", "keywords": "阳明主土,无所复传,恶寒自止"}, {"id": 185, "source": "伤寒论", "article_number": "185", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "本太阳初得病时，发其汗，汗先出不彻，因转属阳明也。伤寒发热无汗，呕不能食，而反汗出濈濈然者，是转属阳明也。", "tags": "太阳转阳明,汗出不彻,呕不能食,汗出濈濈然", "formula": "", "formula_detail": "", "ni_annotation": "太阳病发汗不彻，邪气未尽，转属阳明。伤寒发热无汗本为太阳表实，若呕不能食是邪已入里，而反汗出濈濈然（连绵不断），是里热外蒸，已转属阳明。濈濈然汗出是阳明病特征性出汗，与太阳中风之翕翕汗出不同，前者量大连绵，后者轻微时出。", "contraindication": "", "keywords": "太阳转阳明,濈濈然汗出,呕不能食"}, {"id": 186, "source": "伤寒论", "article_number": "186", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "伤寒三日，阳明脉大。", "tags": "阳明脉大", "formula": "", "formula_detail": "", "ni_annotation": "伤寒三日，邪传阳明，脉象当大。大为阳脉，阳明为两阳合明，热盛于里，脉应之而大。此为阳明病之主脉。但大而有力为实热，大而无力为虚热，临证当辨。", "contraindication": "", "keywords": "阳明脉大,阳明主脉"}, {"id": 187, "source": "伤寒论", "article_number": "187", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "伤寒脉浮而缓，手足自温者，是为系在太阴。太阴者，身当发黄；若小便自利者，不能发黄。至七八日，大便硬者，为阳明病也。", "tags": "系在太阴,手足自温,发黄,小便自利,大便硬,转属阳明", "formula": "", "formula_detail": "", "ni_annotation": "脉浮缓、手足自温，是脾有湿热，系在太阴。湿热郁蒸则发黄，若小便自利则湿热有出路，不发黄。至七八日，湿从燥化，大便由溏转硬，即由太阴转属阳明。此条说明太阴与阳明可互相转化，关键在燥湿之辨。", "contraindication": "", "keywords": "太阴转阳明,发黄,大便硬,燥湿转化"}, {"id": 188, "source": "伤寒论", "article_number": "188", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "伤寒转系阳明者，其人濈然微汗出也。", "tags": "转系阳明,濈然微汗出", "formula": "", "formula_detail": "", "ni_annotation": "伤寒转属阳明的标志之一是濈然微汗出。濈然是汗出连绵不断之象，说明里热外蒸、津液被迫外泄。此为辨别太阳转阳明的重要指征：太阳病本无汗或微汗，若见濈然汗出，则已转阳明。", "contraindication": "", "keywords": "转系阳明,濈然汗出,辨证标志"}, {"id": 189, "source": "伤寒论", "article_number": "189", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明中风，口苦咽干，腹满微喘，发热恶寒，脉浮而紧，若下之，则腹满小便难也。", "tags": "阳明中风,口苦咽干,腹满微喘,发热恶寒,脉浮紧,误下", "formula": "", "formula_detail": "", "ni_annotation": "阳明中风兼有少阳口苦咽干、太阳发热恶寒，三阳合病之象。脉浮而紧，邪偏在表。若误下之，则表邪内陷，腹满更甚，津液伤则小便难。此条告诫阳明病有表证者不可妄下，当先解表。", "contraindication": "表未解禁下", "keywords": "阳明中风,三阳合病,禁下"}, {"id": 190, "source": "伤寒论", "article_number": "190", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，若能食，名中风；不能食，名中寒也。", "tags": "阳明中风,阳明中寒,能食,不能食", "formula": "", "formula_detail": "", "ni_annotation": "阳明病以能食不能食分中风中寒。能食说明胃中有热，风为阳邪化热，故名中风；不能食说明胃中有寒，寒伤中阳不能消谷，故名中寒。此以饮食辨寒热，简明实用。", "contraindication": "", "keywords": "阳明中风,阳明中寒,能食不能食"}, {"id": 191, "source": "伤寒论", "article_number": "191", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，若中寒者，不能食，小便不利，手足濈然汗出，此欲作固瘕，必大便初硬后溏。所以然者，以胃中冷，水谷不别故也。", "tags": "阳明中寒,不能食,小便不利,手足濈然汗出,固瘕,初硬后溏,胃中冷", "formula": "", "formula_detail": "", "ni_annotation": "阳明中寒，胃阳不足。不能食是寒不消谷，小便不利是寒不化气，手足濈然汗出是阳虚不能固表。欲作固瘕，是大便初硬后溏，因胃中冷、水谷不别，水湿混于大便所致。初硬是燥化不足之硬，后溏是寒湿之本象。此与阳明实热之便硬截然不同。", "contraindication": "", "keywords": "阳明中寒,固瘕,初硬后溏,胃中冷"}, {"id": 192, "source": "伤寒论", "article_number": "192", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，初欲食，小便反不利，大便自调，其人骨节疼，翕翕如有热状，奄然发狂，濈然汗出而解者，此水不胜谷气，与汗共并，脉紧则愈。", "tags": "初欲食,小便不利,骨节疼,翕翕热,发狂,汗出而解,水不胜谷气", "formula": "", "formula_detail": "", "ni_annotation": "阳明病初欲食说明胃气尚强，小便不利是水湿内停，骨节疼是湿流关节，翕翕如有热状是正邪交争。奄然发狂是正气奋力驱邪，濈然汗出而解是水湿随汗外泄。此水不胜谷气，是水湿之邪不胜胃中之谷气，正气驱邪外出。脉紧是正气抗邪有力，故愈。", "contraindication": "", "keywords": "水不胜谷气,发狂汗解,自愈"}, {"id": 193, "source": "伤寒论", "article_number": "193", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病欲解时，从申至戌上。", "tags": "阳明欲解时,申至戌", "formula": "", "formula_detail": "", "ni_annotation": "阳明病欲解时在申至戌（下午3-9点），此时阳明经气当令，正气得时令之助，有利于驱邪外出。此以时间医学论阳明病的自解时机。", "contraindication": "", "keywords": "阳明欲解时,申至戌"}, {"id": 194, "source": "伤寒论", "article_number": "194", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，不能食，攻其热必哕。所以然者，胃中虚冷故也。以其人本虚，攻其热必哕。", "tags": "不能食,胃中虚冷,攻热必哕,本虚", "formula": "", "formula_detail": "", "ni_annotation": "阳明病不能食是胃中虚冷，若误认作实热而攻之，必致胃气更伤、虚寒上逆而哕。此条告诫：不能食者不可攻，攻之必哕。阳明病有虚实之分，实者可攻，虚者不可攻。以能食不能食辨虚实，是最简便之法。", "contraindication": "胃虚冷者禁攻", "keywords": "胃中虚冷,不能食,禁攻,哕"}, {"id": 195, "source": "伤寒论", "article_number": "195", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，脉迟，食难用饱，饱则微烦头眩，必小便难，此欲作谷疸。虽下之，腹满如故，所以然者，脉迟故也。", "tags": "脉迟,食难用饱,微烦头眩,小便难,谷疸,腹满", "formula": "", "formula_detail": "", "ni_annotation": "脉迟为寒湿，食难用饱是脾虚不能运化。饱则微烦头眩，是谷气不化、湿热上蒸。小便难是湿无出路。此欲作谷疸——湿热郁蒸发黄。虽下之腹满如故，因脉迟是寒湿，非实热，下之不能去其寒湿。此条告诫寒湿发黄不可攻下。", "contraindication": "寒湿者禁下", "keywords": "谷疸,脉迟,食难用饱,寒湿禁下"}, {"id": 196, "source": "伤寒论", "article_number": "196", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，法多汗，反无汗，其身如虫行皮中状者，此以久虚故也。", "tags": "法多汗反无汗,身如虫行皮中,久虚", "formula": "", "formula_detail": "", "ni_annotation": "阳明病本当多汗，今反无汗而身如虫行皮中，是阳气久虚、不能敷布汗液外出。汗虽不出但已有欲出之势，故身如虫行。此非实证，是久虚之体，治疗当补气温阳，不可发汗攻下。", "contraindication": "久虚禁发汗攻下", "keywords": "阳明反无汗,久虚,身如虫行"}, {"id": 197, "source": "伤寒论", "article_number": "197", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，反无汗而小便利，其人呕而咳，手足厥者，必苦头痛。若不咳不呕，手足不厥者，头不痛。", "tags": "反无汗,小便利,呕而咳,手足厥,头痛", "formula": "", "formula_detail": "", "ni_annotation": "阳明病无汗而小便利，是津液偏渗于下。呕而咳是水饮上逆犯肺犯胃。手足厥是阳郁不伸。水饮上冲必苦头痛。若不咳不呕、手足不厥，则水饮不上逆，头不痛。此条论阳明病兼水饮上逆之证。", "contraindication": "", "keywords": "阳明兼水饮,呕咳头痛,手足厥"}, {"id": 198, "source": "伤寒论", "article_number": "198", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，但头眩，不恶寒，故能食而咳，其人咽必痛。若不咳者，咽不痛。", "tags": "头眩,不恶寒,能食而咳,咽痛", "formula": "", "formula_detail": "", "ni_annotation": "阳明病但头眩不恶寒，是里热上扰。能食说明胃中有热（阳明中风）。咳是热邪上熏于肺。咽必痛是热邪上灼咽喉。若不咳则热不上熏，咽亦不痛。此条论阳明热邪上熏之轻证。", "contraindication": "", "keywords": "阳明热邪上熏,头眩,咽痛,能食"}, {"id": 199, "source": "伤寒论", "article_number": "199", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，无汗，小便不利，心中懊憹者，身必发黄。", "tags": "无汗,小便不利,心中懊憹,发黄", "formula": "", "formula_detail": "", "ni_annotation": "无汗则热不得外越，小便不利则湿不得下泄，湿热郁蒸于内。心中懊憹是湿热扰心。湿热无从出路，郁蒸肌肤，身必发黄。此湿热发黄之病机：湿无出路、热蒸于内，必致发黄。", "contraindication": "", "keywords": "湿热发黄,无汗,小便不利,懊憹"}, {"id": 200, "source": "伤寒论", "article_number": "200", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，被火，额上微汗出，而小便不利者，必发黄。", "tags": "被火,额上微汗出,小便不利,发黄", "formula": "", "formula_detail": "", "ni_annotation": "阳明病被火，是以热治热，火邪内攻。额上微汗出是火邪上蒸，但汗出不畅，湿热不能尽越。小便不利则湿无下泄之路。湿热郁蒸必发黄。此条告诫阳明病禁用火法，与太阳病禁火同理。", "contraindication": "阳明病禁火法", "keywords": "阳明禁火,发黄,额上微汗"}, {"id": 201, "source": "伤寒论", "article_number": "201", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，脉浮而紧者，必潮热，发作有时；但浮者，必盗汗出。", "tags": "脉浮紧,潮热,发作有时,脉但浮,盗汗", "formula": "", "formula_detail": "", "ni_annotation": "脉浮紧是阳明热实，必潮热发作有时。浮为阳热外盛，紧为实邪内结，故成潮热。脉但浮不紧，是热虽盛而实未甚，夜间入阴则阳加于阴，故盗汗出。此以脉辨阳明热实之程度。", "contraindication": "", "keywords": "脉浮紧潮热,脉但浮盗汗"}, {"id": 202, "source": "伤寒论", "article_number": "202", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，口燥但欲漱水不欲咽者，此必衄。", "tags": "口燥,漱水不欲咽,衄", "formula": "", "formula_detail": "", "ni_annotation": "口燥是热在血分，漱水不欲咽是热不在气分、津液未大伤。热在血分、迫血妄行，故必衄。此与阳明气分大渴引饮不同，口燥但不欲饮水，是血热之特征。热迫血上溢则鼻衄。", "contraindication": "", "keywords": "口燥不欲咽,血热,衄"}, {"id": 203, "source": "伤寒论", "article_number": "203", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，本自汗出，医更重发汗，病已差，尚微烦不了了者，此必大便硬故也。以亡津液，胃中干燥，故令大便硬。当问其小便日几行，若本小便日三四行，今日再行，故知大便不久必出也。今小便少，以津液当还入胃中，故知不久必大便也。", "tags": "自汗出,重发汗,大便硬,亡津液,小便少,津液还入胃", "formula": "", "formula_detail": "", "ni_annotation": "阳明病本自汗出，医更发汗则津液大伤，大便因硬。但此非燥实结聚，而是津液暂时不足。观小便由多减少，说明津液不再外泄而还入胃中，肠得津润则大便不久自出。此条教人以小便多少测大便之硬与不硬，津液还入胃中则大便自调，无需攻下。", "contraindication": "", "keywords": "亡津液,大便硬,小便辨,津液还入胃"}, {"id": 204, "source": "伤寒论", "article_number": "204", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "伤寒呕多，虽有阳明证，不可攻之。", "tags": "呕多,阳明证,不可攻", "formula": "", "formula_detail": "", "ni_annotation": "呕多是邪在少阳，少阳不可下。虽有阳明证（如腹满不大便），但呕多说明邪偏在上、偏在少阳，故不可攻。攻之则邪陷，变证蜂起。此条告诫：见呕多者，虽有里实亦当慎攻，当和解少阳为主。", "contraindication": "呕多禁攻", "keywords": "呕多禁攻,少阳未解"}, {"id": 205, "source": "伤寒论", "article_number": "205", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，心下硬满者，不可攻之。攻之，利遂不止者死，利止者愈。", "tags": "心下硬满,不可攻,利不止则死", "formula": "", "formula_detail": "", "ni_annotation": "心下硬满而非腹部硬满，是邪结偏高，在胃之上脘而非肠中。心下硬满者不可攻，攻之则胃气大伤。利遂不止是正气脱败，故死；利止是正气尚能自复，故愈。此条辨心下硬满与腹硬满不同，前者在上不可攻，后者在下可攻。", "contraindication": "心下硬满禁攻", "keywords": "心下硬满,禁攻,利不止则死"}, {"id": 206, "source": "伤寒论", "article_number": "206", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，面合色赤，不可攻之。必发热，色黄者，小便不利也。", "tags": "面合色赤,不可攻,发热,色黄,小便不利", "formula": "", "formula_detail": "", "ni_annotation": "面合色赤是阳气怫郁在表，热未入里成实，故不可攻。攻之则邪热内陷，与湿相合，小便不利则湿热无出路，郁蒸发黄。此条告诫：面色赤是热在表未入里，虽有阳明病亦不可攻。", "contraindication": "面赤禁攻", "keywords": "面赤禁攻,热在表,误下发黄"}, {"id": 207, "source": "伤寒论", "article_number": "207", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，不吐不下，心烦者，可与调胃承气汤。", "tags": "不吐不下,心烦,调胃承气汤", "formula": "调胃承气汤", "formula_detail": "大黄四两(去皮清酒洗)、甘草二两(炙)、芒硝半升", "ni_annotation": "不吐不下说明邪不在上不在外，而在中焦。心烦是燥热扰心。调胃承气汤大黄泄热通便，芒硝软坚润燥，甘草和中缓急。此方在三承气中最缓，以甘草缓大黄、芒硝之猛，调胃和中，故曰调胃。治阳明燥热初结、心烦腹满者。", "contraindication": "", "keywords": "调胃承气汤,心烦,阳明燥热初结"}, {"id": 208, "source": "伤寒论", "article_number": "208", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，脉迟，虽汗出不恶寒者，其身必重，短气腹满而喘，有潮热者，此外欲解，可攻里也。手足濈然汗出者，此大便已硬也，大承气汤主之。若汗多，微发热恶寒者，外未解也，其热不潮，未可与承气汤。若腹大满不通者，可与小承气汤，微和胃气，勿令至大泄下。", "tags": "脉迟,汗出不恶寒,身重,短气腹满喘,潮热,手足濈然汗出,大便硬,大承气汤,小承气汤", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗)、厚朴半斤(炙去皮)、枳实五枚(炙)、芒硝三合", "ni_annotation": "此条辨大承气汤与小承气汤的使用。脉迟、汗出不恶寒、身重、短气腹满而喘、潮热，是阳明腑实重证。手足濈然汗出是燥屎已结之象（四肢禀气于脾胃，脾胃实热则手足汗出连绵），大承气汤主之。若微发热恶寒、热不潮，是表未解，不可与承气。若腹大满不通但潮热不甚，可与小承气汤微和胃气。此条为三承气汤辨证之关键。", "contraindication": "表未解者禁用承气", "keywords": "大承气汤,小承气汤,潮热,手足濈然汗出,腑实"}, {"id": 209, "source": "伤寒论", "article_number": "209", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，潮热，大便微硬者，可与大承气汤；不硬者，不可与之。若不大便六七日，恐有燥屎，欲知之法，少与小承气汤，汤入腹中，转矢气者，此有燥屎也，乃可攻之。若不转矢气者，此但初头硬，后必溏，不可攻之，攻之必胀满不能食也。欲饮水者，与水则哕。其后发热者，必大便复硬而少也，以小承气汤和之。不转矢气者，慎不可攻也。", "tags": "潮热,大便微硬,燥屎,转矢气,小承气汤试探,初硬后溏,慎不可攻", "formula": "小承气汤", "formula_detail": "大黄四两、厚朴二两(炙去皮)、枳实三枚大者(炙)", "ni_annotation": "此条论承气汤的谨慎使用。大便微硬可与大承气，不硬不可与。不大便六七日，不知有无燥屎，先少与小承气汤试探：转矢气说明有燥屎，可攻；不转矢气是初硬后溏（脾虚寒），不可攻，攻之则胀满不能食。其后发热便复硬，仍以小承气和之。不转矢气者慎不可攻。此即'试探法'，先用小承气探之，再定是否用大承气。", "contraindication": "不转矢气者禁大承气", "keywords": "转矢气,试探法,初硬后溏,慎攻"}, {"id": 210, "source": "伤寒论", "article_number": "210", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "夫实则谵语，虚则郑声。郑声者，重语也。直视谵语，喘满者死，下利者亦死。", "tags": "谵语,郑声,直视,喘满,死证", "formula": "", "formula_detail": "", "ni_annotation": "谵语与郑声是辨别虚实的关键。谵语是实热扰心，语无伦次、声高气粗；郑声是虚脱之象，语言重复、声低气微。直视是精血不能上荣于目，谵语是热扰心神，喘满是肺气将绝，三者并见则阴阳离决，故死。下利是中气脱败，亦死。此条辨阳明病之死证。", "contraindication": "", "keywords": "谵语郑声辨,直视谵语,死证"}, {"id": 211, "source": "伤寒论", "article_number": "211", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "发汗多，若重发汗者，亡其阳，谵语脉短者死，脉自和者不死。", "tags": "发汗多,亡阳,谵语,脉短,死证", "formula": "", "formula_detail": "", "ni_annotation": "汗为心之液，发汗过多则心阳外亡。亡阳则神明无主而谵语。脉短是气血将竭之象，短则上不及寸、下不及尺，故死。脉自和是气血尚能自复，故不死。此条告诫不可过汗，汗多亡阳则难救。", "contraindication": "禁过汗", "keywords": "亡阳谵语,脉短死证,禁过汗"}, {"id": 212, "source": "伤寒论", "article_number": "212", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "伤寒若吐若下后不解，不大便五六日，上至十余日，日晡所发潮热，不恶寒，独语如见鬼状。若剧者，发则不识人，循衣摸床，惕而不安，微喘直视，脉弦者生，涩者死。微者，但发热谵语者，大承气汤主之。若一服利，则止后服。", "tags": "潮热,不大便,独语如见鬼状,不识人,循衣摸床,直视,微喘,脉弦生涩死,大承气汤", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗)、厚朴半斤(炙去皮)、枳实五枚(炙)、芒硝三合", "ni_annotation": "此条论大承气汤重证及预后判断。吐下后邪入阳明，不大便十余日、潮热、独语如见鬼状，是燥屎内结、热扰心神。重者发则不识人、循衣摸床、惕而不安、微喘直视，此时凭脉断预后：脉弦是阴未竭、正气尚存，故生；脉涩是阴血将竭，故死。微者（病势稍轻）但发热谵语，大承气汤主之。得利即止，不可过剂。", "contraindication": "得利即止后服", "keywords": "大承气汤重证,循衣摸床,直视,脉弦涩辨生死"}, {"id": 213, "source": "伤寒论", "article_number": "213", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，其人多汗，以津液外出，胃中燥，大便必硬，硬则谵语，小承气汤主之。若一服谵语止者，更莫复服。", "tags": "多汗,津液外出,胃中燥,大便硬,谵语,小承气汤", "formula": "小承气汤", "formula_detail": "大黄四两、厚朴二两(炙去皮)、枳实三枚大者(炙)", "ni_annotation": "多汗则津液外出，胃中干燥，大便因硬。硬则浊气上扰心神而谵语。此为津伤化燥之轻证，大便虽硬而无潮热、腹满痛等重证，故用小承气汤轻下。小承气汤无芒硝，攻下之力弱于大承气，以大黄泄热通便，厚朴、枳实行气消满。一服谵语止即停，不可过剂。", "contraindication": "谵语止即停服", "keywords": "小承气汤,多汗津伤,大便硬谵语"}, {"id": 214, "source": "伤寒论", "article_number": "214", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，谵语，发潮热，脉滑而疾者，小承气汤主之。因与承气汤一升，腹中转矢气者，更服一升。若不转矢气者，勿更与之。明日又不大便，脉反微涩者，里虚也，为难治，不可更与承气汤也。", "tags": "谵语,潮热,脉滑疾,转矢气,脉微涩,里虚,难治", "formula": "小承气汤", "formula_detail": "大黄四两、厚朴二两(炙去皮)、枳实三枚大者(炙)", "ni_annotation": "谵语潮热似大承气证，但脉滑而疾非沉实，说明燥结未甚，故用小承气。服后转矢气说明有燥屎，更服一升。不转矢气则无燥屎，勿更与。明日又不大便，脉由滑疾转微涩，微为阳虚，涩为阴伤，是邪实正虚，为难治，不可更与承气汤。此条再次强调试探法和慎用承气。", "contraindication": "脉微涩者禁承气", "keywords": "脉滑疾,转矢气,脉微涩里虚,禁承气"}, {"id": 215, "source": "伤寒论", "article_number": "215", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，谵语，有潮热，反不能食者，胃中必有燥屎五六枚也。若能食者，但硬耳，宜大承气汤。", "tags": "谵语,潮热,不能食,燥屎,能食但硬,大承气汤", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗)、厚朴半斤(炙去皮)、枳实五枚(炙)、芒硝三合", "ni_annotation": "谵语潮热是阳明腑实。不能食是燥屎阻结、胃气不通，必有燥屎五六枚，程度重，用大承气汤。能食说明燥结不甚，只是大便硬，程度轻。此以能食不能食辨燥结轻重。能食者虽硬但胃气尚通，不能用大承气峻攻。", "contraindication": "", "keywords": "大承气汤,不能食燥屎,能食但硬"}, {"id": 216, "source": "伤寒论", "article_number": "216", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，下血谵语者，此为热入血室，但头汗出者，刺期门，随其实而泻之，濈然汗出则愈。", "tags": "下血谵语,热入血室,头汗出,刺期门", "formula": "", "formula_detail": "", "ni_annotation": "阳明病下血谵语，是邪热入于血室（肝经）。下血是热迫血妄行，谵语是血热扰心。但头汗出是热蒸于上。刺期门泻肝经实热，热泻则气血流通，濈然汗出而愈。此与太阳篇热入血室三条相呼应，但此系阳明病之热入血室。", "contraindication": "", "keywords": "热入血室,下血谵语,刺期门"}, {"id": 217, "source": "伤寒论", "article_number": "217", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "汗出谵语者，以有燥屎在胃中，此为风也，须下者，过经乃可下之。下之若早，语言必乱，以表虚里实故也。", "tags": "汗出谵语,燥屎,须过经乃可下,下早则语言必乱", "formula": "", "formula_detail": "", "ni_annotation": "汗出谵语是燥屎内结，但汗出说明表邪未尽（此为风也），须待太阳经邪尽（过经）方可下之。下之若早，则表邪内陷，里实更甚而语言必乱。此条再次强调先表后里的原则，即使有里实，表邪未尽者亦不可早下。", "contraindication": "表未解禁早下", "keywords": "过经乃可下,先表后里,汗出谵语"}, {"id": 218, "source": "伤寒论", "article_number": "218", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "伤寒四五日，脉沉而喘满。沉为在里，而反发其汗，津液越出，大便为难，表虚里实，久则谵语。", "tags": "脉沉,喘满,误汗,津液越出,大便为难,表虚里实,谵语", "formula": "", "formula_detail": "", "ni_annotation": "脉沉为在里，喘满是里实气逆。此时当攻下，反发汗则津液越出，肠中更燥，大便为难。汗出则表虚，便难则里实，日久热扰心神则谵语。此条告诫：里实证禁发汗，汗之则伤津助热，变证更重。", "contraindication": "里实证禁发汗", "keywords": "脉沉喘满,禁汗,津伤便难"}, {"id": 219, "source": "伤寒论", "article_number": "219", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "三阳合病，腹满身重，难以转侧，口不仁面垢，谵语遗尿。发汗则谵语甚，下之则额上生汗，手足逆冷。若自汗出者，白虎汤主之。", "tags": "三阳合病,腹满身重,难以转侧,口不仁面垢,谵语遗尿,白虎汤", "formula": "白虎汤", "formula_detail": "", "ni_annotation": "三阳合病，邪热充斥表里上下。腹满身重是阳明热盛，难以转侧是湿阻经脉，口不仁面垢是胃热上熏，谵语是热扰心神，遗尿是热迫膀胱。此热盛为主，禁汗禁下：汗之则津伤热盛谵语更甚，下之则阳气下陷额上生汗手足逆冷。若自汗出是里热外蒸，白虎汤清之。此三阳合病以阳明为主，当从阳明论治。", "contraindication": "禁汗禁下", "keywords": "三阳合病,白虎汤,口不仁面垢,谵语遗尿"}, {"id": 220, "source": "伤寒论", "article_number": "220", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "二阳并病，太阳证罢，但发潮热，手足漐漐汗出，大便难而谵语者，下之则愈，宜大承气汤。", "tags": "二阳并病,太阳证罢,潮热,手足漐漐汗出,大便难谵语,大承气汤", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗)、厚朴半斤(炙去皮)、枳实五枚(炙)、芒硝三合", "ni_annotation": "二阳并病，太阳证已罢，全入阳明。发潮热是阳明腑实之特征，手足漐漐汗出是燥屎结于肠中（脾主四肢，脾胃实热则手足汗出），大便难是燥屎内结，谵语是浊热上扰。此为大承气汤标准证，下之则愈。大承气汤为峻下之剂，必待表邪尽解、里实已成方可使用。", "contraindication": "表未罢者禁用", "keywords": "大承气汤,潮热,手足汗出,大便难谵语"}, {"id": 221, "source": "伤寒论", "article_number": "221", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，脉浮而紧，咽燥口苦，腹满而喘，发热汗出，不恶寒反恶热，身重。若发汗则躁，心愦愦反谵语；若加温针，必怵惕烦躁不得眠；若下之，则胃中空虚，客气动膈，心中懊憹，舌上苔者，栀子豉汤主之。", "tags": "发热,汗出,不恶寒反恶热,咽燥,口苦,腹满,喘,心烦,懊憹,谵语,失眠", "formula": "栀子豉汤", "formula_detail": "栀子十四个(擘) 香豉四合(绵裹)", "ni_annotation": "阳明病热盛于里，脉浮紧非太阳表证乃阳明热盛之象。误汗则津伤热炽而躁烦谵语，误温针则火邪内迫心神不宁，误下则胃气伤而客热扰胸膈。栀子豉汤清宣胸膈郁热，邪去则安。", "contraindication": "素体脾胃虚寒、大便溏薄者慎用", "keywords": "栀子豉汤,阳明病,懊憹,胸膈郁热,误治"}, {"id": 222, "source": "伤寒论", "article_number": "222", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "若渴欲饮水，口干舌燥者，白虎加人参汤主之。", "tags": "口渴,饮水,口干,舌燥", "formula": "白虎加人参汤", "formula_detail": "知母六两 石膏一斤(碎) 甘草二两(炙) 粳米六合 人参三两", "ni_annotation": "阳明热盛伤津，渴欲饮水而口干舌燥，是热邪入里已伤气阴。白虎汤清阳明之热，加人参益气生津，热退津复则渴止。此辨阳明热证与承气实证之关键：无腹满便结者不可下。", "contraindication": "表证未解、无汗恶寒者禁用；脉浮弦而细者不可与", "keywords": "白虎加人参汤,阳明热证,口渴,伤津,清热生津"}, {"id": 223, "source": "伤寒论", "article_number": "223", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "若脉浮发热，渴欲饮水，小便不利者，猪苓汤主之。", "tags": "脉浮,发热,口渴,小便不利", "formula": "猪苓汤", "formula_detail": "猪苓(去皮) 茯苓 泽泻 阿胶 滑石(碎)各一两", "ni_annotation": "阳明热邪与水气互结，热在上则脉浮发热口渴，水停于下则小便不利。猪苓汤利水而不伤阴，阿胶滋阴润燥，滑石清热利窍，此为阳明水热互结之良方。与五苓散之区别在于有无伤阴。", "contraindication": "汗出多而渴者不可与，以利水伤津也", "keywords": "猪苓汤,水热互结,小便不利,利水滋阴,发热口渴"}, {"id": 224, "source": "伤寒论", "article_number": "224", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，汗出多而渴者，不可与猪苓汤，以汗多胃中燥，猪苓汤复利其小便故也。", "tags": "汗出,口渴,禁忌", "formula": "", "formula_detail": "", "ni_annotation": "此条明示猪苓汤禁忌。汗多已伤胃津，复用猪苓汤利小便则津液更伤。辨证要点：猪苓汤证为水热互结而津液未大伤，若但热伤津而汗多口渴者，当用白虎加人参汤而非猪苓汤。", "contraindication": "", "keywords": "猪苓汤禁忌,汗多,胃中燥,辨证要点"}, {"id": 225, "source": "伤寒论", "article_number": "225", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "脉浮而迟，表热里寒，下利清谷者，四逆汤主之。", "tags": "脉浮,脉迟,表热,里寒,下利,清谷", "formula": "四逆汤", "formula_detail": "甘草二两(炙) 干姜一两半 附子一枚(生用去皮破八片)", "ni_annotation": "脉浮为表有热象，脉迟为里有寒。下利清谷是脾肾阳虚之确证，虽有表热亦当急救其里。此条提示阳明篇亦可见太阴里寒证，需仔细辨别真假寒热。", "contraindication": "真热假寒者禁用", "keywords": "四逆汤,表热里寒,下利清谷,少阴,真寒假热"}, {"id": 226, "source": "伤寒论", "article_number": "226", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "若胃中虚冷，不能食者，饮水则哕。", "tags": "不能食,饮水则哕,胃虚冷", "formula": "", "formula_detail": "", "ni_annotation": "阳明本为多气多血之经，然亦有胃中虚冷之变。不能食是胃阳不足，饮水则哕是水寒相搏胃气上逆。此非阳明热证，乃太阴寒证之渐，治宜温中散寒。", "contraindication": "", "keywords": "胃中虚冷,不能食,哕,胃寒,阳明虚寒"}, {"id": 227, "source": "伤寒论", "article_number": "227", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "脉浮发热，口干鼻燥，能食者则衄。", "tags": "脉浮,发热,口干,鼻燥,能食,衄血", "formula": "", "formula_detail": "", "ni_annotation": "脉浮发热口干鼻燥为阳明气分热盛，能食说明胃气尚强。热邪循经上迫则鼻衄。此属阳明经热，非腑实，当清热凉血。", "contraindication": "", "keywords": "衄血,鼻衄,阳明经热,口干鼻燥,能食"}, {"id": 228, "source": "伤寒论", "article_number": "228", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病下之，其外有热，手足温，不结胸，心中懊憹，饥不能食，但头汗出者，栀子豉汤主之。", "tags": "下后,手足温,懊憹,饥不能食,头汗出", "formula": "栀子豉汤", "formula_detail": "栀子十四个(擘) 香豉四合(绵裹)", "ni_annotation": "阳明病下后，余热未尽留扰胸膈。手足温不结胸说明热不在肠胃，心中懊憹饥不能食是热扰心胸胃气不舒，但头汗出为郁热上蒸。栀子豉汤清宣余热，轻灵透达。", "contraindication": "大便溏薄者慎用", "keywords": "栀子豉汤,下后余热,懊憹,头汗出,胸膈郁热"}, {"id": 229, "source": "伤寒论", "article_number": "229", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，发潮热，大便溏，小便自可，胸胁满不去者，与小柴胡汤。", "tags": "潮热,大便溏,胸胁满,少阳", "formula": "小柴胡汤", "formula_detail": "柴胡半斤 黄芩三两 人参三两 半夏半升(洗) 甘草三两(炙) 生姜三两(切) 大枣十二枚(擘)", "ni_annotation": "此阳明少阳合病。发潮热似阳明，大便溏非腑实，胸胁满为少阳主证。小便自可说津液未大伤。病机以少阳为主，故用小柴胡汤和解枢机，上焦得通则津液下而胃气和。", "contraindication": "", "keywords": "小柴胡汤,阳明少阳合病,潮热,胸胁满,大便溏"}, {"id": 230, "source": "伤寒论", "article_number": "230", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，胁下硬满，不大便而呕，舌上白苔者，可与小柴胡汤。上焦得通，津液得下，胃气因和，身濈然汗出而解。", "tags": "胁下硬满,不大便,呕,白苔", "formula": "小柴胡汤", "formula_detail": "柴胡半斤 黄芩三两 人参三两 半夏半升(洗) 甘草三两(炙) 生姜三两(切) 大枣十二枚(擘)", "ni_annotation": "胁下硬满乃少阳经气不利，不大便非阳明腑实乃气机不畅。呕为少阳主证，白苔说明无里热结实。小柴胡汤和解少阳、疏利三焦，上焦通则津液下布，胃气和而汗出解。此乃活用小柴胡治不大便之妙法。", "contraindication": "", "keywords": "小柴胡汤,胁下硬满,不大便,呕,上焦得通,白苔"}, {"id": 231, "source": "伤寒论", "article_number": "231", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明中风，脉弦浮大而短气，腹都满，胁下及心痛，久按之气不通，鼻干，不得汗，嗜卧，一身及目悉黄，小便难，有潮热，时时哕，耳前后肿，刺之小差，外不解。病过十日，脉续浮者，与小柴胡汤。", "tags": "脉弦浮大,短气,腹满,胁痛,心痛,鼻干,无汗,嗜卧,身黄,目黄,小便难,潮热,哕,耳肿", "formula": "小柴胡汤", "formula_detail": "柴胡半斤 黄芩三两 人参三两 半夏半升(洗) 甘草三两(炙) 生姜三两(切) 大枣十二枚(擘)", "ni_annotation": "此为三阳合病之复杂证候。脉弦属少阳、浮属太阳、大属阳明，三阳合病而少阳证最重。一身面目悉黄、胁下及心痛、耳前后肿皆是少阳经循行之征。过十日脉续浮说明邪仍在表里之间，用小柴胡汤和解为治。", "contraindication": "", "keywords": "三阳合病,小柴胡汤,黄疸,耳前后肿,胁痛,脉弦浮大"}, {"id": 232, "source": "伤寒论", "article_number": "232", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "脉但浮，无余证者，与麻黄汤。若不尿，腹满加哕者，不治。", "tags": "脉浮,麻黄汤,不尿,腹满,哕,不治", "formula": "麻黄汤", "formula_detail": "麻黄三两(去节) 桂枝二两(去皮) 甘草一两(炙) 杏仁七十个(去皮尖)", "ni_annotation": "脉但浮无余证是邪仍在表，当从表解与麻黄汤。若不尿腹满加哕为三焦气机闭塞、胃气败绝之危候，预后不良。倪师常言：胃气存则生，胃气绝则死，不尿而哕者胃气已败。", "contraindication": "", "keywords": "麻黄汤,不尿,腹满,哕,胃气败绝,不治"}, {"id": 233, "source": "伤寒论", "article_number": "233", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，自汗出，若发汗，小便自利者，此为津液内竭，虽硬不可攻之，当须自欲大便，宜蜜煎导而通之。若土瓜根及大猪胆汁，皆可为导。", "tags": "自汗,小便自利,津液内竭,大便硬,不可攻", "formula": "蜜煎导", "formula_detail": "食蜜七合", "ni_annotation": "阳明病自汗出而小便自利，津液从汗尿两途外泄，肠中干燥而大便硬，此非热结乃津枯。不可妄用承气攻下，宜蜜煎导法润肠通便。此即'津液内竭，虽硬不可攻之'之理。", "contraindication": "阳明腑实热结者不宜单用导法", "keywords": "蜜煎导,津液内竭,大便硬,不可攻,润肠通便"}, {"id": 234, "source": "伤寒论", "article_number": "234", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，脉迟，汗出多，微恶寒者，表未解也，可发汗，宜桂枝汤。", "tags": "脉迟,汗出,微恶寒,表未解,桂枝汤", "formula": "桂枝汤", "formula_detail": "桂枝三两(去皮) 芍药三两 甘草二两(炙) 生姜三两(切) 大枣十二枚(擘)", "ni_annotation": "脉迟非寒，乃汗多伤营之故。微恶寒示表邪未尽，虽有阳明见证而表未解者当先解表。桂枝汤调和营卫解肌发汗，表解后再议治阳明。此即先表后里之原则。", "contraindication": "无汗脉浮紧之表实证不宜桂枝汤", "keywords": "桂枝汤,脉迟,微恶寒,表未解,先表后里"}, {"id": 235, "source": "伤寒论", "article_number": "235", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，脉浮，无汗而喘者，发汗则愈，宜麻黄汤。", "tags": "脉浮,无汗,喘", "formula": "麻黄汤", "formula_detail": "麻黄三两(去节) 桂枝二两(去皮) 甘草一两(炙) 杏仁七十个(去皮尖)", "ni_annotation": "阳明病而见脉浮无汗而喘，是表邪郁闭肺气不宣，虽名阳明实属太阳。当发汗解表，麻黄汤开腠理宣肺气，表解则喘平。此示人勿以阳明之名而废表证之治。", "contraindication": "表虚自汗者禁用", "keywords": "麻黄汤,脉浮,无汗,喘,发表,太阳"}, {"id": 236, "source": "伤寒论", "article_number": "236", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，发热汗出者，此为热越，不能发黄也。但头汗出，身无汗，剂颈而还，小便不利，渴引水浆者，此为瘀热在里，身必发黄，茵陈蒿汤主之。", "tags": "发热,头汗出,身无汗,小便不利,口渴,发黄", "formula": "茵陈蒿汤", "formula_detail": "茵陈蒿六两 栀子十四枚(擘) 大黄二两(去皮)", "ni_annotation": "阳明病发热汗出者热随汗泄则不发黄。但头汗出而身无汗、小便不利是湿热郁蒸不得外泄，瘀热在里熏蒸肝胆则发黄疸。茵陈蒿汤清热利湿退黄，茵陈为主药清利肝胆湿热，栀子通利三焦，大黄导热下行，使湿热从二便而出。", "contraindication": "阴黄、寒湿发黄者禁用；孕妇慎用大黄", "keywords": "茵陈蒿汤,黄疸,瘀热在里,头汗出,小便不利,湿热"}, {"id": 237, "source": "伤寒论", "article_number": "237", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明证，其人喜忘者，必有蓄血。所以然者，本有久瘀血，故令喜忘。屎虽硬，大便反易，其色必黑者，宜抵当汤下之。", "tags": "喜忘,蓄血,大便硬,大便易,黑便", "formula": "抵当汤", "formula_detail": "水蛭三十个(熬) 虻虫三十个(去翅足熬) 桃仁二十个(去皮尖) 大黄三两(酒洗)", "ni_annotation": "喜忘非健忘，乃瘀血阻络心神失养所致。屎虽硬而大便反易且色黑，是瘀血内停、血行离经之象。抵当汤为破血逐瘀之峻剂，水蛭虻虫直入血分破瘀，桃仁润肠，大黄导瘀下行。倪师强调：黑便而排便反易是蓄血与燥屎之鉴别要点。", "contraindication": "孕妇禁服；体虚、出血倾向者慎用", "keywords": "抵当汤,蓄血,喜忘,黑便,破血逐瘀,阳明蓄血"}, {"id": 238, "source": "伤寒论", "article_number": "238", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，下之，心中懊憹而烦，胃中有燥屎者，可攻。腹微满，初头硬，后必溏，不可攻之。若有燥屎者，宜大承气汤。", "tags": "下后,懊憹,心烦,燥屎,腹满,可攻,不可攻", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗) 厚朴半斤(炙去皮) 枳实五枚(炙) 芒硝三合", "ni_annotation": "下后懊憹而烦，有燥屎未尽者可再攻。腹微满而非大满，初硬后溏说明非燥屎内结，不可妄攻。大承气汤证之辨：痞、满、燥、实四证俱全方可用。", "contraindication": "表证未解、孕妇、体虚者禁用；初硬后溏者不可攻", "keywords": "大承气汤,燥屎,懊憹,心下痞,腹满,可攻与不可攻"}, {"id": 239, "source": "伤寒论", "article_number": "239", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "病人不大便五六日，绕脐痛，烦躁，发作有时者，此有燥屎，故使不大便也。", "tags": "不大便,绕脐痛,烦躁,发作有时,燥屎", "formula": "", "formula_detail": "", "ni_annotation": "五六日不大便、绕脐痛、烦躁发作有时，三证具备则为燥屎内结无疑。绕脐痛是肠中燥屎移动之象，发作有时说明正气尚能与邪相争。此证宜大承气汤急下存阴。", "contraindication": "", "keywords": "燥屎,不大便,绕脐痛,烦躁,发作有时"}, {"id": 240, "source": "伤寒论", "article_number": "240", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "病人烦热，汗出则解，又如疟状，日晡所发热者，属阳明也。脉实者，宜下之；脉浮虚者，宜发汗。下之与大承气汤，发汗宜桂枝汤。", "tags": "烦热,汗出,如疟状,日晡发热,脉实,脉浮虚", "formula": "大承气汤 或 桂枝汤", "formula_detail": "大承气汤: 大黄四两(酒洗) 厚朴半斤(炙去皮) 枳实五枚(炙) 芒硝三合 / 桂枝汤: 桂枝三两(去皮) 芍药三两 甘草二两(炙) 生姜三两(切) 大枣十二枚(擘)", "ni_annotation": "日晡所(下午三至五时)发热为阳明主时。脉实者内有实热当下，与大承气汤；脉浮虚者邪尚在表当汗，宜桂枝汤。此凭脉辨证决定汗下之法，脉之虚实为关键。", "contraindication": "", "keywords": "日晡发热,脉实,脉浮虚,大承气汤,桂枝汤,汗下之辨"}, {"id": 241, "source": "伤寒论", "article_number": "241", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "大下后，六七日不大便，烦不解，腹满痛者，此有燥屎也。所以然者，本有宿食故也，宜大承气汤。", "tags": "大下后,不大便,心烦,腹满痛,燥屎,宿食", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗) 厚朴半斤(炙去皮) 枳实五枚(炙) 芒硝三合", "ni_annotation": "大下后六七日又不大便、烦不解、腹满痛，说明燥屎未尽或宿食复结。此即'大下后复结'之证，不可因曾用下法而不敢再下，燥屎在则攻之，当机立断。", "contraindication": "", "keywords": "大承气汤,大下后,燥屎复结,腹满痛,宿食,当机立断"}, {"id": 242, "source": "伤寒论", "article_number": "242", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "病人小便不利，大便乍难乍易，时有微热，喘冒不能卧者，有燥屎也，宜大承气汤。", "tags": "小便不利,大便乍难乍易,微热,喘冒,不能卧,燥屎", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗) 厚朴半斤(炙去皮) 枳实五枚(炙) 芒硝三合", "ni_annotation": "大便乍难乍易非纯燥结，小便不利是津液不能下输。喘冒不能卧为浊热上冲肺胃。此燥屎内结而气机逆乱之证，仍宜大承气汤急下以存阴救逆。", "contraindication": "", "keywords": "大承气汤,燥屎,喘冒,不能卧,大便乍难乍易"}, {"id": 243, "source": "伤寒论", "article_number": "243", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "食谷欲呕，属阳明也，吴茱萸汤主之。得汤反剧者，属上焦也。", "tags": "食谷欲呕,呕吐", "formula": "吴茱萸汤", "formula_detail": "吴茱萸一升(洗) 人参三两 生姜六两(切) 大枣十二枚(擘)", "ni_annotation": "食谷欲呕是阳明虚寒、胃气上逆。吴茱萸汤温胃散寒、降逆止呕。服后反剧者病在上焦非中焦虚寒，当别求治法。此条提示阳明亦有虚寒证，非尽属热证。", "contraindication": "胃热呕吐、肝火犯胃者禁用", "keywords": "吴茱萸汤,食谷欲呕,阳明虚寒,胃寒,降逆止呕"}, {"id": 244, "source": "伤寒论", "article_number": "244", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "太阳病，寸缓关浮尺弱，其人发热汗出，复恶寒，不呕，但心下痞者，此以医下之也。如其不下者，病人不恶寒而渴者，此转属阳明也。小便数者，大便必硬，不更衣十日，无所苦也。渴欲饮水，少少与之，但以法救之。渴者，宜五苓散。", "tags": "寸缓,关浮,尺弱,发热,汗出,恶寒,心下痞,口渴,小便数,大便硬", "formula": "五苓散", "formula_detail": "猪苓十八铢(去皮) 泽泻一两六铢 白术十八铢 茯苓十八铢 桂枝半两(去皮)", "ni_annotation": "此条辨太阳误下致痞与自然转属阳明之区别。不恶寒而渴者为转属阳明。小便数则津液偏渗、肠燥便硬，十日不大便而无所苦说明非燥屎内结。口渴者与水不可过量，辨证属水气不化者用五苓散。", "contraindication": "", "keywords": "五苓散,太阳转阳明,心下痞,小便数,大便硬,辨证"}, {"id": 245, "source": "伤寒论", "article_number": "245", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "脉阳微而汗出少者，为自和也；汗出多者，为太过。阳脉实，因发其汗，出多者，亦为太过。太过者，为阳绝于里，亡津液，大便因硬也。", "tags": "脉阳微,汗出,阳脉实,太过,亡津液,大便硬", "formula": "", "formula_detail": "", "ni_annotation": "汗出少则津液自和，汗出多则津液亡失。无论脉微脉实，汗出太过皆伤津液而致大便硬。此提示阳明病大便硬之因，不惟热结，亦由津伤。", "contraindication": "", "keywords": "汗出太过,亡津液,大便硬,津伤,阳明病机"}, {"id": 246, "source": "伤寒论", "article_number": "246", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "脉浮而芤，浮为阳，芤为阴。浮芤相搏，胃气生热，其阳则绝。", "tags": "脉浮,脉芤,胃热,阳绝", "formula": "", "formula_detail": "", "ni_annotation": "浮为阳盛于外，芤为阴血不足于内。浮芤相搏说明胃热盛而阴血已虚，阳热独盛而阴不济阳。此为津血亏竭之脉象，大便必硬。", "contraindication": "", "keywords": "脉浮芤,胃气生热,阴血不足,津液亏竭"}, {"id": 247, "source": "伤寒论", "article_number": "247", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "趺阳脉浮而涩，浮则胃气强，涩则小便数。浮涩相搏，大便则硬，其脾为约，麻子仁丸主之。", "tags": "趺阳脉,脉浮涩,胃强,小便数,大便硬,脾约", "formula": "麻子仁丸", "formula_detail": "麻子仁二升 芍药半斤 枳实半斤(炙) 大黄一斤(去皮) 厚朴一尺(炙去皮) 杏仁一升(去皮尖熬别作脂)", "ni_annotation": "趺阳脉候胃气，浮为胃热强，涩为津液亏。胃强则消谷引食，脾弱则不能为胃行其津液，津液偏渗膀胱而小便数，肠失濡润而大便硬。麻子仁丸润肠通便、泄热行气，丸剂缓攻，为脾约证专方。", "contraindication": "纯虚寒便秘者不宜", "keywords": "麻子仁丸,脾约,趺阳脉,大便硬,小便数,润肠通便"}, {"id": 248, "source": "伤寒论", "article_number": "248", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "太阳病三日，发汗不解，蒸蒸发热者，属胃也，调胃承气汤主之。", "tags": "发汗不解,蒸蒸发热,属胃", "formula": "调胃承气汤", "formula_detail": "大黄四两(去皮清酒洗) 甘草二两(炙) 芒硝半升", "ni_annotation": "太阳病发汗后热不解，蒸蒸发热是热邪入里归于阳明胃腑。调胃承气汤以大黄泄热、芒硝软坚、甘草和胃，为承气三方中最温和者，适用于燥热初结而未至大实大满。", "contraindication": "腹满痛、大实大满者力有不逮", "keywords": "调胃承气汤,蒸蒸发热,发汗不解,属胃,燥热初结"}, {"id": 249, "source": "伤寒论", "article_number": "249", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "伤寒吐后，腹胀满者，与调胃承气汤。", "tags": "吐后,腹胀满", "formula": "调胃承气汤", "formula_detail": "大黄四两(去皮清酒洗) 甘草二两(炙) 芒硝半升", "ni_annotation": "吐后伤津，燥热内结而腹胀满。因吐后胃气已伤，不宜大承气之峻下，故用调胃承气汤缓下和胃，泄热而不伤正。", "contraindication": "", "keywords": "调胃承气汤,吐后,腹胀满,缓下,和胃泄热"}, {"id": 250, "source": "伤寒论", "article_number": "250", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "太阳病，若吐若下若发汗后，微烦，小便数，大便因硬者，与小承气汤和之愈。", "tags": "吐下汗后,微烦,小便数,大便硬,小承气汤", "formula": "小承气汤", "formula_detail": "大黄四两(酒洗) 厚朴二两(炙去皮) 枳实三枚大者(炙)", "ni_annotation": "经吐下发汗后伤津，微烦说明热不重，大便硬是因小便数津液偏渗而非大实大满。小承气汤行气通便，以和为主非峻攻，与承气三方中取其轻者。", "contraindication": "", "keywords": "小承气汤,微烦,小便数,大便硬,和法,轻下"}, {"id": 251, "source": "伤寒论", "article_number": "251", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "得病二三日，脉弱，无太阳、柴胡证，烦躁，心下硬。至四五日，虽能食，以小承气汤少少与，微和之，令小安。至六日，与承气汤一升。若不大便六七日，小便少者，虽不受食，但初头硬，后必溏，未定成硬，攻之必溏。须小便利，屎定硬，乃可攻之，宜大承气汤。", "tags": "脉弱,烦躁,心下硬,能食,小便,大便,燥屎", "formula": "大承气汤 或 小承气汤", "formula_detail": "小承气汤: 大黄四两(酒洗) 厚朴二两(炙去皮) 枳实三枚大者(炙) / 大承气汤: 大黄四两(酒洗) 厚朴半斤(炙去皮) 枳实五枚(炙) 芒硝三合", "ni_annotation": "此条详示承气汤使用之进退法度。脉弱非实热，先以小承气试探。小便少说明津液尚能入肠，大便未必全硬，不可骤攻。必待小便利屎定硬方可用大承气汤峻下。此即'先与小承气，后与大承气'之安全用法。", "contraindication": "小便少、大便初硬后溏者不可攻", "keywords": "小承气汤,大承气汤,试探法,小便,燥屎,进退法度"}, {"id": 252, "source": "伤寒论", "article_number": "252", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "伤寒六七日，目中不了了，睛不和，无表里证，大便难，身微热者，此为实也，急下之，宜大承气汤。", "tags": "目中不了了,睛不和,大便难,身微热,急下", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗) 厚朴半斤(炙去皮) 枳实五枚(炙) 芒硝三合", "ni_annotation": "目中不了了、睛不和是热邪上扰、精不上注于目之危急征象。虽无典型的腹满痛，但大便难而身微热说明燥热内结已深，须急下存阴。此即阳明三急下证之一，刻不容缓。", "contraindication": "", "keywords": "大承气汤,阳明急下,目中不了了,睛不和,存阴救逆"}, {"id": 253, "source": "伤寒论", "article_number": "253", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明病，发热汗多者，急下之，宜大承气汤。", "tags": "发热,汗多,急下", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗) 厚朴半斤(炙去皮) 枳实五枚(炙) 芒硝三合", "ni_annotation": "发热汗多是阳明燥热炽盛迫津外泄，汗多则津液速亡，不急下则阴竭。此即阳明三急下证之二，当机立断，用大承气汤峻下存阴。", "contraindication": "", "keywords": "大承气汤,阳明急下,发热汗多,峻下存阴,津液速亡"}, {"id": 254, "source": "伤寒论", "article_number": "254", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "发汗不解，腹满痛者，急下之，宜大承气汤。", "tags": "发汗不解,腹满痛,急下", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗) 厚朴半斤(炙去皮) 枳实五枚(炙) 芒硝三合", "ni_annotation": "发汗而热不解，反增腹满痛，是热邪深入阳明成实。腹满且痛说明燥屎已成、气机闭塞，须急下。此为阳明三急下证之三。", "contraindication": "", "keywords": "大承气汤,阳明急下,腹满痛,发汗不解,燥屎内结"}, {"id": 255, "source": "伤寒论", "article_number": "255", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "腹满不减，减不足言，当下之，宜大承气汤。", "tags": "腹满,不减,大承气汤", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗) 厚朴半斤(炙去皮) 枳实五枚(炙) 芒硝三合", "ni_annotation": "腹满不减、减不足言是实满而非虚满之辨。虚满时减复如故，实满持续不减。此为阳明腑实重症，当用大承气汤峻下。", "contraindication": "虚满、时减复如故者禁用", "keywords": "大承气汤,腹满不减,实满,虚满之辨,阳明腑实"}, {"id": 256, "source": "伤寒论", "article_number": "256", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "阳明少阳合病，必下利。其脉不负者，为顺也。负者，失也，互相克贼，名为负也。脉滑而数者，有宿食也，当下之，宜大承气汤。", "tags": "阳明少阳合病,下利,脉滑数,宿食,当下", "formula": "大承气汤", "formula_detail": "大黄四两(酒洗) 厚朴半斤(炙去皮) 枳实五枚(炙) 芒硝三合", "ni_annotation": "阳明少阳合病而下利，脉滑而数是有宿食之征，属热结旁流之类。此下利当用下法治之，即'通因通用'之法。以大承气汤攻下宿食燥屎，则下利自止。", "contraindication": "", "keywords": "大承气汤,阳明少阳合病,下利,脉滑数,宿食,通因通用"}, {"id": 257, "source": "伤寒论", "article_number": "257", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "病人无表里证，发热七八日，虽脉浮数者，可下之。假令已下，脉数不解，合热则消谷喜饥。至六七日不大便者，有瘀血，宜抵当汤。", "tags": "发热,脉浮数,可下,消谷喜饥,不大便,瘀血", "formula": "抵当汤", "formula_detail": "水蛭三十个(熬) 虻虫三十个(去翅足熬) 桃仁二十个(去皮尖) 大黄三两(酒洗)", "ni_annotation": "发热七八日无表里证而脉浮数，热盛于内可下。下后脉数不解、消谷喜饥说明热未去。六七日不大便而无燥屎证者，须考虑瘀血内结，用抵当汤破血逐瘀。消谷喜饥而大便不通是瘀血发热之特征。", "contraindication": "孕妇禁服", "keywords": "抵当汤,瘀血,消谷喜饥,不大便,脉数不解,破血逐瘀"}, {"id": 258, "source": "伤寒论", "article_number": "258", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "若脉数不解，而下不止，必协热便脓血也。", "tags": "脉数,下不止,便脓血,协热", "formula": "", "formula_detail": "", "ni_annotation": "下后脉数不解而下利不止、便脓血，是热邪下迫肠道、灼伤血络。此与上条瘀血不同，此为协热利，治当清热凉血止利。", "contraindication": "", "keywords": "协热利,便脓血,脉数不解,下利不止,热迫肠道"}, {"id": 259, "source": "伤寒论", "article_number": "259", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "伤寒发汗已，身目为黄，所以然者，以寒湿在里不解故也。以为不可下也，于寒湿中求之。", "tags": "发汗,身黄,目黄,寒湿,不可下", "formula": "", "formula_detail": "", "ni_annotation": "发汗后身目发黄，非阳明湿热而是寒湿在里。此为阴黄，与茵陈蒿汤之阳黄治法截然不同。不可用下法，当于寒湿中求之，治宜温中化湿退黄。此即黄疸之阴阳辨证。", "contraindication": "不可下", "keywords": "阴黄,寒湿,发黄,不可下,寒湿在里,黄疸辨证"}, {"id": 260, "source": "伤寒论", "article_number": "260", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "伤寒七八日，身黄如橘子色，小便不利，腹微满者，茵陈蒿汤主之。", "tags": "身黄,橘子色,小便不利,腹微满,黄疸", "formula": "茵陈蒿汤", "formula_detail": "茵陈蒿六两 栀子十四枚(擘) 大黄二两(去皮)", "ni_annotation": "身黄如橘子色鲜明为阳黄特征，小便不利腹微满是湿热郁结在里。茵陈蒿汤清利湿热、通利二便，使湿热从前后分消。黄如橘子色与烟熏之晦暗是阴阳黄之重要鉴别。", "contraindication": "阴黄禁用", "keywords": "茵陈蒿汤,阳黄,橘子色,小便不利,腹微满,湿热"}, {"id": 261, "source": "伤寒论", "article_number": "261", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "伤寒身黄发热，栀子柏皮汤主之。", "tags": "身黄,发热", "formula": "栀子柏皮汤", "formula_detail": "肥栀子十五个(擘) 甘草一两(炙) 黄柏二两", "ni_annotation": "身黄发热而无腹满小便不利，湿热偏于上中二焦而未深入下焦。栀子柏皮汤以栀子清三焦之热，黄柏清下焦湿热，甘草和中。此方较茵陈蒿汤为轻，适用于黄疸初起热重于湿者。", "contraindication": "寒湿发黄禁用；大便溏薄者慎用", "keywords": "栀子柏皮汤,身黄,发热,黄疸,清热利湿"}, {"id": 262, "source": "伤寒论", "article_number": "262", "liujing": "阳明", "chapter": "辨阳明病脉证并治", "original_text": "伤寒瘀热在里，身必黄，麻黄连轺赤小豆汤主之。", "tags": "瘀热,发黄,黄疸", "formula": "麻黄连轺赤小豆汤", "formula_detail": "麻黄二两(去节) 连轺二两(连翘根是) 杏仁四十个(去皮尖) 赤小豆一升 大枣十二枚(擘) 生梓白皮一升(切) 生姜二两(切) 甘草二两(炙)", "ni_annotation": "瘀热在里而表邪未全解，身黄而兼表证者，当表里双解。麻黄、杏仁、生姜宣肺解表，连轺、赤小豆、梓白皮清热利湿退黄，甘草、大枣和中。此为黄疸兼表之治法，与茵陈蒿汤纯清里热不同。", "contraindication": "表虚多汗者慎用麻黄", "keywords": "麻黄连轺赤小豆汤,瘀热,发黄,表里双解,黄疸"}, {"id": 263, "source": "伤寒论", "article_number": "263", "liujing": "少阳", "chapter": "辨少阳病脉证并治", "original_text": "少阳之为病，口苦，咽干，目眩也。", "tags": "口苦,咽干,目眩", "formula": "", "formula_detail": "", "ni_annotation": "少阳病提纲。口苦为胆热上溢，咽干为津液受灼，目眩为风火上扰清窍。三证皆属少阳经循行所过，是少阳病辨证之纲领。倪师强调：见口苦咽干目眩即可定位病在少阳，以柴胡剂为主治。", "contraindication": "", "keywords": "少阳病,提纲,口苦,咽干,目眩,胆热"}, {"id": 264, "source": "伤寒论", "article_number": "264", "liujing": "少阳", "chapter": "辨少阳病脉证并治", "original_text": "少阳中风，两耳无所闻，目赤，胸中满而烦者，不可吐下，吐下则悸而惊。", "tags": "耳聋,目赤,胸满,心烦,不可吐下", "formula": "", "formula_detail": "", "ni_annotation": "少阳中风，耳聋目赤为少阳经气不利，胸满而烦为邪郁少阳枢机不利。少阳为半表半里，吐下均为误治，吐则伤阳致悸，下则伤阴致惊。此为少阳禁用吐下之戒。", "contraindication": "不可吐下", "keywords": "少阳中风,耳聋,目赤,胸满,烦,不可吐下,禁忌"}, {"id": 265, "source": "伤寒论", "article_number": "265", "liujing": "少阳", "chapter": "辨少阳病脉证并治", "original_text": "伤寒，脉弦细，头痛发热者，属少阳。少阳不可发汗，发汗则谵语。此属胃，胃和则愈；胃不和，烦而悸。", "tags": "脉弦细,头痛,发热,不可发汗,谵语", "formula": "", "formula_detail": "", "ni_annotation": "脉弦细是少阳主脉，头痛发热而脉弦细者病在少阳而非太阳，故不可发汗。汗之则伤津助热、热扰心神则谵语。此属胃指邪入阳明，须观胃气调和与否判断预后。少阳三大禁忌：不可汗、不可吐、不可下。", "contraindication": "不可发汗", "keywords": "少阳病,脉弦细,不可发汗,谵语,少阳禁忌"}, {"id": 266, "source": "伤寒论", "article_number": "266", "liujing": "少阳", "chapter": "辨少阳病脉证并治", "original_text": "本太阳病不解，转入少阳者，胁下硬满，干呕不能食，往来寒热，尚未吐下，脉沉紧者，与小柴胡汤。", "tags": "太阳转少阳,胁下硬满,干呕,不能食,往来寒热,脉沉紧", "formula": "小柴胡汤", "formula_detail": "柴胡半斤 黄芩三两 人参三两 半夏半升(洗) 甘草三两(炙) 生姜三两(切) 大枣十二枚(擘)", "ni_annotation": "太阳病不解转入少阳，胁下硬满是少阳经气不利，干呕不能食为胆气犯胃，往来寒热为邪正交争于半表半里。未经过吐下说明正气尚存，脉虽沉紧仍是少阳，与小柴胡汤和解之。", "contraindication": "", "keywords": "小柴胡汤,太阳转少阳,胁下硬满,干呕,往来寒热,和解"}, {"id": 267, "source": "伤寒论", "article_number": "267", "liujing": "少阳", "chapter": "辨少阳病脉证并治", "original_text": "若已吐下发汗温针，谵语，柴胡汤证罢，此为坏病。知犯何逆，以法治之。", "tags": "误治,谵语,坏病,柴胡证罢", "formula": "", "formula_detail": "", "ni_annotation": "经吐下发汗温针等误治后，柴胡证已罢而出现谵语，说明正气已伤、病已转属他经而变生坏病。此时不可再执柴胡方，须'知犯何逆，以法治之'，随证施治。此为辨证论治之核心原则。", "contraindication": "", "keywords": "坏病,误治,谵语,知犯何逆,辨证论治,柴胡证罢"}, {"id": 268, "source": "伤寒论", "article_number": "268", "liujing": "少阳", "chapter": "辨少阳病脉证并治", "original_text": "三阳合病，脉浮大，上关上，但欲眠睡，目合则汗。", "tags": "三阳合病,脉浮大,欲眠,目合则汗,盗汗", "formula": "", "formula_detail": "", "ni_annotation": "三阳合病而脉浮大上关上，说明热盛于三阳。但欲眠睡是热扰心神、神昏之象。目合则汗即盗汗，为阳热内迫阴液外泄。此证热势弥漫三阳，不可单治一经。", "contraindication": "", "keywords": "三阳合病,脉浮大,但欲眠睡,目合则汗,盗汗,阳热弥漫"}, {"id": 269, "source": "伤寒论", "article_number": "269", "liujing": "少阳", "chapter": "辨少阳病脉证并治", "original_text": "伤寒六七日，无大热，其人躁烦者，此为阳去入阴故也。", "tags": "无大热,躁烦,阳去入阴", "formula": "", "formula_detail": "", "ni_annotation": "伤寒六七日当为传经之时，外无大热而内有躁烦，说明邪已从阳经传入阴经。此为传变之重要标志：热退不一定是向愈，躁烦反增须警惕病进。", "contraindication": "", "keywords": "阳去入阴,无大热,躁烦,传经,病进"}, {"id": 270, "source": "伤寒论", "article_number": "270", "liujing": "少阳", "chapter": "辨少阳病脉证并治", "original_text": "伤寒三日，三阳为尽，三阴当受邪。其人反能食而不呕，此为三阴不受邪也。", "tags": "能食,不呕,三阴不受邪", "formula": "", "formula_detail": "", "ni_annotation": "伤寒三日当传三阴，而其人能食不呕说明胃气尚强。胃为后天之本，胃气存则三阴不受邪。此以能食与否判断邪之进退，胃气之存亡为疾病预后之关键。", "contraindication": "", "keywords": "能食,不呕,三阴不受邪,胃气,传经,预后"}, {"id": 271, "source": "伤寒论", "article_number": "271", "liujing": "少阳", "chapter": "辨少阳病脉证并治", "original_text": "伤寒三日，少阳脉小者，欲已也。", "tags": "脉小,欲愈", "formula": "", "formula_detail": "", "ni_annotation": "少阳病当见弦脉，若三日而脉变小，说明邪气已衰、病将向愈。脉象由弦转小是邪退正复之佳兆。此以脉象判断病势进退。", "contraindication": "", "keywords": "脉小,欲愈,少阳病,邪退正复,脉象"}, {"id": 272, "source": "伤寒论", "article_number": "272", "liujing": "少阳", "chapter": "辨少阳病脉证并治", "original_text": "少阳病，欲解时，从寅至辰上。", "tags": "欲解时,寅至辰", "formula": "", "formula_detail": "", "ni_annotation": "少阳病欲解于寅卯辰时（凌晨3时至上午9时），此为少阳之气旺于此时，正气得助而邪气易退。此即天人相应之理，亦为服药时机之参考。倪师常令病人在此时服药以借天时之力。", "contraindication": "", "keywords": "欲解时,寅至辰,少阳,天人相应,服药时机"}, {"id": 273, "source": "伤寒论", "article_number": "273", "liujing": "太阴", "chapter": "太阴病篇", "original_text": "太阴之为病，腹满而吐，食不下，自利益甚，时腹自痛。若下之，必胸下结硬。", "tags": "['太阴提纲', '太阴病']", "formula": "None", "formula_detail": "None", "ni_annotation": "太阴病提纲证。脾阳虚衰，寒湿内盛，见腹满吐利、食不下，禁用下法。", "contraindication": "若下之，必胸下结硬", "keywords": "['太阴', '提纲', '腹满', '吐利', '食不下', '脾阳虚']"}, {"id": 274, "source": "伤寒论", "article_number": "274", "liujing": "太阴", "chapter": "太阴病篇", "original_text": "太阴中风，四肢烦疼，阳微阴涩而长者，为欲愈。", "tags": "['太阴中风', '预后']", "formula": "None", "formula_detail": "None", "ni_annotation": "太阴中风四肢烦疼，脉阳微阴涩而长者为欲愈之兆。", "contraindication": "None", "keywords": "['太阴', '中风', '四肢烦疼', '欲愈', '脉象']"}, {"id": 275, "source": "伤寒论", "article_number": "275", "liujing": "太阴", "chapter": "太阴病篇", "original_text": "太阴病，欲解时，从亥至丑上。", "tags": "['欲解时', '时间医学']", "formula": "None", "formula_detail": "None", "ni_annotation": "太阴病欲解于亥子丑三时，值阴气渐退阳气渐生之际。", "contraindication": "None", "keywords": "['太阴', '欲解时', '亥至丑']"}, {"id": 276, "source": "伤寒论", "article_number": "276", "liujing": "太阴", "chapter": "太阴病篇", "original_text": "太阴病，脉浮者，可发汗，宜桂枝汤。", "tags": "['太阴病', '桂枝汤', '表证']", "formula": "桂枝汤", "formula_detail": "桂枝三两 芍药三两 甘草二两 生姜三两 大枣十二枚", "ni_annotation": "太阴病兼表证，脉浮者可用桂枝汤解表，此太阴表证治法。", "contraindication": "None", "keywords": "['太阴', '脉浮', '桂枝汤', '发汗', '表证']"}, {"id": 277, "source": "伤寒论", "article_number": "277", "liujing": "太阴", "chapter": "太阴病篇", "original_text": "自利不渴者，属太阴，以其脏有寒故也，当温之，宜服四逆辈。", "tags": "['太阴病', '理中汤', '四逆辈', '温中']", "formula": "四逆辈（理中汤、四逆汤类）", "formula_detail": "理中汤：人参 干姜 甘草 白术各三两。四逆汤：甘草二两 干姜一两半 附子一枚", "ni_annotation": "太阴虚寒主证，自利不渴为辨太阴关键。脏有寒故用四逆辈温中散寒，理中汤温补脾阳为代表方。", "contraindication": "None", "keywords": "['太阴', '自利不渴', '脏有寒', '温之', '理中汤', '四逆辈', '脾虚寒']"}, {"id": 278, "source": "伤寒论", "article_number": "278", "liujing": "太阴", "chapter": "太阴病篇", "original_text": "伤寒脉浮而缓，手足自温者，系在太阴。太阴当发身黄，若小便自利者，不能发黄。至七八日，虽暴烦下利日十余行，必自止，以脾家实，腐秽当去故也。", "tags": "['太阴病', '湿热发黄', '脾家实']", "formula": "None", "formula_detail": "None", "ni_annotation": "太阴阳复自愈证。手足温、脉浮缓属太阴，脾阳恢复则腐秽自去，下利自止。", "contraindication": "None", "keywords": "['太阴', '手足自温', '暴烦下利', '脾家实', '腐秽当去', '发黄']"}, {"id": 279, "source": "伤寒论", "article_number": "279", "liujing": "太阴", "chapter": "太阴病篇", "original_text": "本太阳病，医反下之，因尔腹满时痛者，属太阴也，桂枝加芍药汤主之；大实痛者，桂枝加大黄汤主之。", "tags": "['太阴病', '桂枝加芍药汤', '桂枝加大黄汤', '误下']", "formula": "桂枝加芍药汤 / 桂枝加大黄汤", "formula_detail": "桂枝加芍药汤：桂枝三两 芍药六两 甘草二两 生姜三两 大枣十二枚。桂枝加大黄汤：上方加大黄二两", "ni_annotation": "太阳误下转属太阴腹痛。腹满时痛用桂枝加芍药汤缓急止痛，大实痛加之大黄通腑导滞。", "contraindication": "None", "keywords": "['太阴', '太阳误下', '腹满时痛', '桂枝加芍药汤', '桂枝加大黄汤']"}, {"id": 280, "source": "伤寒论", "article_number": "280", "liujing": "太阴", "chapter": "太阴病篇", "original_text": "太阴为病，脉弱，其人续自便利，设当行大黄芍药者，宜减之，以其人胃气弱，易动故也。", "tags": "['太阴病', '用药禁忌', '胃气弱']", "formula": "None", "formula_detail": "None", "ni_annotation": "太阴病胃气弱者慎用攻伐之品。大黄芍药宜减量，以防损伤胃气加重下利。", "contraindication": "胃气弱者宜减大黄芍药", "keywords": "['太阴', '脉弱', '胃气弱', '大黄芍药', '减量', '用药禁忌']"}, {"id": 281, "source": "伤寒论", "article_number": "281", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴之为病，脉微细，但欲寐也。", "tags": "['少阴提纲', '少阴病']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴病提纲证。脉微细示阴阳俱虚，但欲寐示心肾虚衰、精神萎靡。此为少阴病辨证总纲，揭示心肾虚衰之本质。", "contraindication": "None", "keywords": "['少阴', '提纲', '脉微细', '但欲寐', '心肾虚衰']"}, {"id": 282, "source": "伤寒论", "article_number": "282", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，欲吐不吐，心烦，但欲寐，五六日自利而渴者，属少阴也，虚故饮水自救。若小便色白者，少阴病形悉具，小便白者，以下焦虚有寒，不能制水，故令色白也。", "tags": "['少阴病', '辨证', '虚寒']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴虚寒辨证要点。自利而渴属少阴虚寒，小便色白为下焦虚寒确据。", "contraindication": "None", "keywords": "['少阴', '自利而渴', '小便色白', '下焦虚寒', '饮水自救']"}, {"id": 283, "source": "伤寒论", "article_number": "283", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "病人脉阴阳俱紧，反汗出者，亡阳也，此属少阴，法当咽痛而复吐利。", "tags": "['少阴病', '亡阳', '辨证']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴亡阳证。脉阴阳俱紧而汗出，阳虚外脱之危候。", "contraindication": "None", "keywords": "['少阴', '亡阳', '脉阴阳俱紧', '汗出', '咽痛', '吐利']"}, {"id": 284, "source": "伤寒论", "article_number": "284", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，咳而下利谵语者，被火气劫故也，小便必难，以强责少阴汗也。", "tags": "['少阴病', '火逆', '误治']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴病误用火法劫汗之变证。少阴禁汗，火劫伤阴，致咳利谵语小便难。", "contraindication": "强责少阴汗（禁火劫发汗）", "keywords": "['少阴', '火逆', '谵语', '小便难', '误治', '火劫']"}, {"id": 285, "source": "伤寒论", "article_number": "285", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，脉细沉数，病为在里，不可发汗。", "tags": "['少阴病', '禁忌', '不可汗']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴病里证禁汗。脉细沉数示病在里，不可发汗。", "contraindication": "不可发汗", "keywords": "['少阴', '脉细沉数', '病为在里', '不可发汗', '禁忌']"}, {"id": 286, "source": "伤寒论", "article_number": "286", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，脉微，不可发汗，亡阳故也。阳已虚，尺脉弱涩者，复不可下之。", "tags": "['少阴病', '禁忌', '不可汗下']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴病阴阳两虚禁汗禁下。脉微为亡阳，尺脉弱涩为阴血不足。", "contraindication": "不可发汗，复不可下之", "keywords": "['少阴', '脉微', '亡阳', '尺脉弱涩', '不可汗下', '禁忌']"}, {"id": 287, "source": "伤寒论", "article_number": "287", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，脉紧，至七八日，自下利，脉暴微，手足反温，脉紧反去者，为欲解也，虽烦下利，必自愈。", "tags": "['少阴病', '欲愈', '阳复']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴病阳复欲愈。脉紧去、手足温为阳气来复之佳兆，下利烦闷为祛邪之象。", "contraindication": "None", "keywords": "['少阴', '脉紧', '手足反温', '欲解', '阳复', '自愈']"}, {"id": 288, "source": "伤寒论", "article_number": "288", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，下利，若利自止，恶寒而踡卧，手足温者，可治。", "tags": "['少阴病', '可治', '预后']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴病手足温者可治。虽恶寒踡卧，但阳气未绝，预后尚可。", "contraindication": "None", "keywords": "['少阴', '下利', '恶寒', '踡卧', '手足温', '可治']"}, {"id": 289, "source": "伤寒论", "article_number": "289", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，恶寒而踡，时自烦，欲去衣被者，可治。", "tags": "['少阴病', '可治', '阳复']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴病阳气来复可治。时自烦欲去衣被为阳复阴退之兆。", "contraindication": "None", "keywords": "['少阴', '恶寒', '时自烦', '欲去衣被', '可治', '阳复']"}, {"id": 290, "source": "伤寒论", "article_number": "290", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴中风，脉阳微阴浮者，为欲愈。", "tags": "['少阴中风', '欲愈', '预后']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴中风欲愈脉象。阳微阴浮示邪气退而阳气复。", "contraindication": "None", "keywords": "['少阴', '中风', '阳微阴浮', '欲愈']"}, {"id": 291, "source": "伤寒论", "article_number": "291", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，欲解时，从子至寅上。", "tags": "['欲解时', '时间医学']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴病欲解于子丑寅时，阳气初生渐长之时。", "contraindication": "None", "keywords": "['少阴', '欲解时', '子至寅']"}, {"id": 292, "source": "伤寒论", "article_number": "292", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，吐利，手足不逆冷，反发热者，不死。脉不至者，灸少阴七壮。", "tags": "['少阴病', '灸法', '预后']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴病灸法急救。吐利而手足温者阳未绝，脉不至者灸少阴穴以回阳。", "contraindication": "None", "keywords": "['少阴', '吐利', '手足不逆冷', '脉不至', '灸少阴七壮']"}, {"id": 293, "source": "伤寒论", "article_number": "293", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病八九日，一身手足尽热者，以热在膀胱，必便血也。", "tags": "['少阴病', '热移膀胱', '便血']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴病热移膀胱证。一身手足尽热而便血，阳复太过转入太阳膀胱。", "contraindication": "None", "keywords": "['少阴', '一身手足尽热', '热在膀胱', '便血', '阳复太过']"}, {"id": 294, "source": "伤寒论", "article_number": "294", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，但厥无汗，而强发之，必动其血，未知从何道出，或从口鼻，或从目出者，是名下厥上竭，为难治。", "tags": "['少阴病', '下厥上竭', '难治', '误汗']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴禁汗。强发汗致下厥上竭，阳厥于下而阴血竭于上，为难治。", "contraindication": "强发汗（禁汗）", "keywords": "['少阴', '但厥无汗', '下厥上竭', '动血', '难治', '禁汗']"}, {"id": 295, "source": "伤寒论", "article_number": "295", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，恶寒身踡而利，手足逆冷者，不治。", "tags": "['少阴病', '不治', '阳虚至极']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴阳虚至极、阴寒内盛之危候。手足逆冷示阳气已脱。", "contraindication": "None", "keywords": "['少阴', '恶寒', '身踡', '手足逆冷', '不治']"}, {"id": 296, "source": "伤寒论", "article_number": "296", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，吐利躁烦，四逆者，死。", "tags": "['少阴病', '死证', '阳气衰微']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴病死证。吐利躁烦而四逆，阴寒内盛阳气欲绝之象。", "contraindication": "None", "keywords": "['少阴', '吐利', '躁烦', '四逆', '死']"}, {"id": 297, "source": "伤寒论", "article_number": "297", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，下利止而头眩，时时自冒者，死。", "tags": "['少阴病', '死证', '阴竭阳脱']", "formula": "None", "formula_detail": "None", "ni_annotation": "阴竭于下、阳脱于上之死证。下利虽止但头眩自冒，为阴液枯竭之危候。", "contraindication": "None", "keywords": "['少阴', '下利止', '头眩', '自冒', '死', '阴竭阳脱']"}, {"id": 298, "source": "伤寒论", "article_number": "298", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，四逆，恶寒而身踡，脉不至，不烦而躁者，死。", "tags": "['少阴病', '死证', '纯阴无阳']", "formula": "None", "formula_detail": "None", "ni_annotation": "纯阴无阳之死证。不烦而躁为阴盛格阳、神气将亡之象。", "contraindication": "None", "keywords": "['少阴', '四逆', '恶寒', '脉不至', '不烦而躁', '死']"}, {"id": 299, "source": "伤寒论", "article_number": "299", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病六七日，息高者，死。", "tags": "['少阴病', '死证', '肾不纳气']", "formula": "None", "formula_detail": "None", "ni_annotation": "肾不纳气危候。息高为呼吸浅表急促，肾气虚极不能纳气归元。", "contraindication": "None", "keywords": "['少阴', '息高', '肾不纳气', '死']"}, {"id": 300, "source": "伤寒论", "article_number": "300", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，脉微细沉，但欲卧，汗出不烦，自欲吐，至五六日自利，复烦躁不得卧寐者，死。", "tags": "['少阴病', '死证', '阴阳离决']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴病由阴证转烦躁为阴阳离决之死候。", "contraindication": "None", "keywords": "['少阴', '脉微细沉', '烦躁不得卧寐', '死', '阴阳离决']"}, {"id": 301, "source": "伤寒论", "article_number": "301", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，始得之，反发热，脉沉者，麻黄附子细辛汤主之。", "tags": "['少阴病', '麻黄附子细辛汤', '太少两感', '温经解表']", "formula": "麻黄附子细辛汤", "formula_detail": "麻黄二两 细辛二两 附子一枚", "ni_annotation": "少阴病兼表证（太少两感）代表方。发热脉沉为阳虚外感，麻黄解表、附子温经、细辛通达内外，为温经解表法之典范。", "contraindication": "None", "keywords": "['少阴', '反发热', '脉沉', '麻黄附子细辛汤', '太少两感', '温经解表']"}, {"id": 302, "source": "伤寒论", "article_number": "302", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，得之二三日，麻黄附子甘草汤微发汗。以二三日无里证，故微发汗也。", "tags": "['少阴病', '麻黄附子甘草汤', '微发汗']", "formula": "麻黄附子甘草汤", "formula_detail": "麻黄二两 甘草二两 附子一枚", "ni_annotation": "少阴表证轻剂。病已二三日无里证，用麻黄附子甘草汤微发汗，以甘草易细辛缓其发散之力，适用于阳虚外感而病程稍长之证。", "contraindication": "None", "keywords": "['少阴', '麻黄附子甘草汤', '微发汗', '无里证']"}, {"id": 303, "source": "伤寒论", "article_number": "303", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，得之二三日以上，心中烦，不得卧，黄连阿胶汤主之。", "tags": "['少阴病', '黄连阿胶汤', '阴虚火旺', '交通心肾']", "formula": "黄连阿胶汤", "formula_detail": "黄连四两 黄芩二两 芍药二两 鸡子黄二枚 阿胶三两", "ni_annotation": "少阴热化证代表方。阴虚火旺、心肾不交所致心中烦不得卧，黄连黄芩泻火、阿胶鸡子黄芍药滋阴养血，滋阴降火交通心肾。", "contraindication": "None", "keywords": "['少阴', '心中烦', '不得卧', '黄连阿胶汤', '阴虚火旺', '心肾不交']"}, {"id": 304, "source": "伤寒论", "article_number": "304", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，得之一二日，口中和，其背恶寒者，当灸之，附子汤主之。", "tags": "['少阴病', '附子汤', '阳虚寒凝', '灸法']", "formula": "附子汤", "formula_detail": "附子二枚 茯苓三两 人参二两 白术四两 芍药三两", "ni_annotation": "少阴阳虚寒凝证。背恶寒、口中和为阳虚寒盛之征，附子汤温阳散寒兼益气化湿，配合灸法回阳救逆。", "contraindication": "None", "keywords": "['少阴', '口中和', '背恶寒', '附子汤', '灸之', '阳虚寒凝']"}, {"id": 305, "source": "伤寒论", "article_number": "305", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，身体痛，手足寒，骨节痛，脉沉者，附子汤主之。", "tags": "['少阴病', '附子汤', '阳虚寒湿']", "formula": "附子汤", "formula_detail": "附子二枚 茯苓三两 人参二两 白术四两 芍药三两", "ni_annotation": "少阴阳虚寒湿身痛证。身体骨节疼痛、手足寒、脉沉为阳虚寒湿痹阻，附子汤温阳散寒除湿止痛。", "contraindication": "None", "keywords": "['少阴', '身体痛', '手足寒', '骨节痛', '脉沉', '附子汤']"}, {"id": 306, "source": "伤寒论", "article_number": "306", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，下利便脓血者，桃花汤主之。", "tags": "['少阴病', '桃花汤', '虚寒下利', '便脓血']", "formula": "桃花汤", "formula_detail": "赤石脂一斤（一半全用，一半筛末） 干姜一两 粳米一升", "ni_annotation": "少阴虚寒下利便脓血之代表方。脾肾阳虚、滑脱不禁，赤石脂涩肠固脱，干姜温中，粳米养胃，为涩肠固脱法之典范。", "contraindication": "None", "keywords": "['少阴', '下利', '便脓血', '桃花汤', '虚寒滑脱']"}, {"id": 307, "source": "伤寒论", "article_number": "307", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，二三日至四五日，腹痛，小便不利，下利不止，便脓血者，桃花汤主之。", "tags": "['少阴病', '桃花汤', '滑脱不禁']", "formula": "桃花汤", "formula_detail": "赤石脂一斤（一半全用，一半筛末） 干姜一两 粳米一升", "ni_annotation": "桃花汤重证。腹痛下利不止便脓血为脾肾阳虚、下焦不固，较306条证候更重，仍以桃花汤温涩固脱。", "contraindication": "None", "keywords": "['少阴', '腹痛', '下利不止', '便脓血', '桃花汤', '滑脱不禁']"}, {"id": 308, "source": "伤寒论", "article_number": "308", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，下利便脓血者，可刺。", "tags": "['少阴病', '针灸', '刺法']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴便脓血之针刺法。可刺幽门、交信等穴以调气血止利。", "contraindication": "None", "keywords": "['少阴', '下利', '便脓血', '可刺', '针灸']"}, {"id": 309, "source": "伤寒论", "article_number": "309", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，吐利，手足逆冷，烦躁欲死者，吴茱萸汤主之。", "tags": "['少阴病', '吴茱萸汤', '肝胃虚寒']", "formula": "吴茱萸汤", "formula_detail": "吴茱萸一升 人参三两 生姜六两 大枣十二枚", "ni_annotation": "少阴寒逆犯胃证。吐利手足逆冷烦躁为肝胃虚寒、浊阴上逆，非少阴本病，用吴茱萸汤温降肝胃。", "contraindication": "None", "keywords": "['少阴', '吐利', '手足逆冷', '烦躁欲死', '吴茱萸汤', '肝胃虚寒']"}, {"id": 310, "source": "伤寒论", "article_number": "310", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，下利，咽痛，胸满，心烦，猪肤汤主之。", "tags": "['少阴病', '猪肤汤', '阴虚咽痛', '润燥']", "formula": "猪肤汤", "formula_detail": "猪肤一斤 白蜜一升 白粉五合", "ni_annotation": "少阴阴虚咽痛证。下利伤阴、虚火上炎致咽痛胸满心烦，猪肤滋阴润燥、白蜜润肺、白粉（米粉）和中，甘润平补以制虚火。", "contraindication": "None", "keywords": "['少阴', '下利', '咽痛', '胸满', '心烦', '猪肤汤', '阴虚']"}, {"id": 311, "source": "伤寒论", "article_number": "311", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病二三日，咽痛者，可与甘草汤；不差，与桔梗汤。", "tags": "['少阴病', '甘草汤', '桔梗汤', '客热咽痛']", "formula": "甘草汤 / 桔梗汤", "formula_detail": "甘草汤：甘草二两。桔梗汤：桔梗一两 甘草二两", "ni_annotation": "少阴客热咽痛轻证。初起用甘草汤清热解毒缓痛，不效则加桔梗开提肺气、排脓散结，为治疗咽痛之基础方。", "contraindication": "None", "keywords": "['少阴', '咽痛', '甘草汤', '桔梗汤', '客热', '清热解毒']"}, {"id": 312, "source": "伤寒论", "article_number": "312", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，咽中伤，生疮，不能语言，声不出者，苦酒汤主之。", "tags": "['少阴病', '苦酒汤', '咽疮', '敛疮']", "formula": "苦酒汤", "formula_detail": "半夏十四枚 鸡子一枚（去黄，纳苦酒）", "ni_annotation": "少阴咽中疮伤重症。咽中生疮、语言不出，半夏散结化痰、鸡子清润燥、苦酒（醋）敛疮消肿，为治疗咽喉疮伤之要方。", "contraindication": "None", "keywords": "['少阴', '咽中伤', '生疮', '不能语言', '苦酒汤', '敛疮']"}, {"id": 313, "source": "伤寒论", "article_number": "313", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，咽中痛，半夏散及汤主之。", "tags": "['少阴病', '半夏散及汤', '寒客咽痛']", "formula": "半夏散及汤", "formula_detail": "半夏 桂枝 甘草各等分", "ni_annotation": "少阴寒客咽痛证。风寒客于少阴经脉所致咽痛，半夏散寒化痰、桂枝温经通阳、甘草缓急止痛，为散寒开结之剂。", "contraindication": "None", "keywords": "['少阴', '咽中痛', '半夏散及汤', '寒客', '温散']"}, {"id": 314, "source": "伤寒论", "article_number": "314", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，下利，白通汤主之。", "tags": "['少阴病', '白通汤', '阴盛格阳', '通阳']", "formula": "白通汤", "formula_detail": "葱白四茎 干姜一两 附子一枚", "ni_annotation": "少阴阴盛格阳证。下利脉微为阳气衰微阴寒内盛，葱白通阳破阴、干姜附子回阳救逆，为破阴通阳之代表方。", "contraindication": "None", "keywords": "['少阴', '下利', '白通汤', '阴盛格阳', '通阳破阴']"}, {"id": 315, "source": "伤寒论", "article_number": "315", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，下利，脉微者，与白通汤。利不止，厥逆无脉，干呕烦者，白通加猪胆汁汤主之。服汤脉暴出者死，微续者生。", "tags": "['少阴病', '白通加猪胆汁汤', '阴盛格阳', '反佐']", "formula": "白通加猪胆汁汤", "formula_detail": "葱白四茎 干姜一两 附子一枚 人尿五合 猪胆汁一合", "ni_annotation": "白通汤服后格拒之变证。利不止厥逆无脉干呕烦为阴寒格阳于外，加人尿猪胆汁咸寒反佐引阳药入阴，为热因寒用之反佐法典范。", "contraindication": "None", "keywords": "['少阴', '下利', '脉微', '厥逆无脉', '干呕烦', '白通加猪胆汁汤', '反佐']"}, {"id": 316, "source": "伤寒论", "article_number": "316", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，二三日不已，至四五日，腹痛，小便不利，四肢沉重疼痛，自下利者，此为有水气。其人或咳，或小便利，或下利，或呕者，真武汤主之。", "tags": "['少阴病', '真武汤', '阳虚水泛']", "formula": "真武汤", "formula_detail": "茯苓三两 芍药三两 生姜三两 白术二两 附子一枚", "ni_annotation": "少阴阳虚水泛证代表方。腹痛小便不利四肢沉重为阳虚不能制水、水气内停，真武汤温阳利水，附子温肾阳、苓术健脾利水、芍药敛阴和营、生姜散水气。", "contraindication": "None", "keywords": "['少阴', '腹痛', '小便不利', '四肢沉重', '水气', '真武汤', '温阳利水']"}, {"id": 317, "source": "伤寒论", "article_number": "317", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，下利清谷，里寒外热，手足厥逆，脉微欲绝，身反不恶寒，其人面色赤，或腹痛，或干呕，或咽痛，或利止脉不出者，通脉四逆汤主之。", "tags": "['少阴病', '通脉四逆汤', '阴盛格阳', '真寒假热']", "formula": "通脉四逆汤", "formula_detail": "甘草二两 附子大者一枚 干姜三两（强人可四两）", "ni_annotation": "少阴阴盛格阳重证。里寒外热、身反不恶寒面赤为真寒假热之格阳证，较四逆汤加重姜附用量以破阴回阳、通达内外，救亡阳于顷刻。", "contraindication": "None", "keywords": "['少阴', '下利清谷', '里寒外热', '手足厥逆', '脉微欲绝', '面赤', '通脉四逆汤', '格阳']"}, {"id": 318, "source": "伤寒论", "article_number": "318", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，四逆，其人或咳，或悸，或小便不利，或腹中痛，或泄利下重者，四逆散主之。", "tags": "['少阴病', '四逆散', '阳郁四逆', '疏肝解郁']", "formula": "四逆散", "formula_detail": "甘草 枳实 柴胡 芍药各十分", "ni_annotation": "少阴阳郁四逆证。四逆非阳虚乃气机郁滞、阳不外达，柴胡疏肝、枳实行气、芍药柔肝、甘草缓中，为疏肝解郁、透达郁阳之祖方。", "contraindication": "None", "keywords": "['少阴', '四逆', '四逆散', '阳郁', '疏肝解郁', '或然证']"}, {"id": 319, "source": "伤寒论", "article_number": "319", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，下利六七日，咳而呕渴，心烦不得眠者，猪苓汤主之。", "tags": "['少阴病', '猪苓汤', '阴虚水热互结', '育阴利水']", "formula": "猪苓汤", "formula_detail": "猪苓 茯苓 阿胶 泽泻 滑石各一两", "ni_annotation": "少阴阴虚水热互结证。下利伤阴、水热互结致咳呕渴烦不眠，猪苓汤利水不伤阴、滋阴不碍湿，阿胶育阴、滑石清热利窍，为育阴利水法代表方。", "contraindication": "None", "keywords": "['少阴', '下利', '咳而呕渴', '心烦不得眠', '猪苓汤', '育阴利水', '水热互结']"}, {"id": 320, "source": "伤寒论", "article_number": "320", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，得之二三日，口燥咽干者，急下之，宜大承气汤。", "tags": "['少阴病', '大承气汤', '少阴三急下', '急下存阴']", "formula": "大承气汤", "formula_detail": "大黄四两 厚朴半斤 枳实五枚 芒硝三合", "ni_annotation": "少阴三急下之一。少阴病二三日即口燥咽干，为邪热内伏、真阴将竭之危候，急下以存阴，釜底抽薪。", "contraindication": "None", "keywords": "['少阴', '口燥咽干', '急下之', '大承气汤', '急下存阴', '少阴三急下']"}, {"id": 321, "source": "伤寒论", "article_number": "321", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，自利清水，色纯青，心下必痛，口干燥者，可下之，宜大承气汤。", "tags": "['少阴病', '大承气汤', '少阴三急下', '热结旁流']", "formula": "大承气汤", "formula_detail": "大黄四两 厚朴半斤 枳实五枚 芒硝三合", "ni_annotation": "少阴三急下之二。自利清水色纯青为热结旁流，心下痛口干燥为燥屎内结，与320条同为急下存阴之证。", "contraindication": "None", "keywords": "['少阴', '自利清水', '色纯青', '心下痛', '口干燥', '大承气汤', '热结旁流']"}, {"id": 322, "source": "伤寒论", "article_number": "322", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，六七日，腹胀，不大便者，急下之，宜大承气汤。", "tags": "['少阴病', '大承气汤', '少阴三急下', '燥屎内结']", "formula": "大承气汤", "formula_detail": "大黄四两 厚朴半斤 枳实五枚 芒硝三合", "ni_annotation": "少阴三急下之三。六七日腹胀不大便，燥屎内结、浊气壅滞，少阴三急下证皆以存阴为急务，大承气汤釜底抽薪。", "contraindication": "None", "keywords": "['少阴', '腹胀', '不大便', '急下之', '大承气汤', '燥屎内结']"}, {"id": 323, "source": "伤寒论", "article_number": "323", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，脉沉者，急温之，宜四逆汤。", "tags": "['少阴病', '四逆汤', '急温', '回阳救逆']", "formula": "四逆汤", "formula_detail": "甘草二两 干姜一两半 附子一枚", "ni_annotation": "少阴急温证。脉沉为阳气衰微，急用四逆汤回阳救逆。与三急下相对，此急温之证示少阴病有寒化热化两端。", "contraindication": "None", "keywords": "['少阴', '脉沉', '急温之', '四逆汤', '回阳救逆']"}, {"id": 324, "source": "伤寒论", "article_number": "324", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，饮食入口则吐，心中温温欲吐，复不能吐。始得之，手足寒，脉弦迟者，此胸中实，不可下也，当吐之。若膈上有寒饮，干呕者，不可吐也，当温之，宜四逆汤。", "tags": "['少阴病', '四逆汤', '寒饮', '吐法', '辨证']", "formula": "四逆汤（温之）", "formula_detail": "甘草二两 干姜一两半 附子一枚", "ni_annotation": "少阴胸中实与膈上寒饮鉴别。胸中实可吐、寒饮当温，干呕为膈上寒饮用四逆汤温化寒饮，示少阴病当明辨虚实。", "contraindication": "膈上有寒饮者不可吐，当温之", "keywords": "['少阴', '饮食入口则吐', '膈上有寒饮', '干呕', '四逆汤', '当温之', '不可吐']"}, {"id": 325, "source": "伤寒论", "article_number": "325", "liujing": "少阴", "chapter": "少阴病篇", "original_text": "少阴病，下利，脉微涩，呕而汗出，必数更衣，反少者，当温其上，灸之。", "tags": "['少阴病', '灸法', '阳虚气陷']", "formula": "None", "formula_detail": "None", "ni_annotation": "少阴阳虚气陷证。下利脉微涩、呕而汗出、频欲便而量少，气虚下陷，灸百会温其上以升阳举陷。", "contraindication": "None", "keywords": "['少阴', '下利', '脉微涩', '呕而汗出', '数更衣反少', '灸之', '阳虚气陷']"}, {"id": 326, "source": "伤寒论", "article_number": "326", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "厥阴之为病，消渴，气上撞心，心中疼热，饥而不欲食，食则吐蚘，下之利不止。", "tags": "消渴,气上撞心,心中疼热,饥而不欲食,吐蚘,下利", "formula": "", "formula_detail": "", "ni_annotation": "厥阴病提纲。厥阴为三阴之尽，阴尽阳生之界。上热下寒、寒热错杂是厥阴病的基本病机。消渴为上热伤津，气上撞心、心中疼热为热邪犯心，饥而不欲食、食则吐蛔为下寒犯胃。不可下，下之则利不止，里更虚也。", "contraindication": "禁下", "keywords": "厥阴提纲,寒热错杂,上热下寒"}, {"id": 327, "source": "伤寒论", "article_number": "327", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "厥阴中风，脉微浮为欲愈，不浮为未愈。", "tags": "中风,脉微浮", "formula": "", "formula_detail": "", "ni_annotation": "厥阴中风，脉见微浮，是阳气来复之象，故为欲愈。不浮则阳未复，病未愈。", "contraindication": "", "keywords": "厥阴中风,脉微浮欲愈"}, {"id": 328, "source": "伤寒论", "article_number": "328", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "厥阴病欲解时，从丑至卯上。", "tags": "欲解时", "formula": "", "formula_detail": "", "ni_annotation": "厥阴欲解时在丑寅卯时（凌晨1点至7点），此时阳气渐生，厥阴木气得令。", "contraindication": "", "keywords": "厥阴欲解时,丑至卯"}, {"id": 329, "source": "伤寒论", "article_number": "329", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "厥阴病，渴欲饮水者，少少与之愈。", "tags": "渴欲饮水", "formula": "", "formula_detail": "", "ni_annotation": "厥阴病消渴是热邪伤津，但不可大量饮水，少少与之，使胃气调和，津液渐复自愈。若暴饮则停水为患。", "contraindication": "", "keywords": "厥阴渴,少少与之"}, {"id": 330, "source": "伤寒论", "article_number": "330", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "诸四逆厥者，不可下之，虚家亦然。", "tags": "四逆,厥逆", "formula": "", "formula_detail": "", "ni_annotation": "四肢厥逆者，多为阳虚寒盛，不可用下法。虚家亦然，虚人禁下。", "contraindication": "禁下", "keywords": "诸四逆厥不可下"}, {"id": 331, "source": "伤寒论", "article_number": "331", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒先厥，后发热而利者，必自止，见厥复利。", "tags": "先厥后热,下利", "formula": "", "formula_detail": "", "ni_annotation": "先厥后发热，阳气来复，故利必自止。若再见厥，则阴寒复盛，利亦复作。此辨厥热进退之法。", "contraindication": "", "keywords": "先厥后热,厥热进退"}, {"id": 332, "source": "伤寒论", "article_number": "332", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒始发热六日，厥反九日而利。凡厥利者，当不能食，今反能食者，恐为除中。食以索饼，不发热者，知胃气尚在，必愈，恐暴热来出而复去也。后日脉之，其热续在者，期之旦日夜半愈。所以然者，本发热六日，厥反九日，复发热三日，并前六日，亦为九日，与厥相应，故期之旦日夜半愈。后三日脉之，而脉数，其热不罢者，此为热气有余，必发痈脓也。", "tags": "厥利,能食,除中,发热,脉数,痈脓", "formula": "", "formula_detail": "", "ni_annotation": "厥多于热（厥九日、热六日），本为病进。今反能食，当辨是否除中（胃气败绝之回光返照）。食以索饼试之，不发热则胃气尚在。若厥热日数相当，阳气来复，可期自愈。若热太过，则为热气有余，必发痈脓。", "contraindication": "", "keywords": "除中,厥热日数,索饼试之"}, {"id": 333, "source": "伤寒论", "article_number": "333", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒脉迟六七日，而反与黄芩汤彻其热。脉迟为寒，今与黄芩汤复除其热，腹中应冷，当不能食，今反能食，此名除中，必死。", "tags": "脉迟,黄芩汤,除中,不能食,反能食", "formula": "", "formula_detail": "", "ni_annotation": "脉迟为寒，当温之，反与黄芩汤寒凉之剂撤其热，是寒上加寒。本应不能食而反能食，此为除中，胃气败绝之象，故必死。", "contraindication": "", "keywords": "脉迟寒证误用黄芩汤,除中必死"}, {"id": 334, "source": "伤寒论", "article_number": "334", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒先厥后发热，下利必自止，而反汗出，咽中痛者，其喉为痹。发热无汗，而利必自止，若不止，必便脓血，便脓血者，其喉不痹。", "tags": "先厥后热,下利,汗出,咽痛,喉痹,便脓血", "formula": "", "formula_detail": "", "ni_annotation": "先厥后热为阳复，下利当止。若阳复太过而上冲则汗出咽痛喉痹，若阳复太过而下迫则便脓血。热邪上冲与下迫不同，故喉痹与便脓血不并见。", "contraindication": "", "keywords": "阳复太过,喉痹,便脓血"}, {"id": 335, "source": "伤寒论", "article_number": "335", "liujing": "厥阴", "chapter": "辨厥阴病脉证并治", "original_text": "伤寒一二日至四五日，厥者必发热，前热者后必厥，厥深者热亦深，厥微者热亦微。厥应下之，而反发汗者，必口伤烂赤。", "tags": "厥,热,厥深热深,口伤烂赤", "formula": "", "formula_detail": "", "ni_annotation": "此论热厥。热邪内郁致厥，厥深热深，厥微热微。热厥当用下法（清下里热），若误发汗则伤津助热，必致口伤烂赤。", "contraindication": "热厥禁汗", "keywords": "厥深热深,热厥当下"},
