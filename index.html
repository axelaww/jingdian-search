 "黄帝内经", "article_number": "72", "liujing": "", "chapter": "素问·至真要大论", "original_text": "诸风掉眩，皆属于肝。诸寒收引，皆属于肾。诸气膹郁，皆属于肺。诸湿肿满，皆属于脾。诸热瞀瘈，皆属于火。诸痛痒疮，皆属于心。", "tags": "病机十九条,至真要,辨证求因", "formula": "", "formula_detail": "", "ni_annotation": "病机十九条是《内经》临床辨证的精华浓缩！十九条把千变万化的症状归纳为有限的几类病因病机归属。最著名的前六条：'诸风掉眩皆属于肝'——凡抽搐眩晕多与肝相关；'诸寒收引皆属于肾'——凡寒冷收缩拘急多与肾相关；'诸气膹郁皆属于肺'——凡喘促胸闷多与肺相关；'诸湿肿满皆属于脾'——凡水肿胀满多与脾相关；'诸热瞀瘈皆属于火'——凡热病神昏抽搐多与火相关；'诸痛痒疮皆属于心'——凡疼痛瘙痒疮疡多与心(火)相关。熟记十九条可以快速定位病机所在脏腑。", "contraindication": "", "keywords": "病机十九条,辨证提纲,临床精华"}, {"id": 1106, "source": "黄帝内经", "article_number": "73", "liujing": "", "chapter": "素问·著至教论", "original_text": "而道上知天文，下知地理，中知人事，可以长久，以教众庶，亦不疑殆。医道论篇，可传后世，可以为宝。", "tags": "著至教,医道传承,上知天文", "formula": "", "formula_detail": "", "ni_annotation": "'著至教论'强调医学教育的全面性和传承的重要性。一个好的医生必须'上知天文，下知地理，中知人事'——天文对应五运六气时令变化，地理对应地域环境因地制宜，人事对应社会心理人文关怀。这三个维度缺一不可。医学知识要整理成论著流传后世('医道论篇可传后世')。这篇启示我们：中医不仅是技术更是文化，学习者要有广博的知识储备和深厚的人文素养。", "contraindication": "", "keywords": "医道传承,天文地理人事,医学教育"}, {"id": 1107, "source": "黄帝内经", "article_number": "74", "liujing": "", "chapter": "素问·示从容论", "original_text": "汝受术诵书，若能览观杂学，及于此类，通合道理，为余言子所长。五脏六腑，胆胃大小肠脾胞膀胱，脑髓骨脉胆女子胞，此皆相近而不同，或从内，或从外。", "tags": "示从容,博览群书,从容辨证", "formula": "", "formula_detail": "", "ni_annotation": "'示从容论'告诫医生诊断时要从容不迫、广泛涉猎。'览观杂学'——除了医学经典还要阅读各种相关知识，'通合道理'——融会贯通形成自己的见解。文中列举了大量脏腑器官名称，指出它们'相近而不同'(结构相邻但功能各异)，有的病变从内部发展而来，有的是外部因素诱发。面对复杂的病情，医生不能急于下结论，要冷静收集信息、综合分析，这就是'从容'的诊断态度。", "contraindication": "", "keywords": "从容诊断,博览,综合分析"}, {"id": 1108, "source": "黄帝内经", "article_number": "75", "liujing": "", "chapter": "素问·疏五过论", "original_text": "凡未诊病者，必问尝贵后贱，虽不中邪，病从内生，名曰脱营。尝富后贫，名曰失精。必问饮食居处，暴乐暴苦，始乐后苦，皆伤精气。", "tags": "五过失,脱营失精,问诊详尽", "formula": "", "formula_detail": "", "ni_annotation": "'疏五过论'列出医生诊断时最容易犯的五种过失，第一条就是'不问贵贱贫富之变迁'。'尝贵后贱'(曾经高贵后来卑微)即使没有外感邪气也会'病从内生'叫'脱营'(营气耗损)；'尝富后贫'叫'失精'(精气丧失)。社会地位和经济状况的急剧变化会造成巨大的心理冲击进而损害身体健康。医生必须详细询问患者的生活经历和社会背景(饮食居住、情绪起伏等)，否则就容易漏掉重要的病因。这条在今天仍然极具现实意义。", "contraindication": "", "keywords": "五过,脱营失精,问诊,生物心理社会"}, {"id": 1109, "source": "黄帝内经", "article_number": "76", "liujing": "", "chapter": "素问·征四失论", "original_text": "所以不全者，精神不专，志意不理，外内相失，故时疑殆。诊不知阴阳逆从之理，此治之一失也。受师不卒，妄作杂术，谬言为道，更名自功。", "tags": "四失,医师修养,学术严谨", "formula": "", "formula_detail": "", "ni_annotation": "'征四失论'批评医生执业中常见的四种失误。第一失：不懂阴阳逆从的基本道理就盲目施治；第二失：跟师学习没有毕业('受师不卒')就去'妄作杂术'(胡乱使用各种花哨的技术)还自称有道；第三失：不辨病人贫富贵贱个体差异千篇一律地对待；第四失：不重视脉诊盲目下结论。这些批评直击要害——直到今天不少医生仍然犯类似的错误：理论基础不牢就敢创新、不尊重老师的学习过程、缺乏个性化诊疗思维。值得每位从业者警醒反思。", "contraindication": "", "keywords": "四失,医德医风,学术态度"}, {"id": 1110, "source": "黄帝内经", "article_number": "77", "liujing": "", "chapter": "素问·方盛衰论", "original_text": "是以春夏归阳为生，归阴为死；秋冬归阴为生，归阳为死。气之方盛，不可针以泻之，气之方衰，不可针以补之。是以脉事必有度量，揆度奇恒，区别阴阳。", "tags": "方盛衰,脉诊度量,补泻时机", "formula": "", "formula_detail": "", "ni_annotation": "'方盛衰论'论述脉诊的精细标准和针刺时机的把握。再次强调四时生死规律(与诊要经终论呼应)：春夏见阳脉为顺(生)见阴脉为逆(死)，秋冬相反。针刺补泻也有严格时机要求：'气方盛不可泻之'——邪气正盛时不能用泻法(邪盛之时攻邪会激邪反抗)，'气方衰不可补之'——正气将竭时不能蛮补(虚不受补反而加重负担)。'脉事必有度量'——诊脉必须有客观标准和精确测量，'揆度奇恒'——在常规与特殊之间仔细鉴别。这些细节决定了治疗效果的好坏。", "contraindication": "", "keywords": "脉诊标准,补泻时机,度量揆度"}, {"id": 1111, "source": "黄帝内经", "article_number": "78", "liujing": "", "chapter": "素问·解精微论", "original_text": "夫水之精为志，火之精为神。水火相逮，神志共治。故泣而出者，水气所乘也。夫涕泣者，脑也。脑者阴也，髓者骨之充也。故脑渗为涕。", "tags": "解精微,水火神志,涕泣来源", "formula": "", "formula_detail": "", "ni_annotation": "'解精微论'探讨人体一些微妙现象背后的原理。'水之精为志，火之精为神'——肾水之精凝聚成意志力，心火之精凝聚成精神意识。水火既济则神志协调。'泣而出者水气所乘'——哭泣出水液是水气偏盛的结果。'涕泣者脑也'——眼泪鼻涕来源于脑(中医认为脑为髓海，肾主骨生髓，髓渗为涕泪)。虽然这些解释与现代解剖学不同，但它建立了一个以水火(阴阳)为核心的心理-生理统一模型，对理解情志性疾病有一定启发意义。", "contraindication": "", "keywords": "精微,水火神志,情志,脑髓"}, {"id": 1112, "source": "黄帝内经", "article_number": "79", "liujing": "", "chapter": "素问·调经论(补遗)", "original_text": "血气者，人之神，不可不谨养。气血不和，百病乃变化而生。阴虚则内寒，阳虚则外寒，阴盛则内热，阳盛则外热。", "tags": "气血调和,寒热虚实,阴阳盛衰", "formula": "", "formula_detail": "", "ni_annotation": "此段总结调经论的精髓。'血气者人之神'——气血是人体精神的物质基础，气血充足调和则精神饱满，气血亏虚或紊乱则神志异常。'气血不和百病乃变化而生'——几乎所有疾病的根源都可以归结到气血的不协调。四种基本病理类型：阴虚内寒(阴液不足产生的虚寒)、阳虚外寒(阳气不足的表寒)、阴盛内热(阴邪过盛的实热)、阳盛外热(阳邪亢盛的表热)。辨明这四种基本类型就能抓住疾病的大方向。", "contraindication": "", "keywords": "气血,人之神,四种基本病机"}, {"id": 1113, "source": "黄帝内经", "article_number": "80", "liujing": "", "chapter": "素问·标本病传(补遗)", "original_text": "先病而后逆者治其本，先逆而后病者治其本。先寒而后生病者治其本，先病而后生寒者治其本。必且先调其气血，而后治他病。", "tags": "标本先后,治疗顺序,调气为先", "formula": "", "formula_detail": "", "ni_annotation": "进一步阐释标本治疗的顺序原则。不管是什么情况——先病后逆(先有原发病继发气血逆乱)还是先逆后病——都要'治其本'(治疗根本原因)。先寒后病或先病后寒也都治其本。'必且先调其气血而后治他病'——不管什么病第一步总是要先调和气血，气血通畅了再处理具体的局部问题。这个'气血优先'的原则贯穿整个中医治疗学。很多慢性病久治不愈就是因为只顾治标而没有先调好气血这个根本。", "contraindication": "", "keywords": "标本,治本,调气为先,治疗次序"}, {"id": 1114, "source": "黄帝内经", "article_number": "81", "liujing": "", "chapter": "素问·结语(全书总结)", "original_text": "至道在微，变化无穷，孰知其原！窘乎哉，消者瞿瞿，孰知其要！闵闵之当，孰者为良！恍惚之数，生于毫厘，毫厘之数，起于度量，千之万之，可以益大，推之大之，其形乃制。", "tags": "至道在微,精益求精,医道无穷", "formula": "", "formula_detail": "", "ni_annotation": "这段话可作为《素问》全书的总结和勉励。'至道在微变化无穷'——最高的道理存在于细微之处，疾病的变化无穷无尽谁能穷尽其本源！'消者瞿瞿'——研究消除疾病的人要兢兢业业小心翼翼，'孰知其要'——谁知道其中的要领呢！'恍惚之数生于毫厘'——那些看似模糊不确定的东西其实起源于极其微小的差别，从毫厘之差开始积累千倍万倍就可以发展成大的病变形态(量变到质变)。这告诫医生要注重细节、见微知著，在疾病萌芽阶段就及时发现和处理。医道博大精深值得我们终身学习和探索。", "contraindication": "", "keywords": "至道在微,精益求精,终身学习"}, {"id": 1115, "source": "黄帝内经", "article_number": "82", "liujing": "", "chapter": "灵枢·九针十二原", "original_text": "黄帝问于岐伯曰：余子万民，养百姓，而收其租税。余哀其不给，而有疾病。余欲勿使被毒药，无用砭石，欲以微针，通其经脉，调其血气，营其逆顺出入之会。令可传于后世，必明为之法。令终而不灭，久而不绝，易用难忘，为之经纪。异其章，别其表里，为之终始。令各有形，先立《针经》。愿闻其情。", "tags": "九针,十二原,刺法", "formula": "", "formula_detail": "", "ni_annotation": "这是《灵枢》的开篇，黄帝要建立一套完整的针灸体系。他说的'微针'就是我们现在用的毫针，不是粗大的砭石。'通其经脉，调其血气'——针灸的核心作用就是疏通经脉、调理气血。'营其逆顺出入之会'讲的是气血在经脉中运行有顺有逆，针灸师必须懂这个规律。'易用难忘'是教学原则：方法要好学，但要刻骨铭心不忘掉。这就是为什么倪师反复强调基本功的重要性。", "contraindication": "", "keywords": "九针,刺法,经脉"}, {"id": 1116, "source": "黄帝内经", "article_number": "83", "liujing": "", "chapter": "灵枢·九针十二原", "original_text": "五脏有六腑，六腑有十二原，十二原出于四关，四关主治五脏。五脏有疾也，当取之十二原。十二原者，五脏之所以禀三百六十五节气味也。五脏有疾也，应出十二原，而原各有所出。明知其原，睹其应，而知五脏之害矣。", "tags": "十二原穴,四关,五脏取原", "formula": "", "formula_detail": "", "ni_annotation": "'十二原'是十二个最重要的穴位，'出于四关'就是说分布在四肢的关节处（腕踝关节附近）。这十二个原穴能治五脏的病，因为它们是脏腑精气汇聚和输布的关键点。'明知其原，睹其应'——你懂得了原穴的位置，观察它上面的反应（如压痛、结节、色泽变化），就能知道五脏哪里出了问题。临床诊断时摸一摸太渊、太白、太冲这些原穴，常常能发现惊人的信息。", "contraindication": "", "keywords": "十二原穴,四关,诊断"}, {"id": 1117, "source": "黄帝内经", "article_number": "84", "liujing": "", "chapter": "灵枢·九针十二原", "original_text": "凡将用针，必先诊脉，视气之剧易，乃可以治也。五脏之气已绝于内，而用针者反益其外，是谓重竭。重竭必死，其死也静，治之者辄反其气，取腋与膺。五脏之气已绝于外，而用针者反益其内，是谓逆厥。逆厥则必死，其死也躁，治之者反取四末。", "tags": "刺法禁忌,脉诊,重竭逆厥", "formula": "", "formula_detail": "", "ni_annotation": "这段讲的是针刺的致命错误！'五脏之气已绝于内'——病人阴气已经虚极，你还往外面泻（取腋与膺的穴位），叫'重竭'，人死得很安静。反过来，阳气已经外脱了，你还往里补，叫'逆厥'，人死得烦躁。所以针灸前必须诊脉！不懂脉象就下针，等于杀人。倪师常说：不会脉诊的人不要扎针，就是这个道理。脉是判断虚实寒热的根本依据。", "contraindication": "", "keywords": "刺法禁忌,脉诊,误刺"}, {"id": 1118, "source": "黄帝内经", "article_number": "85", "liujing": "", "chapter": "灵枢·本输", "original_text": "肺出于少泽，少泽者，手小指端内侧也，为井金；溜于鱼际，鱼际者，手鱼也，为荥；注于大渊，大渊，掌后两骨之间方动者也，为输；行于经渠，经渠，寸口中也，行于寸口中，为经；入于尺泽，尺泽，肘中之动脉也，为合。手太阴经也。", "tags": "五输穴,肺经,井荥输经合", "formula": "", "formula_detail": "", "ni_annotation": "这是肺经的五输穴系统：少商（井）、鱼际（荥）、太渊（输）、经渠（经）、尺泽（合）。五输穴是经络学说最核心的内容之一，每条经都有五个关键穴位，像水流一样从源头（井）到入海（合）。'井'在四肢末端，是经气发源之地；'合'在肘膝关节附近，是经气汇入深处的地方。临床上，井穴多用于急救醒神，合穴多用于治脏腑深部病变。背熟六十六条五输穴，针灸就入门了。", "contraindication": "", "keywords": "五输穴,肺经,井荥输经合"}, {"id": 1119, "source": "黄帝内经", "article_number": "86", "liujing": "", "chapter": "灵枢·本输", "original_text": "膀胱出于至阴，至阴者，足小指之端也，为井金；溜于通谷，通谷，本节之前外侧也，为荥；注于束骨，束骨，本节之后陷者中也，为输；过于京骨，京骨，足外侧大骨之下，为原；行于昆仑，昆仑，在外踝之后跟骨之上，为经；入于委中，委中，腘中央，为合，委而取之。足太阳经也。", "tags": "五输穴,膀胱经,原穴", "formula": "", "formula_detail": "", "ni_annotation": "膀胱经是人体最长的一条经脉，'太阳'主一身之表。它的五输穴加上原穴京骨，共六个关键点。注意这里有个特点——阳经才有原穴，阴经以输代原。委中穴'腘中央，委而取之'，就在膝盖后面的腘窝正中，是治疗腰背痛的第一要穴，所谓'腰背委中求'。膀胱经从头走脚，覆盖整个背部，所以背部的病、腰腿痛都离不开这条经。", "contraindication": "", "keywords": "五输穴,膀胱经,委中"}, {"id": 1120, "source": "黄帝内经", "article_number": "87", "liujing": "", "chapter": "灵枢·小针解", "original_text": "夫气之在脉也，邪气在上，浊气在中，清气在下。故针陷脉则邪气出，针中脉则浊气出，针太深则邪气反沉，病益甚。故曰：皮肉筋脉各有所处，病各有所宜，各不同形，各以任其所宜。无实实无虚虚，损不足而益有余，是为中工所重也。", "tags": "小针解,针刺深度,补泻", "formula": "", "formula_detail": "", "ni_annotation": "'小针'就是毫针。这段讲针刺的三个层次：浅层去邪气（邪气在上），中层去浊气（浊气在中），深层要小心——扎太深反而让邪气深入！'无实实无虚虚'八个字是补泻的总纲：实证不能再用补法（实实），虚证不能用泻法（虚虚）。很多初学者不管三七二十一乱扎一通，结果'损不足而益有余'——把虚的更搞虚了，把实的更搞实了。所以倪师强调：辨证是第一位的，不辨虚实就下针是庸医行为。", "contraindication": "", "keywords": "针刺补泻,虚实,小针"}, {"id": 1121, "source": "黄帝内经", "article_number": "88", "liujing": "", "chapter": "灵枢·邪气脏腑病形", "original_text": "诸急者多寒；缓者多热；大者多气少血；小者血气皆少。滑者阳气盛，微有热；涩者多血少气，微有寒。故刺急者，深内而久留之；刺缓者，浅内而疾发针，以去其热；刺大者，微泻其气，无出其血；刺滑者，疾发针而浅内之，以泻其阳气而去其热；刺涩者，必中其脉，随其逆顺而久留之。", "tags": "脉象辨证,针刺手法,急缓大小滑涩", "formula": "", "formula_detail": "", "ni_annotation": "这段把脉象和刺法完美结合在一起。'急脉'多寒，要深刺久留——因为寒凝需要温通；'缓脉'多热，要浅刺快出——热需要散；'大脉'是气多血少，微泻气但不要出血；'滑脉'阳盛有热，快进快出泻阳气；'涩脉'气血不畅且有寒，要刺中经脉、久留针。六种脉象对应六种不同的刺法，这才是真正的'因人而施'。临床看到脉就知道了该用什么手法，不需要病人多说一个字。", "contraindication": "", "keywords": "脉象,针刺手法,辨证论治"}, {"id": 1122, "source": "黄帝内经", "article_number": "89", "liujing": "", "chapter": "灵枢·根结", "original_text": "太阳根于至阴，结于命门，命门者目也。阳明根于厉兑，结于颡大，颡大者钳耳也。少阳根于窍阴，结于窗笼，窗笼者耳中也。太阳为开，阳明为阖，少阳为枢。故开折则肉节渎而暴病起矣，故暴病者取之太阳，视有余不足，渎者皮肉宛燋而弱也。阖折则气无所止息而痿疾起矣，故痿疾者取之阳明，视有余不足。", "tags": "根结理论,三阳开阖枢,太阳阳明少阳", "formula": "", "formula_detail": "", "ni_annotation": "'根结理论'是经络学说的高级内容。'根'是经气的根源（在四肢末端），'结'是经气归结之处（头面五官部位）。太阳根在至阴（足小趾），结在眼睛（命门即目）；阳明根在厉兑（足二趾），结在鼻旁（颡大）；少阳根在窍阴（足四趾），结在耳中。更关键的是'开阖枢'：太阳主'开'（主表，负责打开门户），阳明主'阖'（主里，负责收藏），少阳主'枢'（半表半里，负责转枢）。三阳开阖枢失调，就会产生相应的病变。", "contraindication": "", "keywords": "根结,开阖枢,三阳"}, {"id": 1123, "source": "黄帝内经", "article_number": "90", "liujing": "", "chapter": "灵枢·寿夭刚柔", "original_text": "人之生也，有刚有柔，有弱有强，有短有长，有阴有阳。黄帝问曰：余闻人之生也，有刚有柔，有弱有强，有短有长，有阴有阳，愿闻其方。岐伯对曰：阴中有阴，阳中有阳，审知阴阳，刺之有方。得病所始，刺之有理。谨度病端，与时相应。内合于五脏六腑，外合于筋骨皮肤。", "tags": "阴阳刚柔,体质,辨证刺法", "formula": "", "formula_detail": "", "ni_annotation": "人的体质天生就有差别——有的刚强，有的柔弱，有的高大，有的矮小，这些都是阴阳禀赋不同。'阴中有阴，阳中有阳'说明阴阳是分层次的。治病要先了解病人的体质基础（'审知阴阳'）和发病原因（'得病所始'），然后才能确定正确的刺法。同样一个病，体强者可以猛攻，体弱者只能缓图。现在中医最大的问题就是不看人只看病——不管什么体质都用同一个方子，效果当然不好。", "contraindication": "", "keywords": "体质,阴阳,刚柔"}, {"id": 1124, "source": "黄帝内经", "article_number": "91", "liujing": "", "chapter": "灵枢·官针", "original_text": "凡刺有九，以应九变。一曰俞刺，俞刺者，刺诸经荥输脏俞也。二曰远道刺，远道刺者，病在上，取之下，刺腑俞也。三曰经刺，经刺者，刺大经之结络经分也。四曰络刺，络刺者，刺小络之血脉也。五曰分刺，分刺者，刺分肉之间也。六曰大泻刺，大泻刺者，刺大脓以铍针也。七曰毛刺，毛刺者，刺浮痹皮肤也。八曰巨刺，巨刺者，左取右，右取左也。九曰焠刺，焠刺者，刺燔针则取痹也。", "tags": "九种刺法,官针,巨刺远道刺", "formula": "", "formula_detail": "", "ni_annotation": "这是九种不同的刺法，每种针对不同的病情。特别要注意几个关键的：'远道刺'——病在上面取下面的穴位，比如头痛扎脚上的穴；'巨刺'——左边的病扎右边，右边的病扎左边（用于经脉受邪）；'焠刺'就是火针，烧红了再扎，专治顽固性风寒湿痹。九种刺法对应九种变化，临床要根据具体情况选择。不要只会一种直刺法就包打天下——不同的病要用不同的针法，才能取得好的疗效。", "contraindication": "", "keywords": "九种刺法,巨刺,火针"}, {"id": 1125, "source": "黄帝内经", "article_number": "92", "liujing": "", "chapter": "灵枢·本神", "original_text": "故生之来谓之精，两精相搏谓之神，随神往来者谓之魂，并精而出入者谓之魄，所以任物者谓之心，心有所忆谓之意，意之所存谓之志，因志而存变谓之思，因思而远慕谓之虑，因虑而处物谓之智。故智者之养生也，必顺四时而适寒暑，和喜怒而安居处，节阴阳而调刚柔，如是则僻邪不至，长生久视。", "tags": "精神魂魄意志思虑智,神志,养生", "formula": "", "formula_detail": "", "ni_annotation": "这是中医对心理活动最系统的论述！从'精'开始：父母之精结合产生生命→两精相搏产生'神'→神活动产生'魂'（伴随神的往来活动）→精的出入产生'魄'（本能反应）→心的感知功能→记忆形成'意'→意的持续形成'志'→志的变化产生'思'→思的延伸产生'虑'→虑的决断产生'智'。十个层次环环相扣！失眠、焦虑、抑郁等神志病，要从这个链条上去找问题出在哪一环节。肝藏魂、肺藏魄、脾藏意、肾藏志、心藏神——五脏各自管一摊。", "contraindication": "", "keywords": "精神魂魄,五脏所藏,神志病"}, {"id": 1126, "source": "黄帝内经", "article_number": "93", "liujing": "", "chapter": "灵枢·终始", "original_text": "凡刺之道，毕于终始，明知终始，五脏为纪，阴阳定矣。阴者主脏，阳者主腑，阳受气于四末，阴受气于五脏。故泻者迎之，补者随之，知迎知随，气可令和。和气之方，必通阴阳，五脏为阴，六腑为阳，传之后世，以血为盟。敬之者昌，慢之者亡，无道行私，必得天殃。", "tags": "终始,迎随补泻,阴阳脏腑", "formula": "", "formula_detail": "", "ni_annotation": "'终始'讲的是经脉循行的起点和终点，以及基于此的补泻法则。核心是'迎随补泻'：'泻者迎之'——顺着经气来的方向进针（迎头拦截）是泻法；'补者随之'——顺着经气去的方向进针（跟随推送）是补法。听起来简单，但要做到'气可令和'——让气血调和——需要深厚的功底。'敬之者昌，慢之者亡'这句话分量很重：对待医道要恭敬，轻忽怠慢的人必然害人害己。这不是迷信，是对生命的敬畏。", "contraindication": "", "keywords": "迎随补泻,终始,阴阳"}, {"id": 1127, "source": "黄帝内经", "article_number": "94", "liujing": "", "chapter": "灵枢·经脉", "original_text": "肺手太阴之脉，起于中焦，下络大肠，还循胃口，上膈属肺，从肺系横出腋下，下循臑内，行少阴、心主之前，下肘中，循臂内上骨下廉，入寸口，上鱼，循鱼际，出大指之端；其支者，从腕后直出次指内廉，出其端。是动则病：肺胀满，膨膨而喘咳，缺盆中痛，甚则交两手而瞀，此为臂厥。是主肺所生病者：咳，上气，喘喝，烦心，胸满，臑臂内前廉痛厥，掌中热。气盛有余，则肩背痛风，小便数而欠；气虚则肩背痛寒，少气不足以息，溺色变。", "tags": "肺经循行,手太阴肺经,是动所生病", "formula": "", "formula_detail": "", "ni_annotation": "肺经是十二正经的第一条，非常重要！它起于中焦（胃脘部），经过大肠、胃、膈膜到肺脏，然后从腋下沿着手臂内侧走到拇指。'是动则病'是经脉本身受邪产生的症状：肺胀满、咳嗽喘促、缺盆痛、严重时双手抱胸、视线模糊（臂厥）。'是主肺所生病'是肺脏本身的病变表现：各种呼吸系统症状加上循经部位的疼痛。气盛和气虚还有不同的兼症。记住：肺主皮毛，开窍于鼻，所以皮肤病、鼻炎都要从肺经入手。", "contraindication": "", "keywords": "肺经,经脉循行,是动所生"}, {"id": 1128, "source": "黄帝内经", "article_number": "95", "liujing": "", "chapter": "灵枢·经脉", "original_text": "大肠手阳明之脉，起于大指次指之端，循指上廉，出合谷两骨之间，上入两筋之中，循臂上廉，入肘外廉，上臑外前廉，上肩，出髃骨之前廉，上出于柱骨之会上，下入缺盆，络肺，下膈属大肠；其支者，从缺盆上颈，贯颊，入下齿中，还出挟口，交人中——左之右，右之左，上挟鼻孔。是动则病：齿痛，颈肿。是主津液所生病者：目黄，口干，鼽衄，喉痹，肩前臑痛，大指次指痛不用。气有余则当脉所过者热肿；虚则寒栗不复。", "tags": "大肠经循行,手阳明大肠经,齿痛颈肿", "formula": "", "formula_detail": "", "ni_annotation": "大肠经从食指末端开始，沿手臂上行经合谷穴（牙痛第一要穴），过肘、肩，上脖子到面部，进入下齿龈，环绕口唇，终于鼻旁（迎香穴）。这条经管'津液'——所以津液代谢异常的症状归它管：眼黄、口干、流鼻血、咽喉痛等。特别注意：牙龈肿痛、牙齿问题首选大肠经！合谷穴治牙痛是千古名方。'气有余则当脉所过者热肿'——实证表现为经脉循行路线上红肿发热；虚证则是怕冷、难以回温。临床看一眼就知道虚实了。", "contraindication": "", "keywords": "大肠经,合谷,津液"}, {"id": 1129, "source": "黄帝内经", "article_number": "96", "liujing": "", "chapter": "灵枢·经脉", "original_text": "胃足阳明之脉，起于鼻之交頞中，旁纳太阳之脉，下循鼻外，入上齿中，还出挟口，环唇，下交承浆，却循颐后下廉，出大迎，循颊车，上耳前，过客主人，循发际，至额颅。其支者，从大迎前，下人迎，循喉咙，入缺盆，下膈属胃，络脾。其直者，从缺盆下乳内廉，下挟脐，入气街中。其支者，起于胃口，下循腹里，下至气街中而合。——以下髀关，抵伏兔，下膝髌中，下循胫外廉，下足跗，入中指内间。其支者，下廉入大指间，出其端。", "tags": "胃经循行,足阳明胃经,多气多血", "formula": "", "formula_detail": "", "ni_annotation": "胃经是'多气多血之经'，从头走到脚，是全身最长的经之一，也是气血最旺的经。它从鼻旁开始（承泣、四白都在这区域），下行经面部（地仓、颊车治面瘫要穴），再到颈部、胸腹部（天枢、归来等重要穴位），最后沿腿的前面到第二、三趾。胃为'水谷之海'——后天之本，胃经畅通则消化吸收好，气血生化有源。'以下髀关，抵伏兔'——髀关和伏兔都是大腿前面的重要穴位，常用来治下肢痿痹。胃经的问题直接影响全身营养状态。", "contraindication": "", "keywords": "胃经,多气多血,后天之本"}, {"id": 1130, "source": "黄帝内经", "article_number": "97", "liujing": "", "chapter": "灵枢·经脉", "original_text": "脾足太阴之脉，起于大指之端，循指内侧白肉际，过核骨后，上内踝前廉，上踹内，循胫骨后，交出厥阴之前，上膝股内前廉，入腹，属脾，络胃，上膈，挟咽，连舌本，散舌下。其支者，复从胃，别上膈，注心中。是动则病：舌本强，食则呕，胃脘痛，腹胀善噫，得后与气则快然如衰，身体皆重。是主脾所生病者：舌本痛，体不能动摇，食不下，烦心，心下急痛，溏瘕泄，水闭，黄疸，不能卧，强立股膝内肿厥，足大指不用。", "tags": "脾经循行,足太阴脾经,脾主运化", "formula": "", "formula_detail": "", "ni_annotation": "脾经从大拇趾内侧开始（隐白穴是井穴，功能强大——止血、安神、调经），沿腿的内侧上行，入腹部络胃属脾，上到舌根。脾主运化——运化水谷精微和运化水湿。脾经病的特点：舌根僵硬、吃了就想吐、胃痛胀气、放屁或排便后舒服（'得后与气则快然如衰'）、身体沉重（湿气重）、腹泻便溏、水肿、黄疸。'身体皆重'是典型脾虚湿盛的表现——病人觉得身上像裹了一层湿衣服一样沉重。治脾要从健脾祛湿入手。", "contraindication": "", "keywords": "脾经,运化,湿气"}, {"id": 1131, "source": "黄帝内经", "article_number": "98", "liujing": "", "chapter": "灵枢·经脉", "original_text": "心手少阴之脉，起于心中，出属心系，下膈，络小肠。其支者，从心系上挟咽，系目系。其直者，复从心系却上肺，下出腋下，下循臑内后廉，行手太阴、心主之后，下肘内，循臂内后廉，抵掌后锐骨之端，入掌内后廉，循小指之内，出其端。是动则病：嗌干，心痛，渴而欲饮，是为臂厥。是主心所生病者：目黄，胁痛，臑臂内后廉痛厥，掌中热痛。", "tags": "心经循行,手少阴心经,心主血脉", "formula": "", "formula_detail": "", "ni_annotation": "心经从心脏发出，向下联络小肠（心与小肠相表里），一支上连咽部和眼球（所以心病会影响眼睛），主干从肺部出来，沿手臂内后侧一直走到小指尖（少冲穴）。'嗌干，心痛，渴而欲饮'——心经病的三大主症。心主血脉，也主神明，所以心血管问题和神志问题都归心经管辖。'掌中热痛'——手掌心（劳宫穴区域）发热疼痛，是心经有热的表现。失眠、心悸、胸闷，首先要考虑心经是否通畅。神门穴是心经原穴，安神定志的要穴。", "contraindication": "", "keywords": "心经,心主血脉,神门"}, {"id": 1132, "source": "黄帝内经", "article_number": "99", "liujing": "", "chapter": "灵枢·经脉", "original_text": "小肠手太阳之脉，起于小指之端，循手外侧，上腕，出踝中，直上循臂骨下廉，出肘内侧两筋之间，上循臑外后廉，出肩解，绕肩胛，交肩上，入缺盆，络心，循咽，下膈，抵胃，属小肠。其支者，从缺盆循颈，上颊，至目锐眦，却入耳中。其支者，别颊，上䪼，抵鼻，至目内眦，斜络于颧。是动则病：嗌痛，颔肿，不可以顾，肩似拔，臑似折。是主液所生病者：耳聋，目黄，颊肿，颈颔肩臑肘臂外后廉痛。", "tags": "小肠经循行,手太阳小肠经,主液", "formula": "", "formula_detail": "", "ni_annotation": "小肠经从小指尖（少泽穴——催乳名穴）出发，沿手臂外侧上行，经肩胛骨（'肩似拔，臑似折'——肩膀像被拔起来、胳膊像断了一样疼，这是小肠经病的典型描述），上颈到耳前和眼角。小肠主'液化'——分清泌浊，所以津液代谢异常归它管。'肩似拔，臑似折'这六个字太形象了！很多肩周炎、颈椎病患者，痛点就在小肠经的路线上——后肩胛、手臂外侧后缘。后溪穴（输穴）是治疗这些问题的特效穴，同时也是通督脉的要穴。", "contraindication": "", "keywords": "小肠经,肩臂痛,主液"}, {"id": 1133, "source": "黄帝内经", "article_number": "100", "liujing": "", "chapter": "灵枢·经脉", "original_text": "膀胱足太阳之脉，起于目内眦，上额，交巅。其支者，从巅至耳上角。其直者，从巅入络脑，还出别下项，循肩髆内，挟脊，抵腰中，入循膂，络肾，属膀胱。其支者，从腰中下挟脊，贯臀，入腘中。其支者，从髆内左右，别下贯髀，过髀枢，循髀外后廉，下合腘中，以下贯腨内，出外踝之后，循京骨，至小指外侧端。", "tags": "膀胱经循行,足太阳膀胱经,最长经脉", "formula": "", "formula_detail": "", "ni_annotation": "膀胱经是十二经中最长的一条！从头面的睛明穴开始，向上经过头顶（百会穴就在这区域），入脑后下行，贯穿整个背部（五脏六腑的背俞穴全部分布在这条线上——肺俞、心俞、肝俞、脾俞、肾俞等等），再到腰、臀部，沿腿的后侧一直到足小趾。它是人体的'大通道'——阳气最旺盛的经脉。背俞穴体系是针灸临床最常用的取穴方法之一，因为每个背俞穴直接对应一个脏腑，调整背俞就能调节相应脏腑的功能。", "contraindication": "", "keywords": "膀胱经,背俞穴,最长经脉"}, {"id": 1134, "source": "黄帝内经", "article_number": "101", "liujing": "", "chapter": "灵枢·经脉", "original_text": "肾足少阴之脉，起于小指之下，斜趋足心，出于然骨之下，循内踝之后，别入跟中，以上腨内，出腘内廉，上股内后廉，贯脊，属肾，络膀胱。其直者，从肾上贯肝膈，入肺中，循喉咙，挟舌本。其支者，从肺出络心，注胸中。是动则病：饥不欲食，面如漆柴，咳唾则有血，喝喝而喘，坐而欲起，目盳盳如无所见，心如悬若饥状。气不足则善恐，心惕惕如人将捕之，是为骨厥。是主肾所生病者：口热，舌干，咽肿，上气，嗌干及痛，烦心，心痛，黄疸，肠澼，脊股内后廉痛厥，痿嗜卧，足下热而痛。", "tags": "肾经循行,足少阴肾经,肾主先天", "formula": "", "formula_detail": "", "ni_annotation": "肾经从足底涌泉穴（最重要的急救穴之一）开始，沿腿的内侧上行，贯穿脊柱，归属肾脏并联络膀胱，主干穿过肝和膈肌进入肺中，上达喉咙和舌根，另一支从肺出来联络心脏。肾为'先天之本'，藏精主骨生髓。肾经病的表现非常典型：'饥不欲食'——饿但不想吃；'面如漆柴'——面色黑而无光泽；'心如悬若饥状'——心里慌慌的像空了一样；'善恐'——容易恐惧害怕。这些都是肾精亏虚的表现。涌泉穴是补肾第一要穴，太溪穴是肾经原穴，都是临床常用的大穴。", "contraindication": "", "keywords": "肾经,涌泉,先天之本"}, {"id": 1135, "source": "黄帝内经", "article_number": "102", "liujing": "", "chapter": "灵枢·经脉", "original_text": "心主手厥阴心包络之脉，起于胸中，出属心包络，下膈，历络三焦。其支者，循胸中，出胁，下腋三寸，上抵腋下，循臑内，行太阴、少阴之间，入肘中，下臂，行两筋之间，入掌中，循中指出其端。其支者，别掌中，循小指次指出其端。是动则病：手心热，臂肘挛急，腋肿，甚则胸胁支满，心中澹澹大动，面赤，目黄，喜笑不休。是主脉所生病者：烦心，心痛，掌中热。", "tags": "心包经循行,手厥阴心包经,代君受邪", "formula": "", "formula_detail": "", "ni_annotation": "心包经是'心主'——心的外围保护组织，代君（心）受过。它起于胸中，下联络三焦（心包与三焦相表里），沿手臂内侧中线行走，终于中指尖（中冲穴）。'心中澹澹大动'——心慌心跳很厉害的感觉。'喜笑不休'——心包经热盛会导致异常的兴奋大笑。内关穴是心包经的络穴，也是八脉交会穴之一，可以说是全身使用频率最高的穴位之一：治恶心呕吐、心律失常、失眠焦虑、胃痛，无所不通。郄门穴是郄穴，急性心绞痛的首选穴。", "contraindication": "", "keywords": "心包经,内关,代君受邪"}, {"id": 1136, "source": "黄帝内经", "article_number": "103", "liujing": "", "chapter": "灵枢·经脉", "original_text": "三焦手少阳之脉，起于小指次指之端，上出两指之间，循手表腕，出臂外两骨之间，上贯肘，循臑外，上肩，而交出足少阳之后，入缺盆，布膻中，散络心包，下膈，遍属三焦。其支者，从膻中上出缺盆，上项，系耳后，直上出耳上角，以屈下颊，至䪼。其支者，从耳后入耳中，出走耳前，过客主人前，交颊，至目锐眦。是动则病：听聋浑浑焞焞，嗌肿喉痹。是主气所生病者：汗出，目锐眦痛，颊痛，耳后肩臑肘臂外皆痛，小指次指不用。", "tags": "三焦经循行,手少阳三焦经,主气", "formula": "", "formula_detail": "", "ni_annotation": "三焦经从无名指末端（关冲穴）出发，沿手臂外侧中间上行，经肩、颈，绕耳朵一圈，终于眉梢（丝竹空穴）。三焦是中医独有的概念——'上焦如雾，中焦如沤，下焦如渎'，总司全身气机的升降出入和津液的敷布。三焦主'诸气'——所以气机失调导致的出汗异常、耳鸣耳聋等都归它管。'听聋浑浑焞焞'——耳鸣听力下降嗡嗡作响，是三焦经病的特征性症状。外关穴（络穴，通阳维脉）是常用大穴，治偏头痛、肋间神经痛、耳鸣效果好。三焦通畅则全身气机顺畅。", "contraindication": "", "keywords": "三焦经,气机,外关"}, {"id": 1137, "source": "黄帝内经", "article_number": "104", "liujing": "", "chapter": "灵枢·经脉", "original_text": "胆足少阳之脉，起于目锐眦，上抵头角，下耳后，循颈，行手少阳之前，至肩上，却交出手少阳之后，入缺盆。其支者，从耳后入耳中，出走耳前，至目锐眦后。其支者，别目锐眦，下大迎，合于手少阳，抵于䪼，下加颊车，下颈，合缺盆，以下胸中，贯膈，络肝，属胆，循胁里，出气街，绕毛际，横入髀厌中。其直者，从缺盆下腋，循胸，过季胁，下合髀厌中，以下循髀阳，出膝外廉，下外辅骨之前，直下抵绝骨之端，下出外踝之前，循足跗上，入小指次指之间。其支者，别跗上，入大指之间，循大指歧骨内，出其端，还贯爪甲，出三毛。", "tags": "胆经循行,足少阳胆经,半表半里", "formula": "", "formula_detail": "", "ni_annotation": "胆经从头上的瞳子髎穴开始，沿着头的侧面下行（所以偏头痛、侧面头痛都找胆经），经过耳周围（风池、翳风——治头晕耳鸣的要穴），沿脖子和躯干的侧面往下（胁肋部——所以肋间神经痛、胆囊炎都找胆经），再沿腿的外侧到第四足趾。胆经走人身之'侧'，主半表半里，司枢机（转枢之门）。少阳病的特点就是'往来寒热，胸胁苦满，默默不欲饮食'——这些都是胆经枢机不利的表现。足临泣（输穴，通带脉）、阳陵泉（合穴，筋会）是胆经最常用的两个大穴。", "contraindication": "", "keywords": "胆经,半表半里,枢机"}, {"id": 1138, "source": "黄帝内经", "article_number": "105", "liujing": "", "chapter": "灵枢·经脉", "original_text": "肝足厥阴之脉，起于大指丛毛之际，上循足跗上廉，去内踝一寸，上踝八寸，交出太阴之后，上腘内廉，循股阴，入毛中，过阴器，抵小腹，挟胃，属肝，络胆，上贯膈，布胁肋，循喉咙之后，上入顽颡，连目系，上出额，与督脉会于巅。其支者，从目系下颊里，环唇内。其支者，复从肝，别贯膈，上注肺。是动则病：腰痛不可以俯仰，丈夫㿉疝，妇人少腹肿，甚则咽干，面尘脱色。是主肝所生病者：胸满，呕逆，飱泄，狐疝，遗闭癃。", "tags": "肝经循行,足厥阴肝经,肝主疏泄", "formula": "", "formula_detail": "", "ni_annotation": "肝经从大拇趾外侧的大敦穴（井穴——治疗疝气的名穴）开始，沿足背上行，经过内踝前方（中封穴），沿小腿和腿的内侧上行（在三阴交上面交叉到脾经前面），经过生殖器区域（所以男科妇科问题都跟肝经有关），入腹腔联络胆囊归属肝脏，上到头顶与督脉相会（百会穴附近）。肝主疏泄——疏泄气机、疏泄情志、疏泄胆汁。肝经病：腰痛不能弯腰（'腰痛不可以俯仰'）、男性疝气、女性小腹痛、咽干、面色晦暗如蒙灰尘（'面尘脱色'——肝郁的面色）。太冲穴是肝经原穴，也是全身最好的疏肝解郁穴位。", "contraindication": "", "keywords": "肝经,疏泄,太冲"}, {"id": 1139, "source": "黄帝内经", "article_number": "106", "liujing": "", "chapter": "灵枢·经脉", "original_text": "督脉之别，名曰长强，挟膂上项，散头上，下当肩胛左右，别走太阳，入贯膂。实则脊强，虚则头重。取之所别也。任脉之别，名曰尾翳，下鸠尾，散于腹。实则腹皮痛，虚则痒瘙。取之所别也。脾之大络，名曰大包，出渊腋下三寸，布胸胁。实则身尽痛，虚则百节皆纵。此脉若罗络之血者，皆取之脾之大络脉也。", "tags": "督脉,任脉,脾之大络,奇经八脉", "formula": "", "formula_detail": "", "ni_annotation": "奇经八脉中的督脉、任脉和脾之大络。督脉'阳脉之海'——统领全身阳气，其络脉从长强穴（尾骨尖）开始，沿着脊柱上行到头部。'实则脊强，虚则头重'——实证脊柱僵硬（类脊椎强直），虚证头重昏沉。任脉'阴脉之海'——统摄全身阴经，络脉从鸠尾穴（剑突下）开始散布于腹部。'实则腹皮痛，虚则痒瘙'——实证肚子皮肉痛，虚证皮肤瘙痒。脾之大络大包穴在胁下，'实则身尽痛，虚则百节皆纵'——实证全身疼痛，虚证全身关节松弛无力。这三条络脉的临床价值极高，不可不知。", "contraindication": "", "keywords": "督脉,任脉,脾之大络,奇经"}, {"id": 1140, "source": "黄帝内经", "article_number": "107", "liujing": "", "chapter": "灵枢·经别", "original_text": "足太阳之正，别入于腘中，其一道下尻五寸，别入于肛，属于膀胱，散之肾，循膂，当心入散；直者，从膂上入于项，复属于太阳。足少阴之正，至腘中，别走太阳而合，上至肾，当十四椎出属带脉；直者，系舌本，复出于项，合于太阳。此为一合也。", "tags": "经别,六合,足太阳足少阴", "formula": "", "formula_detail": "", "ni_annotation": "'经别'是十二正经离入出合的分支，主要功能是加强表里两经之间的联系和内外脏腑的联系。这里讲的是'一合'——足太阳（膀胱经）和足少阴（肾经）是一对表里经。膀胱经的经别深入肛门、归属于膀胱、散布到肾脏；肾经的经别则在腘窝处与膀胱经会合、上行到肾、在第十四椎处连接带脉、联系舌根，最后在项部与膀胱经再次会合。这种'离合出入'的结构让表里经之间形成了深层的沟通网络。理解经别有助于理解为什么刺激一条经可以影响到与其表里的脏腑。", "contraindication": "", "keywords": "经别,六合,表里经"}, {"id": 1141, "source": "黄帝内经", "article_number": "108", "liujing": "", "chapter": "灵枢·经水", "original_text": "经脉十二者，外合于十二经水，而内属于五脏六腑。夫十二经水者，其大小、深浅、广狭、远近各不同；五脏六腑之高下、小大、受谷之多少亦不等。足太阳外合清水，内属膀胱，而通水道焉。足少阳外合渭水，内属胆。足阳明外合海水，内属胃。足太阴外合湖水，内属脾。足少阴外合汝水，内属肾。足厥阴外合渑水，内属肝。", "tags": "经水,十二经水,经脉类比", "formula": "", "formula_detail": "", "ni_annotation": "古人用十二条河流来比喻十二经脉——每条经脉就像一条河，有其大小、深浅、宽窄、长短的不同。足太阳膀胱经对应清水（最大最长的河），足少阳胆经对应渭水，足阳明胃经对应海水（又大又深的河），足太阴脾经对应湖水，足少阴肾经对应汝水，足厥阴肝经对应渑水。这个类比告诉我们：不同的经脉有不同的特性——有的宽阔流量大（如胃经），有的深邃流速缓（如肾经）。针刺时要根据经脉的特性来决定深浅、手法和时间，就像治水一样——大河要疏浚，小溪要疏导，方法各不相同。", "contraindication": "", "keywords": "经水,十二经脉,类比"}, {"id": 1142, "source": "黄帝内经", "article_number": "109", "liujing": "", "chapter": "灵枢·经筋", "original_text": "足太阳之筋，起于足小指上，结于踝，邪上结于膝，其下循足外侧，结于踵，上循跟，结于腘。其别者，腘外上腘中，内廉与腘中并，上结于臀，上挟脊上项。其支者，别入结于舌本。其直者，结于枕骨，上头下颜，结于鼻。其支者，为目上网，下结于頄。其病：小指支，跟肿痛，腘挛，脊反折，项筋急，肩不举，腋支，缺盆中纽痛，不可左右摇。", "tags": "经筋,足太阳经筋,筋病", "formula": "", "formula_detail": "", "ni_annotation": "经筋系统是附属于十二经脉的筋肉体系，专门主管肌肉、肌腱、韧带、关节的运动和稳定性。'结'是经筋的聚集和固定点。足太阳经筋起于足小趾，结聚于踝关节、膝关节、脚跟、腘窝、臀部、脊柱、颈部、枕骨、头面部和鼻旁。'脊反折'——角弓反张，这是经筋拘急的严重表现。'肩不举'——抬不起肩膀。现代医学的颈椎病、腰椎间盘突出、肩周炎、腱鞘炎等软组织损伤性疾病，都属于'经筋病'的范畴。治疗经筋病要以'舒筋通络'为主，阿是穴（以痛为腧）是最重要的取穴原则。", "contraindication": "", "keywords": "经筋,筋病,软组织损伤"}, {"id": 1143, "source": "黄帝内经", "article_number": "110", "liujing": "", "chapter": "灵枢·骨度", "original_text": "人长七尺五寸者，发以下至颐长一尺，颐以下至结喉长四寸，结喉以下至缺盆中长四寸，缺盆以下至髑骬长九寸，髑骬以下至天枢长八寸，天枢以下至横骨长六寸半，横骨长六寸半，横骨上廉以下至内辅之上廉长一尺八寸，内辅之上廉以下至内辅之下廉长三寸半。", "tags": "骨度,分寸,取穴标准", "formula": "", "formula_detail": "", "ni_annotation": "'骨度'是用骨骼标志作为度量标准来确定穴位位置的方法，这是针灸取穴的基础中的基础！古人以七尺五寸为标准身材（约1.73米），详细规定了各个部位的尺寸：下巴到喉结4寸，喉结到锁骨窝4寸，锁骨窝到剑突（髑骬）9寸，剑突到肚脐（天枢）8寸，肚脐到耻骨联合（横骨）6.5寸……这些数据构成了针灸学的'度量衡系统'——同身寸就是在此基础上发展而来的。取穴不准确，再好的技术也没有用。倪师反复强调：定位不准等于没扎。学好骨度分寸，才能保证每一个穴位都能精准找到。", "contraindication": "", "keywords": "骨度,取穴,同身寸"}, {"id": 1144, "source": "黄帝内经", "article_number": "111", "liujing": "", "chapter": "灵枢·五十营", "original_text": "黄帝曰：余愿闻五十营奈何？岐伯答曰：天周二十八宿，宿三十六分。人气行一周，千八分。日行二十八宿，人经脉上下、左右、前后二十八脉，周身十六丈二尺，以应二十八宿。漏水下百刻，以分昼夜。故人一呼，脉再动，气行三寸，一吸，脉亦再动，气行三寸，呼吸定息，气行六寸。十息，气行六尺，日行二分。二百七十息，气行十六丈二尺，一周于身。", "tags": "五十营,营气运行,呼吸脉气", "formula": "", "formula_detail": "", "ni_annotation": "五十营讲的是营气（营养物质）在体内循环运行的规律。人体二十八条经脉总长度十六丈二尺（约52.5米），营气运行一周需要270次呼吸（按每分钟18次呼吸计算约15分钟），一天50个循环正好对应'漏水下百刻'的时间制度。'一呼脉再动，气行三寸；一吸脉再动，气行三寸'——一次呼吸脉搏跳四次，气行六寸。这说明气和脉是同步运行的！营气运行的规律告诉我们：正常情况下气血是有节奏地在体内流动的，如果这个节奏乱了（太快或太慢），就是病态。练气功、调呼吸就是在配合这个天然节律。", "contraindication": "", "keywords": "五十营,营气,呼吸"}, {"id": 1145, "source": "黄帝内经", "article_number": "112", "liujing": "", "chapter": "灵枢·营气", "original_text": "营气之道，纳谷为宝。谷入于胃，乃传之肺，流溢于中，布散于外，精专者行于经隧，常营无已，终而复始，是谓天地之纪。故气从太阴出，注手阳明，上行注足阳明，下行至上，注足太阴，上行至肝，从肝上注肺，复出于太阴。此营气之所行也，逆顺之常也。", "tags": "营气,循行路线,纳谷为宝", "formula": "", "formula_detail": "", "ni_annotation": "营气的来源是食物——'纳谷为宝'！吃下去的东西到了胃里，经过消化吸收变成精微物质，上传到肺（肺主一身之气），再通过肺的宣发布散到全身。其中最精纯的部分进入经脉隧道（'精专者行于经隧'），日夜不停地循环运转，'终而复始'。具体路线：从肺经（手太阴）开始→大肠经（手阳明）→胃经（足阳明）→脾经（足太阴）→心经→小肠经→膀胱经→肾经→心包经→三焦经→胆经→肝经→回到肺经。这就是著名的'营气十二经循行顺序'，背诵十二经脉必须掌握的顺序。营气是营养之气，相当于西医说的血液循环加淋巴免疫的综合概念。", "contraindication": "", "keywords": "营气,循行,十二经顺序"}, {"id": 1146, "source": "黄帝内经", "article_number": "113", "liujing": "", "chapter": "灵枢·脉度", "original_text": "手之六阳，从手至头，长五尺，五六三尺。手之六阴，从手至胸中，长三尺五寸，三六一丈八尺。足之六阳，从头至足，长八尺，六八四丈八尺。足之六阴，从足至腹中，长六尺五寸，六六三丈九尺。蹻脉从足至目，长七尺半，二七一丈四尺。督脉、任脉各长四尺五寸，二四八尺，合一丈。凡都合一十六丈二尺，此气大经隧也。", "tags": "脉度,经脉长度,十六丈二尺", "formula": "", "formula_detail": "", "ni_annotation": "这是经脉总长度的精确统计！手三阳经（双侧）共3丈，手三阴经共1.8丈，足三阳经共4.8丈，足三阴经共3.9丈，左右蹻脉共1.4丈，督脉+任脉共1丈。总计：16丈2尺（约52.5米）。这个数字的意义在于：它让我们对人体经络系统有一个量化的认识——经脉网络遍布全身，总长度超过50米！每一条经的长度都经过了精确测量。'此气大经隧也'——这是气血运行的主要通道。理解脉度有助于理解针灸治疗的全身性影响：刺激任何一个穴位，都会通过这个庞大的传导网络对身体其他部位产生影响。", "contraindication": "", "keywords": "脉度,经脉长度,量化"}, {"id": 1147, "source": "黄帝内经", "article_number": "114", "liujing": "", "chapter": "灵枢·营卫生会", "original_text": "黄帝问于岐伯曰：人焉受气？阴阳焉会？何气为营？何气为卫？营卫从何来？岐伯答曰：人受气于谷，谷入于胃，以传于肺，五脏六腑，皆以受气。其清者为营，浊者为卫，营在脉中，卫在脉外，营周不休，五十而大会。阴阳相贯，如环无端。卫气行于阴二十五度，行于阳二十五度，分为昼夜。", "tags": "营卫,营气卫气,五十会合", "formula": "", "formula_detail": "", "ni_annotation": "这是解释营气和卫气最经典的一篇！营卫二气都来源于饮食水谷（'人受气于谷'）：清稀的部分化为营气，在脉中运行，功能是滋养；稠浊的部分化为卫气，在脉外运行，功能是防御。两者'五十而大会'——白天各运行25个周期后在夜间会合一次。卫气白天行于阳（体表），晚上行于阴（内脏）——这就解释了为什么人白天清醒活跃、晚上安静睡眠。如果卫气入阴不利，就会失眠；卫气出阳不利，就会嗜睡不醒。营卫失调是很多疑难杂症的根源——自汗、盗汗、容易感冒、免疫力低下，本质上都是营卫不和。", "contraindication": "", "keywords": "营气,卫气,营卫不和"}, {"id": 1148, "source": "黄帝内经", "article_number": "115", "liujing": "", "chapter": "灵枢·四时气", "original_text": "四时之气，各不同形，百病之起，皆生于风雨寒暑，阴阳喜怒，饮食居处。大惊卒恐，则血气分离，阴阳破败，经络厥绝，脉道不通，阴阳相逆，卫气稽留，经络虚空，血气不次，乃失其常。春取经、血脉、分肉之间，愈深取之，少迟；夏取盛经孙络，充皮肤，宜去血，宜浅刺；秋取经俞，邪在腑，取之合；冬取井荣，必深以留之。", "tags": "四时刺法,春夏秋冬,因时制宜", "formula": "", "formula_detail": "", "ni_annotation": "针灸必须根据四季变化调整刺法——这就是'因时制宜'的原则。春天：取经穴、血脉和分肉之间，要刺得比较深，留针时间稍长（春天阳气升发，深刺引导阳气）。夏天：取充盈的经脉和浮络，可以放血，刺要浅（夏天阳气浮于表，浅刺即可）。秋天：取经穴和俞穴，如果邪气在腑就用合穴（秋季收敛，引邪深入排出）。冬天：取井穴和荥穴，必须深刺久留（冬季闭藏，需要深入固守）。违反这个规律叫'逆四时'，不仅无效反而伤正气。现在很多针灸师一年四季用同样的方法扎针，完全不考虑季节因素，这是不对的。", "contraindication": "", "keywords": "四时刺法,因时制宜,季节针灸"}, {"id": 1149, "source": "黄帝内经", "article_number": "116", "liujing": "", "chapter": "灵枢·五邪", "original_text": "邪在肺，则病皮肤痛，寒热，上气喘，汗出，咳动肩背。取之膺中外腧，背三椎之傍，以手疾按之，快然乃刺之。取之缺盆中以越之。邪在肝，则两胁中痛，寒中，恶血在内，行善掣节，时脚肿。取之行间，以引胁下，补三里以温胃中，取血脉以散恶血，取耳间青脉以去其掣。", "tags": "五邪,邪在肺肝,辨证取穴", "formula": "", "formula_detail": "", "ni_annotation": "邪气侵犯不同的脏腑会产生特定的症状群和治疗方案。邪在肺：皮肤疼痛、恶寒发热、喘息气短、出汗、咳嗽牵扯到肩背——治疗取胸部外侧穴位和背部的肺俞穴（第三胸椎棘突下旁开1.5寸），用手快速按压找到舒适点后再下针，再加缺盆穴。邪在肝：两胁疼痛、中焦寒凉、瘀血在内、关节抽搐、时有脚肿——治疗取行间穴（引胁下之气下行），补足三里（温胃暖中），放恶血，取耳廓青脉络（解除关节痉挛）。这种'辨证-选穴-操作'的完整思路，是针灸临床的标准范式。", "contraindication": "", "keywords": "五邪,辨证取穴,脏腑邪气"}, {"id": 1150, "source": "黄帝内经", "article_number": "117", "liujing": "", "chapter": "灵枢·寒热病", "original_text": "皮寒热者，不可附席，毛发焦，鼻槁腊，不得汗。取三阳之络，以补手太阴。肌寒热者，肌痛，毛发焦而唇槁腊，不得汗。取三阳于下，以去其血者，补足太阴。骨寒热者，病无所安，汗注不休。齿未槁，取其少阴于阴络之络；齿已槁，死不治。骨寒热，亦不可取其经络。", "tags": "寒热病,皮肌骨三层,辨证层次", "formula": "", "formula_detail": "", "ni_annotation": "寒热病分为三个层次——皮、肌、骨，越深越危险！皮寒热：皮肤怕冷不敢靠席子、毛发枯焦、鼻腔干燥不出汗——取三经的络穴放血，同时补肺经。肌寒热：肌肉疼痛、毛发嘴唇枯焦不出汗——取足三阳经的下部穴位放血，补脾经。骨寒热：病人烦躁不安无法静养、不停出汗——如果牙齿还没枯萎，取肾经的络穴治疗；如果牙齿已经枯槁，那就是死证！'齿为骨之余'，骨头的好坏从牙齿就能看出来。骨寒热已经是邪气深入骨髓的阶段，一般经络取穴已经不够了。这三个层次提示我们：治病要趁早，邪气在皮毛阶段最好治，等到入骨就难了。", "contraindication": "", "keywords": "寒热病,层次辨证,预后判断"}, {"id": 1151, "source": "黄帝内经", "article_number": "118", "liujing": "", "chapter": "灵枢·癫狂", "original_text": "癫疾始生，先不乐，头重痛，视举目赤，甚作极，已而烦心。候之于颜，取手太阳、阳明、太阴，血变而止。狂始生，先自悲也，喜忘，苦怒，善恐者，得之忧饥。治之取手太阳、阳明，血变而止，及足太阳、阳明。狂始发，少饥不饥，自笑也好歌，妄行不休者，治之大陵、神门、劳宫。狂言惊，善笑，好歌乐妄行不休者，治之胃及大肠诸腧。", "tags": "癫狂,精神病,神志病针灸", "formula": "", "formula_detail": "", "ni_annotation": "《灵枢》对癫狂（类似现代的精神分裂症、躁狂抑郁症等）的针灸治疗有非常详细的记载。癫病（抑制型）：开始时不开心、头重头痛、眼睛上翻发红、后来心烦——看额头部位的色泽变化，取小肠经、大肠经、肺经的穴位，放到血色变了为止。狂病（兴奋型）：初期悲伤健忘、易怒恐惧（由忧愁饥饿引起），发展到阶段则饥饿感异常、独自傻笑唱歌、到处乱跑——取心包经的大陵、神门、劳宫（心经心包经的三个大穴）。重症狂证还要加胃经和大肠经的俞穴。针灸治疗精神类疾病的疗效非常好，关键是找准经线和穴位，坚持治疗。", "contraindication": "", "keywords": "癫狂,神志病,针灸治疗"}, {"id": 1152, "source": "黄帝内经", "article_number": "119", "liujing": "", "chapter": "灵枢·热病", "original_text": "热病三日，而气口静，人迎躁者，取之诸阳，五十九刺，以泻其热而出其汗，实其阴以补其不足者。身热痛，偏枯，发为偏痹，须两鬓之中，取其脉大，以去其邪。热病而汗且出，及脉顺可汗者，取之肾俞，以饮之汤，必欲其冷食，衣寒身寒而止。", "tags": "热病,五十九刺,热病针灸", "formula": "", "formula_detail": "", "ni_annotation": "热病（外感发热性疾病）的针灸治疗原则。'热病三日'——发热三天后，如果寸口脉平静而人迎脉躁动，说明热邪在阳分，要用五十九个特定的散热穴位（'五十九刺'是一套专门退热的组穴方案），泻热发汗，同时滋阴。'偏枯'（半身不遂）伴发热疼痛的，要在两鬓角处找到大的络脉放血去邪。如果热病出汗且脉象顺应（可以用发汗法的），取肾俞穴，给病人喝冷汤，穿薄衣服让身体冷却下来。注意这里用了'热者寒之'的反治法——用冷饮冷衣来辅助退热。《灵枢》的热病篇内容极其丰富，几乎是一部发热性疾病的针灸专著。", "contraindication": "", "keywords": "热病,五十九刺,退热针灸"}, {"id": 1153, "source": "黄帝内经", "article_number": "120", "liujing": "", "chapter": "灵枢·厥病", "original_text": "厥头痛，面若肿起而烦心，取之足阳明、太阴。厥头痛，头脉痛，心悲善哭，视头动脉反盛者，刺尽去血，后调足厥阴。厥头痛，意善恐，心悸动，多汗出，视其手腕之脉紧者，刺之。厥头痛，贞贞头重而痛，写头上五行，行五，取先处。厥头痛，头痛甚，耳前后脉涌有热，泻出其血，后取足少阳。", "tags": "厥头痛,头痛辨证,针灸取穴", "formula": "", "formula_detail": "", "ni_annotation": "五种不同类型的'厥头痛'（气机上逆引起的头痛）及其对应的针灸方案，体现了中医辨证论治的精髓。第一种：头痛伴脸肿、心烦——取胃经和脾经（脾胃湿热上攻）。第二种：头痛伴头部血管搏动性疼痛、心情悲伤想哭——找到头部搏动明显的动脉放血，然后调肝经（肝郁气滞）。第三种：头痛伴恐惧感、心悸、多汗——检查手腕部脉紧的就刺（心肾不交，心神不安）。第四种：头沉重疼痛——刺头部的五行线路（五条线上的穴位）。第五种：剧烈头痛、耳前后血管搏动发热——先放血，再取胆经（少阳火热上扰）。五种头痛五种治法，绝不混同——这就是中医的高明之处。", "contraindication": "", "keywords": "厥头痛,辨证论治,头痛针灸"}, {"id": 1154, "source": "黄帝内经", "article_number": "121", "liujing": "", "chapter": "灵枢·病本", "original_text": "先病而后逆者，治其本。先逆而后病者，治其本。先寒而后生病者，治其本。先病而后生寒者，治其本。先热而后生病者，治其本。先热而后生中满者，治其标。先病而后泄者，治其本。先泄而后生他病者，治其本。必且调之，乃治其他病。先病而后生中满者，治其标。先中满而后烦心者，治其本。", "tags": "标本缓急,治本治标,治疗先后", "formula": "", "formula_detail": "", "ni_annotation": "标本理论是中医治疗策略的核心——什么时候治本，什么时候治标，必须有明确的准则。基本原则：大部分情况下先治本（病因/根本）。但有例外：'先热而后生中满者，治其标'——先有热证后来出现腹部胀满的，要先治标（胀满）。为什么？因为中满是急迫症状，不及时处理会影响病人的进食和呼吸。同理'先病而后生中满者，治其标'。另外'先中满而后烦心者'又要回到治本。这里的逻辑是：中满（胀满）作为一种紧急症状需要优先处理，除此之外都应该治本。'急则治其标，缓则治其本'——这句名言的原始出处就在这里。临床一定要分清轻重缓急，不要一味地只知道治本而忽略了急需处理的症状。", "contraindication": "", "keywords": "标本,治本治标,缓急"}, {"id": 1155, "source": "黄帝内经", "article_number": "122", "liujing": "", "chapter": "灵枢·杂病", "original_text": "厥气走喉而不能言，手足清，大便不利，取足少阴。厥气腹满，肠鸣淅淅，其后便利，取足太阴。嗌干，口中热如胶，取足少阴。膝中痛，取犊鼻，以员利针，针发而间之。膝痛不可屈伸，治其大杼。喉痹不能言，取足阳明；能言，取手阳明。衄而不止，衄血流，取足太阳；大衄，取手太阳不已，刺腕骨下。", "tags": "杂病,多种病症,对症取穴", "formula": "", "formula_detail": "", "ni_annotation": "这是一篇'临床实用手册'式的篇章，列举了各种常见病症的快捷取穴方案。气逆导致失声、手脚冰凉、大便不通——取肾经。气逆导致腹胀肠鸣、腹泻——取脾经。咽干、口中热黏——取肾经（肾阴不足，虚火上炎）。膝关节痛——取犊鼻穴（外膝眼），用圆利针，针后间隔行针。膝关节痛不能弯曲——取大杼穴（骨会，治关节病的特效穴）。喉痹失声——取胃经；还能说话——取大肠经。鼻流血不止——取膀胱经；大出血不止——改取小肠经，还不行就刺腕骨穴。这些经验性的配穴方案都是古人长期临床总结出来的，简单实用，效果确切。记住了这些，日常门诊的大部分常见病就能应对了。", "contraindication": "", "keywords": "杂病,对症取穴,临床实用"}, {"id": 1156, "source": "黄帝内经", "article_number": "123", "liujing": "", "chapter": "灵枢·周痹", "original_text": "周痹之在身也，上下移徙随脉，其上下左右相应，间不容空。愿闻此痛，在血脉之中耶？在分肉之间乎？何以致是？此众痹也，非周痹也。周痹者，在于血脉之中，随脉以上，随脉以下，不能左右，各当其所。帝曰：善。刺此者，痛虽已下，必刺其处，勿令复起。", "tags": "周痹,众痹,痹证分类", "formula": "", "formula_detail": "", "ni_annotation": "区分'周痹'和'众痹'很重要！众痹：疼痛位置左右移动，'间不容空'——各处都有痛，没有间隙，停在分肉之间。周痹：疼痛随着经脉上下移动（而不是左右移动），'不能左右'——只在某一条经的路径上窜，位置在血脉之中。治疗方法：'痛虽已下，必刺其处，勿令复起'——即使疼痛暂时下去了，也要在原来的痛点继续针刺，防止复发。痹证（风湿类疾病）是针灸科最常见的病种之一，分清楚类型是正确治疗的前提。周痹要沿着病变经脉取穴，众痹则以局部阿是穴为主。", "contraindication": "", "keywords": "周痹,众痹,痹证"}, {"id": 1157, "source": "黄帝内经", "article_number": "124", "liujing": "", "chapter": "灵枢·口问", "original_text": "黄帝曰：人之欠者，何使然？岐伯曰：卫气昼行于阳，夜行于阴。阴者主夜，夜者卧。阳者主上，阴者主下。故阴气积于下，阳气未尽，阳引而上，阴引而下，阴阳相引，故数欠。阳气尽，阴气盛，则目瞑；阴气尽而阳气盛，则寤矣。泻足少阴，补足太阳。", "tags": "欠(哈欠),阴阳睡眠,瞌睡机制", "formula": "", "formula_detail": "", "ni_annotation": "为什么人会打哈欠？《灵枢》从阴阳角度给出了完美的解释！白天卫气在体表（阳）运行，夜间入内脏（阴）运行。阴气主导夜间，所以人要睡觉。阳气主升（向上），阴气主降（向下）。当阴气积聚在下而阳气还没有完全消退时，阴阳相互牵引（'阴阳相引'），人就不断地打哈欠。哈欠本质上是阴阳交接时的生理现象。治疗的方法是：泻肾经（减少在下积聚的阴气），补膀胱经（提升阳气）。这个原理也可以解释为什么人困的时候会打哈欠——那是阳气不足、阴气相对偏盛的表现。咖啡提神的原理其实就是临时补充了阳气。", "contraindication": "", "keywords": "哈欠,阴阳,睡眠机制"}, {"id": 1158, "source": "黄帝内经", "article_number": "125", "liujing": "", "chapter": "灵枢·师传", "original_text": "夫五脏者，身之强也。头者精明之府，头倾视深，精神将夺矣。背者胸中之府，背曲肩随，府将坏矣。腰者肾之府，转摇不能，肾将惫矣。膝者筋之府，屈伸不能，行则偻附，筋将惫矣。骨者髓之府，不能久立，行则振掉，骨将惫矣。得强则生，失强则死。", "tags": "望诊,五脏强弱,师传身形", "formula": "", "formula_detail": "", "ni_annotation": "这是望诊的经典段落！通过观察身体的姿态来判断五脏的健康状况。头——'精明之府'：头歪斜、眼神深陷（目光无神）→ 精神将要丧失（脑病/重度虚弱）。背——'胸中之府'：背弯曲、肩膀下垂 → 胸中之气败坏（心肺功能衰竭）。腰——'肾之府'：腰部转动不灵活 → 肾气疲惫。膝——'筋之府'：膝盖不能屈曲伸展、走路弯腰扶墙 → 肝筋衰败（肝主筋）。骨——'髓之府'：站不久、走路颤抖摇晃 → 骨髓枯竭（肾主骨生髓）。'得强则生，失强则死'——五脏强壮人就活，五脏衰败人就死。这种望诊方法简单直观，不需要任何设备，一进门扫一眼病人的姿态就能获得大量信息。倪师教学生时总是先从这里开始。", "contraindication": "", "keywords": "望诊,五脏,身形姿态"}, {"id": 1159, "source": "黄帝内经", "article_number": "126", "liujing": "", "chapter": "灵枢·决气", "original_text": "黄帝曰：余闻人有精、气、津、液、血、脉，余意以为一气耳，今乃辨为六名，何谓？岐伯曰：两神相搏，合而成形，常先身生，是谓精。上焦开发，宣五谷味，熏肤，充身，泽毛，若雾露之溉，是谓气。腠理发泄，汗出溱溱，是谓津。谷入气满，淖泽注于骨，骨属屈伸，泄泽，补益脑髓，皮肤润泽，是谓液。中焦受气，取汁，变化而赤，是谓血。壅遏营气，令无所避，是谓脉。", "tags": "一气六名,精气津液血脉,人体基本物质", "formula": "", "formula_detail": "", "ni_annotation": "黄帝提出了一个非常深刻的问题——精、气、津、液、血、脉看起来是六样东西，是不是其实都是'一气'的不同的表现形式？岐伯分别定义了六种基本物质：精——生命形成的最原始物质（'常先身生'——在形体之前就已经存在，来自父母的遗传）。气——由上焦（心肺）将水谷精微宣发布散到全身，像雾露滋润万物一样。津——从毛孔排出的液体（汗液，较稀薄的体液）。液——注入骨髓关节、润泽大脑皮肤的浓稠液体（较稠厚的体液）。血——中焦（脾胃）消化吸收后的精华物质变化而成的红色液体。脉——约束和容纳营气运行的管道。六者同源而异形，共同维持着人的生命活动。任何一种的异常都会导致疾病。", "contraindication": "", "keywords": "精气津液血脉,一气六名"}, {"id": 1160, "source": "黄帝内经", "article_number": "127", "liujing": "", "chapter": "灵枢·肠胃", "original_text": "黄帝问于伯高曰：愿闻六腑之肠胃之长短，受谷之多少，奈何？伯高曰：请尽言之。谷所从出入浅深远近之长：唇至齿长九分，口广二寸半。齿以后至会厌，深三寸半，大容五合。舌重十两，长七寸，广二寸半。咽门重十两，广一寸半，至胃长一尺六寸。胃纤曲屈，伸之，长二尺六寸，大一尺五寸，径五寸，大容三斗五升。小肠后附脊，左环回周迭积，其注于回肠者，外附于脐上，回运环反十六曲，大二寸半，径八分分之少半，长三丈二尺。", "tags": "肠胃解剖,消化道测量,脏腑形态", "formula": "", "formula_detail": "", "ni_annotation": "这篇记载了古人对消化道的精确测量数据！唇到牙齿0.9寸，口腔宽2.5寸。牙齿到会厌（喉软骨）3.5寸，容量5合。舌头重10两（约187.5克），长7寸，宽2.5寸。咽门（食管入口）重10两，宽1.5寸，到胃的距离1.6寸。胃展开后长2.6尺（约84厘米），容量3.5斗（约70升——这是胃的最大容量）。小肠附着在脊柱左侧，盘旋折叠共16个弯曲，长3.2丈（约10米）。这些数据虽然与现代解剖学不完全一致（特别是胃容量偏大），但在两千多年前能够进行如此系统的测量工作，足以证明古代医家重视实地观察的科学态度。这些数据对中医理解消化功能有参考价值。", "contraindication": "", "keywords": "肠胃,解剖,消化道"}, {"id": 1161, "source": "黄帝内经", "article_number": "128", "liujing": "", "chapter": "灵枢·平人绝谷", "original_text": "黄帝曰：愿闻平人不食，七日而死，何也？伯高曰：请言之。肠胃之长，凡五丈八尺四寸，受水谷九斗二升一合合之大半，此肠胃所受水谷之数也。平人则不然，胃满则肠空，肠满则胃空，更虚更满，故气得上下，五脏安定，血脉和利，精神乃居。故神者，水谷之精气也。故平人不食饮七日而死者，水谷精气津液皆尽故也。", "tags": "平人绝谷,七天极限,水谷精气", "formula": "", "formula_detail": "", "ni_annotation": "为什么人不吃东西七天就会死？这是一个关于人体能量储备的基本问题。肠胃总长约5.84丈（约19米），总容量约9.2斗（约184升）。正常人进食后，胃满了肠道空，肠道满了胃又空，这样交替运作（'更虚更满'），气机得以上下流通，五脏安定，血脉和谐，精神才得以安居。'神者，水谷之精气也'——人的精神力量来自于食物转化成的精微物质。不吃东西七天之后，储备的水谷精气全部耗尽（'皆尽故也'），人就死了。这个'七日'的数字在现代看来也大致合理——人在没有水和食物的情况下，通常存活时间就是一周左右。这提醒我们：脾胃运化是生命的根基，保护脾胃就是保护生命之源。", "contraindication": "", "keywords": "绝谷,水谷精气,生命极限"}, {"id": 1162, "source": "黄帝内经", "article_number": "129", "liujing": "", "chapter": "灵枢·海论", "original_text": "人有四海：胃者为水谷之海，其输上在气街，下至三里。冲脉者为十二经之海，其输上在大杼，下出巨虚之上下廉。膻中者为气之海，其输上在柱骨之上下，前在人迎。脑为髓之海，其输上在其盖，下在风府。得顺者生，得逆者败；知调者利，不知调者害。", "tags": "四海,水谷海,气海血海髓海", "formula": "", "formula_detail": "", "ni_annotation": "'四海'理论是经络学说的重要组成部分——人体有四个巨大的'海'（汇聚中心）。水谷之海——胃（消化吸收的中心），关键穴位：气冲（气街）和足三里。十二经之海——冲脉（又称血海，统领十二经气血），关键穴位：大杼和上下巨虚。气之海——膻中（宗气汇聚之处，即两乳头之间的区域），关键穴位：颈椎部位和人迎穴。髓之海——脑（脊髓骨髓汇聚的最高中枢），关键穴位：百会（盖）和风府。'得顺者生，得逆者败'——四海的功能正常人就健康，失常人就衰败。临床上调治四海是治疗慢性病和疑难病的重要思路：消化不好调水谷海，气血不足调血海，气短喘息调气海，智力退化调髓海。", "contraindication": "", "keywords": "四海,冲脉,膻中,髓海"}, {"id": 1163, "source": "黄帝内经", "article_number": "130", "liujing": "", "chapter": "灵枢·五乱", "original_text": "气乱于心，则烦心密默，俯首静伏。乱于肺，则俯仰喘喝，接手以呼。乱于肠胃，则为霍乱。乱于臂胫，则为四厥。乱于头，则为厥逆，头重眩仆。气乱于胸者，取之府俞；乱于心者，取之手少阴心主之输；乱于头者，取之于天柱、大杼；乱于臂足，取之先去血脉，后取其阳明、少阴之输；乱于肠胃，取之太阴阳明。", "tags": "五乱,气机紊乱,乱证治疗", "formula": "", "formula_detail": "", "ni_annotation": "'五乱'是指气机在不同部位发生紊乱所产生的五种病态。气乱于心：心烦沉默、低头趴着——取心经和心包经的输穴。气乱于肺：俯仰不安、喘息呻吟、手按胸口呼吸——取肺俞等背俞穴。气乱于肠胃：上吐下泻（霍乱的原意是'挥霍撩乱'，指急剧的吐泻）——取脾胃二经。气乱于四肢：手脚冰冷——先放血，再取手足的阳明经和少阴经输穴。气乱于头：眩晕昏倒——取天柱穴和大杼穴。'乱'的概念很有意思——不一定是有形的邪气入侵，而是自身气机运行秩序被打乱了。现代人生活压力大、作息不规律、情绪不稳定，很容易出现各种'乱'证——失眠是神乱，消化不良是肠胃乱，头晕是清阳不升之乱。调气是治疗的关键。", "contraindication": "", "keywords": "五乱,气机紊乱,调气"}, {"id": 1164, "source": "黄帝内经", "article_number": "131", "liujing": "", "chapter": "灵枢·胀论", "original_text": "夫胀者，皆在于脏腑之外，排脏腑而郭胸胁，胀皮肤，故命曰胀。脏腑之在胸胁腹里者也，若匣匮之藏禁器也，各有次舍，异名而同处，在一域之中。其气于胸中，壅塞于脏腑，故命曰胀。厥气在下，营卫不行，五脏以凝，其气不行，故壅于胸中而成胀。夫心胀者，烦心短气，卧不安。肺胀者，虚满而喘咳。肝胀者，胁下满而痛引小腹。脾胀者，善哕，四肢烦悗，体重不能胜衣。肾胀者，腹满引背，央央然腰髀痛。", "tags": "胀证,五脏胀,辨证论治", "formula": "", "formula_detail": "", "ni_annotation": "'胀'是一种特殊的病理状态——邪气在脏腑之外、胸胁腹膜的夹层中堆积，向外挤压皮肤形成膨胀感。五脏各有其胀：心胀——心烦气短、睡不好。肺胀——感觉空虚胀满、咳嗽喘息（类似现在的肺气肿、COPD）。肝胀——胁肋下胀满疼痛牵引到小腹。脾胀——经常嗝气、四肢烦闷沉重、觉得衣服都穿不动了（体重感增加）。肾胀——肚子胀连着后背、腰和大腿根部隐隐作痛。胀证的共同特点是'壅塞'——气机被堵在某一个区域出不来了。治疗胀证要分清是哪个脏腑的问题，然后用相应的经穴来疏通。'行气消胀'是总的治疗原则，配合局部取穴和远端取穴相结合的效果最好。", "contraindication": "", "keywords": "胀证,五脏胀,消胀"}, {"id": 1165, "source": "黄帝内经", "article_number": "132", "liujing": "", "chapter": "灵枢·五癃津液别", "original_text": "水谷入于口，输于肠胃，其液别为五：天暑衣厚则腠理开，故汗出；寒留于分肉之间，聚沫则为痛；天寒则腠理闭，气湿不行，水下留于膀胱，则为溺与气。五脏六腑，心为之主，耳听之音，目视之色，为之主也。五谷之津液，和合而为膏者，内渗入于骨空，补益脑髓，而下流于阴股。", "tags": "津液,五液,汗涕涎泪唾", "formula": "", "formula_detail": "", "ni_annotation": "津液（人体正常体液）在体内的分布和去向有五种情况：第一种——天热或穿得多的时候，毛孔张开，津液从汗孔排出成为汗水。第二种——寒邪停留在肌肉之间，津液凝聚成泡沫状的产物，导致疼痛（这是'痰饮'的一种形式）。第三种——天冷时毛孔关闭，水液下行储存在膀胱，变成尿液。此外还有津液变化成膏脂（脂肪类的精微物质）渗入骨髓、补益脑髓的情况。'五谷之津液，和合而为膏者'——食物中的液体成分混合浓缩后变成膏样的物质，这就是人体储存能量的方式之一。理解津液的正常代谢，才能理解什么是津液代谢异常（水肿、痰饮、积液等）以及如何治疗。", "contraindication": "", "keywords": "津液,五液,代谢"}, {"id": 1166, "source": "黄帝内经", "article_number": "133", "liujing": "", "chapter": "灵枢·五阅五使", "original_text": "黄帝曰：愿闻五官。岐伯曰：鼻者肺之官也，目者肝之官也，口唇者脾之官也，舌者心之官也，耳者肾之官也。故肺病者，喘息鼻张；肝病者，目眦青；脾病者，唇黄；心病者，舌卷短，颧赤；肾病者，颧与颜黑。故五官者，五脏之阅也。黄帝曰：其色以明，察色以观五脏有余不足，六腑强弱，形之盛衰，以此参伍，决死生之分。", "tags": "五官望诊,五脏开窍,色诊", "formula": "", "formula_detail": "", "ni_annotation": "五官与五脏的对应关系是中医望诊的核心框架！鼻→肺：肺病时呼吸急促、鼻翼煽动。眼→肝：肝病时眼角发青。口唇→脾：脾病时嘴唇发黄。舌→心：心病时舌头卷缩短小、颧骨部位发红。耳→肾：肾病时颧骨和前额发黑。'五官者，五脏之阅也'——五脏的状况可以通过五官这个'窗口'观察到。'察色以观五脏有余不足'——观察颜色来判断五脏的虚实。'决死生之分'——通过综合分析来判断预后的好坏。这种望诊方法不需要任何仪器，只要仔细观察病人的五官色泽变化，就能获取大量诊断信息。倪师常说：好的中医一见面就能说出个七八不离十，靠的就是这套功夫。", "contraindication": "", "keywords": "五官,五脏开窍,望诊"}, {"id": 1167, "source": "黄帝内经", "article_number": "134", "liujing": "", "chapter": "灵枢·逆顺肥瘦", "original_text": "年质壮大，血气充盈，肤革坚固，因加以邪，刺此者，深而留之。此肥人也。广肩腋，项肉薄，厚皮而黑色，唇临临然，其血黑以浊，其气涩以迟。肥此人者，刺此者，深而留之多，以调其气。此肥人也。瘦人者，皮薄色少，肉廉廉然，薄唇轻言，其血清气滑，易脱于气，易损于血，刺此者，浅而疾之。", "tags": "肥瘦体质,针刺深浅,因人施治", "formula": "", "formula_detail": "", "ni_annotation": "不同体型的人，针刺的方法完全不同！壮实肥胖的人：气血充盛、皮肤坚韧厚实，要深刺且长时间留针（'深而留之'），因为他们气血量大、耐受力强，浅刺达不到效果。特别肥胖的人：肩宽颈粗、皮肤厚而色黑、嘴唇厚重下垂、血液浓稠色暗黑、气血运行缓慢涩滞——更要深刺久留来调理气机。瘦弱的人：皮肤薄颜色淡、肌肉瘦削、嘴唇薄说话轻柔、血液清澈气机滑利、容易耗气伤血——必须浅刺且快速出针（'浅而疾之'），否则会进一步损伤他们本来就不足的气血。这就是'因人施治'的具体体现——同样的病，胖子和瘦子的针刺方案完全相反。现在很多针灸师不管胖瘦一律一样的扎法，是不对的。", "contraindication": "", "keywords": "体质,肥瘦,针刺深浅"}, {"id": 1168, "source": "黄帝内经", "article_number": "135", "liujing": "", "chapter": "灵枢·血络论", "original_text": "黄帝曰：愿闻其奇邪而不在经者。岐伯曰：血络者是也。黄帝曰：刺血络而仆者，何也？血出而射者，何也？血少而浊者，何也？血出清而半为汁者，何也？拔针而肿者，何也？血出而多若不变者，何也。岐伯曰：气虽出针而血不随出者，是其气之滞也。血出而射者，血气俱盛，阴气积于阳分所致也。血出少而浊者，阳气蓄积已久，不能泄越，故血少而浊。", "tags": "血络,放血,刺络反应", "formula": "", "formula_detail": "", "ni_annotation": "'血络'是体表可见的浮络静脉，刺血络（放血疗法）会出现各种不同的反应，每种反应都有特定的含义。刺血络后晕倒——可能是病人气血太虚或者过度紧张。血喷射出来——气血都很旺盛，阴气积聚在阳分导致压力过大（实证表现）。出血少而且血色暗浊——阳气蓄积太久不能排泄，血液变得黏稠。出血清淡像水一样——气血已经很虚弱了。拔针后局部肿胀——气血凝结在针孔处。出血很多但血色不变（还是鲜红）——邪气正在被有效排出。理解这些反应可以帮助我们判断放血疗法的效果和病人的虚实状态。放血疗法在临床应用非常广泛——发热、瘀血、急性扭伤、静脉曲张等，但必须掌握适应症和操作技巧。", "contraindication": "", "keywords": "血络,放血疗法,刺络"}, {"id": 1169, "source": "黄帝内经", "article_number": "136", "liujing": "", "chapter": "灵枢·阴阳清浊", "original_text": "受气者清净，受谷者浊浊，受谷者浊，清者注阴，浊者注阳。浊而清者，上出于咽；清而浊者，则下行。清浊相干，命曰乱气。黄帝曰：夫阴清而阳浊，浊中有清，清中有浊，别之奈何？岐伯曰：气之大别，清者上注于肺，浊者下走于胃。胃之清气，上出于口；肺之浊阴，下流于膀胱。水源不同，清浊相干，故气乱于中。", "tags": "阴阳清浊,清气浊气,气机升降", "formula": "", "formula_detail": "", "ni_annotation": "'清浊'理论讨论的是气在人体内的性质差异和运动方向。受天之精气的是'清'的，受水谷之物的是'浊'的（不是说水谷不好，而是相对于天气而言质地较稠浊）。清气注入阴分（内部），浊气注入阳分（外部）。但这里面又有层次——浊中也有清的成分（上升到咽喉），清中也有浊的成分（下排到膀胱）。当清浊不分、互相干扰时（'清浊相干'）就产生了'乱气'——气机紊乱。具体来说：清气向上注入肺部，浊气向下进入胃部。胃中清气上出口腔（这就是为什么胃气好的人口气清新），肺中浊阴下排到膀胱。这套清浊升降理论对于理解消化系统疾病和呼吸系统疾病的关系非常有帮助——很多慢性咳嗽其实是胃浊上逆造成的（胃食道反流性咳嗽）。", "contraindication": "", "keywords": "清浊,气机升降,清阳浊阴"}, {"id": 1170, "source": "黄帝内经", "article_number": "137", "liujing": "", "chapter": "灵枢·阴阳系日月", "original_text": "甲主左手之少阳，乙主右手之少阳，丙主右手之阳明，丁主左手之阳明，戊主右手之太阳，己主左手之太阳，庚主右手之少阴，辛主左手之少阴，壬主左手之太阴，癸主右手之太阴。日者，正月寅，二月卯，三月辰，四月巳，五月午，六月未，七月申，八月酉，九月戌，十月亥，十一月子，十二月丑。", "tags": "天干地支,阴阳系日月,时空针灸", "formula": "", "formula_detail": "", "ni_annotation": "这是将天干地支与人体经脉、时间周期相对应的理论，是'子午流注'针灸择时学派的理论基础之一。十天干分配到左右两侧的手足三阴三阳经：甲乙→少阳，丙丁→阳明，戊己→太阳，庚辛→少阴，壬癸→太阴。十二地支配十二月：寅（正月）到丑（十二月）。这种对应关系意味着在不同的时间（月份、日期、时辰），不同的经脉气血处于不同的旺盛状态——在经脉气血旺盛的时候针刺该经，效果最好。这就是'按时取穴'或'择时针刺'的理论依据。例如：甲日（甲子日、甲寅日等）针刺少阳经效果最佳。虽然这种理论比较复杂且争议不少（主要是干支推算方法和实际效果的验证问题），但它代表了古人试图建立一套精确的时空医学体系的努力。", "contraindication": "", "keywords": "天干地支,子午流注,择时针灸"}, {"id": 1171, "source": "黄帝内经", "article_number": "138", "liujing": "", "chapter": "灵枢·病传", "original_text": "病先发于心，一日而之肺，三日之肝，五日之脾，三日不已死。冬夜半，夏日中。病先发于肺，三日之肝，一日之脾，五日之胃，十日不已死。冬日入，夏日出。病先发于肝，三日之脾，五日之胃，三日之肾，三日不已死。冬日入，夏早食。病先发于脾，一日之胃，三日之肾，十日之肝，三日不已死。冬人定，夏晏晡。", "tags": "病传,脏腑相传,预后判断", "formula": "", "formula_detail": "", "ni_annotation": "疾病会在脏腑之间按照一定的规律传变，掌握了这个规律就能预测疾病的发展趋势和死亡时间。心病传变规律：心→肺（1天）→肝（3天）→脾（5天）→如果不愈就会死，死亡时间在冬天的半夜或夏天的中午。肺病传变：肺→肝（3天）→脾（1天）→胃（5天）→十天不愈就死，死亡时间在冬天的日落时分或夏天的日出时分。肝病：肝→脾（3天）→胃（5天）→肾（3天）→三天不愈就死。脾病：脾→胃（1天）→肾（3天）→肝（10天）→三天不愈就死。这个'病传'规律基于五行相克的理论——每个脏腑受到其所克的脏腑的影响。虽然在实际临床中不可能如此机械地套用，但这种思维方式提醒我们要动态地看待疾病的发展，及时截断传变的途径——'既病防变'的思想源头就在这里。", "contraindication": "", "keywords": "病传,脏腑传变,既病防变"}, {"id": 1172, "source": "黄帝内经", "article_number": "139", "liujing": "", "chapter": "灵枢·淫邪发梦", "original_text": "阴气盛则梦涉大水而恐惧，阳气盛则梦大火而燔焫，阴阳俱盛则梦相杀。上盛则梦飞，下盛则梦堕。甚饥则梦取，甚饱则梦予。肝气盛则梦怒，肺气盛则梦恐惧哭泣飞扬，心气盛则梦喜笑畏恐，脾气盛则梦歌乐，身体重不举，肾气盛则梦腰脊两解不属。", "tags": "梦境,淫邪发梦,脏腑辨证", "formula": "", "formula_detail": "", "ni_annotation": "梦是脏腑气血盛衰的反映！《灵枢》详细列出了不同类型的梦与身体状况的对应关系。阴气过盛——梦见大水、感到恐惧（阴=水）。阳气过盛——梦见大火燃烧（阳=火）。阴阳都盛——梦见互相厮杀。上部气盛——梦见飞翔。下部气盛——梦见坠落。很饿——梦见索取东西。很饱——梦见给予别人。肝气盛——梦中发怒（肝主怒）。肺气盛——梦中恐惧哭泣或身体飘浮（肺主悲，在志为忧）。心气盛——梦中大笑又害怕（心主喜）。脾气盛——梦中唱歌娱乐、感觉身体沉重抬不起来（脾主思，在志为吟）。肾气盛——梦见腰脊分离不相连接（肾主腰）。通过询问病人的梦，可以获得非常宝贵的辨证信息！很多病人不会主动说自己的梦，医生要主动问。倪师常说：梦是身体的语言，要学会倾听。", "contraindication": "", "keywords": "梦境,脏腑辨证,解梦"}, {"id": 1173, "source": "黄帝内经", "article_number": "140", "liujing": "", "chapter": "灵枢·顺气一日分为四时", "original_text": "夫百病者，多以旦慧、昼安、夕加、夜甚。何也？岐伯曰：四时之气使然。朝则人气始生，病气衰，故旦慧；日中人气长，长则胜邪，故安；夕则人气始衰，邪气始生，故加；夜半人气入脏，邪气居于身，故甚也。黄帝曰：有时有反者何也？岐伯曰：是不应四时之气，独主其脏，脏独发病，则不受四时节制，故反也。", "tags": "旦慧昼安夕加夜甚,病情昼夜变化,时间医学", "formula": "", "formula_detail": "", "ni_annotation": "病情在一日之内会有规律性的波动——早晨好转（'旦慧'）、白天稳定（'昼安'）、傍晚加重（'夕加'）、夜间严重（'夜甚'）。原因在于人体阳气在一天中的消长变化：早晨阳气初生，正气上升压制了病邪，所以感觉好些。中午阳气最旺，正气强盛能战胜邪气，所以最安稳。傍晚阳气开始衰退，邪气趁机增长，病情加重。半夜阳气潜藏入内脏，体表全靠邪气占据，所以最严重。但也有例外——有些病'不应四时之气'，是因为某个脏腑单独发生严重病变，不再受四时节律的制约（如急性心梗发作就不一定遵循这个规律）。这个规律对临床指导用药和针刺时机非常有价值——在'旦慧'时段可以做较强的治疗，在'夜甚'时段应以保守支持为主。", "contraindication": "", "keywords": "旦慧昼安,昼夜变化,时间医学"}, {"id": 1174, "source": "黄帝内经", "article_number": "141", "liujing": "", "chapter": "灵枢·外揣", "original_text": "夫日月之明，不失其影，水镜之察，不失其形，鼓响之应，不后其声，动摇之应，不失其中，唯其动而已矣。故远者司外揣内，近者司内揣外，是谓阴阳之极，气之极密也。合而察之，切而验之，见而得之，若清水明镜之不失其形也。五音不彰，五色不明，五脏波荡，若是则内外相袭，若鼓之应桴，影之似形，远者可知也。", "tags": "外揣,司外揣内,诊断原理", "formula": "", "formula_detail": "", "ni_annotation": "'外揣'——从外在表现推测内在状态的诊断方法论。就像影子不会脱离形体、镜子里的影像不会偏离实物、鼓声不会落后于击鼓的动作一样，人体的外在征象也不会脱离内在的真实状态。'远者司外揣内，近者司内揣外'——距离远的（表面征象）可以用来推断内部情况，距离近的（内在变化）也可以用来确认外部表现。这就是中医诊断的根本原理：通过对面色、声音、脉象、舌苔等外部信息的收集和分析，来推断体内脏腑气血的真实状态。'若清水明镜之不失其形'——好的诊断就像清水照人一样清晰准确，不会有偏差。五音（声音）不正常、五色（面色）不明亮、五脏动荡不安——这些内外表现一定是相互印证的（'内外相袭'），就像鼓槌敲鼓必有回声、物体投影必有影像一样确定无疑。", "contraindication": "", "keywords": "司外揣内,诊断原理,望闻问切"}, {"id": 1175, "source": "黄帝内经", "article_number": "142", "liujing": "", "chapter": "灵枢·五变", "original_text": "黄帝曰：一时遇风，同时得病，其病各异，愿闻其故。少俞曰：善乎哉问！请论以比匠人。匠人磨斧斤，砺刀削，斫材木。木之阴阳，尚有坚脆者，坚者不入，脆者皮弛，况于材木不同，皮之厚薄，汁之多少，而各异耶？夫木之蚤花先生叶者，遇春霜烈风，则花落而叶萎。久曝大旱，则脆木薄皮者，枝落叶伤。久阴淫雨，则薄皮多汁者，皮溃而漉。", "tags": "五变,体质差异,同病异治", "formula": "", "formula_detail": "", "ni_annotation": "为什么同一时间遇到同样的风邪，有人得这个病，有人得那个病，还有人不得病？答案是：每个人的'材质'不同（就像木材的质地不同一样）。工匠砍伐树木，坚硬的木头刀斧难入，脆弱的一碰就裂——何况树木之间还有皮厚皮薄、含水量多少的差异呢？同样的自然条件下，开花早的树遇到春霜就落叶；长期干旱时脆弱的树枝就断裂脱落；连续阴雨时薄皮多汁的树皮就会溃烂烂掉。人也是一样——同样是感冒，体质壮实的人可能只是轻微不适，体质虚弱的人可能发展为肺炎；同样是生气，有的人闷在心里生闷气（肝郁），有的人大发雷霆（肝火），有的人气到胃痛（木克土）。'同病异治'的根基就在于体质差异——这就是'五变'的核心思想。", "contraindication": "", "keywords": "五变,体质,同病异治"}, {"id": 1176, "source": "黄帝内经", "article_number": "143", "liujing": "", "chapter": "灵枢·本脏", "original_text": "五脏者，所以参天地，副四时，合五行，主六节，化五味者也。其禀性则有有小有大，有小有大有小，有高有下，有坚有脆，有偏有正。五脏均长者，好安心；五脏皆小者，少病，苦焦心，忧愁；五脏皆大者，缓于事，难治；五脏皆高者，好高气；五脏皆下者，好出人下；五脏皆坚者，无病；五脏皆脆者，不离于病；五脏端正者和利得人心；五脏偏倾者，邪心而善盗，不可为人，反复自语。", "tags": "本脏,五脏禀赋,性格体质", "formula": "", "formula_detail": "", "ni_annotation": "每个人五脏的先天禀赋都不相同——有大小、高低、坚脆、偏正的区别。这些差异不仅影响身体健康，还影响性格特征！五脏都比较大的：做事从容不迫但治疗效果慢。五脏都比较小的：很少生病但内心容易焦虑忧愁。五脏位置偏高：志向高远傲气。五脏位置偏低：甘居人下自卑。五脏坚实：不容易生病。五脏脆弱：经常生病。五脏端正：性格和善受人喜欢。五脏偏斜不正：心思不正喜欢算计别人、不能信任、自言自语。这里揭示了一个深刻的道理：生理结构和心理性格之间存在内在联系——中医的'形神一体'观的体现。虽然我们不能直接看到五脏的大小位置，但可以通过外在表现来推测，从而更好地理解和帮助每一个独特的个体。", "contraindication": "", "keywords": "五脏禀赋,性格,形神一体"}, {"id": 1177, "source": "黄帝内经", "article_number": "144", "liujing": "", "chapter": "灵枢·禁服", "original_text": "凡刺之禁：新内勿刺，新刺勿内。已醉勿刺，已刺勿醉。新怒勿刺，已刺勿怒。新劳勿刺，已刺勿劳。已饱勿刺，已刺勿饱。已饥勿刺，已刺勿饥。已渴勿刺，已刺勿渴。大惊大恐，必定其气乃刺之。乘车而来者，卧而休之如食顷乃刺之。出行而来者，坐而休之如行十里乃刺之。凡此十二禁者，其脉乱气散，逆其营卫，经气不次，因而刺之，则阳病入于阴，阴病出为阳，则邪气复生。", "tags": "针刺禁忌,十二禁,注意事项", "formula": "", "formula_detail": "", "ni_annotation": "这是针刺疗法的十二大禁忌！每一条都是血的教训总结出来的。性生活后不要马上扎针，扎完针也不要马上行房（耗伤精气）。醉酒后不要扎针（气血乱行），扎完针也不要喝酒。大怒后不要扎针（气机上逆），扎完针也不要发怒。劳累后不要扎针（气血消耗），扎完针也不要剧烈劳动。吃饱后不要扎针（气血集中于胃），扎完针也不要立刻吃太饱。饥饿时不要扎针（气血不足），扎完针也不要挨饿。口渴时不要扎针（津液不足），扎完针也不要脱水。大惊大恐的必须先安定情绪再扎针。乘车来的要躺下休息一顿饭的时间（约半小时）。走路来的要坐下休息相当于走十里路的时间。违反这些禁忌会导致'脉乱气散'——脉象混乱气机离散，进而造成阴阳错乱、邪气复发。这些禁忌至今仍然具有极高的临床指导意义！", "contraindication": "", "keywords": "针刺禁忌,十二禁,安全须知"}, {"id": 1178, "source": "黄帝内经", "article_number": "145", "liujing": "", "chapter": "灵枢·五色", "original_text": "明堂者，鼻也；阙者，眉间也；庭者，颜也；蕃者，颊侧也；蔽者，耳门也。其间欲方大，去之十步，皆见于外，如是者寿必中百岁。五脏次于中央，六腑挟其两侧，首面上于阙庭，王宫在于下极。五脏安于胸中，真色以致，病色不见，明堂润泽以清。五色之见也，各出其色部，部骨陷者，必不免于病矣。其色部乘袭者，虽病甚不死矣。", "tags": "五色望诊,明堂,面部色部", "formula": "", "formula_detail": "", "ni_annotation": "面部望诊的精细地图！明堂=鼻子，阙=两眉之间（印堂），庭=前额，蕃=脸颊两侧，蔽=耳门。这些部位如果方正饱满大方，站在十步以外都能看得清楚——这样的人寿命一定能活到一百岁！五脏的气色反映在面部的中央区域，六腑反映在两侧。头部面色反映在阙庭区域，'王宫'（心）反映在下极（山根/两眼之间）。五脏在胸中安然有序，真色（正常的肤色）显露，看不到病色，明堂（鼻子）润泽清晰——这是健康的表现。五色的变化出现在各自的'色部'（固定的对应区域），如果某个色部的骨骼凹陷，那这个人一定会生病。但如果病色是'乘袭'（母子相生的良性传递）的，即使病情严重也不至于死亡。面部色诊是中医望诊中最精细的技术之一，《灵枢》的这一段奠定了其理论基础。", "contraindication": "", "keywords": "五色望诊,面部色部,明堂"}, {"id": 1179, "source": "黄帝内经", "article_number": "146", "liujing": "", "chapter": "灵枢·论勇", "original_text": "黄帝曰：夫人之忍痛与不忍痛者，非勇怯之分也。夫勇士之不忍痛者，见难则前，痛则怯；夫怯士之忍痛者，闻难则恐，痛则不动。勇士者，目深以固，长衡直扬，三焦理横，其心端直，其肝大以坚，胆满以傍，怒则气盛而胸张，肝举胆横，眦裂而目扬，毛起而面苍，此勇士之由然者也。", "tags": "勇怯,体质心理,肝胆", "formula": "", "formula_detail": "", "ni_annotation": "'勇'和'怯'不仅是性格特质，更是生理基础的反映。勇敢的人：眼睛深邃坚定、眉毛长直上扬、皮肤纹理横向扩张、心地正直端庄、肝脏大而坚实、胆囊充盈丰满——发怒时气盛胸张、肝脏上提胆囊横展、眼角裂开眼睛圆睁、毛发竖起面色发青。怯懦的人则相反。值得注意的是：勇敢不一定能忍受疼痛（'勇士之不忍痛者，见难则前，痛则怯'），怯懦的人反而可能忍痛能力强（'怯士之忍痛者，闻难则恐，痛则不动'）。这说明勇气和耐痛力是两种不同的素质——勇气来自肝胆的功能状态，耐痛力则涉及更多因素。临床上有的人平时很勇敢但一扎针就怕得要死，有的人胆子小但扎针一声不吭——都可以从这个角度理解。针刺治疗前评估病人的心理承受能力也很重要。", "contraindication": "", "keywords": "勇怯,肝胆,心理体质"}, {"id": 1180, "source": "黄帝内经", "article_number": "147", "liujing": "", "chapter": "灵枢·背俞", "original_text": "胸中大腧在杼骨之端，肺腧在三焦之间，心腧在五焦之间，肝腧在九焦之间，脾腧在十一焦之间，肾腧在十四焦之间，皆挟脊相去三寸所。则欲得而验之，按其处，应在中而痛解，乃其腧也。灸之则可，刺之则不可。气盛则泻之，虚则补之。以火补之者，毋吹其火，须自灭也。以火泻之者，疾吹其火，传其艾，须其火灭也。", "tags": "背俞穴,肺俞心俞肝俞脾俞肾俞,灸法", "formula": "", "formula_detail": "", "ni_annotation": "背俞穴是脏腑之气在背部输注的特殊穴位！肺俞在第三胸椎棘突下旁开1.5寸，心俞在第五胸椎，肝俞在第九胸椎，脾俞在第十一胸椎，肾俞在第十四胸椎（第一腰椎）。'挟脊相去三寸所'——距离脊柱约1.5寸（古代的三寸）。如何准确定位背俞穴？'按其处，应在中而痛解'——按压这个部位，如果病人感觉到体内有感应并且原有的疼痛缓解了，那就是正确的背俞穴位置。背俞穴'灸之则可，刺之则不可'——古人认为背俞穴更适合用灸法而非针刺（因为背部阳气汇聚，针刺容易扰动阳气）。灸法的补泻：补法——点燃艾炷后不要吹气让它自然燃完；泻法——用力吹火加速燃烧并快速更换艾炷。背俞穴是调整脏腑功能的黄金穴位组合，临床应用极为广泛。", "contraindication": "", "keywords": "背俞穴,肺俞肝俞肾俞,灸法补泻"}, {"id": 1181, "source": "黄帝内经", "article_number": "148", "liujing": "", "chapter": "灵枢·卫气", "original_text": "卫气之行，一日一夜五十周于身。昼行于阳二十五周，夜行于阴二十五周。周于五脏。是故平旦阴尽，阳气出于目，目张则气上行于头，循项下足太阳，循背下至小指之端。其散者，从耳下手太阳，入手中指之端。其至足者，入足小指之间。从目下，下手阳明，入手中指之端。其至足者，入足中指之间。", "tags": "卫气运行,昼行于阳,夜行于阴", "formula": "", "formula_detail": "", "ni_annotation": "卫气的详细运行路线！一天一夜在全身运行五十圈——白天在阳分（体表）运行二十五圈，夜晚在阴分（内脏）运行二十五圈。清晨（平旦）时阴气耗尽，卫气从眼睛开始外出——眼睛一张开，卫气就上行到头部，然后沿着膀胱经下行直到足小趾尖端。一部分分散到小肠经到手小指。另一部分到大肠经到手中指和足中指。这个运行规律揭示了卫气的'日周期'：白天卫气主要在体表发挥防御功能（所以白天人的抗病能力较强），夜间卫气主要在内部滋养脏腑（所以晚上应该安静睡眠让卫气入阴）。如果这个规律被打破——比如夜间卫气不能入阴，人就会失眠（失眠的一个核心机制就是'卫气不入阴'）。治疗失眠的关键之一就是引导卫气在夜间顺利回归阴分。", "contraindication": "", "keywords": "卫气运行,昼夜节律,失眠"}, {"id": 1182, "source": "黄帝内经", "article_number": "149", "liujing": "", "chapter": "灵枢·论痛", "original_text": "黄帝问于少俞曰：筋骨之强弱，肌肉之坚脆，皮肤之厚薄，腠理之疏密，各不同，其于痛也何如？肠胃之厚薄坚脆亦不等，其于毒药何如？愿尽闻之。少俞曰：人之骨强筋弱肉缓皮肤厚者耐痛，其于针石之痛火熨亦然。坚肉脆皮者不耐针石之痛，于火熨亦然。黑色而美骨者，肠胃厚；黑色而不坚者，肠胃薄。", "tags": "疼痛耐受,体质差异,针灸反应", "formula": "", "formula_detail": "", "ni_annotation": "人对疼痛和药物的反应因体质而异！骨胳强壮但筋弱、肌肉松软、皮肤厚实的人——能忍受疼痛（包括针刺疼痛和热熨烫感）。肌肉结实但皮肤脆弱的人——不能忍受针刺和热熨的痛苦。肤色黑且骨骼结构美观的人——肠胃壁厚实（消化功能强）。肤色黑但不结实的人——肠胃壁薄弱（消化功能差）。这些知识在临床上的意义：对于耐痛能力差的病人（通常是'坚肉脆皮'型），针刺时要格外轻柔，选用细针，进针速度要慢，必要时可以先安抚情绪再操作。对于肠胃薄弱的病人用药要谨慎，剂量宜从小开始。'因人制宜'不仅仅是一句口号——它体现在每一次针刺的角度深度、每一剂药的剂量加减之中。", "contraindication": "", "keywords": "疼痛耐受,体质,个体差异"}, {"id": 1183, "source": "黄帝内经", "article_number": "150", "liujing": "", "chapter": "灵枢·天年", "original_text": "人生十岁，五脏始定，血气已通，其气在下，故好走。二十岁，血气始盛，肌肉方长，故好趋。三十岁，五脏大定，肌肉坚固，血脉盛满，故好步。四十岁，五脏六腑十二经脉，皆大盛以平定，腠理始疏，荣华颓落，发颇斑白，平盛不摇，故好坐。五十岁，肝气始衰，肝叶始薄，胆汁始减，目始不明。六十岁，心气始衰，苦忧悲，血气懈惰，故好卧。七十岁，脾气虚，皮肤枯。八十岁，肺气衰，魄离，故言善误。九十岁，肾气焦，四脏经脉空虚。百岁，五脏皆虚，神气皆去，形骸独居而终矣。", "tags": "天年,生命周期,十岁一阶段", "formula": "", "formula_detail": "", "ni_annotation": "这是人类生命周期的完整图谱，以十年为一个阶段，描述得无比精准！10岁：五脏刚刚稳定，气血开始通畅，气在下面（肾气初旺），所以喜欢跑跑跳跳。20岁：气血开始旺盛，肌肉正在发育，步履矫健。30岁：五脏完全稳定，肌肉坚固，血脉充满，步态稳健。40岁：巅峰期过后开始下滑——腠理（毛孔）开始疏松、容颜开始衰老、头发开始斑白、不喜欢动了喜欢坐着。50岁：肝气开始衰减——肝叶变薄、胆汁减少、视力下降。60岁：心气衰减——容易忧伤悲观、气血懒散懈怠、喜欢躺着。70岁：脾气虚弱——皮肤枯槁。80岁：肺气衰减——魄（本能反应能力）离开身体、说话容易出错。90岁：肾气枯竭——四脏经脉都空虚了。100岁：五脏全部虚衰、神气离去、只剩下一具躯壳。这个规律至今仍然适用——对照一下自己和家人，你会发现惊人的吻合。了解了正常的老化过程，就能区分什么是正常的衰老表现，什么是疾病的信号。", "contraindication": "", "keywords": "天年,生命周期,衰老"}, {"id": 1184, "source": "黄帝内经", "article_number": "151", "liujing": "", "chapter": "灵枢·逆顺", "original_text": "气之逆顺者，所以应天地、阴阳、四时、五行也。脉之盛衰者，所以候血气之虚实有余不足也。刺之大约者，必有明知者也。未知为此者，未可刺也。气痛不来，其候不可知也。上工治未病，不治已病。下工治已病，治其已成。其不知逆顺之理，故病已成而后药之，犹渴而穿井，斗而铸锥，不亦晚乎！", "tags": "逆顺,上工治未病,预防医学", "formula": "", "formula_detail": "", "ni_annotation": "'上工治未病，不治已病'——这是中医预防医学思想的最高表达，出自《灵枢·逆顺》篇！高明的医生在没有发病之前就进行预防和干预，不高明的医生等到病形成了才去治疗。不理解气机逆顺的道理，非要等病已经形成了才用药——就像口渴了才开始挖井、要打仗了才开始铸造兵器，难道不太晚了吗？！'治未病'包括两层意思：一是未病先防（健康人群的养生保健），二是既病防变（已经生病了防止它恶化传变）。'气之逆顺'是判断预后的关键——气机顺的病好治，气机逆的病难治。作为医生，必须在疾病早期甚至在萌芽状态时就识别出来并加以干预，这才是真正的高水平。'渴而穿井，斗而铸锥'这两个比喻太生动了——预防永远优于治疗。", "contraindication": "", "keywords": "治未病,上工下工,预防医学"}, {"id": 1185, "source": "黄帝内经", "article_number": "152", "liujing": "", "chapter": "灵枢·五味", "original_text": "胃者，五脏六腑之海也，水谷皆入于胃，五脏六腑皆禀气于胃。五味各走其所喜，谷味酸，先走肝；谷味苦，先走心；谷味甘，先走脾；谷味咸，先走肾。谷味辛，先走肺。故曰：五谷入于胃也，其糟粕、津液、宗气，分为三隧道。故宗气积于胸中，出于喉咙，以贯心脉，而行呼吸。营气者，泌其津液，注之于脉，化以为血，以荣四末，内注五脏六腑。卫气者，出其悍气之慓疾，而先行于四末分肉皮肤之间，而不休者也。", "tags": "五味入五脏,谷味酸苦甘辛咸,营卫宗气", "formula": "", "formula_detail": "", "ni_annotation": "'五味入五脏'是食疗和药膳的理论基础！酸味入肝、苦味入心、甘味入脾、咸味入肾、辛味入肺——每种味道偏好滋养对应的脏器。胃是五脏六腑的'海'（汇聚中心），所有食物都先进胃，五脏六腑都从胃那里接受营养。食物入胃后被分解为三种成分：糟粕（废物排出体外）、津液（体液来源）和宗气（胸中大气）。宗气聚集在胸中（膻中区域），从喉咙出来贯通心脉推动呼吸。营气从津液中分泌出来注入经脉化为血液滋养四肢百骸和内脏。卫气是其中最剽悍滑利的部分，先行到达四肢肌肉和皮肤表层，不停地循环巡逻防御外邪。'谷味'的五味归经理论指导着我们的日常饮食——肝不好多吃酸味的食品（山楂、乌梅等），心火旺适当吃苦味（苦瓜、莲子心），脾胃虚弱用甘味（山药、大枣）来调养。食疗的本质就是利用五味归经的规律来调节脏腑功能。", "contraindication": "", "keywords": "五味,食疗,五味入脏"}, {"id": 1186, "source": "黄帝内经", "article_number": "153", "liujing": "", "chapter": "灵枢·水胀", "original_text": "水始起也，目窠上微肿，如新卧起之状，其颈脉动，时咳，阴股间寒，足胫肿，腹乃大，其水已成矣。以手按其腹，随手而起，如裹水之状，此其候也。肤胀者，寒气客于皮肤之间，鼓鼓然而不坚，腹大，身尽肿，皮厚，按其腹，窅而不起，腹色不变。鼓胀者，腹胀身皆大，大与肤胀等也，色苍黄，腹筋起，此其候也。", "tags": "水胀,肤胀,鼓胀,肿胀鉴别", "formula": "", "formula_detail": "", "ni_annotation": "三种'胀'的鉴别诊断！水胀（水肿）：刚开始眼睑微肿像刚睡醒的样子，颈动脉跳动明显，偶尔咳嗽，大腿根部发凉，小腿浮肿，肚子变大——按肚子有波动感像装了水一样，放手后立即弹回来。肤胀：寒气停留在皮肤腠理之间，肚子鼓但不硬，全身浮肿，皮肤增厚，按肚子凹陷不起弹（不像水胀那样有波动感），腹部皮肤颜色不变。鼓胀：肚子和全身都胀大（程度和肤胀差不多），脸色发黄，腹部青筋暴露。三种胀的病因和治法完全不同——水胀要利水消肿（真武汤、五苓散之类），肤胀要温阳散寒（温阳化气之法），鼓胀要活血化瘀软坚（鳖甲煎丸之类）。鉴别清楚才能正确治疗，混淆了就会南辕北辙。临床上肝硬化腹水、心力衰竭水肿、营养不良性水肿等都需要在这个框架下进行鉴别。", "contraindication": "", "keywords": "水胀,肤胀,鼓胀,鉴别诊断"}, {"id": 1187, "source": "黄帝内经", "article_number": "154", "liujing": "", "chapter": "灵枢·贼风", "original_text": "黄帝曰：夫子言贼风邪气之伤人也，令人病焉。今有其不离屏蔽室内，无怵惕之所，其然而病者，何不禁？愿闻其故。岐伯曰：此皆尝有所伤于湿气，藏于血脉之中，分肉之间，久留而不去。若有所堕坠，恶血在内而不去。卒然喜怒不节，饮食不适，寒温不时，腠理闭而不通。其开而遇风寒，则血气凝结，与故邪相袭，则为寒痹。其有热则汗出，汗出则受风，虽不遇贼风邪气，必有因而加也。", "tags": "贼风,故邪,伏邪,复合致病", "formula": "", "formula_detail": "", "ni_annotation": "为什么有人明明待在室内没有感受外邪也会生病？答案是'故邪'（以前潜伏下来的病邪）在作祟！有些人曾经被湿邪伤害过，湿气藏在血脉和分肉之间久久不去；或者以前有过跌打损伤，淤血残留在体内；再加上突然的情绪波动、饮食不当、冷暖失调导致腠理闭塞。这时候一旦毛孔张开遭遇风寒，气血就会凝固，和原来潜伏的'故邪'内外勾结，形成寒痹。或者因为热而出汗，出汗时受了风——虽然没有遭遇严重的贼风邪气，但因为体内已经有隐患（'必有因而加'），稍微一点诱因就触发了疾病。这就是'伏邪'理论——很多疑难杂病的根源在于过去留下的'老账'没有清算干净。治疗这类疾病不仅要治当前的标，更要清除过去的'故邪'——这就是为什么有些病缠绵难愈的原因。", "contraindication": "", "keywords": "贼风,故邪,伏邪,复合病因"}, {"id": 1188, "source": "黄帝内经", "article_number": "155", "liujing": "", "chapter": "灵枢·卫气失常", "original_text": "卫气之留于腹中，蓄积不行，苑蕴而不得常所，使人肢胁胃中满，喘呼气逆。其在于肠胃中，则为肠鸣洞泄，消化不良。其在于脉中，则血气不通，为痈疽。何以知其有余不足？曰：气有余于上则喘渴，气不足于下则闷满。肥人血气有余而气虚，瘦人血气不足而气盛，常人血气和平。肥人宜泻，瘦人宜补。", "tags": "卫气失常,肥人瘦人,气血虚实", "formula": "", "formula_detail": "", "ni_annotation": "", "contraindication": "", "keywords": "卫气失常,肥胖消瘦,气血失调"}, {"id": 1189, "source": "黄帝内经", "article_number": "156", "liujing": "", "chapter": "灵枢·玉版", "original_text": "故其已成脓血者，其惟砭石铍锋之所取也。黄帝曰：其已有脓血者，其可治乎？岐伯曰：以其已成脓血者，其惟砭石铍锋之所取也。故圣人用针，必察其形气，形气不足，病气有余，是邪胜也，急泻之。形气有余，病气不足，急补之。形气不足，病气不足，此阴阳俱不足也，不可刺之，刺之则重不足，老者绝灭，壮者不复矣。形气有余，病气有余，此阴阳俱有余也，急泻其邪，调其虚实。", "tags": "玉版,形气病气,针刺禁忌,虚实补泻", "formula": "", "formula_detail": "", "ni_annotation": "这一段讨论了针刺前的核心评估——'形气'（人体正气）与'病气'（邪气盛衰）之间的关系，决定了能不能扎针、怎么扎针。形气弱但病气强的——邪气战胜了正气，赶紧泻邪。形气强但病气弱的——赶紧补正。形气和病气都弱的——阴阳双虚！绝对不能扎针！扎了会让虚得更厉害，老年人会因此丧命，年轻人也恢复不了。形气和病气都强的——阴阳双实，赶快泻邪然后调理虚实。'形气不足，病气不足，不可刺之'——这是铁律！很多晚期癌症患者、极度虚弱的慢性病人，正气已经奄奄一息，这时候再去针刺（尤其是泻法），无异于雪上加霜。倪师反复告诫：虚人慎针，弱人禁泻。宁可吃药慢慢调养，也不要贸然用针去折腾那些已经不堪一击的身体。", "contraindication": "", "keywords": "形气病气,针刺禁忌,虚实"}, {"id": 1190, "source": "黄帝内经", "article_number": "157", "liujing": "", "chapter": "灵枢·五禁", "original_text": "黄帝曰：禁其不可刺者，何也？岐伯曰：五禁者，禁其不可刺也。甲乙日自乘，无刺头，无发蒙于耳内。丙丁日自乘，无刺肩喉喙哕。戊己日自乘，无刺腹去爪污。庚辛日自乘，无刺关节于股膝。壬癸日自乘，无刺足胫。是谓五禁。凡禁者，身之脉血气有虚实，其日之气血有盛衰，虚实逢逢，不可犯也。", "tags": "五禁,天干禁忌,择日针刺", "formula": "", "formula_detail": "", "ni_annotation": "'五禁'是根据天干日辰来规定哪些部位在特定日子不宜针刺。甲乙日（木日）——不要刺头部，不要在耳内做'发蒙'治疗（聪耳开窍的针法）。丙丁日（火日）——不要刺肩膀和喉部（避免引发呕吐呃逆）。戊己日（土日）——不要刺腹部（避免损伤脾胃）。庚辛日（金日）——不要刺关节和股膝部位（关节是金气所主，金日针刺可能引起关节损伤）。壬癸日（水日）——不要刺小腿足胫部位。原理是：每天的气血盛衰不同，特定日子里某些部位的气血正处于敏感或不稳定状态，此时针刺可能会产生不良反应。这是'子午流注'择时针法的另一组成部分。虽然在现代临床中不一定严格遵循这些禁忌（毕竟缺乏严格的科学验证），但它提醒我们：人体确实存在某种时间节律性，治疗时机的选择是有讲究的。", "contraindication": "", "keywords": "五禁,天干,择时禁忌"}, {"id": 1191, "source": "黄帝内经", "article_number": "158", "liujing": "", "chapter": "灵枢·动输", "original_text": "黄帝曰：经脉十二，而手太阴、足少阴、阳明独动不休，何也？岐伯曰：是明胃脉也。胃为五脏六腑之海，其清气上注于肺，肺气从太阴而行之，其行也，以息往来，故人一呼脉再动，一吸脉再动，呼吸不已，故动而不止。足之阳明者，胃脉也，胃为五脏六腑之海，亦为行脉之长也，其腧在气街，故冲阳独动不休。", "tags": "动脉,寸口趺阳,胃脉", "formula": "", "formula_detail": "", "ni_annotation": "为什么十二经脉中只有手太阴肺经（寸口脉/桡动脉）、足少阴肾经（太溪脉/胫后动脉）和足阳明胃经（趺阳脉/足背动脉）一直在跳动？答案跟胃有关！胃是'五脏六腑之海'，其产生的清气上注于肺，肺气沿着手太阴经运行，伴随着呼吸运动——人一呼脉搏跳两次，一吸气脉搏又跳两次，呼吸不停所以脉搏跳动不止。足阳明胃经本身就是胃脉，胃是'行脉之长'（脉气运行的统领），其关键穴位在气街（气冲穴），所以胃经上的冲阳穴（足背动脉）也在不停地跳动。这三处动脉（寸口、趺阳、太溪）正是中医诊脉的三个主要部位——寸口诊全身（最常用），趺阳诊胃气（用于危重病人判断胃气存亡），太溪诊肾气（用于判断下元虚实的程度）。理解了动脉跳动的原理，才能理解为什么要在这三个地方诊脉。", "contraindication": "", "keywords": "动脉,寸口脉,趺阳脉,胃脉"}, {"id": 1192, "source": "黄帝内经", "article_number": "159", "liujing": "", "chapter": "灵枢·五味论", "original_text": "咸入于胃，其气走中焦，注于脉，则血气走之，血与咸相得则凝，凝则胃中汁注之，注之则胃中竭，竭则咽路焦，故舌本善味而善食也。咸入胃则血凝，血凝则胃中汁竭，胃中汁竭则咽路焦，咽路焦则舌本善味而善食。辛入胃，走气，与汗俱出，故气并于上，辛走气，多食之令人洞心。", "tags": "五味偏嗜,咸味凝血,辛味走气", "formula": "", "formula_detail": "", "ni_annotation": "偏嗜某一种味道会对身体产生特定的影响！咸味入胃后走向中焦进入血脉，咸和血相遇会使血液凝涩（'血与咸相得则凝'），血液凝涩后胃中津液被消耗（'胃中汁竭'），导致咽喉干涸，舌头反而更加追求味道所以吃得更多——形成一个恶性循环。这就是为什么吃太咸的人总觉得嘴里没味儿、越来越想吃咸的东西。而且咸味使血凝涩——高血压、血液黏稠度高的人都跟吃太多盐有直接关系。辛味入胃后走气分，和汗一起排出，导致气机向上壅滞，吃太多辛辣会让人'洞心'（心口感觉空虚难受）。所以口味重（嗜咸嗜辣）不仅仅是饮食习惯的问题，而是已经在改变体内的气血运行状态了。调整饮食口味本身就是一种治疗手段。", "contraindication": "", "keywords": "五味偏嗜,咸味,辛味,饮食养生"}, {"id": 1193, "source": "黄帝内经", "article_number": "160", "liujing": "", "chapter": "灵枢·阴阳二十五人", "original_text": "木形之人，比于上角，似于东方苍帝。其为人，苍色，小头，长面，大肩，背直，身小，手足好。有才，好劳心，少力，多忧，劳于事。能春夏，不能秋冬，秋冬感而病生。火形之人，比于上徵，似于南方赤帝。其为人，赤色，广𦟘(面),锐面小头，好肩背髀腹，小手足，行安地，疾心，行摇，肩背肉满，有气轻财，少信，多虑，见事明，好颜，急心，不寿暴死。", "tags": "阴阳二十五人,木形火形,五行体质", "formula": "", "formula_detail": "", "ni_annotation": "基于五行理论的体质分类系统——将人分为五大类（木火土金金水），每类又细分为五小类，共二十五种体质类型。木形的人：面色青、头小脸长、肩膀宽大、背部挺直、身材小巧、手脚好看。有才华、喜欢思考费心、力气不大、多忧虑、做事勤勉。适应春夏的季节，不适应秋冬（秋冬容易得病）。火形的人：面色红、面颊宽广脸尖头小、肩背腰腹部匀称、手脚小、走路稳、思维敏捷、走路爱摆动、肩背肌肉丰满。注重仪表轻视钱财、信用不多、思虑多、看事情明白、喜好漂亮、性情急躁、寿命不长可能猝死。这种体质学说超越了简单的'阳虚阴虚'分类，提供了一个立体多维度的体质辨识框架。临床意义在于：不同体质的人对相同的致病因素有不同的易感性，对相同的治疗措施有不同的反应——真正的'个性化医疗'早在两千多年前就有了雏形。", "contraindication": "", "keywords": "阴阳二十五人,五行体质,木形火形"}, {"id": 1194, "source": "黄帝内经", "article_number": "161", "liujing": "", "chapter": "灵枢·百病始生", "original_text": "风雨寒热，不得虚邪，不能独伤人。卒然逢疾风暴雨而不病者，盖无虚，故邪不能独伤人。此必因虚邪之风，与其身形，两虚相得，乃客其形。两实相逢，众人肉坚。其中于虚邪也，因于天时，与其身形，参以虚实，大病乃成。气有定舍，因处为名，上下中外，分为三员。", "tags": "百病始生,虚邪,两虚相得,病因", "formula": "", "formula_detail": "", "ni_annotation": "疾病发生的根本公式：外邪（风雨寒热）+ 内虚（正气不足）= 发病！'不得虚邪，不能独伤人'——光有外界致病因素，如果人体正气充足，是不会生病的。很多人在暴风骤雨中也没生病——因为他们身体没有虚（'盖无虚，故邪不能独伤人'）。必须是'虚邪之风'（外来致病因素）加上'身形之虚'（内在的正气虚弱），'两虚相得'（两个虚碰到一起），邪气才能侵入人体导致疾病。如果是'两实相逢'（外邪不盛+正气不虚），大家的肌肉都是坚实的，不会生病。'气有定舍，因处为名'——邪气侵犯的部位不同，病的名称也不同；'上下中外，分为三员'——病位分上中下、内中外三个层次。这个'两虚相得'的发病观是中医病因学的基石——它告诉我们：预防疾病最重要的是保持正气不虚（'正气存内，邪不可干'），治疗疾病既要祛邪更要扶正。", "contraindication": "", "keywords": "百病始生,虚邪,正气,病因学"}, {"id": 1195, "source": "黄帝内经", "article_number": "162", "liujing": "", "chapter": "灵枢·九针论", "original_text": "九针之名，各不同形。一曰镵针，头大末锐，以取热寒之气。二曰圆针，筒如卵形，以措摩肉分，不得伤肌肉，以泻分气。三曰鍉针，锋如黍粟之锐，主按脉取气，令邪出。四曰锋针，刃三隅，以发痼疾。五曰铍针，末如剑锋，以取大脓。六曰圆利针，尖如氂，且圆且锐，中身微大，以取暴气。七曰毫针，尖如蚊虻喙，以取痛痹，静以徐往，微以久留，正气因之，真邪俱往，出针而养。八曰长针，锋利身薄，可以取远痹。九曰大针，尖如挺，其锋微圆，以取大气不出关节者也。", "tags": "九针,针具形状用途,针灸工具", "formula": "", "formula_detail": "", "ni_annotation": "九种针具的完整介绍！每一种针都有其独特的形状和专门的用途——这是古代医疗器械专业化的典范。第一针 镵(chán)针：头大末端尖锐，用来浅刺排热寒之气（类似现在的皮肤针/七星针）。第二针 圆针：针身卵圆形，用来在肌肉之间按摩而不伤肌肉，泻分肉间的邪气。第三针 鍋(dī)针：针尖像小米粒那样钝圆，主要用于按压经脉穴位来导气（类似于指压/揿针的作用）。第四针 锋针：三棱形针刃（即三棱针），用来刺破顽固的病灶（放血用的）。第五针 铍(pí)针：针尖像剑锋一样（类似手术刀片），用来切开排脓。第六针 圆利针：针尖像牦牛毛那样又圆又尖，针身中部稍粗，用来迅速驱除暴烈的邪气。第七针 毫针：针尖像蚊子嘴那样细（就是我们今天最常用的针灸针），用来治疗疼痛性痹证，要求静缓进针、长时间留针。第八针 长针：针身细长锋利，用来治疗深层的痹证。第九针 大针：针尖像棍棒一样粗大微微圆润，用来抽取关节中的积气。九针体系体现了'因地制宜、因病选针'的高度专业化思想——不同的病用不同的针，不是一把毫针打天下。", "contraindication": "", "keywords": "九针,针具,镵针圆针鍉针锋针铍针圆利针毫针长针大针"}, {"id": 1196, "source": "神农本草经", "article_number": "1", "liujing": "", "chapter": "上品", "original_text": "菖蒲，味辛温，主风寒湿痹，咳逆上气，开心孔，补五脏，通九窍，明耳目，出音声。久服轻身，不忘，不迷惑，延年。", "tags": "风湿痹,咳逆,开窍,健忘,耳鸣,中风不语", "formula": "菖蒲", "formula_detail": "菖蒲，味辛温，入心、肝、脾经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲菖蒲：开心孔、通九窍是菖蒲最妙之处。心孔开则智慧生，九窍通则气血畅。中风后舌强不语，菖蒲配远志最灵，开心散主之。湿阻中焦胸闷脘痞，菖蒲配藿香、厚朴芳香化浊。痰迷心窍神昏癫痫，菖蒲郁金汤开窍涤痰。", "contraindication": "阴虚阳亢、烦躁汗多、滑精者慎用", "keywords": "开窍,化湿,祛痰,醒神,倪师常用药"}, {"id": 1197, "source": "神农本草经", "article_number": "2", "liujing": "", "chapter": "上品", "original_text": "菊花，味苦平，主诸风头眩肿痛，目欲脱，泪出，皮肤死肌，恶风湿痹。久服利血气，轻身，耐老延年。", "tags": "头眩,目赤,流泪,风湿痹,高血压", "formula": "菊花", "formula_detail": "菊花，味苦甘平，入肺、肝经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲菊花：菊花入肝经，平肝明目第一品。肝开窍于目，肝火上炎则目赤肿痛、流泪羞明，菊花开而能降，清肝火而明目。杞菊地黄丸治肝肾阴虚目暗昏花，菊花配桑叶治风热头痛目赤。倪师强调：菊花轻清上浮，治上焦头目风热最妙。", "contraindication": "气虚胃寒、食少泄泻者慎用", "keywords": "平肝,明目,疏风,清热,降压"}, {"id": 1198, "source": "神农本草经", "article_number": "3", "liujing": "", "chapter": "上品", "original_text": "人参，味甘微寒，主补五脏，安精神，定魂魄，止惊悸，除邪气，明目，开心益智。久服轻身延年。", "tags": "虚劳,惊悸,健忘,气短,消渴,阳痿", "formula": "人参", "formula_detail": "人参，味甘微苦微温，入脾、肺、心、肾经。常用量一钱至五钱。", "ni_annotation": "倪海厦讲人参：人参补五脏之元气，不是补气，是补津液。人参色黄白入脾胃，补脾胃津液，脾胃能受纳运化则五脏得养。大汗大下后津液大伤，独参汤回津救逆。四君子汤人参为君补脾肺之气。倪师强调：真正虚寒用红参，一般津亏用白参，不可滥用。", "contraindication": "实热证、阴虚火旺、肝阳上亢者忌用", "keywords": "补气,生津,安神,固脱,益智,倪师常用药"}, {"id": 1199, "source": "神农本草经", "article_number": "4", "liujing": "", "chapter": "上品", "original_text": "甘草，味甘平，主五脏六腑寒热邪气，坚筋骨，长肌肉，倍力，金疮尰，解毒。久服轻身延年。", "tags": "咳嗽,咽痛,解毒,挛急,调和诸药", "formula": "甘草", "formula_detail": "甘草，味甘平，入心、肺、脾、胃经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲甘草：生甘草解毒，炙甘草补中。甘草色黄味甘入脾，补脾胃之气而生肌肉，故能长肌肉、坚筋骨。生甘草配桔梗治咽喉肿痛即桔梗汤，生甘草配金银花、连翘清热解毒。炙甘草汤治心动悸脉结代，炙甘草为君补心脾之气。甘者缓也，能缓急止痛、调和诸药。", "contraindication": "湿阻中满、水肿胀满者忌用，反大戟、芫花、甘遂、海藻", "keywords": "补脾,解毒,调和,缓急,生炙异用"}, {"id": 1200, "source": "神农本草经", "article_number": "5", "liujing": "", "chapter": "上品", "original_text": "干地黄，味甘寒，主折跌绝筋，伤中，逐血痹，填骨髓，长肌肉。作汤除寒热积聚，除痹。生者尤良。久服轻身不老。", "tags": "血虚,阴虚,消渴,痹证,跌打", "formula": "干地黄", "formula_detail": "干地黄，味甘苦寒，入心、肝、肾经。常用量三钱至一两。", "ni_annotation": "倪海厦讲地黄：地黄分鲜、干、熟三种各有所主。鲜生地凉血，干地黄养血凉血，熟地补肾填精。瘀血不去新血不生，干地黄逐血痹填骨髓，既能化瘀又能补血。炙甘草汤用地黄一斤为君，大补心阴心血。六味地黄丸熟地为君，补肾中真阴。血虚发热口干，地黄配丹皮、地骨皮。", "contraindication": "脾胃虚寒、便溏泄泻者慎用", "keywords": "补血,凉血,填精,养阴,逐瘀,倪师常用药"}, {"id": 1201, "source": "神农本草经", "article_number": "6", "liujing": "", "chapter": "上品", "original_text": "术，味苦温，主风寒湿痹，死肌，痉，疸，止汗，除热，消食。作煎饵，久服轻身延年不饥。", "tags": "脾虚,湿痹,水肿,自汗,食少", "formula": "术", "formula_detail": "白术，味苦甘温，入脾、胃经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲白术：白术色黄入脾，味甘能补，苦能燥，温能运，专入脾胃。脾主湿，白术健脾燥湿，湿去则痹通、肿消、食进。伤寒论中白术配茯苓最常用，苓桂术甘汤治痰饮，白术健脾制水，茯苓淡渗利水。白术止汗是因其固表实脾，脾能运化水湿则汗自止。去湿必用白术，配附子入三阴去寒湿。", "contraindication": "阴虚燥渴、气滞胀闷者慎用", "keywords": "健脾,燥湿,利水,止汗,入三阴,倪师常用药"}, {"id": 1202, "source": "神农本草经", "article_number": "7", "liujing": "", "chapter": "上品", "original_text": "菟丝子，味辛平，主续绝伤，补不足，益气力，肥健人，汁去面皯。久服明目，轻身延年。", "tags": "肾虚,阳痿,腰膝酸软,目暗,不孕", "formula": "菟丝子", "formula_detail": "菟丝子，味辛甘平，入肝、肾、脾经。常用量三钱至五钱。", "ni_annotation": "倪海厦讲菟丝子：菟丝子是寄生植物，无根而能生，其精全在种子上，故补肾精最妙。肾主骨生髓，菟丝子补肾精而强筋骨、续绝伤。五子衍宗丸以菟丝子为君，治男子阳痿不育、女子宫寒不孕。其性平不燥不腻，平补肝肾阴阳，是补肾药中最平稳者，适合久服。", "contraindication": "相火旺、阳强易举者慎用", "keywords": "补肾,固精,明目,安胎,平补肝肾"}, {"id": 1203, "source": "神农本草经", "article_number": "8", "liujing": "", "chapter": "上品", "original_text": "牛膝，味苦酸平，主寒湿痿痹，四肢拘挛，膝痛不可屈伸，逐血气，伤热火烂，堕胎。久服轻身耐老。", "tags": "膝痛,痹证,腰腿痛,跌打,经闭", "formula": "牛膝", "formula_detail": "牛膝，味苦酸平，入肝、肾经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲牛膝：牛膝形如牛之膝，善治膝以下之病，引药下行。治腰膝关节痛，牛膝配杜仲、独活引药下行至膝。性善下行能逐瘀通经，血瘀经闭、产后恶露不行用川牛膝。又能引血下行，治肝阳上亢高血压头眩，镇肝熄风汤中用之。怀牛膝偏于补肝肾强筋骨，川牛膝偏于逐瘀通经。", "contraindication": "孕妇忌用，月经过多者慎用", "keywords": "强筋骨,逐瘀,引血下行,通经,怀川异用"}, {"id": 1204, "source": "神农本草经", "article_number": "9", "liujing": "", "chapter": "上品", "original_text": "充蔚子，味辛微温，主明目，益精，除水气。久服轻身。", "tags": "目暗,水肿,肾虚,月经不调", "formula": "充蔚子", "formula_detail": "充蔚子（茺蔚子），味辛甘微寒，入肝、心包经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲充蔚子：充蔚子即益母草之子，益母草入血分，子又能入肝明目。肝藏血，血足则目明，子能补肝血而明目。兼能利水除水气，故治血虚兼有水湿之目昏水肿。但因有活血作用，孕妇忌用。配决明子、枸杞子治肝血不足之视物昏花。", "contraindication": "瞳孔散大者忌用，孕妇忌用", "keywords": "明目,活血,利水,调经,益母草子"}, {"id": 1205, "source": "神农本草经", "article_number": "10", "liujing": "", "chapter": "上品", "original_text": "女萎，味甘平，主中风暴热不能动摇，跌筋结肉，诸不足。久服去面黑皯，好颜色，润泽，轻身不老。", "tags": "中风,阴虚,面斑,筋急,虚损", "formula": "女萎", "formula_detail": "女萎（萎蕤/玉竹），味甘平，入肺、胃经。常用量三钱至五钱。", "ni_annotation": "倪海厦讲女萎（即玉竹）：玉竹不寒不燥，甘平养阴，补而不腻。治肺胃阴虚，干咳咽干、口渴食少。其质润能养阴润燥，故去面黑皯、好颜色——养阴则皮肤润泽。中风暴热不能动摇，是阴液大伤筋脉失养，玉竹养阴润筋。配麦冬、沙参治肺燥干咳，配石斛养胃阴生津液。", "contraindication": "痰湿内盛、中寒便溏者忌用", "keywords": "养阴,润燥,生津,美容,肺胃阴虚"}, {"id": 1206, "source": "神农本草经", "article_number": "11", "liujing": "", "chapter": "上品", "original_text": "防葵，味辛寒，主疝瘕，肠泄，膀胱热结，溺不下，咳逆，温疟，癫痫，惊邪狂走。久服坚骨髓，益气轻身。", "tags": "疝瘕,淋证,癫痫,咳逆,疟疾", "formula": "防葵", "formula_detail": "防葵，味辛寒，入膀胱、肝经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲防葵：防葵辛散寒降，能散膀胱热结，通利小便。膀胱热结小便不通，防葵配车前子、滑石清热通淋。能降逆气，故治咳逆；能清心肝之热，故治癫痫惊狂。其辛散走窜之性，又能散疝瘕积聚。此药今少用，但其降气散结之功不可不知。", "contraindication": "脾胃虚寒者慎用", "keywords": "清热,通淋,降逆,散结,抗惊"}, {"id": 1207, "source": "神农本草经", "article_number": "12", "liujing": "", "chapter": "上品", "original_text": "茈胡，味苦平，主心腹肠胃中结气，饮食积聚，寒热邪气，推陈致新。久服轻身明目益精。", "tags": "少阳病,胸胁苦满,寒热往来,食积,肝郁", "formula": "茈胡", "formula_detail": "茈胡（柴胡），味苦辛微寒，入肝、胆、三焦经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲柴胡：柴胡是少阳经主药，半表半里之邪非柴胡不能解。少阳病寒热往来、胸胁苦满、默默不欲食，小柴胡汤柴胡为君。柴胡能推陈致新，疏肝解郁、升举阳气。肝气郁结则肠胃结气、饮食积聚，柴胡疏肝则肠胃自通。逍遥散柴胡配当归白芍疏肝养血。倪师强调：柴胡截疟之功不可忘。", "contraindication": "肝阳上亢、阴虚火旺者慎用", "keywords": "和解少阳,疏肝解郁,升阳,截疟,倪师常用药"}, {"id": 1208, "source": "神农本草经", "article_number": "13", "liujing": "", "chapter": "上品", "original_text": "麦门冬，味甘平，主心腹结气，伤中伤饱，胃络脉绝，羸瘦短气。久服轻身不老不饥。", "tags": "阴虚,干咳,口渴,心烦,便秘", "formula": "麦门冬", "formula_detail": "麦门冬，味甘微苦微寒，入心、肺、胃经。常用量三钱至五钱。", "ni_annotation": "倪海厦讲麦门冬：麦冬色白入肺，味甘能补，质润能滋。心腹结气是胃阴不足、胃络失养，麦冬甘润养胃阴、通胃络。肺燥干咳无痰，麦门冬汤以麦冬七升为君润肺养阴。生脉散人参麦冬五味子，益气养阴生脉，治暑热伤阴、汗多脉虚。胃阴虚所致消渴善饥，麦冬配天花粉、玉竹养胃生津。", "contraindication": "脾胃虚寒、大便溏泄者忌用", "keywords": "润肺,养胃,生津,清心,倪师常用药"}, {"id": 1209, "source": "神农本草经", "article_number": "14", "liujing": "", "chapter": "上品", "original_text": "独活，味苦平，主风寒所击，金疮止痛，奔豚，痫痓，女子疝瘕。久服轻身耐老。", "tags": "风寒痹,头痛,腰腿痛,奔豚,癫痫", "formula": "独活", "formula_detail": "独活，味辛苦微温，入肾、膀胱经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲独活与羌活：独活入肾经治少阴伏风，羌活入膀胱经治太阳表风。风寒湿痹腰痛如折，独活寄生汤独活为君入肾搜风。奔豚气从少腹上冲心胸，是肾中寒气上逆，独活配桂枝、茯苓温肾降逆。倪师经验：腰以下痹痛独活为主，腰以上羌活为主，全身痛二活同用。", "contraindication": "阴虚血燥者慎用", "keywords": "祛风,胜湿,止痛,入肾,少阴伏风"}, {"id": 1210, "source": "神农本草经", "article_number": "15", "liujing": "", "chapter": "上品", "original_text": "车前子，味甘寒，主气癃，止痛，利水道小便，除湿痹。久服轻身耐老。", "tags": "淋证,水肿,泄泻,目赤,咳嗽", "formula": "车前子", "formula_detail": "车前子，味甘微寒，入肝、肾、小肠、膀胱经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲车前子：车前子是利尿要药，甘寒滑利，能通利水道、清膀胱湿热。淋证小便涩痛，八正散中车前子配瞿麦、滑石清热通淋。利小便而实大便，故暑湿泄泻用车前子分利水湿。其子入肝能明目，配菊花、决明子治肝热目赤。倪师说：车前子利尿不伤阴，比泽泻温和，小儿老人皆宜。", "contraindication": "肾虚滑精者慎用，无湿热者不宜", "keywords": "利尿,通淋,明目,止泻,清湿热"}, {"id": 1211, "source": "神农本草经", "article_number": "16", "liujing": "", "chapter": "上品", "original_text": "木香，味辛温，主邪气，辟毒疫温鬼，强志，主淋露。久服不梦寤魇寐。", "tags": "气滞,腹胀,泻痢,消化不良,狐臭", "formula": "木香", "formula_detail": "木香，味辛苦温，入脾、胃、大肠、胆经。常用量五分至二钱。", "ni_annotation": "倪海厦讲木香：木香是行气止痛要药，辛苦而温，芳香走窜，通行三焦气分。脾胃气滞脘腹胀痛，木香配砂仁、陈皮行气消胀。湿热痢疾里急后重，香连丸木香配黄连，黄连清热燥湿，木香行气导滞。其香能辟秽浊，故治毒疫邪气。倪师提示：木香多用耗气，后下为佳。", "contraindication": "阴虚津亏、内有燥热者慎用", "keywords": "行气,止痛,消胀,辟秽,后下"}, {"id": 1212, "source": "神农本草经", "article_number": "17", "liujing": "", "chapter": "上品", "original_text": "署豫，味甘温，主伤中，补虚羸，除寒热邪气，补中益气力，长肌肉。久服耳目聪明，轻身不饥延年。", "tags": "脾虚,泄泻,消渴,虚劳,遗精", "formula": "署豫", "formula_detail": "署豫（薯蓣/山药），味甘平，入脾、肺、肾经。常用量三钱至一两。", "ni_annotation": "倪海厦讲山药：山药白色入肺，味甘入脾，汁液黏滑入肾，一味药入三脏。补脾胃而益气力、长肌肉，补肺而治虚劳咳喘，补肾而固精缩尿。薯蓣丸以山药为君治虚劳诸不足。消渴多饮多尿，山药配黄芪、天花粉益气养阴。性平力缓，需大剂久服方效。倪师说：山药是食疗上品，补而不燥。", "contraindication": "湿盛中满、有实邪者不宜", "keywords": "健脾,补肺,固肾,养阴,食疗上品"}, {"id": 1213, "source": "神农本草经", "article_number": "18", "liujing": "", "chapter": "上品", "original_text": "薏苡仁，味甘微寒，主筋急拘挛不可屈伸，风湿痹，下气。久服轻身益气。", "tags": "风湿痹,水肿,泄泻,肺痈,筋急", "formula": "薏苡仁", "formula_detail": "薏苡仁，味甘淡微寒，入脾、胃、肺经。常用量三钱至一两。", "ni_annotation": "倪海厦讲薏苡仁：薏仁甘淡利水，健脾而不燥，利湿而不伤阴。湿热痹证筋急拘挛，麻杏薏甘汤薏仁除湿舒筋。肺痈咳吐脓痰，千金苇茎汤薏仁配桃仁、冬瓜仁排脓消痈。水肿脚气，薏仁配赤小豆、茯苓利水消肿。倪师说薏仁治湿痹最温和，适合久服，与白术不同，白术健脾燥湿偏温，薏仁清热利湿偏凉。", "contraindication": "孕妇慎用，津枯便秘者不宜", "keywords": "利湿,健脾,舒筋,排脓,清热,倪师常用药"}, {"id": 1214, "source": "神农本草经", "article_number": "19", "liujing": "", "chapter": "上品", "original_text": "泽泻，味甘寒，主风寒湿痹，乳难，消水，养五脏，益气力，肥健。久服耳目聪明，不饥延年，轻身，面生光，能行水上。", "tags": "水肿,淋证,眩晕,泄泻,湿痹", "formula": "泽泻", "formula_detail": "泽泻，味甘淡寒，入肾、膀胱经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲泽泻：泽泻利水渗湿而不伤阴，是利水药中的上品。五苓散泽泻配茯苓、猪苓、白术、桂枝，泽泻利水为君，水去则渴止。泽泻汤治心下有支饮其人苦冒眩，泽泻五两配白术二两，利水降逆。肾主水，泽泻通过利水而泻肾中浊阴，六味地黄丸中用之泻肾浊。倪师强调：泽泻利水不伤阴，阴虚水肿可用。", "contraindication": "肾虚精滑、无湿热者不宜", "keywords": "利水,渗湿,泻肾浊,清湿热,六味地黄丸"}, {"id": 1215, "source": "神农本草经", "article_number": "20", "liujing": "", "chapter": "上品", "original_text": "远志，味苦温，主咳逆伤中，补不足，除邪气，利九窍，益智慧，耳目聪明，不忘，强志，倍力。久服轻身不老。", "tags": "惊悸,健忘,失眠,咳嗽,痈疽", "formula": "远志", "formula_detail": "远志，味苦辛温，入心、肾、肺经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲远志：远志通心肾最妙，心肾不交则失眠健忘惊悸，远志开心气而通肾气，使心肾相交、水火既济。与菖蒲同用即开心散主药，治健忘迷惑、耳目不聪。咳嗽是肺气不降，远志入肺利窍化痰止咳。倪师说：远志苦温，能强志倍力，心气强则志定神安，内守而不外散。", "contraindication": "有实火、胃溃疡者慎用", "keywords": "安神,益智,通心肾,化痰,开心散"}, {"id": 1216, "source": "神农本草经", "article_number": "21", "liujing": "", "chapter": "上品", "original_text": "龙胆，味苦涩寒，主骨间寒热，惊痫邪气，续绝伤，定五脏，杀蛊毒。久服益智不忘，轻身耐老。", "tags": "湿热,黄疸,目赤,惊痫,带下", "formula": "龙胆", "formula_detail": "龙胆（龙胆草），味苦寒，入肝、胆、膀胱经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲龙胆草：龙胆草大苦大寒，直折肝胆实火，清下焦湿热。肝火上炎头痛目赤、胁痛口苦，龙胆泻肝汤龙胆草为君，配黄芩、栀子、泽泻等清利湿热。湿热下注阴肿阴痒、带下黄臭，龙胆草清利肝经湿热。治惊痫是清肝热而息风，肝热清则魂归不惊。倪师强调：龙胆草极苦，中病即止。", "contraindication": "脾胃虚寒、无实火湿热者忌用", "keywords": "清热,燥湿,泻肝火,利胆,龙胆泻肝汤"}, {"id": 1217, "source": "神农本草经", "article_number": "22", "liujing": "", "chapter": "上品", "original_text": "细辛，味辛温，主咳逆，头痛脑动，百节拘挛，风湿痹痛，死肌。久服明目，利九窍，轻身长年。", "tags": "风寒感冒,头痛,牙痛,咳喘,痹痛", "formula": "细辛", "formula_detail": "细辛，味辛温，入肺、肾经。常用量三分至一钱。", "ni_annotation": "倪海厦讲细辛：细辛辛温走窜，入少阴肾经，散肾中之寒。少阴病始得之反发热脉沉，麻黄附子细辛汤用细辛搜少阴之寒外出太阳。头痛连脑齿痛，细辛散少阴经寒止痛。风寒冷饮伤肺咳嗽，小青龙汤细辛配干姜、五味子，一散一收一敛，治寒饮咳喘最妙。倪师说：细辛不过钱是温病派说法，伤寒家用二至三钱不中毒。", "contraindication": "气虚多汗、阴虚阳亢头痛者忌用", "keywords": "散寒,通窍,止痛,入少阴,倪师常用药"}, {"id": 1218, "source": "神农本草经", "article_number": "23", "liujing": "", "chapter": "上品", "original_text": "石斛，味甘平，主伤中，除痹，下气，补五脏虚劳羸瘦，强阴益精。久服厚肠胃，轻身延年。", "tags": "阴虚,虚劳,消渴,目暗,痿证", "formula": "石斛", "formula_detail": "石斛，味甘微寒，入胃、肾经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲石斛：石斛生于石上，得清阴之气最厚，故能养胃肾之阴。五脏虚劳皆可从脾胃入手，石斛甘寒养胃阴，胃阴足则能化生气血以养五脏。治消渴多饮，石斛配天花粉、麦冬养阴生津。治目暗昏花，石斛夜光丸以石斛为君，养阴明目。倪师强调：石斛养阴而不恋湿，虚而有湿热者也可用。", "contraindication": "湿温尚在、脾胃虚寒者不宜", "keywords": "养阴,益胃,生津,明目,石斛夜光丸"}, {"id": 1219, "source": "神农本草经", "article_number": "24", "liujing": "", "chapter": "上品", "original_text": "巴戟天，味辛微温，主大风邪气，阴痿不起，强筋骨，安五脏，补中增志益气。", "tags": "阳痿,不孕,腰膝酸软,风湿痹,虚劳", "formula": "巴戟天", "formula_detail": "巴戟天，味辛甘微温，入肾、肝经。常用量三钱至五钱。", "ni_annotation": "倪海厦讲巴戟天：巴戟天补肾壮阳而不燥烈，补而不滞，温而不热。肾阳虚阳痿、宫寒不孕，巴戟天配肉苁蓉、淫羊藿补肾壮阳。强筋骨治腰膝无力，巴戟天配杜仲、牛膝补肝肾强腰膝。倪师说：巴戟天能祛风，风湿痹痛兼肾阳虚者最宜，既补肾又祛风，一举两得。", "contraindication": "阴虚火旺、相火炽盛者忌用", "keywords": "补肾,壮阳,强筋骨,祛风湿,温而不燥"}, {"id": 1220, "source": "神农本草经", "article_number": "25", "liujing": "", "chapter": "上品", "original_text": "白英，味甘寒，主寒热，八疽，消渴，补中益气。久服轻身延年。", "tags": "黄疸,消渴,虚劳,疮疡,风热", "formula": "白英", "formula_detail": "白英（白毛藤），味甘苦寒，入肝、胆、脾经。常用量三钱至一两。", "ni_annotation": "倪海厦讲白英：白英又名白毛藤，清热利湿解毒，治黄疸和消渴有良效。湿热黄疸身目俱黄，白英配茵陈、栀子清热利湿退黄。消渴热伤津液，白英配天花粉、葛根清热生津。现代认为有抗癌作用，可用于湿热毒邪所致肿瘤。其性寒能解毒，疮疡肿毒亦可外敷内服。", "contraindication": "脾胃虚寒者慎用", "keywords": "清热,利湿,退黄,解毒,治消渴"}, {"id": 1221, "source": "神农本草经", "article_number": "26", "liujing": "", "chapter": "上品", "original_text": "白蒿，味甘平，主五脏邪气，风寒湿痹，补中益气，长毛发令黑，疗心悬，少食常饥。久服轻身，耳目聪明不老。", "tags": "风湿痹,脱发,心悸,食少,虚劳", "formula": "白蒿", "formula_detail": "白蒿（茵陈蒿嫩苗），味甘平，入脾、肝经。常用量三钱至五钱。", "ni_annotation": "倪海厦讲白蒿：白蒿甘平补中，能养五脏而去邪气。补中益气故能少食常饥者增食，心悸心悬者得安。其能长毛发令黑，说明有养血之功，发为血之余，血足则发黑而长。兼能祛风湿痹。倪师提示：此药补而不峻，可作为养生食疗久服。", "contraindication": "无特殊禁忌", "keywords": "补中,益气,养血,乌发,祛风湿"}, {"id": 1222, "source": "神农本草经", "article_number": "27", "liujing": "", "chapter": "上品", "original_text": "赤箭，味辛温，主杀鬼精物，蛊毒恶气。久服益气力，长阴，肥健，轻身增年。", "tags": "头痛,眩晕,惊痫,风湿痹,中风", "formula": "赤箭", "formula_detail": "赤箭（天麻），味甘平，入肝经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲天麻（赤箭）：天麻是治头痛眩晕第一药。肝风内动眩晕头痛、肢体麻木，天麻平肝息风止痉。天麻钩藤饮治肝阳上亢高血压头痛，天麻配钩藤、石决明平肝潜阳。治惊痫抽搐，天麻配全蝎、僵蚕息风止痉。倪师说：天麻祛风不伤正，虚人风动最宜，且能通络治风湿痹痛麻木。", "contraindication": "气血虚甚者需配补益药同用", "keywords": "平肝,息风,止痉,通络,治头痛"}, {"id": 1223, "source": "神农本草经", "article_number": "28", "liujing": "", "chapter": "上品", "original_text": "庵闾子，味苦微寒，主五脏瘀血，腹中水气，胪胀留热，风寒湿痹，身体诸痛。久服轻身延年不老。", "tags": "瘀血,腹胀,水肿,痹痛,经闭", "formula": "庵闾子", "formula_detail": "庵闾子，味苦微寒，入肝经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲庵闾子：此药活血化瘀兼利水湿，专门针对瘀血与水湿互结之证。五脏瘀血腹中水气，肝硬化腹水、妇人经闭水肿，庵闾子活血利水双管齐下。风寒湿痹身体诸痛，瘀去湿除则痛自止。倪师说：此药散瘀而不破血，利水而不伤阴，性质平和，适合久服。", "contraindication": "孕妇忌用，气血虚而无瘀滞者不宜", "keywords": "活血,利水,散瘀,止痛,治痹"}, {"id": 1224, "source": "神农本草经", "article_number": "29", "liujing": "", "chapter": "上品", "original_text": "析蓂子，味辛微温，主明目，目痛泪出，除痹，补五脏，益精光。久服轻身不老。", "tags": "目痛,流泪,目暗,痹证,虚劳", "formula": "析蓂子", "formula_detail": "析蓂子（菥蓂子），味辛微温，入肝经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲析蓂子：此药以明目见长，辛散风热，温能通络。目痛泪出多为风热上攻，析蓂子疏散风热而明目。久服补五脏益精光，是标本兼治：急则散风热止泪止痛，缓则补肝血而明目。兼能除痹通络。倪师说：明目之药多入肝，肝开窍于目故也。", "contraindication": "无特殊禁忌", "keywords": "明目,散风热,止泪,除痹,入肝经"}, {"id": 1225, "source": "神农本草经", "article_number": "30", "liujing": "", "chapter": "上品", "original_text": "蓍实，味苦酸平，主益气，充肌肤，明目，聪慧先知。久服不饥不老轻身。", "tags": "气虚,目暗,健忘,虚羸,肌肉不长", "formula": "蓍实", "formula_detail": "蓍实，味苦酸平，入肝、脾经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲蓍实：此药益气充肌肤，补中焦脾胃之气。脾胃为后天之本气血生化之源，气足则肌肉充、肌肤泽。明目聪慧是气血上荣于头目，目得血则明，脑得血则慧。其味酸入肝能补肝血助目明。倪师提示：此药功效与山药类同但更偏补气，可互相参考使用。", "contraindication": "无特殊禁忌", "keywords": "益气,明目,聪慧,充肌,补肝"}, {"id": 1226, "source": "神农本草经", "article_number": "31", "liujing": "", "chapter": "上品", "original_text": "赤芝，味苦平，主胸中结，益心气，补中，增慧智不忘。久食轻身不老，延年神仙。", "tags": "胸痹,心悸,失眠,健忘,虚劳", "formula": "赤芝", "formula_detail": "赤芝（赤灵芝），味苦平，入心、肝、脾、肺、肾经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲赤芝：赤芝入心，苦平益心气。胸中结是心气郁结不舒，胸闷心悸，赤芝补心气而散郁结。心藏神，心气足则神安而慧智、不忘。灵芝是多孔菌，性平力缓，久服方可轻身延年。治失眠健忘，赤芝配酸枣仁、远志养心安神。倪师说：灵芝是补益之上品，六色灵芝归六经。", "contraindication": "外感表证未解者不宜", "keywords": "补心,安神,益智,延年,灵芝之首"}, {"id": 1227, "source": "神农本草经", "article_number": "32", "liujing": "", "chapter": "上品", "original_text": "黑芝，味咸平，主癃，利水道，益肾气，通九窍，聪察。久食轻身不老，延年神仙。", "tags": "淋证,水肿,肾虚,耳鸣,健忘", "formula": "黑芝", "formula_detail": "黑芝（黑灵芝），味咸平，入肾经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲黑芝：黑芝入肾，咸能软坚利水。主癃利水道即治小便不通，肾主水，黑芝补肾气而通利水道。肾开窍于耳和二阴，肾气足则耳聪、九窍通。通九窍是肾气充盛的表现，肾为先天之本，肾气盛则各窍皆利。倪师说：黑芝补肾而不燥，与熟地不同，可久服无滞腻之弊。", "contraindication": "无特殊禁忌", "keywords": "补肾,利水,通窍,聪耳,益肾气"}, {"id": 1228, "source": "神农本草经", "article_number": "33", "liujing": "", "chapter": "上品", "original_text": "青芝，味酸平，主明目，补肝气，安精魂，仁恕。久食轻身不老，延年神仙。", "tags": "目暗,肝虚,易怒,失眠,抽筋", "formula": "青芝", "formula_detail": "青芝（青灵芝），味酸平，入肝经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲青芝：青芝色青入肝，肝开窍于目，故主明目。肝藏魂，肝气不足则魂不安，夜寐多梦易惊，青芝补肝气而安精魂。肝在志为怒，肝气平和则人仁恕不怒，此五行生克之理。倪师说：肝虚不能养筋则筋急抽筋，目暗昏花，青芝配枸杞、菊花养肝明目有良效。", "contraindication": "肝火旺盛者慎用", "keywords": "补肝,明目,安魂,平怒,入肝经"}, {"id": 1229, "source": "神农本草经", "article_number": "34", "liujing": "", "chapter": "上品", "original_text": "白芝，味辛平，主咳逆上气，益肺气，通利口鼻，强志意，勇悍，安魄。久食轻身不老，延年神仙。", "tags": "咳喘,肺虚,鼻塞,短气,易感", "formula": "白芝", "formula_detail": "白芝（白灵芝），味辛平，入肺经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲白芝：白芝色白入肺，辛能散能行，平能补。肺主气司呼吸，肺气虚则咳逆上气、短气不足，白芝益肺气而平咳逆。肺开窍于鼻，肺气通利则口鼻通利。肺藏魄，肺气足则魄安志强，人勇悍果断。倪师说：久咳肺虚、感冒不断，白芝配黄芪、白术补肺固表。", "contraindication": "外感风寒未解者慎用", "keywords": "补肺,止咳,平喘,通鼻,安魄"}, {"id": 1230, "source": "神农本草经", "article_number": "35", "liujing": "", "chapter": "上品", "original_text": "黄芝，味甘平，主心腹五邪，益脾气，安神，忠和，和乐。久食轻身不老，延年神仙。", "tags": "脾虚,食少,腹胀,失眠,神疲", "formula": "黄芝", "formula_detail": "黄芝（黄灵芝），味甘平，入脾经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲黄芝：黄芝色黄入脾，甘平补脾气。心腹五邪即中焦脾胃受邪，腹胀、食少、便溏、神疲等，黄芝益脾气而祛邪安中。脾主思，脾虚则思虑过度、失眠不安，脾气足则神安思和。倪师说：黄芝是脾虚者最佳补品，性平和缓，配茯苓、白术健脾安神效果更佳。", "contraindication": "无特殊禁忌", "keywords": "补脾,安神,和中,益气,健脾"}, {"id": 1231, "source": "神农本草经", "article_number": "36", "liujing": "", "chapter": "上品", "original_text": "紫芝，味甘温，主耳聋，利关节，保神，益精气，坚筋骨，好颜色。久服轻身不老延年。", "tags": "耳聋,关节痛,肾虚,精亏,面色苍老", "formula": "紫芝", "formula_detail": "紫芝（紫灵芝），味甘温，入心、肝、脾、肾经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲紫芝：紫芝甘温质厚，能补养五脏之精。肾开窍于耳，肾精亏则耳鸣耳聋，益精气则耳聪。肝主筋肾主骨，精气充则筋骨坚、关节利。好颜色是气血上荣于面之故。保神者心肾相交、水火既济也。倪师说：紫芝为灵芝中最温和者，最宜于老年精亏之耳聋健忘、关节不利。", "contraindication": "外感表邪未解者不宜", "keywords": "益精,强骨,聪耳,保神,抗衰老"}, {"id": 1232, "source": "神农本草经", "article_number": "37", "liujing": "", "chapter": "上品", "original_text": "卷柏，味辛温，主五脏邪气，女子阴中寒热痛，癥瘕，血闭绝子。久服轻身和颜色。", "tags": "经闭,痛经,癥瘕,不孕,跌打", "formula": "卷柏", "formula_detail": "卷柏，味辛平，入肝经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲卷柏：卷柏是活血通经药，生用破血，炒用止血。女子阴中寒热痛是寒凝或热结血瘀，癥瘕血闭是瘀血内结，卷柏辛散活血通经。不孕因子宫虚寒血瘀者，卷柏配当归、川芎温经活血。倪师强调：卷柏生熟异用，生用活血力猛，炒炭则止血，治崩漏下血。", "contraindication": "孕妇忌用，无瘀滞者不宜", "keywords": "活血,通经,破瘀,止血,生熟异用"}, {"id": 1233, "source": "神农本草经", "article_number": "38", "liujing": "", "chapter": "上品", "original_text": "蓝实，味苦寒，主解诸毒，杀蛊蚑，疰鬼，螫毒。久服头不白，轻身。", "tags": "热毒,温病,丹毒,咽痛,疮疡", "formula": "蓝实", "formula_detail": "蓝实（蓝实即蓼蓝果实，今多用大青叶/板蓝根），味苦寒，入心、胃经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲蓝实：蓝实味苦寒清热解毒，与板蓝根、大青叶同类。解诸毒包括疫毒、热毒、虫蛇螫毒。温病热入营血发斑发疹，蓝实配生地、丹皮凉血解毒。咽喉肿痛、丹毒疮疡，蓝实配金银花、连翘清热解毒。久服头不白是因能清血中热毒，血凉则发不早白。倪师说：清热解毒药中蓝实最善解疫毒。", "contraindication": "脾胃虚寒者忌用", "keywords": "清热,解毒,凉血,治温病,解疫毒"}, {"id": 1234, "source": "神农本草经", "article_number": "39", "liujing": "", "chapter": "上品", "original_text": "芎䓖，味辛温，主中风入脑头痛，寒痹筋挛缓急，金疮，妇人血闭无子。", "tags": "头痛,经闭,痹痛,月经不调,疮疡", "formula": "芎䓖", "formula_detail": "芎䓖（川芎），味辛温，入肝、胆、心包经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲川芎：川芎是血中气药，上行头目，下行血海，旁通四肢。治头痛，无论风寒风热血虚血瘀皆可用，川芎茶调散治风寒头痛，配白芷、细辛。血瘀经闭痛经，四物汤中川芎活血行气。又为妇科要药，调经种子多用之。倪师说：川芎辛温走窜，能通全身血脉，通则不痛，治诸痹最效。", "contraindication": "阴虚火旺、月经过多者慎用", "keywords": "活血,行气,祛风,止痛,血中气药"}, {"id": 1235, "source": "神农本草经", "article_number": "40", "liujing": "", "chapter": "上品", "original_text": "蘼芜，味辛温，主咳逆，定惊气，辟邪恶，除蛊毒鬼疰，去三虫。久服通神。", "tags": "咳逆,惊悸,虫积,头痛,鼻渊", "formula": "蘼芜", "formula_detail": "蘼芜（川芎苗叶），味辛温，入肝经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲蘼芜：蘼芜即川芎的苗叶，功效与川芎相近但更轻清上浮。辛温能散能行，治咳逆是降肺中之逆气，定惊气是通心肝之气滞。辟邪恶去三虫，香气能辟秽浊而杀虫。其气轻清上达巅顶，治头风鼻渊甚妙。倪师说：川芎根入血分，蘼芜苗叶入气分，一入血一入气。", "contraindication": "阴虚火旺者慎用", "keywords": "散风,降逆,辟秽,杀虫,轻清上浮"}, {"id": 1236, "source": "神农本草经", "article_number": "41", "liujing": "", "chapter": "上品", "original_text": "黄连，味苦寒，主热气目痛，眦伤泣出，明目，肠澼腹痛下利，妇人阴中肿痛。久服令人不忘。", "tags": "目赤,泻痢,消渴,心烦,口疮", "formula": "黄连", "formula_detail": "黄连，味苦寒，入心、肝、胃、大肠经。常用量三分至二钱。", "ni_annotation": "倪海厦讲黄连：黄连是苦寒清热燥湿第一药。热利下重便脓血，白头翁汤黄连配黄柏、秦皮清热燥湿止利。心烦不眠，黄连阿胶汤黄连配阿胶、鸡子黄，黄连泻心火，阿胶滋肾阴，水火既济。目赤肿痛，黄连煎水外洗或内服。倪师强调：黄连极苦，中病即止，多用伤胃败中。", "contraindication": "脾胃虚寒、阴虚烦热者忌用", "keywords": "清热,燥湿,泻火,解毒,止利,倪师常用药"}, {"id": 1237, "source": "神农本草经", "article_number": "42", "liujing": "", "chapter": "上品", "original_text": "络石，味苦温，主风热死肌，痈伤，口干舌焦，痈肿不消，喉舌肿，水浆不下。久服轻身明目，润泽好颜色，不老延年。", "tags": "喉痹,痈肿,疮疡,口干,目暗", "formula": "络石", "formula_detail": "络石（络石藤），味苦微寒，入心、肝经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲络石藤：络石藤善通经络、凉血消肿。喉舌肿水浆不下即急性喉痹咽喉肿痛，络石藤配射干、山豆根清热利咽。风热死肌是热毒壅滞肌肤坏死，络石藤凉血消肿而生肌。又能祛风通络，治风湿痹痛关节不利。倪师说：络石藤凉而不寒，通而不破，是外科良药。", "contraindication": "脾胃虚寒、无热毒者不宜", "keywords": "通络,凉血,消肿,利咽,治痹"}, {"id": 1238, "source": "神农本草经", "article_number": "43", "liujing": "", "chapter": "上品", "original_text": "蒺藜子，味苦温，主恶血，破癥结积聚，喉痹，乳难。久服长肌肉，明目轻身。", "tags": "目赤,头痛,风疹,乳痈,癥瘕", "formula": "蒺藜子", "formula_detail": "蒺藜子（刺蒺藜），味苦辛微温，入肝经。常用量二钱至五钱。", "ni_annotation": "倪海厦讲蒺藜子：蒺藜子苦泄辛散，善于平肝疏肝。肝火上炎头痛目赤、目生翳障，蒺藜子配菊花、决明子平肝明目。肝气郁结气血瘀滞成癥瘕积聚，蒺藜子疏肝理气散结。皮肤风疹瘙痒是风邪在表，蒺藜子配蝉蜕、防风疏风止痒。倪师说：蒺藜子与潼蒺藜不同，潼蒺藜补肾，刺蒺藜平肝。", "contraindication": "气血虚者及孕妇慎用", "keywords": "平肝,疏肝,明目,祛风,散结"}, {"id": 1239, "source": "神农本草经", "article_number": "44", "liujing": "", "chapter": "上品", "original_text": "黄芪，味甘微温，主痈疽久败疮，排脓止痛，大风癞疾，五痔鼠瘘，补虚，小儿百病。", "tags": "气虚,疮疡,虚劳,自汗,水肿", "formula": "黄芪", "formula_detail": "黄芪，味甘微温，入脾、肺经。常用量三钱至一两。", "ni_annotation": "倪海厦讲黄芪：黄芪色黄入脾，味甘补气，是补气之长。治痈疽久不收口，黄芪配当归即当归补血汤，补气生血托毒生肌。表虚自汗恶风，玉屏风散黄芪配防风、白术，补气固表。水肿小便不利兼气虚者，防己黄芪汤补气利水。倪师强调：黄芪走表，人参走里，表虚用黄芪，里虚用人参。", "contraindication": "表实邪盛、阴虚阳亢者忌用", "keywords": "补气,固表,利水,托毒,生肌,倪师常用药"}, {"id": 1240, "source": "神农本草经", "article_number": "45", "liujing": "", "chapter": "上品", "original_text": "肉松容，味甘微温，主五劳七伤，补中，除茎中寒热痛，养五脏，强阴，益精气，多子，妇人癥瘕。久服轻身。", "tags": "阳痿,不孕,虚劳,便秘,癥瘕", "formula": "肉松容", "formula_detail": "肉松容（肉苁蓉），味甘咸温，入肾、大肠经。常用量三钱至五钱。", "ni_annotation": "倪海厦讲肉苁蓉：肉苁蓉温而不燥，补而不峻，是补肾阳之首选。治阳痿精冷、宫寒不孕，配巴戟天、菟丝子温肾壮阳。其质润能润肠通便，治老人肾虚肠燥便秘，配当归、火麻仁润肠通便。倪师说：肉苁蓉壮阳不伤阴，便秘兼肾虚者最宜，优于大黄等峻下药。", "contraindication": "阴虚火旺、大便溏泄者不宜", "keywords": "补肾,壮阳,益精,润肠,温而不燥"}, {"id": 1241, "source": "神农本草经", "article_number": "46", "liujing": "", "chapter": "上品", "original_text": "防风，味甘温，主大风头眩痛，恶风，风邪目盲无所见，风行周身，骨节疼痹烦满。久服轻身。", "tags": "感冒,头痛,痹痛,风疹,破伤风", "formula": "防风", "formula_detail": "防风，味辛甘微温，入膀胱、肝、脾经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲防风：防风是风中润药，祛风而不伤阴。太阳病头痛项强，桂枝汤加防风祛风解表。风湿痹痛周身关节痛，防风配羌活、独活祛风胜湿。风疹瘙痒，防风配荆芥、蝉蜕疏风止痒。玉屏风散防风配黄芪白术，防风走表祛邪，白术健脾，黄芪固表，攻补兼施。倪师说：防风通治一切风证。", "contraindication": "阴虚火旺、血虚发痉者慎用", "keywords": "祛风,胜湿,解表,止痒,风中润药,倪师常用药"}, {"id": 1242, "source": "神农本草经", "article_number": "47", "liujing": "", "chapter": "上品", "original_text": "蒲黄，味甘平，主心腹膀胱寒热，利小便，止血，消瘀血。久服轻身益气力，延年神仙。", "tags": "出血,瘀血,血淋,痛经,跌打", "formula": "蒲黄", "formula_detail": "蒲黄，味甘平，入肝、心包经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲蒲黄：蒲黄是止血化瘀要药，能止血不留瘀，化瘀不伤正。血淋尿血涩痛，蒲黄配生地、白茅根凉血止血利尿。崩漏下血，蒲黄炒炭止血。跌打瘀肿疼痛，生蒲黄活血化瘀消肿。失笑散蒲黄配五灵脂，治瘀血心痛、痛经。倪师说：蒲黄生用活血，炒用止血，一药两用。", "contraindication": "孕妇忌用，无瘀滞者慎用", "keywords": "止血,化瘀,通淋,活血,生熟异用"}, {"id": 1243, "source": "神农本草经", "article_number": "48", "liujing": "", "chapter": "上品", "original_text": "香蒲，味甘平，主五脏心下邪气，口中烂臭，坚齿明目聪耳。久服轻身耐老。", "tags": "口疮,口臭,齿痛,目暗,耳鸣", "formula": "香蒲", "formula_detail": "香蒲（香蒲即水蜡烛，花粉为蒲黄），味甘平，入肝、心经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲香蒲：香蒲全草能清热利水、消肿解毒。口中烂臭是心胃有热上熏于口，香蒲清心胃之热而除口臭。坚齿是清胃火，胃火清则齿龈不肿不痛。明目聪耳亦是清热之功，头面诸窍热清则明聪。倪师说：香蒲与蒲黄同出一物，花粉入血分止血，全草入气分清热。", "contraindication": "脾胃虚寒者慎用", "keywords": "清热,利水,解毒,除臭,坚齿"}, {"id": 1244, "source": "神农本草经", "article_number": "49", "liujing": "", "chapter": "上品", "original_text": "续断，味苦微温，主伤寒，补不足，金疮痈伤折跌，续筋骨，妇人乳难。久服益气力。", "tags": "骨折,腰膝痛,崩漏,胎动,跌打", "formula": "续断", "formula_detail": "续断，味苦甘辛微温，入肝、肾经。常用量三钱至五钱。", "ni_annotation": "倪海厦讲续断：续断顾名思义能续筋接骨，是伤科要药。骨折筋伤、跌打损伤，续断配骨碎补、自然铜接骨续筋。肝肾不足腰膝酸痛无力，续断配杜仲、牛膝补肝肾强筋骨。妇人崩漏不止、胎动不安，寿胎丸续断配桑寄生、菟丝子补肾安胎止血。倪师说：续断补肝肾而又能行血脉，补而不滞。", "contraindication": "风湿热痹者慎用", "keywords": "补肝肾,强筋骨,续断,安胎,伤科要药"}, {"id": 1245, "source": "神农本草经", "article_number": "50", "liujing": "", "chapter": "上品", "original_text": "漏芦，味苦咸寒，主皮肤热，恶疮疽痔，湿痹，下乳汁。久服轻身益气，耳目聪明，不老延年。", "tags": "乳痈,疮疡,痔疮,缺乳,湿痹", "formula": "漏芦", "formula_detail": "漏芦，味苦咸寒，入胃、大肠经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲漏芦：漏芦苦寒清热解毒，咸能软坚散结，是治乳痈要药。乳痈初起红肿热痛，漏芦配瓜蒌、蒲公英清热解毒散结。下乳汁是通乳之功，产后乳汁不通，漏芦配王不留行、穿山甲通经下乳。恶疮疽痔、皮肤热毒，漏芦内服外敷皆可。倪师说：漏芦入阳明经，乳房属阳明故为通乳要药。", "contraindication": "脾胃虚寒、无热毒者及孕妇忌用", "keywords": "清热,解毒,通乳,散结,治乳痈"}, {"id": 1246, "source": "神农本草经", "article_number": "51", "liujing": "", "chapter": "上品", "original_text": "营实，味酸温，主痈疽恶疮，结肉跌筋，败疮热气，阴蚀不瘳，利关节。", "tags": "疮疡,关节不利,筋急,痈疽,阴疮", "formula": "营实", "formula_detail": "营实（营实即蔷薇果实），味酸温，入肝经。常用量一钱至三钱。", "ni_annotation": "倪海厦讲营实：营实即野蔷薇果实，酸能收敛，温能通散。治痈疽恶疮、败疮不
